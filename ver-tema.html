    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px; 
        }
      .rama-card{
    background:rgba(255,255,255,.07);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;
    padding:25px;
    transition:.4s;
    overflow:hidden;
}

.rama-card:hover{
    transform:translateY(-5px);
    border-color:#c5a059;
    box-shadow:0 0 20px rgba(197,160,89,.25);
}

.nombre-rama{
    font-size:1.3rem;
    font-weight:700;
    color:white;
    margin-bottom:15px;
}

.lista-topicos{
    max-height:0;
    overflow:hidden;
    transition:max-height .5s ease;
}

.rama-card:hover .lista-topicos{
    max-height:500px;
}

.topico-link{
    display:block;
    color:#c5a059;
    text-decoration:none;
    padding:8px 0;
    transition:.3s;
}

.topico-link:hover{
    color:white;
    transform:translateX(10px);
    text-shadow:0 0 10px rgba(255,255,255,.7);
}
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="master-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="master-vigencia.html" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>

            <a href="historial-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-clock-history"></i> HISTORIAL</a>
            <a href="directorio.html" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>

            <a href="papelera.html" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">
<div class="container-fluid">

    <a href="master-repositorio.html"
       class="btn btn-outline-light mb-4">
        <i class="bi bi-arrow-left"></i>
        Volver a módulos
    </a>

    <h1 id="tituloModulo"
        class="display-6 fw-bold mb-5">
        Cargando módulo...
    </h1>

    <div class="row g-4" id="contenedorRamas">
    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs,
    orderBy    
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325",
        measurementId: "G-3M3DH25722"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const params = new URLSearchParams(window.location.search);
    const moduloId = params.get("moduloId");

    // Carga de Logo según el usuario
    onAuthStateChanged(auth, async (user) => {
        const logoElement = document.getElementById('logoAcademia');
        if (user) {
            try {
                const docRef = doc(db, "usuarios", user.email);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().logoCustom) {
                    logoElement.src = docSnap.data().logoCustom;
                }
            } catch (error) { console.error("Error al cargar logo:", error); }
        }
        logoElement.style.opacity = "1";
        logoElement.style.visibility = "visible";
    });

  async function cargarModulo() {

    const moduloSnap =
        await getDoc(
            doc(db, "ofertas", moduloId)
        );

    if (moduloSnap.exists()) {
        document.getElementById(
            "tituloModulo"
        ).innerText =
            moduloSnap.data().modulo;
    }
}

async function cargarRamas() {

    const contenedor =
        document.getElementById(
            "contenedorRamas"
        );

    contenedor.innerHTML = "";

const q = query(
    collection(db, "ramas"),
    where("moduloId", "==", moduloId)
);
    const ramasSnap = await getDocs(q);
    const ramasOrdenadas = ramasSnap.docs
    .map(doc => ({
        id: doc.id,
        ...doc.data()
    }))
    .sort((a, b) => (a.orden || 0) - (b.orden || 0));

for (const rama of ramasOrdenadas) {

    const qTopicos = query(
        collection(db, "topicos"),
        where("ramaId", "==", rama.id)
    );

    const topicosSnap = await getDocs(qTopicos);

    let htmlTopicos = "";

    topicosSnap.forEach(t => {
        const d = t.data();

        if (d.visible === false) return;

        htmlTopicos += `
            <a class="topico-link"
               href="contenido.html?topicoId=${t.id}"
               target="_blank"
               rel="noopener noreferrer">

               <i class="bi bi-journal-text me-2"></i>
               ${d.tema}
            </a>
        `;
    });

    contenedor.innerHTML += `
        <div class="col-lg-4">

            <div class="rama-card"
                 draggable="true"
                 data-id="${rama.id}">

                <div class="nombre-rama">
                    <i class="bi bi-diagram-3 me-2"></i>
                    ${rama.nombre}
                </div>

                <div class="lista-topicos">
                    ${htmlTopicos}
                </div>

            </div>

        </div>
    `;
}
async function cargarRamas() {
    const contenedor = document.getElementById("contenedorRamas");
    contenedor.innerHTML = "";

    const q = query(
        collection(db, "ramas"),
        where("moduloId", "==", moduloId)
    );

    const ramasSnap = await getDocs(q);

    const ramasOrdenadas = ramasSnap.docs
        .map(doc => ({
            id: doc.id,
            ...doc.data()
        }))
        .sort((a, b) => (a.orden || 0) - (b.orden || 0));

    for (const rama of ramasOrdenadas) {
        const qTopicos = query(
            collection(db, "topicos"),
            where("ramaId", "==", rama.id)
        );

        const topicosSnap = await getDocs(qTopicos);

        let htmlTopicos = "";

        topicosSnap.forEach(t => {
            const d = t.data();
            if (d.visible === false) return;

            htmlTopicos += `
                <a class="topico-link"
                   href="contenido.html?topicoId=${t.id}"
                   target="_blank"
                   rel="noopener noreferrer">
                    <i class="bi bi-journal-text me-2"></i>
                    ${d.tema}
                </a>
            `;
        });

        contenedor.innerHTML += `
            <div class="col-lg-4">
                <div class="rama-card" draggable="true" data-id="${rama.id}">
                    <div class="nombre-rama">
                        <i class="bi bi-diagram-3 me-2"></i>
                        ${rama.nombre}
                    </div>

                    <div class="lista-topicos">
                        ${htmlTopicos}
                    </div>
                </div>
            </div>
        `;
    }
}

cargarModulo();
cargarRamas();

    // Acción Cierre de Sesión
    document.getElementById('btnLogout').addEventListener('click', async (e) => {
        e.preventDefault();
        try {
            await signOut(auth);
            window.location.href = "index.html"; // Redirige al login
        } catch (error) {
            console.error("Error al cerrar sesión:", error);
            alert("Ocurrió un error al cerrar la sesión.");
        }
    });
</script>
<script type="module" src="js/alertas-globales.js"></script>    
</body>
</html>
