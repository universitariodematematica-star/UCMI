      .rama-card{
    background:rgba(255,255,255,.07);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);

    box-shadow:0 0 20px rgba(197,160,89,.25);

    overflow:hidden;

<div class="container-fluid">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const moduloId = new URLSearchParams(location.search).get("moduloId");

/* ================= LOGO ================= */
onAuthStateChanged(auth, async (user) => {
    const logo = document.getElementById("logoAcademia");

    if (user) {
        const snap = await getDoc(doc(db, "usuarios", user.email));
        if (snap.exists() && snap.data().logoCustom) {
            logo.src = snap.data().logoCustom;
        }
    }

    logo.style.opacity = "1";
});

/* ================= MODULO ================= */
async function cargarModulo() {
    const snap = await getDoc(doc(db, "ofertas", moduloId));

    if (snap.exists()) {
        document.getElementById("tituloModulo").innerText =
            snap.data().modulo;
    }
}

/* ================= RAMAS ================= */
async function cargarRamas() {

    const contenedor = document.getElementById("contenedorRamas");
    contenedor.innerHTML = "";

    const ramasSnap = await getDocs(
        query(collection(db, "ramas"),
        where("moduloId", "==", moduloId))
    );

    const ramas = ramasSnap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (a.orden ?? 0) - (b.orden ?? 0));

    for (const rama of ramas) {

        const topicosSnap = await getDocs(
            query(collection(db, "topicos"),
            where("ramaId", "==", rama.id))
        );

        let htmlTopicos = "";

        topicosSnap.forEach(t => {
            const d = t.data();
            if (d.visible === false) return;

            htmlTopicos += `
                <a class="topico-link"
                   href="contenido.html?topicoId=${t.id}"
                   target="_blank">
                    <i class="bi bi-journal-text me-2"></i>
                    ${d.tema}
                </a>
            `;
        });

        contenedor.innerHTML += `
            <div class="col-lg-4 rama-wrapper">
                <div class="rama-card"
                     draggable="true"
                     data-id="${rama.id}">

                    <div class="nombre-rama">
                        <i class="bi bi-diagram-3 me-2"></i>
                        ${rama.nombre}
                    </div>

                    <div class="lista-topicos">
                        ${htmlTopicos}
                    </div>

                </div>
            </div>
        `;
    }

    activarDragDrop();
}

/* ================= DRAG & DROP REAL ================= */
function activarDragDrop() {

    const contenedor = document.getElementById("contenedorRamas");
    let dragged = null;

    const cards = contenedor.querySelectorAll(".rama-card");

    cards.forEach(card => {

        card.addEventListener("dragstart", () => {
            dragged = card;
            card.style.opacity = "0.5";
        });

        card.addEventListener("dragend", () => {
            card.style.opacity = "1";
            dragged = null;
        });

        card.addEventListener("dragover", (e) => {
            e.preventDefault();
        });

        card.addEventListener("drop", (e) => {
            e.preventDefault();

            if (!dragged || dragged === card) return;

            const from = dragged.closest(".rama-wrapper");
            const to = card.closest(".rama-wrapper");

            const all = [...contenedor.children];

            const fromIndex = all.indexOf(from);
            const toIndex = all.indexOf(to);

            if (fromIndex < toIndex) {
                contenedor.insertBefore(from, to.nextSibling);
            } else {
                contenedor.insertBefore(from, to);
            }

            console.log("Reordenado:", {
                from: dragged.dataset.id,
                to: card.dataset.id
            });

        });
    });
}

/* ================= INIT ================= */
cargarModulo();
cargarRamas();

/* ================= LOGOUT ================= */
document.getElementById("btnLogout").addEventListener("click", async (e) => {
    e.preventDefault();
    await signOut(auth);
    location.href = "index.html";
});
</script>
