<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Docente - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --verde-seleccion: #28a745; }
        body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0; }
        .card-form { border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); max-width: 950px; margin: auto; padding: 40px; }
        .logo-container { text-align: center; margin-bottom: 25px; }
        #logoAcademia { width: 120px; height: 120px; border-radius: 25px; object-fit: cover; border: 2px solid var(--dorado-ucmi); }
        .form-label { color: var(--dorado-ucmi); font-weight: bold; margin-top: 15px; display: block; }
        .form-control { background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; border-radius: 12px; padding: 12px; }
        .grid-container { width: 100%; margin-top: 15px; overflow-x: auto; }
        .grid-horaria { display: grid; grid-template-columns: 60px repeat(7, 1fr); gap: 3px; min-width: 500px; }
        .cell { background: rgba(255,255,255,0.1); height: 25px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .cell.active { background: var(--verde-seleccion) !important; }
        .header-cell { font-weight: bold; padding: 5px; text-align: center; font-size: 0.7rem; color: var(--dorado-ucmi); display: flex; align-items: center; justify-content: center; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; }
        .capsula { display: inline-block; background: var(--dorado-ucmi); color: #000; padding: 2px 8px; border-radius: 15px; font-size: 0.75rem; margin: 2px; font-weight: bold; border: 1px solid #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-form">
        <div class="logo-container"><img id="logoAcademia" src="https://via.placeholder.com/120" alt="Logo"></div>
        <h2 class="text-center" style="color: var(--dorado-ucmi); font-family: 'Cinzel'; margin-bottom: 30px;">POSTULACIÓN DOCENTE</h2>
        <form id="formDocente">
            <div class="row">
                <div class="col-md-6"><label class="form-label">Nombre Completo</label><input type="text" id="nombreResponsable" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">DNI</label><input type="text" id="dniDocente" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">WhatsApp</label><input type="text" id="whatsapp" class="form-control" required></div>
                <div class="col-12"><label class="form-label">Ubicación</label><input type="text" id="ubicacion" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Título</label><input type="text" id="titulo_universitario" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Institución</label><input type="text" id="institucion_titulo" class="form-control" required></div>
            </div>
            <label class="form-label">Enlace a Síntesis Curricular</label>
            <input type="url" id="enlace_sintesis" class="form-control" required>
            <div class="row">
                <div class="col-md-6"><label class="form-label">Años de experiencia</label><input type="number" id="anos_experiencia_docente" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Niveles de atención</label><input type="text" id="niveles_atencion" class="form-control" required></div>
            </div>
            <label class="form-label">Disponibilidad Horaria:</label>
            <div class="grid-container"><div class="grid-horaria" id="gridHoraria"></div></div>
            <label class="form-label">¿Por qué quiere formar parte?</label>
            <textarea id="razon_deseo_pertenencia" class="form-control" rows="3" required></textarea>
            <button type="submit" class="btn btn-enviar">REVISAR Y ENVIAR</button>
        </form>
    </div>
</div>

<div class="modal fade" id="modalRevision" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-white border-warning">
            <div class="modal-header"><h5 class="modal-title">Confirmar Postulación</h5></div>
            <div class="modal-body" id="bodyModal"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Corregir</button>
                <button type="button" class="btn btn-success" id="btnFinal">Confirmar Registro</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const urlParams = new URLSearchParams(window.location.search);
    const ent = urlParams.get('ref');

    // Cargar logo buscando por el campo "entidad"
    if (ent) {
        db.collection("usuarios").where("entidad", "==", ent).get().then(s => {
            s.forEach(d => { if(d.data().logoCustom) document.getElementById('logoAcademia').src = d.data().logoCustom; });
        });
    }

    const grid = document.getElementById('gridHoraria');
    grid.innerHTML = '<div></div>';
    ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'].forEach(d => grid.innerHTML += `<div class="header-cell">${d}</div>`);
    for (let h = 0; h < 24; h++) {
        grid.innerHTML += `<div class="header-cell">${h}:00</div>`;
        for (let d = 0; d < 7; d++) grid.innerHTML += `<div class="cell" onclick="this.classList.toggle('active')"></div>`;
    }

    const perfiles = [{nombre:"Roberto Gómez",dni:"1001",email:"roberto@mail.com",wsp:"+593991234567",loc:"Otavalo",tit:"Lic. en Educación",inst:"PUCE",url:"https://drive.google.com/1",exp:"8",nivel:"Primaria",razon:"Vocación."},{nombre:"Sara Pardo",dni:"1002",email:"sara@mail.com",wsp:"+593987654321",loc:"Ibarra",tit:"Magíster",inst:"UTE",url:"https://drive.google.com/2",exp:"12",nivel:"Bachillerato",razon:"Prestigio."},{nombre:"Javier Soler",dni:"1003",email:"javier@mail.com",wsp:"+593998877665",loc:"Cotacachi",tit:"Lic. Lenguas",inst:"ESPE",url:"https://drive.google.com/3",exp:"5",nivel:"Primaria",razon:"Crecimiento."},{nombre:"Lucía Paredes",dni:"1004",email:"lucia@mail.com",wsp:"+593995544332",loc:"Atuntaqui",tit:"Lic. Ciencias",inst:"UTN",url:"https://drive.google.com/4",exp:"4",nivel:"Bachillerato",razon:"Excelencia."},{nombre:"Martín Fierro",dni:"1005",email:"martin@mail.com",wsp:"+593994433221",loc:"Quito",tit:"Dr. Historia",inst:"PUCE",url:"https://drive.google.com/5",exp:"20",nivel:"Universitario",razon:"Investigación."},{nombre:"Elena Blanco",dni:"1006",email:"elena@mail.com",wsp:"+593993322110",loc:"Ibarra",tit:"Lic. Arte",inst:"Bellas Artes",url:"https://drive.google.com/6",exp:"3",nivel:"Preescolar",razon:"Creatividad."},{nombre:"Diego Rivera",dni:"1007",email:"diego@mail.com",wsp:"+593992211009",loc:"Otavalo",tit:"Lic. Diseño",inst:"UTN",url:"https://drive.google.com/7",exp:"9",nivel:"Arte",razon:"Innovación."},{nombre:"Sara Connor",dni:"1008",email:"sara.c@mail.com",wsp:"+593991100998",loc:"Ibarra",tit:"Ing. Sistemas",inst:"ESPE",url:"https://drive.google.com/8",exp:"15",nivel:"Tecnología",razon:"Tecnología."},{nombre:"Hugo Sánchez",dni:"1009",email:"hugo@mail.com",wsp:"+593990099887",loc:"Atuntaqui",tit:"Lic. Ed. Física",inst:"UTN",url:"https://drive.google.com/9",exp:"6",nivel:"Deportes",razon:"Salud."},{nombre:"Frida Kahlo",dni:"1010",email:"frida@mail.com",wsp:"+593999888777",loc:"Otavalo",tit:"Lic. Pintura",inst:"Bellas Artes",url:"https://drive.google.com/10",exp:"10",nivel:"Artes",razon:"Expresión."},{nombre:"César Vallejo",dni:"1011",email:"cesar@mail.com",wsp:"+593991112223",loc:"Quito",tit:"Lic. Letras",inst:"PUCE",url:"https://drive.google.com/11",exp:"18",nivel:"Bachillerato",razon:"Enseñanza."},{nombre:"Gabriela Mistral",dni:"1012",email:"gaby@mail.com",wsp:"+593992223334",loc:"Ibarra",tit:"Magíster",inst:"UTN",url:"https://drive.google.com/12",exp:"22",nivel:"Universitario",razon:"Inspiración."},{nombre:"Isaac Newton",dni:"1013",email:"isaac@mail.com",wsp:"+593993334445",loc:"Cotacachi",tit:"Lic. Física",inst:"ESPE",url:"https://drive.google.com/13",exp:"14",nivel:"Bachillerato",razon:"Ciencia."},{nombre:"Marie Curie",dni:"1014",email:"marie@mail.com",wsp:"+593994445556",loc:"Otavalo",tit:"Lic. Química",inst:"PUCE",url:"https://drive.google.com/14",exp:"19",nivel:"Universitario",razon:"Descubrimiento."},{nombre:"Pablo Picasso",dni:"1015",email:"pablo@mail.com",wsp:"+593995556667",loc:"Quito",tit:"Lic. Bellas Artes",inst:"Bellas Artes",url:"https://drive.google.com/15",exp:"30",nivel:"Arte",razon:"Evolución."},{nombre:"Ada Lovelace",dni:"1016",email:"ada@mail.com",wsp:"+593996667778",loc:"Ibarra",tit:"Ing. Software",inst:"ESPE",url:"https://drive.google.com/16",exp:"7",nivel:"Tecnología",razon:"Programación."},{nombre:"Simón Bolívar",dni:"1017",email:"simon@mail.com",wsp:"+593997778889",loc:"Atuntaqui",tit:"Lic. Historia",inst:"UTN",url:"https://drive.google.com/17",exp:"25",nivel:"Bachillerato",razon:"Liderazgo."},{nombre:"Juana de Arco",dni:"1018",email:"juana@mail.com",wsp:"+593998889990",loc:"Cotacachi",tit:"Lic. Filosofía",inst:"PUCE",url:"https://drive.google.com/18",exp:"5",nivel:"Primaria",razon:"Justicia."},{nombre:"Nikola Tesla",dni:"1019",email:"nikola@mail.com",wsp:"+593999990001",loc:"Ibarra",tit:"Ing. Eléctrico",inst:"ESPE",url:"https://drive.google.com/19",exp:"28",nivel:"Universitario",razon:"Energía."},{nombre:"Virginia Woolf",dni:"1020",email:"virginia@mail.com",wsp:"+593990001112",loc:"Otavalo",tit:"Lic. Redacción",inst:"UTN",url:"https://drive.google.com/20",exp:"11",nivel:"Bachillerato",razon:"Cultura."}];

    function llenarFormulario(p) {
        document.getElementById('nombreResponsable').value=p.nombre; document.getElementById('dniDocente').value=p.dni;
        document.getElementById('email').value=p.email; document.getElementById('whatsapp').value=p.wsp;
        document.getElementById('ubicacion').value=p.loc; document.getElementById('titulo_universitario').value=p.tit;
        document.getElementById('institucion_titulo').value=p.inst; document.getElementById('enlace_sintesis').value=p.url;
        document.getElementById('anos_experiencia_docente').value=p.exp; document.getElementById('niveles_atencion').value=p.nivel;
        document.getElementById('razon_deseo_pertenencia').value=p.razon;
        document.querySelectorAll('.cell').forEach(c => Math.random() > 0.8 ? c.classList.add('active') : c.classList.remove('active'));
    }

    document.addEventListener('keydown', (e) => {
        if(e.ctrlKey && e.key.toLowerCase()==='m') llenarFormulario(perfiles[Math.floor(Math.random()*perfiles.length)]);
        if(e.shiftKey && e.code.startsWith('Digit')) llenarFormulario(perfiles[parseInt(e.code.replace('Digit','')) % perfiles.length]);
    });

    let datosFinales = {};
    document.getElementById('formDocente').onsubmit = (e) => {
        e.preventDefault();
        const dias = ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'];
        const hSel = [], capsulas = [];
        document.querySelectorAll('.cell').forEach((c, i) => {
            if(c.classList.contains('active')) {
                hSel.push(i);
                capsulas.push(`<span class="capsula">${dias[i%7]} ${Math.floor(i/7)}:00</span>`);
            }
        });
        datosFinales = {
            nombreResponsable: document.getElementById('nombreResponsable').value,
            horarios: hSel, 
            entidad: ent || "General", // <--- Aquí se guarda la entidad correctamente
            fecha: new Date().toLocaleString(), 
            perfil: "Docente Academia"
        };
        document.getElementById('bodyModal').innerHTML = `<strong>Nombre:</strong> ${datosFinales.nombreResponsable}<br><br><strong>Horario Seleccionado:</strong><br>${capsulas.join('')}`;
        new bootstrap.Modal(document.getElementById('modalRevision')).show();
    };

    document.getElementById('btnFinal').onclick = () => {
        db.collection('postulaciones').add(datosFinales).then(() => {
            Swal.fire("Éxito!", "Enviado a Firestore", "success");
            bootstrap.Modal.getInstance(document.getElementById('modalRevision')).hide();
        });
    };
</script>
</body>
</html>
