<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Docente - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --verde-seleccion: #28a745; }
        body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0; }
        .card-form { border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); max-width: 950px; margin: auto; padding: 40px; }
        #logoAcademia { width: 120px; height: 120px; border-radius: 25px; object-fit: cover; border: 2px solid var(--dorado-ucmi); }
        .form-label { color: var(--dorado-ucmi); font-weight: bold; margin-top: 15px; display: block; }
        .form-control { background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; border-radius: 12px; padding: 12px; }
        .grid-container { width: 100%; margin-top: 15px; overflow-x: auto; }
        .grid-horaria { display: grid; grid-template-columns: 60px repeat(7, 1fr); gap: 2px; }
        .cell { background: rgba(255,255,255,0.1); height: 25px; cursor: pointer; border-radius: 2px; transition: 0.2s; }
        .cell.active { background: var(--verde-seleccion) !important; }
        .header-cell { font-weight: bold; text-align: center; font-size: 0.7rem; color: var(--dorado-ucmi); display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-form">
        <div class="text-center"><img id="logoAcademia" src="https://via.placeholder.com/120" alt="Logo"></div>
        <h2 class="text-center" style="color: var(--dorado-ucmi); font-family: 'Cinzel'; margin: 20px 0;">POSTULACIÓN DOCENTE</h2>
        
        <form id="formDocente">
            <div class="row">
                <div class="col-md-6"><label class="form-label">Nombre</label><input type="text" id="nombreResponsable" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">DNI</label><input type="text" id="dniDocente" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">WhatsApp</label><input type="text" id="whatsapp" class="form-control" required></div>
            </div>
            <label class="form-label">Disponibilidad Horaria:</label>
            <div class="grid-container"><div class="grid-horaria" id="gridHoraria"></div></div>
            <button type="submit" class="btn btn-enviar">ENVIAR POSTULACIÓN</button>
        </form>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Crear Grilla Limpia
    const grid = document.getElementById('gridHoraria');
    grid.appendChild(document.createElement('div')); // Esquina vacía
    ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'].forEach(d => {
        let el = document.createElement('div'); el.className = 'header-cell'; el.innerText = d; grid.appendChild(el);
    });

    for (let h = 0; h < 24; h++) {
        let hora = document.createElement('div'); hora.className = 'header-cell'; hora.innerText = h + ':00'; grid.appendChild(hora);
        for (let d = 0; d < 7; d++) {
            let cell = document.createElement('div'); cell.className = 'cell';
            cell.onclick = () => cell.classList.toggle('active');
            grid.appendChild(cell);
        }
    }

    document.getElementById('formDocente').onsubmit = (e) => {
        e.preventDefault();
        const todosLosCuadros = Array.from(document.querySelectorAll('.cell'));
        const horarios = todosLosCuadros
            .map((cell, index) => cell.classList.contains('active') ? index : null)
            .filter(index => index !== null);

        const datos = {
            nombre: document.getElementById('nombreResponsable').value,
            dni: document.getElementById('dniDocente').value,
            horarios: horarios,
            fecha: new Date().toISOString()
        };

        db.collection('postulaciones').add(datos)
            .then(() => {
                Swal.fire("¡Éxito!", "Enviado. ID de celda guardado correctamente.", "success");
                document.getElementById('formDocente').reset();
                document.querySelectorAll('.cell.active').forEach(c => c.classList.remove('active'));
            })
            .catch(err => Swal.fire("Error", err.message, "error"));
    };
</script>
</body>
</html>
