<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Docente - UCMI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --verde-seleccion: #28a745; }
        body {
            background: #121212;
            font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0;
        }
        .card-form { border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); max-width: 950px; margin: auto; padding: 40px; }
        .form-label { color: var(--dorado-ucmi); font-weight: bold; margin-top: 15px; display: block; }
        .form-control { background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; border-radius: 12px; padding: 12px; }
        .grid-container { width: 100%; margin-top: 15px; overflow-x: auto; }
        .grid-horaria { display: grid; grid-template-columns: 60px repeat(7, 1fr); gap: 3px; }
        .cell { background: rgba(255,255,255,0.1); height: 25px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .cell.active { background: var(--verde-seleccion) !important; }
        .header-cell { font-weight: bold; padding: 5px; text-align: center; font-size: 0.7rem; color: var(--dorado-ucmi); display: flex; align-items: center; justify-content: center; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-form">
        <h2 class="text-center" style="color: var(--dorado-ucmi); font-family: 'Cinzel'; margin-bottom: 30px;">POSTULACIÓN DOCENTE</h2>
        <form id="formDocente">
            <div class="row">
                <div class="col-md-6"><label class="form-label">Nombre</label><input type="text" id="nombreResponsable" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">DNI</label><input type="text" id="dniDocente" class="form-control" required></div>
            </div>
            <label class="form-label">Disponibilidad Horaria:</label>
            <div class="grid-container"><div class="grid-horaria" id="gridHoraria"></div></div>
            <button type="submit" class="btn btn-enviar">ENVIAR POSTULACIÓN</button>
        </form>
    </div>
</div>

<div class="modal fade" id="modalRevision" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-white">
            <div class="modal-body" id="bodyModal"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Editar</button>
                <button class="btn btn-success" id="btnConfirmar">Confirmar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Inicialización Firebase omitida por brevedad, asegúrate de mantener la tuya
    const grid = document.getElementById('gridHoraria');
    grid.innerHTML = '<div></div>';
    ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'].forEach(d => grid.innerHTML += `<div class="header-cell">${d}</div>`);
    for (let h = 0; h < 24; h++) {
        grid.innerHTML += `<div class="header-cell">${h}:00</div>`;
        for (let d = 0; d < 7; d++) grid.innerHTML += `<div class="cell" onclick="this.classList.toggle('active')"></div>`;
    }

    document.getElementById('formDocente').onsubmit = (e) => {
        e.preventDefault();
        const activos = [];
        document.querySelectorAll('.cell.active').forEach((cell, index) => activos.push(index));
        
        if (activos.length === 0) return Swal.fire("Error", "Selecciona al menos una hora", "error");

        const filas = activos.map(i => Math.floor(i / 7));
        const minH = Math.min(...filas), maxH = Math.max(...filas);

        let gridHtml = `<div style="display:grid; grid-template-columns: 40px repeat(7, 1fr); gap: 2px;">
            <div style="color:#c5a059;">H</div>${['L','M','M','J','V','S','D'].map(d => `<div style="text-align:center; color:#c5a059;">${d}</div>`).join('')}`;

        for (let h = minH; h <= maxH; h++) {
            gridHtml += `<div style="color:white; font-size:10px;">${h}:00</div>`;
            for (let d = 0; d < 7; d++) {
                gridHtml += `<div style="height:15px; background:${activos.includes(h*7+d) ? '#28a745' : '#444'};"></div>`;
            }
        }
        gridHtml += `</div>`;

        document.getElementById('bodyModal').innerHTML = `<h5>Resumen</h5><p>Tu disponibilidad:</p>${gridHtml}`;
        new bootstrap.Modal(document.getElementById('modalRevision')).show();
    };
</script>
</body>
</html>
