<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Postulación Docente - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --verde-seleccion: #28a745; }
        body { background: #1a1a1a; color: white; padding: 40px; font-family: sans-serif; }
        .card-form { background: #2d2d2d; padding: 30px; border-radius: 20px; max-width: 800px; margin: auto; }
        .grid-horaria { display: grid; grid-template-columns: 50px repeat(7, 1fr); gap: 2px; }
        .cell { background: #444; height: 20px; cursor: pointer; }
        .cell.active { background: var(--verde-seleccion); }
        .header-cell { font-size: 0.7rem; color: var(--dorado-ucmi); text-align: center; }
        .modal-grid-recortada { display: grid; grid-template-columns: 40px repeat(7, 1fr); gap: 2px; }
        .m-cell { height: 18px; background: #555; }
        .m-cell.active { background: var(--verde-seleccion); }
    </style>
</head>
<body>

<div class="card-form">
    <h3 style="color: var(--dorado-ucmi);">Postulación Docente</h3>
    <form id="formDocente">
        <input type="text" id="nombreResponsable" class="form-control mb-2" placeholder="Nombre del Postulante" required>
        <div class="grid-horaria" id="gridHoraria"></div>
        <button type="submit" class="btn btn-warning mt-3 w-100">Revisar Disponibilidad</button>
    </form>
</div>

<div class="modal fade" id="modalRevision" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content bg-dark"><div class="modal-body" id="bodyModal"></div></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const perfiles = [
        {nombre:"Roberto Gómez", dni:"1001"}, {nombre:"Sara Pardo", dni:"1002"}, {nombre:"Javier Soler", dni:"1003"},
        {nombre:"Lucía Paredes", dni:"1004"}, {nombre:"Martín Fierro", dni:"1005"}, {nombre:"Elena Blanco", dni:"1006"},
        {nombre:"Diego Rivera", dni:"1007"}, {nombre:"Sara Connor", dni:"1008"}, {nombre:"Hugo Sánchez", dni:"1009"},
        {nombre:"Frida Kahlo", dni:"1010"}, {nombre:"César Vallejo", dni:"1011"}, {nombre:"Gabriela Mistral", dni:"1012"},
        {nombre:"Isaac Newton", dni:"1013"}, {nombre:"Marie Curie", dni:"1014"}, {nombre:"Pablo Picasso", dni:"1015"},
        {nombre:"Ada Lovelace", dni:"1016"}, {nombre:"Simón Bolívar", dni:"1017"}, {nombre:"Juana de Arco", dni:"1018"},
        {nombre:"Nikola Tesla", dni:"1019"}, {nombre:"Virginia Woolf", dni:"1020"}
    ];

    const grid = document.getElementById('gridHoraria');
    ['','Lun','Mar','Mie','Jue','Vie','Sab','Dom'].forEach(d => grid.innerHTML += `<div class="header-cell">${d}</div>`);
    for (let h = 0; h < 24; h++) {
        grid.innerHTML += `<div class="header-cell">${h}:00</div>`;
        for (let d = 0; d < 7; d++) grid.innerHTML += `<div class="cell" onclick="this.classList.toggle('active')"></div>`;
    }

    // Lógica de llenado de perfiles
    function cargarPerfil(p) {
        document.getElementById('nombreResponsable').value = p.nombre;
        document.querySelectorAll('.cell').forEach(c => Math.random() > 0.8 ? c.classList.add('active') : c.classList.remove('active'));
    }

    document.addEventListener('keydown', (e) => {
        if(e.ctrlKey && e.key === 'm') cargarPerfil(perfiles[Math.floor(Math.random()*20)]);
        if(e.shiftKey && e.code.startsWith('Digit')) cargarPerfil(perfiles[parseInt(e.code.replace('Digit','')) % 20]);
    });

    document.getElementById('formDocente').onsubmit = (e) => {
        e.preventDefault();
        const cells = document.querySelectorAll('.cell');
        let minF = 24, maxF = 0;
        cells.forEach((c, i) => { if(c.classList.contains('active')) { let f = Math.floor(i/7); if(f < minF) minF = f; if(f > maxF) maxF = f; }});

        let html = `<p>Postulante: ${document.getElementById('nombreResponsable').value}</p><div class="modal-grid-recortada">`;
        for(let h = minF; h <= maxF; h++) {
            html += `<div class="header-cell">${h}:00</div>`;
            for(let d = 0; d < 7; d++) html += `<div class="m-cell ${cells[(h*7)+d].classList.contains('active') ? 'active' : ''}"></div>`;
        }
        html += '</div>';
        document.getElementById('bodyModal').innerHTML = html;
        new bootstrap.Modal(document.getElementById('modalRevision')).show();
    };
</script>
</body>
</html>
