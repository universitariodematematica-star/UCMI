<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Docente - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --dorado-ucmi: #c5a059; --azul-profundo: #06090f; }
        body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0; }
        .card-form { border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); max-width: 800px; margin: auto; overflow: hidden; }
        .form-control, .form-select { border-radius: 12px; padding: 12px; background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; }
        .form-label { color: var(--dorado-ucmi); font-weight: bold; margin-top: 15px; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; }
        /* Grilla Horaria */
        .grid-horaria { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin-top: 10px; font-size: 0.7rem; }
        .cell { border: 1px solid rgba(197,160,89,0.3); padding: 5px; text-align: center; cursor: pointer; border-radius: 4px; }
        .cell.active { background: var(--dorado-ucmi); color: black; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-form p-4 p-md-5">
        <h2 class="text-center" style="color: var(--dorado-ucmi);">POSTULACIÓN DOCENTE</h2>
        <form id="formDocente">
            <input type="text" id="nombreResponsable" class="form-control" placeholder="Nombre Completo" required>
            <div class="row">
                <div class="col-md-6"><input type="text" id="dniDocente" class="form-control mt-3" placeholder="DNI" required></div>
                <div class="col-md-6"><input type="email" id="email" class="form-control mt-3" placeholder="Email" required></div>
            </div>
            <div class="row">
                <div class="col-md-6"><input type="text" id="whatsapp" class="form-control mt-3" placeholder="WhatsApp" required></div>
                <div class="col-md-6"><input type="text" id="ubicacion" class="form-control mt-3" placeholder="Ubicación" required></div>
            </div>

            <input type="text" id="titulo_universitario" class="form-control mt-3" placeholder="Título Universitario" required>
            <input type="text" id="institucion_titulo" class="form-control mt-3" placeholder="Institución de egreso" required>
            <input type="url" id="enlace_sintesis" class="form-control mt-3" placeholder="Link a Síntesis Curricular (Drive/PDF)" required>

            <label class="form-label">Años de Experiencia:</label>
            <input type="number" id="anos_experiencia_docente" class="form-control" min="0" required>
            
            <label class="form-label">Niveles de Atención:</label>
            <input type="text" id="niveles_atencion" class="form-control" placeholder="Ej: Primaria, Bachillerato..." required>

            <label class="form-label">Disponibilidad Horaria (Click en cuadros):</label>
            <div class="grid-horaria" id="gridHoraria">
                </div>

            <label class="form-label">¿Por qué quiere formar parte de UCMI?</label>
            <textarea id="razon_deseo_pertenencia" class="form-control" rows="3" required></textarea>

            <button type="submit" class="btn btn-enviar">ENVIAR POSTULACIÓN</button>
        </form>
    </div>
</div>

<script type="module">
    // Lógica de la Grilla Horaria
    const grid = document.getElementById('gridHoraria');
    const dias = ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'];
    // Cabecera
    grid.innerHTML += `<div class="cell" style="border:none"></div>` + dias.map(d => `<div class="cell" style="border:none"><b>${d}</b></div>`).join('');
    // Bloques
    ['Mañana', 'Tarde', 'Noche'].forEach(turno => {
        grid.innerHTML += `<div class="cell" style="border:none"><b>${turno}</b></div>`;
        for(let i=0; i<7; i++) grid.innerHTML += `<div class="cell" onclick="this.classList.toggle('active')" data-turno="${turno}" data-dia="${i}"></div>`;
    });

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // (Aquí iría tu configuración de Firebase)

    document.getElementById('formDocente').onsubmit = async (e) => {
        e.preventDefault();
        const seleccionados = Array.from(document.querySelectorAll('.cell.active')).map(el => ({turno: el.dataset.turno, dia: el.dataset.dia}));
        
        const data = {
            nombreResponsable: document.getElementById('nombreResponsable').value,
            dniDocente: document.getElementById('dniDocente').value,
            email: document.getElementById('email').value,
            whatsapp: document.getElementById('whatsapp').value,
            ubicacion: document.getElementById('ubicacion').value,
            titulo_universitario: document.getElementById('titulo_universitario').value,
            institucion_titulo: document.getElementById('institucion_titulo').value,
            enlace_sintesis: document.getElementById('enlace_sintesis').value,
            anos_experiencia_docente: document.getElementById('anos_experiencia_docente').value,
            niveles_atencion: document.getElementById('niveles_atencion').value,
            disponibilidad_horaria: seleccionados,
            razon_deseo_pertenencia: document.getElementById('razon_deseo_pertenencia').value,
            tipo: "docente",
            status: "pendiente"
        };
        
        console.log("Datos a enviar:", data);
        Swal.fire("Enviado", "Tu postulación ha sido recibida.", "success");
    };
</script>
</body>
</html>
