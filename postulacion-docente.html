<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <title>Postulación Docente - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --verde-seleccion: #28a745; }
        body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0; }
        .card-form { border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); max-width: 950px; margin: auto; padding: 40px; }
        .form-label { color: var(--dorado-ucmi); font-weight: bold; margin-top: 15px; }
        .form-control { background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; border-radius: 12px; padding: 10px; }
        .grid-horaria { display: grid; grid-template-columns: 60px repeat(7, 1fr); gap: 3px; margin-top: 20px; }
        .cell { background: rgba(255,255,255,0.1); height: 25px; cursor: pointer; border-radius: 4px; }
        .cell.active { background: var(--verde-seleccion) !important; }
        .header-cell { font-weight: bold; text-align: center; color: var(--dorado-ucmi); font-size: 0.7rem; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; border-radius: 15px; width: 100%; margin-top: 30px; border: none; padding: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card-form">
        <div class="text-center">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhf12345/s200/LogoUCMI.png" id="logoInst" style="width:100px; border-radius:50%; margin-bottom:15px;">
            <h2 id="nombreInst" style="color: var(--dorado-ucmi); font-family: 'Cinzel';">UCMI - INSTITUCIÓN</h2>
        </div>
        <form id="formDocente">
            <div class="row">
                <div class="col-md-6"><label class="form-label">Nombre Completo</label><input type="text" id="nombreResponsable" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">DNI</label><input type="text" id="dniDocente" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">WhatsApp</label><input type="text" id="whatsapp" class="form-control" required></div>
                <div class="col-12"><label class="form-label">Ubicación</label><input type="text" id="ubicacion" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Título Universitario</label><input type="text" id="titulo" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Años de experiencia</label><input type="number" id="experiencia" class="form-control" required></div>
                <div class="col-12"><label class="form-label">Razón de pertenencia</label><textarea id="razon" class="form-control" rows="2" required></textarea></div>
            </div>
            <label class="form-label">Disponibilidad Horaria:</label>
            <div class="grid-horaria" id="gridHoraria"></div>
            <button type="submit" class="btn btn-enviar">REVISAR Y GENERAR PDF</button>
        </form>
    </div>
</div>

<div class="modal fade" id="modalRevision" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content bg-dark text-white"><div class="modal-body" id="bodyModal"></div><div class="modal-footer"><button class="btn btn-success" id="btnConfirmar">CONFIRMAR Y DESCARGAR PDF</button></div></div></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const perfiles = Array.from({length: 20}, (_, i) => ({
        nombre: `Docente ${i+1}`, dni: `V-00${i}`, email: `doc${i}@ucmi.edu`, wsp: "04120000000", loc: "Caracas", tit: "Licenciado", exp: "5", razon: "Deseo enseñar"
    }));

    const llenarForm = (p) => {
        document.getElementById('nombreResponsable').value = p.nombre; document.getElementById('dniDocente').value = p.dni;
        document.getElementById('email').value = p.email; document.getElementById('whatsapp').value = p.wsp;
        document.getElementById('ubicacion').value = p.loc; document.getElementById('titulo').value = p.tit;
        document.getElementById('experiencia').value = p.exp; document.getElementById('razon').value = p.razon;
        document.querySelectorAll('.cell').forEach(c => Math.random() > 0.8 ? c.classList.add('active') : c.classList.remove('active'));
    };

    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'm') llenarForm(perfiles[Math.floor(Math.random()*20)]);
    });

    const grid = document.getElementById('gridHoraria');
    ['','Lun','Mar','Mie','Jue','Vie','Sab','Dom'].forEach(d => grid.innerHTML += `<div class="header-cell">${d}</div>`);
    for (let h = 0; h < 24; h++) {
        grid.innerHTML += `<div class="header-cell">${h}:00</div>`;
        for (let d = 0; d < 7; d++) grid.innerHTML += `<div class="cell" onclick="this.classList.toggle('active')"></div>`;
    }

    let datosFinales = {};
    document.getElementById('formDocente').onsubmit = (e) => {
        e.preventDefault();
        const dias = ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'];
        const agenda = { Lun: [], Mar: [], Mie: [], Jue: [], Vie: [], Sab: [], Dom: [] };
        document.querySelectorAll('.cell').forEach((c, i) => { if(c.classList.contains('active')) agenda[dias[i%7]].push(`${Math.floor(i/7)}:00`); });
        datosFinales = {
            nombre: document.getElementById('nombreResponsable').value, dni: document.getElementById('dniDocente').value,
            email: document.getElementById('email').value, whatsapp: document.getElementById('whatsapp').value,
            ubicacion: document.getElementById('ubicacion').value, titulo: document.getElementById('titulo').value,
            exp: document.getElementById('experiencia').value, razon: document.getElementById('razon').value, agenda: agenda
        };
        document.getElementById('bodyModal').innerHTML = `<h5>${datosFinales.nombre}</h5><p>DNI: ${datosFinales.dni}</p><hr><h6>Agenda seleccionada correctamente.</h6>`;
        new bootstrap.Modal(document.getElementById('modalRevision')).show();
    };

    document.getElementById('btnConfirmar').onclick = async () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18); doc.text("POSTULACIÓN DOCENTE", 20, 20);
        doc.setFontSize(12);
        let y = 40;
        Object.entries(datosFinales).forEach(([k, v]) => { if(k !== 'agenda') { doc.text(`${k.toUpperCase()}: ${v}`, 20, y); y+=10; } });
        y += 10; doc.text("DISPONIBILIDAD:", 20, y); y += 10;
        Object.entries(datosFinales.agenda).forEach(([d, h]) => { if(h.length > 0) { doc.text(`${d}: ${h.join(', ')}`, 20, y); y+=10; } });
        doc.save(`Postulacion_${datosFinales.nombre}.pdf`);
        await db.collection('postulaciones').add(datosFinales);
        Swal.fire("Éxito", "Postulación guardada y PDF descargado", "success").then(() => location.reload());
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
