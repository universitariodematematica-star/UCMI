<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Docente - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --azul-profundo: #06090f; }
        body { background: #06090f; color: white; padding: 40px 0; font-family: 'Segoe UI', sans-serif; }
        .card-form { border: 1px solid rgba(197,160,89,0.3); border-radius: 20px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); max-width: 900px; margin: auto; padding: 40px; }
        .form-label { color: var(--dorado-ucmi); font-weight: bold; margin-top: 15px; display: block; }
        .form-control { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 10px; }
        
        /* Nueva Grilla Horaria */
        .grid-container { overflow-x: auto; margin-top: 15px; }
        .grid-horaria { display: grid; grid-template-columns: 80px repeat(7, 1fr); gap: 2px; }
        .cell { background: rgba(255,255,255,0.1); padding: 5px; text-align: center; font-size: 0.65rem; cursor: pointer; border: 1px solid rgba(0,0,0,0.2); }
        .cell.active { background: var(--dorado-ucmi); color: black; }
        .header-cell { background: rgba(197,160,89,0.2); font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-form">
        <h2 class="text-center" style="color: var(--dorado-ucmi); font-family: 'Cinzel';">FORMULARIO DE POSTULACIÓN DOCENTE</h2>
        <form id="formDocente">
            <div class="row">
                <div class="col-md-6"><label class="form-label">Nombre Completo</label><input type="text" id="nombreResponsable" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">DNI</label><input type="text" id="dniDocente" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">WhatsApp</label><input type="text" id="whatsapp" class="form-control" required></div>
                <div class="col-12"><label class="form-label">Ubicación</label><input type="text" id="ubicacion" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Título Universitario</label><input type="text" id="titulo_universitario" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Institución de Egreso</label><input type="text" id="institucion_titulo" class="form-control" required></div>
            </div>

            <label class="form-label">Enlace a Síntesis Curricular (Drive/PDF)</label>
            <input type="url" id="enlace_sintesis" class="form-control" required>

            <label class="form-label">Años de experiencia</label>
            <input type="number" id="anos_experiencia_docente" class="form-control" required>

            <label class="form-label">Niveles que puede atender</label>
            <input type="text" id="niveles_atencion" class="form-control" placeholder="Ej: Primaria, Bachillerato" required>

            <label class="form-label">Disponibilidad Horaria (Selecciona los bloques):</label>
            <div class="grid-container">
                <div class="grid-horaria" id="gridHoraria">
                    <div class="header-cell">Hora</div>
                    <div class="header-cell">Lun</div><div class="header-cell">Mar</div><div class="header-cell">Mie</div>
                    <div class="header-cell">Jue</div><div class="header-cell">Vie</div><div class="header-cell">Sab</div><div class="header-cell">Dom</div>
                </div>
            </div>

            <label class="form-label">¿Por qué quiere formar parte de nuestra institución?</label
            <textarea id="razon_deseo_pertenencia" class="form-control" rows="3" required></textarea>

            <button type="submit" class="btn btn-primary w-100 mt-4" style="background: var(--dorado-ucmi); border:none; padding:15px; font-weight:bold;">ENVIAR POSTULACIÓN</button>
        </form>
    </div>
</div>

<script>
    // Generar la grilla de 24 horas
    const grid = document.getElementById('gridHoraria');
    for (let h = 0; h < 24; h++) {
        const horaLabel = `${h}:00 - ${h+1}:00`;
        grid.innerHTML += `<div class="header-cell">${horaLabel}</div>`;
        for (let d = 0; d < 7; d++) {
            grid.innerHTML += `<div class="cell" onclick="this.classList.toggle('active')" data-hora="${horaLabel}" data-dia="${d}"></div>`;
        }
    }

    document.getElementById('formDocente').onsubmit = (e) => {
        e.preventDefault();
        const seleccionados = Array.from(document.querySelectorAll('.cell.active')).map(el => ({hora: el.dataset.hora, dia: el.dataset.dia}));
        
        if(seleccionados.length === 0) {
            Swal.fire("Atención", "Por favor, selecciona al menos un bloque horario.", "warning");
            return;
        }
        
        console.log("Datos capturados:", { /* aquí irían los valores de los inputs */ seleccionados });
        Swal.fire("¡Éxito!", "Postulación enviada correctamente.", "success");
    };
</script>
</body>
</html>
