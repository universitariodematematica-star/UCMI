<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Docente - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --verde-seleccion: #28a745; }
        body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0; }
        .card-form { border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); max-width: 950px; margin: auto; padding: 40px; }
        .logo-container { text-align: center; margin-bottom: 25px; }
        #logoAcademia { width: 120px; height: 120px; border-radius: 25px; object-fit: cover; border: 2px solid var(--dorado-ucmi); }
        .form-label { color: var(--dorado-ucmi); font-weight: bold; margin-top: 15px; display: block; }
        .form-control { background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; border-radius: 12px; padding: 12px; }
        .grid-container { width: 100%; margin-top: 15px; }
        .grid-horaria { display: grid; grid-template-columns: 60px repeat(7, 1fr); gap: 3px; }
        .cell { background: rgba(255,255,255,0.1); height: 25px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .cell.active { background: var(--verde-seleccion) !important; }
        .header-cell { font-weight: bold; padding: 5px; text-align: center; font-size: 0.7rem; color: var(--dorado-ucmi); display: flex; align-items: center; justify-content: center; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; }
        .capsula { display: inline-block; background: var(--dorado-ucmi); color: #000; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; margin: 3px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-form">
        <div class="logo-container"><img id="logoAcademia" src="https://via.placeholder.com/120" alt="Logo"></div>
        <h2 class="text-center" style="color: var(--dorado-ucmi); font-family: 'Cinzel'; margin-bottom: 30px;">POSTULACIÓN DOCENTE</h2>
        
        <form id="formDocente">
            <div class="row">
                <div class="col-md-6"><label class="form-label">Nombre Completo</label><input type="text" id="nombreResponsable" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">DNI</label><input type="text" id="dniDocente" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">WhatsApp</label><input type="text" id="whatsapp" class="form-control" required></div>
                <div class="col-12"><label class="form-label">Ubicación</label><input type="text" id="ubicacion" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Título Universitario</label><input type="text" id="titulo_universitario" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Institución de Egreso</label><input type="text" id="institucion_titulo" class="form-control" required></div>
            </div>
            <label class="form-label">Enlace a Síntesis Curricular</label>
            <input type="url" id="enlace_sintesis" class="form-control" required>
            <div class="row">
                <div class="col-md-6"><label class="form-label">Años de experiencia</label><input type="number" id="anos_experiencia_docente" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Niveles que puede atender</label><input type="text" id="niveles_atencion" class="form-control" required></div>
            </div>
            <label class="form-label">Disponibilidad Horaria:</label>
            <div class="grid-container"><div class="grid-horaria" id="gridHoraria"></div></div>
            <label class="form-label">¿Por qué quiere formar parte de nuestra institución?</label>
            <textarea id="razon_deseo_pertenencia" class="form-control" rows="3" required></textarea>
            <button type="submit" class="btn btn-enviar">REVISAR Y ENVIAR</button>
        </form>
    </div>
</div>

<div class="modal fade" id="modalRevision" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-white border-warning">
            <div class="modal-header"><h5 class="modal-title">Confirmar Postulación</h5></div>
            <div class="modal-body" id="bodyModal"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Corregir</button>
                <button type="button" class="btn btn-success" id="btnFinal">Confirmar Registro</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const urlParams = new URLSearchParams(window.location.search);
    const refEntidad = urlParams.get('ref');

    if (refEntidad) {
        db.collection("usuarios").where("entidad", "==", refEntidad).get().then(s => s.forEach(d => { if(d.data().logoCustom) document.getElementById('logoAcademia').src = d.data().logoCustom; }));
    }

    const grid = document.getElementById('gridHoraria');
    ['','Lun','Mar','Mie','Jue','Vie','Sab','Dom'].forEach(d => grid.innerHTML += `<div class="header-cell">${d}</div>`);
    for (let h = 0; h < 24; h++) {
        grid.innerHTML += `<div class="header-cell">${h}:00</div>`;
        for (let d = 0; d < 7; d++) grid.innerHTML += `<div class="cell" onclick="this.classList.toggle('active')"></div>`;
    }

    const perfiles = [
        { nombre: "Roberto Gómez", dni: "1001", email: "roberto@mail.com", wsp: "+593991234567", loc: "Otavalo", tit: "Lic. en Educación", inst: "PUCE", url: "https://drive.google.com/1", exp: "8", nivel: "Primaria", razon: "Por vocación." },
        { nombre: "Sara Pardo", dni: "1002", email: "sara@mail.com", wsp: "+593987654321", loc: "Ibarra", tit: "Magíster en Pedagogía", inst: "UTE", url: "https://drive.google.com/2", exp: "12", nivel: "Bachillerato", razon: "Por prestigio." },
        { nombre: "Javier Soler", dni: "1003", email: "javier@mail.com", wsp: "+593998877665", loc: "Cotacachi", tit: "Lic. en Lenguas", inst: "ESPE", url: "https://drive.google.com/3", exp: "5", nivel: "Primaria", razon: "Crecimiento." },
        { nombre: "Lucía Paredes", dni: "1004", email: "lucia@mail.com", wsp: "+593995544332", loc: "Atuntaqui", tit: "Lic. en Ciencias", inst: "UTN", url: "https://drive.google.com/4", exp: "4", nivel: "Bachillerato", razon: "Excelencia." }
    ];

    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key.toLowerCase() === 'm') { e.preventDefault(); llenarFormulario(perfiles[Math.floor(Math.random() * perfiles.length)]); }
        if (e.shiftKey && e.code.startsWith('Digit')) { e.preventDefault(); const num = parseInt(e.code.replace('Digit', '')) % perfiles.length; llenarFormulario(perfiles[num]); }
    });

    function llenarFormulario(p) {
        document.getElementById('nombreResponsable').value = p.nombre; document.getElementById('dniDocente').value = p.dni;
        document.getElementById('email').value = p.email; document.getElementById('whatsapp').value = p.wsp;
        document.getElementById('ubicacion').value = p.loc; document.getElementById('titulo_universitario').value = p.tit;
        document.getElementById('institucion_titulo').value = p.inst; document.getElementById('enlace_sintesis').value = p.url;
        document.getElementById('anos_experiencia_docente').value = p.exp; document.getElementById('niveles_atencion').value = p.nivel;
        document.getElementById('razon_deseo_pertenencia').value = p.razon;
        document.querySelectorAll('.cell').forEach(c => Math.random() > 0.8 ? c.classList.add('active') : c.classList.remove('active'));
    }

    let datosForm = {};
    document.getElementById('formDocente').onsubmit = (e) => {
        e.preventDefault();
        const dias = ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'];
        const hSel = [], hCapsulas = [];
        document.querySelectorAll('.cell').forEach((cell, i) => {
            if (cell.classList.contains('active')) {
                hSel.push(i);
                hCapsulas.push(`<span class="capsula">${dias[i % 7]} ${Math.floor(i / 7)}:00</span>`);
            }
        });

        datosForm = {
            nombreResponsable: document.getElementById('nombreResponsable').value,
            dniDocente: document.getElementById('dniDocente').value,
            email: document.getElementById('email').value,
            whatsapp: document.getElementById('whatsapp').value,
            ubicacion: document.getElementById('ubicacion').value,
            titulo: document.getElementById('titulo_universitario').value,
            institucion_titulo: document.getElementById('institucion_titulo').value,
            enlaceSintesis: document.getElementById('enlace_sintesis').value,
            experienciaDocente: document.getElementById('anos_experiencia_docente').value,
            niveles_atencion: document.getElementById('niveles_atencion').value,
            razon_deseo_pertenencia: document.getElementById('razon_deseo_pertenencia').value,
            horarios: hSel,
            fecha: new Date().toLocaleString(),
            perfil: "Docente Academia",
            entidadReferencia: refEntidad || "General"
        };

        document.getElementById('bodyModal').innerHTML = `<strong>Nombre:</strong> ${datosForm.nombreResponsable}<br><strong>DNI:</strong> ${datosForm.dniDocente}<br><br><strong>Horarios:</strong><br>${hCapsulas.join('')}`;
        new bootstrap.Modal(document.getElementById('modalRevision')).show();
    };

    document.getElementById('btnFinal').onclick = () => {
        db.collection('postulaciones').add(datosForm).then(() => {
            Swal.fire("¡Éxito!", "Postulación registrada.", "success");
            document.getElementById('formDocente').reset();
            document.querySelectorAll('.cell.active').forEach(c => c.classList.remove('active'));
            bootstrap.Modal.getInstance(document.getElementById('modalRevision')).hide();
        });
    };
</script>
</body>
</html>
