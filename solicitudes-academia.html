<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Academia</title>
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css"> <!-- Tu CSS base -->
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(197, 160, 89, 0.3);
            --indigo-ucmi: #4b0082;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f1a);
            color: #fff;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        /* Lógica de Logos */
        #logo-ucmi { display: block; }
        #logo-academia { display: none; max-height: 60px; border-radius: 8px; }
        
        .brand-active #logo-ucmi { display: none; }
        .brand-active #logo-academia { display: block; }

        .status-badge {
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 50px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Dashboard Header -->
        <header class="d-flex justify-content-between align-items-center p-4 mb-4 glass-card mx-3 mt-3" id="main-header">
            <div class="brand-container">
                <!-- Logo UCMI (Por defecto) -->
                <img src="img/logo-ucmi.png" id="logo-ucmi" alt="UCMI" width="120">
                <!-- Logo Academia (Se activa con JS) -->
                <div id="logo-academia" class="d-flex align-items-center">
                    <img src="" id="img-academia-src" alt="Logo Academia" class="me-2">
                    <h4 class="mb-0 text-gradient-gold" id="nombre-academia-text">Nombre Academia</h4>
                </div>
            </div>
            
            <div class="user-info d-flex align-items-center">
                <span class="me-3 d-none d-md-inline">Panel de Administración</span>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm rounded-pill">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="col-12 px-4">
            <div class="glass-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3><i class="bi bi-mortarboard me-2"></i> Solicitudes de Sede</h3>
                    <div class="search-box">
                        <input type="text" class="form-control bg-dark text-white border-secondary rounded-pill" placeholder="Buscar academia...">
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover text-white align-middle">
                        <thead class="text-muted small text-uppercase">
                            <tr>
                                <th>Academia</th>
                                <th>Representante</th>
                                <th>Ubicación</th>
                                <th>Fecha</th>
                                <th>Estado</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-solicitudes">
                            <!-- Ejemplo de fila cargada -->
                            <tr onclick="mostrarDetalleAcademia('Academia Alpha', 'img/demo-logo.png')">
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="p-2 bg-indigo-ucmi rounded me-2"><i class="bi bi-building"></i></div>
                                        <span>Academia Alpha</span>
                                    </div>
                                </td>
                                <td>Juan Pérez</td>
                                <td>Quito, EC</td>
                                <td>01/05/2026</td>
                                <td><span class="status-badge bg-warning text-dark">Pendiente</span></td>
                                <td><button class="btn btn-sm btn-light rounded-circle"><i class="bi bi-eye"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Scripts -->
<script>
    /**
     * Lógica para alternar logos
     * @param {string} nombre - Nombre de la academia
     * @param {string} logoUrl - URL del logo de la academia
     */
    function mostrarDetalleAcademia(nombre, logoUrl) {
        const header = document.getElementById('main-header');
        const imgAcademia = document.getElementById('img-academia-src');
        const txtAcademia = document.getElementById('nombre-academia-text');

        if (logoUrl) {
            imgAcademia.src = logoUrl;
            txtAcademia.innerText = nombre;
            header.classList.add('brand-active'); // Oculta UCMI, muestra Academia
        } else {
            header.classList.remove('brand-active'); // Vuelve a logo UCMI
        }
    }

    // Ejemplo: Al cargar, si ya vienes de una academia específica:
    // mostrarDetalleAcademia('Academia de Matemáticas', 'https://via.placeholder.com/50');
</script>

</body>
</html>
