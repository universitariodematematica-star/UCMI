<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app); // Esta es para tu sesión de administrador
      
      // Nueva instancia secundaria solo para crear usuarios nuevos
      const appSecundaria = initializeApp(firebaseConfig, "creador");
      const authCreacion = getAuth(appSecundaria);
    
    let currentId = null;
    let currentData = null;
    let logoAcademiaGlobal = "";
    let academiaNombreGlobal = "";
    let cuposMaximosGlobal = 0;
    let registrosLocales = [];

    const selectorFiltro = document.getElementById('filtroPerfil');

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }

        const userDoc = await getDoc(doc(db, "usuarios", user.email));
        if (userDoc.exists()) {
            const data = userDoc.data();
            
            // VALIDACIÓN: Si no tiene entidad o no tiene cupos configurados, no cargamos nada
            if (!data.entidad) {
                console.error("Usuario sin entidad asociada");
                return; 
            }

            logoAcademiaGlobal = data.logoCustom || data.logo || "https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png";
            document.getElementById('logoAcademiaPrincipal').src = logoAcademiaGlobal;
            document.getElementById('logoAcademiaPrincipal').style.opacity = "1";
            
            academiaNombreGlobal = data.entidad;
            cuposMaximosGlobal = data.cupos || 0; // Si es 0, al menos ya sabemos que es el valor real
            
            document.getElementById('nombreAcademiaSidebar').innerText = academiaNombreGlobal.toUpperCase();
            actualizarMarcadorCupos();
            iniciarEscuchaFiltrada(academiaNombreGlobal);
        } else {
            // Si el usuario existe en Auth pero no en Firestore, no es un usuario válido del sistema
            window.location.href = "index.html";
        }
    });

    async function actualizarMarcadorCupos() {
        if (!academiaNombreGlobal) return;
        const qEstudiantes = query(collection(db, "usuarios"), where("entidad", "==", academiaNombreGlobal), where("rol", "==", "estudiante"));
        const snap = await getDocs(qEstudiantes);
        document.getElementById('marcadorCupos').innerText = `Cupos: ${snap.size} / ${cuposMaximosGlobal}`;
    }

    function iniciarEscuchaFiltrada(academiaNombre) {
        const q = query(collection(db, "postulaciones"), where("entidad", "==", academiaNombre));
        onSnapshot(q, (snap) => {
            registrosLocales = snap.docs;
            renderizarTabla();
        });
    }

    function renderizarTabla() {
        const lista = document.getElementById('listaMaestra');
        if (!lista) return;
        const filtro = selectorFiltro.value; 
        lista.innerHTML = "";
        registrosLocales.forEach(docSnap => {
            const d = docSnap.data();
            const id = docSnap.id;
            const esEstudiante = d.perfil === "Estudiante Academia";
            const esDocente = d.perfil === "Docente Academia";
            if (filtro === "estudiante" && !esEstudiante) return;
            if (filtro === "docente" && !esDocente) return;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><div class="fw-bold">${d.nombreResponsable || d.nombre || 'Sin nombre'}</div><div class="small text-muted">${d.email}</div></td><td><span class="badge ${esDocente ? 'bg-categoria-docente' : 'bg-categoria-estudiante'}">${d.perfil}</span></td><td><i class="bi bi-geo-alt me-1"></i>${d.ubicacion || 'No definida'}</td><td class="text-center"><button class="btn btn-dark btn-sm" onclick="verExpediente('${id}')"><i class="bi bi-eye"></i> Detalles</button></td>`;
            lista.appendChild(tr);
        });
    }

    window.verExpediente = async (id) => {
        currentId = id;
        const snap = await getDoc(doc(db, "postulaciones", id));
        if (!snap.exists()) return;
        currentData = snap.data();
        const d = currentData;
        const esDocente = d.perfil === "Docente Academia";
        document.getElementById('logoModalAspirante').src = logoAcademiaGlobal;
        const diasSemana = ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'];
        let htmlHorarios = "";
        if (esDocente && d.horarios && Array.isArray(d.horarios)) {
            const agrupado = {};
            d.horarios.forEach(idx => { const dia = diasSemana[idx % 7]; const hora = Math.floor(idx / 7); if (!agrupado[dia]) agrupado[dia] = []; agrupado[dia].push(`${hora}:00`); });
            diasSemana.forEach(dia => { if (agrupado[dia]) { htmlHorarios += `<div class="col-12 mb-1" style="border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding: 5px 0;"><span style="color:var(--dorado-ucmi); font-weight:bold; display: inline-block; width: 45px;">${dia}:</span><span style="font-size: 0.85rem; color: #fff;">${agrupado[dia].sort((a,b)=>a-b).join(', ')}</span></div>`; } });
        } else if (esDocente) { htmlHorarios = `<div class="col-12 mt-2" style="font-size:0.8rem; color:#888;">No hay disponibilidad registrada.</div>`; }

        let html = `<div class="col-12 mb-4"><h5 style="color:var(--dorado-ucmi)">Expediente del Aspirante</h5></div>`;
        if (esDocente) {

document.getElementById('btnConfirmarAcceso').onclick = async () => {
    if (!currentId || !currentData) return;
    const esDocente = currentData.perfil === "Docente Academia";

    try {
        // Validación de cupos (solo para estudiantes)
        if (!esDocente) {
            const qEstudiantes = query(collection(db, "usuarios"), where("entidad", "==", academiaNombreGlobal), where("rol", "==", "estudiante"));
            const snap = await getDocs(qEstudiantes);
            if (snap.size >= cuposMaximosGlobal) {
                await Swal.fire('Cupos Agotados', 'No hay vacantes disponibles.', 'warning');
                return;
            }
        }

        // 1. Lógica segura de contraseña
        // Extraemos el DNI y validamos longitud mínima de 6 caracteres
        let rawPassword = String(currentData.dniDocente || currentData.dniEstudiante || "UCMI2026");
        const passwordTemp = rawPassword.length >= 6 ? rawPassword : "UCMI2026";

        // 2. Crear autenticación
        try {
            // Usamos authCreacion para que no afecte a tu sesión actual (auth)
            await createUserWithEmailAndPassword(authCreacion, currentData.email, passwordTemp);
        } catch (authError) {
            // Si el error es que el email ya existe en Auth, continuamos (es normal en re-procesos)
            if (authError.code !== 'auth/email-already-in-use') {
                throw authError; 
            }
        }

        // 3. Guardar en Usuarios
        await setDoc(doc(db, "usuarios", currentData.email), {
            ...currentData,
            estado: "activo",
            rol: esDocente ? "docente" : "estudiante"
        });

        // 4. Guardar en Historial
        await addDoc(collection(db, "historial_postulaciones"), {
            ...currentData,
            fechaProceso: new Date().toISOString(),
            resultado: "Admitido",
            decisionFinal: "ACEPTADO"
        });

        // 5. Borrar de Postulaciones
        await deleteDoc(doc(db, "postulaciones", currentId));

        await Swal.fire({
            title: '¡Éxito!',
            text: 'Usuario aceptado. Su clave inicial es: ' + passwordTemp,
            icon: 'success'
        });
        location.reload();

    } catch (e) {
        console.error("Error detallado:", e);
        Swal.fire('Error', 'No se pudo procesar la admisión: ' + e.message, 'error');
    }
};

    document.getElementById('btnEliminar').onclick = async () => {
        const res = await Swal.fire({ title: '¿Estás seguro?', text: "¡Esta acción eliminará la postulación!", icon: 'warning', showCancelButton: true, confirmButtonText: 'Sí, rechazar' });
        if (res.isConfirmed) {
            try {
                await addDoc(collection(db, "historial_postulaciones"), { ...currentData, fechaProceso: new Date().toISOString(), resultado: "Rechazado", decisionFinal: "RECHAZADO" });
                await deleteDoc(doc(db, "postulaciones", currentId));
                location.reload();
            } catch (e) { Swal.fire('Error', 'No se pudo rechazar.', 'error'); }
        }
    };
</script>
