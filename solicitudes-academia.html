<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Plantilla -->
    <link rel="stylesheet" href="componentes/plantilla-academia.css">

    <style>

        .panel-cristal{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:18px;
            padding:30px;
            max-width:900px;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.2);
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,.12);
            color:white;
            border-color:#c5a059;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,.5);
        }

        .btn-registrar{
            background:#c5a059;
            border:none;
            color:#111;
            font-weight:600;
            padding:0 25px;
        }

        .btn-registrar:hover{
            background:#d8b26a;
        }

        #filtroPerfil {
    background: rgba(255, 255, 255, 0.05) !important;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2) !important;
    color: white !important;
    border-radius: 50px !important;
    padding: 10px 20px !important;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
}

#filtroPerfil option {
    background-color: #1a2a3a;
    color: white;
}

        .table-container {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(15px) saturate(150%);
  -webkit-backdrop-filter: blur(15px) saturate(150%);
  border-radius: 28px;
  padding: 30px;
  color: white;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.table thead th {
    background-color: transparent !important;
    color: rgba(255, 255, 255, 0.6) !important;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 1px;
    border: none;
}

   .table thead th {
    border-bottom: none !important;
}     
        
    </style>

</head>
<body>

<div id="plantilla"></div>

<script type="module">

  import {
    db,
    auth
} from "./componentes/firebase-config.js";

import {
    collection,
    query,
    where,
    onSnapshot,
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

await import("./componentes/plantilla-academia.js");

// =========================
// ESTADO GLOBAL
// =========================
let registrosLocales = [];
let renderPendiente = false;

// =========================
// ESCUCHA FIRESTORE
// =========================
function iniciarEscucha(academiaNombreGlobal) {

    const q = query(
        collection(db, "postulaciones"),
        where("entidad", "==", academiaNombreGlobal)
    );

    onSnapshot(q, (snap) => {

        registrosLocales = snap.docs;

        renderizar();

    });

}

// =========================
// RENDER TABLA
// =========================
function renderizar() {

    const lista = document.getElementById("listaMaestra");
    const filtro = document.getElementById("filtroPerfil").value;

    if (!lista) return;

    lista.innerHTML = "";

    let hayDatos = false;

    registrosLocales.forEach(docSnap => {

        const d = docSnap.data();
        const perfil = (d.perfil || "").toLowerCase();

        if (filtro !== "todos" && !perfil.includes(filtro)) {
            return;
        }

        hayDatos = true;

        let clasePerfil = "bg-secondary";

        if (d.perfil === "Docente Academia") {
            clasePerfil = "bg-categoria-docente";
        }

        if (d.perfil === "Estudiante Academia") {
            clasePerfil = "bg-categoria-estudiante";
        }

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>
                <div class="fw-bold">${d.nombreResponsable || "N/A"}</div>
                <small style="color:rgba(255,255,255,0.5)">
                    ${d.email || ""}
                </small>
            </td>

            <td>
                <span class="badge ${clasePerfil}">
                    ${d.perfil || "N/A"}
                </span>
            </td>

            <td style="color:rgba(255,255,255,0.7)">
                ${d.ubicacion || "N/A"}
            </td>

            <td class="text-center">
                <button class="btn btn-outline-light btn-sm"
                        onclick="verExpediente('${docSnap.id}')">
                    Detalles
                </button>
            </td>
        `;

        lista.appendChild(tr);
    });

    if (!hayDatos) {
        lista.innerHTML = `
            <tr>
                <td colspan="4" class="text-center py-4"
                    style="color:rgba(255,255,255,0.5)">
                    No hay postulaciones
                </td>
            </tr>
        `;
    }
}

// =========================
// AUTH INIT
// =========================
onAuthStateChanged(auth, async (user) => {

    if (!user) return;

    const snap = await getDoc(doc(db, "usuarios", user.uid));

    if (!snap.exists()) return;

    const data = snap.data();

    iniciarEscucha(data.entidad);

    renderizar();
});

// =========================
// FILTRO (IMPORTANTE)
// =========================
document.getElementById("filtroPerfil")
.addEventListener("change", renderizar);

// =========================
// SEGURIDAD: EXPEDIENTE GLOBAL
// =========================
window.verExpediente = function (id) {
    console.log("Ver expediente:", id);
};

</script>

</body>
</html>
