    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --verde-exito: #27ae60;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
            --indigo-ucmi: #4b0082;
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; margin: 0; color: white;
        }

        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); min-height: 100vh; transition: filter 0.3s ease; }
        
        .sidebar { 
            background: rgba(26, 42, 58, 0.95); backdrop-filter: blur(10px); min-height: 100vh; padding: 25px 15px; position: sticky; top: 0; border-right: 1px solid rgba(197, 160, 89, 0.3); display: flex; flex-direction: column;
        }

        .logo-sidebar { height: 60px; object-fit: contain; margin-bottom: 10px; border-radius: 8px; }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi {
            display: flex; align-items: center;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 10px;
            transition: 0.3s all ease;

        }

        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }   

        .btn-sidebar-action {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.4) !important; color: white !important;
            font-weight: 600; text-transform: uppercase; font-size: 0.7rem; border-radius: 50px; padding: 10px;
            text-decoration: none; text-align: center; transition: all 0.3s ease-in-out; display: block; margin-bottom: 10px;
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .table-container { 
            background: rgba(255, 255, 255, 0.03) !important; backdrop-filter: blur(15px) saturate(150%);
            border-radius: 28px; padding: 30px; color: white; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .table { --bs-table-bg: transparent !important; --bs-table-color: white !important; background-color: transparent !important; color: white !important; border-spacing: 0 5px; }
        .table th { color: rgba(255, 255, 255, 0.6) !important; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .table td { border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important; padding: 18px 12px; }

        /* Estilos del Modal */
        .modal-content { background: rgba(15, 20, 30, 0.95) !important; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; color: white; }
        .label-exp { color: var(--dorado-ucmi); font-size: 0.7rem; text-transform: uppercase; font-weight: 800; }
        .val-exp { color: #ffffff; font-size: 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 5px; margin-bottom: 15px; display: block; }
        
        .badge-perfil { font-size: 0.7rem; padding: 5px 12px; border-radius: 50px; color: white; font-weight: 700; text-transform: uppercase; }
        .bg-academia { background: #dc3545; }
        .bg-alumno { background: var(--verde-exito); }
    </style>
</head>

<body>
<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <!-- LOGO DE LA ACADEMIA -->
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="logo-sidebar" alt="Logo Academia">
                    <h5 class="fw-bold mt-2 text-white">ACADEMIA ADMIN</h5>
                </div>

                <nav class="sidebar-nav">
                    <a href="#" class="nav-item-ucmi active">
                        <i class="bi bi-envelope-paper"></i> SOLICITUDES
                    </a>
                    <a href="alumnos.html" class="nav-item-ucmi">
                        <i class="bi bi-mortarboard"></i> MIS ALUMNOS
                    </a>
                    <a href="cursos.html" class="nav-item-ucmi">
                        <i class="bi bi-journal-bookmark"></i> CURSOS
                    </a>
                </nav>

                <div class="mt-4 pt-4 border-top border-secondary">
                    <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100">
                        <i class="bi bi-box-arrow-right me-2"></i> Salir del Panel
                    </a>
                </div>
            </div>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="col-md-10 p-4">
                <h1 class="display-6 fw-bold">Solicitudes de Ingreso - Academia</h1>
                
                <div class="table-container mt-5">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>ASPIRANTE</th>
                                    <th>CURSO DE INTERÉS</th>
                                    <th>FECHA</th>
                                    <th class="text-center">ACCIÓN</th>
                                </tr>
                            </thead>
                            <tbody id="listaSolicitudesAcademia">
                                <!-- Datos dinámicos de Firebase -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DE DETALLES -->
<div class="modal fade" id="modalSolicitud" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h4 class="fw-bold"><i class="bi bi-person-check me-2"></i>Detalles de Inscripción</h4>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-4" id="cuerpoModal">
                <!-- Se llena con JS -->
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-outline-danger rounded-pill px-4" id="btnRechazar">Rechazar</button>
                <button class="btn btn-success rounded-pill px-4 fw-bold" style="background: var(--verde-exito);" id="btnAceptar">Aceptar Alumno</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let solicitudSeleccionada = null;
    let idSeleccionado = null;

    // ESCUCHAR SOLICITUDES ESPECÍFICAS DE LA ACADEMIA
    onSnapshot(collection(db, "solicitudes_academia"), (snapshot) => {
        const tbody = document.getElementById('listaSolicitudesAcademia');
        tbody.innerHTML = '';

        snapshot.forEach((doc) => {
            const data = doc.data();
            const id = doc.id;

            tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="fw-bold">${data.nombre}</div>
                        <div class="small text-muted">${data.email}</div>
                    </td>
                    <td><span class="badge-perfil bg-alumno">${data.curso || 'General'}</span></td>
                    <td class="small">${data.fecha || 'Reciente'}</td>
                    <td class="text-center">
                        <button onclick="verSolicitud('${id}')" class="btn btn-dark btn-sm rounded-pill px-3">Revisar</button>
                    </td>
                </tr>`;
        });
    });

    window.verSolicitud = async (id) => {
        idSeleccionado = id;
        const docRef = doc(db, "solicitudes_academia", id);
        const snap = await getDoc(docRef);
        
        if (snap.exists()) {
            solicitudSeleccionada = snap.data();
            const d = solicitudSeleccionada;
            document.getElementById('cuerpoModal').innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <label class="label-exp">Nombre Completo</label><span class="val-exp">${d.nombre}</span>
                        <label class="label-exp">Correo Electrónico</label><span class="val-exp">${d.email}</span>
                        <label class="label-exp">WhatsApp</label><span class="val-exp">${d.whatsapp || 'N/A'}</span>
                    </div>
                    <div class="col-md-6">
                        <label class="label-exp">Curso Solicitado</label><span class="val-exp text-info">${d.curso}</span>
                        <label class="label-exp">Nivel Educativo</label><span class="val-exp">${d.nivel || 'N/A'}</span>
                        <label class="label-exp">Mensaje del Aspirante</label>
                        <div class="small p-2 bg-dark rounded border border-secondary">${d.mensaje || 'Sin mensaje adicional.'}</div>
                    </div>
                </div>`;
            new bootstrap.Modal(document.getElementById('modalSolicitud')).show();
        }
    };

    // LOGOUT
    document.getElementById('btnLogout').onclick = async (e) => {
        e.preventDefault();
        const result = await Swal.fire({ title: '¿Cerrar sesión?', icon: 'question', showCancelButton: true, confirmButtonColor: '#e74c3c' });
        if (result.isConfirmed) {
            await signOut(auth);
            window.location.href = "index.html"; 
        }
    };
</script>
</body>
</html>
