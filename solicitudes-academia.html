<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Plantilla -->
    <link rel="stylesheet" href="componentes/plantilla-academia.css">

    <style>

        .panel-cristal{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:18px;
            padding:30px;
            max-width:900px;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.2);
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,.12);
            color:white;
            border-color:#c5a059;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,.5);
        }

        .btn-registrar{
            background:#c5a059;
            border:none;
            color:#111;
            font-weight:600;
            padding:0 25px;
        }

        .btn-registrar:hover{
            background:#d8b26a;
        }

        #filtroPerfil {
    background: rgba(255, 255, 255, 0.05) !important;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2) !important;
    color: white !important;
    border-radius: 50px !important;
    padding: 10px 20px !important;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
}

#filtroPerfil option {
    background-color: #1a2a3a;
    color: white;
}

    </style>

</head>
<body>

<div id="plantilla"></div>

<script type="module">

    // Cargar la plantilla HTML
    const html = await fetch("componentes/plantilla-academia.html");
    document.getElementById("plantilla").innerHTML = await html.text();

    // Marcar opción activa si se desea posteriormente
    // document.querySelectorAll(".nav-item-ucmi")[0].classList.add("active");



    // Cargar comportamiento general de la plantilla
await import("./componentes/plantilla-academia.js");

const contenido = document.getElementById("contenido");

contenido.innerHTML = `
<div class="container py-4">

    <!-- ENCABEZADO -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="display-6 fw-bold">
            Control de Postulaciones
        </h1>

        <span
            id="marcadorCupos"
            class="badge border border-secondary rounded-pill"
            style="
                color: var(--dorado-ucmi);
                background: rgba(0,0,0,0.35);
                font-size: 0.95rem;
                font-weight: 600;
                padding: 12px 25px;
                letter-spacing: 0.5px;">
            Cupos: 0 / 0
        </span>

    </div>

    <!-- FILTRO -->
    <div class="col-md-4 mb-4">

        <label class="small fw-bold mb-2 text-uppercase" style="color: white;">
            Filtrar por Perfil
        </label>

        <select id="filtroPerfil" class="form-select filtro-glass">
            <option value="todos">Mostrar todos</option>
            <option value="estudiante">Estudiantes</option>
            <option value="docente">Docentes</option>
        </select>

    </div>

</div>
`;

</script>

</body>
</html>
