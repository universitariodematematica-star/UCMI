<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Administración</title>
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg'); 
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .table-glass {
            color: white !important;
        }

        .table-glass th { border-color: rgba(255,255,255,0.2); }
        .table-glass td { border-color: rgba(255,255,255,0.1); vertical-align: middle; }

        .btn-ucmi {
            background-color: #0d6efd;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-ucmi:hover {
            background-color: #0a58ca;
            transform: translateY(-2px);
        }

        .modal-content {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(20px);
            color: white;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">UCMI</h1>
        <p class="lead">Portal de Gestión de Postulaciones</p>
    </div>

    <div class="glass-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="m-0"><i class="bi bi-people-fill me-2"></i>Postulantes</h3>
            <select id="filtroPerfil" class="form-select w-25 bg-dark text-white border-secondary">
                <option value="todos">Todos los perfiles</option>
                <option value="Academia">Academia</option>
                <option value="Profesor Independiente">Profesor Independiente</option>
                <option value="Estudiante UCMI">Estudiante UCMI</option>
            </select>
        </div>

        <div class="table-responsive">
            <table class="table table-glass text-white">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Perfil</th>
                        <th>Correo</th>
                        <th>Fecha</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaPostulaciones">
                    <!-- Los datos se cargan dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de Detalles -->
<div class="modal fade" id="modalDetalles" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="modalTitulo">Detalles del Postulante</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalCuerpo">
                <!-- Información dinámica -->
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" id="btnRechazar" class="btn btn-danger">
                    <i class="bi bi-trash me-2"></i>Rechazar Postulación
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Configuración de Firebase (Se recomienda mover esto a variables de entorno en producción)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "ucmi-proyecto.firebaseapp.com",
        projectId: "ucmi-proyecto",
        storageBucket: "ucmi-proyecto.appspot.com",
        messagingSenderId: "7777777777",
        appId: "1:7777777777:web:abcdef123456"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const postulacionesRef = collection(db, "postulaciones");

    let postulacionesData = [];
    const tabla = document.getElementById('tablaPostulaciones');
    const filtro = document.getElementById('filtroPerfil');

    // Escuchar cambios en tiempo real sin recargar la página
    onSnapshot(postulacionesRef, (snapshot) => {
        postulacionesData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderizarTabla();
    });

    function renderizarTabla() {
        const valorFiltro = filtro.value;
        tabla.innerHTML = "";

        const filtrados = postulacionesData.filter(d => {
            if (valorFiltro === "todos") return true;
            return d.perfil?.trim() === valorFiltro; // Limpieza de strings
        });

        filtrados.forEach(d => {
            const row = `
                <tr>
                    <td>${d.nombreCompleto || 'Sin nombre'}</td>
                    <td><span class="badge bg-info text-dark">${d.perfil}</span></td>
                    <td>${d.correo}</td>
                    <td>${d.fechaRegistro || 'N/A'}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-ucmi text-white" onclick="verDetalles('${d.id}')">
                            <i class="bi bi-eye"></i> Ver
                        </button>
                    </td>
                </tr>
            `;
            tabla.innerHTML += row;
        });
    }

    filtro.addEventListener('change', renderizarTabla);

    // Función para ver detalles (Hacemos que sea accesible globalmente)
    window.verDetalles = (id) => {
        const d = postulacionesData.find(item => item.id === id);
        const cuerpo = document.getElementById('modalCuerpo');
        
        cuerpo.innerHTML = `
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="text-secondary small">Nombre Completo</label>
                    <p class="fw-bold">${d.nombreCompleto || 'No registrado'}</p>
                </div>
                <div class="col-md-6">
                    <label class="text-secondary small">DNI / Identificación</label>
                    <p class="fw-bold">${d.dniEstudiante || 'No registrado'}</p>
                </div>
                <div class="col-md-6">
                    <label class="text-secondary small">Correo Electrónico</label>
                    <p>${d.correo}</p>
                </div>
                <div class="col-md-6">
                    <label class="text-secondary small">Perfil de Usuario</label>
                    <p><span class="badge bg-primary">${d.perfil}</span></p>
                </div>
                <hr class="border-secondary">
                <div class="col-12">
                    <label class="text-secondary small">Mensaje o Comentarios</label>
                    <p class="fst-italic">"${d.mensaje || 'Sin comentarios adicionales.'}"</p>
                </div>
            </div>
        `;

        const btnRechazar = document.getElementById('btnRechazar');
        btnRechazar.onclick = () => confirmarEliminacion(d.id);

        new bootstrap.Modal(document.getElementById('modalDetalles')).show();
    };

    async function confirmarEliminacion(id) {
        // Uso de SweetAlert2 en lugar de confirm() nativo
        const result = await Swal.fire({
            title: '¿Estás seguro?',
            text: "Esta acción eliminará la postulación permanentemente.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Sí, eliminar',
            cancelButtonText: 'Cancelar',
            background: '#1e1e1e',
            color: '#fff'
        });

        if (result.isConfirmed) {
            try {
                await deleteDoc(doc(db, "postulaciones", id));
                bootstrap.Modal.getInstance(document.getElementById('modalDetalles')).hide();
                Swal.fire({
                    title: 'Eliminado',
                    text: 'La postulación ha sido borrada.',
                    icon: 'success',
                    background: '#1e1e1e',
                    color: '#fff'
                });
            } catch (error) {
                Swal.fire('Error', 'No se pudo eliminar: ' + error.message, 'error');
            }
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
