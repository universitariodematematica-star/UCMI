<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Postulaciones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- SOLO TU CSS ESPECÍFICO -->
    <style>
        .table-container {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 30px;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .bg-super-admin { background:#dc3545; color:white; }
        .bg-admin { background:#fd7e14; color:white; }
        .bg-academia { background:#0d6efd; color:white; }
        .bg-docente-ucmi { background:#20c997; color:white; }
        .bg-estudiante-ucmi { background:#198754; color:white; }
        .bg-categoria-docente { background:#d63384; color:white; }
        .bg-categoria-estudiante { background:#311b92; color:white; }
    </style>
</head>

<body>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore, collection, onSnapshot, doc, getDoc,
    query, where, getDocs, addDoc, deleteDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";


// =====================
// 1. FIREBASE
// =====================
const firebaseConfig = {
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const secondaryApp = initializeApp(firebaseConfig, "Secondary");
const secondaryAuth = getAuth(secondaryApp);


// =====================
// 2. ESTADO GLOBAL
// =====================
let academiaNombre = "";
let cuposMax = 0;
let registros = [];
let currentId = null;
let currentData = null;


// =====================
// 3. CARGAR PLANTILLA
// =====================
async function cargarPlantilla() {

    const html = await fetch("./plantilla-academia.html").then(r => r.text());

    // 🧠 1. Parseo seguro del HTML
    const temp = document.createElement("div");
    temp.innerHTML = html;

    // 🧠 2. Selección explícita del wrapper (NO firstElementChild)
    const wrapper = temp.querySelector(".app-wrapper");

    if (!wrapper) {
        console.error("❌ No se encontró .app-wrapper en la plantilla");
        return;
    }

    // 🧠 3. Limpieza total del DOM antes de insertar
    document.body.replaceChildren(wrapper);

    // 🧠 4. esperar a que el navegador pinte el DOM
    await new Promise(requestAnimationFrame);
    await new Promise(requestAnimationFrame);

    // 🧠 5. buscar contenido DENTRO del wrapper (NO global)
    const contenedor = wrapper.querySelector("#contenido");

    if (!contenedor) {
        console.error("❌ #contenido no existe dentro del wrapper");
        console.log(wrapper.innerHTML);
        return;
    }

    contenedor.innerHTML = generarVista();

    inicializarEventos();
}
// =====================
// 4. VISTA PRINCIPAL
// =====================
function generarVista() {
    return `
    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-white">Control de Postulaciones</h1>
            <span id="marcadorCupos" class="badge bg-dark border border-secondary">
                Cupos: 0 / 0
            </span>
        </div>

        <div class="mb-3">
            <select id="filtroPerfil" class="form-select w-25">
                <option value="todos">Todos</option>
                <option value="estudiante">Estudiantes</option>
                <option value="docente">Docentes</option>
            </select>
        </div>

        <div class="table-container">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Perfil</th>
                        <th>Ubicación</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="listaMaestra"></tbody>
            </table>
        </div>

    </div>
    `;
}


// =====================
// 5. AUTH
// =====================
onAuthStateChanged(auth, async (user) => {

    if (!user) return;

    const userDoc = await getDoc(doc(db, "usuarios", user.uid));

    if (!userDoc.exists()) return;

    const data = userDoc.data();

    academiaNombre = data.entidad;
    cuposMax = data.cupos || 0;

    await cargarPlantilla();

    escucharPostulaciones();
    actualizarCupos();
});

// =====================
// 6. FIRESTORE LISTENER
// =====================
function escucharPostulaciones() {

    const q = query(
        collection(db, "postulaciones"),
        where("entidad", "==", academiaNombre)
    );

    onSnapshot(q, (snap) => {
        registros = snap.docs;
        render();
    });
}


// =====================
// 7. RENDER TABLA
// =====================
function render() {

    const tbody = document.getElementById("listaMaestra");
    const filtro = document.getElementById("filtroPerfil")?.value || "todos";

    if (!tbody) return;

    tbody.innerHTML = "";

    registros.forEach(d => {

        const data = d.data();

        if (filtro !== "todos" && !data.perfil.toLowerCase().includes(filtro))
            return;

        let clase = "bg-secondary";

        switch (data.perfil) {
            case "Docente Academia": clase = "bg-docente-ucmi"; break;
            case "Estudiante Academia": clase = "bg-estudiante-ucmi"; break;
        }

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${data.nombreResponsable || ""}</td>
            <td><span class="badge ${clase}">${data.perfil}</span></td>
            <td>${data.ubicacion || ""}</td>
            <td>
                <button class="btn btn-sm btn-light"
                    onclick="ver('${d.id}')">
                    Ver
                </button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}


// =====================
// 8. DETALLES
// =====================
window.ver = async (id) => {

    const snap = await getDoc(doc(db, "postulaciones", id));

    currentId = id;
    currentData = snap.data();

    Swal.fire({
        title: "Detalle",
        text: JSON.stringify(currentData, null, 2),
        width: "60%"
    });
};


// =====================
// 9. CUPOS
// =====================
async function actualizarCupos() {

    const q = query(
        collection(db, "usuarios"),
        where("entidad", "==", academiaNombre)
    );

    const snap = await getDocs(q);

    const el = document.getElementById("marcadorCupos");

    if (el)
        el.innerText = `Cupos: ${snap.size} / ${cuposMax}`;
}


// =====================
// 10. EVENTOS
// =====================
function inicializarEventos() {

    document.addEventListener("change", (e) => {
        if (e.target.id === "filtroPerfil") {
            render();
        }
    });

}

</script>

</body>
</html>
