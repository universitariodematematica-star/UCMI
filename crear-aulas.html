<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Plantilla -->
    <link rel="stylesheet" href="componentes/plantilla-academia.css">

    <style>

        .panel-cristal{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:18px;
            padding:30px;
            max-width:900px;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.2);
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,.12);
            color:white;
            border-color:#c5a059;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,.5);
        }

        .btn-registrar{
            background:#c5a059;
            border:none;
            color:#111;
            font-weight:600;
            padding:0 25px;
        }

        .btn-registrar:hover{
            background:#d8b26a;
        }

    </style>

</head>
<body>

<div id="plantilla"></div>

<script type="module">

import { db, auth } from "./componentes/firebase-config.js";

import {
    collection,
    addDoc,
    serverTimestamp,
    doc,
    getDoc,
    deleteDoc,
    updateDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// ===============================
// CARGAR PLANTILLA
// ===============================
const html = await fetch("componentes/plantilla-academia.html");
document.getElementById("plantilla").innerHTML = await html.text();

// ===============================
// INICIALIZAR UI
// ===============================
document.getElementById("contenido").innerHTML = `

<div class="panel-cristal mb-4">

    <h5 class="mb-4">
        Escriba el nombre del aula y pulse <strong>Registrar</strong>.
    </h5>

    <div class="d-flex gap-3">

        <input id="txtNombre" type="text" class="form-control" placeholder="Escriba aquí...">

        <button id="btnRegistrar" class="btn btn-registrar">
            Registrar
        </button>

    </div>

</div>

<div id="listaAulas"></div>

<div id="syncStatus" class="mt-3 text-warning small">
    🔄 Sincronizando cambios con GitHub Pages...
</div>

`;

// ===============================
// IMPORT PLANTILLA LOGIC
// ===============================
await import("./componentes/plantilla-academia.js");

// ===============================
// ELEMENTOS
// ===============================
const txtNombre = document.getElementById("txtNombre");
const btnRegistrar = document.getElementById("btnRegistrar");
const listaAulas = document.getElementById("listaAulas");
const syncStatus = document.getElementById("syncStatus");

// ===============================
// LIVE FIRESTORE
// ===============================
const aulasRef = collection(db, "aulas");

onSnapshot(aulasRef, (snapshot) => {

    listaAulas.innerHTML = "";

    snapshot.forEach(docSnap => {

        const aula = docSnap.data();
        const id = docSnap.id;

        listaAulas.innerHTML += `
            <div class="panel-cristal mb-3 d-flex justify-content-between align-items-center">

                <h5 class="mb-0">${aula.nombre_aula}</h5>

                <div class="d-flex gap-2">

                    <button class="btn btn-sm btn-primary btn-editar"
                        data-id="${id}"
                        data-nombre="${aula.nombre_aula}">
                        ✏️
                    </button>

                    <button class="btn btn-sm btn-warning btn-curso" data-id="${id}">
                        🎓
                    </button>

                    <button class="btn btn-sm btn-info btn-estudiantes" data-id="${id}">
                        👥
                    </button>

                    <button class="btn btn-sm btn-danger btn-eliminar" data-id="${id}">
                        🗑️
                    </button>

                </div>

            </div>
        `;
    });

    syncStatus.innerHTML = "🟢 Sincronizado en tiempo real";
});

// ===============================
// REGISTRAR AULA
// ===============================
btnRegistrar.addEventListener("click", async () => {

    const nombre = txtNombre.value.trim();
    if (!nombre) return;

    try {

        const usuarioSnap = await getDoc(
            doc(db, "usuarios", auth.currentUser.uid)
        );

        if (!usuarioSnap.exists()) return;

        const datosUsuario = usuarioSnap.data();

        await addDoc(collection(db, "aulas"), {
            nombre_aula: nombre,
            entidad: datosUsuario.entidad,
            academiaId: auth.currentUser.uid,
            fechaCreacion: serverTimestamp()
        });

        txtNombre.value = "";
        txtNombre.focus();

    } catch (err) {
        console.error("ERROR FIRESTORE:", err);
    }
});

// ===============================
// EVENTOS DINÁMICOS
// ===============================
document.addEventListener("click", async (e) => {

    // EDITAR
    if (e.target.classList.contains("btn-editar")) {

        const id = e.target.dataset.id;
        const actual = e.target.dataset.nombre;

        const nuevo = prompt("Editar nombre del aula:", actual);
        if (!nuevo?.trim()) return;

        try {
            await updateDoc(doc(db, "aulas", id), {
                nombre_aula: nuevo.trim()
            });
        } catch (err) {
            console.error(err);
        }
    }

    // ELIMINAR
    if (e.target.classList.contains("btn-eliminar")) {

        const id = e.target.dataset.id;

        if (!confirm("¿Eliminar aula?")) return;

        try {
            await deleteDoc(doc(db, "aulas", id));
        } catch (err) {
            console.error(err);
        }
    }
});

</script>

</body>
</html>
