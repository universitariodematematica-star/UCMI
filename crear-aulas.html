<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Plantilla -->
    <link rel="stylesheet" href="componentes/plantilla-academia.css">

    <style>

        .panel-cristal{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:18px;
            padding:30px;
            max-width:900px;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.2);
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,.12);
            color:white;
            border-color:#c5a059;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,.5);
        }

        .btn-registrar{
            background:#c5a059;
            border:none;
            color:#111;
            font-weight:600;
            padding:0 25px;
        }

        .btn-registrar:hover{
            background:#d8b26a;
        }

    </style>

</head>
<body>

<div id="plantilla"></div>

<script type="module">

    import { db, auth } from "./componentes/firebase-config.js";

import {
    collection,
    addDoc,
    serverTimestamp,
    doc,
    getDoc,
    getDocs,
    query,
    where,
    updateDoc,
    deleteDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    // Cargar la plantilla HTML
    const html = await fetch("componentes/plantilla-academia.html");
    document.getElementById("plantilla").innerHTML = await html.text();

    // Marcar opción activa si se desea posteriormente
    // document.querySelectorAll(".nav-item-ucmi")[0].classList.add("active");

    // Contenido de la página
    document.getElementById("contenido").innerHTML = `

    <div class="panel-cristal mb-4">

        <h5 class="mb-4">
            Escriba el nombre del aula y pulse <strong>Registrar</strong>.
        </h5>

        <div class="d-flex gap-3">

            <input
                id="txtNombre"
                type="text"
                class="form-control"
                placeholder="Escriba aquí...">

            <button
                id="btnRegistrar"
                class="btn btn-registrar">
                Registrar
            </button>

        </div>

    </div>

    <div id="listaAulas"></div>

`;
    // Cargar comportamiento general de la plantilla
    await import("./componentes/plantilla-academia.js");

    const txtNombre = document.getElementById("txtNombre");
const btnRegistrar = document.getElementById("btnRegistrar");
const listaAulas = document.getElementById("listaAulas");

// ==========================================
// CARGAR AULAS YA REGISTRADAS
// ==========================================

// Leer el documento del usuario autenticado
const usuarioActual = await getDoc(
    doc(db, "usuarios", auth.currentUser.uid)
);

const datosUsuarioActual = usuarioActual.data();

// Buscar únicamente las aulas de esta academia
const q = query(
    collection(db, "aulas"),
    where("entidad", "==", datosUsuarioActual.entidad)
);

onSnapshot(q, (snapshot) => {

    listaAulas.innerHTML = "";

    snapshot.forEach((docSnap) => {

        const aula = docSnap.data();

        listaAulas.innerHTML += `

            <div class="panel-cristal mb-3 d-flex justify-content-between align-items-center">

                <h5 class="mb-0">${aula.nombre_aula}</h5>

                <div class="d-flex gap-2">

                    <button
                        class="btn btn-sm btn-primary btnEditar"
                        data-id="${docSnap.id}"
                        data-nombre="${aula.nombre_aula}">
                        ✏️ Editar
                    </button>

                    <button
                        class="btn btn-sm btn-warning btnCursos"
                        data-id="${docSnap.id}">
                        🎓 Cursos
                    </button>

                    <button class="btn btn-sm btn-info">
                        👥 Alumnos
                    </button>

                    <button
                        class="btn btn-sm btn-danger btnBorrar"
                        data-id="${docSnap.id}">
                        🗑️ Borrar
                    </button>

                </div>

            </div>

        `;

    });

});
    
btnRegistrar.addEventListener("click", async () => {

    console.log("===== BOTÓN REGISTRAR =====");

    const nombre = txtNombre.value.trim();

    console.log("Nombre:", nombre);

    if (nombre === "") {
        console.log("El nombre está vacío.");
        return;
    }

    console.log("Usuario autenticado:", auth.currentUser);

    try {

        console.log("Intentando escribir en Firestore...");

// Leer el documento del usuario autenticado
const usuarioSnap = await getDoc(
    doc(db, "usuarios", auth.currentUser.uid)
);

if (!usuarioSnap.exists()) {
    console.error("No existe el documento del usuario.");
    return;
}

const datosUsuario = usuarioSnap.data();

await addDoc(collection(db, "aulas"), {

    nombre_aula: nombre,
    entidad: datosUsuario.entidad,
    academiaId: auth.currentUser.uid,
    fechaCreacion: serverTimestamp()

});

console.log("Documento creado correctamente.");

        listaAulas.innerHTML += `

    <div class="panel-cristal mb-3 d-flex justify-content-between align-items-center">
        <h5 class="mb-0">${nombre}</h5>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-primary">
                ✏️ Editar
            </button>
            <button class="btn btn-sm btn-warning">
                🎓 Cursos
            </button>
            <button class="btn btn-sm btn-info">
                👥 Alumnos
            </button>
            <button class="btn btn-sm btn-danger">
                🗑️ Borrar
            </button>
        </div>
    </div>

`;

        txtNombre.value = "";
        txtNombre.focus();

    } catch (error) {

        console.error("ERROR FIRESTORE:");
        console.error(error);

    }

});

document.addEventListener("click", async (e) => {

    if (!e.target.classList.contains("btnEditar")) return;

    const id = e.target.dataset.id;
    const nombreActual = e.target.dataset.nombre;

    const nuevoNombre = prompt(
        "Nuevo nombre del aula:",
        nombreActual
    );

    if (nuevoNombre === null) return;

    if (nuevoNombre.trim() === "") return;

    try {

        await updateDoc(
            doc(db, "aulas", id),
            {
                nombre_aula: nuevoNombre.trim()
            }
        );

        e.target.dataset.nombre = nuevoNombre.trim();

        e.target
            .closest(".panel-cristal")
            .querySelector("h5")
            .textContent = nuevoNombre.trim();

        console.log("Aula actualizada.");

    } catch (error) {

        console.error(error);

        alert("No fue posible actualizar el aula.");

    }

});

 document.addEventListener("click", async (e) => {

    if (!e.target.classList.contains("btnBorrar")) return;

    const id = e.target.dataset.id;

    const confirmar = confirm(
        "¿Está seguro de eliminar esta aula?"
    );

    if (!confirmar) return;

    try {

        await deleteDoc(doc(db, "aulas", id));

        alert("Aula eliminada correctamente.");

    } catch (error) {

        console.error(error);

        alert("No fue posible eliminar el aula.");

    }

});

document.addEventListener("click", async (e) => {

    if (!e.target.classList.contains("btnCursos")) return;

    const aulaId = e.target.dataset.id;

    abrirSelectorCursos(aulaId);

});

// ==========================================
// 🎓 ABRIR SELECTOR DE CURSOS PARA AULA
// ==========================================

async function abrirSelectorCursos(aulaId) {

    const overlay = document.createElement("div");

    overlay.style.position = "fixed";
    overlay.style.top = "0";
    overlay.style.left = "0";
    overlay.style.width = "100%";
    overlay.style.height = "100%";
    overlay.style.background = "rgba(0,0,0,0.7)";
    overlay.style.display = "flex";
    overlay.style.justifyContent = "center";
    overlay.style.alignItems = "center";
    overlay.style.zIndex = "9999";

    const cursosSnap = await getDocs(
        query(
            collection(db, "cursos"),
            where("academiaId", "==", auth.currentUser.uid)
        )
    );

    let html = `
        <div style="
            background:#111;
            padding:25px;
            border-radius:12px;
            min-width:320px;
            color:white;
        ">
            <h4>Asignar curso al aula</h4>

            <select id="selectCurso" class="form-control mb-3">
    `;

    cursosSnap.forEach(docSnap => {
        const c = docSnap.data();
        html += `<option value="${docSnap.id}">
                    ${c.nombre_curso}
                 </option>`;
    });

    html += `
            </select>

            <button id="btnAsignarCurso" class="btn btn-success w-100">
                Asignar curso
            </button>

            <button id="btnCerrarCursos" class="btn btn-danger w-100 mt-2">
                Cerrar
            </button>
        </div>
    `;

    overlay.innerHTML = html;
    document.body.appendChild(overlay);

    // cerrar modal
    document.getElementById("btnCerrarCursos").onclick = () => {
        overlay.remove();
    };

    // asignar curso
    document.getElementById("btnAsignarCurso").onclick = async () => {

        const cursoId = document.getElementById("selectCurso").value;

        await updateDoc(doc(db, "aulas", aulaId), {
            cursoId: cursoId
        });

        overlay.remove();
    };
}    
    
</script>

</body>
</html>
