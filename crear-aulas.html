<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Plantilla -->
    <link rel="stylesheet" href="componentes/plantilla-academia.css">

    <style>

        .panel-cristal{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:18px;
            padding:30px;
            max-width:900px;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.2);
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,.12);
            color:white;
            border-color:#c5a059;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,.5);
        }

        .btn-registrar{
            background:#c5a059;
            border:none;
            color:#111;
            font-weight:600;
            padding:0 25px;
        }

        .btn-registrar:hover{
            background:#d8b26a;
        }

    </style>

</head>
<body>

<div id="plantilla"></div>

<script type="module">

import { db, auth } from "./componentes/firebase-config.js";

import {
    collection,
    addDoc,
    serverTimestamp,
    doc,
    getDoc,
    getDocs,
    query,
    where,
    updateDoc,
    deleteDoc,
    onSnapshot,
    orderBy,
    writeBatch
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

//////////////////////////////
// PLANTILLA
//////////////////////////////

const html = await fetch("componentes/plantilla-academia.html");
document.getElementById("plantilla").innerHTML = await html.text();

document.getElementById("contenido").innerHTML = `
<div class="panel-cristal mb-4">
    <h5>Registrar aula</h5>
    <div class="d-flex gap-3">
        <input id="txtNombre" class="form-control" placeholder="Nombre aula">
        <button id="btnRegistrar" class="btn btn-registrar">Registrar</button>
    </div>
</div>

<div id="listaAulas"></div>
`;

await import("./componentes/plantilla-academia.js");

const txtNombre = document.getElementById("txtNombre");
const btnRegistrar = document.getElementById("btnRegistrar");
const listaAulas = document.getElementById("listaAulas");

//////////////////////////////
// HOVER BOX GLOBAL
//////////////////////////////

const hoverBox = document.createElement("div");

Object.assign(hoverBox.style, {
    position: "fixed",
    display: "none",
    background: "rgba(20,20,20,0.95)",
    border: "1px solid rgba(255,255,255,0.15)",
    padding: "12px",
    borderRadius: "12px",
    color: "white",
    zIndex: "99999",
    minWidth: "250px",
    backdropFilter: "blur(10px)"
});

document.body.appendChild(hoverBox);

//////////////////////////////
// AUTH
//////////////////////////////

onAuthStateChanged(auth, async (user) => {

    if (!user) return;

    const usuarioSnap = await getDoc(doc(db, "usuarios", user.uid));
    if (!usuarioSnap.exists()) return;

    const datosUsuario = usuarioSnap.data();

    //////////////////////////////
    // AULAS
    //////////////////////////////

    const q = query(
        collection(db, "aulas"),
        where("entidad", "==", datosUsuario.entidad),
        orderBy("nombre_aula")
    );

    onSnapshot(q, (snapshot) => {

        let htmlAulas = "";

        snapshot.forEach(docSnap => {

            const aula = docSnap.data();

            htmlAulas += `
                <div class="panel-cristal mb-3 d-flex justify-content-between aula-item"
                     data-aula="${docSnap.id}">

                    <div>
                        <h5>${aula.nombre_aula}</h5>
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary btnAlumnos" data-id="${docSnap.id}">
                            👥 Alumnos
                        </button>
                    </div>

                </div>
            `;
        });

        listaAulas.innerHTML = htmlAulas;
    });

    //////////////////////////////
    // CREAR AULA
    //////////////////////////////

    btnRegistrar.onclick = async () => {

        const nombre = txtNombre.value.trim();
        if (!nombre) return;

        await addDoc(collection(db, "aulas"), {
            nombre_aula: nombre,
            entidad: datosUsuario.entidad,
            academiaId: user.uid,
            fechaCreacion: serverTimestamp()
        });

        txtNombre.value = "";
    };

    //////////////////////////////
    // EVENTOS GLOBALES
    //////////////////////////////

    document.addEventListener("click", async (e) => {

        if (e.target.classList.contains("btnAlumnos")) {
            abrirSelectorAlumnos(e.target.dataset.id, datosUsuario.entidad);
        }
    });

});

//////////////////////////////
// MODAL ALUMNOS
//////////////////////////////

async function abrirSelectorAlumnos(aulaId, entidad) {

    const overlay = document.createElement("div");

    overlay.style = `
        position:fixed;
        left:0;top:0;
        width:100%;height:100%;
        background:rgba(0,0,0,.75);
        display:flex;
        justify-content:center;
        align-items:center;
        z-index:99999;
    `;

    overlay.innerHTML = `
        <div style="width:800px;background:#111;padding:20px;border-radius:12px;color:white;">
            <h4>Alumnos del aula</h4>

            <div id="listaAlumnos">Cargando...</div>

            <button id="cerrar" class="btn btn-danger mt-3">Cerrar</button>
        </div>
    `;

    document.body.appendChild(overlay);

    document.getElementById("cerrar").onclick = () => overlay.remove();

    const snap = await getDocs(
        query(
            collection(db, "aula_integrantes"),
            where("aulaId", "==", aulaId)
        )
    );

    const lista = document.getElementById("listaAlumnos");

    if (snap.empty) {
        lista.innerHTML = "No hay alumnos";
        return;
    }

    let html = "";

    snap.forEach(d => {
        const a = d.data();

        html += `
            <div>
                <b>${a.nombreResponsable}</b><br>
                <small>${a.email}</small>
            </div>
            <hr>
        `;
    });

    lista.innerHTML = html;
}

//////////////////////////////
// HOVER GLOBAL (FUNCIONA DE VERDAD)
//////////////////////////////

document.addEventListener("mouseover", async (e) => {

    const aulaEl = e.target.closest(".aula-item");
    if (!aulaEl) return;

    const aulaId = aulaEl.dataset.aula;

    hoverBox.style.display = "block";
    hoverBox.innerHTML = "Cargando...";

    const snap = await getDocs(
        query(collection(db, "aula_integrantes"),
        where("aulaId", "==", aulaId))
    );

    let html = "<b>👥 Alumnos</b><br><br>";

    if (snap.empty) {
        html += "Sin alumnos";
    } else {
        snap.forEach(d => {
            const a = d.data();
            html += `<div>${a.nombreResponsable}<br><small>${a.email}</small></div><hr>`;
        });
    }

    hoverBox.innerHTML = html;
});

document.addEventListener("mousemove", (e) => {

    const aulaEl = e.target.closest(".aula-item");

    if (!aulaEl) {
        hoverBox.style.display = "none";
        return;
    }

    hoverBox.style.left = (e.pageX + 15) + "px";
    hoverBox.style.top = (e.pageY + 15) + "px";
});
</script>

</body>
</html>
