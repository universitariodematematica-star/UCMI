<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Plantilla -->
    <link rel="stylesheet" href="componentes/plantilla-academia.css">

    <style>

        .panel-cristal{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:18px;
            padding:30px;
            max-width:900px;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.2);
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,.12);
            color:white;
            border-color:#c5a059;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,.5);
        }

        .btn-registrar{
            background:#c5a059;
            border:none;
            color:#111;
            font-weight:600;
            padding:0 25px;
        }

        .btn-registrar:hover{
            background:#d8b26a;
        }

    </style>

</head>
<body>

<div id="plantilla"></div>

<script type="module">

import { db, auth } from "./componentes/firebase-config.js";

import {
    collection,
    addDoc,
    serverTimestamp,
    doc,
    getDoc,
    deleteDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// ===============================
// CARGAR PLANTILLA
// ===============================
const html = await fetch("componentes/plantilla-academia.html");
document.getElementById("plantilla").innerHTML = await html.text();

// ===============================
// CONTENIDO UI
// ===============================
document.getElementById("contenido").innerHTML = `

<div class="panel-cristal mb-4">

    <h5 class="mb-4">
        Escriba el nombre del aula y pulse <strong>Registrar</strong>.
    </h5>

    <div class="d-flex gap-3">

        <input
            id="txtNombre"
            type="text"
            class="form-control"
            placeholder="Escriba aquí...">

        <button
            id="btnRegistrar"
            class="btn btn-registrar">
            Registrar
        </button>

    </div>

</div>

<div id="listaAulas"></div>

`;

// ===============================
// IMPORT PLANTILLA JS
// ===============================
await import("./componentes/plantilla-academia.js");

// ===============================
// ELEMENTOS
// ===============================
const txtNombre = document.getElementById("txtNombre");
const btnRegistrar = document.getElementById("btnRegistrar");
const listaAulas = document.getElementById("listaAulas");

// ===============================
// REGISTRAR AULA (TU LÓGICA ORIGINAL)
// ===============================
btnRegistrar.addEventListener("click", async () => {

    const nombre = txtNombre.value.trim();

    if (!nombre) return;

    try {

        const usuarioSnap = await getDoc(
            doc(db, "usuarios", auth.currentUser.uid)
        );

        if (!usuarioSnap.exists()) return;

        const datosUsuario = usuarioSnap.data();

        await addDoc(collection(db, "aulas"), {

            nombre_aula: nombre,
            entidad: datosUsuario.entidad,
            academiaId: auth.currentUser.uid,
            fechaCreacion: serverTimestamp()

        });

        txtNombre.value = "";
        txtNombre.focus();

    } catch (error) {
        console.error("ERROR FIRESTORE:", error);
    }

});

// ===============================
// CLICK GLOBAL (EDITAR / ELIMINAR)
// ===============================
document.addEventListener("click", async (e) => {

    // =========================
    // EDITAR AULA
    // =========================
    if (e.target.classList.contains("btn-editar")) {

        const contenedor = e.target.closest(".panel-cristal");
        const h5 = contenedor.querySelector("h5");

        const actual = h5.innerText;
        const nuevo = prompt("Editar aula:", actual);

        if (!nuevo || !nuevo.trim()) return;

        try {

            const id = contenedor.dataset.id;

            await updateDoc(doc(db, "aulas", id), {
                nombre_aula: nuevo.trim()
            });

            h5.innerText = nuevo.trim();

        } catch (err) {
            console.error("Error editando aula:", err);
        }
    }

    // =========================
    // ELIMINAR AULA
    // =========================
    if (e.target.classList.contains("btn-eliminar")) {

        const contenedor = e.target.closest(".panel-cristal");
        const id = contenedor.dataset.id;

        if (!confirm("¿Seguro que deseas eliminar este aula?")) return;

        try {

            await deleteDoc(doc(db, "aulas", id));

            contenedor.remove();

        } catch (err) {
            console.error("Error eliminando aula:", err);
        }
    }

});

// ===============================
// CARGA INICIAL (LISTADO)
// ===============================
async function cargarAulas() {

    const snap = await getDocs(collection(db, "aulas"));

    listaAulas.innerHTML = "";

    snap.forEach(docSnap => {

        const aula = docSnap.data();

        listaAulas.innerHTML += `

        <div class="panel-cristal mb-3 d-flex justify-content-between align-items-center"
             data-id="${docSnap.id}">

            <h5 class="mb-0">${aula.nombre_aula}</h5>

            <div class="d-flex gap-2">

                <button class="btn btn-sm btn-primary btn-editar">
                    ✏️
                </button>

                <button class="btn btn-sm btn-warning btn-curso">
                    🎓
                </button>

                <button class="btn btn-sm btn-info btn-estudiantes">
                    👥
                </button>

                <button class="btn btn-sm btn-danger btn-eliminar">
                    🗑️
                </button>

            </div>

        </div>

        `;
    });
}

cargarAulas();

</script>

</body>
</html>
