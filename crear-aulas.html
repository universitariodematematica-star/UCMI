<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px; 
        }
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="alumnos-academia.html" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>
            <a href="modificaciones.html" class="nav-item-ucmi"><i class="bi bi-pencil-square"></i></i> MODIFICACIONES</a>
            <a href="cursos.html" class="nav-item-ucmi"><i class="bi bi-journal-bookmark"></i> CURSOS</a>
            <a href="aulas.html" class="nav-item-ucmi"><i class="bi bi-easel"></i> AULAS</a>
            <a href="academia-modulos.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="contenidos-academia.html" class="nav-item-ucmi"><i class="bi bi-collection"></i> CONTENIDO</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    addDoc,
    query,
    where,
    onSnapshot,
    deleteDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ======================
// GLOBAL STATE
// ======================
let usuario = null;
let academiaUID = null;
let entidad = null;

// ======================
// AUTH
// ======================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    academiaUID = user.uid;

    const snap = await getDoc(doc(db, "usuarios", user.uid));

    if (!snap.exists()) {
        alert("Usuario sin perfil");
        return;
    }

    usuario = snap.data();
    entidad = usuario.entidad || null;

    const logo = document.getElementById("logoAcademia");
    if (usuario.logoCustom) logo.src = usuario.logoCustom;
    logo.style.opacity = "1";

    renderUI();
    escucharAulas();
});

// ======================
// UI
// ======================
function renderUI() {

    const main = document.querySelector("main");

    main.innerHTML = `
        <div class="container py-5">

            <h2 class="mb-4">Creación de Aulas</h2>

            <div class="card bg-dark text-white p-3 mb-4">

                <div class="d-flex gap-2">
                    <input id="nombreAula" class="form-control" placeholder="Nombre del aula">
                    <button id="btnCrearAula" class="btn btn-warning">
                        Registrar
                    </button>
                </div>

                <small class="mt-2 text-muted">
                    Entidad: <b>${entidad}</b>
                </small>

            </div>

            <div id="listaAulas" class="row g-3"></div>
        </div>

        <!-- MODAL CURSOS -->
        <div id="modalCursos" class="position-fixed top-0 start-0 w-100 h-100 d-none"
             style="background: rgba(0,0,0,0.7); z-index:9999;">
            <div class="container mt-5">
                <div class="card p-3">
                    <h5>Seleccionar curso</h5>
                    <div id="listaCursos"></div>
                    <button class="btn btn-secondary mt-3" onclick="cerrarModalCursos()">Cerrar</button>
                </div>
            </div>
        </div>
    `;

    document.getElementById("btnCrearAula")
        .addEventListener("click", crearAula);
}

// ======================
// CREAR AULA
// ======================
async function crearAula() {

    const input = document.getElementById("nombreAula");
    const nombre = input.value.trim();

    if (!nombre) return alert("Ingresa un nombre de aula");
    if (!entidad) return alert("Sin entidad");

    await addDoc(collection(db, "aulas"), {
        nombre,
        uidAcademia: academiaUID,
        entidad,
        cursoId: null,
        cursoNombre: null,
        createdAt: new Date()
    });

    input.value = "";
}

// ======================
// LISTAR AULAS
// ======================
function escucharAulas() {

    if (!academiaUID) return;

    const q = query(
        collection(db, "aulas"),
        where("uidAcademia", "==", academiaUID)
    );

    onSnapshot(q, (snap) => {

        const cont = document.getElementById("listaAulas");
        if (!cont) return;

        cont.innerHTML = "";

        snap.forEach(docSnap => {

            const d = docSnap.data();

            cont.innerHTML += `
                <div class="col-md-4">
                    <div class="card bg-dark text-white p-3">

                        <h5>${d.nombre}</h5>

                        <small class="text-muted">
                            Curso: ${d.cursoNombre || "Sin asignar"}
                        </small>

                        <div class="mt-3 d-flex gap-2 flex-wrap">

                            <button class="btn btn-sm btn-primary">
                                Editar
                            </button>

                            <button class="btn btn-sm btn-success">
                                Estudiantes
                            </button>

                            <button class="btn btn-sm btn-warning"
                                onclick="abrirCursos('${docSnap.id}')">
                                Curso
                            </button>

                            <button class="btn btn-sm btn-danger"
                                onclick="eliminarAula('${docSnap.id}')">
                                Borrar
                            </button>

                        </div>

                    </div>
                </div>
            `;
        });
    });
}

// ======================
// CURSOS MODAL
// ======================
window.abrirCursos = async (aulaId) => {

    const modal = document.getElementById("modalCursos");
    const cont = document.getElementById("listaCursos");

    modal.classList.remove("d-none");

    const q = query(
        collection(db, "cursos"),
        where("entidad", "==", entidad)
    );

    onSnapshot(q, (snap) => {

        cont.innerHTML = "";

        snap.forEach(curso => {

            const c = curso.data();

            const btn = document.createElement("button");
            btn.className = "btn btn-outline-dark w-100 mb-2";
            btn.innerText = c.nombre;

            btn.onclick = async () => {

                await updateDoc(doc(db, "aulas", aulaId), {
                    cursoId: curso.id,
                    cursoNombre: c.nombre
                });

                cerrarModalCursos();
            };

            cont.appendChild(btn);
        });
    });
};

window.cerrarModalCursos = () => {
    document.getElementById("modalCursos").classList.add("d-none");
};

// ======================
// DELETE
// ======================
window.eliminarAula = async (id) => {
    await deleteDoc(doc(db, "aulas", id));
};

// ======================
// LOGOUT
// ======================
document.getElementById("btnLogout")
    .addEventListener("click", () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });
</script>
    
</body>
</html>
