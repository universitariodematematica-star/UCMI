<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Plantilla -->
    <link rel="stylesheet" href="componentes/plantilla-academia.css">

    <style>

        .panel-cristal{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:18px;
            padding:30px;
            max-width:900px;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.2);
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,.12);
            color:white;
            border-color:#c5a059;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,.5);
        }

        .btn-registrar{
            background:#c5a059;
            border:none;
            color:#111;
            font-weight:600;
            padding:0 25px;
        }

        .btn-registrar:hover{
            background:#d8b26a;
        }

    </style>

</head>
<body>

<div id="plantilla"></div>

<script type="module">

    import {
    collection,
    addDoc,
    serverTimestamp,
    doc,
    getDoc,
    deleteDoc,
    updateDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    // Cargar la plantilla HTML
    const html = await fetch("componentes/plantilla-academia.html");
    document.getElementById("plantilla").innerHTML = await html.text();

    // Marcar opción activa si se desea posteriormente
    // document.querySelectorAll(".nav-item-ucmi")[0].classList.add("active");

    // Contenido de la página
    document.getElementById("contenido").innerHTML = `

    <div class="panel-cristal mb-4">

        <h5 class="mb-4">
            Escriba el nombre del aula y pulse <strong>Registrar</strong>.
        </h5>

        <div class="d-flex gap-3">

            <input
                id="txtNombre"
                type="text"
                class="form-control"
                placeholder="Escriba aquí...">

            <button
                id="btnRegistrar"
                class="btn btn-registrar">
                Registrar
            </button>

        </div>

    </div>

    <div id="listaAulas"></div>

    <div id="syncStatus" class="mt-3 text-warning small">
    🔄 Sincronizando cambios con GitHub Pages...
</div>

`;
    // Cargar comportamiento general de la plantilla
    await import("./componentes/plantilla-academia.js");

    const txtNombre = document.getElementById("txtNombre");
const btnRegistrar = document.getElementById("btnRegistrar");
const listaAulas = document.getElementById("listaAulas");
    
const syncStatus = document.getElementById("syncStatus");
const aulasRef = collection(db, "aulas");

onSnapshot(aulasRef, (snapshot) => {

    listaAulas.innerHTML = "";

    snapshot.forEach(docSnap => {

        const aula = docSnap.data();
        const id = docSnap.id;

        listaAulas.innerHTML += `
            <div class="panel-cristal mb-3 d-flex justify-content-between align-items-center">

                <h5 class="mb-0">${aula.nombre_aula}</h5>

                <div class="d-flex gap-2">

                    <button class="btn btn-sm btn-primary btn-editar" data-id="${id}" data-nombre="${aula.nombre_aula}">
                        ✏️
                    </button>

                    <button class="btn btn-sm btn-warning btn-curso" data-id="${id}">
                        🎓
                    </button>

                    <button class="btn btn-sm btn-info btn-estudiantes" data-id="${id}">
                        👥
                    </button>

                    <button class="btn btn-sm btn-danger btn-eliminar" data-id="${id}">
                        🗑️
                    </button>

                </div>

            </div>
        `;
    });

    syncStatus.innerHTML = "🟢 Sincronizado en tiempo real";

});    

btnRegistrar.addEventListener("click", async () => {

    console.log("===== BOTÓN REGISTRAR =====");

    const nombre = txtNombre.value.trim();

    console.log("Nombre:", nombre);

    if (nombre === "") {
        console.log("El nombre está vacío.");
        return;
    }

    console.log("Usuario autenticado:", auth.currentUser);

    try {

        console.log("Intentando escribir en Firestore...");

// Leer el documento del usuario autenticado
const usuarioSnap = await getDoc(
    doc(db, "usuarios", auth.currentUser.uid)
);

if (!usuarioSnap.exists()) {
    console.error("No existe el documento del usuario.");
    return;
}

const datosUsuario = usuarioSnap.data();

await addDoc(collection(db, "aulas"), {

    nombre_aula: nombre,
    entidad: datosUsuario.entidad,
    academiaId: auth.currentUser.uid,
    fechaCreacion: serverTimestamp()

});

console.log("Documento creado correctamente.");


        txtNombre.value = "";
        txtNombre.focus();

    } catch (error) {

        console.error("ERROR FIRESTORE:");
        console.error(error);

    }

});

document.addEventListener("click", async (e) => {

    // =========================
    // EDITAR AULA
    // =========================
    if (e.target.classList.contains("btn-editar")) {

        const id = e.target.dataset.id;
        const actual = e.target.dataset.nombre;

        const nuevo = prompt("Editar nombre del aula:", actual);

        if (!nuevo || nuevo.trim() === "") return;

        try {

            await updateDoc(doc(db, "aulas", id), {
                nombre_aula: nuevo.trim()
            });

            console.log("Aula actualizada");

        } catch (err) {
            console.error("Error editando aula:", err);
        }
    }

    // =========================
    // ELIMINAR AULA
    // =========================
    if (e.target.classList.contains("btn-eliminar")) {

        const id = e.target.dataset.id;

        if (!confirm("¿Seguro que deseas eliminar este aula?")) return;

        try {

            await deleteDoc(doc(db, "aulas", id));

            console.log("Aula eliminada");

        } catch (err) {
            console.error("Error eliminando aula:", err);
        }
    }

});    
    
    
</script>

</body>
</html>
