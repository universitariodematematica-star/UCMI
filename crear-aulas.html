<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Plantilla -->
    <link rel="stylesheet" href="componentes/plantilla-academia.css">

    <style>

        .panel-cristal{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:18px;
            padding:30px;
            max-width:900px;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.2);
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,.12);
            color:white;
            border-color:#c5a059;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,.5);
        }

        .btn-registrar{
            background:#c5a059;
            border:none;
            color:#111;
            font-weight:600;
            padding:0 25px;
        }

        .btn-registrar:hover{
            background:#d8b26a;
        }

    </style>

</head>
<body>

<div id="plantilla"></div>

<script type="module">

    import { db, auth } from "./componentes/firebase-config.js";
    import {
        collection,
        addDoc,
        serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Cargar la plantilla HTML
    const html = await fetch("componentes/plantilla-academia.html");
    document.getElementById("plantilla").innerHTML = await html.text();

    // Marcar opción activa si se desea posteriormente
    // document.querySelectorAll(".nav-item-ucmi")[0].classList.add("active");

    // Contenido de la página
    document.getElementById("contenido").innerHTML = `

    <div class="panel-cristal mb-4">

        <h5 class="mb-4">
            Escriba el nombre del aula y pulse <strong>Registrar</strong>.
        </h5>

        <div class="d-flex gap-3">

            <input
                id="txtNombre"
                type="text"
                class="form-control"
                placeholder="Escriba aquí...">

            <button
                id="btnRegistrar"
                class="btn btn-registrar">
                Registrar
            </button>

        </div>

    </div>

    <div id="listaAulas"></div>

`;
    // Cargar comportamiento general de la plantilla
    await import("./componentes/plantilla-academia.js");

    const txtNombre = document.getElementById("txtNombre");
const btnRegistrar = document.getElementById("btnRegistrar");
const listaAulas = document.getElementById("listaAulas");

btnRegistrar.addEventListener("click", async () => {

    const nombre = txtNombre.value.trim();

    if (nombre === "") return;

    try {

        await addDoc(collection(db, "aulas"), {

            nombre: nombre,
            uid: auth.currentUser.uid,
            fechaCreacion: serverTimestamp()

        });

        listaAulas.innerHTML += `

            <div class="panel-cristal mb-3">
                <h5 class="mb-0">${nombre}</h5>
            </div>

        `;

        txtNombre.value = "";
        txtNombre.focus();

    } catch (error) {

        console.error("Error registrando aula:", error);

    }

});

</script>

</body>
</html>
