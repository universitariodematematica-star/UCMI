        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi {

        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600;

            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out;

            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px; 
        }

        .container-main {
    max-width: 1200px;
}

.rama-card {
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    backdrop-filter: blur(8px);
}

.rama-title {
    color: #c5a059;
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 1.1rem;
}

.topico-item {
    padding: 8px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.topico-item:last-child {
    border-bottom: none;
}
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="alumnos-academia.html" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>
            <a href="modificaciones.html" class="nav-item-ucmi"><i class="bi bi-pencil-square"></i></i> MODIFICACIONES</a>
            <a href="aulas.html" class="nav-item-ucmi"><i class="bi bi-easel"></i> AULAS</a>
            <a href="academia-modulos.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="contenidos-academia.html" class="nav-item-ucmi"><i class="bi bi-collection"></i> CONTENIDO</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

            <main class="super-overlay">
        
            <div class="container-main">

                <div class="d-flex justify-content-between align-items-center mb-3">

    <h2 id="tituloAsignatura" class="mb-0">Asignatura</h2>

    <div class="d-flex gap-2">

        <a href="crear-asignaturas.html"
           class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left me-1"></i>
            Volver a asignaturas
        </a>

        <a id="btnGestionTopicos"
           href="#"
           class="btn btn-outline-light btn-sm">
            Gestión de tópicos
            <i class="bi bi-arrow-right ms-1"></i>
        </a>

    </div>

</div>
            
                <div id="contenedorRamas"></div>

            </div>
        
            </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs,
    addDoc,
    deleteDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const db = getFirestore(initializeApp({apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"}));
    const auth = getAuth();
    let asignaturaIdGlobal = null;

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    console.log("PASO 1");

    const userSnap = await getDoc(
        doc(db, "usuarios", user.uid)
    );

    if (userSnap.exists()) {

        const d = userSnap.data();

        const logo = document.getElementById('logoAcademia');

        logo.src =
            d.logoCustom ||
            "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";

        logo.style.opacity = "1";

        console.log("PASO 2");
    }

    console.log(window.location.href);

    const params = new URLSearchParams(window.location.search);

    asignaturaIdGlobal = params.get("id");

    console.log("PASO 3", asignaturaIdGlobal);

    if (!asignaturaIdGlobal) {
    console.error("❌ Falta ID en la URL");
    document.getElementById("contenedorRamas").innerHTML =
        "<div class='text-danger'>No se recibió ID de asignatura</div>";
    return;
}

    const asignaturaSnap = await getDoc(
        doc(db, "asignaturas", asignaturaIdGlobal)
    );

    if (!asignaturaSnap.exists()) return;

    const asignatura = asignaturaSnap.data();

    console.log("PASO 4", asignatura);

    document.getElementById("tituloAsignatura").innerText =
        asignatura.asignatura;

    document.getElementById("btnGestionTopicos").href =
    `gestion-topicos.html?id=${asignaturaIdGlobal}`;

    const ramasSnap = await getDocs(
        query(
            collection(db, "ramas"),
            where("moduloId", "==", asignatura.moduloId)
        )
    );

    const ramas = [];

    console.log("RAMAS ENCONTRADAS", ramas.length);

    ramasSnap.forEach(d => {

        ramas.push({
            id: d.id,
            ...d.data(),
            topicos: []
        });

    });

    ramas.sort((a, b) => {

        const nombreA = (a.nombre || "")
            .trim()
            .toLowerCase();

        const nombreB = (b.nombre || "")
            .trim()
            .toLowerCase();

        return nombreA.localeCompare(
            nombreB,
            "es",
            { sensitivity: "base" }
        );

    });

    const asignacionesSnap = await getDocs(
        query(
            collection(db, "asignatura_topicos"),
            where("asignaturaId", "==", asignaturaIdGlobal)
        )
    );

    const asignados = new Set();

    const asignacionMap = new Map();

    asignacionesSnap.forEach(d => {

        const data = d.data();

        asignados.add(data.topicoId);

        asignacionMap.set(
            data.topicoId,
            {
                id: d.id,
                ordenAcademia: Number(
                    data.ordenAcademia || 999999
                )
            }
        );

    });

    const ramasIds = ramas.map(r => r.id);

    console.log("RAMAS IDS", ramasIds);

    if (ramasIds.length === 0) {

        document.getElementById(
            "contenedorRamas"
        ).innerHTML =
        "<div class='text-white-50'>No existen ramas para este módulo.</div>";

        return;
    }

    const topicosSnap = await getDocs(
        query(
            collection(db, "topicos"),
            where("ramaId", "in", ramasIds)
        )
    );

    topicosSnap.forEach(d => {

        const t = d.data();

        const rama = ramas.find(
            r => r.id === t.ramaId
        );

        if (!rama) return;

        const asignacion =
            asignacionMap.get(d.id);

        rama.topicos.push({

            id: d.id,

            tema: t.tema,

            ordenUcmi: Number(
                t.orden ??
                t.order ??
                t.ordenUCMI ??
                999999
            ),

            asignado: asignados.has(d.id),

            asignacionId:
                asignacion?.id || null,

            ordenAcademia: Number(
                asignacion?.ordenAcademia ||
                999999
            )

        });

    });

    ramas.forEach(rama => {

        rama.topicos.sort((a, b) => {

            const oa = parseInt(
                a.ordenUcmi ?? 999999
            );

            const ob = parseInt(
                b.ordenUcmi ?? 999999
            );

            if (oa !== ob) {
                return oa - ob;
            }

            return (a.tema || "")
                .localeCompare(
                    b.tema || "",
                    "es"
                );

        });

    });

    const cont =
        document.getElementById(
            "contenedorRamas"
        );

    console.log("LLEGUÉ AL RENDER");

    cont.innerHTML = "";

    ramas.forEach(rama => {

        cont.insertAdjacentHTML(
            "beforeend",
            `
            <div class="rama-card">

                <div class="rama-title">
                    ${rama.nombre}
                </div>

                <div>

                    ${
                        rama.topicos.length === 0

                        ? "<small style='opacity:0.6;'>Sin tópicos</small>"

                        : rama.topicos.map(t => `

                            <div class="topico-item">

                                <span>${t.tema}</span>

                                <button
                                    class="btn btn-sm ${t.asignado ? 'btn-danger' : 'btn-outline-warning'} btn-toggle"
                                    data-id="${t.id}"
                                    data-asignado="${t.asignado}"
                                    data-asignacion="${t.asignacionId || ''}">

                                    ${t.asignado ? 'Quitar' : 'Asignar'}

                                </button>

                            </div>

                        `).join("")
                    }

                </div>

            </div>
            `
        );

    });

});

document.addEventListener("click", async (e) => {

    if (!e.target.classList.contains("btn-toggle")) return;

    const topicoId = e.target.dataset.id;

    const asignado =
        e.target.dataset.asignado === "true";

    const asignacionId =
        e.target.dataset.asignacion;

    // =====================
    // ASIGNAR
    // =====================

    if (!asignado) {

        const asignacionesExistentes =
            await getDocs(
                query(
                    collection(db, "asignatura_topicos"),
                    where(
                        "asignaturaId",
                        "==",
                        asignaturaIdGlobal
                    )
                )
            );

        let maxOrden = 0;

        asignacionesExistentes.forEach(docu => {

            const data = docu.data();

            const orden = Number(
                data.ordenAcademia || 0
            );

            if (orden > maxOrden) {
                maxOrden = orden;
            }

        });

        await addDoc(
            collection(db, "asignatura_topicos"),
            {
                asignaturaId: asignaturaIdGlobal,
                topicoId: topicoId,
                ordenAcademia: maxOrden + 1,
                fechaAsignacion: serverTimestamp()
            }
        );

    }

    // =====================
    // DESASIGNAR
    // =====================

    else {

        if (asignacionId) {

            await deleteDoc(
                doc(
                    db,
                    "asignatura_topicos",
                    asignacionId
                )
            );

        }

    }

    location.reload();

});    

document.getElementById('btnLogout')
.addEventListener('click', () =>
    signOut(auth)
        .then(() => window.location.href = "index.html")
);    

    
</script>
    
</body>
</html>
