<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Tópicos de Asignatura</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            background: #0b0f14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .container-box {
            max-width: 1100px;
            margin: 40px auto;
        }

        .card-glass {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(12px);
        }

        .topico-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .topico-row:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

<div class="container-box">

    <div class="card-glass mb-4">
        <h3 id="tituloAsignatura">Cargando...</h3>
        <p class="opacity-75 mb-0">Asignación de tópicos desde el repositorio</p>
    </div>

    <div class="card-glass">
        <h5 class="mb-3">Tópicos disponibles</h5>
        <div id="listaTopicos"></div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs,
    onSnapshot,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// INIT FIREBASE
const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
});

const db = getFirestore(app);
const auth = getAuth();

let asignaturaData = null;
let ramasPermitidas = [];

// ===================== AUTH =====================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    // 1. ID de asignatura desde URL
    const params = new URLSearchParams(window.location.search);
    const asignaturaId = params.get("id");

    if (!asignaturaId) {
        console.error("No hay ID de asignatura");
        return;
    }

    // 2. Obtener asignatura
    const asignaturaSnap = await getDoc(doc(db, "asignaturas", asignaturaId));

    if (!asignaturaSnap.exists()) {
        console.error("Asignatura no existe");
        return;
    }

    asignaturaData = asignaturaSnap.data();

    // 3. OBTENER RAMAS DEL MODULO
    const ramasQuery = query(
        collection(db, "ramas"),
        where("moduloId", "==", asignaturaData.moduloId)
    );

    const ramasSnap = await getDocs(ramasQuery);

    ramasPermitidas = ramasSnap.docs.map(d => d.id);

    console.log("Ramas permitidas:", ramasPermitidas);

    if (ramasPermitidas.length === 0) {
        document.querySelector("main").innerHTML =
            "<h3>No hay ramas para este módulo</h3>";
        return;
    }

    // 4. ESCUCHAR TÓPICOS EN TIEMPO REAL
    const topicosQuery = query(
        collection(db, "topicos"),
        where("ramaId", "in", ramasPermitidas),
        orderBy("orden", "asc")
    );

    onSnapshot(topicosQuery, (snapshot) => {

        const main = document.querySelector("main");
        main.innerHTML = "";

        if (snapshot.empty) {
            main.innerHTML = "<h3>No hay tópicos disponibles</h3>";
            return;
        }

        snapshot.forEach(docu => {

            const t = docu.data();

            main.insertAdjacentHTML("beforeend", `
                <div class="p-3 mb-2 rounded"
                     style="background: rgba(255,255,255,0.08); cursor:pointer;">

                    <strong>${t.tema}</strong>

                    <div style="font-size:12px; opacity:0.7;">
                        Orden: ${t.orden}
                    </div>

                </div>
            `);

        });

    });

});

// LOGOUT
document.getElementById("btnLogout")
.addEventListener("click", () =>
    signOut(auth).then(() =>
        window.location.href = "index.html"
    )
);

</script>
</body>
</html>
