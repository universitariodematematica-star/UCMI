<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tópicos por Rama</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f14;
            color: white;
        }

        .container-main {
            padding: 30px;
        }

        .rama-card {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .rama-title {
            color: #c5a059;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .topico-item {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }

        .topico-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

<div class="container-main">

    <h2 id="tituloAsignatura">Asignatura</h2>

    <div id="contenedorRamas"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// ===================== INIT =====================
const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
});

const db = getFirestore(app);
const auth = getAuth();

// ===================== MAIN =====================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    const params = new URLSearchParams(window.location.search);
    const asignaturaId = params.get("id");

    if (!asignaturaId) return;

    // ===================== 1. ASIGNATURA =====================
    const asignaturaSnap = await getDoc(
        doc(db, "asignaturas", asignaturaId)
    );

    if (!asignaturaSnap.exists()) return;

    const asignatura = asignaturaSnap.data();

    document.getElementById("tituloAsignatura").innerText =
        asignatura.asignatura;

    // ===================== 2. RAMAS =====================
    const ramasSnap = await getDocs(
        query(
            collection(db, "ramas"),
            where("moduloId", "==", asignatura.moduloId)
        )
    );

    const ramas = [];

    ramasSnap.forEach(docu => {
        ramas.push({
            id: docu.id,
            ...docu.data(),
            topicos: []
        });
    });

    if (ramas.length === 0) {
        document.getElementById("contenedorRamas").innerHTML =
            "<p>No hay ramas disponibles</p>";
        return;
    }

    // ===================== 3. TÓPICOS =====================
    const ramasIds = ramas.map(r => r.id);

    const topicosSnap = await getDocs(
        query(
            collection(db, "topicos"),
            where("ramaId", "in", ramasIds)
        )
    );

    topicosSnap.forEach(docu => {

        const t = docu.data();

        const rama = ramas.find(r => r.id === t.ramaId);

        if (rama) {
            rama.topicos.push({
                ...t,
                orden: Number(t.orden)
            });
        }
    });

    // ===================== 4. ORDENAR (CRÍTICO) =====================
    ramas.forEach(rama => {
        rama.topicos.sort((a, b) => a.orden - b.orden);
    });

    // ===================== 5. RENDER =====================
    const cont = document.getElementById("contenedorRamas");
    cont.innerHTML = "";

    ramas.forEach(rama => {

        cont.insertAdjacentHTML("beforeend", `
            <div class="rama-card">

                <div class="rama-title">
                    ${rama.nombre}
                </div>

                <div>
                    ${
                        rama.topicos.length === 0
                        ? "<small style='opacity:0.6;'>Sin tópicos</small>"
                        : rama.topicos.map(t => `
                            <div class="topico-item">
                                ${t.tema}
                            </div>
                        `).join("")
                    }
                </div>

            </div>
        `);

    });

});

</script>

</body>
</html>
