<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Tópicos de Asignatura</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            background: #0b0f14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .container-box {
            max-width: 1100px;
            margin: 40px auto;
        }

        .card-glass {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(12px);
        }

        .topico-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .topico-row:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

<div class="container-box">

    <div class="card-glass mb-4">
        <h3 id="tituloAsignatura">Cargando...</h3>
        <p class="opacity-75 mb-0">Asignación de tópicos desde el repositorio</p>
    </div>

    <div class="card-glass">
        <h5 class="mb-3">Tópicos disponibles</h5>
        <div id="listaTopicos"></div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    getDocs,
    addDoc,
    query,
    where,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// INIT
const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634"
});

const db = getFirestore(app);
const auth = getAuth();

// ===================== URL =====================
const params = new URLSearchParams(window.location.search);
const asignaturaId = params.get("id");

let entidadGlobal = null;
let asignaturaData = null;
let ramasPermitidas = new Set();

// ===================== LOGIN =====================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    const userSnap = await getDoc(doc(db, "usuarios", user.uid));
    entidadGlobal = userSnap.data().entidad;

    const asigSnap = await getDoc(doc(db, "asignaturas", asignaturaId));

    if (!asigSnap.exists()) return;

    asignaturaData = asigSnap.data();

    document.getElementById("tituloAsignatura").innerText =
        asignaturaData.asignatura;

    await cargarRamas();
    await cargarTopicos();
});

// ===================== RAMAS =====================
async function cargarRamas() {

    ramasPermitidas.clear();

    const q = query(
        collection(db, "ramas"),
        where("modulo", "==", asignaturaData.modulo)
    );

    const snap = await getDocs(q);

    snap.forEach(r => {
        ramasPermitidas.add(r.id);
    });

    console.log("Ramas permitidas:", [...ramasPermitidas]);
}

// ===================== TÓPICOS =====================
async function cargarTopicos() {

    const contenedor = document.getElementById("listaTopicos");
    contenedor.innerHTML = "";

    const snap = await getDocs(collection(db, "topicos"));

    let filtrados = [];

    snap.forEach(docu => {

        const t = docu.data();

        if (ramasPermitidas.has(t.ramaId)) {
            filtrados.push({ id: docu.id, ...t });
        }
    });

    if (filtrados.length === 0) {
        contenedor.innerHTML = `
            <div class="text-warning">
                No hay tópicos disponibles para este módulo.
            </div>
        `;
        return;
    }

    filtrados.sort((a, b) => a.orden - b.orden);

    filtrados.forEach(t => {

        contenedor.innerHTML += `
            <div class="topico-row">

                <div>
                    <strong>${t.tema}</strong>
                </div>

                <button class="btn btn-success btn-sm btn-asignar"
                    data-id="${t.id}"
                    data-tema="${t.tema}">
                    Asignar
                </button>

            </div>
        `;
    });

    document.querySelectorAll(".btn-asignar")
    .forEach(btn => {

        btn.addEventListener("click", async () => {

            btn.disabled = true;

            await addDoc(collection(db, "asignaturas_topicos"), {
                asignaturaId,
                topicoId: btn.dataset.id,
                tema: btn.dataset.tema,
                entidad: entidadGlobal,
                fechaAsignacion: serverTimestamp()
            });

            btn.innerText = "Asignado";
            btn.classList.remove("btn-success");
            btn.classList.add("btn-secondary");
        });
    });
}

</script>

</body>
</html>
