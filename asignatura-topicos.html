<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tópicos de Asignatura</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f14;
            color: white;
        }

        .sidebar {
            width: 260px;
            background: rgba(26,42,58,0.5);
            backdrop-filter: blur(15px);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
        }

        .super-overlay {
            margin-left: 260px;
            padding: 30px;
        }

        .topico-card {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .topico-card:hover {
            transform: translateX(5px);
            background: rgba(255,255,255,0.12);
        }

    </style>
</head>

<body>

<div class="sidebar">
    <img id="logoAcademia" style="width:100%; opacity:0; margin-bottom:20px;">
    <a href="#" id="btnLogout" class="btn btn-danger w-100">Cerrar sesión</a>
</div>

<div class="super-overlay">

    <h2 id="tituloAsignatura">Tópicos</h2>

    <div id="contenedorTopicos"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs,
    onSnapshot,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
});

const db = getFirestore(app);
const auth = getAuth();

let asignatura = null;
let ramasIds = [];

// ===================== AUTH =====================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    const params = new URLSearchParams(window.location.search);
    const asignaturaId = params.get("id");

    if (!asignaturaId) return;

    // 1. ASIGNATURA
    const asignaturaSnap = await getDoc(doc(db, "asignaturas", asignaturaId));

    if (!asignaturaSnap.exists()) return;

    asignatura = asignaturaSnap.data();

    document.getElementById("tituloAsignatura").innerText =
        asignatura.asignatura;

    // 2. RAMAS DEL MÓDULO
    const ramasSnap = await getDocs(
        query(
            collection(db, "ramas"),
            where("moduloId", "==", asignatura.moduloId)
        )
    );

    ramasIds = ramasSnap.docs.map(d => d.id);

    if (ramasIds.length === 0) {
        document.getElementById("contenedorTopicos").innerHTML =
            "<p>No hay ramas en este módulo</p>";
        return;
    }

    // 3. TÓPICOS
    const topicosQuery = query(
        collection(db, "topicos"),
        where("ramaId", "in", ramasIds),
        orderBy("orden", "asc")
    );

    onSnapshot(topicosQuery, (snap) => {

        const cont = document.getElementById("contenedorTopicos");
        cont.innerHTML = "";

        if (snap.empty) {
            cont.innerHTML = "<p>No hay tópicos disponibles</p>";
            return;
        }

        snap.forEach(docu => {

            const t = docu.data();

            cont.insertAdjacentHTML("beforeend", `
                <div class="topico-card">

                    <strong>${t.tema}</strong>

                    <div style="font-size:12px; opacity:0.7;">
                        Orden: ${t.orden}
                    </div>

                </div>
            `);

        });

    });

});

// ===================== LOGOUT =====================
document.getElementById("btnLogout")
.addEventListener("click", () =>
    signOut(auth).then(() =>
        window.location.href = "index.html"
    )
);

</script>

</body>
</html>
