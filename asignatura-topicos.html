<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tópicos por Rama</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f14;
            color: white;
        }

        .container-main {
            padding: 30px;
        }

        .rama-card {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .rama-title {
            color: #c5a059;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .topico-item {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topico-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

<div class="container-main">
    <h2 id="tituloAsignatura">Asignatura</h2>
    <div id="contenedorRamas"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs,
    addDoc,
    deleteDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// ===================== INIT =====================
const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
});

const db = getFirestore(app);
const auth = getAuth();

let asignaturaIdGlobal = null;

// ===================== MAIN =====================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    const params = new URLSearchParams(window.location.search);
    asignaturaIdGlobal = params.get("id");
    if (!asignaturaIdGlobal) return;

    // ===================== ASIGNATURA =====================
    const asignaturaSnap = await getDoc(
        doc(db, "asignaturas", asignaturaIdGlobal)
    );

    if (!asignaturaSnap.exists()) return;

    const asignatura = asignaturaSnap.data();

    document.getElementById("tituloAsignatura").innerText =
        asignatura.asignatura;

    // ===================== RAMAS =====================
    const ramasSnap = await getDocs(
        query(
            collection(db, "ramas"),
            where("moduloId", "==", asignatura.moduloId)
        )
    );

    const ramas = [];

    ramasSnap.forEach(d => {
        ramas.push({
            id: d.id,
            ...d.data(),
            topicos: []
        });
    });

    // ===================== ASIGNACIONES =====================
    const asignacionesSnap = await getDocs(
        query(
            collection(db, "asignatura_topicos"),
            where("asignaturaId", "==", asignaturaIdGlobal)
        )
    );

    const asignados = new Set();
    const asignacionMap = new Map();

    asignacionesSnap.forEach(d => {
        const data = d.data();
        asignados.add(data.topicoId);
        asignacionMap.set(data.topicoId, {
    id: d.id,
    ordenAcademia: Number(data.ordenAcademia || 999999)
});
    });

    // ===================== TÓPICOS =====================
    const ramasIds = ramas.map(r => r.id);

    const topicosSnap = await getDocs(
        query(
            collection(db, "topicos"),
            where("ramaId", "in", ramasIds)
        )
    );

    // 🔥 NORMALIZACIÓN DE DATOS (CLAVE PARA FUTURO DRAG & DROP)
    topicosSnap.forEach(d => {

        const t = d.data();
        const rama = ramas.find(r => r.id === t.ramaId);

        if (!rama) return;

        const asignacion = asignacionMap.get(d.id);

        rama.topicos.push({
    id: d.id,
    tema: t.tema,

    // 🔥 ORDEN ORIGINAL DE UCMI
    ordenUcmi: Number(
    t.orden ??
    t.order ??
    t.ordenUCMI ??
    999999
),

    asignado: asignados.has(d.id),
    asignacionId: asignacion?.id || null,

    // 🔥 ORDEN PROPIO DE LA ACADEMIA
    ordenAcademia: Number(
        asignacion?.ordenAcademia || 999999
    )
});
    });

    // ===================== ORDEN FINAL (IMPORTANTE) =====================
ramas.forEach(rama => {

    rama.topicos.sort((a, b) => {

        const oa = parseInt(a.ordenUcmi ?? 999999);
        const ob = parseInt(b.ordenUcmi ?? 999999);

        if (oa !== ob) return oa - ob;

        // fallback: orden estable por nombre (evita caos visual)
        return (a.tema || "").localeCompare(b.tema || "es");

    });

});

    // ===================== RENDER =====================
    const cont = document.getElementById("contenedorRamas");
    cont.innerHTML = "";

    ramas.forEach(rama => {

        cont.insertAdjacentHTML("beforeend", `
            <div class="rama-card">

                <div class="rama-title">
                    ${rama.nombre}
                </div>

                <div>
                    ${
                        rama.topicos.length === 0
                        ? "<small style='opacity:0.6;'>Sin tópicos</small>"
                        : rama.topicos.map(t => `
                            <div class="topico-item">

                                <span>${t.tema}</span>

                                <button class="btn btn-sm ${t.asignado ? 'btn-danger' : 'btn-outline-warning'} btn-toggle"
                                    data-id="${t.id}"
                                    data-asignado="${t.asignado}"
                                    data-asignacion="${t.asignacionId || ''}">
                                    ${t.asignado ? 'Quitar' : 'Asignar'}
                                </button>

                            </div>
                        `).join("")
                    }
                </div>

            </div>
        `);

    });

});

// ===================== ASIGNAR / DESASIGNAR =====================
document.addEventListener("click", async (e) => {

    if (!e.target.classList.contains("btn-toggle")) return;

    const topicoId = e.target.dataset.id;
    const asignado = e.target.dataset.asignado === "true";
    const asignacionId = e.target.dataset.asignacion;

    // ===================== ASIGNAR =====================
if (!asignado) {

    const asignacionesExistentes = await getDocs(
        query(
            collection(db, "asignatura_topicos"),
            where("asignaturaId", "==", asignaturaIdGlobal)
        )
    );

    let maxOrden = 0;

    asignacionesExistentes.forEach(docu => {

        const data = docu.data();

        const orden = Number(data.ordenAcademia || 0);

        if (orden > maxOrden) {
            maxOrden = orden;
        }

    });

    await addDoc(collection(db, "asignatura_topicos"), {
        asignaturaId: asignaturaIdGlobal,
        topicoId: topicoId,
        ordenAcademia: maxOrden + 1,
        fechaAsignacion: serverTimestamp()
    });

}

    // ===================== DESASIGNAR =====================
    else {

        if (asignacionId) {
            await deleteDoc(doc(db, "asignatura_topicos", asignacionId));
        }

    }

    location.reload();
});

</script>

</body>
</html>
