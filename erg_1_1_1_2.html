<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordena las palabras</title>

<style>
body {
    font-family: Arial, sans-serif;
    display: none;
}

.sentenceContainer {
    display: flex;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.wordButton {
    padding: 8px 15px;
    background-color: #007BFF;
    margin: 5px;
    cursor: pointer;
    border: none;
    color: black;
    border-radius: 6px;
}

.wordButton:hover {
    background-color: violet;
    border: 1px solid black;
}

.sentenceBlank {
    width: 100%;
    min-height: 60px;
    background-color: #f0f0f0;
    border: 2px dashed #ccc;
    margin-bottom: 20px;
}

.checkButton, .redirectButton, .obtainCertificateButton {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: not-allowed;
}

.checkButton:hover {
    background-color: violet;
    cursor: pointer;
}

.result {
    margin-top: 10px;
    font-weight: bold;
}

.correct {
    background-color: #7FFF7F !important;
}

.incorrect {
    background-color: #FF7F7F !important;
}

.obtainCertificateButton {
    display: none;
}
</style>

<script type="module" src="protect.js"></script>
</head>

<body>

<h2>Ordena las palabras en la oración</h2>

<div class="sentenceContainer"></div>
<div class="sentenceBlank"></div>

<button class="checkButton" onclick="checkAnswer()">Evaluar</button>
<p class="result"></p>

<button class="redirectButton" onclick="nextSentence()" disabled>Siguiente</button>
<button class="obtainCertificateButton" onclick="getCertificate()">Certificado</button>

<script>

const sentences = [
["Nice","to","meet","you!"],
["My","name","is","John"],
["Where","are","you","from?"]
];

let index = 0;

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function render() {
    const container = document.querySelector(".sentenceContainer");
    const blank = document.querySelector(".sentenceBlank");

    container.innerHTML = "";
    blank.innerHTML = "";

    shuffle([...sentences[index]]).forEach(word => {
        const btn = document.createElement("button");
        btn.textContent = word;
        btn.className = "wordButton";
        btn.draggable = true;

        btn.ondragstart = e => e.dataTransfer.setData("text", word);

        container.appendChild(btn);
    });
}

document.querySelector(".sentenceBlank").ondragover = e => e.preventDefault();

document.querySelector(".sentenceBlank").ondrop = e => {
    e.preventDefault();
    const word = e.dataTransfer.getData("text");

    const btn = document.createElement("button");
    btn.textContent = word;
    btn.className = "wordButton";

    document.querySelector(".sentenceBlank").appendChild(btn);
};

function checkAnswer() {
    const user = [...document.querySelector(".sentenceBlank").children].map(b => b.textContent);
    const correct = sentences[index];

    const result = document.querySelector(".result");

    if (JSON.stringify(user) === JSON.stringify(correct)) {
        result.textContent = "Correcto";
        result.style.color = "green";

        document.querySelector(".redirectButton").disabled = false;

        if (index === sentences.length - 1) {
            document.querySelector(".obtainCertificateButton").style.display = "inline-block";
        }

    } else {
        result.textContent = "Incorrecto";
        result.style.color = "red";
    }
}

function nextSentence() {
    index++;
    if (index < sentences.length) {
        render();
        document.querySelector(".result").textContent = "";
        document.querySelector(".redirectButton").disabled = true;
    }
}

function getCertificate() {
    window.location.href = "certificado.html";
}

render();

</script>

</body>
</html>
