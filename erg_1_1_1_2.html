<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordena las palabras</title>

<style>
body {
    font-family: Arial, sans-serif;
}

.sentenceContainer {
    display: flex;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.wordButton {
    padding: 8px 15px;
    background-color: #007BFF;
    margin: 5px;
    cursor: grab;
    border: none;
    color: white;
    border-radius: 6px;
}

.sentenceBlank {
    width: 100%;
    min-height: 60px;
    background-color: #f0f0f0;
    border: 2px dashed #ccc;
    margin-bottom: 20px;
    padding: 10px;
}

.checkButton, .redirectButton, .obtainCertificateButton {
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
}

.redirectButton {
    background: gray;
}

.obtainCertificateButton {
    display: none;
}
</style>

<script type="module" src="protect.js"></script>
</head>

<body>

<h2>Ordena las palabras en la oración</h2>

<div class="sentenceContainer"></div>
<div class="sentenceBlank"></div>

<button class="checkButton" onclick="checkAnswer()">Evaluar</button>
<p class="result"></p>

<button class="redirectButton" onclick="nextSentence()" disabled>Siguiente</button>
<button class="obtainCertificateButton" onclick="getCertificate()">Certificado</button>

<script type="module">

import { db, auth } from "./firebase.js";
import { doc, setDoc, getDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---------------- DATA ----------------
const sentences = [
["Nice","to","meet","you!"],
["My","name","is","John"],
["Where","are","you","from?"]
];

let index = parseInt(localStorage.getItem("orden_index")) || 0;

// ---------------- SHUFFLE ----------------
function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
}

// ---------------- RENDER ----------------
function render() {

    const container = document.querySelector(".sentenceContainer");
    const blank = document.querySelector(".sentenceBlank");

    container.innerHTML = "";
    blank.innerHTML = "";

    const shuffled = shuffle(sentences[index]);

    shuffled.forEach(word => {

        const btn = document.createElement("button");
        btn.textContent = word;
        btn.className = "wordButton";
        btn.draggable = true;

        btn.addEventListener("dragstart", e => {
            e.dataTransfer.setData("text/plain", word);
        });

        container.appendChild(btn);
    });
}

// ---------------- DROP ----------------
const blankArea = document.querySelector(".sentenceBlank");

blankArea.addEventListener("dragover", e => e.preventDefault());

blankArea.addEventListener("drop", e => {
    e.preventDefault();

    const word = e.dataTransfer.getData("text/plain");

    const btn = document.createElement("button");
    btn.textContent = word;
    btn.className = "wordButton";

    blankArea.appendChild(btn);
});

// ---------------- CHECK ----------------
window.checkAnswer = async function () {

    const user = auth.currentUser;
    if (!user) {
        alert("Usuario no autenticado");
        return;
    }

    const userAnswer = [...document.querySelector(".sentenceBlank").children]
        .map(b => b.textContent);

    const correct = sentences[index];

    const result = document.querySelector(".result");

    const isCorrect = JSON.stringify(userAnswer) === JSON.stringify(correct);

    if (isCorrect) {
        result.textContent = "Correcto";
        result.style.color = "green";

        document.querySelector(".redirectButton").disabled = false;

        if (index === sentences.length - 1) {
            document.querySelector(".obtainCertificateButton").style.display = "inline-block";
        }

    } else {
        result.textContent = "Incorrecto";
        result.style.color = "red";
    }

    // ---------------- GUARDAR MEJOR INTENTO ----------------
    const docId = user.email + "_ordenar_" + index;
    const ref = doc(db, "grades", docId);

    const newScore = isCorrect ? 1 : 0;

    const existing = await getDoc(ref);

    if (existing.exists()) {
        const oldScore = existing.data().score;
        if (newScore <= oldScore) return;
    }

    await setDoc(ref, {
        email: user.email,
        exercise: "ordenar_" + index,
        score: newScore,
        total: 1,
        timestamp: serverTimestamp()
    });

    console.log("✅ guardado");
};

// ---------------- NEXT ----------------
window.nextSentence = function () {

    index++;
    localStorage.setItem("orden_index", index);

    if (index < sentences.length) {
        render();
        document.querySelector(".result").textContent = "";
        document.querySelector(".redirectButton").disabled = true;
    }
};

// ---------------- CERTIFICADO ----------------
window.getCertificate = function () {
    localStorage.removeItem("orden_index");
    window.location.href = "logrado_erg_1_1_1.html";
};

// ---------------- INIT ----------------
document.addEventListener("DOMContentLoaded", () => {
    render();
});

</script>

</body>
</html>
