<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordena las palabras</title>

<style>
body {
    font-family: Arial, sans-serif;
}

.sentenceContainer {
    display: flex;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.wordButton {
    padding: 8px 15px;
    background-color: #007BFF;
    margin: 5px;
    cursor: pointer;
    border: none;
    color: black;
    border-radius: 6px;
}

.wordButton:hover {
    background-color: violet;
    border: 1px solid black;
}

.sentenceBlank {
    display: block;
    width: 100%;
    min-height: 60px;
    background-color: #f0f0f0;
    border: 2px dashed #ccc;
    margin-bottom: 20px;
}

.checkButton, .redirectButton, .obtainCertificateButton {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: not-allowed;
}

.checkButton:hover {
    background-color: violet;
    cursor: pointer;
}

.result {
    margin-top: 10px;
    font-weight: bold;
}

.correct {
    background-color: #7FFF7F !important;
}

.incorrect {
    background-color: #FF7F7F !important;
}

.obtainCertificateButton {
    display: none;
}
</style>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
    getFirestore, 
    addDoc, 
    collection, 
    serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
    authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
    projectId: "portal-autenticacion-a1ngles",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= EJERCICIO =================

const sentences = [
["Nice","to","meet","you!"],
["My","name","is","John"],
["Where","are","you","from?"]
];

let index = parseInt(localStorage.getItem("orden_index")) || 0;

// -------- SHUFFLE --------
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// -------- CREAR BOTONES --------
function createButton(word) {
    const button = document.createElement("button");
    button.textContent = word;
    button.classList.add("wordButton");
    button.draggable = true;

    button.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("text/plain", word);
    });

    return button;
}

// -------- RENDER --------
function render() {

    const container = document.querySelector(".sentenceContainer");
    const blank = document.querySelector(".sentenceBlank");

    container.innerHTML = "";
    blank.innerHTML = "";

    const shuffled = [...sentences[index]];
    shuffleArray(shuffled);

    shuffled.forEach(word => {
        container.appendChild(createButton(word));
    });
}

// -------- DRAG & DROP --------
const blankArea = document.querySelector(".sentenceBlank");

blankArea.addEventListener("dragover", e => e.preventDefault());

blankArea.addEventListener("drop", e => {
    e.preventDefault();

    const word = e.dataTransfer.getData("text/plain");

    blankArea.appendChild(createButton(word));
});

// -------- EVALUAR --------
window.checkAnswer = function () {

    const user = [...document.querySelector(".sentenceBlank").children]
        .map(b => b.textContent);

    const correct = sentences[index];

    const result = document.querySelector(".result");

    if (JSON.stringify(user) === JSON.stringify(correct)) {

        result.textContent = "Correcto";
        result.style.color = "green";

        document.querySelector(".redirectButton").disabled = false;

        localStorage.setItem("orden_index", index);

        if (index === sentences.length - 1) {
            document.querySelector(".obtainCertificateButton").style.display = "inline-block";
        }

    } else {
        result.textContent = "Incorrecto";
        result.style.color = "red";
    }
};

// -------- SIGUIENTE --------
window.nextSentence = function () {

    index++;
    localStorage.setItem("orden_index", index);

    if (index < sentences.length) {
        render();
        document.querySelector(".result").textContent = "";
        document.querySelector(".redirectButton").disabled = true;
    }
};

// -------- CERTIFICADO (🔥 FIREBASE) --------
window.getCertificate = async function () {

    const user = auth.currentUser;

    if (!user) {
        alert("Usuario no autenticado");
        return;
    }

    try {
        await addDoc(collection(db, "grades"), {
            studentUID: user.uid,
            studentEmail: user.email,
            exercise: "Ordena las palabras",
            score: 10,
            maxScore: 10,
            type: "grammar",
            createdAt: serverTimestamp()
        });

        alert("✅ Progreso guardado");

        localStorage.removeItem("orden_index");

    } catch (e) {
        console.error(e);
        alert("Error guardando");
    }
};

// -------- INIT --------
window.onload = function () {
    render();
};

</script>
</head>

<body>

<h2>Ordena las palabras en la oración</h2>

<div class="sentenceContainer"></div>
<div class="sentenceBlank"></div>

<button class="checkButton" onclick="checkAnswer()">Evaluar</button>
<p class="result"></p>

<button class="redirectButton" onclick="nextSentence()" disabled>Siguiente</button>
<button class="obtainCertificateButton" onclick="getCertificate()">Certificado</button>

</body>
</html>
