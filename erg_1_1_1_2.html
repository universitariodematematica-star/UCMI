<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ordena las palabras</title>

<style>
body {
    font-family: Arial, sans-serif;
}

.sentenceContainer {
    display: flex;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.wordButton {
    padding: 8px 15px;
    background-color: #007BFF;
    margin: 5px;
    cursor: pointer;
    border: none;
    color: black;
    border-radius: 6px;
}

.wordButton:hover {
    background-color: violet;
    border: 1px solid black;
}

.sentenceBlank {
    width: 100%;
    min-height: 60px;
    background-color: #f0f0f0;
    border: 2px dashed #ccc;
    margin-bottom: 20px;
}

.checkButton, .redirectButton, .obtainCertificateButton {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: not-allowed;
}

.checkButton:hover {
    background-color: violet;
    cursor: pointer;
}

.result {
    margin-top: 10px;
    font-weight: bold;
}

.correct {
    background-color: #7FFF7F !important;
}

.incorrect {
    background-color: #FF7F7F !important;
}

.obtainCertificateButton {
    display: none;
}
</style>

</head>

<body>

<h2>Ordena las palabras en la oración</h2>

<div class="sentenceContainer"></div>
<div class="sentenceBlank"></div>

<button class="checkButton" onclick="checkAnswer()">Evaluar</button>
<p class="result"></p>

<button class="redirectButton" onclick="nextSentence()" disabled>Siguiente</button>
<button class="obtainCertificateButton" onclick="getCertificate()">Certificado</button>

<script>

const sentences = [
["Nice","to","meet","you!"],
["My","name","is","John"],
["Where","are","you","from?"]
];

// 🔥 PROGRESO
let index = parseInt(localStorage.getItem("orden_index")) || 0;

// 🔥 CREAR BOTÓN
function createButton(word) {
    const btn = document.createElement("button");
    btn.textContent = word;
    btn.className = "wordButton";
    btn.draggable = true;

    btn.addEventListener("dragstart", dragStart);

    return btn;
}

// 🔥 SHUFFLE REAL
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// 🔥 RENDER
function render() {
    const container = document.querySelector(".sentenceContainer");
    const blank = document.querySelector(".sentenceBlank");

    container.innerHTML = "";
    blank.innerHTML = "";

    const shuffled = [...sentences[index]];
    shuffleArray(shuffled);

    shuffled.forEach(word => {
        container.appendChild(createButton(word));
    });

    document.querySelector(".result").textContent = "";
    document.querySelector(".redirectButton").disabled = true;
}

// 🔥 DRAG
function dragStart(e) {
    e.dataTransfer.setData("text/plain", e.target.textContent);
}

function dragOver(e) {
    e.preventDefault();
}

function drop(e) {
    e.preventDefault();

    const word = e.dataTransfer.getData("text/plain");
    const btn = createButton(word);

    e.target.appendChild(btn);
}

// 🔥 ACTIVAR DROP
const blankArea = document.querySelector(".sentenceBlank");
blankArea.addEventListener("dragover", dragOver);
blankArea.addEventListener("drop", drop);

// 🔥 EVALUAR
window.checkAnswer = function () {

    const user = [...document.querySelector(".sentenceBlank").children].map(b => b.textContent);
    const correct = sentences[index];

    const result = document.querySelector(".result");

    if (JSON.stringify(user) === JSON.stringify(correct)) {

        result.textContent = "Correcto";
        result.style.color = "green";

        document.querySelector(".redirectButton").disabled = false;

        localStorage.setItem("orden_index", index);

        if (index === sentences.length - 1) {
            document.querySelector(".obtainCertificateButton").style.display = "inline-block";
        }

    } else {
        result.textContent = "Incorrecto";
        result.style.color = "red";
    }
};

// 🔥 SIGUIENTE
window.nextSentence = function () {

    index++;

    localStorage.setItem("orden_index", index);

    if (index < sentences.length) {
        render();
    }
};

// 🔥 CERTIFICADO (placeholder)
window.getCertificate = function () {
    alert("Aquí luego conectamos Firebase 🔥");
    localStorage.removeItem("orden_index");
};

// 🔥 INICIO
window.onload = function () {
    render();
};

</script>

</body>
</html>
