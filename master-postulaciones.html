<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Control de Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif; 
            color: white;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%);
            min-height: 100vh;
        }
        
        .sidebar { 
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(10px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
        }

        /* --- NUEVOS ESTILOS DE BOTONES SEGÚN IMAGEN --- */
        .btn-panel-principal {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            color: white !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.7rem;
            border-radius: 50px;
            padding: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-panel-principal:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white !important;
        }

        .btn-cerrar-sesion {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.4) !important;
            color: #ff4d4d !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.7rem;
            border-radius: 50px;
            padding: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            cursor: pointer;
        }

        .btn-cerrar-sesion:hover {
            background: rgba(255, 0, 0, 0.15);
            border-color: #ff4d4d !important;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.2);
        }
        /* -------------------------------------------- */

        .logo-sidebar { height: 55px; border-radius: 12px; margin-bottom: 10px; }
        .nav-link { color: rgba(255,255,255,0.7); margin-bottom: 5px; }
        .nav-link.active { color: var(--dorado-ucmi); background: rgba(197, 160, 89, 0.1); border-radius: 8px; font-weight: bold; }

        .table-container { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 20px; padding: 25px; color: #333;
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="logo-sidebar" alt="Logo">
                    <h5 class="fw-bold mt-2 text-white">UCMI ADMIN</h5>
                </div>
                <hr class="border-secondary">
                
                <nav class="nav flex-column mb-auto">
                    <p class="small text-uppercase fw-bold text-muted mb-3">Gestión</p>
                    <a class="nav-link active" href="#"><i class="bi bi-inbox me-2"></i> Solicitudes</a>
                    <a class="nav-link" href="master-usuarios.html"><i class="bi bi-people me-2"></i> Usuarios</a>
                </nav>

                <div class="mt-4 pt-4 border-top border-secondary border-opacity-25">
                    <a href="super-admin.html" class="btn-panel-principal">
                        <i class="bi bi-grid-3x3-gap-fill me-2"></i> Panel Principal
                    </a>
                    <button id="btnLogoutSidebar" class="btn btn-cerrar-sesion">
                        <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                    </button>
                </div>
            </div>

            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <div>
                        <h1 class="display-5 fw-bold mb-0">Control de Postulaciones</h1>
                        <p class="fs-5 text-white-50">Módulo Administrativo Maestro</p>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr class="text-muted small text-uppercase">
                                    <th>Identidad</th>
                                    <th>Perfil</th>
                                    <th>Localización</th>
                                    <th class="text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="listaMaestra"></tbody>
                        </table>
                    </div>
                </div>

                <footer class="mt-5 text-center">
                    <p class="text-white-50 small">Sistema de Gestión Supralógica © 2026</p>
                </footer>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const MI_UID_MAESTRO = "m56REyF19sOsC6BE5sJdJG6eR863";

    onAuthStateChanged(auth, (user) => {
        if (!user || user.uid !== MI_UID_MAESTRO) {
            window.location.href = "index.html";
        }
    });

    document.getElementById('btnLogoutSidebar').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });

    // Lógica simple de carga de tabla
    onSnapshot(collection(db, "postulaciones"), (snapshot) => {
        const tbody = document.getElementById('listaMaestra');
        tbody.innerHTML = '';
        snapshot.forEach((doc) => {
            const data = doc.data();
            tbody.innerHTML += `
                <tr>
                    <td><div class="fw-bold">${data.nombreResponsable}</div><div class="small text-muted">${data.email}</div></td>
                    <td><span class="badge bg-dark">${data.tipoSolicitante}</span></td>
                    <td>${data.ubicacion}</td>
                    <td class="text-center"><button class="btn btn-sm btn-outline-dark rounded-pill">Revisar</button></td>
                </tr>`;
        });
    });
</script>
</body>
</html>
