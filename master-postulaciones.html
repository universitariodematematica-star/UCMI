<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>html { display: none; }</style>
    <script type="module" src="auth-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Control de Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --verde-exito: #27ae60;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
            --indigo-ucmi: #4b0082;
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
        }

        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.85) 100%); min-height: 100vh; }
        
        /* --- ESTILOS DE TABLA (CORREGIDOS PARA VISIBILIDAD) --- */
        .table-container { 
            background: rgba(255, 255, 255, 0.05) !important; 
            backdrop-filter: blur(15px); 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
        }

        .table { color: #ffffff !important; }
        .table tbody tr td { color: #ffffff !important; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .table thead th { color: rgba(255, 255, 255, 0.7) !important; border: none; font-size: 0.8rem; }
        
        .text-muted-custom { color: rgba(255, 255, 255, 0.5) !important; font-size: 0.85rem; }

        /* --- BADGES DE PERFIL --- */
        .badge-perfil { 
            font-size: 0.65rem; 
            padding: 6px 15px; 
            border-radius: 50px; 
            font-weight: 800; 
            display: inline-block; 
            text-transform: uppercase; 
            min-width: 140px;
            text-align: center;
        }
        
        .bg-academia { background: #ffffff !important; color: #007bff !important; }
        .bg-estudiante-ucmi, .bg-estudiante-autodidacta { background: #007bff !important; color: #fff !important; }
        .bg-profesor-embajador { background: #28a745 !important; color: #fff !important; }
        .bg-profesor-asociado { background: #fd7e14 !important; color: #fff !important; }
        .bg-estudiante-academia { background: #dc3545 !important; color: #fff !important; }

        /* --- SIDEBAR --- */
        .sidebar { background: rgba(26, 42, 58, 0.95); min-height: 100vh; padding: 25px 15px; border-right: 1px solid rgba(197, 160, 89, 0.3); }
        .nav-item-ucmi { color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px; display: block; border-radius: 8px; transition: 0.3s; }
        .nav-item-ucmi:hover, .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.2); color: var(--dorado-ucmi); }

        .btn-revisar { background: #212529; border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 50px; padding: 5px 20px; font-size: 0.8rem; }
        .btn-revisar:hover { background: #32383e; color: var(--dorado-ucmi); }
    </style>
</head>

<body>
<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex flex-column">
                <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="mb-4 w-75 align-self-center">
                <nav>
                    <a href="#" class="nav-item-ucmi active"><i class="bi bi-person-badge me-2"></i> SOLICITUDES</a>
                    <a href="master-vigencia.html" class="nav-item-ucmi"><i class="bi bi-shield-check me-2"></i> VIGENCIA</a>
                </nav>
            </div>

            <div class="col-md-10 p-5">
                <h2 class="fw-bold mb-4">Control de Postulaciones</h2>
                
                <div class="table-container">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>ENTIDAD</th>
                                <th>NOMBRE</th>
                                <th class="text-center">PERFIL</th>
                                <th>LOCALIZACIÓN</th>
                                <th class="text-center">ACCIÓN</th>
                            </tr>
                        </thead>
                        <tbody id="listaMaestra">
                            <!-- Se llena con JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "postulaciones"), (snapshot) => {
        const tbody = document.getElementById('listaMaestra');
        tbody.innerHTML = '';

        snapshot.forEach((d) => {
            const data = d.data();
            const perfilOriginal = (data.tipoSolicitante || data.perfil || "Estudiante Autodidacta").toUpperCase();
            
            // Determinación de color del badge
            let colorClass = "bg-estudiante-ucmi";
            if(perfilOriginal.includes("ACADEMIA")) colorClass = "bg-academia";
            if(perfilOriginal.includes("EMBAJADOR")) colorClass = "bg-profesor-embajador";

            tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="fw-bold text-white">${data.entidad !== "N/A" ? data.entidad : "---"}</div>
                        <div class="text-muted-custom">${data.email}</div>
                    </td>
                    <td><div class="text-white">${data.nombreResponsable || '---'}</div></td>
                    <td class="text-center">
                        <span class="badge-perfil ${colorClass}">${perfilOriginal}</span>
                    </td>
                    <td><div class="text-muted-custom">${data.ubicacion || '---'}</div></td>
                    <td class="text-center">
                        <button onclick="verExpediente('${d.id}')" class="btn btn-revisar">Revisar</button>
                    </td>
                </tr>`;
        });
    });
</script>
</body>
</html>
