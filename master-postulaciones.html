<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Control de Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --dorado-ucmi: #c5a059; --azul-profundo: #06090f; --rojo-peligro: #ff4d4d; }
        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; margin: 0;
        }
        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.92) 100%); min-height: 100vh; }
        .sidebar { background: rgba(26, 42, 58, 0.9); backdrop-filter: blur(10px); min-height: 100vh; border-right: 1px solid rgba(197, 160, 89, 0.3); padding: 25px 15px; }
        .btn-pill-main { background: transparent; border: 1px solid rgba(255, 255, 255, 0.8) !important; color: white !important; border-radius: 50px; padding: 10px 20px; text-transform: uppercase; font-size: 0.75rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-pill-danger { background: rgba(255, 77, 77, 0.1); border: 1px solid var(--rojo-peligro) !important; color: var(--rojo-peligro) !important; border-radius: 50px; padding: 10px 20px; text-transform: uppercase; font-size: 0.75rem; font-weight: 600; }
        .glass-expediente { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; overflow: hidden; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .header-expediente { color: var(--dorado-ucmi); font-weight: bold; font-size: 1.1rem; }
        .label-ucmi { color: var(--dorado-ucmi); font-size: 0.65rem; text-transform: uppercase; font-weight: 700; opacity: 0.8; }
        .val-ucmi { color: white; font-size: 0.9rem; margin-bottom: 20px; display: block; min-height: 1.2rem; }
        .table-ucmi { color: white; vertical-align: middle; }
        .table-ucmi thead { background: rgba(255, 255, 255, 0.05); color: var(--dorado-ucmi); font-size: 0.75rem; text-transform: uppercase; }
        .modal-content-ucmi { background: transparent; border: none; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-block">
                <div class="text-center mb-5">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 60px;">
                </div>
                <div class="nav flex-column gap-3">
                    <a href="super-admin.html" class="btn-pill-main"><i class="bi bi-grid-fill me-2"></i> Panel Principal</a>
                    <a href="master-usuarios.html" class="btn-pill-main"><i class="bi bi-people me-2"></i> Usuarios</a>
                    <a href="master-vigencia.html" class="btn-pill-main"><i class="bi bi-clock me-2"></i> Vigencia</a>
                    <a href="https://universitariodematematica-star.github.io/UCMI/master-repositorio.html" class="btn-pill-main"><i class="bi bi-journal-bookmark me-2"></i> Repositorio</a>
                    <button id="btnLogout" class="btn-pill-danger mt-5"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</button>
                </div>
            </div>

            <div class="col-md-10 p-4">
                <div class="d-flex align-items-center mb-4">
                    <i class="bi bi-folder2-open fs-2 text-warning me-3"></i>
                    <div>
                        <h2 class="fw-bold mb-0">POSTULACIONES RECIBIDAS</h2>
                        <p class="text-white-50 small">Gestión de accesos institucionales bajo protocolo.</p>
                    </div>
                </div>

                <div class="glass-expediente">
                    <table class="table table-ucmi">
                        <thead>
                            <tr>
                                <th>Entidad</th>
                                <th>Responsable</th>
                                <th>Fecha</th>
                                <th>Programa</th>
                                <th class="text-end">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaPostulaciones">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalExpediente" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content modal-content-ucmi">
            <div class="glass-expediente p-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-folder-fill text-warning me-2"></i> EXPEDIENTE DE ASPIRANTES</h4>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                
                <div class="row mb-5">
                    <div class="col-md-4">
                        <label class="label-ucmi">Entidad</label>
                        <span class="val-ucmi" id="exp-entidad"></span>
                        <label class="label-ucmi">RIF</label>
                        <span class="val-ucmi" id="exp-rif"></span>
                        <label class="label-ucmi">Ubicación</label>
                        <span class="val-ucmi" id="exp-ubicacion"></span>
                    </div>
                    <div class="col-md-4">
                        <label class="label-ucmi">Responsable</label>
                        <span class="val-ucmi" id="exp-responsable"></span>
                        <label class="label-ucmi">Correo Electrónico</label>
                        <span class="val-ucmi text-info" id="exp-email"></span>
                        <label class="label-ucmi">WhatsApp / Contacto</label>
                        <span class="val-ucmi" id="exp-whatsapp"></span>
                    </div>
                    <div class="col-md-4">
                        <label class="label-ucmi">Fecha de Solicitud</label>
                        <span class="val-ucmi" id="exp-fecha"></span>
                        <label class="label-ucmi">Tipo de Solicitante</label>
                        <span class="val-ucmi" id="exp-tipoSolicitante"></span>
                        <label class="label-ucmi">Perfil de Aplicación</label>
                        <span class="val-ucmi" id="exp-perfil"></span>
                    </div>
                </div>

                <div class="row border-top border-white border-opacity-10 pt-4">
                    <div class="col-md-4">
                        <label class="label-ucmi">Programas Solicitados</label>
                        <span class="val-ucmi" id="exp-programas"></span>
                    </div>
                    <div class="col-md-3">
                        <label class="label-ucmi">Cupos Solicitados</label>
                        <span class="val-ucmi" id="exp-cupos"></span>
                    </div>
                    <div class="col-md-2">
                        <label class="label-ucmi">Duración de Licencia</label>
                        <span class="val-ucmi" id="exp-duracion"></span>
                    </div>
                    <div class="col-md-3 text-end d-flex align-items-end justify-content-end gap-2">
                        <button class="btn btn-outline-danger rounded-pill px-4" id="btnRechazar">Rechazar</button>
                        <button class="btn rounded-pill px-4" style="background: var(--dorado-ucmi); color: black; font-weight: bold;">Validar Acceso</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // CONFIGURACIÓN DE TU FIREBASE
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_DOMINIO.firebaseapp.com",
        projectId: "TU_PROYECTO_ID",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "TU_ID",
        appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tabla = document.getElementById('tablaPostulaciones');
    let idActivo = null;

    // CARGA EN TIEMPO REAL (Corrige el error de no ver registros)
    onSnapshot(collection(db, "postulaciones"), (snapshot) => {
        tabla.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;
            
            // Renderizamos la fila de la tabla
            tabla.innerHTML += `
                <tr>
                    <td>${data.entidad || 'N/A'}</td>
                    <td>${data.nombreResponsable || 'N/A'}</td>
                    <td>${data.fecha ? data.fecha.split(',')[0] : 'N/A'}</td>
                    <td>${data.programas || 'N/A'}</td>
                    <td class="text-end">
                        <button class="btn btn-sm rounded-pill px-3" 
                                style="border: 1px solid var(--dorado-ucmi); color: var(--dorado-ucmi);"
                                onclick="window.abrirExpediente('${id}')">
                            REVISAR
                        </button>
                    </td>
                </tr>`;
        });
    });

    // FUNCIÓN PARA MOSTRAR LOS DATOS EXACTOS EN EL MODAL
    window.abrirExpediente = async (id) => {
        idActivo = id;
        const snapshot = await getDoc(doc(db, "postulaciones", id));
        if (snapshot.exists()) {
            const d = snapshot.data();
            
            // Mapeo exacto según tus capturas de Firebase
            document.getElementById('exp-entidad').innerText = d.entidad || 'No definido';
            document.getElementById('exp-rif').innerText = d.rif || 'No definido';
            document.getElementById('exp-ubicacion').innerText = d.ubicacion || 'No definido';
            document.getElementById('exp-responsable').innerText = d.nombreResponsable || 'No definido';
            document.getElementById('exp-email').innerText = d.email || 'No definido';
            document.getElementById('exp-whatsapp').innerText = d.whatsapp || 'No definido';
            document.getElementById('exp-fecha').innerText = d.fecha || 'No definido';
            document.getElementById('exp-tipoSolicitante').innerText = d.tipoSolicitante || 'No definido';
            document.getElementById('exp-perfil').innerText = d.perfil || 'No definido';
            document.getElementById('exp-programas').innerText = d.programas || 'No definido';
            document.getElementById('exp-cupos').innerText = d.cupos || '0';
            document.getElementById('exp-duracion').innerText = d.duracionLicencia || '0 meses';

            const modal = new bootstrap.Modal(document.getElementById('modalExpediente'));
            modal.show();
        }
    };

    // FUNCIÓN PARA RECHAZAR (BORRAR DE FIREBASE)
    document.getElementById('btnRechazar').onclick = async () => {
        const confirm = await Swal.fire({
            title: '¿Confirmar rechazo?',
            text: "Esta acción borrará el registro de la base de datos.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'Sí, eliminar',
            background: '#06090f', color: '#fff'
        });

        if (confirm.isConfirmed && idActivo) {
            await deleteDoc(doc(db, "postulaciones", idActivo));
            bootstrap.Modal.getInstance(document.getElementById('modalExpediente')).hide();
            Swal.fire({ title: 'Eliminado', icon: 'success', background: '#06090f', color: '#fff' });
        }
    };
</script>
</body>
</html>
