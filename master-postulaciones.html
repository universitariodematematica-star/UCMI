<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>html { display: none; }</style>
    <script type="module" src="auth-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Control de Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --sidebar-width: 260px; }
        body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; margin: 0; color: white; }
        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); min-height: 100vh; }
        .sidebar { background: rgba(26, 42, 58, 0.95); backdrop-filter: blur(10px); min-height: 100vh; padding: 25px 15px; border-right: 1px solid rgba(197, 160, 89, 0.3); display: flex; flex-direction: column; }
        .sidebar-logo { height: 55px; border-radius: 12px; margin-bottom: 10px; }
        .nav-item-ucmi { display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s; font-size: 0.85rem; }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }
        .btn-sidebar-action { background: transparent; border: 1px solid rgba(255, 255, 255, 0.4); color: white; text-transform: uppercase; font-size: 0.7rem; border-radius: 50px; padding: 10px; display: block; margin-bottom: 10px; text-align: center; }
        
        /* Estilos Cristal */
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .select-input-ucmi { background: rgba(26, 42, 58, 0.6) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15) !important; color: white !important; border-radius: 20px; }
        .table { --bs-table-bg: transparent; --bs-table-color: white; border-spacing: 0 10px; border-collapse: separate; }
    </style>
</head>
<body>
<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="logo-sidebar">
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item-ucmi active"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
                    </nav>
                <div class="mt-auto"><a href="#" id="btnLogout" class="btn-sidebar-action">Cerrar Sesión</a></div>
            </div>

            <div class="col-md-10 p-4">
                <div class="glass-panel">
                    <h3 class="fw-bold mb-4">Control de Postulaciones</h3>
                    <div class="d-flex gap-3 mb-4">
                        <div class="position-relative" style="width: 320px;">
                            <i class="bi bi-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--dorado-ucmi);"></i>
                            <input type="text" id="buscadorTexto" class="form-control select-input-ucmi" placeholder="Buscar por nombre o entidad..." style="padding-left: 45px !important;">
                        </div>
                        <div class="position-relative" style="width: 320px;">
                            <i class="bi bi-bank" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--dorado-ucmi);"></i>
                            <select id="filtroPerfil" class="form-select select-input-ucmi" style="padding-left: 45px !important;">
                                <option value="todos">--- TODAS LAS CATEGORÍAS ---</option>
                                <option value="Academia">Academia</option>
                                <option value="Profesor independiente">Profesor independiente</option>
                                <option value="Estudiante UCMI">Estudiante UCMI</option>
                            </select>
                        </div>
                    </div>
                    <table class="table table-hover">
                        <thead><tr class="text-muted small"><th>ENTIDAD</th><th>NOMBRE</th><th>PERFIL</th><th>LOCALIZACIÓN</th><th class="text-center">ACCIÓN</th></tr></thead>
                        <tbody id="listaMaestra"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634" }));
    let registrosLocales = [];

    function renderizar() {
        const busqueda = document.getElementById('buscadorTexto').value.toLowerCase();
        const perfil = document.getElementById('filtroPerfil').value;
        const tbody = document.getElementById('listaMaestra');
        tbody.innerHTML = '';
        
        registrosLocales.forEach(d => {
            const u = d.data();
            const perfilU = u.tipoSolicitante || u.perfil || "";
            if ((perfil === "todos" || perfilU === perfil) && 
                ((u.nombreResponsable?.toLowerCase().includes(busqueda)) || (u.entidad?.toLowerCase().includes(busqueda)))) {
                tbody.innerHTML += `<tr><td>${u.entidad}</td><td>${u.nombreResponsable}</td><td>${perfilU}</td><td>${u.ubicacion}</td><td class="text-center"><button class="btn btn-sm btn-dark">Revisar</button></td></tr>`;
            }
        });
    }

    document.getElementById('buscadorTexto').addEventListener('input', renderizar);
    document.getElementById('filtroPerfil').addEventListener('change', renderizar);
    onSnapshot(collection(db, "postulaciones"), (snap) => { registrosLocales = snap.docs; renderizar(); });
</script>
</body>
</html>
