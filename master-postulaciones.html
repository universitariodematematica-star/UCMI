<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Solicitudes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; }
        body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') fixed; background-size: cover; color: white; }
        .glass-panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(25px); border-radius: 30px; padding: 40px; margin: 40px; }
        .select-input-ucmi { background: rgba(26, 42, 58, 0.6) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15) !important; color: #fff !important; border-radius: 20px; }
        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .table-custom tr { background: rgba(255,255,255,0.05); }
        .badge-perfil { padding: 5px 10px; border-radius: 10px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-uppercase">Gestión de Solicitudes</h3>
        <div class="d-flex gap-3">
            <div class="position-relative" style="width: 320px;">
                <i class="bi bi-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--dorado-ucmi);"></i>
                <input type="text" id="buscadorTexto" class="form-control select-input-ucmi" placeholder="Buscar nombre o entidad..." style="padding-left: 45px !important;">
            </div>
            <div class="position-relative" style="width: 320px;">
                <i class="bi bi-bank" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--dorado-ucmi);"></i>
                <select id="filtroPerfil" class="form-select select-input-ucmi" style="padding-left: 45px !important;">
                    <option value="todos">--- TODAS LAS CATEGORÍAS ---</option>
                    <option value="Academia">ACADEMIA</option>
                    <option value="Profesor independiente">PROFESOR INDEPENDIENTE</option>
                    <option value="Estudiante UCMI">ESTUDIANTE UCMI</option>
                </select>
            </div>
        </div>
    </div>

    <table class="table-custom text-white">
        <thead><tr class="text-white-50 small text-uppercase"><th>Entidad</th><th>Responsable</th><th>Perfil</th><th>Ubicación</th><th class="text-center">Acción</th></tr></thead>
        <tbody id="listaMaestra"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { /* TU CONFIGURACIÓN AQUÍ */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let registrosLocales = [];

    const renderizarTabla = () => {
        const tbody = document.getElementById('listaMaestra');
        const filtroPerfil = document.getElementById('filtroPerfil').value;
        const busqueda = document.getElementById('buscadorTexto').value.toLowerCase();
        
        tbody.innerHTML = '';
        
        registrosLocales.forEach((d) => {
            const data = d.data();
            const id = d.id;
            const perfil = data.tipoSolicitante || data.perfil || "N/A";
            const nombre = (data.nombreResponsable || "").toLowerCase();
            const entidad = (data.entidad || "").toLowerCase();

            // Lógica de filtro: Categoría Y Buscador
            const cumplePerfil = (filtroPerfil === "todos" || perfil === filtroPerfil);
            const cumpleBusqueda = (nombre.includes(busqueda) || entidad.includes(busqueda));

            if (cumplePerfil && cumpleBusqueda) {
                tbody.innerHTML += `<tr>
                    <td><div class="fw-bold">${data.entidad}</div><div class="small text-muted">${data.email}</div></td>
                    <td>${data.nombreResponsable || '---'}</td>
                    <td><span class="badge bg-secondary">${perfil}</span></td>
                    <td>${data.ubicacion || '---'}</td>
                    <td class="text-center"><button onclick="verExpediente('${id}')" class="btn btn-dark btn-sm rounded-pill">Revisar</button></td>
                </tr>`;
            }
        });
    };

    document.getElementById('filtroPerfil').addEventListener('change', renderizarTabla);
    document.getElementById('buscadorTexto').addEventListener('input', renderizarTabla);

    onSnapshot(collection(db, "postulaciones"), (snap) => {
        registrosLocales = snap.docs;
        renderizarTabla();
    });
</script>
</body>
</html>
