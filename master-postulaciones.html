<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Control de Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --dorado-ucmi: #c5a059; --azul-profundo: #06090f; --rojo-peligro: #ff4d4d; }
        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; margin: 0;
        }
        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.92) 100%); min-height: 100vh; }
        .sidebar { background: rgba(26, 42, 58, 0.9); backdrop-filter: blur(10px); min-height: 100vh; border-right: 1px solid rgba(197, 160, 89, 0.3); padding: 25px 15px; }
        .btn-pill-main { background: transparent; border: 1px solid rgba(255, 255, 255, 0.8) !important; color: white !important; border-radius: 50px; padding: 10px 20px; text-transform: uppercase; font-size: 0.75rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .glass-expediente { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; overflow: hidden; }
        .label-ucmi { color: var(--dorado-ucmi); font-size: 0.65rem; text-transform: uppercase; font-weight: 700; opacity: 0.8; }
        .val-ucmi { color: white; font-size: 0.9rem; margin-bottom: 20px; display: block; }
        .table-ucmi { color: white; vertical-align: middle; background: white; border-radius: 15px; overflow: hidden; }
        .table-ucmi thead { color: #000; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; }
        .table-ucmi tbody { color: #333; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-block">
                <div class="text-center mb-5">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 60px;">
                </div>
                <div class="nav flex-column gap-3">
                    <a href="super-admin.html" class="btn-pill-main"><i class="bi bi-grid-fill me-2"></i> Panel Principal</a>
                    <button class="btn btn-outline-danger rounded-pill mt-5" id="btnLogout">Cerrar Sesión</button>
                </div>
            </div>

            <div class="col-md-10 p-4">
                <h2 class="fw-bold mb-4"><i class="bi bi-folder2-open text-warning me-2"></i> POSTULACIONES RECIBIDAS</h2>
                
                <div class="table-responsive" style="border-radius: 15px;">
                    <table class="table table-ucmi shadow">
                        <thead>
                            <tr>
                                <th>Entidad</th>
                                <th>Responsable</th>
                                <th>Fecha</th>
                                <th>Programa</th>
                                <th class="text-end">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaPostulaciones">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalExpediente" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 bg-transparent">
            <div class="glass-expediente p-5">
                <h4 class="fw-bold mb-4 text-white">EXPEDIENTE DE ASPIRANTES</h4>
                <div class="row">
                    <div class="col-md-4">
                        <label class="label-ucmi">Entidad</label><span class="val-ucmi" id="exp-entidad"></span>
                        <label class="label-ucmi">RIF</label><span class="val-ucmi" id="exp-rif"></span>
                        <label class="label-ucmi">Ubicación</label><span class="val-ucmi" id="exp-ubicacion"></span>
                    </div>
                    <div class="col-md-4">
                        <label class="label-ucmi">Responsable</label><span class="val-ucmi" id="exp-responsable"></span>
                        <label class="label-ucmi">Correo Electrónico</label><span class="val-ucmi" id="exp-email"></span>
                        <label class="label-ucmi">WhatsApp / Contacto</label><span class="val-ucmi" id="exp-whatsapp"></span>
                    </div>
                    <div class="col-md-4">
                        <label class="label-ucmi">Fecha de Solicitud</label><span class="val-ucmi" id="exp-fecha"></span>
                        <label class="label-ucmi">Tipo de Solicitante</label><span class="val-ucmi" id="exp-tipo"></span>
                        <label class="label-ucmi">Perfil de Aplicación</label><span class="val-ucmi" id="exp-perfil"></span>
                    </div>
                </div>
                <div class="row border-top border-white border-opacity-10 pt-4 mt-2">
                    <div class="col-md-5">
                        <label class="label-ucmi">Programas Solicitados</label><span class="val-ucmi" id="exp-programas"></span>
                    </div>
                    <div class="col-md-2">
                        <label class="label-ucmi">Cupos</label><span class="val-ucmi" id="exp-cupos"></span>
                    </div>
                    <div class="col-md-2">
                        <label class="label-ucmi">Duración</label><span class="val-ucmi" id="exp-duracion"></span>
                    </div>
                    <div class="col-md-3 text-end">
                        <button class="btn btn-outline-danger rounded-pill px-4" id="btnRechazar">Rechazar</button>
                        <button class="btn btn-warning rounded-pill px-4 fw-bold">Validar Acceso</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        projectId: "TU_PROYECTO_ID",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "TU_SENDER",
        appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let idActual = null;

    // 1. CARGA EN TIEMPO REAL - Colección "Postulaciones" (con P mayúscula)
    onSnapshot(collection(db, "Postulaciones"), (querySnapshot) => {
        const tabla = document.getElementById('tablaPostulaciones');
        tabla.innerHTML = '';
        
        if (querySnapshot.empty) {
            tabla.innerHTML = '<tr><td colspan="5" class="text-center p-4">No hay postulaciones en la base de datos.</td></tr>';
            return;
        }

        querySnapshot.forEach((docSnap) => {
            const d = docSnap.data();
            const id = docSnap.id;
            // Solo tomamos la fecha corta para la tabla
            const fechaCorta = d.fecha ? d.fecha.split(',')[0] : '---';

            tabla.innerHTML += `
                <tr class="border-bottom">
                    <td>${d.entidad || '---'}</td>
                    <td>${d.nombreResponsable || '---'}</td>
                    <td>${fechaCorta}</td>
                    <td>${d.programas || '---'}</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-warning rounded-pill px-3" onclick="verDetalle('${id}')">
                            REVISAR
                        </button>
                    </td>
                </tr>`;
        });
    });

    // 2. MOSTRAR DETALLE EN MODAL
    window.verDetalle = async (id) => {
        idActual = id;
        const snap = await getDoc(doc(db, "Postulaciones", id));
        if (snap.exists()) {
            const d = snap.data();
            document.getElementById('exp-entidad').innerText = d.entidad || '';
            document.getElementById('exp-rif').innerText = d.rif || '';
            document.getElementById('exp-ubicacion').innerText = d.ubicacion || '';
            document.getElementById('exp-responsable').innerText = d.nombreResponsable || '';
            document.getElementById('exp-email').innerText = d.email || '';
            document.getElementById('exp-whatsapp').innerText = d.whatsapp || '';
            document.getElementById('exp-fecha').innerText = d.fecha || '';
            document.getElementById('exp-tipo').innerText = d.tipoSolicitante || '';
            document.getElementById('exp-perfil').innerText = d.perfil || '';
            document.getElementById('exp-programas').innerText = d.programas || '';
            document.getElementById('exp-cupos').innerText = d.cupos || '';
            document.getElementById('exp-duracion').innerText = d.duracionLicencia || '';
            
            new bootstrap.Modal(document.getElementById('modalExpediente')).show();
        }
    };

    // 3. ELIMINAR REGISTRO
    document.getElementById('btnRechazar').onclick = async () => {
        const confirmacion = await Swal.fire({
            title: '¿Rechazar solicitud?',
            text: "Se eliminará permanentemente de la base de datos.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            background: '#06090f',
            color: '#fff'
        });

        if (confirmar.isConfirmed && idActual) {
            await deleteDoc(doc(db, "Postulaciones", idActual));
            bootstrap.Modal.getInstance(document.getElementById('modalExpediente')).hide();
        }
    };
</script>
</body>
</html>
