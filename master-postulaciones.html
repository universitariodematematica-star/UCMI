<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>html { display: none; }</style>
    <script type="module" src="auth-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Control de Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --verde-exito: #27ae60;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
            --indigo-ucmi: #4b0082;
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; margin: 0; color: white;
        }

        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); min-height: 100vh; transition: filter 0.3s ease; }
        .sidebar { background: rgba(26, 42, 58, 0.95); backdrop-filter: blur(10px); min-height: 100vh; padding: 25px 15px; position: sticky; top: 0; border-right: 1px solid rgba(197, 160, 89, 0.3); display: flex; flex-direction: column; }
        .logo-sidebar { height: 55px; border-radius: 12px; margin-bottom: 10px; }
        .nav-item-ucmi { display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s all ease; font-size: 0.85rem; }
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }

        .btn-sidebar-action { background: transparent; border: 1px solid rgba(255, 255, 255, 0.4) !important; color: white !important; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; border-radius: 50px; padding: 10px; text-decoration: none; text-align: center; transition: all 0.3s ease-in-out; display: block; margin-bottom: 10px; }
        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .table-container { background: rgba(255, 255, 255, 0.03) !important; backdrop-filter: blur(15px); border-radius: 28px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255, 255, 255, 0.1) !important; }
        .table { --bs-table-bg: transparent !important; color: white !important; }
        .table thead th { color: rgba(255, 255, 255, 0.6) !important; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; border: none; }
        
        /* --- CONFIGURACIÓN DE COLORES DE PERFIL --- */
        .badge-perfil { font-size: 0.7rem; padding: 5px 12px; border-radius: 50px; font-weight: 700; display: inline-block; text-transform: uppercase; }
        
        .bg-academia { background: #ffffff !important; color: #007bff !important; border: 1px solid #007bff; }
        .bg-profesor-academia { background: #ffc107 !important; color: #000!important; }
        .bg-profesor-asociado { background: #fd7e14 !important; color: #fff!important; }
        .bg-profesor-embajador { background: #28a745 !important; color: #fff!important; }
        .bg-estudiante-ucmi, .bg-autodidacta { background: #007bff !important; color: #fff!important; }
        .bg-estudiante-academia { background: #dc3545 !important; color: #fff!important; }
        .bg-estudiante-asociado { background: #6610f2 !important; color: #fff!important; }
        .bg-estudiante-embajador { background: #6f42c1 !important; color: #fff!important; }
        .bg-secondary-ucmi { background: #6c757d !important; color: #fff!important; }

        .modal-content { background: rgba(10, 20, 30, 0.95) !important; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; color: white; }
        .label-exp { color: var(--dorado-ucmi); font-size: 0.7rem; text-transform: uppercase; font-weight: 800; }
        .val-exp { color: #fff; font-size: 1rem; margin-bottom: 15px; display: block; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        body.modal-open .super-overlay { filter: blur(8px) brightness(0.7); }
    </style>
</head>

<body>
<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="logo-sidebar">
                    <h5 class="fw-bold mt-2 text-white">UCMI ADMIN</h5>
                </div>
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item-ucmi active"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
                    <a href="master-vigencia.html" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
                    <a href="master-usuarios.html" class="nav-item-ucmi"><i class="bi bi-people"></i> USUARIOS</a>
                </nav>
                <div class="mt-4 pt-4 border-top border-secondary">
                    <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100">
                        <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                    </a>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <h1 class="display-6 fw-bold">Control de Postulaciones</h1>
                <div class="row mt-4">
                    <div class="col-md-4">
                        <div class="p-3 border border-secondary rounded-4" style="background: rgba(255,255,255,0.05);">
                            <label class="small text-muted fw-bold mb-2 d-block text-uppercase">Filtrar por Perfil</label>
                            <select id="filtroPerfil" class="form-select bg-dark text-white border-0 rounded-pill">
                                <option value="todos">Mostrar todos</option>
                                <option value="academia">Academias</option>
                                <option value="embajador">Profesor Embajador</option>
                                <option value="asociado">Profesor Asociado</option>
                                <option value="autodidacta">Estudiante Autodidacta</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="table-container mt-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>ENTIDAD</th>
                                    <th>NOMBRE</th>
                                    <th>PERFIL</th>
                                    <th>LOCALIZACIÓN</th>
                                    <th class="text-center">ACCIÓN</th>
                                </tr>
                            </thead>
                            <tbody id="listaMaestra"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Detalles -->
<div class="modal fade" id="modalDetalles" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h4 class="fw-bold"><i class="bi bi-file-earmark-person me-2"></i>Expediente</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-4">
                <div class="row" id="contenidoModal"></div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-outline-danger rounded-pill px-4" id="btnEliminar">Rechazar</button>
                <button class="btn btn-success rounded-pill px-4 fw-bold" id="btnConfirmarAcceso">Activar Acceso</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentId = null;
    let currentData = null;
    let registrosLocales = [];

    const selectorFiltro = document.getElementById('filtroPerfil');

    // --- ESCUCHA DE DATOS ---
    onSnapshot(collection(db, "postulaciones"), (snapshot) => {
        registrosLocales = snapshot.docs;
        renderizarTabla();
    });

    // --- FUNCIÓN RENDERIZAR TABLA (CORREGIDA Y ÚNICA) ---
    function renderizarTabla() {
        const tbody = document.getElementById('listaMaestra');
        const valorFiltro = selectorFiltro.value;
        tbody.innerHTML = '';

        registrosLocales.forEach((d) => {
            const data = d.data();
            const id = d.id;

            const perfilOriginal = data.tipoSolicitante || data.perfil || "Estudiante Autodidacta";
            const pLow = perfilOriginal.toLowerCase().trim();

            if (valorFiltro !== "todos" && !pLow.includes(valorFiltro)) return;

            // Lógica de Colores Integrada
            let colorClass = "";
            if (pLow === "academia") {
                colorClass = "bg-academia";
            } else if (pLow.includes("profesor")) {
                if (pLow.includes("academia")) colorClass = "bg-profesor-academia";
                else if (pLow.includes("asociado")) colorClass = "bg-profesor-asociado";
                else if (pLow.includes("embajador")) colorClass = "bg-profesor-embajador";
                else colorClass = "bg-profesor-asociado";
            } else if (pLow.includes("estudiante") || pLow.includes("alumno") || pLow.includes("autodidacta")) {
                if (pLow.includes("ucmi") || pLow.includes("autodidacta")) colorClass = "bg-estudiante-ucmi";
                else if (pLow.includes("academia")) colorClass = "bg-estudiante-academia";
                else if (pLow.includes("asociado")) colorClass = "bg-estudiante-asociado";
                else if (pLow.includes("embajador")) colorClass = "bg-estudiante-embajador";
                else colorClass = "bg-estudiante-ucmi";
            } else {
                colorClass = "bg-secondary-ucmi";
            }

            tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="fw-bold">${data.entidad !== "N/A" ? data.entidad : "---"}</div>
                        <div class="small text-muted">${data.email}</div>
                    </td>
                    <td class="small">${data.nombreResponsable || '---'}</td>
                    <td><span class="badge-perfil ${colorClass}">${perfilOriginal}</span></td>
                    <td class="small">${data.ubicacion || '---'}</td>
                    <td class="text-center">
                        <button onclick="verExpediente('${id}')" class="btn btn-dark btn-sm rounded-pill px-3">Revisar</button>
                    </td>
                </tr>`;
        });
    }

    selectorFiltro.addEventListener('change', renderizarTabla);

    // --- VER EXPEDIENTE ---
    window.verExpediente = async (id) => {
        currentId = id;
        const snap = await getDoc(doc(db, "postulaciones", id));
        if (snap.exists()) {
            currentData = snap.data();
            const d = currentData;
            document.getElementById('contenidoModal').innerHTML = `
                <div class="col-md-12 mb-3 border-bottom pb-2">
                    <label class="label-exp">Fecha Solicitud</label>
                    <span class="val-exp text-primary">${d.fecha || 'N/A'}</span>
                </div>
                <div class="col-md-6">
                    <label class="label-exp">Responsable</label><span class="val-exp">${d.nombreResponsable || 'N/A'}</span>
                    <label class="label-exp">Email</label><span class="val-exp">${d.email}</span>
                    <label class="label-exp">WhatsApp</label><span class="val-exp">${d.whatsapp || 'N/A'}</span>
                </div>
                <div class="col-md-6">
                    <label class="label-exp">Perfil</label><span class="val-exp fw-bold text-success">${d.tipoSolicitante || d.perfil}</span>
                    <label class="label-exp">Ubicación</label><span class="val-exp">${d.ubicacion || 'N/A'}</span>
                </div>`;
            new bootstrap.Modal(document.getElementById('modalDetalles')).show();
        }
    };

    // --- ACCIONES ---
    document.getElementById('btnConfirmarAcceso').onclick = async () => {
        if(!currentId || !currentData) return;
        try {
            await createUserWithEmailAndPassword(auth, currentData.email, "UCMI2026");
            const fechaExp = new Date();
            fechaExp.setMonth(fechaExp.getMonth() + 1);
            
            const finalData = { ...currentData, estado: "activo", expiracionLicencia: fechaExp.toLocaleString() };
            await setDoc(doc(db, "usuarios", currentData.email), finalData);
            await deleteDoc(doc(db, "postulaciones", currentId));
            
            Swal.fire("Éxito", "Usuario activado", "success").then(() => location.reload());
        } catch (e) { Swal.fire("Error", e.message, "error"); }
    };

    document.getElementById('btnLogout').onclick = async () => {
        await signOut(auth);
        window.location.href = "index.html";
    };
</script>
</body>
</html>
