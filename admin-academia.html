<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel Administrativo de Academia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --blanco-suave: rgba(255, 255, 255, 0.85);
            --sidebar-width: 280px;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- SIDEBAR DESLIZABLE --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: calc(var(--sidebar-width) * -1); /* Escondido */
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(6, 9, 15, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 80px 20px 20px;
        }

        /* Área sensible para activar el sidebar */
        .sidebar-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 100%;
            z-index: 1999;
        }

        /* Mostrar sidebar al pasar el mouse por el disparador o por el mismo sidebar */
        .sidebar:hover, .sidebar-trigger:hover + .sidebar {
            left: 0;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        /* Controles de Logo en Sidebar */
        .logo-preview-container {
            border: 2px dashed rgba(197, 160, 89, 0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
        }

        #imgPreview {
            max-width: 100%;
            max-height: 100px;
            display: none;
            margin: 0 auto 15px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        /* Estilos del contenido original */
        .overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); min-height: 100vh; width: 100%; padding-bottom: 50px; }
        .navbar-master { background: rgba(6, 9, 15, 0.8); border-bottom: 1px solid rgba(197, 160, 89, 0.5); backdrop-filter: blur(15px); padding: 0.8rem 2rem; z-index: 1000; }
        .logo-nav { height: 60px; transition: 0.5s; }
        .btn-logout { background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.3); color: #ff4d4d; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; transition: 0.3s; }
        .btn-logout:hover { background: #ff4d4d; color: white; }
        .text-glow-gold { color: var(--dorado-ucmi); text-shadow: 0 0 15px rgba(197, 160, 89, 0.6); }
    </style>
</head>
<body>

<!-- Disparador invisible a la izquierda -->
<div class="sidebar-trigger"></div>

<!-- Sidebar Deslizable -->
<div class="sidebar">
    <h5 class="text-glow-gold mb-4"><i class="bi bi-gear-fill me-2"></i>Personalización</h5>
    
    <div class="mb-3">
        <label class="form-label small opacity-75">Imagen del Instituto</label>
        <input type="file" id="logoInput" class="form-control form-control-sm bg-dark text-white border-secondary" accept="image/*">
    </div>

    <div id="containerPreview" class="logo-preview-container">
        <img id="imgPreview" src="#" alt="Vista previa">
        
        <div class="form-check form-switch d-flex justify-content-center align-items-center gap-2">
            <input class="form-check-input" type="checkbox" id="applyLogo">
            <label class="form-check-label small" for="applyLogo">Aplicar a Navbar</label>
        </div>
        <p class="mt-2 x-small opacity-50" style="font-size: 10px;">Subir otro archivo para reemplazar</p>
    </div>
</div>

<div class="overlay">
    <nav class="navbar navbar-master sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a href="#">
                <!-- ID añadido para poder cambiarlo por JS -->
                <img id="mainLogo" src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="UCMI Logo" class="logo-nav">
            </a>
            <div class="d-flex align-items-center">
                <div class="text-end me-3 d-none d-md-block">
                    <small class="d-block opacity-75 text-white">Panel Administrativo</small>
                    <button id="btnLogout" class="btn btn-logout ms-2">Salir <i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row mb-5 text-center">
            <div class="col-12">
                <h1 class="display-3 fw-bold mb-0">Gestión de Academia</h1>
                <p class="lead text-glow-gold fs-4">Unidad Operativa Institucional - UCMI</p>
                <div class="mx-auto" style="width: 60px; height: 4px; background: var(--dorado-ucmi); border-radius: 10px; margin-top: 15px;"></div>
            </div>
        </div>

        <div class="row g-4 gy-5 admin-content-area">
            <!-- Espacio para tarjetas futuras -->
        </div>

        <footer class="mt-5 pt-4 text-center">
            <p class="text-white-50 small">UCMI - Universitario de Ciencias Matemáticas e Idiomas</p>
            <p class="text-glow-gold fw-bold small">NÚCLEO DE ADMINISTRACIÓN LOCAL v1.0</p>
        </footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    // Lógica de carga y cambio de logo
    const logoInput = document.getElementById('logoInput');
    const imgPreview = document.getElementById('imgPreview');
    const applyLogo = document.getElementById('applyLogo');
    const mainLogo = document.getElementById('mainLogo');
    const LOGO_ORIGINAL = "https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png";
    
    let currentLogoUrl = "";

    // 1. Detectar carga de archivo
    logoInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentLogoUrl = e.target.result;
                imgPreview.src = currentLogoUrl;
                imgPreview.style.display = "block";
                
                // Si el check ya estaba activo, actualizar el logo principal de una vez
                if (applyLogo.checked) {
                    mainLogo.src = currentLogoUrl;
                }
            }
            reader.readAsDataURL(file);
        }
    });

    // 2. Detectar cambio en el "Apply" (Checkbox)
    applyLogo.addEventListener('change', function() {
        if (this.checked && currentLogoUrl !== "") {
            mainLogo.style.opacity = "0";
            setTimeout(() => {
                mainLogo.src = currentLogoUrl;
                mainLogo.style.opacity = "1";
            }, 300);
        } else {
            mainLogo.style.opacity = "0";
            setTimeout(() => {
                mainLogo.src = LOGO_ORIGINAL;
                mainLogo.style.opacity = "1";
            }, 300);
        }
    });

    // Lógica Firebase (Original)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "index.html";
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        }).catch((error) => {
            console.error("Error al cerrar sesión", error);
        });
    });
</script>

</body>
</html>
