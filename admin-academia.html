<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Administración de Academia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --sidebar-width: 300px;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
        }

        /* SIDEBAR RESTAURADO */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(6, 9, 15, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            height: 100vh;
            position: fixed;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
            background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.8) 100%);
        }

        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 2px solid var(--dorado-ucmi);
            overflow: hidden;
            background: #111;
            position: relative;
        }

        #logoPreview { width: 100%; height: 100%; object-fit: cover; }

        /* ESTILO DE TARJETAS (IGUAL AL SUPERADMIN) */
        .admin-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 40px 20px;
            cursor: pointer;
            height: 100%;
        }

        .admin-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-10px);
            border-color: var(--dorado-ucmi);
        }

        .icon-circle {
            width: 70px;
            height: 70px;
            background: rgba(197, 160, 89, 0.1);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 15px;
            color: var(--dorado-ucmi);
        }

        .badge-custom {
            font-size: 0.7rem;
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 800;
            background: var(--cian-neon);
            color: #000;
        }

        .btn-update {
            background: var(--dorado-ucmi);
            color: black;
            font-weight: bold;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="profile-section">
            <div class="profile-img-container">
                <img id="logoPreview" src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png">
            </div>
            <h5 id="sideNombreAcademia" class="fw-bold mb-0">Cargando...</h5>
            <small class="text-white-50">Administrador Local</small>
        </div>

        <div class="mb-4">
            <label class="form-label small text-uppercase" style="letter-spacing: 1px;">Cambiar Logo Sede</label>
            <input type="file" id="inputLogo" class="form-control form-control-sm bg-dark text-white border-secondary">
            <button id="btnGuardarLogo" class="btn btn-update btn-sm mt-2">Actualizar Identidad</button>
        </div>

        <hr class="border-secondary mt-auto">
        <button id="btnLogout" class="btn btn-outline-danger btn-sm w-100">Cerrar Sesión</button>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <div class="container py-5 px-4">
            <div class="row mb-5">
                <div class="col-12">
                    <h1 class="display-5 fw-bold">Consola de Gestión</h1>
                    <p class="text-warning">UCMI Academia - Panel Operativo</p>
                </div>
            </div>

            <div class="row g-4">
                <!-- TARJETA 1: CAPTACIÓN (DUAL) -->
                <div class="col-md-3">
                    <div class="admin-card text-center" onclick="abrirFormulario()">
                        <div class="icon-circle"><i class="bi bi-person-plus-fill"></i></div>
                        <h4>Captación</h4>
                        <p class="small opacity-75">Clic para abrir o usa el botón para copiar link.</p>
                        <div class="mt-2">
                            <span class="badge-custom" onclick="event.stopPropagation(); copiarEnlaceCaptacion();" style="cursor: copy;">
                                COPIAR ENLACE
                            </span>
                        </div>
                    </div>
                </div>

                <!-- TARJETA 2: ALUMNOS -->
                <div class="col-md-3">
                    <div class="admin-card text-center" onclick="location.href='lista-alumnos.html'">
                        <div class="icon-circle"><i class="bi bi-people"></i></div>
                        <h4>Alumnos</h4>
                        <p class="small opacity-75">Base de datos de inscritos y asistencia local.</p>
                        <div class="mt-2">
                            <span class="badge-custom" style="background: #bc13fe; color: white;">LISTADO</span>
                        </div>
                    </div>
                </div>

                <!-- Otras tarjetas se pueden añadir aquí -->
            </div>
        </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let linkCaptacionGlobal = "";
    let userEmail = "";

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        userEmail = user.email;

        // 1. Obtener Datos de Sede
        const q = query(collection(db, "historial_postulaciones"), where("email", "==", user.email));
        const snap = await getDocs(q);
        if (!snap.empty) {
            const entidad = snap.docs[0].data().entidad;
            document.getElementById('sideNombreAcademia').innerText = entidad;
            linkCaptacionGlobal = `https://universitariodematematica-star.github.io/UCMI/formulario-postulacion.html?ref=${encodeURIComponent(entidad)}`;
        }

        // 2. Cargar Logo Personalizado
        const docRef = doc(db, "usuarios", user.email);
        const userDoc = await getDoc(docRef);
        if (userDoc.exists() && userDoc.data().logoCustom) {
            document.getElementById('logoPreview').src = userDoc.data().logoCustom;
        }
    });

    // Lógica para subir/actualizar imagen (Base64 para simplificar sin Storage)
    document.getElementById('btnGuardarLogo').addEventListener('click', async () => {
        const file = document.getElementById('inputLogo').files[0];
        if (!file) return alert("Selecciona una imagen primero");

        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64String = reader.result;
            await updateDoc(doc(db, "usuarios", userEmail), {
                logoCustom: base64String,
                aplicarLogo: true
            });
            document.getElementById('logoPreview').src = base64String;
            alert("Identidad de sede actualizada");
        };
        reader.readAsDataURL(file);
    });

    window.copiarEnlaceCaptacion = () => {
        navigator.clipboard.writeText(linkCaptacionGlobal);
        alert("¡Enlace copiado!");
    };

    window.abrirFormulario = () => {
        window.open(linkCaptacionGlobal, '_blank');
    };

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
