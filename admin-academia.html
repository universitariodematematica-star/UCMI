<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>html { display: none; }</style>
    <script type="module" src="auth-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia - Gestión de Solicitudes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --verde-exito: #27ae60;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
            --indigo-ucmi: #4b0082;
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; margin: 0; color: white;
        }

        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); min-height: 100vh; }
        
        .sidebar { 
            background: rgba(26, 42, 58, 0.95); backdrop-filter: blur(10px); min-height: 100vh; padding: 25px 15px; position: sticky; top: 0; border-right: 1px solid rgba(197, 160, 89, 0.3); display: flex; flex-direction: column;
        }

        .logo-sidebar { height: 60px; object-fit: contain; margin-bottom: 10px; border-radius: 8px; }
        
        /* Estilo Nueva Tarjeta */
        .card-link-ucmi {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
            margin-bottom: 25px;
            max-width: 350px;
        }

        .card-link-ucmi:hover {
            background: rgba(197, 160, 89, 0.1);
            border-color: var(--dorado-ucmi);
            transform: translateY(-5px);
            color: var(--dorado-ucmi);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-right: 20px;
            color: var(--dorado-ucmi);
        }

        .nav-item-ucmi {
            display: flex; align-items: center; color: rgba(255,255,255,0.6);
            text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s all ease; font-size: 0.85rem;
        }

        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }   

        .btn-sidebar-action {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.4) !important; color: white !important;
            font-weight: 600; text-transform: uppercase; font-size: 0.7rem; border-radius: 50px; padding: 10px;
            text-decoration: none; text-align: center; transition: all 0.3s ease-in-out; display: block; margin-bottom: 10px;
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .table-container { 
            background: rgba(255, 255, 255, 0.03) !important; backdrop-filter: blur(15px);
            border-radius: 28px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .table { --bs-table-bg: transparent !important; --bs-table-color: white !important; }
        .badge-perfil { font-size: 0.7rem; padding: 5px 12px; border-radius: 50px; color: white; font-weight: 700; text-transform: uppercase; }
        .bg-alumno { background: var(--verde-exito); }
    </style>
</head>

<body>
<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="logo-sidebar" alt="Logo Academia">
                    <h5 class="fw-bold mt-2 text-white">ACADEMIA ADMIN</h5>
                </div>

                <nav class="sidebar-nav">
                    <a href="#" class="nav-item-ucmi active"><i class="bi bi-envelope-paper"></i> SOLICITUDES</a>
                    <a href="alumnos.html" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> MIS ALUMNOS</a>
                    <a href="cursos.html" class="nav-item-ucmi"><i class="bi bi-journal-bookmark"></i> CURSOS</a>
                </nav>

                <div class="mt-4 pt-4 border-top border-secondary">
                    <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
                </div>
            </div>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="col-md-10 p-4">
                <h1 class="display-6 fw-bold">Panel de Gestión</h1>
                <p class="text-white-50">Bienvenido al centro de control de la academia.</p>

                <!-- NUEVA TARJETA DE LINK -->
                <div class="row mt-4">
                    <div class="col-md-4">
                        <a href="solicitudes-academia.html" class="card-link-ucmi">
                            <div class="card-icon">
                                <i class="bi bi-person-plus-fill"></i>
                            </div>
                            <div>
                                <h5 class="mb-1 fw-bold">Nuevas Solicitudes</h5>
                                <p class="mb-0 small opacity-75">Ver aspirantes y procesar inscripciones</p>
                            </div>
                        </a>
                    </div>
                </div>
                
                <!-- TABLA DE VISTA PREVIA / RECIENTES -->
                <div class="table-container">
                    <h5 class="mb-4 fw-bold text-dorado-ucmi">Últimas Interacciones</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>ASPIRANTE</th>
                                    <th>CURSO</th>
                                    <th>ESTADO</th>
                                    <th class="text-center">ACCIÓN</th>
                                </tr>
                            </thead>
                            <tbody id="listaSolicitudesAcademia">
                                <!-- Datos dinámicos -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onSnapshot(collection(db, "solicitudes_academia"), (snapshot) => {
        const tbody = document.getElementById('listaSolicitudesAcademia');
        tbody.innerHTML = '';
        snapshot.forEach((doc) => {
            const data = doc.data();
            tbody.innerHTML += `
                <tr>
                    <td><div class="fw-bold">${data.nombre}</div></td>
                    <td><span class="badge-perfil bg-alumno">${data.curso || 'General'}</span></td>
                    <td><span class="small opacity-75">Pendiente</span></td>
                    <td class="text-center">
                        <a href="solicitudes-academia.html" class="btn btn-dark btn-sm rounded-pill px-3">Ir a Gestión</a>
                    </td>
                </tr>`;
        });
    });

    document.getElementById('btnLogout').onclick = async (e) => {
        e.preventDefault();
        await signOut(auth);
        window.location.href = "index.html"; 
    };
</script>
</body>
</html>
