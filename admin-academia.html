<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Administración de Academia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%);
            min-height: 100vh;
            width: 100%;
        }

        /* SIDEBAR DESLIZABLE (OFFCANVAS CUSTOM) */
        .offcanvas {
            background: rgba(6, 9, 15, 0.95) !important;
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--dorado-ucmi);
            color: white;
            width: 320px !important;
        }

        .profile-img-container {
            width: 130px;
            height: 130px;
            margin: 20px auto;
            border-radius: 50%;
            border: 2px solid var(--dorado-ucmi);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
        }

        #logoPreview { width: 100%; height: 100%; object-fit: cover; }

        /* BOTÓN DE MENÚ */
        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1050;
            background: rgba(197, 160, 89, 0.2);
            border: 1px solid var(--dorado-ucmi);
            color: var(--dorado-ucmi);
            padding: 10px 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .menu-toggle:hover {
            background: var(--dorado-ucmi);
            color: black;
            box-shadow: 0 0 15px var(--dorado-ucmi);
        }

        /* ESTILO TARJETAS SUPERADMIN */
        .admin-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            height: 100%;
            text-align: center;
        }

        .admin-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-12px);
            border-color: var(--dorado-ucmi);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(197, 160, 89, 0.1);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 20px;
            color: var(--dorado-ucmi);
        }

        .badge-custom {
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 800;
            background: var(--cian-neon);
            color: #000;
        }

        .btn-update {
            background: var(--dorado-ucmi);
            color: black;
            font-weight: bold;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-update:hover { filter: brightness(1.2); box-shadow: 0 0 10px var(--dorado-ucmi); }
    </style>
</head>
<body>

<div class="overlay">
    <!-- Botón para abrir el Sidebar -->
    <button class="menu-toggle" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarAdmin">
        <i class="bi bi-list fs-4"></i>
    </button>

    <!-- SIDEBAR DESLIZABLE -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarAdmin">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title fw-bold text-warning">PERFIL SEDE</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div class="text-center mb-4">
                <div class="profile-img-container">
                    <img id="logoPreview" src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png">
                </div>
                <h4 id="sideNombreAcademia" class="fw-bold">Cargando...</h4>
                <p class="small text-white-50">Sede Autorizada UCMI</p>
            </div>

            <div class="mb-4 p-3 bg-dark rounded-3 border border-secondary">
                <label class="form-label small text-uppercase fw-bold">Personalizar Identidad</label>
                <input type="file" id="inputLogo" class="form-control form-control-sm bg-black text-white border-secondary mb-2">
                <button id="btnGuardarLogo" class="btn btn-update btn-sm">Actualizar Logo</button>
            </div>

            <div class="mt-auto">
                <hr class="border-secondary">
                <button id="btnLogout" class="btn btn-outline-danger w-100">
                    <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </div>

    <!-- CONTENIDO -->
    <div class="container py-5 mt-4">
        <div class="row mb-5 text-center">
            <div class="col-12">
                <h1 class="display-3 fw-bold">Panel de Control</h1>
                <p class="text-warning fs-4 fw-light">Gestión Administrativa Local</p>
                <div class="mx-auto" style="width: 80px; height: 3px; background: var(--dorado-ucmi);"></div>
            </div>
        </div>

        <div class="row g-4 justify-content-center">
            <!-- TARJETA 1: CAPTACIÓN (DUAL) -->
            <div class="col-md-3">
                <div class="admin-card" onclick="abrirFormulario()">
                    <div class="icon-circle"><i class="bi bi-person-plus-fill"></i></div>
                    <h3>Captación</h3>
                    <p class="small opacity-75">Clic para abrir o usa el botón para copiar link.</p>
                    <div class="mt-3">
                        <span class="badge-custom" onclick="event.stopPropagation(); copiarEnlaceCaptacion();" style="cursor: copy;">
                            COPIAR LINK
                        </span>
                    </div>
                </div>
            </div>

            <!-- TARJETA 2: ALUMNOS -->
            <div class="col-md-3">
                <div class="admin-card" onclick="location.href='lista-alumnos.html'">
                    <div class="icon-circle"><i class="bi bi-people"></i></div>
                    <h3>Alumnos</h3>
                    <p class="small opacity-75">Base de datos de inscritos y asistencia.</p>
                    <div class="mt-3">
                        <span class="badge-custom" style="background: #bc13fe; color: white;">REGISTROS</span>
                    </div>
                </div>
            </div>

            <!-- TARJETA 3: PAGOS -->
            <div class="col-md-3">
                <div class="admin-card">
                    <div class="icon-circle"><i class="bi bi-cash-coin"></i></div>
                    <h3>Cobros</h3>
                    <p class="small opacity-75">Control de mensualidades y reportes.</p>
                    <div class="mt-3">
                        <span class="badge-custom" style="background: var(--dorado-ucmi); color: black;">FINANZAS</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let linkCaptacionGlobal = "";
    let userEmail = "";

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        userEmail = user.email;

        const q = query(collection(db, "historial_postulaciones"), where("email", "==", user.email));
        const snap = await getDocs(q);
        if (!snap.empty) {
            const entidad = snap.docs[0].data().entidad;
            document.getElementById('sideNombreAcademia').innerText = entidad;
            linkCaptacionGlobal = `https://universitariodematematica-star.github.io/UCMI/formulario-postulacion.html?ref=${encodeURIComponent(entidad)}`;
        }

        const docRef = doc(db, "usuarios", user.email);
        const userDoc = await getDoc(docRef);
        if (userDoc.exists() && userDoc.data().logoCustom) {
            document.getElementById('logoPreview').src = userDoc.data().logoCustom;
        }
    });

    document.getElementById('btnGuardarLogo').addEventListener('click', async () => {
        const file = document.getElementById('inputLogo').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64String = reader.result;
            await updateDoc(doc(db, "usuarios", userEmail), { logoCustom: base64String });
            document.getElementById('logoPreview').src = base64String;
            alert("Identidad actualizada.");
        };
        reader.readAsDataURL(file);
    });

    window.copiarEnlaceCaptacion = () => {
        navigator.clipboard.writeText(linkCaptacionGlobal);
        alert("¡Enlace copiado!");
    };

    window.abrirFormulario = () => {
        window.open(linkCaptacionGlobal, '_blank');
    };

    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>
</body>
</html>
