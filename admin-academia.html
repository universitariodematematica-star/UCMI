<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel Academia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --sidebar-width: 280px;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            margin: 0;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.9) 100%);
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar-master {
            background: rgba(6, 9, 15, 0.8);
            border-bottom: 1px solid rgba(197, 160, 89, 0.4);
            backdrop-filter: blur(15px);
            padding: 0.5rem 2rem;
        }

        .logo-nav { height: 50px; }

        /* TARJETAS COMPACTAS (Estilo SuperAdmin) */
        .admin-card {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 16px;
            transition: all 0.3s ease;
            height: 100%;
        }

        .admin-card:hover {
            transform: translateY(-5px);
            border-color: var(--cian-neon) !important;
            background: rgba(255, 255, 255, 0.07) !important;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(0, 242, 255, 0.1);
            color: var(--cian-neon);
            font-size: 1.5rem;
        }

        .btn-action {
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }

        /* SIDEBAR (Igual al que ya tenemos) */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: rgba(6, 9, 15, 0.98);
            z-index: 2000;
            transition: 0.4s;
            padding: 60px 20px;
            border-right: 1px solid var(--dorado-ucmi);
        }

        .sidebar-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 15px;
            height: 100%;
            z-index: 1999;
        }

        .sidebar:hover, .sidebar-trigger:hover + .sidebar { left: 0; }
    </style>
</head>
<body>

<div class="sidebar-trigger"></div>
<div class="sidebar">
    <h6 class="text-uppercase opacity-50 mb-4" style="letter-spacing: 2px;">Configuración</h6>
    <div class="mb-3">
        <label class="small mb-2">Logo de Academia</label>
        <input type="file" id="logoInput" class="form-control form-control-sm bg-dark text-white border-secondary">
    </div>
    <div class="form-check form-switch mt-4">
        <input class="form-check-input" type="checkbox" id="applyLogo">
        <label class="form-check-label small">Aplicar Identidad Visual</label>
    </div>
</div>

<div class="overlay">
    <nav class="navbar navbar-master sticky-top">
        <div class="container-fluid">
            <img id="mainLogo" src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="logo-nav">
            <span id="academyLabel" class="badge rounded-pill" style="border: 1px solid var(--dorado-ucmi); color: var(--dorado-ucmi);">Cargando...</span>
            <button id="btnLogout" class="btn btn-sm btn-outline-danger rounded-pill">Salir</button>
        </div>
    </nav>

    <div class="container py-5">
        <!-- CUADRÍCULA DE TARJETAS (Izquierda a Derecha / Arriba a Abajo) -->
        <div class="row g-4" id="cardsContainer">
            
            <!-- TARJETA: CAPTACIÓN DE ALUMNOS -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card admin-card">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center mb-3">
                            <div class="icon-circle me-3">
                                <i class="bi bi-person-plus"></i>
                            </div>
                            <div>
                                <h5 class="card-title mb-0">Captación</h5>
                                <small class="text-info text-uppercase" style="font-size: 0.6rem; letter-spacing: 1px;">Inscripción Directa</small>
                            </div>
                        </div>
                        
                        <p class="card-text small opacity-75 mb-4">
                            Envíe este link al alumno para que complete su registro y evitar errores de transcripción.
                        </p>

                        <div class="d-grid gap-2">
                            <button onclick="copiarLink()" class="btn btn-info btn-action text-dark">
                                <i class="bi bi-link-45deg me-1"></i> Copiar Enlace
                            </button>
                            <a href="#" id="btnPreview" target="_blank" class="btn btn-outline-light btn-action opacity-50">
                                <i class="bi bi-eye me-1"></i> Previsualizar
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Aquí se irán acumulando las siguientes tarjetas (Pagos, Alumnos, Notas, etc.) -->

        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Tu configuración (se mantiene igual)
    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let enlaceGlobal = "";

    onAuthStateChanged(auth, async (user) => {
        if (!user) window.location.href = "index.html";
        
        // Carga dinámica de la Entidad
        const q = query(collection(db, "historial_postulaciones"), where("email", "==", user.email));
        const snap = await getDocs(q);
        if (!snap.empty) {
            const ent = snap.docs[0].data().entidad;
            document.getElementById('academyLabel').innerText = ent;
            enlaceGlobal = `${window.location.origin}/formulario-postulacion.html?ref=${encodeURIComponent(ent)}`;
            document.getElementById('btnPreview').href = enlaceGlobal;
        }

        // Carga de Logo
        const uDoc = await getDoc(doc(db, "usuarios", user.email));
        if (uDoc.exists() && uDoc.data().aplicarLogo) {
            document.getElementById('mainLogo').src = uDoc.data().logoCustom;
        }
    });

    window.copiarLink = () => {
        if (enlaceGlobal) {
            navigator.clipboard.writeText(enlaceGlobal);
            alert("Enlace copiado. ¡Listo para enviar!");
        }
    };

    // Lógica de Redimensión y Logout (Mantener las mismas funciones anteriores)
    document.getElementById('btnLogout').onclick = () => signOut(auth);
</script>
</body>
</html>
