<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel Administrativo de Academia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --sidebar-width: 280px;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%);
            min-height: 100vh;
            width: 100%;
            padding-bottom: 50px;
        }

        /* SIDEBAR DESLIZABLE */
        .sidebar {
            position: fixed;
            top: 0;
            left: calc(var(--sidebar-width) * -1);
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(6, 9, 15, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 80px 20px 20px;
        }

        .sidebar-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 100%;
            z-index: 1999;
        }

        .sidebar:hover, .sidebar-trigger:hover + .sidebar {
            left: 0;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        /* PREVISUALIZACIÓN */
        .logo-preview-container {
            border: 2px dashed rgba(197, 160, 89, 0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
        }

        #imgPreview {
            max-width: 100%;
            max-height: 80px;
            display: none;
            margin: 0 auto 15px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        .navbar-master {
            background: rgba(6, 9, 15, 0.8);
            border-bottom: 1px solid rgba(197, 160, 89, 0.5);
            backdrop-filter: blur(15px);
            padding: 0.8rem 2rem;
            z-index: 1000;
        }

        .logo-nav {
            height: 60px;
            transition: opacity 0.4s ease;
        }

        .btn-logout {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4d4d;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
        }

        .text-glow-gold {
            color: var(--dorado-ucmi);
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.6);
        }
    </style>
</head>
<body>

<div class="sidebar-trigger"></div>

<div class="sidebar">
    <h5 class="text-glow-gold mb-4"><i class="bi bi-palette2 me-2"></i>Personalización</h5>
    
    <div class="mb-3">
        <label class="form-label small opacity-75">Subir Logo de Academia</label>
        <input type="file" id="logoInput" class="form-control form-control-sm bg-dark text-white border-secondary" accept="image/*">
        <div class="form-text text-white-50" style="font-size: 0.7rem;">Se redimensionará automáticamente.</div>
    </div>

    <div id="containerPreview" class="logo-preview-container">
        <img id="imgPreview" src="#" alt="Vista previa">
        <div class="form-check form-switch d-flex justify-content-center align-items-center gap-2">
            <input class="form-check-input" type="checkbox" id="applyLogo">
            <label class="form-check-label small" for="applyLogo">Aplicar Identidad</label>
        </div>
    </div>
</div>

<div class="overlay">
    <nav class="navbar navbar-master sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a href="#">
                <img id="mainLogo" src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo" class="logo-nav">
            </a>
            <button id="btnLogout" class="btn btn-logout">Salir <i class="bi bi-box-arrow-right"></i></button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row text-center mb-5">
            <div class="col-12">
                <h1 class="display-4 fw-bold">Panel Administrativo</h1>
                <p class="lead text-glow-gold">Configuración Global de la Academia</p>
            </div>
        </div>

        <!-- Contenido principal aquí -->
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const logoInput = document.getElementById('logoInput');
    const imgPreview = document.getElementById('imgPreview');
    const applyLogo = document.getElementById('applyLogo');
    const mainLogo = document.getElementById('mainLogo');
    const LOGO_UCMI = "https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png";

    // 1. Cargar identidad al iniciar sesión
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "index.html";
        } else {
            const userDoc = await getDoc(doc(db, "usuarios", user.email));
            if (userDoc.exists()) {
                const data = userDoc.data();
                if (data.logoCustom && data.aplicarLogo) {
                    mainLogo.src = data.logoCustom;
                    imgPreview.src = data.logoCustom;
                    imgPreview.style.display = "block";
                    applyLogo.checked = true;
                }
            }
        }
    });

    // 2. Lógica de Redimensión Proporcional y Subida
    logoInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;

                img.onload = async () => {
                    const MAX_DIM = 500; // Máximo 500px para mantenerlo ligero
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_DIM) {
                            height *= MAX_DIM / width;
                            width = MAX_DIM;
                        }
                    } else {
                        if (height > MAX_DIM) {
                            width *= MAX_DIM / height;
                            height = MAX_DIM;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Comprimimos a WebP para máximo ahorro de espacio
                    const optimizedBase64 = canvas.toDataURL('image/webp', 0.7);

                    const user = auth.currentUser;
                    if (user) {
                        try {
                            await updateDoc(doc(db, "usuarios", user.email), {
                                logoCustom: optimizedBase64,
                                aplicarLogo: true
                            });
                            mainLogo.src = optimizedBase64;
                            imgPreview.src = optimizedBase64;
                            imgPreview.style.display = "block";
                            applyLogo.checked = true;
                            alert("Identidad visual actualizada.");
                        } catch (err) {
                            console.error(err);
                        }
                    }
                };
            };
            reader.readAsDataURL(file);
        }
    });

    // 3. Switch de activación
    applyLogo.addEventListener('change', async function() {
        const user = auth.currentUser;
        if (user) {
            await updateDoc(doc(db, "usuarios", user.email), { aplicarLogo: this.checked });
            location.reload();
        }
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>
</body>
</html>
