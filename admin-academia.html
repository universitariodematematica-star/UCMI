<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel Administrativo de Academia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --sidebar-width: 280px;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%);
            min-height: 100vh;
        }

        /* SIDEBAR DINÁMICO */
        .sidebar {
            position: fixed;
            top: 0;
            left: calc(var(--sidebar-width) * -1);
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(6, 9, 15, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 80px 20px;
        }

        .sidebar-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 100%;
            z-index: 1999;
        }

        .sidebar:hover, .sidebar-trigger:hover + .sidebar { left: 0; }

        /* ESTILO DE TARJETAS */
        .admin-card {
            background: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 20px;
            transition: 0.3s ease;
        }

        .admin-card:hover {
            transform: translateY(-5px);
            border-color: var(--cian-neon) !important;
        }

        .navbar-master {
            background: rgba(6, 9, 15, 0.8);
            border-bottom: 1px solid rgba(197, 160, 89, 0.5);
            backdrop-filter: blur(15px);
            padding: 0.8rem 2rem;
        }

        .logo-nav { height: 60px; object-fit: contain; }

        .btn-neon {
            background: var(--cian-neon);
            color: var(--azul-profundo);
            font-weight: bold;
            border: none;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .btn-neon:hover {
            background: #00dce8;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }
    </style>
</head>
<body>

<div class="sidebar-trigger"></div>

<!-- SIDEBAR DE PERSONALIZACIÓN -->
<div class="sidebar">
    <h5 style="color: var(--dorado-ucmi)" class="mb-4 text-center">
        <i class="bi bi-shield-check me-2"></i>Gestión de Academia
    </h5>
    
    <div class="mb-4">
        <label class="form-label small opacity-75">Identidad Visual (Logo)</label>
        <input type="file" id="logoInput" class="form-control form-control-sm bg-dark text-white border-secondary" accept="image/*">
    </div>

    <div class="text-center p-3 border border-secondary rounded-3 bg-black bg-opacity-25">
        <img id="imgPreview" src="#" alt="Vista previa" style="max-width: 100%; max-height: 80px; display: none; margin-bottom: 15px;">
        <div class="form-check form-switch d-flex justify-content-center align-items-center gap-2">
            <input class="form-check-input" type="checkbox" id="applyLogo">
            <label class="form-check-label small" for="applyLogo">Activar Identidad</label>
        </div>
    </div>
</div>

<div class="overlay">
    <!-- NAVBAR CON LOGO DINÁMICO -->
    <nav class="navbar navbar-master sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <img id="mainLogo" src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo" class="logo-nav">
            <button id="btnLogout" class="btn btn-outline-danger btn-sm rounded-pill px-3">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row mb-5 text-center">
            <div class="col-12">
                <h1 class="display-5 fw-bold mb-2" id="welcomeTitle">Panel Administrativo</h1>
                <p class="lead" style="color: var(--dorado-ucmi)" id="academyNameLabel text-uppercase">Cargando datos de academia...</p>
            </div>
        </div>

        <!-- CONTENEDOR DE TARJETAS -->
        <div class="row g-4 justify-content-center">
            
            <!-- TARJETA 1: FORMULARIO DE CAPTACIÓN (DINÁMICA) -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 admin-card text-white">
                    <div class="card-body p-4 d-flex flex-column">
                        <div class="d-flex align-items-center mb-3">
                            <div class="p-3 bg-info bg-opacity-10 rounded-3 me-3">
                                <i class="bi bi-person-plus-fill fs-3 text-info"></i>
                            </div>
                            <h4 class="card-title mb-0">Captación</h4>
                        </div>
                        <p class="card-text opacity-75 flex-grow-1">
                            Accede al formulario oficial. Los alumnos registrados mediante este enlace se vincularán automáticamente a tu gestión.
                        </p>
                        <div class="mt-4">
                            <button id="btnCopiarEnlace" class="btn btn-outline-info w-100 mb-2">
                                <i class="bi bi-share me-2"></i>Copiar Enlace Registro
                            </button>
                            <a href="#" id="btnAbrirForm" target="_blank" class="btn btn-neon w-100">
                                Abrir Formulario
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Aquí se pueden añadir más tarjetas siguiendo el mismo nivel de diseño -->

        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const mainLogo = document.getElementById('mainLogo');
    const academyLabel = document.getElementById('academyNameLabel text-uppercase');
    const btnCopiar = document.getElementById('btnCopiarEnlace');
    const btnAbrir = document.getElementById('btnAbrirForm');

    let academiaNombreGlobal = "";

    // 1. CARGA DE DATOS DINÁMICOS (SISTEMA GENÉRICO)
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "index.html";
        } else {
            try {
                // Paso A: Consultamos la colección 'historial_postulaciones' para saber quién es esta academia
                const q = query(collection(db, "historial_postulaciones"), where("email", "==", user.email));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    const postuData = querySnapshot.docs[0].data();
                    academiaNombreGlobal = postuData.entidad || "Academia UCMI";
                    
                    // Inyectamos el nombre en la interfaz
                    academyLabel.innerText = `GESTIÓN: ${academiaNombreGlobal}`;
                    
                    // Configuramos el enlace del formulario dinámicamente
                    const linkFinal = `${window.location.origin}/formulario-postulacion.html?ref=${encodeURIComponent(academiaNombreGlobal)}`;
                    btnAbrir.href = linkFinal;

                    // Configuramos el botón de copiar
                    btnCopiar.onclick = () => {
                        navigator.clipboard.writeText(linkFinal);
                        alert(`Enlace de "${academiaNombreGlobal}" copiado.`);
                    };
                }

                // Paso B: Consultamos el perfil en 'usuarios' para el Logo Personalizado
                const userDoc = await getDoc(doc(db, "usuarios", user.email));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    if (userData.logoCustom && userData.aplicarLogo) {
                        mainLogo.src = userData.logoCustom;
                        document.getElementById('imgPreview').src = userData.logoCustom;
                        document.getElementById('imgPreview').style.display = "block";
                        document.getElementById('applyLogo').checked = true;
                    }
                }
            } catch (err) { console.error("Error cargando academia:", err); }
        }
    });

    // 2. LÓGICA DEL REDIMENSIONADOR (Mantenida intacta para no dañar la lógica anterior)
    document.getElementById('logoInput').addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const MAX = 500;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                    else { if (h > MAX) { w *= MAX / h; h = MAX; } }

                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);

                    const optimized = canvas.toDataURL('image/webp', 0.7);
                    const user = auth.currentUser;
                    if (user) {
                        await setDoc(doc(db, "usuarios", user.email), {
                            logoCustom: optimized,
                            aplicarLogo: true
                        }, { merge: true });
                        location.reload();
                    }
                };
            };
            reader.readAsDataURL(file);
        }
    });

    // 3. SWITCH DE APLICACIÓN
    document.getElementById('applyLogo').addEventListener('change', async function() {
        const user = auth.currentUser;
        if (user) {
            await updateDoc(doc(db, "usuarios", user.email), { aplicarLogo: this.checked });
            location.reload();
        }
    });

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
