<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>html { display: none; }</style>
    <script type="module" src="auth-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel Administrativo de Academia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --purpura-neon: #bc13fe;
            --magenta-neon: #ff00ff;
            --verde-neon: #39ff14;
            --blanco-suave: rgba(255, 255, 255, 0.85);
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%);
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .navbar-master {
            background: rgba(6, 9, 15, 0.8);
            border-bottom: 1px solid rgba(197, 160, 89, 0.5);
            backdrop-filter: blur(15px);
            padding: 0.8rem 2rem;
            z-index: 1030;
        }

        .logo-nav {
            height: 60px;
            filter: drop-shadow(0 0 5px rgba(197, 160, 89, 0.3));
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: rgba(6, 9, 15, 0.9);
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            backdrop-filter: blur(20px);
            height: calc(100vh - 85px);
            position: sticky;
            top: 85px;
            padding: 2rem 1rem;
            overflow-y: auto;
        }

        .nav-link-custom {
            color: var(--blanco-suave);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            text-decoration: none;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .nav-link-custom i {
            margin-right: 15px;
            font-size: 1.2rem;
            color: var(--dorado-ucmi);
        }

        .nav-link-custom:hover {
            background: rgba(197, 160, 89, 0.1);
            color: white;
            border-color: rgba(197, 160, 89, 0.4);
            transform: translateX(5px);
        }

        .nav-link-custom.active {
            background: rgba(197, 160, 89, 0.2);
            border-color: var(--dorado-ucmi);
            color: white;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.2);
        }

        .btn-logout {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4d4d;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-logout:hover {
            background: #ff4d4d;
            color: white;
        }

        .main-content {
            flex-grow: 1;
            padding: 3rem;
        }

        .text-glow-gold {
            color: var(--dorado-ucmi);
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.6);
        }

        .icon-profile {
            width: 45px;
            height: 45px;
            background: rgba(197, 160, 89, 0.1);
            border: 1px solid var(--dorado-ucmi);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dorado-ucmi);
        }
    </style>
</head>
<body>

<div class="overlay">
    <nav class="navbar navbar-master sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a href="index.html">
                <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="UCMI Logo" class="logo-nav">
            </a>
            <div class="d-flex align-items-center">
                <div class="text-end me-3 d-none d-md-block">
                    <small class="d-block opacity-75 text-white">Panel de Academia</small>
                    <button id="btnLogout" class="btn btn-logout ms-2">Salir <i class="bi bi-box-arrow-right"></i></button>
                </div>
                <div class="icon-profile">
                    <i class="bi bi-bank2"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="d-flex">
        <!-- SIDEBAR RESTAURADO -->
        <aside class="sidebar">
            <div class="mb-4 ps-3">
                <small class="text-uppercase ls-2 opacity-50 fw-bold" style="font-size: 0.7rem;">Navegación</small>
            </div>
            <nav>
                <a class="nav-link-custom active"><i class="bi bi-speedometer2"></i> Inicio</a>
                <a class="nav-link-custom"><i class="bi bi-person-plus"></i> Solicitudes</a>
                <a class="nav-link-custom"><i class="bi bi-clock-history"></i> Vigencia</a>
                <a class="nav-link-custom"><i class="bi bi-cpu"></i> Usuarios</a>
                <a class="nav-link-custom"><i class="bi bi-archive"></i> Historial</a>
                <a class="nav-link-custom"><i class="bi bi-person-lines-fill"></i> Directorio</a>
                <a class="nav-link-custom"><i class="bi bi-mortarboard-fill"></i> Ofertas</a>
                <a class="nav-link-custom"><i class="bi bi-grid-3x3-gap-fill"></i> Módulos</a>
                <hr style="border-color: rgba(197, 160, 89, 0.3);">
                <a class="nav-link-custom"><i class="bi bi-trash3-fill"></i> Papelera</a>
            </nav>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">
            <div class="row mb-5">
                <div class="col-12">
                    <h1 class="display-4 fw-bold mb-0">Gestión de Academia</h1>
                    <p class="lead text-glow-gold">Configuración y Administración Institucional</p>
                    <div style="width: 60px; height: 4px; background: var(--dorado-ucmi); border-radius: 10px; margin-top: 15px;"></div>
                </div>
            </div>

            <!-- Aquí irán las tarjetas o formularios que necesites -->
            <div id="content-area" class="row g-4">
                <div class="col-12 text-center opacity-25 mt-5">
                    <i class="bi bi-layers" style="font-size: 4rem;"></i>
                    <p>Esperando configuración de módulos...</p>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "index.html";
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>

</body>
</html>
