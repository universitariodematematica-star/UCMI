<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Control Academia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --purpura-neon: #bc13fe;
            --blanco-suave: rgba(255, 255, 255, 0.85);
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .navbar-master {
            background: rgba(6, 9, 15, 0.8);
            border-bottom: 1px solid rgba(197, 160, 89, 0.5);
            backdrop-filter: blur(15px);
            padding: 0.8rem 2rem;
        }

        .logo-nav { height: 60px; }

        .admin-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }

        .admin-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-12px);
            border-color: var(--dorado-ucmi);
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(197, 160, 89, 0.1);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 20px;
            color: var(--dorado-ucmi);
        }

        .badge-custom {
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 800;
        }

        .badge-solicitud { background: var(--purpura-neon); color: #fff; }
        .badge-sedes { background: var(--cian-neon); color: #000; }

        .btn-logout {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4d4d;
            border-radius: 50px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="overlay">
    <nav class="navbar navbar-master sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="UCMI Logo" class="logo-nav">
            <button id="btnLogout" class="btn btn-logout">Salir <i class="bi bi-box-arrow-right"></i></button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row mb-5 text-center">
            <div class="col-12">
                <h1 class="display-3 fw-bold">Gestión de Academia</h1>
                <p class="lead" style="color: var(--dorado-ucmi);">Administración de Sedes y Postulaciones</p>
            </div>
        </div>

        <div class="row g-4 justify-content-center">
            
            <!-- TARJETA 1: CAPTACIÓN (Vinculada al formulario) -->
            <div class="col-md-4">
                <a href="formulario-postulacion.html" class="admin-card text-center">
                    <div class="icon-circle" style="color: var(--cian-neon); border-color: var(--cian-neon);">
                        <i class="bi bi-person-plus-fill"></i>
                    </div>
                    <h3 class="fw-bold">Captación</h3>
                    <p class="text-white-50 small px-3">Acceso al formulario oficial para el registro y envío de datos a Firebase.</p>
                    <div class="mt-3">
                        <span class="badge-custom badge-sedes">REGISTRO ACTIVO</span>
                    </div>
                </a>
            </div>

            <!-- TARJETA 2: SOLICITUDES (Sin link todavía) -->
            <div class="col-md-4">
                <div class="admin-card text-center">
                    <div class="icon-circle" style="color: var(--purpura-neon); border-color: var(--purpura-neon);">
                        <i class="bi bi-mortarboard-fill"></i>
                    </div>
                    <h3 class="fw-bold">Solicitudes</h3>
                    <p class="text-white-50 small px-3">Gestión de nuevas instituciones y validación de sedes aspirantes.</p>
                    <div class="mt-3">
                        <span class="badge-custom badge-solicitud">NUEVAS POSTULACIONES</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const MI_UID_MAESTRO = "m56REyF19sOsC6BE5sJdJG6eR863";

    onAuthStateChanged(auth, (user) => {
        if (!user || user.uid !== MI_UID_MAESTRO) {
            window.location.href = "index3.html";
        }
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => {
            window.location.href = "index3.html";
        });
    });
</script>

</body>
</html>
