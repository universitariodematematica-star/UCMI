<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>html { display: none; }</style>
    <script type="module" src="auth-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel Administrativo de Academia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --purpura-neon: #bc13fe;
            --magenta-neon: #ff00ff;
            --verde-neon: #39ff14;
            --blanco-suave: rgba(255, 255, 255, 0.85);
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%);
            min-height: 100vh;
            width: 100%;
            padding-bottom: 50px;
        }

        .navbar-master {
            background: rgba(6, 9, 15, 0.8);
            border-bottom: 1px solid rgba(197, 160, 89, 0.5);
            backdrop-filter: blur(15px);
            padding: 0.8rem 2rem;
        }

        .logo-nav {
            height: 60px;
            filter: drop-shadow(0 0 5px rgba(197, 160, 89, 0.3));
        }

        .btn-logout {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4d4d;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-logout:hover {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(197, 160, 89, 0.1);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 20px;
            color: var(--dorado-ucmi);
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.5);
        }

        .text-glow-gold {
            color: var(--dorado-ucmi);
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.6);
        }

        /* Contenedor para futuras tarjetas */
        .admin-content-area {
            min-height: 400px;
        }
    </style>
</head>
<body>

<div class="overlay">
    <nav class="navbar navbar-master sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a href="index.html">
                <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="UCMI Logo" class="logo-nav">
            </a>
            <div class="d-flex align-items-center">
                <div class="text-end me-3 d-none d-md-block">
                    <small class="d-block opacity-75 text-white">Panel Administrativo</small>
                    <button id="btnLogout" class="btn btn-logout ms-2">Salir <i class="bi bi-box-arrow-right"></i></button>
                </div>
                <div class="icon-circle mb-0" style="width: 50px; height: 50px; font-size: 1.2rem; margin: 0;">
                    <i class="bi bi-bank2"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row mb-5 text-center">
            <div class="col-12">
                <h1 class="display-3 fw-bold mb-0">Gestión de Academia</h1>
                <p class="lead text-glow-gold fs-4">Unidad Operativa Institucional - UCMI</p>
                <div class="mx-auto" style="width: 60px; height: 4px; background: var(--dorado-ucmi); border-radius: 10px; margin-top: 15px;"></div>
            </div>
        </div>

        <!-- AREA DISPONIBLE PARA TARJETAS -->
        <div class="row g-4 gy-5 admin-content-area">
            <!-- Aquí iremos añadiendo las tarjetas según necesites -->
        </div>

        <footer class="mt-5 pt-4 text-center">
            <p class="text-white-50 small">UCMI - Universitario de Ciencias Matemáticas e Idiomas</p>
            <p class="text-glow-gold fw-bold small">NÚCLEO DE ADMINISTRACIÓN LOCAL v1.0</p>
        </footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Validación de usuario: Por ahora permitimos el acceso, 
    // pero recuerda que en el futuro este panel será usado por directores de academia
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
        }
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        }).catch((error) => {
            console.error("Error al cerrar sesión", error);
        });
    });
</script>

</body>
</html>
