<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px; 
        }

        .input-curso{
    width: 50%;
    background: #0b1a2a;
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
}

.input-curso::placeholder{
    color: rgba(255,255,255,0.5);
}

.input-curso:focus{
    background: #0b1a2a;
    color: white;
    border-color: var(--dorado-ucmi);
    box-shadow: none;
}

        @media (max-width: 768px){
    .input-curso{
        width: 100%;
    }
}

        .btn i{
    display: inline-flex;
    align-items: center;
}

   /* ===== Tarjeta de curso ===== */

.curso-card{
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.12);
    border-radius:16px;

    padding:18px 22px;

    transition:.25s;
}

.curso-card:hover{
    background:rgba(255,255,255,.12);
    transform:translateY(-2px);
}

.curso-nombre{
    font-size:1.15rem;
    font-weight:600;
    color:white;
    margin:0;
}

.curso-acciones{
    display:flex;
    gap:10px;
}

.btn-accion{

    width:38px;
    height:38px;

    border-radius:50%;

    border:1px solid rgba(255,255,255,.18);

    background:rgba(255,255,255,.08);

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:.25s;
}

.btn-accion:hover{
    transform:scale(1.08);
    background:rgba(255,255,255,.15);
}

.btn-editar:hover{
    color:#ffc107;
    border-color:#ffc107;
}

.btn-asignaturas:hover{
    color:#0dcaf0;
    border-color:#0dcaf0;
}        

.btn-eliminar:hover{
    color:#dc3545;
    border-color:#dc3545;
}     

    .btn-editar:hover{
    color:#ffc107;
    border-color:#ffc107;
}

.btn-eliminar:hover{
    color:#dc3545;
    border-color:#dc3545;
}    
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="alumnos-academia.html" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>
            <a href="modificaciones.html" class="nav-item-ucmi"><i class="bi bi-pencil-square"></i></i> MODIFICACIONES</a>
            <a href="cursos.html" class="nav-item-ucmi"><i class="bi bi-journal-bookmark"></i> CURSOS</a>
            <a href="crear-aulas.html" class="nav-item-ucmi"><i class="bi bi-easel"></i> AULAS</a>
            <a href="academia-modulos.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="contenidos-academia.html" class="nav-item-ucmi"><i class="bi bi-collection"></i> CONTENIDO</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">

<div class="container-fluid">

    <div class="text-center mb-4">
        <h1 class="fw-bold">CURSOS - ACADEMIA PREUNIVERSITARIA</h1>
        <p class="text-light opacity-75 fs-5">
            Cree, edite o elimine cursos desde un mismo panel
        </p>
    </div>

    <!-- INPUT + BOTONES CRUD -->
    <div class="row justify-content-center mb-4">

        <div class="col-lg-10">

            <div class="modelo-card d-flex align-items-center gap-3 flex-nowrap">
                <!-- INPUT -->
                <input type="text"
       id="nombreCurso"
       class="form-control input-curso"
       placeholder="Escriba el nombre del curso">

                <button class="btn btn-success btn-sm d-flex align-items-center gap-1 px-3"
                        id="btnRegistrarCurso">
                    <i class="bi bi-plus-circle"></i>
                    Registrar
                </button>

            </div>

        </div>

    </div>

    <!-- LISTA DE CURSOS -->
    <div class="row g-4" id="listaCursos">

        <!-- aquí luego se llenará con Firestore -->

        <div class="col-12">

            <div class="modelo-card text-center text-white-50">
                No hay cursos registrados aún
            </div>

        </div>

    </div>

</div>
        
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    addDoc,
    query,
    where,
    onSnapshot,
    deleteDoc,
    updateDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// 🔥 Firebase init
const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
});

const db = getFirestore(app);
const auth = getAuth();

let usuarioActual = null;

// ===============================
// 🔐 AUTH + INIT GENERAL
// ===============================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    usuarioActual = user;

    // ===============================
    // 🧑 PERFIL (LOGO)
    // ===============================
    const userSnap = await getDoc(
        doc(db, "usuarios", user.uid)
    );

    if (userSnap.exists()) {

        const d = userSnap.data();

        const logo = document.getElementById('logoAcademia');

        logo.src =
            d.logoCustom ||
            "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";

        logo.style.opacity = "1";
    }

    // ===============================
    // 📚 CURSOS (REALTIME)
    // ===============================
    const lista = document.getElementById("listaCursos");

    const q = query(
        collection(db, "cursos"),
        where("academiaId", "==", user.uid)
    );

    onSnapshot(q, (snapshot) => {

        lista.innerHTML = "";

        if (snapshot.empty) {
            lista.innerHTML = `
            <div class="col-12">
                <div class="modelo-card text-center text-white-50">
                    No hay cursos registrados aún
                </div>
            </div>`;
            return;
        }

        snapshot.forEach(docSnap => {

            const c = docSnap.data();
            const id = docSnap.id;

            lista.innerHTML += `
<div class="col-12">

    <div class="curso-card">

        <h4 class="curso-nombre">
            ${c.nombre_curso}
        </h4>

        <div class="curso-acciones">

    <button
        class="btn-accion btn-editar"
        onclick="editarCurso('${id}','${c.nombre_curso}')"
        title="Editar curso">

        <i class="bi bi-pencil"></i>

    </button>

    <button
        class="btn-accion btn-asignaturas"
        onclick="abrirAsignaturas('${id}')"
        title="Asignaturas del curso">

        <i class="bi bi-journal-bookmark"></i>

    </button>

    <button
        class="btn-accion btn-eliminar"
        onclick="eliminarCurso('${id}')"
        title="Eliminar curso">

        <i class="bi bi-trash"></i>

    </button>

</div>

    </div>

</div>`;
        });

    });
});

// ===============================
// ➕ CREAR CURSO
// ===============================
async function registrarCurso() {

    const input = document.getElementById("nombreCurso");
    const nombre = input.value.trim();

    if (!nombre || !usuarioActual) return;

    await addDoc(collection(db, "cursos"), {

    nombre_curso: nombre,
    academiaId: usuarioActual.uid,
    modelo: "Academia Preuniversitaria",
    fechaCreacion: serverTimestamp()

});

    input.value = "";
}

// ===============================
// ✏️ EDITAR CURSO (simple prompt)
// ===============================
window.editarCurso = async function (id, nombreActual) {

    const nuevoNombre = prompt("Editar curso:", nombreActual);

    if (!nuevoNombre) return;

    await updateDoc(doc(db, "cursos", id), {
        nombre_curso: nuevoNombre.trim()
    });
};
// ===============================
// 🗑 ELIMINAR CURSO
// ===============================
window.eliminarCurso = async function (id) {

    if (!confirm("¿Seguro que deseas eliminar este curso?")) return;

    await deleteDoc(doc(db, "cursos", id));
};

window.abrirAsignaturas = function (idCurso) {

    window.location.href =
        `curso-asignaturas.html?curso=${idCurso}`;

};    

// ===============================
// 🎯 BOTONES
// ===============================
document.getElementById("btnRegistrarCurso")
    .addEventListener("click", registrarCurso);

// ===============================
// 🚪 LOGOUT
// ===============================
document.getElementById("btnLogout")
    .addEventListener("click", () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });
    
</script>
    
</body>
</html>
