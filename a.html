<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Usuarios Oficiales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-neon: #ffcc66;
            --azul-neon: #00f2ff;
            --dorado-ucmi: #c5a059;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.3) 0%, rgba(6, 9, 15, 0.9) 100%);
            min-height: 100vh;
        }

        /* --- CONTENEDOR GLASS --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        /* --- EFECTO NEÓN EN TEXTOS --- */
        .neon-text-gold {
            color: var(--dorado-neon);
            text-shadow: 0 0 8px rgba(255, 204, 102, 0.6), 0 0 15px rgba(255, 204, 102, 0.2);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .neon-text-blue {
            color: var(--azul-neon);
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
            font-family: monospace;
        }

        /* --- ELIMINAR FONDOS DE TABLA --- */
        .table {
            --bs-table-bg: transparent !important;
            background-color: transparent !important;
        }

        .table tr {
            background-color: transparent !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* --- EFECTO HOVER: SALTO Y ACLARADO --- */
        .table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.08) !important;
            transform: scale(1.02) translateX(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }

        .role-badge {
            padding: 4px 15px;
            border-radius: 50px;
            font-size: 0.65rem;
            background: rgba(197, 160, 89, 0.1);
            color: var(--dorado-ucmi);
            border: 1px solid var(--dorado-ucmi);
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
        }

        .sidebar {
            background: rgba(6, 9, 15, 0.6);
            backdrop-filter: blur(15px);
            min-height: 100vh;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex flex-column p-4">
                <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="mb-4" style="height: 50px; object-fit: contain;">
                <nav class="nav flex-column mb-auto">
                    <a class="nav-link text-white active" href="#"><i class="bi bi-cpu-fill me-2"></i> Terminal Usuarios</a>
                </nav>
                <button id="btnLogoutSidebar" class="btn btn-outline-danger btn-sm rounded-pill">Desconexión</button>
            </div>

            <div class="col-md-10 p-5">
                <h2 class="neon-text-gold text-uppercase mb-5"><i class="bi bi-shield-shaded me-3"></i>Núcleo de Datos Supralógicos</h2>

                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr class="text-white-50 small border-bottom border-white border-opacity-10">
                                    <th>ENTIDAD / RESPONSABLE</th>
                                    <th>NOMBRE DEL RESPONSABLE</th>
                                    <th>EMAIL</th>
                                    <th>PERFIL</th>
                                    <th class="text-end">ACCIÓN</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "index.html";
    });

    const tableBody = document.getElementById('user-table-body');

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        tableBody.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;

            tableBody.innerHTML += `
                <tr class="border-bottom border-white border-opacity-5">
                    <td class="py-4">
                        <div>
                            <span class="neon-text-gold d-block mb-1">${data.entidad || 'Individual'}</span>
                            <span class="text-white-50 small">ID: ${data.responsable || 'N/A'}</span>
                        </div>
                    </td>
                    <td>
                        <span class="text-white fw-semibold">${data.nombreResponsable || '---'}</span>
                    </td>
                    <td><span class="neon-text-blue small">${data.email || id}</span></td>
                    <td><span class="role-badge">${(data.perfil || 'Usuario').toUpperCase()}</span></td>
                    <td class="text-end">
                        <button onclick="borrarUsuario('${id}')" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </td>
                </tr>`;
        });
    });

    window.borrarUsuario = async (id) => {
        const confirm = await Swal.fire({
            title: '¿Revocar?',
            text: "Se desconectará la entidad del servidor.",
            icon: 'warning',
            background: '#06090f',
            color: '#fff',
            confirmButtonColor: '#ff4d4d'
        });
        if (confirm.isConfirmed) await deleteDoc(doc(db, "usuarios", id));
    };

    document.getElementById('btnLogoutSidebar').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });
</script>
</body>
</html>
