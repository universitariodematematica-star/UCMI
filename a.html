<div class="super-overlay">

                </div>

            <div class="col-md-10 p-5">
                <div class="glass-panel">
                    <h3 class="fw-bold mb-5 text-uppercase" style="letter-spacing: 4px;">Control de Vigencia Operativa</h3>
                    
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Responsable</th>
                                    <th>Activación</th>
                                    <th style="width: 20%;">Cronología</th>
                                    <th>Expiración</th>
                                    <th>Remanente</th>

                                </tr>
                            </thead>
                            <tbody id="tablaVigencia"></tbody>
                        </table>
                    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Formateador robusto para la vista
    function mostrarFechaInicio(str) {
        if(!str) return "---";
        const partes = str.split(',')[0].split('/');
        return partes.length === 3 ? `${partes[0].padStart(2,'0')}/${partes[1].padStart(2,'0')}/${partes[2]}` : str;
    }

    // Convertidor para cálculos
    function aDate(str) {
        try {
            const [f, h] = str.split(', ');
            const [d, m, a] = f.split('/');
            return new Date(`${a}-${m.padStart(2,'0')}-${d.padStart(2,'0')}T${h}`);
        } catch(e) { return new Date(); }
    }

    onSnapshot(collection(db, "usuarios"), (snap) => {
        const t = document.getElementById('tablaVigencia');
        t.innerHTML = '';
        snap.forEach((d) => {
            const val = d.data();
            const inicio = aDate(val.fechaActivacion);
            const fin = new Date(val.expiracionTimestamp);
            const ahora = new Date();
            let porc = Math.floor(((ahora - inicio) / (fin - inicio)) * 100);
            porc = Math.min(Math.max(porc || 0, 0), 100);
            const dias = Math.ceil((fin - ahora) / (1000 * 60 * 60 * 24));

            t.innerHTML += `
                <tr>
                    <td><div class="fw-bold">${val.entidad || 'N/A'}</div><div class="email-badge">${val.email || d.id}</div></td>
                    <td><div class="text-white-50 small">INICIO</div><div class="small fw-bold">${mostrarFechaInicio(val.fechaActivacion)}</div></td>
                    <td>
                        <div class="progress mb-1"><div class="progress-bar progress-bar-neon" style="width:${porc}%"></div></div>
                        <div class="text-white-50" style="font-size:0.6rem">CONSUMO: ${porc}%</div>
                    </td>
                    <td><div class="text-white-50 small">FIN</div><div class="small fw-bold text-info">${fin.toLocaleDateString()}</div></td>
                    <td><span class="badge rounded-pill bg-info bg-opacity-10 text-info border border-info border-opacity-25 p-2 px-3">${dias > 0 ? dias + ' DÍAS' : 'EXPIRADO'}</span></td>
                    <td class="text-end"><button onclick="revocar('${d.id}')" class="btn btn-sm btn-outline-danger rounded-pill px-3">Revocar</button></td>
                </tr>`;
        });
    });

    window.revocar = async (id) => {
        const res = await Swal.fire({ title: '¿Revocar?', text: "Acceso denegado inmediato.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ff4d4d' });
        if(res.isConfirmed) await deleteDoc(doc(db, "usuarios", id));
    };

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth).then(() => window.location.href="index.html"));
</script>
</body>
