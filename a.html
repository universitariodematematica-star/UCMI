<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Directorio Maestro (Lista)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --verde-ucmi: #27ae60;
            --rojo-ucmi: #e74c3c;
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white;
        }

        .super-overlay { background: rgba(6, 9, 15, 0.85); min-height: 100vh; }

        .list-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            margin-top: 20px;
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: white;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .table thead th {
            color: var(--dorado-ucmi);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--dorado-ucmi);
        }

        .table tbody tr {
            transition: 0.3s;
            cursor: default;
        }

        .table tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .search-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
            padding: 10px 20px;
        }

        .search-box:focus { background: rgba(255, 255, 255, 0.15); color: white; border-color: var(--dorado-ucmi); box-shadow: none; }

        .badge-status {
            font-size: 0.65rem;
            padding: 3px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .status-aceptado { color: #2ecc71; border: 1px solid #27ae60; }
        .status-rechazado { color: #ff7675; border: 1px solid #e74c3c; }

        .btn-link-contact {
            color: white;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-link-contact:hover { color: var(--dorado-ucmi); }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid p-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 fw-bold mb-0">Directorio Maestro UCMI</h1>
                <p class="text-muted small">Historial ordenado alfabéticamente por entidad</p>
            </div>
            <div class="d-flex gap-2">
                <input type="text" id="inputBusqueda" class="form-control search-box" placeholder="Buscar institución, responsable o email...">
                <a href="super-admin.html" class="btn btn-outline-light rounded-pill px-4">Panel</a>
            </div>
        </div>

        <div class="list-container">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Entidad / Institución</th>
                            <th>Responsable</th>
                            <th>Perfil</th>
                            <th>Teléfono / WhatsApp</th>
                            <th>Email</th>
                            <th class="text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let registrosMaster = [];

    // Cargar historial
    onSnapshot(collection(db, "historial_postulaciones"), (snapshot) => {
        registrosMaster = snapshot.docs.map(doc => doc.data());
        
        // --- ORDEN ALFABÉTICO POR ENTIDAD ---
        registrosMaster.sort((a, b) => {
            const entidadA = (a.entidad && a.entidad !== "N/A" ? a.entidad : a.nombreResponsable).toLowerCase();
            const entidadB = (b.entidad && b.entidad !== "N/A" ? b.entidad : b.nombreResponsable).toLowerCase();
            return entidadA.localeCompare(entidadB);
        });

        renderizar(registrosMaster);
    });

    function renderizar(lista) {
        const tbody = document.getElementById('tablaCuerpo');
        tbody.innerHTML = '';

        lista.forEach(reg => {
            const entidad = reg.entidad && reg.entidad !== "N/A" ? reg.entidad : `<span class="text-muted italic">Personal</span>`;
            const responsable = reg.nombreResponsable || "N/A";
            const perfil = reg.perfil || reg.tipoSolicitante || "Estudiante";
            const statusClass = reg.decisionFinal === "ACEPTADO" ? "status-aceptado" : "status-rechazado";

            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold">${entidad}</td>
                    <td>${responsable}</td>
                    <td><span class="small text-warning">${perfil}</span></td>
                    <td>
                        <a href="https://wa.me/${reg.whatsapp}" target="_blank" class="btn-link-contact">
                            <i class="bi bi-whatsapp text-success me-1"></i> ${reg.whatsapp || '---'}
                        </a>
                    </td>
                    <td>
                        <a href="mailto:${reg.email}" class="btn-link-contact small">
                            ${reg.email}
                        </a>
                    </td>
                    <td class="text-center">
                        <span class="badge-status ${statusClass}">${reg.decisionFinal || 'PROCESADO'}</span>
                    </td>
                </tr>
            `;
        });
    }

    // Buscador
    document.getElementById('inputBusqueda').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = registrosMaster.filter(r => 
            (r.entidad && r.entidad.toLowerCase().includes(term)) ||
            (r.nombreResponsable && r.nombreResponsable.toLowerCase().includes(term)) ||
            r.email.toLowerCase().includes(term)
        );
        renderizar(filtrados);
    });
</script>

</body>
</html>
