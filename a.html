<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Directorio de Alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; width: auto; margin-bottom: 30px; display: block; margin: 0 auto 30px;
            object-fit: contain; border-radius: 15px; border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease; opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }
        .nav-item-ucmi { 
            display: flex; align-items: center; color: rgba(255,255,255,0.6); 
            text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; 
            transition: 0.3s; font-size: 0.85rem; 
        }
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }

        /* Estilos de botones específicos */
        .btn-sidebar-action { 
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.4) !important; color: white !important;
            font-weight: 600; text-transform: uppercase; font-size: 0.7rem; border-radius: 50px; 
            padding: 10px; text-decoration: none; text-align: center; display: block; margin-bottom: 10px;
        }
        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; color: white !important; }

        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); flex-grow: 1; padding: 40px; }
        .table-container { background: rgba(255,255,255,0.98); border-radius: 15px; padding: 25px; color: #333; }
        .btn-panel { background: var(--azul-ucmi); color: var(--dorado-ucmi); border: 1px solid var(--dorado-ucmi); }
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" id="logoAcademia" class="logo-sidebar" alt="Logo">
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="vigencia-academia.html" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
            <a href="usuarios-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> USUARIOS</a>
            <a href="historial-academia.html" class="nav-item-ucmi"><i class="bi bi-clock-history"></i> HISTORIAL</a>
            <a href="directorio-alumnos.html" class="nav-item-ucmi active"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="ofertas-academia.html" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="academia-modulos.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="papelera-academia.html" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">
        <div class="container-fluid">
            <h2 class="fw-bold mb-4">Directorio Académico</h2>
            <div class="table-container">
                <table class="table align-middle">
                    <thead class="text-secondary"><tr><th>ESTUDIANTE</th><th>CONTACTO</th><th>REPRESENTANTE</th><th>MÓDULOS</th><th>GESTIÓN</th></tr></thead>
                    <tbody id="tabla-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { /* Tu configuración Firebase */ };
    const auth = getAuth(initializeApp(firebaseConfig));
    const db = getFirestore();

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        const snap = await getDoc(doc(db, "usuarios", user.email));
        if (snap.exists()) {
            const logo = document.getElementById('logoAcademia');
            if (snap.data().logoCustom) logo.src = snap.data().logoCustom;
            logo.style.opacity = "1";
            cargarAlumnos(snap.data().entidad);
        }
    });

    async function cargarAlumnos(entidad) {
        const snap = await getDocs(query(collection(db, "usuarios"), where("perfil", "==", "Estudiante Academia"), where("entidad", "==", entidad)));
        const tbody = document.getElementById('tabla-body');
        snap.forEach(d => {
            const data = d.data();
            tbody.innerHTML += `<tr>
                <td><strong>${data.nombreResponsable}</strong></td>
                <td>${data.email || ''}</td>
                <td>${data.nombreRepresentante || '-'}</td>
                <td><span class="badge badge-modulo">Nivel</span></td>
                <td><button class="btn btn-sm btn-panel">Ver</button></td>
            </tr>`;
        });
    }

    document.getElementById('btnLogout').addEventListener('click', async () => {
        await signOut(auth);
        window.location.href = "index.html";
    });
</script>
</body>
</html>
