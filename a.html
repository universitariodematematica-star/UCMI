<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Módulos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --azul-ucmi: #06090f; --azul-sidebar: #1a2a3a; --dorado-ucmi: #c5a059; --rojo-logout: #e74c3c; }
        body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; min-height: 100vh; }
        .app-wrapper { display: flex; min-height: 100vh; }
        .sidebar { background: rgba(26, 42, 58, 0.4); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.15); width: 260px; padding: 25px 15px; display: flex; flex-direction: column; }
        .logo-sidebar { height: 100px; width: auto; margin: 0 auto 30px; display: block; border-radius: 15px; border: 2px solid rgba(255, 255, 255, 0.1); opacity: 0; transition: opacity 0.5s; }
        .nav-item-ucmi { display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s; font-size: 0.85rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); }
        .btn-sidebar-action { background: transparent; border: 1px solid rgba(255, 255, 255, 0.4); color: white; padding: 10px; border-radius: 50px; text-align: center; display: block; margin-bottom: 10px; text-decoration: none; font-size: 0.7rem; }
        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); flex-grow: 1; padding: 40px; }
        .card-glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <img src="" id="logoAcademia" class="logo-sidebar" alt="Logo">
        <nav class="sidebar-nav">
            <a href="#" class="nav-item-ucmi active"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
        </nav>
        <div class="mt-auto pt-4 border-top border-secondary">
            <a href="#" id="btnLogout" class="btn-sidebar-action"><i class="bi bi-box-arrow-right"></i> CERRAR SESIÓN</a>
        </div>
    </aside>

    <main class="super-overlay">
        <div class="container-fluid">
            <h2 class="text-warning mb-4">Gestión de Módulos</h2>
            <div class="card-glass">
                <table class="table table-dark table-hover bg-transparent">
                    <thead><tr><th>Módulo</th><th>Acciones</th></tr></thead>
                    <tbody id="listaModulos"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="modalRamas" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white border-warning">
            <div class="modal-header">
                <h5 class="modal-title" id="tituloModal">Gestionar Ramas</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="nombreRama" class="form-control mb-3" placeholder="Nombre de la nueva rama...">
                <button class="btn btn-warning w-100" onclick="guardarRama()">Crear Rama</button>
                <hr>
                <ul id="listaRamasModal" class="list-group list-group-flush mt-3"></ul>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const db = getFirestore(initializeApp({ /* Tu config aquí */ }));
    let idModuloSeleccionado = "";

    // 1. Cargar Módulos
    onSnapshot(query(collection(db, "ofertas"), orderBy("modulo")), (snap) => {
        const lista = document.getElementById('listaModulos');
        lista.innerHTML = "";
        snap.forEach(doc => {
            lista.innerHTML += `<tr>
                <td>${doc.data().modulo}</td>
                <td><button class="btn btn-outline-warning btn-sm" onclick="abrirModal('${doc.id}', '${doc.data().modulo}')">Gestionar Ramas</button></td>
            </tr>`;
        });
    });

    // 2. Abrir Modal y Cargar Ramas existentes
    window.abrirModal = (id, nombre) => {
        idModuloSeleccionado = id;
        document.getElementById('tituloModal').innerText = `Ramas de: ${nombre}`;
        const modal = new bootstrap.Modal(document.getElementById('modalRamas'));
        modal.show();
        
        // Escuchar ramas de este módulo
        onSnapshot(query(collection(db, "ramas"), where("moduloId", "==", id)), (snap) => {
            const listaR = document.getElementById('listaRamasModal');
            listaR.innerHTML = "";
            snap.forEach(d => listaR.innerHTML += `<li class="list-group-item bg-dark text-white">${d.data().nombre}</li>`);
        });
    };

    // 3. Guardar nueva rama asociada al módulo
    window.guardarRama = async () => {
        const nombre = document.getElementById('nombreRama').value;
        await addDoc(collection(db, "ramas"), { nombre, moduloId: idModuloSeleccionado });
        document.getElementById('nombreRama').value = "";
    };

    document.getElementById('btnLogout').onclick = () => signOut(getAuth()).then(() => location.href = "index.html");
</script>
</body>
</html>
