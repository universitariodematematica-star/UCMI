<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --azul-oscuro: #06090f; 
            --cristal-oscuro: rgba(0, 0, 0, 0.4);
            --cristal-claro: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px 0; 
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(6, 9, 15, 0.7) 0%, rgba(6, 9, 15, 0.9) 100%);
            z-index: -1;
        }

        .card-gestion { 
            background: var(--cristal-claro); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            border-radius: 25px; 
            padding: 30px; 
            margin-bottom: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h2, h4 { font-family: 'Cinzel', serif; letter-spacing: 2px; }
        .header-main { color: var(--dorado-ucmi); text-shadow: 0 0 15px rgba(197, 160, 89, 0.3); font-weight: 700; }

        /* TABLA COMPLETAMENTE TRANSLÚCIDA */
        .table { 
            color: white !important; 
            --bs-table-bg: transparent !important; /* Forzamos el fondo transparente */
            --bs-table-hover-bg: rgba(255, 255, 255, 0.05) !important;
            border-color: rgba(197, 160, 89, 0.2); 
            vertical-align: middle;
        }

        .table thead th {
            background: transparent !important;
            color: var(--dorado-ucmi) !important;
            border-bottom: 2px solid var(--dorado-ucmi);
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        /* Eliminamos cualquier fondo en las filas para transparencia total */
        .table td {
            background: transparent !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-control { 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(197,160,89,0.3); 
            color: white !important; 
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus { 
            background: rgba(255,255,255,0.12); 
            border-color: var(--dorado-ucmi); 
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
            color: white;
        }

        .btn-ucmi { 
            background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); 
            color: black; font-weight: 800; border: none; border-radius: 12px; transition: 0.3s;
        }

        .btn-ucmi:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Estilos de los switches y botones de basura */
        .form-switch .form-check-input { background-color: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); }
        .form-switch .form-check-input:checked { background-color: var(--dorado-ucmi); border-color: var(--dorado-ucmi); }

        .btn-delete { color: rgba(255, 77, 77, 0.5); transition: 0.3s; cursor: pointer; }
        .btn-delete:hover { color: #ff4d4d; transform: scale(1.2); }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="text-center mb-5">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 80px;" class="mb-3">
        <h2 class="header-main">CONTROL DE MÓDULOS ACADÉMICOS</h2>
    </div>

    <div class="card-gestion">
        <h4 class="mb-4 text-warning"><i class="bi bi-plus-circle me-2"></i>Crear Nuevo Módulo</h4>
        <form id="formCrearModulo" class="row g-3">
            <div class="col-md-8">
                <input type="text" id="nombreModulo" class="form-control" placeholder="Ej: Lógica Cuántica - Capítulo 16" required>
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-ucmi w-100 p-2">REGISTRAR EN INVENTARIO</button>
            </div>
        </form>
    </div>

    <div class="card-gestion">
        <h4 class="text-warning mb-2"><i class="bi bi-archive me-2"></i>Inventario de Módulos</h4>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Nombre del Módulo</th>
                        <th class="text-center">Oferta</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaInventario">
                    <tr>
                        <td class="fw-bold">Lógica Proposicional Avanzada</td>
                        <td class="text-center">
                            <div class="form-check form-switch d-inline-block">
                                <input class="form-check-input" type="checkbox" checked>
                            </div>
                        </td>
                        <td class="text-center">
                            <i class="bi bi-trash3 btn-delete"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
