<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
    :root { 
        --dorado-ucmi: #c5a059; 
        --cristal-claro: rgba(255, 255, 255, 0.05);
        --sidebar-width: 260px;
        --rojo-peligro: #e74c3c;
    }

    body, html {
        height: 100%; margin: 0;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
        background-size: cover;
        overflow: hidden;
    }

    .overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, rgba(6, 9, 15, 0.7) 0%, rgba(6, 9, 15, 0.9) 100%);
        z-index: -1;
    }

    .wrapper { display: flex; height: 100vh; width: 100vw; }

    /* --- SIDEBAR --- */
    .sidebar {
        width: var(--sidebar-width);
        min-width: var(--sidebar-width);
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(25px);
        border-right: 1px solid rgba(197, 160, 89, 0.2);
        display: flex;
        flex-direction: column;
        padding: 25px 15px;
    }

    .sidebar-logo { width: 100px; margin: 0 auto 30px; display: block; }
    .sidebar-nav { flex-grow: 1; }

    .nav-item-ucmi {
        display: flex; align-items: center;
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        padding: 10px 15px;
        margin-bottom: 5px;
        border-radius: 10px;
        transition: 0.3s all ease;
        font-size: 0.85rem;
    }

    .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
    
    .nav-item-ucmi:hover { 
        color: white; 
        background: rgba(255,255,255,0.1);
        transform: translateX(5px); /* Desplazamiento lateral sutil */
    }

    .nav-item-ucmi.active {
        background: rgba(197, 160, 89, 0.15);
        color: var(--dorado-ucmi);
        font-weight: 600;
        box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1);
    }

    /* --- BOTONES INFERIORES CON HOVER --- */
    .btn-maestro {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
        color: white !important;
        font-weight: 600; text-transform: uppercase;
        font-size: 0.65rem; letter-spacing: 1.5px;
        border-radius: 50px; padding: 10px;
        text-decoration: none; display: block; text-align: center; 
        margin-bottom: 10px;
        transition: 0.3s all cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-maestro:hover {
        background: rgba(197, 160, 89, 0.2) !important;
        border-color: var(--dorado-ucmi) !important;
        color: var(--dorado-ucmi) !important;
        box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
        transform: translateY(-2px);
    }

    .btn-cerrar {
        background: transparent;
        border: 1px solid rgba(231, 76, 60, 0.4) !important;
        color: rgba(231, 76, 60, 0.9) !important;
        font-weight: 600; text-transform: uppercase;
        font-size: 0.65rem; letter-spacing: 1.5px;
        border-radius: 50px; padding: 8px;
        text-decoration: none; display: block; text-align: center;
        transition: 0.3s all ease;
    }

    .btn-cerrar:hover {
        background: rgba(231, 76, 60, 0.2) !important;
        border-color: var(--rojo-peligro) !important;
        color: white !important;
        box-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
        transform: scale(1.02);
    }

    /* --- BOTÓN ELIMINAR EN TABLA --- */
    #listaInventario .btn-cerrar {
        padding: 5px 12px;
        font-size: 0.6rem;
        opacity: 0.8;
    }

    #listaInventario .btn-cerrar:hover {
        background: var(--rojo-peligro) !important;
        color: white !important;
        opacity: 1;
    }

    /* --- CONTENIDO --- */
    .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; }

    .card-gestion { 
        background: var(--cristal-claro); 
        backdrop-filter: blur(15px); 
        border: 1px solid rgba(197, 160, 89, 0.2); 
        border-radius: 25px; padding: 30px; margin-bottom: 30px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .form-control { 
        background: rgba(0, 0, 0, 0.4) !important; 
        border: 1px solid rgba(197, 160, 89, 0.3); 
        color: white !important; border-radius: 12px;
        transition: 0.3s border-color;
    }

    .form-control:focus {
        border-color: var(--dorado-ucmi) !important;
        box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
    }

    h2, h4 { font-family: 'Cinzel', serif; letter-spacing: 2px; }
    .header-main { color: var(--dorado-ucmi); text-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }

    .table { color: white !important; --bs-table-bg: transparent !important; }
    .table thead th { color: var(--dorado-ucmi) !important; border-bottom: 2px solid var(--dorado-ucmi); text-transform: uppercase; font-size: 0.8rem; }
    
    .form-switch .form-check-input:checked { background-color: var(--dorado-ucmi); border-color: var(--dorado-ucmi); }
    .form-switch .form-check-input { cursor: pointer; }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="wrapper">
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="sidebar-logo">
        
        <nav class="sidebar-nav">
            <a href="master-postulaciones.html" class="nav-item-ucmi">
                <i class="bi bi-person-badge"></i> SOLICITUDES
            </a>
            <a href="master-vigencia.html" class="nav-item-ucmi">
                <i class="bi bi-shield-check"></i> VIGENCIA
            </a>
            <a href="master-usuarios.html" class="nav-item-ucmi">
                <i class="bi bi-people"></i> USUARIOS
            </a>
            <a href="historial-postulaciones.html" class="nav-item-ucmi">
                <i class="bi bi-clock-history"></i> HISTORIAL
            </a>
            <a href="directorio.html" class="nav-item-ucmi">
                <i class="bi bi-journal-text"></i> DIRECTORIO
            </a>
            <a href="#" class="nav-item-ucmi active">
                <i class="bi bi-tags"></i> OFERTAS
            </a>
        </nav>

        <div class="mt-auto pt-4 border-top border-secondary">
            <a href="panel_maestro.html" class="btn-maestro">
                <i class="bi bi-cpu me-2"></i> PANEL MAESTRO
            </a>
            <a href="index.html" class="btn-cerrar">
                <i class="bi bi-power me-2"></i> CERRAR SESIÓN
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="container-fluid">
            <div class="text-center mb-5">
                <h2 class="header-main">CONTROL DE MÓDULOS ACADÉMICOS</h2>
            </div>

            <div class="card-gestion">
                <h4 class="mb-4 text-warning"><i class="bi bi-plus-circle me-2"></i>Crear Nuevo Módulo</h4>
                <form id="formCrearModulo" class="row g-3 align-items-center">
                    <div class="col-md-9">
                        <input type="text" id="nombreModulo" class="form-control p-2" placeholder="Ej: Lógica Cuántica - Capítulo 16" required autocomplete="off">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn-maestro w-100 m-0">REGISTRAR</button>
                    </div>
                </form>
            </div>

            <div class="card-gestion">
                <h4 class="text-warning mb-4"><i class="bi bi-archive me-2"></i>Inventario</h4>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Nombre del Módulo</th>
                                <th class="text-center">Ofertar al Público</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaInventario"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('formCrearModulo').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const input = document.getElementById('nombreModulo');
        try {
            await addDoc(collection(db, "ofertas"), {
                modulo: input.value,
                ofertado: false,
                fechaCreacion: new Date()
            });
            input.value = "";
        } catch (err) { console.error(err); }
    });

    onSnapshot(query(collection(db, "ofertas"), orderBy("modulo", "asc")), (snap) => {
        const lista = document.getElementById('listaInventario');
        lista.innerHTML = "";
        snap.forEach(docSnap => {
            const mod = docSnap.data();
            const id = docSnap.id;
            lista.innerHTML += `
                <tr>
                    <td class="fw-bold text-white">${mod.modulo}</td>
                    <td class="text-center">
                        <div class="form-check form-switch d-inline-block">
                            <input class="form-check-input toggle-oferta" type="checkbox" 
                                data-id="${id}" ${mod.ofertado ? 'checked' : ''}>
                        </div>
                    </td>
                    <td class="text-center">
                        <button class="btn-cerrar" style="font-size: 0.6rem; padding: 5px 12px;" onclick="eliminarModulo('${id}')">
                            <i class="bi bi-trash3"></i> BORRAR
                        </button>
                    </td>
                </tr>
            `;
        });

        document.querySelectorAll('.toggle-oferta').forEach(sw => {
            sw.onclick = async (e) => {
                const docId = e.target.getAttribute('data-id');
                await updateDoc(doc(db, "ofertas", docId), { ofertado: e.target.checked });
            };
        });
    });

    window.eliminarModulo = async (id) => {
        if(confirm("¿Eliminar módulo?")) await deleteDoc(doc(db, "ofertas", id));
    };
</script>
</body>
</html>
