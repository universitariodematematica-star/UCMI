<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { height: 100px; width: auto; margin: 0 auto 30px auto; display: block; border-radius: 15px; border: 2px solid rgba(255, 255, 255, 0.1); transition: opacity 0.5s ease; opacity: 0; }
        .nav-item-ucmi { display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s all ease; font-size: 0.85rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { background: transparent; border: 1px solid rgba(255, 255, 255, 0.4) !important; color: white !important; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; border-radius: 50px; padding: 10px; text-decoration: none; text-align: center; display: block; margin-bottom: 10px; }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }

        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); flex-grow: 1; min-height: 100vh; padding: 40px; }

        .navbar-top { background: rgba(255, 255, 255, 0.05); padding: 15px 25px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 25px; }

        /* --- TABLA GLASSMORPHISM DEFINITIVA --- */
        .table-container { background: transparent !important; }
        .table { 
            color: white !important; 
            background: transparent !important; 
            border-collapse: separate !important; 
            border-spacing: 0 15px !important; 
        }
        .table thead th { background: transparent !important; color: rgba(255, 255, 255, 0.5) !important; border: none !important; text-transform: uppercase; }
        
        .fila-estudiante { 
            background: rgba(255, 255, 255, 0.05) !important; 
            backdrop-filter: blur(15px) !important; 
            -webkit-backdrop-filter: blur(15px) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
        }
        .fila-estudiante td { background: transparent !important; border: none !important; padding: 20px !important; }
        .fila-estudiante td:first-child { border-radius: 15px 0 0 15px; }
        .fila-estudiante td:last-child { border-radius: 0 15px 15px 0; }

        .badge-modulo { background: rgba(197, 160, 89, 0.2); color: var(--dorado-ucmi); border: 1px solid var(--dorado-ucmi); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; }
        .btn-panel { background: rgba(255,255,255,0.05); border: 1px solid var(--dorado-ucmi); color: var(--dorado-ucmi); padding: 5px 12px; }
        .form-select, .form-control { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" id="logoAcademia" class="logo-sidebar" alt="Logo">
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="#" class="nav-item-ucmi active"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
        </nav>
        <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a>
    </aside>

    <main class="super-overlay">
        <div class="navbar-top d-flex justify-content-between align-items-center">
            <h4 class="fw-bold m-0">Directorio Académico</h4>
            <div class="d-flex gap-2">
                <select id="filtroModulo" class="form-select" style="width: 200px;"><option value="">Todos los Módulos</option></select>
                <input type="text" id="buscador" class="form-control" placeholder="Buscar...">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table">
                <thead><tr><th>ESTUDIANTE</th><th>CONTACTO</th><th>REPRESENTANTE</th><th>MÓDULOS</th><th class="text-center">GESTIÓN</th></tr></thead>
                <tbody id="tabla-body"><tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-warning"></div></td></tr></tbody>
            </table>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const db = getFirestore(initializeApp({apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"}));
    const auth = getAuth();

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        const userSnap = await getDoc(doc(db, "usuarios", user.email));
        if (userSnap.exists()) {
            const d = userSnap.data();
            const logo = document.getElementById('logoAcademia');
            logo.src = d.logoCustom || "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";
            logo.style.opacity = "1";
            cargarDirectorio(d.entidad, d.cupos || 0, d["modulos-ofertados-academia"]);
        }
    });

    async function cargarDirectorio(entidad, cuposMax, mods) {
        const tbody = document.getElementById('tabla-body');
        if(mods) Object.keys(mods).forEach(m => { if(mods[m]) document.getElementById('filtroModulo').innerHTML += `<option value="${m.toLowerCase()}">${m}</option>`; });
        const snap = await getDocs(query(collection(db, "usuarios"), where("perfil", "==", "Estudiante Academia"), where("entidad", "==", entidad)));
        tbody.innerHTML = '';
        snap.forEach(doc => {
            const d = doc.data();
            const tr = document.createElement('tr');
            tr.className = 'fila-estudiante';
            tr.innerHTML = `<td><div class="fw-bold">${d.nombreResponsable}</div><small>${d.dniEstudiante || ''}</small></td><td><small>${d.email}<br><span class="text-success">${d.whatsapp || ''}</span></small></td><td><small>${d.nombreRepresentante || '-'}</small></td><td>${(d.modulos || []).map(m => `<span class="badge badge-modulo">${m}</span>`).join('')}</td><td class="text-center"><button class="btn btn-sm btn-panel"><i class="bi bi-eye"></i></button></td>`;
            tbody.appendChild(tr);
        });
    }

    document.getElementById('buscador').addEventListener('input', e => {
        const t = e.target.value.toLowerCase();
        document.querySelectorAll('.fila-estudiante').forEach(f => f.style.display = f.innerText.toLowerCase().includes(t) ? '' : 'none');
    });

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth).then(() => window.location.href = "index.html"));
</script>
</body>
</html>
