<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Gestión de Licencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --dorado-neon: #ffcc66;
            --azul-sidebar: #1a2a3a;
            --cian-tech: #00f2ff;
            --purpura-neon: #bc13fe;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
        }

        .sidebar { 
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(10px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
        }

        .btn-sidebar-custom {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: rgba(255, 255, 255, 0.7) !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
            border-radius: 50px;
            padding: 10px 15px;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            width: 100%;
        }

        .btn-sidebar-custom:hover, .btn-sidebar-custom.active {
            border-color: var(--cian-tech) !important;
            color: var(--cian-tech) !important;
            background: rgba(0, 242, 255, 0.05);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-control, .form-select {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        .table-historial tr {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 8px solid transparent;
        }

        .neon-gold { color: var(--dorado-neon); font-weight: bold; }
        .date-chip {
            background: rgba(0, 242, 255, 0.1);
            color: var(--cian-tech);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .badge-status {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
        }
        .status-pendiente { background: rgba(255, 193, 7, 0.1); color: #ffc107; border: 1px solid #ffc10744; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 50px;" alt="Logo">
                    <p class="small mt-2 neon-gold">SISTEMA UCMI</p>
                </div>
                <nav class="nav flex-column mb-auto">
                    <a class="btn-sidebar-custom active" href="#"><i class="bi bi-plus-circle me-2"></i> Nueva Solicitud</a>
                    <a class="btn-sidebar-custom" href="#"><i class="bi bi-archive me-2"></i> Historial</a>
                    <button id="btnLogoutSidebar" class="btn-sidebar-custom mt-4 text-danger border-danger">
                        <i class="bi bi-box-arrow-right me-2"></i> Salir
                    </button>
                </nav>
            </div>

            <!-- CONTENIDO -->
            <div class="col-md-10 p-5">
                <h2 class="neon-gold mb-4 text-uppercase" style="letter-spacing: 2px;">Gestión de Solicitudes UCMI</h2>

                <!-- FORMULARIO DE REGISTRO -->
                <div class="glass-panel">
                    <h5 class="text-white-50 mb-4 small"><i class="bi bi-pencil-square me-2"></i>REGISTRAR NUEVA ENTIDAD</h5>
                    <form id="formSolicitud">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="small text-white-50">Institución (Entidad)</label>
                                <input type="text" id="entidad" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="small text-white-50">Responsable (nombreResponsable)</label>
                                <input type="text" id="nombreResponsable" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="small text-white-50">Ubicación (ubicacion)</label>
                                <input type="text" id="ubicacion" class="form-control" placeholder="Ciudad, País" required>
                            </div>
                            <div class="col-md-4">
                                <label class="small text-white-50">Programas (programas)</label>
                                <input type="text" id="programas" class="form-control" placeholder="Ej: Cálculo, Física" required>
                            </div>
                            <div class="col-md-4">
                                <label class="small text-white-50">Duración (duracionLicencia)</label>
                                <select id="duracionLicencia" class="form-select">
                                    <option value="6 meses">6 Meses</option>
                                    <option value="1 año">1 Año</option>
                                    <option value="Permanente">Permanente</option>
                                </select>
                            </div>
                            <div class="col-md-4 d-flex align-items-end">
                                <button type="submit" class="btn btn-sidebar-custom w-100 m-0 py-2" style="background: rgba(0,242,255,0.1);">
                                    <i class="bi bi-cloud-arrow-up me-2"></i>PROCESAR SOLICITUD
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- TABLA HISTORIAL -->
                <div class="glass-panel">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="text-white-50 m-0 small"><i class="bi bi-journal-text me-2"></i>REGISTROS EN FIRESTORE</h5>
                        <input type="text" id="busquedaHistorial" class="form-control w-25 bg-transparent" placeholder="Filtrar historial...">
                    </div>
                    <div class="table-responsive">
                        <table class="table table-borderless text-white table-historial">
                            <thead>
                                <tr class="text-white-50 small">
                                    <th>ENTIDAD</th>
                                    <th>RESPONSABLE</th>
                                    <th>FECHA</th>
                                    <th>PROGRAMAS</th>
                                    <th>VIGENCIA</th>
                                    <th>ESTADO</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCuerpo">
                                <!-- Datos dinámicos -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- LÓGICA DE REGISTRO (ESCRITURA) ---
    document.getElementById('formSolicitud').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = e.target.querySelector('button');
        btn.disabled = true;

        try {
            await addDoc(collection(db, "postulaciones"), {
                entidad: document.getElementById('entidad').value,
                nombreResponsable: document.getElementById('nombreResponsable').value,
                ubicacion: document.getElementById('ubicacion').value,
                programas: document.getElementById('programas').value,
                duracionLicencia: document.getElementById('duracionLicencia').value,
                fechaSolicitud: serverTimestamp(),
                status: "pendiente"
            });

            Swal.fire({ icon: 'success', title: 'Solicitud Registrada', background: '#0a0e14', color: '#fff' });
            e.target.reset();
        } catch (error) {
            Swal.fire('Error', 'No se pudo conectar con Firebase', 'error');
        } finally {
            btn.disabled = false;
        }
    });

    // --- LÓGICA DE HISTORIAL (LECTURA EN TIEMPO REAL) ---
    const q = query(collection(db, "postulaciones"), orderBy("fechaSolicitud", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const tabla = document.getElementById('tablaCuerpo');
        tabla.innerHTML = '';
        
        snapshot.forEach(doc => {
            const p = doc.data();
            const fecha = p.fechaSolicitud?.toDate ? p.fechaSolicitud.toDate().toLocaleDateString() : 'Pendiente...';
            
            tabla.innerHTML += `
                <tr>
                    <td><div class="neon-gold">${p.entidad}</div><div class="small text-white-50">${p.ubicacion}</div></td>
                    <td class="small">${p.nombreResponsable}</td>
                    <td><span class="date-chip">${fecha}</span></td>
                    <td class="small text-info">${p.programas}</td>
                    <td class="small">${p.duracionLicencia}</td>
                    <td><span class="badge-status status-pendiente">${p.status}</span></td>
                </tr>
            `;
        });
    });
</script>
</body>
</html>
