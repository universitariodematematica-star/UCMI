<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Vigencia Operativa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --purpura-neon: #bc13fe;
            --cian-tech: #00f2ff;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            margin: 0;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
            padding: 50px 20px;
        }

        /* CONTENEDOR TRASLÚCIDO (GLASSMORPHISM) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(25px) !important;
            border-radius: 35px;
            padding: 45px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            max-width: 1300px;
            margin: auto;
        }

        .table {
            --bs-table-bg: transparent !important;
            --bs-table-color: white !important;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        .table thead th {
            border: none !important;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2.5px;
            padding-bottom: 25px;
        }

        .table tbody tr {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            transition: transform 0.3s ease;
        }

        .table tbody td {
            background: transparent !important;
            border: none !important;
            padding: 22px 15px;
            vertical-align: middle;
        }

        /* BARRA DE PROGRESO NEÓN */
        .progress { background-color: rgba(255, 255, 255, 0.1); height: 5px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar-neon { background: linear-gradient(90deg, var(--purpura-neon), var(--cian-tech)); box-shadow: 0 0 12px rgba(0, 242, 255, 0.5); }
        
        .status-badge { font-size: 0.65rem; padding: 6px 14px; border-radius: 8px; font-weight: 800; border: 1px solid #00ff8844; color: #00ff88; background: #00ff8811; box-shadow: 0 0 10px #00ff8822; }
        .email-badge { font-family: 'Courier New', monospace; color: var(--cian-tech); background: rgba(0, 242, 255, 0.1); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; border: 1px solid rgba(0, 242, 255, 0.2); }
        
        .btn-revocar {
            border: 1px solid rgba(255, 77, 77, 0.4);
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.05);
            border-radius: 12px;
            font-size: 0.8rem;
            padding: 8px 20px;
            transition: 0.3s;
        }
        .btn-revocar:hover { background: #ff4d4d; color: white; border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.4); }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="glass-panel">
        <div class="d-flex align-items-center mb-5">
            <div class="bg-info rounded-3 p-2 me-3 shadow-lg"><i class="bi bi-cpu-fill text-dark fs-4"></i></div>
            <h3 class="fw-bold m-0 text-uppercase" style="letter-spacing: 4px;">Panel de Vigencia Operativa</h3>
        </div>
        
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Responsable / Identificador</th>
                        <th>Activación</th>
                        <th style="width: 20%;">Cronología</th>
                        <th>Expiración</th>
                        <th>Remanente</th>
                        <th class="text-end">Operaciones</th>
                    </tr>
                </thead>
                <tbody id="listaVigencia">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // FUNCIÓN CLAVE: Convierte "28/4/2026, 15:25:11" a Objeto Date real
    function limpiarFecha(str) {
        if (!str || typeof str !== 'string') return new Date();
        try {
            const [parteFecha, parteHora] = str.split(', ');
            const [dia, mes, anio] = parteFecha.split('/');
            return new Date(`${anio}-${mes}-${dia}T${parteHora}`);
        } catch (e) {
            console.error("Error procesando fecha:", str);
            return new Date();
        }
    }

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        const contenedor = document.getElementById('listaVigencia');
        contenedor.innerHTML = '';

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;

            // Procesamos los datos exactos de tu imagen
            const fechaInicio = limpiarFecha(data.fechaActivacion);
            const fechaFin = new Date(data.expiracionTimestamp); // Timestamp numérico
            const ahora = new Date();

            // Cálculo de porcentajes
            const totalMs = fechaFin - fechaInicio;
            const transcurridoMs = ahora - fechaInicio;
            let porcentaje = Math.floor((transcurridoMs / totalMs) * 100);
            
            // Seguridad ante errores de cálculo (Invalid Date o NaN)
            if (isNaN(porcentaje)) porcentaje = 0;
            porcentaje = Math.min(Math.max(porcentaje, 0), 100);

            // Días restantes
            const diasRestantes = Math.ceil((fechaFin - ahora) / (1000 * 60 * 60 * 24));

            contenedor.innerHTML += `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="p-2 rounded-circle bg-opacity-10 bg-info me-3" style="border: 1px solid #00f2ff55">
                                <i class="bi bi-person-badge-fill text-info fs-5"></i>
                            </div>
                            <div>
                                <div class="fw-bold text-white mb-1">${data.entidad || 'Entidad Desconocida'}</div>
                                <div class="email-badge">${data.email || id}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="text-white-50 x-small mb-1" style="font-size: 0.6rem;">FECHA INICIO:</div>
                        <div class="fw-bold small">${fechaInicio.toLocaleDateString()}</div>
                    </td>
                    <td>
                        <div class="progress mb-2">
                            <div class="progress-bar progress-bar-neon" style="width: ${porcentaje}%"></div>
                        </div>
                        <div class="d-flex justify-content-between" style="font-size: 0.6rem;">
                            <span class="text-white-50">CONSUMO</span>
                            <span class="text-info fw-bold">${porcentaje}%</span>
                        </div>
                    </td>
                    <td>
                        <div class="text-white-50 x-small mb-1" style="font-size: 0.6rem;">VENCE EN:</div>
                        <div class="fw-bold text-info small">${fechaFin.toLocaleDateString()}</div>
                    </td>
                    <td>
                        <span class="status-badge">${diasRestantes > 0 ? diasRestantes + ' DÍAS' : 'EXPIRADO'}</span>
                    </td>
                    <td class="text-end">
                        <button onclick="borrarUsuario('${id}')" class="btn btn-revocar">
                            <i class="bi bi-trash3-fill me-2"></i>Revocar
                        </button>
                    </td>
                </tr>
            `;
        });
    });

    window.borrarUsuario = async (id) => {
        const confirm = await Swal.fire({
            title: '¿Revocar Licencia?',
            text: "El usuario perderá el acceso inmediato a la plataforma.",
            icon: 'warning',
            background: '#06090f',
            color: '#fff',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'Sí, revocar'
        });
        if (confirm.isConfirmed) {
            await deleteDoc(doc(db, "usuarios", id));
            Swal.fire({ title: 'Hecho', icon: 'success', background: '#06090f', color: '#fff' });
        }
    };
</script>
</body>
</html>
