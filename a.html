<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Módulos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">

    <div class="container">
        <h2 class="mb-4">Mis Módulos Creados</h2>
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Nombre del Módulo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaModulos">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. TU CONFIGURACIÓN (Pégala aquí)
            const firebaseConfig = {
              apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
              authDomain: "ucmi-13796634.firebaseapp.com",
              projectId: "ucmi-13796634",
              storageBucket: "ucmi-13796634.firebasestorage.app",
              messagingSenderId: "1090719609536",
              appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325",
              measurementId: "G-3M3DH25722"
            };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 2. LEER LOS DATOS
        const q = query(collection(db, "ofertas"), orderBy("modulo", "asc"));
        
        onSnapshot(q, (snapshot) => {
            const tabla = document.getElementById('tablaModulos');
            tabla.innerHTML = ""; // Limpiamos la tabla antes de cargar

            snapshot.forEach((doc) => {
                const data = doc.data();
                tabla.innerHTML += `
                    <tr>
                        <td>${data.modulo}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-info">Gestionar</button>
                        </td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
