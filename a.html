<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Usuarios Oficiales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-ucmi: #c5a059;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.2) 0%, rgba(6, 9, 15, 0.85) 100%);
            min-height: 100vh;
        }

        /* --- SIDEBAR TRASLÚCIDO --- */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- CONTENEDOR GLASS ULTRA-TRASLÚCIDO --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02); /* Opacidad mínima para máxima transparencia */
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px); /* Desenfoque fuerte */
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .role-badge {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: bold;
            background: rgba(197, 160, 89, 0.1);
            color: var(--dorado-ucmi);
            border: 1px solid rgba(197, 160, 89, 0.3);
            text-transform: uppercase;
        }

        .text-glow-gold {
            color: var(--dorado-ucmi);
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        .btn-revocar {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            transition: 0.3s;
        }

        .btn-revocar:hover {
            background: #ff4d4d;
            color: white;
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex flex-column">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 50px;" alt="Logo">
                </div>
                <nav class="nav flex-column mb-auto">
                    <a class="nav-link text-white-50 mb-2" href="master-postulaciones.html"><i class="bi bi-inbox me-2"></i> Postulaciones</a>
                    <a class="nav-link text-white active mb-2" href="#"><i class="bi bi-people me-2 text-glow-gold"></i> Usuarios</a>
                </nav>
                <button id="btnLogoutSidebar" class="btn btn-outline-danger btn-sm rounded-pill mt-4">Cerrar Sesión</button>
            </div>

            <div class="col-md-10 p-5">
                <div class="mb-5">
                    <h2 class="fw-bold text-uppercase"><i class="bi bi-shield-lock-fill me-3 text-glow-gold"></i>Directorio</h2>
                    <p class="text-white-50">Gestión de identidades bajo variables de Firebase.</p>
                </div>

                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table table-borderless align-middle text-white">
                            <thead>
                                <tr class="text-white-50 small fw-bold border-bottom border-white border-opacity-10">
                                    <th>ENTIDAD / RESPONSABLE</th>
                                    <th>EMAIL INSTITUCIONAL</th>
                                    <th>PERFIL / ROL</th>
                                    <th class="text-end">OPERACIONES</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- PROTECCIÓN ---
    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "index.html";
    });

    // --- CARGA DINÁMICA CON TUS VARIABLES ---
    const tableBody = document.getElementById('user-table-body');

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        tableBody.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;

            tableBody.innerHTML += `
                <tr class="border-bottom border-white border-opacity-5">
                    <td class="py-4">
                        <div class="d-flex align-items-center">
                            <div class="p-2 rounded bg-info bg-opacity-10 me-3 border border-info border-opacity-20">
                                <i class="bi bi-person-vcard text-info"></i>
                            </div>
                            <div>
                                <span class="fw-bold d-block text-white">${data.entidad || 'Sin Entidad'}</span>
                                <span class="text-white-50 small">Resp: ${data.responsable || 'No asignado'}</span>
                            </div>
                        </div>
                    </td>
                    <td><code class="text-info" style="background:transparent;">${data.email || 'n/a'}</code></td>
                    <td><span class="role-badge">${(data.perfil || 'Usuario').toUpperCase()}</span></td>
                    <td class="text-end">
                        <button onclick="borrarUsuario('${id}')" class="btn btn-sm btn-revocar">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </td>
                </tr>`;
        });
    });

    window.borrarUsuario = async (id) => {
        const confirm = await Swal.fire({
            title: '¿Revocar?',
            text: "Se eliminará el registro de Firebase.",
            icon: 'warning',
            background: '#06090f',
            color: '#fff',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d'
        });
        if (confirm.isConfirmed) await deleteDoc(doc(db, "usuarios", id));
    };

    document.getElementById('btnLogoutSidebar').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });
</script>
</body>
</html>
