<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --azul-oscuro: #06090f; 
            --cristal: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px 0; 
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(6, 9, 15, 0.7) 0%, rgba(6, 9, 15, 0.9) 100%);
            z-index: -1;
        }

        .card-gestion { 
            background: var(--cristal); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            border-radius: 25px; 
            padding: 30px; 
            margin-bottom: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h2, h4 { 
            font-family: 'Cinzel', serif; 
            letter-spacing: 2px;
        }

        .header-main {
            color: var(--dorado-ucmi);
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
            font-weight: 700;
        }

        .table { 
            color: white !important; 
            border-color: rgba(255, 255, 255, 0.1); 
            vertical-align: middle;
        }

        .table thead th {
            color: var(--dorado-ucmi);
            border-bottom: 2px solid var(--dorado-ucmi);
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .form-control { 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(197,160,89,0.3); 
            color: white; 
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus { 
            background: rgba(255,255,255,0.12); 
            color: white; 
            border-color: var(--dorado-ucmi); 
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        .btn-ucmi { 
            background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); 
            color: black; 
            font-weight: 800; 
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-ucmi:hover { 
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.4);
        }

        .form-switch .form-check-input:checked { 
            background-color: var(--dorado-ucmi); 
            border-color: var(--dorado-ucmi); 
        }

        .badge-ofertado {
            background: rgba(0, 255, 204, 0.15);
            color: #00ffcc;
            border: 1px solid rgba(0, 255, 204, 0.3);
        }

        .badge-status {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        .btn-delete {
            color: rgba(255, 77, 77, 0.6);
            transition: 0.3s;
        }

        .btn-delete:hover {
            color: #ff4d4d;
            transform: scale(1.2);
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="text-center mb-5">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 80px;" class="mb-3">
        <h2 class="header-main">CONTROL DE MÓDULOS ACADÉMICOS</h2>
        <div style="width: 60px; height: 3px; background: var(--dorado-ucmi); margin: 10px auto; border-radius: 2px;"></div>
    </div>

    <div class="card-gestion">
        <h4 class="mb-4 text-warning"><i class="bi bi-plus-circle me-2"></i>Crear Nuevo Módulo</h4>
        <form id="formCrearModulo" class="row g-3">
            <div class="col-md-8">
                <input type="text" id="nombreModulo" class="form-control" placeholder="Ej: Lógica Cuántica - Capítulo 16" required>
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-ucmi w-100 p-2">REGISTRAR EN INVENTARIO</button>
            </div>
        </form>
    </div>

    <div class="card-gestion">
        <h4 class="text-warning mb-2"><i class="bi bi-archive me-2"></i>Inventario de Módulos</h4>
        <p class="text-white-50 small mb-4">Módulos registrados en el sistema central UCMI.</p>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Nombre del Módulo</th>
                        <th>Estado</th>
                        <th class="text-center">¿Ofertar Público?</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaInventario">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="card-gestion" style="border-style: dashed; background: rgba(0, 255, 204, 0.02);">
        <h4 style="color: #00ffcc;"><i class="bi bi-eye me-2"></i>Vista Previa de Postulaciones</h4>
        <p class="text-white-50 small">Así se verán actualmente en el formulario de inscripción.</p>
        <div id="vistaOfertados" class="d-flex flex-wrap gap-2">
            </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 1. CREAR MÓDULO ---
    document.getElementById('formCrearModulo').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nombre = document.getElementById('nombreModulo').value;
        try {
            await addDoc(collection(db, "ofertas"), {
                modulo: nombre,
                ofertado: false,
                fechaCreacion: new Date()
            });
            document.getElementById('formCrearModulo').reset();
        } catch (err) { alert("Error al crear módulo"); }
    });

    // --- 2. GESTIÓN EN TIEMPO REAL ---
    onSnapshot(query(collection(db, "ofertas"), orderBy("modulo", "asc")), (snap) => {
        const listaInventario = document.getElementById('listaInventario');
        const vistaOfertados = document.getElementById('vistaOfertados');
        
        listaInventario.innerHTML = "";
        vistaOfertados.innerHTML = "";

        if (snap.empty) {
            listaInventario.innerHTML = "<tr><td colspan='4' class='text-center text-white-50'>No hay módulos registrados.</td></tr>";
        }

        snap.forEach(docSnap => {
            const mod = docSnap.data();
            const id = docSnap.id;

            listaInventario.innerHTML += `
                <tr>
                    <td class="fw-bold">${mod.modulo}</td>
                    <td><span class="badge badge-status">Listo</span></td>
                    <td class="text-center">
                        <div class="form-check form-switch d-inline-block">
                            <input class="form-check-input toggle-oferta" type="checkbox" 
                                data-id="${id}" ${mod.ofertado ? 'checked' : ''}>
                        </div>
                    </td>
                    <td class="text-center">
                        <i class="bi bi-trash3 btn-delete" style="cursor: pointer;" onclick="eliminarModulo('${id}')"></i>
                    </td>
                </tr>
            `;

            if(mod.ofertado) {
                vistaOfertados.innerHTML += `
                    <span class="badge badge-ofertado p-2 px-3 rounded-pill">
                        <i class="bi bi-check2-circle me-1"></i>${mod.modulo}
                    </span>`;
            }
        });

        // Eventos para los switches
        document.querySelectorAll('.toggle-oferta').forEach(sw => {
            sw.onclick = async (e) => {
                const docId = e.target.getAttribute('data-id');
                const estado = e.target.checked;
                await updateDoc(doc(db, "ofertas", docId), { ofertado: estado });
            };
        });
    });

    window.eliminarModulo = async (id) => {
        if(confirm("¿Seguro que desea eliminar este módulo del sistema permanentemente?")) {
            await deleteDoc(doc(db, "ofertas", id));
        }
    };
</script>
</body>
</html>
