<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCMI - Gestión de Módulos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
:root {
    --azul-ucmi: #06090f;
    --azul-sidebar: #1a2a3a;
    --dorado-ucmi: #c5a059;
    --rojo-logout: #e74c3c;
}

/* FONDO */
body {
    background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
    background-size: cover;
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

/* PANEL CENTRAL */
.panel-ucmi {
    background: rgba(10, 25, 47, 0.82);
    backdrop-filter: blur(12px);
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
}

/* MÓDULO NEÓN */
.titulo-modulo {
    font-size: 1.4rem;
    font-weight: 700;
    color: #00e5ff;
    text-shadow: 0 0 5px #00e5ff, 0 0 15px #00e5ff;
}

/* RAMA NEÓN */
.nombre-rama {
    color: #7ec8ff;
    text-shadow: 0 0 5px #7ec8ff, 0 0 15px #7ec8ff;
}

/* BOTONES */
.btn-ucmi {
    background: rgba(0,77,192,.75);
    color: white;
    border-radius: 12px;
    border: none;
}

.btn-editar {
    background: rgba(255,255,255,.08);
    color: #d9ecff;
    border-radius: 12px;
}

.btn-borrar {
    background: rgba(255,255,255,.05);
    color: #ffc7c7;
    border-radius: 12px;
}

/* SWITCH */
.form-check-input {
    width: 3rem !important;
    height: 1.5rem !important;
}

.form-check-input:checked {
    background-color: #00c853 !important;
}
</style>
</head>

<body>

<div class="app-wrapper d-flex">

    <!-- SIDEBAR -->
    <aside class="sidebar d-none d-md-flex flex-column p-3"
           style="width:260px; background: rgba(26,42,58,.4); backdrop-filter: blur(20px);">

        <h5 class="text-center mb-4">UCMI</h5>

        <nav class="flex-grow-1">
            <a class="d-block text-white mb-2">MÓDULOS</a>
            <a class="d-block text-white mb-2">USUARIOS</a>
            <a class="d-block text-white mb-2">PAPELERA</a>
        </nav>

    </aside>

    <!-- CONTENIDO -->
    <main class="flex-grow-1 p-4">

        <div class="container panel-ucmi">

            <h2 class="mb-4 text-warning fw-bold">
                Gestión de Módulos y Ramas
            </h2>

            <table class="table table-dark table-striped">
                <thead>
                    <tr>
                        <th>Módulo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaModulos"></tbody>
            </table>

        </div>

    </main>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalRamas" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white">
<div class="modal-header">
<h5>Gestionar ramas</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input id="inputNombreRama" class="form-control" placeholder="Nombre">
<button id="btnGuardar" class="btn btn-warning w-100 mt-3">Crear</button>
</div>
</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getFirestore, collection, query, orderBy,
onSnapshot, addDoc, where,
updateDoc, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
authDomain: "ucmi-13796634.firebaseapp.com",
projectId: "ucmi-13796634",
storageBucket: "ucmi-13796634.firebasestorage.app",
messagingSenderId: "1090719609536",
appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let idModuloSeleccionado = "";
const modal = new bootstrap.Modal(document.getElementById("modalRamas"));

const q = query(collection(db,"ofertas"), orderBy("modulo","asc"));

onSnapshot(q,(snapshot)=>{

const tabla = document.getElementById("tablaModulos");
tabla.innerHTML="";

snapshot.forEach(docSnap=>{

const datos = docSnap.data();
const idCont = "ramas-"+docSnap.id;

const tr = document.createElement("tr");

tr.innerHTML = `
<td>
<div class="titulo-modulo">${datos.modulo}</div>
<ul id="${idCont}" class="list-unstyled mt-2"></ul>
</td>

<td>
<button class="btn btn-ucmi btn-gestionar"
data-id="${docSnap.id}" data-nombre="${datos.modulo}">
Gestionar
</button>
</td>
`;

tabla.appendChild(tr);

const qR = query(collection(db,"ramas"), where("moduloId","==",docSnap.id));

onSnapshot(qR,(snapRamas)=>{

const lista = document.getElementById(idCont);
lista.innerHTML="";

snapRamas.docs
.sort((a,b)=>a.data().nombre.localeCompare(b.data().nombre))
.forEach(r=>{

const d = r.data();

lista.innerHTML += `
<li class="d-flex justify-content-between align-items-center mb-2">

<span class="nombre-rama">• ${d.nombre}</span>

<div class="d-flex gap-2 align-items-center">

<input type="checkbox"
class="form-check-input btn-visibility"
data-id="${r.id}"
${d.visible!==false?"checked":""}>

<button class="btn btn-editar btn-editar-rama"
data-id="${r.id}" data-nombre="${d.nombre}">
Editar
</button>

<button class="btn btn-borrar btn-borrar-rama"
data-id="${r.id}">
Borrar
</button>

</div>
</li>
`;
});
});
});
});

document.addEventListener("click", async (e)=>{

if(e.target.classList.contains("btn-gestionar")){
idModuloSeleccionado = e.target.dataset.id;
modal.show();
}

if(e.target.classList.contains("btn-editar-rama")){
const id = e.target.dataset.id;
const nuevo = prompt("Editar:", e.target.dataset.nombre);
if(nuevo){
await updateDoc(doc(db,"ramas",id),{nombre:nuevo});
}
}

if(e.target.classList.contains("btn-borrar-rama")){
const id = e.target.dataset.id;
if(confirm("Eliminar?")){
await deleteDoc(doc(db,"ramas",id));
}
}

});

document.addEventListener("change", async (e)=>{

if(e.target.classList.contains("btn-visibility")){
await updateDoc(doc(db,"ramas",e.target.dataset.id),{
visible:e.target.checked
});
}

});

document.getElementById("btnGuardar").addEventListener("click", async ()=>{

const nombre = document.getElementById("inputNombreRama").value;

await addDoc(collection(db,"ramas"),{
nombre,
moduloId:idModuloSeleccionado,
visible:true,
fechaCreacion:new Date()
});

modal.hide();
});

</script>

</body>
</html>
