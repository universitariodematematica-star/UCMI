<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Postulación de Admisión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
        }
        body {
            background: var(--azul-profundo);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 20px;
            padding: 30px;
            margin-top: 50px;
        }
        .logo-academia {
            max-height: 100px;
            margin-bottom: 20px;
        }
        .btn-postular {
            background: var(--dorado-ucmi);
            color: black;
            font-weight: bold;
            border: none;
        }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <!-- LOGO DINÁMICO -->
            <img id="imgLogo" src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo Academia" class="logo-academia">
            <h2 id="txtNombreAcademia">Postulación de Admisión</h2>
            <p class="text-glow-gold">Academia de Idiomas Virtual</p>
        </div>

        <div class="col-md-8 form-container">
            <form id="formPostulacion">
                <div class="row g-3">
                    <!-- DATOS BÁSICOS -->
                    <div class="col-md-6">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="nombre" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">DNI / Identificación</label>
                        <input type="text" id="dni" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">WhatsApp (con código de país)</label>
                        <input type="tel" id="whatsapp" class="form-control" placeholder="+58..." required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Edad</label>
                        <input type="number" id="edad" class="form-control" required>
                    </div>
                    
                    <!-- IDIOMAS Y UBICACIÓN -->
                    <div class="col-md-8">
                        <label class="form-label">Idioma de Interés</label>
                        <select id="programa" class="form-select">
                            <!-- Se llenará dinámicamente según lo que habilites -->
                            <option value="ingles">Inglés</option>
                        </select>
                    </div>

                    <div class="col-12 mt-4 p-3 border border-warning rounded">
                        <h6 class="text-warning"><i class="bi bi-exclamation-triangle"></i> Nota importante:</h6>
                        <p class="small mb-0">Al enviar esta solicitud, se te asignará un **Examen de Ubicación** obligatorio. Tu nivel final será determinado por los resultados de dicha evaluación y la validación del profesor.</p>
                    </div>

                    <div class="col-12 text-center mt-4">
                        <button type="submit" class="btn btn-postular px-5 py-3">INICIAR PROCESO DE ADMISIÓN</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. OBTENER ID DE ACADEMIA DESDE LA URL
    const params = new URLSearchParams(window.location.search);
    const idAcademia = params.get('id');

    // 2. CARGAR LOGO Y NOMBRE DE LA ACADEMIA
    async function cargarIdentidad() {
        if (!idAcademia) return;
        const docRef = doc(db, "users", idAcademia);
        const docSnap = await getDoc(docRef);
        
        if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.url_logo) document.getElementById('imgLogo').src = data.url_logo;
            if (data.nombre_academia) document.getElementById('txtNombreAcademia').innerText = data.nombre_academia;
        }
    }
    cargarIdentidad();

    // 3. ENVIAR POSTULACIÓN
    document.getElementById('formPostulacion').addEventListener('submit', async (e) => {
        e.preventDefault();
        const datos = {
            id_academia: idAcademia,
            nombre: document.getElementById('nombre').value,
            dni: document.getElementById('dni').value,
            email: document.getElementById('email').value,
            whatsapp: document.getElementById('whatsapp').value,
            programa: document.getElementById('programa').value,
            estado: "Pendiente de Ubicación",
            fecha: new Date().toISOString()
        };

        try {
            await addDoc(collection(db, "postulaciones_locales"), datos);
            alert("Postulacion enviada. Ahora serás redirigido al examen de ubicación.");
            // Aquí lo mandas a tu módulo de examen
            // window.location.href = "placement-test.html?id=" + idAcademia; 
        } catch (error) {
            console.error("Error al enviar", error);
        }
    });
</script>
</body>
</html>
