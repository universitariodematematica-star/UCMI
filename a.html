<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Usuarios Oficiales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-neon: #ffcc66;
            --azul-neon: #00f2ff;
            --dorado-ucmi: #c5a059;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.3) 0%, rgba(6, 9, 15, 0.9) 100%);
            min-height: 100vh;
        }

        /* --- CONTENEDOR GLASS --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        /* --- ESTILO DE FILAS DINÁMICAS --- */
        #user-table-body tr {
            display: table-row;
            border-radius: 15px; /* Esquinas redondeadas */
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- EFECTO HOVER --- */
        #user-table-body tr:hover {
            background-color: rgba(255, 255, 255, 0.08) !important;
            transform: scale(1.01) translateX(8px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        /* --- TEXTOS NEÓN --- */
        .neon-text-gold {
            color: var(--dorado-neon);
            text-shadow: 0 0 8px rgba(255, 204, 102, 0.6);
            font-weight: bold;
        }

        .neon-text-blue {
            color: var(--azul-neon);
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
            font-family: monospace;
        }

        /* --- BOTÓN BASURA --- */
        .btn-trash {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            border-radius: 10px;
            padding: 8px 12px;
            transition: all 0.3s;
        }

        .btn-trash:hover {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.5);
            transform: rotate(5deg);
        }

        .table {
            --bs-table-bg: transparent !important;
            border-collapse: separate;
            border-spacing: 0 10px; /* Espaciado para que se vean las esquinas redondeadas */
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex flex-column p-4" style="background: rgba(6, 9, 15, 0.6); backdrop-filter: blur(15px); min-height: 100vh;">
                <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="mb-4" style="height: 50px; object-fit: contain;">
                <nav class="nav flex-column mb-auto">
                    <a class="nav-link text-white active" href="#"><i class="bi bi-cpu-fill me-2"></i> Usuarios</a>
                </nav>
                <button id="btnLogoutSidebar" class="btn btn-outline-danger btn-sm rounded-pill">Desconexión</button>
            </div>

            <div class="col-md-10 p-5">
                <h2 class="neon-text-gold text-uppercase mb-5"><i class="bi bi-shield-shaded me-3"></i>Directorio Supralógico</h2>

                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr class="text-white-50 small">
                                    <th class="ps-4">ENTIDAD</th>
                                    <th>RESPONSABLE</th>
                                    <th>EMAIL</th>
                                    <th>PERFIL</th>
                                    <th class="text-end pe-4">OPERACIONES</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const tableBody = document.getElementById('user-table-body');

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        tableBody.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;

            tableBody.innerHTML += `
                <tr>
                    <td class="ps-4 py-3">
                        <span class="neon-text-gold d-block">${data.entidad || 'N/A'}</span>
                    </td>
                    <td>
                        <div class="d-flex flex-column">
                            <span class="text-white fw-bold">${data.nombreResponsable || 'Sin nombre'}</span>
                            <span class="text-white-50 small" style="font-size:0.7rem;">ID: ${data.responsable || 'N/A'}</span>
                        </div>
                    </td>
                    <td><span class="neon-text-blue small">${data.email || 'N/A'}</span></td>
                    <td><span class="badge" style="border: 1px solid var(--dorado-ucmi); color: var(--dorado-ucmi);">${(data.perfil || 'Usuario').toUpperCase()}</span></td>
                    <td class="text-end pe-4">
                        <button onclick="borrarUsuario('${id}', '${data.entidad || id}')" class="btn btn-trash">
                            <i class="bi bi-trash3-fill"></i>
                        </button>
                    </td>
                </tr>`;
        });
    });

    window.borrarUsuario = async (id, nombre) => {
        const result = await Swal.fire({
            title: '¿ELIMINAR USUARIO?',
            text: `Estás a punto de borrar a: ${nombre}. Esta acción revocará todos los permisos en el sistema.`,
            icon: 'warning',
            showCancelButton: true,
            background: '#0a0e14',
            color: '#fff',
            confirmButtonColor: '#ff4d4d',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Sí, eliminar',
            cancelButtonText: 'Cancelar'
        });

        if (result.isConfirmed) {
            try {
                await deleteDoc(doc(db, "usuarios", id));
                Swal.fire({
                    title: 'Eliminado',
                    text: 'El usuario ha sido removido con éxito.',
                    icon: 'success',
                    background: '#0a0e14',
                    color: '#fff'
                });
            } catch (error) {
                console.error("Error al borrar:", error);
            }
        }
    };

    document.getElementById('btnLogoutSidebar').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });
</script>
</body>
</html>
