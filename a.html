<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-neon: #ffcc66;
            --azul-neon: #00f2ff;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.9) 100%);
            min-height: 100vh;
        }

        /* CONTENEDOR PRINCIPAL TRASLÚCIDO */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
        }

        /* TABLA CONFIGURADA PARA FILAS REDONDEADAS */
        .table-custom {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px; /* Espacio entre las "cápsulas" */
        }

        /* ESTILO DE LA "CELDA" O FILA INDIVIDUAL */
        #user-table-body tr {
            background: rgba(255, 255, 255, 0.05); /* Fondo de la fila */
            transition: all 0.3s ease;
        }

        /* REDONDEAR LAS ESQUINAS DE LA FILA (Se aplica a la primera y última celda) */
        #user-table-body tr td:first-child {
            border-top-left-radius: 15px;
            border-bottom-left-radius: 15px;
            padding-left: 20px;
        }

        #user-table-body tr td:last-child {
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
            padding-right: 20px;
        }

        /* EFECTO HOVER: SALTO Y LUZ */
        #user-table-body tr:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.01) translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        /* NEONES */
        .neon-gold {
            color: var(--dorado-neon);
            text-shadow: 0 0 10px rgba(255, 204, 102, 0.4);
            font-weight: bold;
        }

        .neon-blue {
            color: var(--azul-neon);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }

        /* BOTÓN BASURA */
        .btn-trash {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.2);
            border-radius: 10px;
            padding: 8px;
            transition: 0.3s;
        }

        .btn-trash:hover {
            background: #ff4d4d;
            color: white;
            transform: rotate(10deg);
        }
    </style>
</head>
<body>

<div class="super-overlay p-4">
    <div class="container">
        <h2 class="neon-gold mb-4 text-center text-uppercase">Directorio Supralógico</h2>
        
        <div class="glass-panel">
            <div class="table-responsive">
                <table class="table-custom">
                    <thead>
                        <tr class="text-white-50 small text-uppercase">
                            <th class="pb-3 ps-4">Entidad</th>
                            <th class="pb-3">Responsable</th>
                            <th class="pb-3">Email</th>
                            <th class="pb-3">Perfil</th>
                            <th class="pb-3 text-end pe-4">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tableBody = document.getElementById('user-table-body');

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        tableBody.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;

            tableBody.innerHTML += `
                <tr>
                    <td class="py-4">
                        <span class="neon-gold d-block">${data.entidad || 'N/A'}</span>
                    </td>
                    <td>
                        <div class="d-flex flex-column">
                            <span class="fw-bold">${data.nombreResponsable || 'Sin Nombre'}</span>
                            <span class="text-white-50 small" style="font-size:0.7rem">Ref: ${data.responsable || 'N/A'}</span>
                        </div>
                    </td>
                    <td><span class="neon-blue small">${data.email || 'N/A'}</span></td>
                    <td>
                        <span class="badge" style="border:1px solid #c5a059; color:#c5a059">
                            ${(data.perfil || 'Usuario').toUpperCase()}
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <button onclick="borrarUsuario('${id}', '${data.entidad}')" class="btn btn-trash">
                            <i class="bi bi-trash3-fill"></i>
                        </button>
                    </td>
                </tr>`;
        });
    });

    window.borrarUsuario = async (id, entidad) => {
        const swalConfig = {
            background: '#0a0e14',
            color: '#fff',
            confirmButtonColor: '#ff4d4d',
            cancelButtonColor: '#333'
        };

        const result = await Swal.fire({
            title: '¿ELIMINAR IDENTIDAD?',
            text: `Confirmar borrado de: ${entidad}`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Eliminar',
            ...swalConfig
        });

        if (result.isConfirmed) {
            await deleteDoc(doc(db, "usuarios", id));
            Swal.fire({ title: 'Eliminado', icon: 'success', ...swalConfig });
        }
    };
</script>
</body>
</html>
