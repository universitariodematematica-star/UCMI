<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Historial de Solicitudes</title>
    <!-- Frameworks y Estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --dorado-neon: #ffcc66;
            --azul-sidebar: #1a2a3a;
            --cian-tech: #00f2ff;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(10px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
        }

        .btn-sidebar-custom {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: rgba(255, 255, 255, 0.7) !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
            border-radius: 50px;
            padding: 10px 15px;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            width: 100%;
        }

        .btn-sidebar-custom:hover, .btn-sidebar-custom.active {
            border-color: var(--cian-tech) !important;
            color: var(--cian-tech) !important;
            background: rgba(0, 242, 255, 0.05);
        }

        /* --- PANEL DE TABLA --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .table-historial {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        .table-historial tr {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
        }

        .table-historial td {
            padding: 15px 20px;
            border: none;
            vertical-align: middle;
        }

        .badge-status {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-aprobado { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff8844; }
        .status-rechazado { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d44; }
        .status-pendiente { background: rgba(255, 204, 0, 0.1); color: #ffcc00; border: 1px solid #ffcc0044; }

        .date-chip {
            font-family: 'Courier New', monospace;
            background: rgba(0, 242, 255, 0.05);
            color: var(--cian-tech);
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .neon-gold { color: var(--dorado-neon); font-weight: bold; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 50px;" alt="Logo">
                    <p class="small mt-2 neon-gold">SISTEMA UCMI</p>
                </div>
                <nav class="nav flex-column mb-auto">
                    <a class="btn-sidebar-custom" href="master-postulaciones.html"><i class="bi bi-person-badge me-2"></i> Solicitudes</a>
                    <a class="btn-sidebar-custom active" href="historial-postulaciones.html"><i class="bi bi-archive me-2"></i> Historial</a>
                    <a class="btn-sidebar-custom" href="master-usuarios.html"><i class="bi bi-people me-2"></i> Usuarios</a>
                </nav>
            </div>

            <!-- CONTENIDO -->
            <div class="col-md-10 p-5">
                <h2 class="neon-gold text-uppercase mb-4">Historial de Solicitudes</h2>
                
                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table-historial text-white">
                            <thead>
                                <tr class="text-white-50 small text-uppercase">
                                    <th class="ps-4">Solicitante</th>
                                    <th>Fecha</th>
                                    <th>Perfil</th>
                                    <th>Estado</th>
                                    <th class="text-end pe-4">ID Registro</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCuerpo">
                                <!-- Datos de Firebase -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tablaCuerpo = document.getElementById('tablaCuerpo');

    // REFERENCIA A TU COLECCIÓN REAL: "historial_postulaciones"
    // ORDENADO POR EL CAMPO: "fecha"
    const q = query(collection(db, "historial_postulaciones"), orderBy("fecha", "desc"));

    onSnapshot(q, (snapshot) => {
        tablaCuerpo.innerHTML = '';
        
        if (snapshot.empty) {
            tablaCuerpo.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-white-50">No hay datos en el historial.</td></tr>`;
            return;
        }

        snapshot.forEach((doc) => {
            const p = doc.data();
            
            // Ajuste dinámico de campos según tu base de datos
            const estado = p.decisionFinal || "PENDIENTE";
            let statusClass = 'status-pendiente';
            if(estado === 'ACEPTADO') statusClass = 'status-aprobado';
            if(estado === 'RECHAZADO') statusClass = 'status-rechazado';

            tablaCuerpo.innerHTML += `
                <tr>
                    <td class="ps-4">
                        <div class="fw-bold text-white">${p.entidad || 'Sin Entidad'}</div>
                        <div class="text-white-50 small">${p.nombreResponsable || '---'}</div>
                        <div class="text-info small" style="font-size: 0.7rem;">${p.email || ''}</div>
                    </td>
                    <td><span class="date-chip">${p.fecha || '---'}</span></td>
                    <td>
                        <div class="small fw-bold text-warning">${(p.perfil || 'Academia').toUpperCase()}</div>
                        <div class="text-white-50 small">${p.duracionLicencia || ''}</div>
                    </td>
                    <td><span class="badge-status ${statusClass}">${estado}</span></td>
                    <td class="text-end pe-4">
                        <code class="text-white-50 small">${doc.id.substring(0, 10)}</code>
                    </td>
                </tr>
            `;
        });
    }, (error) => {
        console.error("Error al leer Firestore:", error);
        // Si sale un error de índice en la consola, haz clic en el link que genera Firebase
    });
</script>
</body>
</html>
