/* --- Estilos del Directorio y Tabla --- */
.navbar-top {
    background: rgba(255, 255, 255, 0.05);
    padding: 15px 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* --- Mejora de Cristal Esmerilado --- */
.table-container {
    background: rgba(255, 255, 255, 0.03); /* Más transparente */
    border-radius: 20px;
    padding: 25px;
    backdrop-filter: blur(15px); /* Desenfoque más suave */
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

/* --- ESTILO UNIFICADO PARA TABLAS TIPO CRISTAL --- */

/* 1. Limpieza total de los estilos por defecto de Bootstrap */
.table {
    border-collapse: separate !important;
    border-spacing: 0 15px !important; /* Espacio entre filas */
    background: transparent !important;
    color: white !important;
}

/* 2. Cabeceras sin fondo */
.table thead th {
    background: transparent !important;
    border: none !important;
    color: rgba(255, 255, 255, 0.5) !important;
    text-transform: uppercase;
    font-size: 0.8rem;
    padding-bottom: 5px;
}

/* 3. El contenedor de la fila (la tarjeta de cristal) */
.fila-estudiante {
    background: rgba(255, 255, 255, 0.03) !important;
    backdrop-filter: blur(10px) !important;
    -webkit-backdrop-filter: blur(10px) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
}

/* 4. Celdas transparentes dentro de la fila */
.fila-estudiante td {
    background: transparent !important;
    border: none !important;
    padding: 20px !important;
    vertical-align: middle;
}

/* 5. Bordes redondeados en los extremos */
.fila-estudiante td:first-child {
    border-radius: 15px 0 0 15px;
}

.fila-estudiante td:last-child {
    border-radius: 0 15px 15px 0;
}

/* 6. Efecto hover suave y brillante (Transición lenta) */
.fila-estudiante {
    transition: all 0.3s ease !important; /* Transición general lenta */
}

.fila-estudiante:hover {
    background: rgba(255, 255, 255, 0.08) !important;
    transform: scale(1.005); 
    transition: all 0.8s ease !important; /* Transición de entrada lenta */
}

/* Efecto de brillo en el texto (Transición lenta) */
.fila-estudiante:hover td, 
.fila-estudiante:hover td *, 
.fila-estudiante:hover td div, 
.fila-estudiante:hover td span {
    color: #ffffff !important;
    text-shadow: 0 0 8px rgba(255, 255, 255, 1), 0 0 15px rgba(255, 255, 255, 0.8) !important;
    transition: all 0.8s ease !important; /* Esto controla la velocidad del brillo */
}
.badge-modulo {
    background-color: rgba(197, 160, 89, 0.2);
    color: var(--dorado-ucmi);
    border: 1px solid var(--dorado-ucmi);
    padding: 4px 8px;
    margin: 2px;
    font-size: 0.7rem;
    border-radius: 6px;
}

.btn-panel {
    background: transparent;
    border: 1px solid var(--dorado-ucmi);
    color: var(--dorado-ucmi);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.8rem;
    transition: 0.3s;
}

.btn-panel:hover {
    background: var(--dorado-ucmi);
    color: var(--azul-ucmi);
}

.form-select, .form-control {
    background: rgba(0, 0, 0, 0.3) !important;
    border: 1px solid rgba(255, 255, 255, 0.2) !important;
    color: white !important;
    border-radius: 8px !important;
}

.badge-cupos {
    font-size: 0.85rem;
    padding: 8px 12px;
    border-radius: 50px;
    font-weight: 600;
}

/* --- NUEVA REGLA PARA ALFANUMÉRICOS --- */
.fila-estudiante td, 
.fila-estudiante td div, 
.fila-estudiante td small, 
.fila-estudiante td span {
    color: #ffffff !important;
}        

 /* Ejemplo: Mantener el WhatsApp verde después de haber blanqueado todo */
.fila-estudiante td .text-success {
    color: #27ae60 !important; 
}       

/* --- CORRECCIÓN FINAL DE DESBORDAMIENTO --- */

/* Elimina el scroll horizontal en el contenedor de la tabla */
.table-responsive {
    overflow-x: hidden !important; 
    width: 100% !important;
}

/* Fuerza a la tabla a no superar el ancho de su contenedor */
.table {
    width: 100% !important;
    table-layout: fixed !important; /* Vital para que no se expanda de más */
}

/* Ajuste fino: asegura que las celdas no fuercen el ancho */
.fila-estudiante td {
    word-wrap: break-word !important; /* Si un correo es muy largo, lo rompe en dos líneas en vez de ensanchar */
    overflow: hidden !important;
}
