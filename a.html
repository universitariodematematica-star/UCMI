<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

    <div class="container py-5">
        <h2>Mis Módulos</h2>
        <table class="table table-dark">
            <thead><tr><th>Módulo</th><th>Acciones</th></tr></thead>
            <tbody id="tablaModulos"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
            authDomain: "ucmi-13796634.firebaseapp.com",
            projectId: "ucmi-13796634",
            storageBucket: "ucmi-13796634.firebasestorage.app",
            messagingSenderId: "1090719609536",
            appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
        };

        try {
            const db = getFirestore(initializeApp(firebaseConfig));
            const q = query(collection(db, "ofertas"), orderBy("modulo", "asc"));

            onSnapshot(q, (snapshot) => {
                const tabla = document.getElementById("tablaModulos");
                tabla.innerHTML = ""; // Limpiar
                
                if (snapshot.empty) {
                    tabla.innerHTML = "<tr><td colspan='2'>No hay módulos en la base de datos.</td></tr>";
                    return;
                }

                snapshot.forEach((doc) => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `<td>${doc.data().modulo || "Sin nombre"}</td><td>Cargado</td>`;
                    tabla.appendChild(tr);
                });
            }, (error) => {
                console.error("Error en Firestore:", error);
                document.getElementById("tablaModulos").innerHTML = `<tr><td colspan='2'>Error: ${error.message}</td></tr>`;
            });
        } catch (e) {
            console.error("Error de inicialización:", e);
        }
    </script>
</body>
</html>
