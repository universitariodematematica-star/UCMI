<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; margin: 0; color: white; min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; flex-shrink: 0; padding: 25px 15px; display: flex; flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; width: auto; margin-bottom: 30px; display: block; margin-left: auto; margin-right: auto; 
            object-fit: contain; border-radius: 15px; border: 2px solid rgba(255, 255, 255, 0.1); transition: opacity 0.5s ease; opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }
        .nav-item-ucmi { display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s all ease; font-size: 0.85rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }

        .btn-sidebar-action { background: transparent; border: 1px solid rgba(255, 255, 255, 0.4) !important; color: white !important; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; border-radius: 50px; padding: 10px; text-align: center; display: block; margin-bottom: 10px; }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }

        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); flex-grow: 1; min-height: 100vh; overflow-y: auto; padding: 40px; }

        /* Tabla y Modal (heredados fielmente) */
        .table-container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 28px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .table { --bs-table-bg: transparent !important; color: white !important; }
        .modal-content { background: rgba(255, 255, 255, 0.03) !important; backdrop-filter: blur(15px) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 32px; color: white !important; }
        .btn-activar-acceso { background: rgba(39, 174, 96, 0.2) !important; border: 1px solid rgba(39, 174, 96, 0.5) !important; color: white !important; }
        .bg-categoria-docente { background-color: #d63384 !important; }
        .bg-categoria-estudiante { background-color: #311b92 !important; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" id="logoAcademia" class="logo-sidebar" alt="Logo">
        <nav class="sidebar-nav">
            <a href="#" class="nav-item-ucmi active"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-people"></i> USUARIOS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-clock-history"></i> HISTORIAL</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 border-top border-secondary pt-3">
            <a href="#" class="btn-sidebar-action w-100">Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100">Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="display-6 fw-bold">Control de Postulaciones</h1>
                <span id="marcadorCupos" class="badge bg-dark border border-secondary px-3 py-2 rounded-pill fs-6" style="color: var(--dorado-ucmi) !important;">Cupos: 0 / 0</span>
            </div>
            
            <div class="table-container">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr class="text-muted small"><th>NOMBRE</th><th>PERFIL</th><th>LOCALIZACIÓN</th><th class="text-center">ACCIÓN</th></tr>
                        </thead>
                        <tbody id="listaMaestra"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="modalDetalles" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h4 class="fw-bold">Expediente del Aspirante</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-4" id="contenidoModal"></div>
            <div class="modal-footer border-0">
                <button class="btn btn-outline-danger rounded-pill px-4" id="btnEliminar">Rechazar</button>
                <button class="btn btn-activar-acceso rounded-pill px-4 fw-bold" id="btnConfirmarAcceso">Activar Acceso</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
      
    const secondaryApp = initializeApp(firebaseConfig, "Secondary");
    const secondaryAuth = getAuth(secondaryApp);
    
    let currentId = null;
    let currentData = null;
    let logoAcademiaGlobal = "";
    let academiaNombreGlobal = "";
    let cuposMaximosGlobal = 0;
    let registrosLocales = [];

    const selectorFiltro = document.getElementById('filtroPerfil');

    // Función global de WhatsApp (extraída fuera del render)
    const prepararMensajeWhatsApp = (data, decision) => {
        const nombre = data.nombreResponsable || data.nombre || "Postulante";
        const telefono = data.whatsapp || data.whatsappRepresentante || "";
        if (!telefono || telefono === "N/A") return;
        let textoMensaje = (decision === "ACEPTADO") 
            ? `¡Hola *${nombre}*! Tu solicitud en *${academiaNombreGlobal}* ha sido *ACEPTADA*. ✅%0A%0A📧 *Usuario:* ${data.email}%0A🔑 *Clave:* ${data.claveEnviada}%0A🌐 *Portal:* https://universitariodematematica-star.github.io/UCMI/`
            : `Hola *${nombre}*. Lamentamos informarte que tu solicitud en UCMI no ha sido aprobada en esta ocasión. Ponte en contacto con el +593991752385 para informarte la razón de tu rechazo.`;
        const url = `https://api.whatsapp.com/send?phone=${telefono.toString().replace(/\D/g, '')}&text=${textoMensaje}`;
        window.open(url, '_blank');
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.email));
            if (userDoc.exists()) {
                const data = userDoc.data();
                logoAcademiaGlobal = data.logoCustom || data.logo || "https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png";
                document.getElementById('logoAcademiaPrincipal').src = logoAcademiaGlobal;
                document.getElementById('logoAcademiaPrincipal').style.opacity = "1";
                academiaNombreGlobal = data.entidad || "Panel";
                cuposMaximosGlobal = data.cupos || 0;
                document.getElementById('nombreAcademiaSidebar').innerText = academiaNombreGlobal.toUpperCase();
                actualizarMarcadorCupos();
                iniciarEscuchaFiltrada(academiaNombreGlobal);
            }
        } else { window.location.href = "index.html"; }
    });

    async function actualizarMarcadorCupos() {
        if (!academiaNombreGlobal) return;
        const docAdmin = await getDoc(doc(db, "usuarios", auth.currentUser.email));
        const dataAdmin = docAdmin.exists() ? docAdmin.data() : { cupos: 0 };
        const cuposReales = dataAdmin.cupos || 0;
        const qUsuarios = query(
            collection(db, "usuarios"), 
            where("entidad", "==", academiaNombreGlobal), 
            where("rol", "in", ["estudiante", "docente"])
        );
        const snap = await getDocs(qUsuarios);
        document.getElementById('marcadorCupos').innerText = `Cupos: ${snap.size} / ${cuposReales}`;
    }

    function iniciarEscuchaFiltrada(academiaNombre) {
        const q = query(collection(db, "postulaciones"), where("entidad", "==", academiaNombre));
        onSnapshot(q, (snap) => {
            registrosLocales = snap.docs;
            renderizarTabla();
        });
    }

    function renderizarTabla() {
        const lista = document.getElementById('listaMaestra');
        if (!lista) return;
        const filtro = selectorFiltro.value; 
        lista.innerHTML = "";
        registrosLocales.forEach(docSnap => {
            const d = docSnap.data();
            const id = docSnap.id;
            const esEstudiante = d.perfil === "Estudiante Academia";
            const esDocente = d.perfil === "Docente Academia";
            if (filtro === "estudiante" && !esEstudiante) return;
            if (filtro === "docente" && !esDocente) return;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><div class="fw-bold">${d.nombreResponsable || d.nombre || 'Sin nombre'}</div><div class="small text-muted">${d.email}</div></td><td><span class="badge ${esDocente ? 'bg-categoria-docente' : 'bg-categoria-estudiante'}">${d.perfil}</span></td><td><i class="bi bi-geo-alt me-1"></i>${d.ubicacion || 'No definida'}</td><td class="text-center"><button class="btn btn-dark btn-sm" onclick="verExpediente('${id}')"><i class="bi bi-eye"></i> Detalles</button></td>`;
            lista.appendChild(tr);
        });
    }

    window.verExpediente = async (id) => {
        currentId = id;
        const snap = await getDoc(doc(db, "postulaciones", id));
        if (!snap.exists()) return;
        currentData = snap.data();
        const d = currentData;
        const esDocente = d.perfil === "Docente Academia";
        document.getElementById('logoModalAspirante').src = logoAcademiaGlobal;
        const diasSemana = ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'];
        let htmlHorarios = "";
        if (esDocente && d.horarios && Array.isArray(d.horarios)) {
            const agrupado = {};
            d.horarios.forEach(idx => { const dia = diasSemana[idx % 7]; const hora = Math.floor(idx / 7); if (!agrupado[dia]) agrupado[dia] = []; agrupado[dia].push(`${hora}:00`); });
            diasSemana.forEach(dia => { if (agrupado[dia]) { htmlHorarios += `<div class="col-12 mb-1" style="border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding: 5px 0;"><span style="color:var(--dorado-ucmi); font-weight:bold; display: inline-block; width: 45px;">${dia}:</span><span style="font-size: 0.85rem; color: #fff;">${agrupado[dia].sort((a,b)=>a-b).join(', ')}</span></div>`; } });
        } else if (esDocente) { htmlHorarios = `<div class="col-12 mt-2" style="font-size:0.8rem; color:#888;">No hay disponibilidad registrada.</div>`; }

        let html = `<div class="col-12 mb-4"><h5 style="color:var(--dorado-ucmi)">Expediente del Aspirante</h5></div>`;
        if (esDocente) {
            html += `<div class="col-12 mb-3 text-uppercase" style="color:var(--dorado-ucmi); font-weight:bold;">Datos del Docente</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">NOMBRE COMPLETO</label><br>${d.nombreResponsable}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">DNI / ID</label><br>${d.dniDocente}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">WHATSAPP</label><br>${d.whatsapp}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">UBICACIÓN</label><br>${d.ubicacion}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">TÍTULO</label><br>${d.titulo}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">INSTITUCIÓN DE EGRESO</label><br>${d.institucion_titulo}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">ENLACE A SÍNTESIS CURRICULAR</label><br>${d.enlaceSintesis}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">AÑOS DE EXPERIENCIA</label><br>${d.experienciaDocente}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">CORREO ELECTRÓNICO</label><br>${d.email}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">NIVELES</label><br>${d.niveles_atencion}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">RAZÓN DE PERTENECIA</label><br>${d.razon_deseo_pertenencia}</div>
            <div class="col-12 mt-2"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">DISPONIBILIDAD HORARIA</label></div>${htmlHorarios}`;
        } else {
            html += `<div class="col-12 mb-3 text-uppercase" style="color:var(--dorado-ucmi); font-weight:bold;">Datos del Estudiante</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">NOMBRE</label><br>${d.nombreResponsable}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">DNI / ID</label><br>${d.dniEstudiante}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">GÉNERO</label><br>${d.genero}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">NACIMIENTO</label><br>${d.fechaNacimiento}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">EDAD</label><br>${d.edadEstudiante}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">PROMEDIO</label><br>${d.promediocatualbachillerato}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">UBICACIÓN</label><br>${d.ubicacion}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">CORREO</label><br>${d.email}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">WHATSAPP</label><br>${d.whatsapp}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">MÓDULOS</label><br>${d.modulos}</div>
            <div class="col-12 mb-3 text-uppercase" style="color:var(--dorado-ucmi); font-weight:bold; border-top: 1px solid #333; padding-top:10px;">Información del Representante</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">NOMBRE</label><br>${d.nombreRepresentante}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">CORREO</label><br>${d.email}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">DNI</label><br>${d.dniRepresentante}</div>
            <div class="col-6 mb-3"><label style="color:#2ecc71; font-weight:bold; font-size:0.7rem;">WHATSAPP</label><br>${d.whatsappRepresentante}</div>`;
        }
        document.getElementById('contenidoModal').innerHTML = `<div class="row">${html}</div>`;
        new bootstrap.Modal(document.getElementById('modalDetalles')).show();
    };

    document.getElementById('btnConfirmarAcceso').onclick = async () => {
        if (!currentId || !currentData) return;
        const esDocente = currentData.perfil === "Docente Academia";
        try {
            const qUsuarios = query(collection(db, "usuarios"), where("entidad", "==", academiaNombreGlobal), where("rol", "in", ["estudiante", "docente"]));
            const snap = await getDocs(qUsuarios);
if (snap.size >= cuposMaximosGlobal) {
                await Swal.fire('Cupos Agotados', 'No hay vacantes disponibles (límite alcanzado).', 'warning');
                return;
            }

            // --- NUEVA VALIDACIÓN: VERIFICAR SI EL CORREO YA ES USUARIO ---
            const usuarioExistente = await getDoc(doc(db, "usuarios", currentData.email));
            if (usuarioExistente.exists()) {
                await Swal.fire('Error', 'Este correo ya está registrado en el sistema. No se puede sobrescribir.', 'error');
                return;
            }
            const dni = String(currentData.dniDocente || currentData.dniEstudiante || "");
            const passwordTemp = dni.length >= 6 ? dni : "UCMI2026";
            try {

            await createUserWithEmailAndPassword(
                secondaryAuth,
                currentData.email,
                passwordTemp
            );

} catch (authError) { if (authError.code !== 'auth/email-already-in-use') throw authError; }
                        await setDoc(doc(db, "usuarios", currentData.email), {
                ...currentData,
                estado: "activo",
                rol: esDocente ? "docente" : "estudiante",
                claveInicial: passwordTemp
            });
            await addDoc(collection(db, "historial_postulaciones"), { ...currentData, fechaProceso: new Date().toISOString(), resultado: "Admitido", decisionFinal: "ACEPTADO" });
            await deleteDoc(doc(db, "postulaciones", currentId));
            
            // Acción WhatsApp
            prepararMensajeWhatsApp({ ...currentData, claveEnviada: passwordTemp }, "ACEPTADO");
            
            await Swal.fire({ title: '¡Éxito!', text: 'Usuario aceptado. Su clave inicial es: ' + passwordTemp, icon: 'success' });
            location.reload();
        } catch (e) { console.error("Error:", e); Swal.fire('Error', 'No se pudo procesar la admisión: ' + e.message, 'error'); }
    };

    document.getElementById('btnEliminar').onclick = async () => {
        const res = await Swal.fire({ title: '¿Estás seguro?', text: "¡Esta acción eliminará la postulación!", icon: 'warning', showCancelButton: true, confirmButtonText: 'Sí, rechazar' });
        if (res.isConfirmed) {
            try {
                await addDoc(collection(db, "historial_postulaciones"), { ...currentData, fechaProceso: new Date().toISOString(), resultado: "Rechazado", decisionFinal: "RECHAZADO" });
                await deleteDoc(doc(db, "postulaciones", currentId));
                
                // Acción WhatsApp
                prepararMensajeWhatsApp(currentData, "RECHAZADO");
                
                location.reload();
            } catch (e) { Swal.fire('Error', 'No se pudo rechazar.', 'error'); }
        }
    };
</script>
</body>
</html>
