<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --azul-ucmi: #1a2a3a; 
            --dorado-ucmi: #c5a059; 
            --rojo-error: #ff4d4d;
            --blanco-suave: rgba(255, 255, 255, 0.9);
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px 0; 
            color: white;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%);
            z-index: -1;
        }

        .card-form { 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px);
            max-width: 850px; 
            margin: auto; 
            overflow: hidden; 
        }

        .header-institucional {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .inst-logo { height: 120px; filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.2)); margin-bottom: 20px; }
        .inst-nombre { font-family: 'Cinzel', serif; color: #f3f0df; font-size: 1.2rem; letter-spacing: 5px; text-transform: uppercase; }
        .inst-titulo { color: var(--dorado-ucmi); font-weight: 800; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .linea-decorativa { width: 70px; height: 4px; background: var(--dorado-ucmi); margin: 25px auto; border-radius: 2px; box-shadow: 0 0 10px var(--dorado-ucmi); }

        .form-control, .form-select { 
            border-radius: 12px; padding: 14px; border: 1px solid rgba(255, 255, 255, 0.2); 
            background: rgba(255, 255, 255, 0.08); color: white; 
        }
        .form-control:focus, .form-select:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--dorado-ucmi); color: white; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }
        select option { background: #1a1a1a; color: white; }

        .seccion-dinamica { display: none; animation: slideIn 0.4s ease-out; background: rgba(0, 0, 0, 0.2); padding: 25px; border-radius: 15px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 15px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .program-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .check-all-container { background: rgba(197, 160, 89, 0.1); padding: 12px 20px; border-radius: 10px 10px 0 0; border: 1px solid rgba(197, 160, 89, 0.3); border-bottom: none; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 18px; border-radius: 15px; border: none; width: 100%; margin-top: 25px; transition: 0.3s; }
        .btn-enviar:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(197, 160, 89, 0.4); }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo UCMI" class="inst-logo">
            <div class="inst-nombre">Universitario de Ciencias Matemáticas e Idiomas</div>
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
            <div class="linea-decorativa"></div>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-4" novalidate>
            <div class="mb-4">
                <label class="form-label fw-bold"><i class="bi bi-person-badge me-2"></i>Tipo de Postulante:</label>
                <select class="form-select form-select-lg" id="perfilPrincipal" required onchange="gestionarFlujo()">
                    <option value="" selected disabled>Seleccione su perfil...</option>
                    <option value="Academia">Academia / Institución</option>
                    <option value="Independiente">Profesor Independiente</option>
                    <option value="Estudiante autodidacta">Estudiante Autodidacta</option>
                </select>
            </div>

            <div id="subSeccionProfesor" class="seccion-dinamica mb-4">
                <label class="form-label fw-bold"><i class="bi bi-mortarboard me-2"></i>Modalidad de Profesor:</label>
                <select class="form-select" id="subTipoProfesor">
                    <option value="Profesor asociado" selected>Profesor Asociado (Gestión de Cupos)</option>
                    <option value="Profesor embajador">Profesor Embajador (Marca Blanca)</option>
                </select>
            </div>

            <div id="cuerpoFormulario" style="display: none;">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label small fw-bold">Nombre Completo:</label><input type="text" id="nombreInput" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label small fw-bold">Correo:</label><input type="email" id="emailInput" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label small fw-bold">WhatsApp:</label><input type="text" id="whatsappInput" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label small fw-bold">Ciudad y País:</label><input type="text" id="ubicacionInput" class="form-control" required></div>
                </div>

                <div id="camposAcademia" class="seccion-dinamica">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label small fw-bold" id="labelEntidad">Institución:</label><input type="text" id="entidadInput" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">RIF/DNI:</label><input type="text" id="rifInput" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">Cupos Solicitados:</label><input type="number" id="cuposInput" class="form-control"></div>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="form-label fw-bold text-uppercase small text-white-50">Programas Académicos</label>
                    <div class="check-all-container">
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="selectAll"><label class="form-check-label fw-bold" for="selectAll">Seleccionar Todo el Ecosistema</label></div>
                    </div>
                    <div class="program-grid mb-3" id="gridProgramas">
                        <div class="text-center w-100 py-3"><div class="spinner-border spinner-border-sm text-warning"></div> Cargando módulos...</div>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold small">Duración Licencia (Meses):</label>
                    <input type="number" id="mesesInput" class="form-control" required min="1">
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR POSTULACIÓN OFICIAL</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- CARGA DINÁMICA DE MÓDULOS (Eliminada la lista estática) ---
    async function cargarOfertas() {
        const grid = document.getElementById('gridProgramas');
        try {
            const q = query(collection(db, "ofertas"), orderBy("modulo", "asc"));
            const snap = await getDocs(q);
            grid.innerHTML = "";
            snap.forEach(doc => {
                const nombre = doc.data().modulo;
                grid.innerHTML += `
                <div class="form-check">
                    <input class="form-check-input prog-check" type="checkbox" value="${nombre}" id="chk_${doc.id}">
                    <label class="form-check-label small text-white" for="chk_${doc.id}">${nombre}</label>
                </div>`;
            });
        } catch (e) { grid.innerHTML = "Error al conectar con el núcleo."; }
    }
    cargarOfertas();

    document.getElementById('selectAll').addEventListener('change', function() {
        document.querySelectorAll('.prog-check').forEach(cb => cb.checked = this.checked);
    });

    // --- LÓGICA DE INTERFAZ ---
    window.gestionarFlujo = () => {
        const principal = document.getElementById('perfilPrincipal').value;
        const subTipo = document.getElementById('subTipoProfesor').value;
        document.getElementById('cuerpoFormulario').style.display = 'block';
        document.getElementById('subSeccionProfesor').style.display = (principal === 'Independiente') ? 'block' : 'none';
        
        const camposAcademia = document.getElementById('camposAcademia');
        if (principal === 'Academia' || principal === 'Independiente') {
            camposAcademia.style.display = 'block';
            document.getElementById('cuposInput').parentElement.style.display = (principal === 'Academia' || subTipo === 'Profesor asociado') ? 'block' : 'none';
        } else { camposAcademia.style.display = 'none'; }
    };
    document.getElementById('subTipoProfesor').addEventListener('change', window.gestionarFlujo);

    // --- ENVÍO Y PDF ---
    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const checks = document.querySelectorAll('.prog-check:checked');
        if (checks.length === 0) return alert("Seleccione al menos un programa.");

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "Procesando...";

        const principal = document.getElementById('perfilPrincipal').value;
        const subValor = document.getElementById('subTipoProfesor').value;
        const tipoFinal = (principal === 'Independiente') ? subValor : principal;

        const datos = {
            perfil: tipoFinal,
            nombreResponsable: document.getElementById('nombreInput').value,
            email: document.getElementById('emailInput').value,
            whatsapp: document.getElementById('whatsappInput').value,
            ubicacion: document.getElementById('ubicacionInput').value,
            programas: Array.from(checks).map(c => c.value).join(", "),
            duracionLicencia: document.getElementById('mesesInput').value + " meses",
            cupos: document.getElementById('cuposInput').value || "1",
            rif: document.getElementById('rifInput').value || "N/A",
            entidad: document.getElementById('entidadInput').value || document.getElementById('nombreInput').value,
            fecha: new Date().toLocaleString()
        };

        try {
            await addDoc(collection(db, "postulaciones"), datos);
            generarPDF(datos);
            alert("¡Postulación enviada!");
            location.reload();
        } catch (err) { alert("Error de red."); btn.disabled = false; }
    });

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(11, 27, 43); doc.rect(0, 0, 210, 55, 'F');
        doc.addImage("https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png", 'PNG', 15, 8, 35, 35);
        doc.setTextColor(197, 160, 89); doc.setFontSize(20); doc.text("U C M I", 120, 22, { align: "center" });
        doc.setFontSize(16); doc.text("POSTULACIÓN ACADÉMICA", 120, 42, { align: "center" });

        let y = 80;
        const drawRow = (label, value) => {
            doc.setFont("helvetica", "bold"); doc.text(label, 25, y);
            doc.setFont("helvetica", "normal"); doc.text(String(value), 75, y);
            y += 10;
        };

        drawRow("PERFIL:", d.perfil);
        drawRow("RESPONSABLE:", d.nombreResponsable);
        drawRow("PROGRAMAS:", d.programas);
        window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
