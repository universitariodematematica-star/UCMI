<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Historial de Solicitudes</title>
    <!-- Frameworks y Estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --dorado-neon: #ffcc66;
            --azul-sidebar: #1a2a3a;
            --cian-tech: #00f2ff;
            --purpura-neon: #bc13fe;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(10px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
        }

        .nav-section-title {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px 10px;
        }

        .btn-sidebar-custom {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: rgba(255, 255, 255, 0.7) !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
            border-radius: 50px;
            padding: 10px 15px;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            width: 100%;
        }

        .btn-sidebar-custom:hover, .btn-sidebar-custom.active {
            border-color: var(--cian-tech) !important;
            color: var(--cian-tech) !important;
            background: rgba(0, 242, 255, 0.05);
            transform: translateX(5px);
        }

        .btn-cerrar-sesion {
            border: 1px solid rgba(255, 0, 0, 0.4) !important;
            color: #ff4d4d !important;
        }

        /* --- PANEL CENTRAL --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .table-historial {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        .table-historial tr {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .table-historial tr:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.01);
        }

        .table-historial td {
            padding: 15px 20px;
            border: none;
            vertical-align: middle;
        }

        .neon-gold { color: var(--dorado-neon); font-weight: bold; text-shadow: 0 0 10px rgba(255, 204, 102, 0.3); }

        .badge-status {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-aprobado { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff8844; }
        .status-pendiente { background: rgba(255, 204, 0, 0.1); color: #ffcc00; border: 1px solid #ffcc0044; }
        .status-rechazado { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d44; }

        .date-chip {
            font-family: 'Courier New', monospace;
            background: rgba(0, 242, 255, 0.05);
            color: var(--cian-tech);
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 50px;" alt="Logo">
                    <p class="small mt-2 neon-gold">SISTEMA UCMI</p>
                </div>
                <nav class="nav flex-column mb-auto">
                    <p class="nav-section-title">Gestión</p>
                    <a class="btn-sidebar-custom" href="master-postulaciones.html"><i class="bi bi-person-badge me-2"></i> Solicitudes</a>
                    <a class="btn-sidebar-custom active" href="historial-postulaciones.html"><i class="bi bi-archive me-2"></i> Historial</a>
                    <a class="btn-sidebar-custom" href="master-usuarios.html"><i class="bi bi-people me-2"></i> Usuarios</a>
                    <p class="nav-section-title">Sistema</p>
                    <a href="super-admin.html" class="btn-sidebar-custom"><i class="bi bi-grid-3x3-gap-fill me-2"></i> Panel Maestro</a>
                    <button id="btnLogoutSidebar" class="btn-sidebar-custom btn-cerrar-sesion">
                        <i class="bi bi-box-arrow-right me-2"></i> Salir
                    </button>
                </nav>
            </div>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="col-md-10 p-5">
                <div class="row mb-5 align-items-center">
                    <div class="col-md-7">
                        <h2 class="neon-gold text-uppercase mb-1" style="letter-spacing: 3px;">
                            <i class="bi bi-clock-history me-3"></i>Acumulado de Solicitudes
                        </h2>
                        <p class="text-white-50">Registro histórico e inmutable de todas las peticiones recibidas por el sistema.</p>
                    </div>
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-white-50"><i class="bi bi-search"></i></span>
                            <input type="text" id="busquedaHistorial" class="form-control bg-transparent text-white border-secondary shadow-none" placeholder="Buscar por entidad, responsable o correo...">
                        </div>
                    </div>
                </div>

                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table-historial text-white">
                            <thead>
                                <tr class="text-white-50 small text-uppercase" style="letter-spacing: 1.5px;">
                                    <th class="ps-4 pb-3">Información del Solicitante</th>
                                    <th class="pb-3">Fecha de Ingreso</th>
                                    <th class="pb-3">Tipo de Perfil</th>
                                    <th class="pb-3">Estado Actual</th>
                                    <th class="text-end pe-4 pb-3">Hash ID</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCuerpo">
                                <!-- Carga dinámica -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Configuración de Firebase (Vinculada a tu proyecto ucmi-13796634)
    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const tablaCuerpo = document.getElementById('tablaCuerpo');
    let solicitudesAcumuladas = [];

    // --- ESCUCHA EN TIEMPO REAL (ACUMULACIÓN) ---
    // Esta función se encarga de traer todo lo de la colección "postulaciones"
    // No borra nada, simplemente lo ordena por fecha descendente.
    const q = query(collection(db, "postulaciones"), orderBy("fechaSolicitud", "desc"));

    onSnapshot(q, (snapshot) => {
        solicitudesAcumuladas = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderizar(solicitudesAcumuladas);
    }, (error) => {
        console.error("Error al obtener datos:", error);
    });

    function renderizar(datos) {
        tablaCuerpo.innerHTML = '';
        
        if (datos.length === 0) {
            tablaCuerpo.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-white-50">Esperando nuevas solicitudes...</td></tr>`;
            return;
        }

        datos.forEach(p => {
            // Formatear Fecha de Firebase
            let fechaTexto = "---";
            if(p.fechaSolicitud?.seconds) {
                fechaTexto = new Date(p.fechaSolicitud.seconds * 1000).toLocaleDateString('es-ES', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
            }

            // Clase de estado
            const statusClass = p.status === 'aprobado' ? 'status-aprobado' : 
                                p.status === 'rechazado' ? 'status-rechazado' : 'status-pendiente';

            tablaCuerpo.innerHTML += `
                <tr>
                    <td class="ps-4">
                        <div class="fw-bold text-white">${p.entidad || 'Sin Nombre'}</div>
                        <div class="text-white-50 small"><i class="bi bi-person me-1"></i>${p.nombreResponsable || '---'}</div>
                        <div class="text-info small" style="font-size: 0.75rem;">${p.email || '---'}</div>
                    </td>
                    <td><span class="date-chip text-uppercase">${fechaTexto}</span></td>
                    <td>
                        <div class="small fw-bold"><i class="bi bi-tag me-2 text-warning"></i>${p.perfil?.toUpperCase() || 'ESTUDIANTE'}</div>
                        <div class="text-white-50" style="font-size: 0.7rem;">${p.paquete || 'Plan Estándar'}</div>
                    </td>
                    <td>
                        <span class="badge-status ${statusClass}">
                            ${p.status || 'En Proceso'}
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <code class="text-white-50 small" style="font-size: 0.65rem;">
                            ${p.id.substring(0, 12)}
                        </code>
                    </td>
                </tr>
            `;
        });
    }

    // --- FILTRO DE BÚSQUEDA INTELIGENTE ---
    document.getElementById('busquedaHistorial').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = solicitudesAcumuladas.filter(p => 
            p.entidad?.toLowerCase().includes(term) || 
            p.nombreResponsable?.toLowerCase().includes(term) ||
            p.email?.toLowerCase().includes(term) ||
            p.perfil?.toLowerCase().includes(term)
        );
        renderizar(filtrados);
    });

    // --- LOGOUT ---
    document.getElementById('btnLogoutSidebar').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>
</body>
</html>
