<div class="super-overlay">
    <div class="glass-panel">
        <div class="d-flex align-items-center mb-5">
            <div class="bg-info rounded-3 p-2 me-3 shadow-lg"><i class="bi bi-cpu-fill text-dark fs-4"></i></div>
            <h3 class="fw-bold m-0 text-uppercase" style="letter-spacing: 4px;">Panel de Vigencia Operativa</h3>
        </div>
        
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Responsable / Identificador</th>
                        <th>Activación</th>
                        <th style="width: 20%;">Cronología</th>
                        <th>Expiración</th>
                        <th>Remanente</th>
                        <th class="text-end">Operaciones</th>
                    </tr>
                </thead>
                <tbody id="listaVigencia"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // FUNCIÓN DE LIMPIEZA ROBUSTA PARA FECHA DE INICIO
    function formatearFechaInicio(str) {
        if (!str) return "Sin fecha";
        try {
            // Si el string viene como "28/4/2026, 15:25:11"
            const partes = str.split(',')[0].split('/');
            if (partes.length === 3) {
                // Forzamos el orden día/mes/año
                const dia = partes[0].padStart(2, '0');
                const mes = partes[1].padStart(2, '0');
                const anio = partes[2];
                return `${dia}/${mes}/${anio}`;
            }
            return str;
        } catch (e) {
            return "Error formato";
        }
    }

    // FUNCIÓN PARA CÁLCULOS (Internal use)
    function obtenerDateValido(str) {
        try {
            const [fecha, hora] = str.split(', ');
            const [d, m, a] = fecha.split('/');
            return new Date(`${a}-${m.padStart(2,'0')}-${d.padStart(2,'0')}T${hora}`);
        } catch(e) {
            return new Date();
        }
    }

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        const contenedor = document.getElementById('listaVigencia');
        contenedor.innerHTML = '';

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;

            // 1. Obtener la fecha para mostrar (Texto limpio)
            const fechaInicioTexto = formatearFechaInicio(data.fechaActivacion);

            // 2. Obtener fechas para cálculos matemáticos
            const dateInicio = obtenerDateValido(data.fechaActivacion);
            const dateFin = new Date(data.expiracionTimestamp);
            const ahora = new Date();

            // 3. Cálculos
            const totalMs = dateFin - dateInicio;
            const transcurridoMs = ahora - dateInicio;
            let porcentaje = Math.floor((transcurridoMs / totalMs) * 100);
            porcentaje = Math.min(Math.max(porcentaje, 0), 100);
            if(isNaN(porcentaje)) porcentaje = 0;

            const diasRestantes = Math.ceil((dateFin - ahora) / (1000 * 60 * 60 * 24));

            contenedor.innerHTML += `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="p-2 rounded-circle bg-opacity-10 bg-info me-3" style="border: 1px solid #00f2ff55">
                                <i class="bi bi-person-badge-fill text-info fs-5"></i>
                            </div>
                            <div>
                                <div class="fw-bold text-white mb-1">${data.entidad || 'Entidad'}</div>
                                <div class="email-badge">${data.email || id}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="text-white-50 mb-1" style="font-size: 0.6rem;">FECHA INICIO:</div>
                        <div class="fw-bold small text-white">${fechaInicioTexto}</div>
                    </td>
                    <td>
                        <div class="progress mb-2">
                            <div class="progress-bar progress-bar-neon" style="width: ${porcentaje}%"></div>
                        </div>
                        <div class="d-flex justify-content-between" style="font-size: 0.6rem;">
                            <span class="text-white-50">CONSUMO</span>
                            <span class="text-info fw-bold">${porcentaje}%</span>
                        </div>
                    </td>
                    <td>
                        <div class="text-white-50 mb-1" style="font-size: 0.6rem;">VENCE EN:</div>
                        <div class="fw-bold text-info small">${dateFin.toLocaleDateString()}</div>
                    </td>
                    <td>
                        <span class="status-badge">${diasRestantes > 0 ? diasRestantes + ' DÍAS' : 'EXPIRADO'}</span>
                    </td>
                    <td class="text-end">
                        <button onclick="borrarUsuario('${id}')" class="btn btn-revocar">
                            <i class="bi bi-trash3-fill me-2"></i>Revocar
                        </button>
                    </td>
                </tr>
            `;
        });
    });

    window.borrarUsuario = async (id) => {
        const confirm = await Swal.fire({
            title: '¿Revocar Licencia?',
            text: "Se cortará el acceso inmediato.",
            icon: 'warning',
            background: '#06090f',
            color: '#fff',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'Sí, revocar'
        });
        if (confirm.isConfirmed) {
            await deleteDoc(doc(db, "usuarios", id));
        }
    };
</script>
