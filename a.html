<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --azul-oscuro: #06090f; 
            --cristal-claro: rgba(255, 255, 255, 0.05);
            --sidebar-width: 260px;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(6, 9, 15, 0.7) 0%, rgba(6, 9, 15, 0.9) 100%);
            z-index: -1;
        }

        .wrapper { display: flex; height: 100vh; width: 100vw; }

        /* --- BARRA LATERAL --- */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(197, 160, 89, 0.2);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
            z-index: 10;
        }

        .sidebar-logo { width: 100px; margin: 0 auto 30px; display: block; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.2)); }

        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi {
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 10px;
            transition: 0.3s;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }

        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.05); }

        .nav-item-ucmi.active {
            background: rgba(197, 160, 89, 0.15);
            color: var(--dorado-ucmi);
            font-weight: 600;
            border-left: 3px solid var(--dorado-ucmi);
        }

        /* --- CONTENIDO --- */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; }

        /* --- BOTONES INFERIORES --- */
        .btn-maestro {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: white !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            border-radius: 50px;
            padding: 10px;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-bottom: 10px;
        }

        .btn-maestro:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn-cerrar {
            background: transparent;
            border: 1px solid rgba(231, 76, 60, 0.4) !important;
            color: rgba(231, 76, 60, 0.9) !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            border-radius: 50px;
            padding: 8px;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-cerrar:hover {
            background: rgba(231, 76, 60, 0.1);
            border-color: #e74c3c !important;
            color: white !important;
        }

        /* --- CARDS TRASLÚCIDAS --- */
        .card-gestion { 
            background: var(--cristal-claro); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            border-radius: 25px; 
            padding: 30px; 
            margin-bottom: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .form-control { 
            background: rgba(0, 0, 0, 0.5) !important; 
            border: 1px solid rgba(197, 160, 89, 0.3); 
            color: white !important; 
            border-radius: 12px;
        }

        h2, h4 { font-family: 'Cinzel', serif; letter-spacing: 2px; }
        .header-main { color: var(--dorado-ucmi); text-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }

        .table { color: white !important; --bs-table-bg: transparent !important; }
        .table thead th { color: var(--dorado-ucmi) !important; border-bottom: 2px solid var(--dorado-ucmi); font-family: 'Cinzel', serif; }
        .form-switch .form-check-input:checked { background-color: var(--dorado-ucmi); border-color: var(--dorado-ucmi); }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="wrapper">
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="sidebar-logo">
        
        <nav class="sidebar-nav">
            <a href="control-postulaciones.html" class="nav-item-ucmi">
                <i class="bi bi-person-badge"></i> SOLICITUDES
            </a>
            <a href="master-vigencia.html" class="nav-item-ucmi">
                <i class="bi bi-shield-check"></i> VIGENCIA
            </a>
            <a href="master-usuarios.html" class="nav-item-ucmi">
                <i class="bi bi-people"></i> USUARIOS
            </a>
            <a href="historial.html" class="nav-item-ucmi">
                <i class="bi bi-clock-history"></i> HISTORIAL
            </a>
            <a href="directorio.html" class="nav-item-ucmi">
                <i class="bi bi-journal-text"></i> DIRECTORIO
            </a>
            <a href="#" class="nav-item-ucmi active">
                <i class="bi bi-tags"></i> OFERTAS / MÓDULOS
            </a>
        </nav>

        <div class="mt-auto pt-4 border-top border-secondary">
            <a href="panel_maestro.html" class="btn-maestro">
                <i class="bi bi-cpu me-2"></i> PANEL MAESTRO
            </a>
            <a href="index.html" class="btn-cerrar">
                <i class="bi bi-power me-2"></i> CERRAR SESIÓN
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="container-fluid">
            <div class="text-center mb-5">
                <h2 class="header-main">GESTIÓN DE OFERTAS ACADÉMICAS</h2>
            </div>

            <div class="card-gestion">
                <h4 class="mb-4 text-warning"><i class="bi bi-plus-circle me-2"></i>Crear Nuevo Módulo</h4>
                <form id="formCrearModulo" class="row g-3 align-items-center">
                    <div class="col-md-9">
                        <input type="text" id="nombreModulo" class="form-control p-2" placeholder="Nombre del módulo u oferta..." required autocomplete="off">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn-maestro w-100 m-0">
                            GUARDAR
                        </button>
                    </div>
                </form>
            </div>

            <div class="card-gestion">
                <h4 class="text-warning mb-4"><i class="bi bi-archive me-2"></i>Inventario</h4>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th class="text-center">Ofertar</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaInventario">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

</body>
</html>
