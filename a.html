<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Control de Vigencia Temporal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --azul-sidebar: #1a2a3a;
            --purpura-neon: #bc13fe;
            --cian-tech: #00f2ff;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            margin: 0;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
        }

        .sidebar { 
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(10px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
        }

        .logo-sidebar { height: 50px; margin-bottom: 15px; }

        .btn-panel-principal {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            color: white !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.7rem;
            border-radius: 50px;
            padding: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-panel-principal:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white !important;
        }

        .btn-cerrar-sesion {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.4) !important;
            color: #ff4d4d !important;
            border-radius: 50px;
            padding: 12px;
            transition: all 0.3s ease;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .progress { background-color: rgba(255, 255, 255, 0.05); height: 8px; border-radius: 10px; overflow: visible; }
        .progress-bar-active { background: linear-gradient(90deg, var(--purpura-neon), var(--cian-tech)); box-shadow: 0 0 15px rgba(188, 19, 254, 0.5); }
        
        .status-tag { font-size: 0.65rem; padding: 4px 10px; border-radius: 4px; font-weight: bold; text-transform: uppercase; border: 1px solid transparent; }
        .tag-active { background: rgba(0, 255, 136, 0.1); color: #00ff88; border-color: #00ff88; }
        .tag-expiring { background: rgba(255, 0, 85, 0.1); color: #ff0055; border-color: #ff0055; }
        .tag-expired { background: rgba(255, 255, 255, 0.1); color: #ffffff; border-color: #ffffff; }

        .text-glow-purple { color: #d880ff; text-shadow: 0 0 15px rgba(188, 19, 254, 0.6); }
        .id-badge { font-family: monospace; color: var(--cian-tech); background: rgba(0, 242, 255, 0.1); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="logo-sidebar" alt="Logo">
                    <h5 class="fw-bold text-white small">UCMI ADMIN</h5>
                </div>
                <hr class="border-secondary opacity-25">
                
                <nav class="nav flex-column mb-auto">
                    <p class="small text-uppercase fw-bold text-muted mb-3">Navegación</p>
                    <a class="nav-link text-white-50 mb-2" href="master-postulaciones.html"><i class="bi bi-person-badge me-2"></i> Solicitudes</a>
                    <a class="nav-link text-white mb-2 active" href="#"><i class="bi bi-clock-history me-2 text-glow-purple"></i> Vigencia</a>
                    <a class="nav-link text-white-50 mb-2" href="master-usuarios.html"><i class="bi bi-people me-2"></i> Usuarios</a>
                </nav>

                <div class="mt-4 pt-4 border-top border-secondary border-opacity-25">
                    <a href="super-admin.html" class="btn-panel-principal">
                        <i class="bi bi-grid-3x3-gap-fill me-2"></i> Panel Maestro
                    </a>
                    <button id="btnLogoutSidebar" class="btn btn-cerrar-sesion">
                        <i class="bi bi-box-arrow-right me-2"></i> Salir
                    </button>
                </div>
            </div>

            <div class="col-md-10 p-4">
                <div class="row align-items-center mb-5">
                    <div class="col-md-7">
                        <h2 class="fw-bold text-uppercase"><i class="bi bi-shield-check me-3 text-glow-purple"></i>Vigencia de Licencias</h2>
                        <p class="text-white-50">Sincronización cronométrica de accesos bajo el Protocolo Supralógico.</p>
                    </div>
                </div>

                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table table-borderless align-middle text-white">
                            <thead class="border-bottom border-secondary">
                                <tr class="text-glow-purple small fw-bold text-uppercase">
                                    <th>Usuario / Identificador</th>
                                    <th>Activación</th>
                                    <th style="width: 25%;">Cronología (Consumo)</th>
                                    <th>Remanente</th>
                                    <th class="text-end">Operaciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaVigencia">
                                </tbody>
                        </table>
                    </div>
                </div>

                <footer class="mt-5 text-center text-white-25 small">
                    UCMI — Unidad de Control de Mando Integral © 2026
                </footer>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const MI_UID_MAESTRO = "m56REyF19sOsC6BE5sJdJG6eR863";

    // --- PROTECCIÓN DE RUTA ---
    onAuthStateChanged(auth, (user) => {
        if (!user || user.uid !== MI_UID_MAESTRO) { window.location.href = "index.html"; }
    });

    // --- RENDERIZADO EN TIEMPO REAL ---
    const tabla = document.getElementById('tablaVigencia');

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        tabla.innerHTML = '';
        
        snapshot.forEach((d) => {
            const data = d.data();
            const id = d.id;

            // Lógica de Tiempos
            const ahora = new Date().getTime();
            const inicio = new Date(data.fechaActivacion).getTime();
            const fin = data.expiracionTimestamp; 
            
            const total = fin - inicio;
            const transcurrido = ahora - inicio;
            
            let porcentaje = Math.floor((transcurrido / total) * 100);
            porcentaje = Math.min(Math.max(porcentaje, 0), 100);

            const msecDia = 1000 * 60 * 60 * 24;
            const diasRestantes = Math.ceil((fin - ahora) / msecDia);
            
            // UI Dinámica
            let statusClass = 'tag-active';
            let barClass = 'progress-bar-active';
            let icon = 'bi-person-check text-glow-purple';
            let labelRemanente = `${diasRestantes} Días`;

            if (porcentaje >= 90) {
                statusClass = 'tag-expiring';
                barClass = 'bg-danger shadow-sm';
                icon = 'bi-exclamation-triangle text-danger';
            }
            if (diasRestantes <= 0) {
                statusClass = 'tag-expired';
                labelRemanente = "Expirado";
                porcentaje = 100;
            }

            tabla.innerHTML += `
                <tr class="border-bottom border-white border-opacity-10">
                    <td class="py-4">
                        <div class="d-flex align-items-center">
                            <i class="bi ${icon} fs-4 me-3"></i>
                            <div>
                                <span class="fw-bold d-block text-white">${data.nombreResponsable || data.entidad}</span>
                                <span class="id-badge">${data.email}</span>
                            </div>
                        </div>
                    </td>
                    <td><small class="text-white-50">${new Date(data.fechaActivacion).toLocaleDateString()}</small></td>
                    <td>
                        <div class="progress mb-1">
                            <div class="progress-bar ${barClass}" style="width: ${porcentaje}%;"></div>
                        </div>
                        <small style="font-size: 0.65rem;" class="text-white-50">CONSUMO: ${porcentaje}%</small>
                    </td>
                    <td><span class="status-tag ${statusClass}">${labelRemanente}</span></td>
                    <td class="text-end">
                        <button onclick="revocar('${id}')" class="btn btn-sm btn-outline-danger border-opacity-25 rounded-pill px-3">Revocar</button>
                    </td>
                </tr>
            `;
        });
    });

    // --- ACCIÓN REVOCAR ---
    window.revocar = async (email) => {
        const result = await Swal.fire({
            title: '¿Revocar Acceso?',
            text: `Se eliminarán los permisos para ${email}`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'Sí, revocar'
        });

        if (result.isConfirmed) {
            try {
                await deleteDoc(doc(db, "usuarios", email));
                Swal.fire('Eliminado', 'El acceso ha sido revocado.', 'success');
            } catch (e) {
                Swal.fire('Error', e.message, 'error');
            }
        }
    };

    // --- LOGOUT ---
    document.getElementById('btnLogoutSidebar').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });
</script>
</body>
</html>
