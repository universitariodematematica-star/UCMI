<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Directorio Maestro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --azul-bg: #06090f;
            --glass: rgba(255, 255, 255, 0.03);
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white;
            margin: 0;
        }

        .super-overlay { background: rgba(6, 9, 15, 0.92); min-height: 100vh; padding-bottom: 50px; }

        /* Barra de Navegación Superior */
        .nav-ucmi {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-btn {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .nav-btn:hover {
            color: var(--dorado-ucmi);
            background: rgba(197, 160, 89, 0.1);
            border-color: rgba(197, 160, 89, 0.4);
        }

        .nav-btn.active {
            color: white;
            background: var(--dorado-ucmi);
            border-color: var(--dorado-ucmi);
        }

        /* Contenedor de Lista */
        .list-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .table { --bs-table-bg: transparent; --bs-table-color: white; border-color: rgba(255, 255, 255, 0.05); }
        .table thead th {
            color: var(--dorado-ucmi);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            padding: 15px;
            border-bottom: 2px solid rgba(197, 160, 89, 0.2);
        }

        .search-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50px;
            padding: 10px 25px;
        }

        .search-box:focus { background: rgba(255, 255, 255, 0.12); color: white; border-color: var(--dorado-ucmi); box-shadow: none; }

        .badge-status {
            font-size: 0.6rem; padding: 4px 10px; border-radius: 5px; font-weight: bold;
        }
        .status-ACEPTADO { color: #2ecc71; border: 1px solid #27ae60; background: rgba(39, 174, 96, 0.1); }
        .status-RECHAZADO { color: #e74c3c; border: 1px solid #e74c3c; background: rgba(231, 76, 60, 0.1); }

        .contact-link { color: white; text-decoration: none; transition: 0.2s; }
        .contact-link:hover { color: var(--dorado-ucmi); }
    </style>
</head>
<body>

<div class="super-overlay">
    
    <nav class="nav-ucmi">
        <div class="container-fluid d-flex justify-content-between align-items-center px-5">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="UCMI" style="height: 40px;">
            <div class="d-flex gap-2">
                <a href="master-postulaciones.html" class="nav-btn">SOLICITUDES</a>
                <a href="master-vigencia.html" class="nav-btn">VIGENCIA</a>
                <a href="master-usuarios.html" class="nav-btn">USUARIOS</a>
                <a href="master-usuarios.html" class="nav-btn">HISTORIAL</a>
                <a href="directorio.html" class="nav-btn active">DIRECTORIO</a>
                <a href="ofertas-academicas.html" class="nav-btn text-warning">OFERTAS</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-5">
        
        <div class="d-flex justify-content-between align-items-center mt-5 mb-4">
            <div>
                <h2 class="fw-bold mb-0">Directorio de Contactos</h2>
                <p class="text-muted small">Registros históricos ordenados alfabéticamente</p>
            </div>
            <div style="min-width: 400px;">
                <input type="text" id="inputBusqueda" class="form-control search-box" placeholder="Buscar institución, nombre o correo...">
            </div>
        </div>

        <div class="list-container">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Entidad / Institución</th>
                            <th>Responsable</th>
                            <th>Perfil</th>
                            <th>WhatsApp</th>
                            <th>Email</th>
                            <th class="text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let registrosMaster = [];

    function limpiarNumero(num) {
        if(!num) return "";
        return num.replace(/\D/g, ''); 
    }

    onSnapshot(collection(db, "historial_postulaciones"), (snapshot) => {
        registrosMaster = snapshot.docs.map(doc => doc.data());
        
        registrosMaster.sort((a, b) => {
            const nA = (a.entidad && a.entidad !== "N/A" ? a.entidad : a.nombreResponsable || "").toLowerCase();
            const nB = (b.entidad && b.entidad !== "N/A" ? b.entidad : b.nombreResponsable || "").toLowerCase();
            return nA.localeCompare(nB);
        });

        renderizar(registrosMaster);
    });

    function renderizar(lista) {
        const tbody = document.getElementById('tablaCuerpo');
        tbody.innerHTML = '';

        lista.forEach(reg => {
            const entidad = reg.entidad && reg.entidad !== "N/A" ? reg.entidad : '<span class="opacity-25 italic">Personal</span>';
            const responsable = reg.nombreResponsable || "---";
            const numLimpio = limpiarNumero(reg.whatsapp);
            const status = reg.decisionFinal || "PROCESADO";

            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold">${entidad}</td>
                    <td>${responsable}</td>
                    <td><span class="small text-warning">${reg.perfil || reg.tipoSolicitante || 'Estudiante'}</span></td>
                    <td>
                        <a href="https://wa.me/${numLimpio}" target="_blank" class="contact-link">
                            <i class="bi bi-whatsapp text-success me-2"></i> ${reg.whatsapp || '---'}
                        </a>
                    </td>
                    <td>
                        <a href="mailto:${reg.email}" class="contact-link small">${reg.email}</a>
                    </td>
                    <td class="text-center">
                        <span class="badge-status status-${status}">${status}</span>
                    </td>
                </tr>
            `;
        });
    }

    document.getElementById('inputBusqueda').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = registrosMaster.filter(r => 
            (r.entidad && r.entidad.toLowerCase().includes(term)) ||
            (r.nombreResponsable && r.nombreResponsable.toLowerCase().includes(term)) ||
            r.email.toLowerCase().includes(term)
        );
        renderizar(filtrados);
    });
</script>

</body>
</html>
