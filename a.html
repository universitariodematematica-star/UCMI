<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --azul-oscuro: #06090f; 
            --cristal-oscuro: rgba(0, 0, 0, 0.4);
            --cristal-claro: rgba(255, 255, 255, 0.05);
            --sidebar-width: 280px;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(6, 9, 15, 0.7) 0%, rgba(6, 9, 15, 0.9) 100%);
            z-index: -1;
        }

        /* --- LAYOUT PRINCIPAL --- */
        .wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- BARRA LATERAL (SIDEBAR) --- */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(197, 160, 89, 0.2);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 10;
        }

        .sidebar-logo {
            width: 120px;
            margin: 0 auto 40px;
            display: block;
        }

        .sidebar-nav {
            flex-grow: 1;
        }

        .nav-item-ucmi {
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            transition: 0.3s;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .nav-item-ucmi i { margin-right: 15px; font-size: 1.1rem; }

        .nav-item-ucmi:hover, .nav-item-ucmi.active {
            background: rgba(197, 160, 89, 0.1);
            color: var(--dorado-ucmi);
            border-color: rgba(197, 160, 89, 0.3);
        }

        /* --- ÁREA DE CONTENIDO --- */
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            background: transparent;
        }

        /* --- ESTILOS DE TUS BOTONES --- */
        .btn-maestro {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            color: white !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            border-radius: 50px;
            padding: 12px 25px;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-maestro:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffffff !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn-cerrar {
            background: transparent;
            border: 1px solid rgba(231, 76, 60, 0.4) !important;
            color: rgba(231, 76, 60, 0.9) !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            border-radius: 50px;
            padding: 8px 18px;
            transition: all 0.3s ease-in-out;
            text-decoration: none;
            text-align: center;
        }

        .btn-cerrar:hover {
            background: rgba(231, 76, 60, 0.1);
            border-color: #e74c3c !important;
            color: white !important;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
        }

        /* --- CONTENEDORES TRASLÚCIDOS --- */
        .card-gestion { 
            background: var(--cristal-claro); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            border-radius: 25px; 
            padding: 30px; 
            margin-bottom: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .form-control { 
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(197, 160, 89, 0.3); 
            color: white !important; 
            border-radius: 12px;
        }

        h2, h4 { font-family: 'Cinzel', serif; letter-spacing: 2px; }
        .header-main { color: var(--dorado-ucmi); text-shadow: 0 0 15px rgba(197, 160, 89, 0.3); font-weight: 700; }

        .table { color: white !important; --bs-table-bg: transparent !important; vertical-align: middle; }
        .table thead th { color: var(--dorado-ucmi) !important; border-bottom: 2px solid var(--dorado-ucmi); font-family: 'Cinzel', serif; text-transform: uppercase; }
        .form-switch .form-check-input:checked { background-color: var(--dorado-ucmi); border-color: var(--dorado-ucmi); }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="wrapper">
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="sidebar-logo">
        
        <nav class="sidebar-nav">
            <a href="panel_maestro.html" class="nav-item-ucmi">
                <i class="bi bi-cpu"></i> PANEL MAESTRO
            </a>
            <a href="control-postulaciones.html" class="nav-item-ucmi">
                <i class="bi bi-person-badge"></i> SOLICITUDES
            </a>
            <a href="#" class="nav-item-ucmi active">
                <i class="bi bi-layers"></i> GESTIÓN MÓDULOS
            </a>
            <a href="master-vigencia.html" class="nav-item-ucmi">
                <i class="bi bi-shield-check"></i> VIGENCIA
            </a>
        </nav>

        <a href="index.html" class="btn-cerrar mt-4">
            <i class="bi bi-box-arrow-right me-2"></i> CERRAR SESIÓN
        </a>
    </aside>

    <main class="main-content">
        <div class="container-fluid">
            <div class="text-center mb-5">
                <h2 class="header-main">CONTROL DE MÓDULOS ACADÉMICOS</h2>
            </div>

            <div class="card-gestion">
                <h4 class="mb-4 text-warning"><i class="bi bi-plus-circle me-2"></i>Crear Nuevo Módulo</h4>
                <form id="formCrearModulo" class="row g-3 align-items-center">
                    <div class="col-md-8">
                        <input type="text" id="nombreModulo" class="form-control p-2" placeholder="Ej: Lógica Cuántica" required autocomplete="off">
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn-maestro w-100">
                            REGISTRAR MÓDULO
                        </button>
                    </div>
                </form>
            </div>

            <div class="card-gestion">
                <h4 class="text-warning mb-4"><i class="bi bi-archive me-2"></i>Inventario de Módulos</h4>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Nombre del Módulo</th>
                                <th class="text-center">Ofertar al Público</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaInventario">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('formCrearModulo').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const input = document.getElementById('nombreModulo');
        try {
            await addDoc(collection(db, "ofertas"), {
                modulo: input.value,
                ofertado: false,
                fechaCreacion: new Date()
            });
            input.value = "";
        } catch (err) { console.error(err); }
    });

    onSnapshot(query(collection(db, "ofertas"), orderBy("modulo", "asc")), (snap) => {
        const lista = document.getElementById('listaInventario');
        lista.innerHTML = "";
        snap.forEach(docSnap => {
            const mod = docSnap.data();
            const id = docSnap.id;
            lista.innerHTML += `
                <tr>
                    <td class="fw-bold text-white">${mod.modulo}</td>
                    <td class="text-center">
                        <div class="form-check form-switch d-inline-block">
                            <input class="form-check-input toggle-oferta" type="checkbox" 
                                data-id="${id}" ${mod.ofertado ? 'checked' : ''}>
                        </div>
                    </td>
                    <td class="text-center">
                        <button class="btn-cerrar" style="font-size: 0.6rem; padding: 5px 12px;" onclick="eliminarModulo('${id}')">
                            <i class="bi bi-trash3"></i> BORRAR
                        </button>
                    </td>
                </tr>
            `;
        });

        document.querySelectorAll('.toggle-oferta').forEach(sw => {
            sw.onclick = async (e) => {
                const docId = e.target.getAttribute('data-id');
                await updateDoc(doc(db, "ofertas", docId), { ofertado: e.target.checked });
            };
        });
    });

    window.eliminarModulo = async (id) => {
        if(confirm("¿Eliminar módulo?")) await deleteDoc(doc(db, "ofertas", id));
    };
</script>
</body>
</html>
