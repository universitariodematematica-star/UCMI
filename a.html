<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --azul-sidebar: #1a2a3a;
            --cristal-claro: rgba(255, 255, 255, 0.05);
        }

        body, html { 
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden; /* Evita doble scroll */
        }

        /* FONDO GENERAL */
        .main-wrapper {
            display: flex;
            height: 100vh;
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
        }

        .super-overlay {
            display: flex;
            width: 100%;
            background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.85) 100%);
        }

        /* --- SIDEBAR CORREGIDO (260px fijo) --- */
        .sidebar { 
            width: 260px;
            min-width: 260px;
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(20px); 
            height: 100vh; 
            padding: 30px 20px; 
            border-right: 1px solid rgba(197, 160, 89, 0.2); 
            display: flex; 
            flex-direction: column;
        }

        .logo-sidebar { height: 50px; object-fit: contain; }
        
        .nav-link { 
            color: rgba(255,255,255,0.6); 
            transition: 0.3s; 
            margin-bottom: 5px; 
            text-decoration: none; 
            padding: 10px 15px; 
            display: flex;
            align-items: center;
            border-radius: 10px;
            font-size: 0.85rem;
        }
        .nav-link i { font-size: 1.1rem; margin-right: 12px; }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-link.active { 
            color: var(--dorado-ucmi); 
            background: rgba(197, 160, 89, 0.1); 
            font-weight: 600;
        }

        /* BOTONES DEL SIDEBAR MÁS ESTILIZADOS */
        .btn-sidebar-action {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: rgba(255,255,255,0.8) !important;
            font-size: 0.7rem;
            letter-spacing: 1px;
            border-radius: 8px;
            padding: 8px;
            text-decoration: none;
            text-align: center;
            display: block;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .btn-sidebar-action:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white !important;
            border-color: white !important;
        }

        .btn-logout-sidebar {
            border-color: rgba(231, 76, 60, 0.3) !important;
            color: #e74c3c !important;
        }

        /* --- ÁREA DE CONTENIDO (Autoajustable) --- */
        .content-area { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 40px; 
        }

        .card-ucmi { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 25px; 
        }

        .header-title { 
            font-family: 'Cinzel', serif; 
            color: var(--dorado-ucmi); 
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 40px;
        }

        /* INPUTS */
        .form-control { 
            background: rgba(0, 0, 0, 0.3) !important; 
            border: 1px solid rgba(197, 160, 89, 0.3); 
            color: white !important; 
            border-radius: 10px;
        }

        .btn-gold {
            background: var(--dorado-ucmi);
            color: black !important;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            padding: 10px 25px;
            transition: 0.3s;
        }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }

        .table { color: white !important; vertical-align: middle; }
        .table thead th { color: var(--dorado-ucmi); border-bottom: 1px solid var(--dorado-ucmi); font-size: 0.75rem; text-transform: uppercase; }
        
        .btn-delete {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.4);
            color: #e74c3c;
            border-radius: 8px;
            padding: 5px 10px;
            transition: 0.3s;
        }
        .btn-delete:hover { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="super-overlay">
        
        <aside class="sidebar">
            <div class="text-center mb-5">
                <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="logo-sidebar">
                <p class="small mt-2" style="color: var(--dorado-ucmi); letter-spacing: 2px;">SISTEMA ADMIN</p>
            </div>

            <nav class="flex-column mb-auto">
                <a class="nav-link" href="control-postulaciones.html"><i class="bi bi-person-badge"></i> Solicitudes</a>
                <a class="nav-link active" href="#"><i class="bi bi-layers"></i> Módulos</a>
                <a class="nav-link" href="master-vigencia.html"><i class="bi bi-shield-check"></i> Vigencia</a>
                <a class="nav-link" href="master-usuarios.html"><i class="bi bi-people"></i> Usuarios</a>
            </nav>

            <div class="mt-4 pt-4 border-top border-secondary">
                <a href="panel_maestro.html" class="btn-sidebar-action">
                    <i class="bi bi-house-door me-2"></i> PANEL MAESTRO
                </a>
                <a href="index.html" class="btn-sidebar-action btn-logout-sidebar">
                    <i class="bi bi-power me-2"></i> CERRAR SESIÓN
                </a>
            </div>
        </aside>

        <main class="content-area">
            <h2 class="header-title">GESTIÓN DE MÓDULOS</h2>

            <div class="card-ucmi">
                <h5 class="mb-4 text-warning small fw-bold text-uppercase"><i class="bi bi-plus-lg me-2"></i>Registrar Nuevo Módulo</h5>
                <form id="formCrearModulo" class="row g-3">
                    <div class="col-md-9">
                        <input type="text" id="nombreModulo" class="form-control" placeholder="Nombre del módulo..." required autocomplete="off">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn-gold w-100">GUARDAR</button>
                    </div>
                </form>
            </div>

            <div class="card-ucmi">
                <h5 class="mb-4 text-warning small fw-bold text-uppercase"><i class="bi bi-list-stars me-2"></i>Inventario de Módulos</h5>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Nombre del Módulo</th>
                                <th class="text-center">Oferta</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaInventario"></tbody>
                    </table>
                </div>
            </div>
        </main>

    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('formCrearModulo').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const input = document.getElementById('nombreModulo');
        try {
            await addDoc(collection(db, "ofertas"), {
                modulo: input.value,
                ofertado: false,
                fechaCreacion: new Date()
            });
            input.value = "";
        } catch (err) { console.error(err); }
    });

    onSnapshot(query(collection(db, "ofertas"), orderBy("modulo", "asc")), (snap) => {
        const lista = document.getElementById('listaInventario');
        lista.innerHTML = "";
        snap.forEach(docSnap => {
            const mod = docSnap.data();
            const id = docSnap.id;
            lista.innerHTML += `
                <tr>
                    <td class="fw-bold text-white-50">${mod.modulo}</td>
                    <td class="text-center">
                        <div class="form-check form-switch d-inline-block">
                            <input class="form-check-input toggle-oferta" type="checkbox" 
                                data-id="${id}" ${mod.ofertado ? 'checked' : ''}>
                        </div>
                    </td>
                    <td class="text-center">
                        <button class="btn-delete" onclick="eliminarModulo('${id}')">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        
        document.querySelectorAll('.toggle-oferta').forEach(sw => {
            sw.onchange = async (e) => {
                await updateDoc(doc(db, "ofertas", e.target.dataset.id), { ofertado: e.target.checked });
            };
        });
    });

    window.eliminarModulo = async (id) => {
        if(confirm("¿Eliminar este módulo?")) await deleteDoc(doc(db, "ofertas", id));
    };
</script>
</body>
</html>
