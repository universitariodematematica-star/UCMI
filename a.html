<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos y Ramas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .modal-content { border: 2px solid #ffc107; }
        .btn-accion { padding: 0.1rem 0.4rem; font-size: 0.7rem; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="mb-4">Mis Módulos Creados</h2>
        <table class="table table-dark table-striped">
            <thead><tr><th>Módulo</th><th>Acciones</th></tr></thead>
            <tbody id="tablaModulos"></tbody>
        </table>
    </div>

    <div class="modal fade" id="modalRamas" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">Gestionar ramas</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="inputNombreRama" class="form-control" placeholder="Nombre de la rama">
                    <button id="btnGuardar" class="btn btn-warning w-100 mt-3">CREAR RAMA</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, where, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const db = getFirestore(initializeApp({ /* Tu Configuración aquí */ }));
        const auth = getAuth();
        let idModuloSeleccionado = "";
        const modal = new bootstrap.Modal(document.getElementById("modalRamas"));

        // Renderizado de Módulos
        const q = query(collection(db, "ofertas"), orderBy("modulo", "asc"));
        onSnapshot(q, (snapshot) => {
            const tabla = document.getElementById("tablaModulos");
            tabla.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const datos = docSnap.data();
                const idContenedor = `ramas-${docSnap.id}`;
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>
                        <div class="fw-bold fs-5">${datos.modulo}</div>
                        <ul id="${idContenedor}" class="list-unstyled text-secondary mt-2 ps-3"></ul>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-warning btn-gestionar" data-id="${docSnap.id}" data-nombre="${datos.modulo}">Gestionar</button>
                    </td>
                `;
                tabla.appendChild(tr);

                // Escucha de ramas
                const qRamas = query(collection(db, "ramas"), where("moduloId", "==", docSnap.id));
                onSnapshot(qRamas, (snapRamas) => {
                    const lista = document.getElementById(idContenedor);
                    lista.innerHTML = "";
                    snapRamas.docs.sort((a,b) => a.data().nombre.localeCompare(b.data().nombre)).forEach(r => {
                        const li = document.createElement("li");
                        li.innerHTML = `
                            • ${r.data().nombre} 
                            <button class="btn btn-outline-info btn-accion btn-editar" data-id="${r.id}" data-nombre="${r.data().nombre}">Edit</button>
                            <button class="btn btn-outline-danger btn-accion btn-borrar" data-id="${r.id}">Del</button>
                        `;
                        lista.appendChild(li);
                    });
                });
            });
        });

        // Lógica de Edición y Borrado
        document.addEventListener("click", async (e) => {
            // BORRAR
            if (e.target.classList.contains("btn-borrar")) {
                if (confirm("¿Eliminar esta rama?")) {
                    await deleteDoc(doc(db, "ramas", e.target.dataset.id));
                }
            }
            // EDITAR
            if (e.target.classList.contains("btn-editar")) {
                const nuevoNombre = prompt("Editar nombre de rama:", e.target.dataset.nombre);
                if (nuevoNombre && nuevoNombre.trim() !== "") {
                    await updateDoc(doc(db, "ramas", e.target.dataset.id), { nombre: nuevoNombre });
                }
            }
        });

        // Botón Guardar en Modal
        document.getElementById("btnGuardar").addEventListener("click", async () => {
            const input = document.getElementById("inputNombreRama");
            if (input.value.trim()) {
                await addDoc(collection(db, "ramas"), { nombre: input.value.trim(), moduloId: idModuloSeleccionado, fechaCreacion: new Date() });
                input.value = "";
                modal.hide();
            }
        });
    </script>
</body>
</html>
