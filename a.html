<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Módulos y Ramas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">

    <div class="container">
        <h2 class="mb-4">Mis Módulos Creados</h2>
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Nombre del Módulo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaModulos"></tbody>
        </table>
    </div>

    <div class="modal fade" id="modalRamas" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white border-warning">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">Gestionar Ramas</h5>
                </div>
                <div class="modal-body">
                    <input type="text" id="inputNombreRama" class="form-control" placeholder="Nombre de la nueva rama...">
                    <button id="btnGuardar" class="btn btn-warning w-100 mt-3">CREAR RAMA</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
            authDomain: "ucmi-13796634.firebaseapp.com",
            projectId: "ucmi-13796634",
            storageBucket: "ucmi-13796634.firebasestorage.app",
            messagingSenderId: "1090719609536",
            appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let idModuloSeleccionado = "";
        const modalElement = document.getElementById('modalRamas');
        const modal = new bootstrap.Modal(modalElement);

        // Diagnóstico de Identidad
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("UID detectado:", user.uid);
                if (user.uid === "x0oBFbDP09d7I3VZvWuN6BOODf32") {
                    console.log("✅ Acceso como SuperAdmin confirmado.");
                } else {
                    console.warn("⚠️ UID no coincide con SuperAdmin.");
                }
            }
        });

        // Cargar Módulos
        const q = query(collection(db, "ofertas"), orderBy("modulo", "asc"));
        onSnapshot(q, (snapshot) => {
            const tabla = document.getElementById('tablaModulos');
            tabla.innerHTML = ""; 
            snapshot.forEach((doc) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${doc.data().modulo}</td><td><button class="btn btn-sm btn-outline-warning btn-gestionar" data-id="${doc.id}" data-nombre="${doc.data().modulo}">Gestionar</button></td>`;
                tabla.appendChild(tr);
            });
        });

        // Eventos
        document.getElementById('tablaModulos').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-gestionar')) {
                idModuloSeleccionado = e.target.getAttribute('data-id');
                document.getElementById('tituloModal').innerText = "Ramas de: " + e.target.getAttribute('data-nombre');
                modal.show();
            }
        });

        document.getElementById('btnGuardar').addEventListener('click', async () => {
            const nombre = document.getElementById('inputNombreRama').value;
            if (!nombre) return alert("Escribe un nombre");

try {

    console.log("=== DIAGNÓSTICO FIREBASE ===");
    console.log("Usuario actual:", auth.currentUser);
    console.log("UID:", auth.currentUser?.uid);
    console.log("Email:", auth.currentUser?.email);
    console.log("Módulo seleccionado:", idModuloSeleccionado);
    console.log("Nombre rama:", nombre);

    await addDoc(collection(db, "ramas"), {
        nombre: nombre,
        moduloId: idModuloSeleccionado
    });

    alert("¡Rama creada con éxito!");

    document.getElementById('inputNombreRama').value = "";

    modal.hide();

} catch (error) {

    console.error("=== ERROR FIRESTORE ===");
    console.error("Código:", error.code);
    console.error("Mensaje:", error.message);
    console.error("Objeto completo:", error);

    alert(
        "Error Firestore\n\n" +
        "Código: " + error.code + "\n\n" +
        "Mensaje: " + error.message
    );
}
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
