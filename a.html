<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --azul-ucmi: #1a2a3a; 
            --dorado-ucmi: #c5a059; 
            --rojo-error: #ff4d4d;
            --blanco-suave: rgba(255, 255, 255, 0.9);
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px 0; 
            color: white;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%);
            z-index: -1;
        }

        .card-form { 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px);
            max-width: 850px; 
            margin: auto; 
            overflow: hidden; 
        }

        .header-institucional {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .inst-logo { height: 120px; filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.2)); margin-bottom: 20px; }
        .inst-nombre { font-family: 'Cinzel', serif; color: #f3f0df; font-size: 1.2rem; letter-spacing: 5px; text-transform: uppercase; }
        .inst-titulo { color: var(--dorado-ucmi); font-weight: 800; font-size: 2.5rem; }
        .linea-decorativa { width: 70px; height: 4px; background: var(--dorado-ucmi); margin: 25px auto; border-radius: 2px; }

        .form-control, .form-select { 
            border-radius: 12px; padding: 14px; border: 1px solid rgba(255, 255, 255, 0.2); 
            background: rgba(255, 255, 255, 0.08); color: white; 
        }
        .form-control:focus, .form-select:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--dorado-ucmi); color: white; }
        select option { background: #1a1a1a; color: white; }

        .seccion-dinamica { display: none; animation: slideIn 0.4s ease-out; background: rgba(0, 0, 0, 0.2); padding: 25px; border-radius: 15px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 15px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .program-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 12px; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 18px; border-radius: 15px; border: none; width: 100%; margin-top: 25px; }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo UCMI" class="inst-logo">
            <div class="inst-nombre">Universitario de Ciencias Matemáticas e Idiomas</div>
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
            <div class="linea-decorativa"></div>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-4" novalidate>
            <div class="mb-4">
                <label class="form-label fw-bold text-warning">Tipo de Postulante:</label>
                <select class="form-select form-select-lg" id="perfilPrincipal" required onchange="gestionarFlujo()">
                    <option value="" selected disabled>Seleccione su perfil...</option>
                    <option value="Academia">Academia / Institución</option>
                    <option value="Independiente">Profesor Independiente</option>
                    <option value="Estudiante autodidacta">Estudiante Autodidacta</option>
                </select>
            </div>

            <div id="subSeccionProfesor" class="seccion-dinamica mb-4">
                <label class="form-label fw-bold text-warning">Modalidad de Profesor:</label>
                <select class="form-select" id="subTipoProfesor">
                    <option value="Profesor asociado" selected>Profesor Asociado (Gestión de Cupos)</option>
                    <option value="Profesor embajador">Profesor Embajador (Marca Blanca)</option>
                </select>
            </div>

            <div id="cuerpoFormulario" style="display: none;">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label small">Nombre Completo:</label><input type="text" id="nombreInput" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label small">Correo:</label><input type="email" id="emailInput" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label small">WhatsApp:</label><input type="text" id="whatsappInput" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label small">Ciudad y País:</label><input type="text" id="ubicacionInput" class="form-control" required></div>
                </div>

                <div id="camposAcademia" class="seccion-dinamica">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label small" id="labelEntidad">Institución:</label><input type="text" id="entidadInput" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label small">RIF/DNI:</label><input type="text" id="rifInput" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label small">Cupos:</label><input type="number" id="cuposInput" class="form-control"></div>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="form-label fw-bold text-uppercase small text-white-50">Programas Académicos</label>
                    <div class="program-grid mb-3" id="gridProgramas">
                        <div class="text-center w-100 py-3"><div class="spinner-border spinner-border-sm text-warning"></div></div>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold small">Duración Licencia (Meses):</label>
                    <input type="number" id="mesesInput" class="form-control" required min="1">
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR POSTULACIÓN OFICIAL</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- CARGA DINÁMICA DE MÓDULOS ---
    async function cargarOfertas() {
        const grid = document.getElementById('gridProgramas');
        try {
            const q = query(collection(db, "ofertas"), orderBy("modulo", "asc"));
            const snap = await getDocs(q);
            grid.innerHTML = "";
            snap.forEach(doc => {
                const mod = doc.data().modulo;
                grid.innerHTML += `<div class="form-check"><input class="form-check-input prog-check" type="checkbox" value="${mod}" id="${doc.id}"><label class="form-check-label small" for="${doc.id}">${mod}</label></div>`;
            });
        } catch (e) { grid.innerHTML = "Error al cargar módulos."; }
    }
    cargarOfertas();

    // --- FLUJO DE INTERFAZ ---
    window.gestionarFlujo = () => {
        const p = document.getElementById('perfilPrincipal').value;
        const sub = document.getElementById('subTipoProfesor').value;
        document.getElementById('cuerpoFormulario').style.display = 'block';
        document.getElementById('subSeccionProfesor').style.display = (p === 'Independiente') ? 'block' : 'none';
        
        const acad = document.getElementById('camposAcademia');
        if (p === 'Academia' || p === 'Independiente') {
            acad.style.display = 'block';
            document.getElementById('cuposInput').parentElement.style.display = (p === 'Academia' || sub === 'Profesor asociado') ? 'block' : 'none';
        } else { acad.style.display = 'none'; }
    };
    document.getElementById('subTipoProfesor').onchange = window.gestionarFlujo;

    // --- ENVÍO ---
    document.getElementById('formUCMI').onsubmit = async (e) => {
        e.preventDefault();
        const checks = document.querySelectorAll('.prog-check:checked');
        if (checks.length === 0) return alert("Seleccione un programa.");

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "Procesando...";

        const datos = {
            nombreResponsable: document.getElementById('nombreInput').value,
            email: document.getElementById('emailInput').value,
            programas: Array.from(checks).map(c => c.value).join(", "),
            fecha: new Date().toLocaleString()
        };

        try {
            await addDoc(collection(db, "postulaciones"), datos);
            alert("¡Éxito!"); location.reload();
        } catch (err) { alert("Error"); btn.disabled = false; }
    };
</script>
</body>
</html>
