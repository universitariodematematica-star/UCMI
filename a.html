<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Módulos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">

    <div class="container">
        <h2 class="mb-4">Mis Módulos Creados</h2>
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Nombre del Módulo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaModulos">
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="modalRamas" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white border-warning">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">Gestionar Ramas</h5>
                </div>
                <div class="modal-body">
                    <input type="text" id="inputNombreRama" class="form-control" placeholder="Nombre de la nueva rama...">
                    <button class="btn btn-warning w-100 mt-3" onclick="guardarRama()">CREAR RAMA</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
            authDomain: "ucmi-13796634.firebaseapp.com",
            projectId: "ucmi-13796634",
            storageBucket: "ucmi-13796634.firebasestorage.app",
            messagingSenderId: "1090719609536",
            appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325",
            measurementId: "G-3M3DH25722"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let idModuloSeleccionado = "";

        // Lógica de carga de módulos
        const q = query(collection(db, "ofertas"), orderBy("modulo", "asc"));
        onSnapshot(q, (snapshot) => {
            const tabla = document.getElementById('tablaModulos');
            tabla.innerHTML = ""; 

            snapshot.forEach((doc) => {
                const data = doc.data();
                tabla.innerHTML += `
                    <tr>
                        <td>${data.modulo}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-warning" 
                                    onclick="abrirModal('${doc.id}', '${data.modulo}')">
                                Gestionar
                            </button>
                        </td>
                    </tr>
                `;
            });
        });

        // --- FUNCIONES DEL MODAL ---
        window.abrirModal = (id, nombre) => {
            idModuloSeleccionado = id;
            document.getElementById('tituloModal').innerText = "Ramas de: " + nombre;
            new bootstrap.Modal(document.getElementById('modalRamas')).show();
        };

        window.guardarRama = async () => {
            const nombre = document.getElementById('inputNombreRama').value;
            if (!nombre) return alert("Escribe un nombre para la rama");

            await addDoc(collection(db, "ramas"), {
                nombre: nombre,
                moduloId: idModuloSeleccionado // Vínculo creado
            });

            alert("Rama creada con éxito");
            document.getElementById('inputNombreRama').value = "";
            bootstrap.Modal.getInstance(document.getElementById('modalRamas')).hide();
        };
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
