<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --azul-oscuro: #06090f; 
            --azul-sidebar: #1a2a3a;
            --cristal-claro: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.8) 100%);
            min-height: 100vh;
            display: flex;
        }

        /* --- SIDEBAR ESTILO UCMI --- */
        .sidebar { 
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(15px); 
            min-height: 100vh; 
            padding: 30px 20px; 
            position: sticky; 
            top: 0; 
            border-right: 1px solid rgba(197, 160, 89, 0.3); 
            display: flex; 
            flex-direction: column;
            z-index: 1000;
        }

        .logo-sidebar { height: 60px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.2)); }
        
        .nav-link { 
            color: rgba(255,255,255,0.7); 
            transition: 0.3s; 
            margin-bottom: 8px; 
            text-decoration: none; 
            padding: 12px 15px; 
            display: flex;
            align-items: center;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .nav-link i { font-size: 1.1rem; margin-right: 12px; }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-link.active { 
            color: var(--dorado-ucmi); 
            font-weight: bold; 
            background: rgba(197, 160, 89, 0.1); 
            border-left: 3px solid var(--dorado-ucmi);
        }

        .btn-sidebar-action {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: white !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            border-radius: 50px;
            padding: 10px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            display: block;
            margin-bottom: 10px;
        }

        .btn-sidebar-action:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white !important;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .btn-logout {
            border-color: rgba(231, 76, 60, 0.4) !important;
            color: #e74c3c !important;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content { padding: 40px; width: 100%; }

        .card-gestion { 
            background: var(--cristal-claro); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            border-radius: 25px; 
            padding: 30px; 
            margin-bottom: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h2, h4 { font-family: 'Cinzel', serif; letter-spacing: 2px; }
        .header-main { color: var(--dorado-ucmi); text-shadow: 0 0 15px rgba(197, 160, 89, 0.3); font-weight: 700; }

        /* Estilo del Input corregido */
        .form-control { 
            background: rgba(0, 0, 0, 0.4) !important; 
            border: 1px solid rgba(197, 160, 89, 0.3); 
            color: white !important; 
            border-radius: 12px;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.6) !important;
            border-color: var(--dorado-ucmi) !important;
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        .table { color: white !important; --bs-table-bg: transparent !important; }
        .table thead th { color: var(--dorado-ucmi) !important; border-bottom: 2px solid var(--dorado-ucmi); font-family: 'Cinzel', serif; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid p-0">
        <div class="row g-0">
            <div class="col-md-2 sidebar">
                <div class="text-center mb-5">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" class="logo-sidebar">
                    <h6 class="fw-bold text-white mt-2" style="letter-spacing: 2px;">UCMI ADMIN</h6>
                </div>

                <nav class="nav flex-column mb-auto">
                    <a class="nav-link" href="control-postulaciones.html"><i class="bi bi-inbox"></i> Solicitudes</a>
                    <a class="nav-link active" href="#"><i class="bi bi-journal-bookmark"></i> Módulos</a>
                    <a class="nav-link" href="master-vigencia.html"><i class="bi bi-shield-check"></i> Vigencia</a>
                    <a class="nav-link" href="master-usuarios.html"><i class="bi bi-people"></i> Usuarios</a>
                </nav>

                <div class="mt-4 pt-4 border-top border-secondary">
                    <a href="panel_maestro.html" class="btn-sidebar-action">
                        <i class="bi bi-arrow-left me-2"></i> VOLVER
                    </a>
                    <a href="index.html" class="btn-sidebar-action btn-logout">
                        <i class="bi bi-box-arrow-right me-2"></i> SALIR
                    </a>
                </div>
            </div>

            <div class="col-md-10 main-content">
                <div class="text-center mb-5">
                    <h2 class="header-main">GESTIÓN DE MÓDULOS</h2>
                </div>

                <div class="card-gestion">
                    <h4 class="mb-4 text-warning"><i class="bi bi-plus-circle me-2"></i>Nuevo Registro</h4>
                    <form id="formCrearModulo" class="row g-3 align-items-center">
                        <div class="col-md-9">
                            <input type="text" id="nombreModulo" class="form-control p-2" placeholder="Nombre del módulo académico..." required autocomplete="off">
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn-sidebar-action w-100" style="background: var(--dorado-ucmi); border: none !important; color: black !important; font-weight: 800;">
                                GUARDAR
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-gestion">
                    <h4 class="text-warning mb-4"><i class="bi bi-archive me-2"></i>Inventario</h4>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Módulo</th>
                                    <th class="text-center">Oferta</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="listaInventario"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('formCrearModulo').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const input = document.getElementById('nombreModulo');
        try {
            await addDoc(collection(db, "ofertas"), {
                modulo: input.value,
                ofertado: false,
                fechaCreacion: new Date()
            });
            input.value = "";
        } catch (err) { console.error(err); }
    });

    onSnapshot(query(collection(db, "ofertas"), orderBy("modulo", "asc")), (snap) => {
        const lista = document.getElementById('listaInventario');
        lista.innerHTML = "";
        snap.forEach(docSnap => {
            const mod = docSnap.data();
            const id = docSnap.id;
            lista.innerHTML += `
                <tr>
                    <td class="fw-bold">${mod.modulo}</td>
                    <td class="text-center">
                        <div class="form-check form-switch d-inline-block">
                            <input class="form-check-input toggle-oferta" type="checkbox" 
                                data-id="${id}" ${mod.ofertado ? 'checked' : ''}>
                        </div>
                    </td>
                    <td class="text-center">
                        <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="eliminarModulo('${id}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        
        // Listener para los switches de oferta
        document.querySelectorAll('.toggle-oferta').forEach(sw => {
            sw.onchange = async (e) => {
                await updateDoc(doc(db, "ofertas", e.target.dataset.id), { ofertado: e.target.checked });
            };
        });
    });

    window.eliminarModulo = async (id) => {
        if(confirm("¿Eliminar módulo?")) await deleteDoc(doc(db, "ofertas", id));
    };
</script>
</body>
</html>
