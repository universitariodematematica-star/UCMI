<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Historial de Solicitudes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --dorado-neon: #ffcc66;
            --azul-sidebar: #1a2a3a;
            --cian-tech: #00f2ff;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(10px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
        }

        .nav-section-title {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px 10px;
        }

        .btn-sidebar-custom {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: rgba(255, 255, 255, 0.7) !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
            border-radius: 50px;
            padding: 10px 15px;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .btn-sidebar-custom:hover, .btn-sidebar-custom.active {
            border-color: var(--cian-tech) !important;
            color: var(--cian-tech) !important;
            background: rgba(0, 242, 255, 0.05);
        }

        .btn-cerrar-sesion {
            border-color: #ff4d4d !important;
            color: #ff4d4d !important;
        }

        /* --- PANEL CENTRAL --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 40px;
        }

        .table-historial {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        .table-historial tr {
            background: rgba(255, 255, 255, 0.03);
            transition: 0.3s;
            border-radius: 15px;
        }

        .table-historial td {
            padding: 20px;
            vertical-align: middle;
        }

        .neon-gold { color: var(--dorado-neon); font-weight: bold; }
        
        .date-chip {
            font-family: 'Courier New', monospace;
            background: rgba(0, 242, 255, 0.1);
            color: var(--cian-tech);
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .badge-licencia {
            background: rgba(197, 160, 89, 0.15);
            color: var(--dorado-ucmi);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 50px;" alt="Logo">
                    <p class="small mt-2 neon-gold">SISTEMA UCMI</p>
                </div>
                <nav class="nav flex-column mb-auto">
                    <p class="nav-section-title">Protocolos</p>
                    <a class="btn-sidebar-custom" href="master-postulaciones.html"><i class="bi bi-person-badge me-2"></i> Solicitudes</a>
                    <a class="btn-sidebar-custom active" href="historial-postulaciones.html"><i class="bi bi-archive me-2"></i> Historial</a>
                    
                    <p class="nav-section-title">Sistema</p>
                    <button id="btnLogoutSidebar" class="btn-sidebar-custom btn-cerrar-sesion">
                        <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                    </button>
                </nav>
            </div>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="col-md-10 p-5">
                <div class="d-flex justify-content-between align-items-end mb-5">
                    <div>
                        <h2 class="neon-gold text-uppercase mb-1" style="letter-spacing: 3px;">
                            <i class="bi bi-journal-text me-3"></i>Historial Maestro
                        </h2>
                        <p class="text-white-50 small">Registro histórico de solicitudes procesadas en Firebase.</p>
                    </div>
                    <div style="min-width: 400px;">
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-white-50"><i class="bi bi-search"></i></span>
                            <input type="text" id="busquedaHistorial" class="form-control bg-transparent text-white border-secondary" placeholder="Buscar por entidad, responsable o ubicación...">
                        </div>
                    </div>
                </div>

                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table-historial text-white">
                            <thead>
                                <tr class="text-white-50 small text-uppercase" style="letter-spacing: 1.5px;">
                                    <th class="ps-4 pb-3">Entidad / Responsable</th>
                                    <th class="pb-3">Ubicación</th>
                                    <th class="pb-3">Programas / Vigencia</th>
                                    <th class="pb-3 text-center">Fecha Solicitud</th>
                                    <th class="text-end pe-4 pb-3">Firebase ID</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCuerpo">
                                <!-- Datos inyectados -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let todasLasPostulaciones = [];

    // --- ESCUCHA EN TIEMPO REAL ---
    const q = query(collection(db, "postulaciones"), orderBy("fechaSolicitud", "desc"));

    onSnapshot(q, (snapshot) => {
        todasLasPostulaciones = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderizar(todasLasPostulaciones);
    });

    function renderizar(datos) {
        const tabla = document.getElementById('tablaCuerpo');
        tabla.innerHTML = '';

        if (datos.length === 0) {
            tabla.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-white-50">Sin registros encontrados.</td></tr>`;
            return;
        }

        datos.forEach(p => {
            // Formateo de Fecha
            const fecha = p.fechaSolicitud?.toDate ? 
                p.fechaSolicitud.toDate().toLocaleDateString('es-ES') : 
                (p.fechaSolicitud || 'N/A');

            tabla.innerHTML += `
                <tr>
                    <td class="ps-4">
                        <div class="neon-gold">${p.entidad || 'Entidad no registrada'}</div>
                        <div class="text-white-50 small"><i class="bi bi-person me-1"></i>${p.nombreResponsable || 'Sin nombre'}</div>
                    </td>
                    <td>
                        <div class="small"><i class="bi bi-geo-alt me-2 text-info"></i>${p.ubicacion || 'No definida'}</div>
                    </td>
                    <td>
                        <div class="small mb-1">${p.programas || 'General'}</div>
                        <span class="badge-licencia">${p.duracionLicencia || 'Pendiente'}</span>
                    </td>
                    <td class="text-center">
                        <span class="date-chip"><i class="bi bi-calendar3 me-2"></i>${fecha}</span>
                    </td>
                    <td class="text-end pe-4">
                        <code class="text-info small" style="background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px;">
                            ${p.id.substring(0, 10)}
                        </code>
                    </td>
                </tr>
            `;
        });
    }

    // --- BUSCADOR ---
    document.getElementById('busquedaHistorial').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = todasLasPostulaciones.filter(p => 
            p.entidad?.toLowerCase().includes(term) || 
            p.nombreResponsable?.toLowerCase().includes(term) ||
            p.ubicacion?.toLowerCase().includes(term)
        );
        renderizar(filtrados);
    });

    // --- LOGOUT ---
    document.getElementById('btnLogoutSidebar').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>
</body>
</html>
