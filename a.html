<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Directorio Maestro (Historial)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --azul-bg: #06090f;
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white;
            margin: 0;
        }

        .super-overlay { background: rgba(6, 9, 15, 0.9); min-height: 100vh; }

        .list-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: white;
            border-color: rgba(255, 255, 255, 0.05);
        }

        .table thead th {
            color: var(--dorado-ucmi);
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            border-bottom: 2px solid rgba(197, 160, 89, 0.3);
            padding: 15px;
        }

        .table tbody tr { transition: 0.2s; }
        .table tbody tr:hover { background: rgba(255, 255, 255, 0.05); }

        .table td { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }

        .search-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 12px;
            padding: 12px 20px;
        }

        .search-box:focus { 
            background: rgba(255, 255, 255, 0.12); 
            color: white; 
            border-color: var(--dorado-ucmi); 
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.2); 
        }

        .badge-status {
            font-size: 0.6rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-ACEPTADO { color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.4); background: rgba(46, 204, 113, 0.1); }
        .status-RECHAZADO { color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.4); background: rgba(231, 76, 60, 0.1); }

        .contact-link {
            color: white;
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
        }

        .contact-link:hover { color: var(--dorado-ucmi); }
        
        .text-personal { font-style: italic; color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid p-5">
        
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
            <div>
                <h1 class="h2 fw-bold mb-1">Directorio Maestro</h1>
                <p class="text-muted mb-0">Base de datos histórica de postulaciones procesadas</p>
            </div>
            <div class="d-flex gap-2">
                <div class="position-relative">
                    <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 opacity-50"></i>
                    <input type="text" id="inputBusqueda" class="form-control search-box ps-5" style="min-width: 300px;" placeholder="Buscar institución, nombre o email...">
                </div>
                <a href="super-admin.html" class="btn btn-outline-light rounded-3 px-4 d-flex align-items-center">
                    <i class="bi bi-arrow-left me-2"></i> Panel
                </a>
            </div>
        </div>

        <div class="list-container">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th style="width: 25%;">Entidad / Institución</th>
                            <th style="width: 20%;">Responsable</th>
                            <th style="width: 15%;">Perfil</th>
                            <th style="width: 15%;">WhatsApp</th>
                            <th style="width: 15%;">Email</th>
                            <th style="width: 10%;" class="text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo">
                        <tr>
                            <td colspan="6" class="text-center p-5">
                                <div class="spinner-border text-warning" role="status"></div>
                                <p class="mt-2 opacity-50">Cargando registros...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let registrosMaster = [];

    // --- FUNCIÓN DE LIMPIEZA DE NÚMEROS (Previene error 404 en WA) ---
    function limpiarNumero(num) {
        if(!num) return "";
        return num.replace(/\D/g, ''); 
    }

    // Escuchar cambios en historial_postulaciones
    onSnapshot(collection(db, "historial_postulaciones"), (snapshot) => {
        registrosMaster = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        // ORDEN ALFABÉTICO POR ENTIDAD (O RESPONSABLE SI NO HAY ENTIDAD)
        registrosMaster.sort((a, b) => {
            const nombreA = (a.entidad && a.entidad !== "N/A" ? a.entidad : a.nombreResponsable || "").toLowerCase();
            const nombreB = (b.entidad && b.entidad !== "N/A" ? b.entidad : b.nombreResponsable || "").toLowerCase();
            return nombreA.localeCompare(nombreB);
        });

        renderizar(registrosMaster);
    });

    function renderizar(lista) {
        const tbody = document.getElementById('tablaCuerpo');
        tbody.innerHTML = '';

        if(lista.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center opacity-50 p-5">No se encontraron registros en el historial.</td></tr>';
            return;
        }

        lista.forEach(reg => {
            const tieneEntidad = reg.entidad && reg.entidad !== "N/A";
            const entidadTexto = tieneEntidad ? reg.entidad : '<span class="text-personal">Individual / Personal</span>';
            const responsable = reg.nombreResponsable || "---";
            const perfil = reg.perfil || reg.tipoSolicitante || "Estudiante";
            const numLimpio = limpiarNumero(reg.whatsapp);
            const decision = reg.decisionFinal || "PROCESADO";

            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold text-white">${entidadTexto}</td>
                    <td>${responsable}</td>
                    <td><span class="small" style="color: var(--dorado-ucmi)">${perfil}</span></td>
                    <td>
                        <a href="https://wa.me/${numLimpio}" target="_blank" class="contact-link">
                            <i class="bi bi-whatsapp text-success me-2"></i> ${reg.whatsapp || '---'}
                        </a>
                    </td>
                    <td>
                        <a href="mailto:${reg.email}" class="contact-link small text-truncate d-block" style="max-width: 180px;">
                            ${reg.email}
                        </a>
                    </td>
                    <td class="text-center">
                        <span class="badge-status status-${decision}">${decision}</span>
                    </td>
                </tr>
            `;
        });
    }

    // Buscador en tiempo real
    document.getElementById('inputBusqueda').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = registrosMaster.filter(r => 
            (r.entidad && r.entidad.toLowerCase().includes(term)) ||
            (r.nombreResponsable && r.nombreResponsable.toLowerCase().includes(term)) ||
            r.email.toLowerCase().includes(term) ||
            (r.whatsapp && r.whatsapp.includes(term))
        );
        renderizar(filtrados);
    });

</script>

</body>
</html>
