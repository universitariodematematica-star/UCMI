<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.1s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px; 
        }

/* --- Estilos del Directorio y Tabla --- */
.navbar-top {
    background: rgba(255, 255, 255, 0.05);
    padding: 15px 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* --- Mejora de Cristal Esmerilado --- */
.table-container {
    background: rgba(255, 255, 255, 0.03); /* Más transparente */
    border-radius: 20px;
    padding: 25px;
    backdrop-filter: blur(15px); /* Desenfoque más suave */
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

/* --- ESTILO UNIFICADO PARA TABLAS TIPO CRISTAL --- */

/* 1. Limpieza total de los estilos por defecto de Bootstrap */
.table {
    border-collapse: separate !important;
    border-spacing: 0 15px !important; /* Espacio entre filas */
    background: transparent !important;
    color: white !important;
}

/* 2. Cabeceras sin fondo */
.table thead th {
    background: transparent !important;
    border: none !important;
    color: rgba(255, 255, 255, 0.5) !important;
    text-transform: uppercase;
    font-size: 0.8rem;
    padding-bottom: 5px;
}

/* 3. El contenedor de la fila (la tarjeta de cristal) */
.fila-estudiante {
    background: rgba(255, 255, 255, 0.03) !important;
    backdrop-filter: blur(10px) !important;
    -webkit-backdrop-filter: blur(10px) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
}

/* 4. Celdas transparentes dentro de la fila */
.fila-estudiante td {
    background: transparent !important;
    border: none !important;
    padding: 20px !important;
    vertical-align: middle;
}

/* 5. Bordes redondeados en los extremos */
.fila-estudiante td:first-child {
    border-radius: 15px 0 0 15px;
}

.fila-estudiante td:last-child {
    border-radius: 0 15px 15px 0;
}

/* 6. Efecto hover suave y brillante (Transición lenta) */
.fila-estudiante {
    transition: all 0.3s ease !important; /* Transición general lenta */
}

.fila-estudiante:hover {
    background: rgba(255, 255, 255, 0.08) !important;
    transform: scale(1.005); 
    transition: all 0.8s ease !important; /* Transición de entrada lenta */
}

/* Efecto de brillo en el texto (Transición lenta) */
.fila-estudiante:hover td, 
.fila-estudiante:hover td *, 
.fila-estudiante:hover td div, 
.fila-estudiante:hover td span {
    color: #ffffff !important;
    text-shadow: 0 0 8px rgba(255, 255, 255, 1), 0 0 15px rgba(255, 255, 255, 0.8) !important;
    transition: all 0.8s ease !important; /* Esto controla la velocidad del brillo */
}
.badge-modulo {
    background-color: rgba(197, 160, 89, 0.2);
    color: var(--dorado-ucmi);
    border: 1px solid var(--dorado-ucmi);
    padding: 4px 8px;
    margin: 2px;
    font-size: 0.7rem;
    border-radius: 6px;
}

.btn-panel {
    background: transparent;
    border: 1px solid var(--dorado-ucmi);
    color: var(--dorado-ucmi);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.8rem;
    transition: 0.3s;
}

.btn-panel:hover {
    background: var(--dorado-ucmi);
    color: var(--azul-ucmi);
}

.form-select, .form-control {
    background: rgba(0, 0, 0, 0.3) !important;
    border: 1px solid rgba(255, 255, 255, 0.2) !important;
    color: white !important;
    border-radius: 8px !important;
}

.badge-cupos {
    font-size: 0.85rem;
    padding: 8px 12px;
    border-radius: 50px;
    font-weight: 600;
}

/* --- NUEVA REGLA PARA ALFANUMÉRICOS --- */
.fila-estudiante td, 
.fila-estudiante td div, 
.fila-estudiante td small, 
.fila-estudiante td span {
    color: #ffffff !important;
}        

 /* Ejemplo: Mantener el WhatsApp verde después de haber blanqueado todo */
.fila-estudiante td .text-success {
    color: #27ae60 !important; 
}       

/* --- CORRECCIÓN FINAL DE DESBORDAMIENTO --- */

/* Elimina el scroll horizontal en el contenedor de la tabla */
.table-responsive {
    overflow-x: hidden !important; 
    width: 100% !important;
}

/* Fuerza a la tabla a no superar el ancho de su contenedor */
.table {
    width: 100% !important;
    table-layout: fixed !important; /* Vital para que no se expanda de más */
}

/* Ajuste fino: asegura que las celdas no fuercen el ancho */
.fila-estudiante td {
    word-wrap: break-word !important; /* Si un correo es muy largo, lo rompe en dos líneas en vez de ensanchar */
    overflow: hidden !important;
}
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="#" class="nav-item-ucmi active"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-people"></i> USUARIOS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-clock-history"></i> HISTORIAL</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">
        <div class="navbar-top">
            <div>
                <h4 class="fw-bold m-0">Directorio Académico</h4>
                <div class="d-flex align-items-center gap-2 mt-1">
                    <small class="text-white-50">Academia: <span id="label-academia" class="fw-bold text-warning">...</span></small>
                    <span id="badge-cupos" class="badge badge-cupos bg-dark border border-success text-success ms-2">
                        Cupos: <span id="cupos-utilizados">0</span> / <span id="cupos-maximos">0</span>
                    </span>
                </div>
            </div>
            <div class="d-flex gap-2">
                <select id="filtroModulo" class="form-select" style="width: 200px;">
                    <option value="">Todos los Módulos</option>
                </select>
                <input type="text" id="buscador" class="form-control" placeholder="Buscar..." style="width: 280px;">
            </div>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ESTUDIANTE</th>
                            <th>CONTACTO</th>
                            <th>REPRESENTANTE</th>
                            <th>MÓDULOS ACTIVOS</th>
                            <th class="text-center">GESTIÓN</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body">
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <div class="spinner-border text-warning" role="status"></div>
                                <p class="mt-2 text-white-50">Sincronizando con la nube...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const db = getFirestore(initializeApp({apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"}));
    const auth = getAuth();

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        const userSnap = await getDoc(doc(db, "usuarios", user.email));
        if (userSnap.exists()) {
            const d = userSnap.data();
            document.getElementById('label-academia').innerText = d.entidad || "Sede";
            const logo = document.getElementById('logoAcademia');
            logo.src = d.logoCustom || "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";
            logo.style.opacity = "1";
            cargarDirectorio(d.entidad, d.cupos || 0, d["modulos-ofertados-academia"]);
        }
    });

async function cargarDirectorio(entidad, cuposMax, mods) {
        const tbody = document.getElementById('tabla-body');
        
        // Carga de filtros
        if(mods) {
            Object.keys(mods).forEach(m => { 
                if(mods[m]) document.getElementById('filtroModulo').innerHTML += `<option value="${m.toLowerCase()}">${m}</option>`; 
            });
        }
        
        const snap = await getDocs(query(collection(db, "usuarios"), where("perfil", "==", "Estudiante Academia"), where("entidad", "==", entidad)));
        
        document.getElementById('cupos-utilizados').innerText = snap.size;
        document.getElementById('cupos-maximos').innerText = cuposMax;
        
        tbody.innerHTML = '';
        
        snap.forEach(doc => {
            const d = doc.data();
            
            // Creación del elemento fila con la clase necesaria para el diseño
            const tr = document.createElement('tr');
            tr.className = 'fila-estudiante'; // <--- ESTO ES VITAL
            
            tr.setAttribute('data-modulos', (d.modulos || []).join(',').toLowerCase());
            
            // Inyección del contenido
            tr.innerHTML = `
                <td>
                    <div class="fw-bold">${d.nombreResponsable}</div>
                    <small class="text-secondary">${d.dniEstudiante || ''}</small>
                </td>
                <td>
                    <small>${d.email}<br><span class="text-success">${d.whatsapp || ''}</span></small>
                </td>
                <td>
                    <small>${d.nombreRepresentante || '-'}</small>
                </td>
                <td>
                    ${(d.modulos || []).map(m => `<span class="badge badge-modulo">${m}</span>`).join('')}
                </td>
                <td class="text-center">
                    <button class="btn btn-sm btn-panel"><i class="bi bi-eye"></i></button>
                </td>
            `;
            
            tbody.appendChild(tr);
        });
    }

    document.getElementById('buscador').addEventListener('input', e => {
        const t = e.target.value.toLowerCase();
        document.querySelectorAll('.fila-estudiante').forEach(f => f.style.display = f.innerText.toLowerCase().includes(t) ? '' : 'none');
    });

    document.getElementById('filtroModulo').addEventListener('change', e => {
        const m = e.target.value.toLowerCase();
        document.querySelectorAll('.fila-estudiante').forEach(f => f.style.display = (m === "" || f.getAttribute('data-modulos').includes(m)) ? '' : 'none');
    });

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth).then(() => window.location.href = "index.html"));
</script>
</body>
</html>
