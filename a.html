<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
        }

        .logo-sidebar { 
            height: 100px; width: auto; margin: 0 auto 30px auto; display: block; 
            border-radius: 15px; border: 2px solid rgba(255, 255, 255, 0.1); 
            transition: opacity 0.5s ease; opacity: 0; 
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; color: rgba(255,255,255,0.6); 
            text-decoration: none; padding: 10px 15px; margin-bottom: 5px; 
            border-radius: 10px; transition: 0.3s all ease; font-size: 0.85rem; 
        }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }

        .btn-sidebar-action { 
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.4); 
            color: white; padding: 10px; border-radius: 50px; text-decoration: none; 
            text-align: center; display: block; margin-bottom: 10px; 
        }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; padding: 40px; 
        }

        .navbar-top {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px; border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
        }

        /* --- NUEVO ESTILO DE TABLA ESMERILADA --- */
        .table {
            color: white !important;
            border-collapse: separate !important;
            border-spacing: 0 15px !important; /* Espacio entre filas */
            background: transparent !important;
        }

        /* Cada fila actúa como una tarjeta de cristal */
        .fila-estudiante {
            background: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .fila-estudiante td {
            border: none !important;
            padding: 20px !important;
        }

        /* Bordes redondeados para las tarjetas de fila */
        .fila-estudiante td:first-child { border-radius: 15px 0 0 15px; }
        .fila-estudiante td:last-child { border-radius: 0 15px 15px 0; }

        .table thead th {
            color: rgba(255, 255, 255, 0.5) !important;
            text-transform: uppercase;
            border: none !important;
            background: transparent !important;
        }

        .badge-modulo {
            background-color: rgba(197, 160, 89, 0.2);
            color: var(--dorado-ucmi);
            border: 1px solid var(--dorado-ucmi);
            padding: 4px 8px; border-radius: 6px; font-size: 0.7rem;
        }

        .btn-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dorado-ucmi);
            color: var(--dorado-ucmi);
            border-radius: 8px;
        }

        .form-select, .form-control {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" id="logoAcademia" class="logo-sidebar" alt="Logo">
        <nav class="sidebar-nav">
            <a href="#" class="nav-item-ucmi active"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
        </nav>
    </aside>

    <main class="super-overlay">
        <div class="navbar-top">
            <h4 class="fw-bold">Directorio Académico</h4>
        </div>

        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>ESTUDIANTE</th>
                        <th>CONTACTO</th>
                        <th>REPRESENTANTE</th>
                        <th>MÓDULOS ACTIVOS</th>
                        <th class="text-center">GESTIÓN</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    </tbody>
            </table>
        </div>
    </main>
</div>

<script type="module">

    // Asegúrate de que al crear los elementos <tr>, les asignes la clase 'fila-estudiante'
    // tr.className = 'fila-estudiante';
</script>
</body>
</html>
