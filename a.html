<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Historial de Solicitudes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --dorado-neon: #ffcc66;
            --azul-sidebar: #1a2a3a;
            --cian-tech: #00f2ff;
            --purpura-neon: #bc13fe;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(10px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
        }

        .nav-section-title {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px 10px;
        }

        .btn-sidebar-custom {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: rgba(255, 255, 255, 0.7) !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
            border-radius: 50px;
            padding: 10px 15px;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            width: 100%;
            text-align: left;
        }

        .btn-sidebar-custom:hover {
            border-color: var(--cian-tech) !important;
            color: var(--cian-tech) !important;
            transform: translateX(5px);
        }

        .btn-sidebar-custom.active {
            background: rgba(188, 19, 254, 0.1);
            color: #d880ff !important;
            border: 1px solid rgba(188, 19, 254, 0.5) !important;
        }

        .btn-panel-principal {
            border: 1px solid white !important;
            color: white !important;
        }

        .btn-cerrar-sesion {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.4) !important;
            color: #ff4d4d !important;
            margin-top: 10px;
        }

        .btn-cerrar-sesion:hover {
            background: #ff4d4d !important;
            color: white !important;
        }

        /* --- PANEL CENTRAL --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 40px;
        }

        .table-historial {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .table-historial tr {
            background: rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .table-historial td {
            padding: 20px;
            vertical-align: middle;
            border: none;
        }

        .table-historial tr:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .neon-gold { color: var(--dorado-neon); font-weight: bold; }

        .badge-status {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-aprobado { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff8844; }
        .status-rechazado { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d44; }
        .status-pendiente { background: rgba(255, 204, 0, 0.1); color: #ffcc00; border: 1px solid #ffcc0044; }
        
        .date-chip {
            font-family: 'Courier New', monospace;
            background: rgba(0, 242, 255, 0.1);
            color: var(--cian-tech);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 50px;" alt="Logo">
                    <p class="small mt-2 neon-gold">SISTEMA UCMI</p>
                </div>
                <nav class="nav flex-column mb-auto">
                    <p class="nav-section-title">Protocolos</p>
                    <a class="btn-sidebar-custom" href="master-postulaciones.html"><i class="bi bi-person-badge me-2"></i> Solicitudes</a>
                    <a class="btn-sidebar-custom" href="master-vigencia.html"><i class="bi bi-clock-history me-2"></i> Vigencia</a>
                    <a class="btn-sidebar-custom" href="master-usuarios.html"><i class="bi bi-people me-2"></i> Usuarios</a>
                    <a class="btn-sidebar-custom active" href="historial-postulaciones.html"><i class="bi bi-archive me-2"></i> Historial</a>
                    <a class="btn-sidebar-custom" href="master-repositorio.html"><i class="bi bi-grid-1x2 me-2"></i> Módulos</a>
                    <a class="btn-sidebar-custom" href="papelera.html"><i class="bi bi-trash3 me-2"></i> Papelera</a>
                    
                    <p class="nav-section-title">Sistema</p>
                    <a href="super-admin.html" class="btn-sidebar-custom btn-panel-principal">
                        <i class="bi bi-grid-3x3-gap-fill me-2"></i> Panel Maestro
                    </a>
                    <button id="btnLogoutSidebar" class="btn-sidebar-custom btn-cerrar-sesion">
                        <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                    </button>
                </nav>
            </div>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="col-md-10 p-5">
                <div class="d-flex justify-content-between align-items-end mb-5">
                    <div>
                        <h2 class="neon-gold text-uppercase mb-1" style="letter-spacing: 3px;">
                            <i class="bi bi-journal-text me-3"></i>Historial de Solicitudes
                        </h2>
                        <p class="text-white-50 small">Registro cronológico de ingresos y solicitudes procesadas.</p>
                    </div>
                    <div style="min-width: 350px;">
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-white-50"><i class="bi bi-search"></i></span>
                            <input type="text" id="busquedaHistorial" class="form-control bg-transparent text-white border-secondary" placeholder="Buscar entidad, responsable o email...">
                        </div>
                    </div>
                </div>

                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table-historial text-white">
                            <thead>
                                <tr class="text-white-50 small text-uppercase" style="letter-spacing: 1.5px;">
                                    <th class="ps-4 pb-3">Entidad / Responsable</th>
                                    <th class="pb-3">Fecha</th>
                                    <th class="pb-3">Paquete / Plan</th>
                                    <th class="pb-3">Resultado</th>
                                    <th class="text-end pe-4 pb-3">Registro ID</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCuerpo">
                                <!-- Datos inyectados desde historial_postulaciones -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const tablaCuerpo = document.getElementById('tablaCuerpo');
    let todasLasPostulaciones = [];

    // --- LOGOUT ---
    document.getElementById('btnLogoutSidebar').addEventListener('click', async () => {
        const confirmacion = await Swal.fire({
            title: '¿Cerrar sesión?',
            text: "Se finalizará tu acceso al panel maestro.",
            icon: 'warning',
            showCancelButton: true,
            background: '#0a0e14',
            color: '#fff',
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'Sí, salir',
            cancelButtonText: 'Cancelar'
        });

        if (confirmacion.isConfirmed) {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            }).catch((error) => console.error("Error al cerrar sesión:", error));
        }
    });

    // --- CARGA DE DATOS DESDE LA COLECCIÓN "historial_postulaciones" ---
    const q = query(collection(db, "historial_postulaciones"), orderBy("fechaSolicitud", "desc"));

    onSnapshot(q, (snapshot) => {
        todasLasPostulaciones = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderizar(todasLasPostulaciones);
    }, (error) => {
        console.error("Error al leer historial_postulaciones:", error);
        tablaCuerpo.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-danger">Error de permisos o conexión al historial.</td></tr>`;
    });

    function renderizar(datos) {
        tablaCuerpo.innerHTML = '';
        if (datos.length === 0) {
            tablaCuerpo.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-white-50">No hay registros en el historial de postulaciones.</td></tr>`;
            return;
        }

        datos.forEach(p => {
            const fechaRaw = p.fechaSolicitud?.toDate ? p.fechaSolicitud.toDate().toLocaleDateString() : (p.fechaSolicitud || '---');
            
            // Lógica de color de badge según el estado
            let statusClass = 'status-pendiente';
            if (p.status === 'aprobado' || p.status === 'admitido') statusClass = 'status-aprobado';
            if (p.status === 'rechazado') statusClass = 'status-rechazado';

            tablaCuerpo.innerHTML += `
                <tr>
                    <td class="ps-4">
                        <div class="neon-gold">${p.entidad || 'Entidad no registrada'}</div>
                        <div class="text-white-50 small">${p.nombreResponsable || ''}</div>
                        <div class="text-white-50 small" style="font-size: 0.7rem;">${p.email || 'Sin correo'}</div>
                    </td>
                    <td><span class="date-chip"><i class="bi bi-calendar3 me-2"></i>${fechaRaw}</span></td>
                    <td><span class="small text-uppercase fw-bold">${p.paquete || 'Básico'}</span></td>
                    <td>
                        <span class="badge-status ${statusClass}">
                            ${p.status || 'Procesado'}
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <code class="text-info small" style="background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px;">
                            ${p.id.substring(0, 10)}
                        </code>
                    </td>
                </tr>
            `;
        });
    }

    // --- FILTRO ---
    document.getElementById('busquedaHistorial').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = todasLasPostulaciones.filter(p => 
            p.entidad?.toLowerCase().includes(term) || 
            p.nombreResponsable?.toLowerCase().includes(term) ||
            p.email?.toLowerCase().includes(term) ||
            p.status?.toLowerCase().includes(term)
        );
        renderizar(filtrados);
    });
</script>
</body>
</html>
