<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Control de Vigencia Temporal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --purpura-neon: #bc13fe;
            --cian-tech: #00f2ff;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            margin: 0;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
            padding: 40px;
        }

        /* CONTENEDOR TRASLÚCIDO (GLASSMORPHISM) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(20px) !important;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .table {
            --bs-table-bg: transparent !important;
            --bs-table-color: white !important;
            border-collapse: separate;
            border-spacing: 0 15px;
        }

        .table thead th {
            background: transparent !important;
            border: none !important;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            padding-bottom: 20px;
        }

        .table tbody tr {
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        .table tbody td {
            background: transparent !important;
            border: none !important;
            padding: 20px;
            vertical-align: middle;
        }

        /* ESTILOS DE COMPONENTES */
        .progress { background-color: rgba(255, 255, 255, 0.1); height: 6px; border-radius: 10px; }
        .progress-bar-active { background: linear-gradient(90deg, var(--purpura-neon), var(--cian-tech)); box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }
        
        .status-tag { font-size: 0.7rem; padding: 6px 14px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(0, 255, 136, 0.3); background: rgba(0, 255, 136, 0.05); color: #00ff88; }
        .id-badge { font-family: monospace; color: var(--cian-tech); background: rgba(0, 242, 255, 0.1); padding: 3px 8px; border-radius: 5px; font-size: 0.75rem; }
        
        .btn-revocar {
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.05);
            border-radius: 12px;
            padding: 8px 18px;
            transition: all 0.3s;
        }

        .btn-revocar:hover { background: rgba(255, 77, 77, 0.2); color: white; border-color: #ff4d4d; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="glass-panel">
            <h3 class="fw-bold mb-5 text-uppercase" style="letter-spacing: 3px;">
                <i class="bi bi-cpu-fill me-3 text-info"></i>Panel de Vigencia Operativa
            </h3>
            
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Responsable / Identificador</th>
                            <th>Activación</th>
                            <th style="width: 20%;">Cronología</th>
                            <th>Expiración</th>
                            <th>Remanente</th>
                            <th class="text-end">Operaciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Función crucial para limpiar fechas de Firebase (formato 28/4/2026...)
    function parsearFechaFirebase(str) {
        if(!str) return new Date();
        const [fecha, hora] = str.split(', ');
        const [dia, mes, anio] = fecha.split('/');
        return new Date(`${anio}-${mes}-${dia}T${hora}`);
    }

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        const cuerpo = document.getElementById('tablaCuerpo');
        cuerpo.innerHTML = '';

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;

            // Procesamiento de fechas para evitar "Invalid Date"
            const fechaInicio = parsearFechaFirebase(data.fechaActivacion);
            const fechaFin = new Date(data.expiracionTimestamp); // Este suele ser numérico
            const ahora = new Date();

            const total = fechaFin - fechaInicio;
            const transcurrido = ahora - fechaInicio;
            let porcentaje = Math.floor((transcurrido / total) * 100);
            porcentaje = Math.min(Math.max(porcentaje, 0), 100);

            const diasRestantes = Math.ceil((fechaFin - ahora) / (1000 * 60 * 60 * 24));

            cuerpo.innerHTML += `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="me-3">
                                <i class="bi bi-shield-check fs-4 text-info"></i>
                            </div>
                            <div>
                                <div class="fw-bold text-white">${data.entidad || 'N/A'}</div>
                                <div class="id-badge">${data.email || id}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="small text-white-50">Fecha Inicio:</div>
                        <div class="fw-bold">${fechaInicio.toLocaleDateString()}</div>
                    </td>
                    <td>
                        <div class="progress mb-2">
                            <div class="progress-bar progress-bar-active" style="width: ${porcentaje}%"></div>
                        </div>
                        <div style="font-size: 0.65rem;" class="text-white-50 text-uppercase">Consumo: ${porcentaje}%</div>
                    </td>
                    <td>
                        <div class="small text-white-50">Vence en:</div>
                        <div class="fw-bold text-info">${fechaFin.toLocaleDateString()}</div>
                    </td>
                    <td>
                        <span class="status-tag">${diasRestantes > 0 ? diasRestantes + ' DÍAS' : 'EXPIRADO'}</span>
                    </td>
                    <td class="text-end">
                        <button onclick="revocar('${id}')" class="btn btn-revocar">
                            <i class="bi bi-trash3 me-2"></i>Revocar
                        </button>
                    </td>
                </tr>
            `;
        });
    });

    window.revocar = async (id) => {
        const confirmation = await Swal.fire({
            title: '¿Confirmar Revocación?',
            text: "Esta acción es irreversible y cortará el acceso.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'Sí, revocar'
        });

        if (confirmation.isConfirmed) {
            await deleteDoc(doc(db, "usuarios", id));
            Swal.fire('Eliminado', 'La licencia ha sido revocada.', 'success');
        }
    };
</script>
</body>
</html>
