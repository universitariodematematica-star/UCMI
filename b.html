<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos y Ramas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            font-family: 'Poppins', sans-serif;
        }

                   .modal-content {
                border: 2px solid #ffc107;
                border-radius: 20px;
                background: rgba(10,25,47,.95) !important;
                backdrop-filter: blur(10px);
            }
                .container {
            background: rgba(10, 25, 47, 0.82);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,.4);
            margin-top: 40px;
        }
                .table {
            border-radius: 15px;
            overflow: hidden;
        }
        
        .table-dark {
            --bs-table-bg: rgba(0,0,0,.35);
        }
        
        .table td,
        .table th {
            vertical-align: middle;
        }
        .btn-ucmi {
    background: rgba(0, 77, 192, 0.85);
    border: 1px solid rgba(255,255,255,.15);
    color: white;
    border-radius: 12px;
    padding: 6px 14px;
    transition: .3s;
    font-weight: 600;
    backdrop-filter: blur(10px);
}

.btn-ucmi:hover {
    background: #0066ff;
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0,102,255,.4);
}

.btn-editar {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(173,216,230,0.3);
    color: #cfe8ff;
    border-radius: 12px;
    padding: 6px 14px;
    transition: .3s;
    backdrop-filter: blur(10px);
}

.btn-editar:hover {
    background: rgba(173,216,230,0.15);
    border-color: #8ec5ff;
    color: white;
    transform: translateY(-2px);
}

.btn-borrar {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,100,100,0.25);
    color: #ffb3b3;
    border-radius: 12px;
    padding: 6px 14px;
    transition: .3s;
    backdrop-filter: blur(10px);
}

.btn-borrar:hover {
    background: rgba(255,80,80,0.12);
    border-color: rgba(255,120,120,0.6);
    color: white;
    transform: translateY(-2px);
}
        .form-check-input {
    width: 3rem !important;
    height: 1.5rem !important;
    cursor: pointer;
    border: none;
    background-color: rgba(255,255,255,.25);
}

.form-check-input:checked {
    background-color: #00c853 !important;
    border-color: #00c853 !important;
    box-shadow: 0 0 12px rgba(0,200,83,.8);
}

.form-check-input:not(:checked) {
    background-color: rgba(220,53,69,.8);
}

.form-check-input:focus {
    box-shadow: none;
}
        .titulo-modulo {
    font-size: 1.4rem;
    font-weight: 700;
    color: #ffffff;

    text-shadow:
        0 0 5px #ffffff,
        0 0 10px #ffffff,
        0 0 20px #ffffff,
        0 0 40px #ffffff;

    letter-spacing: 1px;
}

.nombre-rama {
    color: #7ec8ff;

    text-shadow:
        0 0 5px #7ec8ff,
        0 0 10px #7ec8ff,
        0 0 20px #7ec8ff;

    font-weight: 500;
}
.titulo-modulo {
    font-size: 1.4rem;
    font-weight: 700;
    color: #00e5ff;

    text-shadow:
        0 0 5px #00e5ff,
        0 0 10px #00e5ff,
        0 0 20px #00e5ff,
        0 0 40px #00e5ff,
        0 0 80px #00e5ff;
}
            
    </style>
</head>

<body>

    <div class="container py-5">

        <h2 class="mb-4 text-warning fw-bold">Gestión de Módulos y Ramas</h2>

        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Módulo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaModulos"></tbody>
        </table>

    </div>

    <!-- Modal -->
    <div class="modal fade" id="modalRamas" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">

                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">
                        Gestionar ramas
                    </h5>
                    <button type="button"
                            class="btn-close btn-close-white"
                            data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <input type="text"
                           id="inputNombreRama"
                           class="form-control"
                           placeholder="Nombre de la rama">

                    <button id="btnGuardar"
                            class="btn btn-warning w-100 mt-3">
                        CREAR RAMA
                    </button>

                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap primero -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase -->
    <script type="module">

        import { initializeApp }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

        import {
    getFirestore,
    collection,
    query,
    orderBy,
    onSnapshot,
    addDoc,
    where,
    updateDoc,
    deleteDoc,
    doc
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import {
            getAuth,
            onAuthStateChanged
        }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
            authDomain: "ucmi-13796634.firebaseapp.com",
            projectId: "ucmi-13796634",
            storageBucket: "ucmi-13796634.firebasestorage.app",
            messagingSenderId: "1090719609536",
            appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let idModuloSeleccionado = "";

        const modal = new bootstrap.Modal(
            document.getElementById("modalRamas")
        );

        // =====================================
        // AUTENTICACIÓN
        // =====================================

        onAuthStateChanged(auth, (user) => {

            if (user) {

                console.log("Usuario autenticado");
                console.log("UID:", user.uid);

            } else {

                console.warn("No hay usuario autenticado");

            }

        });

        // =====================================
        // CARGAR MÓDULOS
        // =====================================

        const q = query(
            collection(db, "ofertas"),
            orderBy("modulo", "asc")
        );

onSnapshot(q, (snapshot) => {
            const tabla = document.getElementById("tablaModulos");
            tabla.innerHTML = "";

            snapshot.forEach((docSnap) => {
                const datos = docSnap.data();
                const idContenedor = `ramas-${docSnap.id}`; // Identificador único

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>
                        <div class="titulo-modulo">${datos.modulo || ""}</div>
                        <ul id="${idContenedor}" class="list-unstyled text-secondary mt-2 ps-3" style="font-size: 0.85em;">
                            </ul>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-ucmi btn-gestionar" 
                                data-id="${docSnap.id}" data-nombre="${datos.modulo}">
                            Gestionar
                        </button>
                    </td>
                `;
                tabla.appendChild(tr);

                // Escucha en tiempo real para las ramas de ESTE módulo
                const qRamas = query(collection(db, "ramas"), where("moduloId", "==", docSnap.id));
                onSnapshot(qRamas, (snapRamas) => {
                    const lista = document.getElementById(idContenedor);
                    if (lista) {
                        lista.innerHTML = "";
                        const ramasOrdenadas = snapRamas.docs.sort((a, b) =>
                        a.data().nombre.localeCompare(
                            b.data().nombre,
                            "es",
                            { sensitivity: "base" }
                        )
                    );
                    
ramasOrdenadas.forEach(r => {

    const datosRama = r.data();

    lista.innerHTML += `
        <li class="d-flex justify-content-between align-items-center mb-2">
            <span class="nombre-rama">• ${datosRama.nombre}</span>
            <div class="d-flex align-items-center gap-2">
                <div class="form-check form-switch">

                    <input
                        class="form-check-input btn-visibility"
                        type="checkbox"
                        data-id="${r.id}"
                        ${datosRama.visible !== false ? "checked" : ""}
                    >

                </div>

                <button
                    class="btn btn-sm btn-editar btn-editar-rama"
                    data-id="${r.id}"
                    data-nombre="${datosRama.nombre}">
                    Editar
                </button>

                <button
                    class="btn btn-sm btn-borrar btn-borrar-rama"
                    data-id="${r.id}">
                    Borrar
                </button>

            </div>

        </li>
    `;
});
                    }
                });
            });
        });

        // =====================================
        // ABRIR MODAL
        // =====================================

        document
        .getElementById("tablaModulos")
        .addEventListener("click", (e) => {

            if (
                e.target.classList.contains(
                    "btn-gestionar"
                )
            ) {

                idModuloSeleccionado =
                    e.target.dataset.id;

                document
                    .getElementById("tituloModal")
                    .innerText =
                    "Ramas de: " +
                    e.target.dataset.nombre;

                modal.show();

            }

        });

        // =====================================
        // CREAR RAMA
        // =====================================

        document
        .getElementById("btnGuardar")
        .addEventListener("click", async () => {

            const nombre =
                document
                .getElementById("inputNombreRama")
                .value
                .trim();

            if (!nombre) {
                alert(
                    "Escribe un nombre para la rama"
                );
                return;
            }
            if (!idModuloSeleccionado) {
                alert(
                    "No se seleccionó ningún módulo"
                );
                return;
            }
            try {
                console.log(
                    "Creando rama..."
                );
                const resultado =
                await addDoc(
                    collection(db, "ramas"),
                    {
                        nombre: nombre,
                        moduloId: idModuloSeleccionado,
                        visible: true,
                        fechaCreacion: new Date()
                    }
                );
                console.log(
                    "Documento creado:"
                );
                console.log(
                    resultado.id
                );
                alert(
                    "¡Rama creada con éxito!"
                );
                document
                    .getElementById(
                        "inputNombreRama"
                    )
                    .value = "";
                modal.hide();
            } catch (error) {
                console.error(
                    "Error Firestore:",
                    error
                );
                alert(
                    "Error:\n\n" +
                    error.message
                );
            }
        });

document.addEventListener("click", async (e) => {

    // EDITAR
    if (e.target.classList.contains("btn-editar-rama")) {

        const idRama = e.target.dataset.id;
        const nombreActual = e.target.dataset.nombre;

        const nuevoNombre = prompt(
            "Editar nombre de la rama:",
            nombreActual
        );

        if (!nuevoNombre) return;

        try {

            await updateDoc(
                doc(db, "ramas", idRama),
                {
                    nombre: nuevoNombre.trim()
                }
            );

            alert("Rama actualizada correctamente");

        } catch (error) {

            console.error(error);
            alert(error.message);

        }

    }

    // BORRAR
    if (e.target.classList.contains("btn-borrar-rama")) {

        const idRama = e.target.dataset.id;

        const confirmar = confirm(
            "¿Seguro que deseas eliminar esta rama?"
        );

        if (!confirmar) return;

        try {

            await deleteDoc(
                doc(db, "ramas", idRama)
            );

            alert("Rama eliminada correctamente");

        } catch (error) {

            console.error(error);
            alert(error.message);

        }

    }

});

document.addEventListener("change", async (e) => {

    if (e.target.classList.contains("btn-visibility")) {

        const idRama = e.target.dataset.id;

        try {

            await updateDoc(
                doc(db, "ramas", idRama),
                {
                    visible: e.target.checked
                }
            );

        } catch (error) {

            console.error(error);
            alert(error.message);

        }

    }

});        
        
    </script>
</body>
</html>
