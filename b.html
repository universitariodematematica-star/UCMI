<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Solicitudes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --sidebar-width: 260px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: white; background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; overflow: hidden; }
        .overlay { position: fixed; top: 0; right: 0; bottom: 0; left: var(--sidebar-width); background: radial-gradient(circle, rgba(6, 9, 15, 0.7) 0%, rgba(6, 9, 15, 0.95) 100%); z-index: 0; pointer-events: none; }
        .wrapper { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: var(--sidebar-width); background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(25px); border-right: 1px solid rgba(197, 160, 89, 0.2); display: flex; flex-direction: column; padding: 25px 15px; z-index: 1; }
        .sidebar-logo { width: 100px; margin: 0 auto 30px; }
        .nav-item-ucmi { display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 10px 15px; border-radius: 10px; margin-bottom: 5px; font-size: 0.85rem; }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; z-index: 1; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(25px); border-radius: 30px; padding: 40px; max-width: 1200px; margin: auto; }
        .select-input-ucmi { background: rgba(26, 42, 58, 0.6) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15) !important; color: #fff !important; border-radius: 20px; }
        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0 12px; color: white; }
        .table-custom tr { background: rgba(255, 255, 255, 0.05); }
        .badge-perfil { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .bg-categoria-academia { background-color: #0a3d1d; }
        .bg-categoria-profesor { background-color: #0d2e5e; }
        .bg-categoria-estudiante { background-color: #311b92; }
    </style>
</head>
<body>

<div class="overlay"></div>
<div class="wrapper">
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="sidebar-logo">
        <nav class="sidebar-nav">
            <a href="#" class="nav-item-ucmi active"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="glass-panel">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-uppercase">Gestión de Solicitudes</h3>
                <div class="d-flex gap-3">
                    <div class="position-relative" style="width: 320px;">
                        <i class="bi bi-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--dorado-ucmi);"></i>
                        <input type="text" id="buscadorTexto" class="form-control select-input-ucmi" placeholder="Buscar por nombre o entidad..." style="padding-left: 45px !important;">
                    </div>
                    <div class="position-relative" style="width: 320px;">
                        <i class="bi bi-bank" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--dorado-ucmi);"></i>
                        <select id="filtroPerfil" class="form-select select-input-ucmi" style="padding-left: 45px !important;">
                            <option value="todos">--- TODAS LAS CATEGORÍAS ---</option>
                            <option value="Academia">ACADEMIA</option>
                            <option value="Profesor independiente">PROFESOR INDEPENDIENTE</option>
                            <option value="Estudiante UCMI">ESTUDIANTE UCMI</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table-custom">
                    <thead>
                        <tr class="text-white-50 small text-uppercase">
                            <th>Entidad</th>
                            <th>Responsable</th>
                            <th>Perfil</th>
                            <th>Ubicación</th>
                            <th class="text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="listaMaestra"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="modalDetalles" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" style="background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); color: white;">
            <div class="modal-header border-0"><h5 class="modal-title">Detalle de Solicitud</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body" id="contenidoModal"></div>
            <div class="modal-footer border-0">
                <button class="btn btn-danger" id="btnEliminar">Rechazar</button>
                <button class="btn btn-success" id="btnConfirmarAcceso">Activar Acceso</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let registrosLocales = [];
    let currentId = null;
    let currentData = null;

    function renderizarTabla() {
        const tbody = document.getElementById('listaMaestra');
        const valorFiltro = document.getElementById('filtroPerfil').value;
        const busqueda = document.getElementById('buscadorTexto').value.toLowerCase();
        
        tbody.innerHTML = '';
        registrosLocales.forEach((d) => {
            const data = d.data();
            const id = d.id;
            const perfil = data.tipoSolicitante || data.perfil || "N/A";
            
            const matchFiltro = (valorFiltro === "todos" || perfil === valorFiltro);
            const matchBusqueda = (data.nombreResponsable?.toLowerCase().includes(busqueda) || data.entidad?.toLowerCase().includes(busqueda));

            if (matchFiltro && matchBusqueda) {
                let colorClass = (perfil === "Academia") ? "bg-categoria-academia" : (perfil === "Profesor independiente") ? "bg-categoria-profesor" : (perfil === "Estudiante UCMI") ? "bg-categoria-estudiante" : "bg-secondary";
                tbody.innerHTML += `<tr>
                    <td><div class="fw-bold">${data.entidad}</div><div class="small text-muted">${data.email}</div></td>
                    <td>${data.nombreResponsable || '---'}</td>
                    <td><span class="badge-perfil ${colorClass}">${perfil}</span></td>
                    <td>${data.ubicacion || '---'}</td>
                    <td class="text-center"><button onclick="verExpediente('${id}')" class="btn btn-sm btn-light rounded-pill">Revisar</button></td>
                </tr>`;
            }
        });
    }

    window.verExpediente = async (id) => {
        const snap = await getDoc(doc(db, "postulaciones", id));
        if (snap.exists()) {
            currentId = id;
            currentData = snap.data();
            document.getElementById('contenidoModal').innerHTML = `<p><strong>Entidad:</strong> ${currentData.entidad}</p><p><strong>Email:</strong> ${currentData.email}</p>`;
            new bootstrap.Modal(document.getElementById('modalDetalles')).show();
        }
    };

    document.getElementById('filtroPerfil').addEventListener('change', renderizarTabla);
    document.getElementById('buscadorTexto').addEventListener('input', renderizarTabla);

    onSnapshot(collection(db, "postulaciones"), (snap) => {
        registrosLocales = snap.docs;
        renderizarTabla();
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
