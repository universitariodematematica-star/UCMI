<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --azul-ucmi: #1a2a3a; 
            --dorado-ucmi: #c5a059; 
            --blanco-suave: rgba(255, 255, 255, 0.9);
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            padding: 40px 0; 
            color: white;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
        .card-form { border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); max-width: 850px; margin: auto; overflow: hidden; }
        .header-institucional { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.3); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .inst-logo { height: 100px; filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.2)); margin-bottom: 15px; }
        .inst-titulo { color: var(--dorado-ucmi); font-family: 'Cinzel', serif; font-weight: 800; font-size: 2rem; }
        
        .seccion-titulo { font-family: 'Cinzel', serif; color: var(--dorado-ucmi); border-bottom: 1px solid rgba(197,160,89,0.3); padding-bottom: 8px; margin: 25px 0 15px 0; font-size: 1.1rem; }
        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; }
        .form-control, .form-select { border-radius: 10px; background: rgba(255, 255, 255, 0.08); color: white; border: 1px solid rgba(255, 255, 255, 0.2); }
        .form-control:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--dorado-ucmi); color: white; box-shadow: 0 0 10px rgba(197, 160, 89, 0.3); }
        
        .modulo-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid rgba(197, 160, 89, 0.2); }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 12px; border: none; width: 100%; margin-top: 30px; transition: 0.3s; }
        
        #bloqueRepresentante { display: none; background: rgba(255, 77, 77, 0.05); border: 1px solid rgba(255, 77, 77, 0.2); padding: 20px; border-radius: 15px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="card-form shadow-lg">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo UCMI" class="inst-logo">
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-2" novalidate>
            
            <!-- 1. DATOS DE IDENTIDAD -->
            <div class="seccion-titulo">1. Datos de Identidad y Validación de Existencia</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold"><i class="bi bi-person me-1"></i>Nombre(s) y Apellido(s):</label>
                    <input type="text" id="nombreInput" class="form-control" placeholder="Nombre Completo" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold"><i class="bi bi-card-heading me-1"></i>ID (Cédula/Pasaporte/RIF):</label>
                    <input type="text" id="dniInput" class="form-control" placeholder="ID Legal" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold"><i class="bi bi-calendar-event me-1"></i>Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimientoInput" class="form-control" required onchange="verificarEdad()">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold"><i class="bi bi-gender-ambiguous me-1"></i>Género:</label>
                    <select id="generoInput" class="form-select" required>
                        <option value="" selected disabled>Seleccione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>
            </div>

            <!-- 2. ACCESO Y CONTACTO -->
            <div class="seccion-titulo">2. Datos de Acceso y Contacto Técnico</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold"><i class="bi bi-envelope me-1"></i>Correo Electrónico (UID):</label>
                    <input type="email" id="emailInput" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold"><i class="bi bi-key me-1"></i>Contraseña:</label>
                    <input type="password" id="passInput" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold"><i class="bi bi-whatsapp me-1"></i>WhatsApp Postulante:</label>
                    <input type="text" id="whatsappInput" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold"><i class="bi bi-geo-alt me-1"></i>Ubicación (Ciudad y País):</label>
                    <input type="text" id="ubicacionInput" class="form-control" required>
                </div>
            </div>

            <!-- 3. BLOQUE REPRESENTANTE (CONTACTO EXTENDIDO) -->
            <div id="bloqueRepresentante">
                <div class="seccion-titulo text-danger">3. Representante Legal (Obligatorio para Menores)</div>
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label text-white">Nombre Completo:</label><input type="text" id="repNombre" class="form-control border-danger"></div>
                    <div class="col-md-6"><label class="form-label text-white">Cédula:</label><input type="text" id="repCedula" class="form-control border-danger"></div>
                    <div class="col-md-6"><label class="form-label text-white">WhatsApp del Representante:</label><input type="text" id="repWhatsapp" class="form-control border-danger"></div>
                    <div class="col-md-6"><label class="form-label text-white">Correo de Notificación:</label><input type="email" id="repEmail" class="form-control border-danger"></div>
                </div>
            </div>

            <!-- 4. GESTIÓN DE LICENCIAS -->
            <div class="seccion-titulo">4. Gestión de Licencias e Inventario</div>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Perfil de Usuario:</label>
                    <select id="perfilUsuario" class="form-select" required onchange="ajustarCamposPerfil()">
                        <option value="" selected disabled>Seleccionar Perfil...</option>
                        <option value="Academia">Academia</option>
                        <option value="Profesor Independiente">Profesor Independiente</option>
                        <option value="Estudiante UCMI">Estudiante UCMI</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Duración de Licencia (Meses):</label>
                    <input type="number" id="duracionMeses" class="form-control" min="1" placeholder="Ej: 6" required>
                </div>
                <div class="col-md-6" id="contenedorCupos">
                    <label class="form-label fw-bold">Cupos Solicitados:</label>
                    <input type="number" id="cuposInput" class="form-control" min="1" value="1">
                </div>
                <div class="col-md-6" id="contenedorInstitucion" style="display:none;">
                    <label class="form-label fw-bold">Nombre de la Institución:</label>
                    <input type="text" id="nombreInstitucion" class="form-control">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-uppercase small">Inventario de Módulos (Habilitados por Superadmin)</label>
                <div class="row g-2" id="gridModulos">
                    <!-- Dinámico -->
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR Y GENERAR DOCUMENTO</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Cargar Módulos Habilitados
    async function cargarModulos() {
        const grid = document.getElementById('gridModulos');
        try {
            const q = query(collection(db, "ofertas"), where("ofertado", "==", true));
            const snap = await getDocs(q);
            grid.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                grid.innerHTML += `
                    <div class="col-md-6">
                        <div class="modulo-item">
                            <div class="form-check">
                                <input class="form-check-input mod-check" type="checkbox" value="${data.modulo}" id="mod_${doc.id}">
                                <label class="form-check-label small" for="mod_${doc.id}">
                                    <strong>${data.modulo}</strong><br>
                                    <span style="font-size:0.7rem; color: #ccc;">Habilitado para Ramas y Unidades</span>
                                </label>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (e) { grid.innerHTML = "<p class='text-danger'>Error al cargar módulos.</p>"; }
    }
    cargarModulos();

    window.verificarEdad = () => {
        const fNac = new Date(document.getElementById('fechaNacimientoInput').value);
        const hoy = new Date();
        let edad = hoy.getFullYear() - fNac.getFullYear();
        if (hoy.getMonth() < fNac.getMonth() || (hoy.getMonth() === fNac.getMonth() && hoy.getDate() < fNac.getDate())) edad--;
        
        const bloque = document.getElementById('bloqueRepresentante');
        const inputs = bloque.querySelectorAll('input');
        if (edad < 18) {
            bloque.style.display = 'block';
            inputs.forEach(i => i.required = true);
        } else {
            bloque.style.display = 'none';
            inputs.forEach(i => i.required = false);
        }
    };

    window.ajustarCamposPerfil = () => {
        const p = document.getElementById('perfilUsuario').value;
        const contCupos = document.getElementById('contenedorCupos');
        const contInst = document.getElementById('contenedorInstitucion');
        
        contCupos.style.display = (p === 'Estudiante UCMI') ? 'none' : 'block';
        contInst.style.display = (p === 'Academia') ? 'block' : 'none';
        document.getElementById('nombreInstitucion').required = (p === 'Academia');
    };

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const checks = document.querySelectorAll('.mod-check:checked');
        
        if (!e.target.checkValidity() || (checks.length === 0)) {
            Swal.fire("Incompleto", "Por favor llene los datos y seleccione al menos un módulo.", "warning");
            return;
        }

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "Registrando...";

        const payload = {
            perfil: document.getElementById('perfilUsuario').value,
            identidad: {
                nombre: document.getElementById('nombreInput').value,
                id: document.getElementById('dniInput').value,
                fNac: document.getElementById('fechaNacimientoInput').value,
                genero: document.getElementById('generoInput').value
            },
            acceso: {
                email: document.getElementById('emailInput').value,
                pass: "Hasheada_Internal",
                whatsapp: document.getElementById('whatsappInput').value,
                ubicacion: document.getElementById('ubicacionInput').value
            },
            representante: {
                nombre: document.getElementById('repNombre').value || "N/A",
                whatsapp: document.getElementById('repWhatsapp').value || "N/A",
                email: document.getElementById('repEmail').value || "N/A"
            },
            gestion: {
                duracionMeses: document.getElementById('duracionMeses').value,
                cupos: document.getElementById('cuposInput').value || 1,
                institucion: document.getElementById('nombreInstitucion').value || "Independiente",
                modulosHabilitados: Array.from(checks).map(c => c.value)
            },
            timestamp: new Date()
        };

        try {
            await addDoc(collection(db, "postulaciones"), payload);
            generarPDF(payload);
            Swal.fire("Éxito", "Postulación enviada correctamente.", "success");
        } catch (err) {
            Swal.fire("Error", "No se pudo guardar la información.", "error");
            btn.disabled = false;
        }
    });

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Estética Institucional en PDF
        doc.setFillColor(26, 42, 58); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(197, 160, 89); doc.setFontSize(20);
        doc.text("REGISTRO DE LICENCIA UCMI", 105, 25, {align: "center"});
        
        doc.setTextColor(0); doc.setFontSize(12);
        doc.text(`Postulante: ${d.identidad.nombre}`, 20, 55);
        doc.text(`Perfil: ${d.perfil}`, 20, 65);
        doc.text(`Identificación: ${d.identidad.id}`, 20, 75);
        doc.text(`WhatsApp: ${d.acceso.whatsapp}`, 20, 85);
        doc.text(`Duración: ${d.gestion.duracionMeses} Meses`, 20, 95);
        doc.text(`Cupos: ${d.gestion.cupos}`, 20, 105);
        
        doc.setFontSize(10);
        doc.text("Módulos Habilitados:", 20, 120);
        doc.text(d.gestion.modulosHabilitados.join(", "), 25, 130);

        if (d.representante.nombre !== "N/A") {
            doc.text("Datos del Representante:", 20, 150);
            doc.text(`Nombre: ${d.representante.nombre} - WhatsApp: ${d.representante.whatsapp}`, 25, 160);
        }

        window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
