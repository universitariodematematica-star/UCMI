<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --azul-ucmi: #1a2a3a; --dorado-ucmi: #c5a059; }
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; padding: 40px 0; color: white;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
        .card-form { max-width: 850px; margin: auto; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: visible; }
        .header-institucional { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.3); border-bottom: 1px solid rgba(197, 160, 89, 0.2); border-top-left-radius: 30px; border-top-right-radius: 30px; }
        .inst-logo { height: 100px; margin-bottom: 15px; }
        .inst-titulo { color: var(--dorado-ucmi); font-family: 'Cinzel', serif; font-weight: 800; font-size: 2rem; }
        .seccion-titulo { font-family: 'Cinzel', serif; color: var(--dorado-ucmi); border-bottom: 1px solid rgba(197,160,89,0.3); padding-bottom: 8px; margin: 25px 0 15px 0; font-size: 1.1rem; }
        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; }
        
        .form-control, .form-select { 
            border-radius: 10px; 
            background: rgba(255, 255, 255, 0.05) !important; 
            color: #ffffff !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            transition: all 0.3s ease; 
        }
        
        .form-control:focus, .form-select:focus { 
            background: rgba(255, 255, 255, 0.1) !important; 
            border-color: var(--dorado-ucmi) !important; 
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.2); 
        }

        ::placeholder { 
            color: rgba(255, 255, 255, 0.4) !important; 
            font-size: 0.85rem; 
            font-style: italic; 
        }

        option { background-color: var(--azul-ucmi); color: white; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 12px; border: none; width: 100%; margin-top: 30px; }
        
        #bloqueRepresentante { 
            display: none; 
            background: rgba(255, 77, 77, 0.05); 
            border: 1px solid rgba(255, 77, 77, 0.2); 
            padding: 20px; 
            border-radius: 15px; 
        }

        .was-validated .form-control:invalid, .was-validated .form-select:invalid { 
            border-color: #ff4d4d !important; 
            background-image: none !important; 
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.3) !important; 
        }
        
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo UCMI" class="inst-logo">
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA 4</h1>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-2" novalidate>
            <div class="seccion-titulo">1. Datos de Identidad y Validación</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre Responsable:</label>
                    <input type="text" id="nombreInput" class="form-control" required placeholder="Nombres y Apellidos">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">ID (Cédula/RIF):</label>
                    <input type="text" id="dniInput" class="form-control" required placeholder="Documento de identidad">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimientoInput" class="form-control" required onchange="fn_VerificarEdad()">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Género:</label>
                    <select id="generoInput" class="form-select"> 
                        <option value="" selected>No especificado</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>
            </div>

            <div class="seccion-titulo">2. Datos de Acceso y Seguridad</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Correo Electrónico:</label>
                    <input type="email" id="emailInput" class="form-control" placeholder="usuario@ejemplo.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Número de WhatsApp (2FA):</label>
                    <input type="tel" id="whatsappInput" class="form-control" placeholder="+58 412 0000000" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Ubicación (Ciudad y País):</label>
                    <input type="text" id="ubicacionInput" class="form-control" placeholder="Ej: Caracas, Venezuela" required>
                </div>
            </div>

            <div id="bloqueRepresentante" class="mt-4">
                <div class="seccion-titulo text-danger">3. Supervisión Legal (Requerido para Menores)</div>
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label text-white">Nombre del Representante:</label><input type="text" id="repNombre" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label text-white">Cédula del Representante:</label><input type="text" id="repCedula" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label text-white">Correo de Notificación:</label><input type="email" id="repEmail" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label text-white">WhatsApp del Representante:</label><input type="tel" id="repWhatsapp" class="form-control"></div>
                </div>
            </div>

            <div class="seccion-titulo">4. Gestión de Licencias y Acceso Académico</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Perfil de Usuario:</label>
                    <select id="perfilUsuario" class="form-select" required onchange="fn_AjustarPerfil()">
                        <option value="">Selecciona el perfil</option>
                        <option value="Academia">Academia</option>
                        <option value="Independent Professor">Profesor independiente</option>
                        <option value="Estudiante UCMI">Estudiante UCMI</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Plan de Licencia en meses:</label>
                    <input type="number" id="planLicencia" class="form-control" placeholder="Ej: 12" min="1" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Cantidad de Estudiantes / Cupos (x):</label>
                    <input type="number" id="cuposInput" class="form-control" value="1" min="1" required>
                </div>
                <div class="col-md-12">
                    <label class="form-label fw-bold">Nombre de la Entidad:</label>
                    <input type="text" id="nombreInstitucion" class="form-control" placeholder="Nombre de la academia o particular">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR Y GENERAR COMPROBANTE</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.fn_VerificarEdad = () => {
        const fNacInput = document.getElementById('fechaNacimientoInput').value;
        if(!fNacInput) return;
        const fNac = new Date(fNacInput);
        const hoy = new Date();
        let edad = hoy.getFullYear() - fNac.getFullYear();
        if (hoy.getMonth() < fNac.getMonth() || (hoy.getMonth() === fNac.getMonth() && hoy.getDate() < fNac.getDate())) edad--;
        
        const esMenor = edad < 18;
        document.getElementById('bloqueRepresentante').style.display = esMenor ? 'block' : 'none';
        
        ['repNombre', 'repCedula', 'repEmail', 'repWhatsapp'].forEach(id => {
            document.getElementById(id).required = esMenor;
        });
    };

    window.fn_AjustarPerfil = () => {
        const p = document.getElementById('perfilUsuario').value;
        const campoEntidad = document.getElementById('nombreInstitucion');
        campoEntidad.placeholder = (p === 'Academia') ? "Nombre de la Academia" : "Nombre del Profesor / Particular";
        campoEntidad.required = (p === 'Academia');
    };

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;

        // Cálculo de Inversión
        const x = parseInt(document.getElementById('cuposInput')?.value) || 1; 
        const meses = parseInt(document.getElementById('planLicencia').value) || 1;
        let ix = 0;

        if (x >= 1 && x <= 10) {
            ix = 10 * x * (1 - (x - 1) / 90);
        } else if (x > 10 && x <= 50) {
            ix = 10 * x * (1 - (10 + 0.5 * (x - 10)) / 100);
        } else if (x > 50 && x <= 200) {
            ix = 10 * x * (1 - (30 + 0.1 * (x - 50)) / 100);
        } else if (x > 200) {
            ix = (5 * x) + 100;
        }

        const costoFinalCalculado = (ix * meses).toFixed(2);

        if (!form.checkValidity()) {
            form.classList.add('was-validated');
            Swal.fire({ icon: "warning", title: "Campos Incompletos", text: "Por favor, rellene los campos resaltados en rojo.", confirmButtonColor: "#c5a059" });
            return;
        }

        document.getElementById('btnSubmit').disabled = true;

        // Mapeo según requerimientos de UCMI
        const payload = {
            nombreResponsable: document.getElementById('nombreInput').value,
            cedulaResponsable: document.getElementById('dniInput').value,
            fechaNacimiento: document.getElementById('fechaNacimientoInput').value,
            genero: document.getElementById('generoInput').value || "No especificado",
            email: document.getElementById('emailInput').value,
            whatsapp: document.getElementById('whatsappInput').value,
            ubicacion: document.getElementById('ubicacionInput').value,
            
            // Supervisión Legal
            nombreRepresentante: document.getElementById('repNombre').value || null,
            cedulaRepresentante: document.getElementById('repCedula').value || null,
            emailRepresentante: document.getElementById('repEmail').value || null,
            whatsappRepresentante: document.getElementById('repWhatsapp').value || null,
            
            perfil: document.getElementById('perfilUsuario').value, 
            mesesLicencia: document.getElementById('planLicencia').value,
            entidad: document.getElementById('nombreInstitucion').value || "Particular", 
            inversionTotal: costoFinalCalculado,
            cupos: x,
            timestamp: new Date()
        };

        try {
            await addDoc(collection(db, "postulaciones"), payload);
            fn_GenerarPDF(payload);
            Swal.fire("Éxito", "Postulación enviada correctamente", "success");
            form.reset();
            form.classList.remove('was-validated');
            document.getElementById('bloqueRepresentante').style.display = 'none';
        } catch (error) {
            console.error("Error Firebase:", error);
            Swal.fire("Error", "No se pudo conectar con el servidor", "error");
        } finally {
            document.getElementById('btnSubmit').disabled = false;
        }
    });

    async function fn_GenerarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const marginX = 20;
        const azulUCMI = [26, 42, 58];
        const doradoUCMI = [197, 160, 89];

        doc.setFillColor(azulUCMI[0], azulUCMI[1], azulUCMI[2]);
        doc.rect(0, 0, 210, 45, 'F'); 

        const logoUrl = "https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png";
        try {
            const img = new Image();
            img.src = logoUrl;
            img.crossOrigin = "Anonymous"; 
            await new Promise((resolve) => {
                img.onload = () => {
                    doc.addImage(img, 'PNG', 12, 7, 30, 30);
                    resolve();
                };
                img.onerror = () => resolve();
            });
        } catch (e) { console.warn("Error cargando logo"); }

        doc.setTextColor(doradoUCMI[0], doradoUCMI[1], doradoUCMI[2]);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.text("UNIVERSITARIO DE CIENCIAS MATEMÁTICAS E IDIOMAS", 48, 22);
        doc.setFontSize(24);
        doc.text("UCMI", 48, 34);

        let y = 62;
        doc.setTextColor(azulUCMI[0], azulUCMI[1], azulUCMI[2]);
        doc.setFontSize(18);
        doc.text("Comprobante de solicitud", 105, y, { align: "center" });

        y += 3;
        doc.setDrawColor(doradoUCMI[0], doradoUCMI[1], doradoUCMI[2]);
        doc.setLineWidth(1);
        doc.line(75, y, 135, y);

        y += 10;
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(100);
        const folio = `REF-${Date.now().toString().slice(-6)}`;
        doc.text(`Folio: ${folio} | Fecha: ${d.timestamp.toLocaleString()}`, 105, y, { align: "center" });

        y += 15;
        const renderSection = (titulo, lineas) => {
            doc.setFont("helvetica", "bold");
            doc.setFontSize(11);
            doc.setTextColor(azulUCMI[0], azulUCMI[1], azulUCMI[2]);
            doc.text(titulo, marginX, y);
            y += 2;
            doc.setLineWidth(0.2);
            doc.setDrawColor(200);
            doc.line(marginX, y, 190, y);
            y += 7;
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.setTextColor(0);
            lineas.forEach(l => {
                doc.text(l, marginX + 5, y);
                y += 6;
            });
            y += 6;
        };

        renderSection("I. DATOS DEL POSTULANTE", [
            `Nombre Responsable: ${d.nombreResponsable.toUpperCase()}`,
            `Identificación (ID): ${d.cedulaResponsable}`,
            `Fecha de Nacimiento: ${d.fechaNacimiento}`,
            `Género: ${d.genero}`
        ]);

        renderSection("II. INFORMACIÓN DE CONTACTO", [
            `Correo Electrónico: ${d.email}`,
            `WhatsApp / 2FA: ${d.whatsapp}`,
            `Ubicación: ${d.ubicacion}`
        ]);

        if (d.nombreRepresentante) {
            renderSection("III. REPRESENTACIÓN LEGAL", [
                `Nombre del Representante: ${d.nombreRepresentante}`,
                `Cédula: ${d.cedulaRepresentante}`,
                `Contacto: ${d.whatsappRepresentante} / ${d.emailRepresentante}`
            ]);
        }

        renderSection("IV. GESTIÓN ACADÉMICA", [
            `Perfil solicitado: ${d.perfil}`,
            `Entidad / Institución: ${d.entidad}`,
            `Vigencia de Licencia: ${d.mesesLicencia} meses`
        ]);

        renderSection("V. DETALLES FINANCIEROS", [
            `Cantidad de cupos (x): ${d.cupos}`,
            `Inversión total: $${d.inversionTotal} USD`,
            `Estado: PENDIENTE DE VALIDACIÓN`
        ]);

        y = 280;
        doc.setFontSize(8);
        doc.setTextColor(150);
        doc.text("Documento oficial emitido por el sistema UCMI. Verifique su folio.", 105, y, { align: "center" });

        window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
