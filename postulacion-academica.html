<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    
    <!-- LIBRERÍAS EXTERNAS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { 
            --azul-ucmi: #1a2a3a; 
            --dorado-ucmi: #c5a059;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh; /* Asegura que el body cubra toda la pantalla */
            height: auto;
            padding: 40px 0; 
            color: white;
        }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); 
            z-index: -1; 
        }

        /* CORRECCIÓN DE CONTENEDOR PARA image_1e1f1f.jpg */
        .card-form { 
            max-width: 850px; 
            margin: auto; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: visible; /* Cambiado de hidden a visible para evitar cortes */
            height: auto; /* Permite que el cristal crezca con el contenido */
            display: block;
        }

        .header-institucional { 
            text-align: center; padding: 40px 20px; 
            background: rgba(0, 0, 0, 0.3); 
            border-bottom: 1px solid rgba(197, 160, 89, 0.2); 
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
        }

        .inst-logo { height: 100px; margin-bottom: 15px; }
        .inst-titulo { 
            color: var(--dorado-ucmi); 
            font-family: 'Cinzel', serif; 
            font-weight: 800; font-size: 2rem; 
        }

        .seccion-titulo { 
            font-family: 'Cinzel', serif; color: var(--dorado-ucmi); 
            border-bottom: 1px solid rgba(197,160,89,0.3); 
            padding-bottom: 8px; margin: 25px 0 15px 0; font-size: 1.1rem; 
        }

        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; }

/* ============================================================
   ESTILOS DE CAMPOS TRANSPARENTES (ACTIVOS Y PASIVOS)
   ============================================================ */

.form-control, .form-select { 
    border-radius: 10px; 
    /* Fondo transparente con un toque de brillo blanco muy leve */
    background: rgba(255, 255, 255, 0.05) !important; 
    color: #ffffff !important; 
    border: 1px solid rgba(255, 255, 255, 0.2); 
    transition: all 0.3s ease;
}

/* Evita que el campo se vuelva blanco al hacer clic (Focus) */
.form-control:focus, .form-select:focus { 
    background: rgba(255, 255, 255, 0.1) !important; /* Apenas un poco más claro para feedback visual */
    border-color: var(--dorado-ucmi) !important; 
    color: #ffffff !important;
    box-shadow: 0 0 15px rgba(197, 160, 89, 0.2); /* Brillo dorado suave en lugar de fondo sólido */
    outline: none;
}

/* IMPORTANTE: Forzar transparencia incluso en estados de autocompletado */
input:-webkit-autofill,
input:-webkit-autofill:hover, 
input:-webkit-autofill:focus, 
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 30px rgba(26, 42, 58, 0.9) inset !important; /* Color oscuro del fondo */
    -webkit-text-fill-color: white !important;
    transition: background-color 5000s ease-in-out 0s;
}

/* Para los selectores (dropdowns), forzamos que las opciones tengan fondo oscuro */
option {
    background-color: var(--azul-ucmi); 
    color: white;
}

        /* CORRECCIÓN DE COLOR PARA AUTOCOMPLETADO (image_1e9396.png) */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px rgba(25, 40, 55, 1) inset !important;
            -webkit-text-fill-color: white !important;
        }

        ::placeholder { color: rgba(255, 255, 255, 0.4) !important; font-size: 0.85rem; font-style: italic; }

        .btn-enviar { 
            background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); 
            color: #000; font-weight: 800; padding: 15px; 
            border-radius: 12px; border: none; width: 100%; 
            margin-top: 30px; transition: 0.3s; 
        }

        #bloqueRepresentante { 
            display: none; background: rgba(255, 77, 77, 0.05); 
            border: 1px solid rgba(255, 77, 77, 0.2); 
            padding: 20px; border-radius: 15px; 
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo UCMI" class="inst-logo">
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-2" novalidate>
            
            <div class="seccion-titulo">1. Datos de Identidad y Validación</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre Responsable:</label>
                    <input type="text" id="nombreInput" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">ID (Cédula/RIF):</label>
                    <input type="text" id="dniInput" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimientoInput" class="form-control" required onchange="fn_VerificarEdad()">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Género:</label>
                    <select id="generoInput" class="form-select" required>
                        <option value="" selected disabled>Seleccionar...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>
            </div>

            <div class="seccion-titulo">2. Datos de Acceso y Seguridad</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Correo Electrónico:</label>
                    <!-- autocomplete="off" para evitar lo visto en image_1e9396.png -->
                    <input type="email" id="emailInput" class="form-control" placeholder="usuario@ejemplo.com" autocomplete="off" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Contraseña de Acceso:</label>
                    <!-- autocomplete="new-password" para asegurar que nazca vacío -->
                    <input type="password" id="passInput" class="form-control" autocomplete="new-password" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Número de WhatsApp (2FA):</label>
                    <input type="tel" id="whatsappInput" class="form-control" placeholder="+58 412 0000000" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Ubicación (Ciudad y País):</label>
                    <input type="text" id="ubicacionInput" class="form-control" placeholder="Ej: Caracas, Venezuela" required>
                </div>
            </div>

            <div id="bloqueRepresentante" class="mt-4">
                <div class="seccion-titulo text-danger">3. Supervisión Legal (Requerido para Menores)</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-white">Nombre Completo del Representante:</label>
                        <input type="text" id="repNombre" class="form-control border-danger">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-white">Cédula del Representante:</label>
                        <input type="text" id="repCedula" class="form-control border-danger">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-white">Correo de Notificación:</label>
                        <input type="email" id="repEmail" class="form-control border-danger">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-white">WhatsApp del Representante:</label>
                        <input type="tel" id="repWhatsapp" class="form-control border-danger">
                    </div>
                </div>
            </div>

            <div class="seccion-titulo">4. Gestión de Licencias y Acceso Académico</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Perfil de Usuario:</label>
                    <select id="perfilUsuario" class="form-select" required onchange="fn_AjustarPerfil()">
                        <option value="Academia">Academia</option>
                        <option value="Independent Professor">Profesor independiente</option>
                        <option value="Estudiante UCMI">Estudiante UCMI</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Plan de Licencia:</label>
                    <input type="text" class="form-control" value="Semestral (6 meses) - $60" readonly>
                </div>
                <div class="col-md-12">
                    <label class="form-label fw-bold">Nombre de la Entidad:</label>
                    <input type="text" id="nombreInstitucion" class="form-control" placeholder="Nombre de la academia">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR Y GENERAR DOCUMENTO</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // LIMPIEZA FORZADA DE CAMPOS (image_1e9396.png)
    window.onload = () => {
        document.getElementById('emailInput').value = "";
        document.getElementById('passInput').value = "";
    };

    window.fn_VerificarEdad = () => {
        const fNac = new Date(document.getElementById('fechaNacimientoInput').value);
        const hoy = new Date();
        let edad = hoy.getFullYear() - fNac.getFullYear();
        if (hoy.getMonth() < fNac.getMonth() || (hoy.getMonth() === fNac.getMonth() && hoy.getDate() < fNac.getDate())) edad--;
        
        const bloque = document.getElementById('bloqueRepresentante');
        bloque.style.display = (edad < 18) ? 'block' : 'none';
    };

    window.fn_AjustarPerfil = () => {
        const p = document.getElementById('perfilUsuario').value;
        const campoInst = document.getElementById('nombreInstitucion');
        campoInst.placeholder = (p === 'Academia') ? "Nombre de la academia" : "Nombre del profesor / Particular";
    };

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;

        const payload = {
            nombreResponsable: document.getElementById('nombreInput').value,
            cedulaResponsable: document.getElementById('dniInput').value,
            emailUsuario: document.getElementById('emailInput').value,
            entidad: document.getElementById('nombreInstitucion').value || "Particular",
            perfil: document.getElementById('perfilUsuario').value,
            timestamp: new Date()
        };

        try {
            await addDoc(collection(db, "postulaciones"), payload);
            fn_GenerarPDF(payload);
            Swal.fire("Éxito", "Postulación enviada correctamente", "success");
        } catch (error) {
            Swal.fire("Error", "No se pudo conectar con Firebase", "error");
        } finally {
            btn.disabled = false;
        }
    });

    function fn_GenerarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.text("COMPROBANTE DE POSTULACIÓN UCMI", 105, 20, {align: "center"});
        doc.text(`Responsable: ${d.nombreResponsable}`, 20, 40);
        doc.text(`Perfil: ${d.perfil}`, 20, 50);
        window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
