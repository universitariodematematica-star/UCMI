<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { 
            --azul-ucmi: #1a2a3a; 
            --dorado-ucmi: #c5a059; 
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            min-height: 100vh; 
            padding: 40px 0; 
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
        
        .card-form { 
            max-width: 850px; 
            margin: auto; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
            overflow: visible; 
        }

        .header-institucional { 
            text-align: center; 
            padding: 40px 20px; 
            background: rgba(0, 0, 0, 0.3); 
            border-bottom: 1px solid rgba(197, 160, 89, 0.2); 
            border-top-left-radius: 30px; 
            border-top-right-radius: 30px; 
        }

        .inst-logo { height: 100px; margin-bottom: 15px; }
        .inst-titulo { color: var(--dorado-ucmi); font-family: 'Cinzel', serif; font-weight: 800; font-size: 2rem; }
        
        .seccion-titulo { 
            font-family: 'Cinzel', serif; 
            color: var(--dorado-ucmi); 
            border-bottom: 1px solid rgba(197,160,89,0.3); 
            padding-bottom: 8px; 
            margin: 25px 0 15px 0; 
            font-size: 1.1rem; 
        }

        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; }
        
        /* CAMPOS ESTILO CRISTAL Y LETRAS BLANCAS */
        .form-control, .form-select { 
            border-radius: 10px; 
            background: rgba(255, 255, 255, 0.08) !important; 
            color: #ffffff !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            transition: all 0.3s ease; 
        }
        
        .form-control:focus, .form-select:focus { 
            background: rgba(255, 255, 255, 0.15) !important; 
            border-color: var(--dorado-ucmi) !important; 
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.2); 
            color: #ffffff !important;
        }

        /* LETRAS GUÍA (PLACEHOLDERS) EN GRIS E ITALIKA */
        ::placeholder { 
            color: rgba(200, 200, 200, 0.6) !important; 
            font-size: 0.85rem; 
            font-style: italic !important; 
        }

        /* QUITAR CONTROLES DE SUBIR/BAJAR VALORES (FLECHAS) */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] { -moz-appearance: textfield; }

        option { background-color: #1a2a3a; color: white; }
        
        .costo-display {
            background: rgba(197, 160, 89, 0.1);
            border: 1px dashed var(--dorado-ucmi);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }

        .costo-monto { color: var(--dorado-ucmi); font-size: 1.8rem; font-weight: 800; }

        .btn-enviar { 
            background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); 
            color: #000; font-weight: 800; padding: 15px; 
            border-radius: 12px; border: none; width: 100%; 
            margin-top: 20px; cursor: pointer; 
            text-transform: uppercase;
        }

        #bloqueRepresentante { display: none; background: rgba(255, 77, 77, 0.05); border: 1px solid rgba(255, 77, 77, 0.2); padding: 20px; border-radius: 15px; }
        
        .form-check-input:checked { background-color: var(--dorado-ucmi); border-color: var(--dorado-ucmi); }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" alt="Logo UCMI" class="inst-logo">
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-2" novalidate>
            <div class="seccion-titulo">1. Datos de Identidad y Validación</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre Responsable:</label>
                    <input type="text" id="nombreInput" class="form-control" required placeholder="Nombres y Apellidos">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">ID (Cédula/RIF):</label>
                    <input type="text" id="dniInput" class="form-control" required placeholder="Documento de identidad">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimientoInput" class="form-control" required onchange="fn_VerificarEdad()">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Género:</label>
                    <select id="generoInput" class="form-select"> 
                        <option value="" selected>No especificado</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>
            </div>

            <div class="seccion-titulo">2. Datos de Acceso y Seguridad</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Correo Electrónico:</label>
                    <input type="email" id="emailInput" class="form-control" placeholder="usuario@ejemplo.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Número de WhatsApp (2FA):</label>
                    <input type="tel" id="whatsappInput" class="form-control" placeholder="+58 412 0000000" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Ubicación (Ciudad y País):</label>
                    <input type="text" id="ubicacionInput" class="form-control" placeholder="Ej: Caracas, Venezuela" required>
                </div>
            </div>

            <div id="bloqueRepresentante" class="mt-4">
                <div class="seccion-titulo text-danger">3. Supervisión Legal (Requerido para Menores)</div>
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label text-white">Nombre del Representante:</label><input type="text" id="repNombre" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label text-white">Cédula del Representante:</label><input type="text" id="repCedula" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label text-white">Correo de Notificación:</label><input type="email" id="repEmail" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label text-white">WhatsApp del Representante:</label><input type="tel" id="repWhatsapp" class="form-control"></div>
                </div>
            </div>

            <div class="seccion-titulo">4. Gestión de Licencias y Acceso Académico</div>
            
            <div class="col-12 mb-4">
                <label class="form-label fw-bold text-warning"><i class="bi bi-grid-3x3-gap me-2"></i>Selecciona los Módulos de Interés:</label>
                <div id="contenedorModulos" class="row g-2 p-3" style="background: rgba(0,0,0,0.2); border-radius: 15px; border: 1px solid rgba(197,160,89,0.1); min-height: 50px;">
                    <div class="col-12 text-center small text-white-50">Cargando módulos...</div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Perfil de Usuario:</label>
                    <select id="perfilUsuario" class="form-select" required onchange="fn_AjustarPerfil()">
                        <option value="">Selecciona el perfil</option>
                        <option value="Academia">Academia</option>
                        <option value="Profesor independiente">Profesor independiente</option>
                        <option value="Estudiante UCMI">Estudiante UCMI</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Plan de Licencia en meses:</label>
                    <input type="number" id="planLicencia" class="form-control" placeholder="Ej: 12" min="1" required oninput="fn_CalcularInversion()">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Cantidad de Estudiantes / Cupos:</label>
                    <input type="number" id="cuposInput" class="form-control" value="1" min="1" required oninput="fn_CalcularInversion()">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre de la Entidad:</label>
                    <input type="text" id="nombreInstitucion" class="form-control" placeholder="Nombre de la academia o particular">
                </div>
            </div>

            <div class="costo-display">
                <div class="small text-uppercase" style="letter-spacing: 2px;">Inversión Total Estimada</div>
                <div class="costo-monto">$ <span id="displayInversion">0.00</span> <small style="font-size: 1rem;">USD</small></div>
                <div id="ahorroDisplay" class="small fw-bold" style="color: #4ade80; display: none;">
                    <i class="bi bi-graph-up-arrow"></i> Ahorro aplicado: <span id="porcentajeAhorro">0</span>%
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR Y GENERAR COMPROBANTE</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(query(collection(db, "ofertas"), where("ofertado", "==", true)), (snap) => {
        const contenedor = document.getElementById('contenedorModulos');
        contenedor.innerHTML = "";
        
        if (snap.empty) {
            contenedor.innerHTML = "<div class='col-12 text-center small text-white-50'>No hay módulos disponibles.</div>";
            return;
        }

        snap.forEach(docSnap => {
            const datos = docSnap.data();
            const div = document.createElement('div');
            div.className = 'col-md-4 col-6 mb-2';
            div.innerHTML = `
                <div class="form-check">
                    <input class="form-check-input check-modulo" type="checkbox" 
                           value="${datos.modulo}" id="mod_${docSnap.id}" 
                           onchange="fn_CalcularInversion()">
                    <label class="form-check-label text-white small" for="mod_${docSnap.id}">
                        ${datos.modulo}
                    </label>
                </div>
            `;
            contenedor.appendChild(div);
        });
    });

    window.fn_CalcularInversion = () => {
        const perfil = document.getElementById('perfilUsuario').value;
        const cupos = parseInt(document.getElementById('cuposInput').value) || 0; 
        const meses = parseInt(document.getElementById('planLicencia').value) || 0;
        const nModulos = document.querySelectorAll('.check-modulo:checked').length;
        
        if (meses <= 0) return "0.00";

        let total = 0;
        let costoBasePuro = 10 * (perfil === 'Estudiante UCMI' ? nModulos : cupos) * meses;

        if (perfil === 'Estudiante UCMI') {
            let precioBaseMensual = 0;
            if (nModulos === 1) precioBaseMensual = 10;
            else if (nModulos === 2) precioBaseMensual = 18;
            else if (nModulos === 3) precioBaseMensual = 24;
            else if (nModulos >= 4) precioBaseMensual = 28;

            const factorTiempo = 0.7 + (0.3 / (1 + 0.15 * (meses - 1)));
            total = parseFloat((precioBaseMensual * meses * factorTiempo).toFixed(2));
        } else {
            if (cupos <= 0) return "0.00";
            let ix = 0;
            if (cupos <= 10) ix = 10 * cupos * (1 - (cupos - 1) / 90);
            else if (cupos <= 50) ix = 10 * cupos * (1 - (10 + 0.5 * (cupos - 10)) / 100);
            else if (cupos <= 200) ix = 10 * cupos * (1 - (30 + 0.1 * (cupos - 50)) / 100);
            else ix = (5 * cupos) + 100;

            const factorTiempo = 0.7 + (0.3 / (1 + 0.15 * (meses - 1)));
            total = parseFloat((ix * meses * factorTiempo).toFixed(2));
        }
        
        document.getElementById('displayInversion').innerText = total.toFixed(2);
        const ahorro = costoBasePuro > 0 ? Math.round(((costoBasePuro - total) / costoBasePuro) * 100) : 0;
        const displayAhorro = document.getElementById('ahorroDisplay');
        
        if (ahorro > 0) {
            document.getElementById('porcentajeAhorro').innerText = ahorro;
            displayAhorro.style.display = 'block';
        } else {
            displayAhorro.style.display = 'none';
        }

        return total.toFixed(2);
    };

    window.fn_AjustarPerfil = () => {
        const p = document.getElementById('perfilUsuario').value;
        const c = document.getElementById('cuposInput');
        if (p === 'Estudiante UCMI') {
            c.value = 1; c.readOnly = true; c.style.opacity = "0.6";
        } else {
            c.readOnly = false; c.style.opacity = "1";
        }
        fn_CalcularInversion();
    };

    window.fn_VerificarEdad = () => {
        const f = document.getElementById('fechaNacimientoInput').value;
        if(!f) return;
        const edad = new Date().getFullYear() - new Date(f).getFullYear();
        document.getElementById('bloqueRepresentante').style.display = (edad < 18) ? 'block' : 'none';
    };

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const modulos = Array.from(document.querySelectorAll('.check-modulo:checked')).map(cb => cb.value);

        if (!e.target.checkValidity() || (document.getElementById('perfilUsuario').value === 'Estudiante UCMI' && modulos.length === 0)) {
            Swal.fire("Atención", "Completa todos los campos y selecciona al menos un módulo.", "warning");
            return;
        }

        btn.disabled = true;
        const payload = {
            nombre: document.getElementById('nombreInput').value,
            email: document.getElementById('emailInput').value,
            dni: document.getElementById('dniInput').value,
            perfil: document.getElementById('perfilUsuario').value,
            modulos: modulos,
            inversion: document.getElementById('displayInversion').innerText,
            fecha: new Date()
        };

        try {
            await addDoc(collection(db, "postulaciones"), payload);
            Swal.fire("Éxito", "Postulación registrada correctamente", "success");
        } catch (err) {
            Swal.fire("Error", "No se pudo guardar la información", "error");
        } finally {
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
