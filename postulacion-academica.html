<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --azul-ucmi: #1a2a3a; 
            --dorado-ucmi: #c5a059; 
            --rojo-error: #ff4d4d;
            --blanco-suave: rgba(255, 255, 255, 0.9);
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px 0; 
            color: white;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
        .card-form { border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); max-width: 850px; margin: auto; overflow: hidden; }
        .header-institucional { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.3); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .inst-logo { height: 100px; filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.2)); margin-bottom: 15px; }
        .inst-nombre { font-family: 'Cinzel', serif; color: #f3f0df; font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; }
        .inst-titulo { color: var(--dorado-ucmi); font-weight: 800; font-size: 2rem; }
        
        .seccion-titulo { font-family: 'Cinzel', serif; color: var(--dorado-ucmi); border-bottom: 1px solid rgba(197,160,89,0.3); padding-bottom: 8px; margin: 25px 0 15px 0; font-size: 1.1rem; }
        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; cursor: help; }
        .form-control, .form-select { border-radius: 10px; padding: 10px; background: rgba(255, 255, 255, 0.08); color: white; border: 1px solid rgba(255, 255, 255, 0.2); }
        .form-control:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--dorado-ucmi); color: white; box-shadow: 0 0 10px rgba(197, 160, 89, 0.3); }
        
        .program-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 12px; border: none; width: 100%; margin-top: 30px; transition: 0.3s; }
        
        #bloqueRepresentante { display: none; background: rgba(255, 77, 77, 0.05); border: 1px solid rgba(255, 77, 77, 0.2); padding: 20px; border-radius: 15px; animation: slideIn 0.4s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="card-form shadow-lg">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo UCMI" class="inst-logo">
            <div class="inst-nombre">Universitario de Ciencias Matemáticas e Idiomas</div>
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-2" novalidate>
            <!-- SELECCIÓN DE PERFIL -->
            <div class="mb-4">
                <label class="form-label fw-bold"><i class="bi bi-person-badge me-2"></i>Tipo de Postulante:</label>
                <select class="form-select form-select-lg" id="perfilPrincipal" required onchange="gestionarFlujo()">
                    <option value="" selected disabled>Seleccione su perfil...</option>
                    <option value="Academia">Academia / Institución</option>
                    <option value="Independiente">Profesor Independiente</option>
                    <option value="Estudiante UCMI">Estudiante UCMI</option>
                </select>
            </div>

            <div id="subSeccionProfesor" class="mb-4" style="display:none;">
                <label class="form-label fw-bold">Modalidad:</label>
                <select class="form-select" id="subTipoProfesor">
                    <option value="Profesor Independiente" selected>Profesor Independiente (Gestión Directa)</option>
                    <option value="Profesor Embajador">Profesor Embajador (Marca Blanca)</option>
                </select>
            </div>

            <div id="cuerpoFormulario" style="display: none;">
                
                <!-- BLOQUE 1: IDENTIDAD -->
                <div class="seccion-titulo">1. Datos de Identidad y Validación de Existencia</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold" title="Para la personalización del entorno de aprendizaje e identificación en listas."><i class="bi bi-person me-1"></i>Nombre(s) y Apellido(s):</label>
                        <input type="text" id="nombreInput" class="form-control" placeholder="Nombre Completo" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" title="Clave de validación de existencia legal del sujeto."><i class="bi bi-card-heading me-1"></i>ID (Cédula/Pasaporte/RIF):</label>
                        <input type="text" id="dniInput" class="form-control" placeholder="Número de Identificación" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" title="Determina capacidad legal y activa protocolos para menores."><i class="bi bi-calendar-event me-1"></i>Fecha de Nacimiento:</label>
                        <input type="date" id="fechaNacimientoInput" class="form-control" required onchange="verificarEdad()">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" title="Requerido para concordancia gramatical en reportes."><i class="bi bi-gender-ambiguous me-1"></i>Género:</label>
                        <select id="generoInput" class="form-select" required>
                            <option value="" selected disabled>Seleccione...</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                        </select>
                    </div>
                </div>

                <!-- BLOQUE 2: ACCESO Y CONTACTO -->
                <div class="seccion-titulo">2. Datos de Acceso y Contacto Técnico</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold" title="Identificador único (UID) para el login."><i class="bi bi-envelope me-1"></i>Correo Electrónico:</label>
                        <input type="email" id="emailInput" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" title="Definida para su perfil de acceso inmediato."><i class="bi bi-key me-1"></i>Contraseña:</label>
                        <input type="password" id="passInput" class="form-control" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" title="Para notificaciones y validaciones 2FA."><i class="bi bi-whatsapp me-1"></i>WhatsApp:</label>
                        <input type="text" id="whatsappInput" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold" title="Cumplimiento de normativas locales de protección de datos."><i class="bi bi-geo-alt me-1"></i>Ciudad y País:</label>
                        <input type="text" id="ubicacionInput" class="form-control" required>
                    </div>
                </div>

                <!-- BLOQUE 3: REPRESENTANTE LEGAL (CONDICIONAL) -->
                <div id="bloqueRepresentante">
                    <div class="seccion-titulo text-danger">3. Bloque del Representante Legal (Requerido)</div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold text-white">Nombre del Representante:</label>
                            <input type="text" id="repNombre" class="form-control border-danger">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold text-white">Cédula Representante:</label>
                            <input type="text" id="repCedula" class="form-control border-danger">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold text-white">Correo Notificación:</label>
                            <input type="email" id="repEmail" class="form-control border-danger">
                        </div>
                    </div>
                </div>

                <!-- BLOQUE 4: GESTIÓN DE LICENCIAS -->
                <div class="seccion-titulo">4. Gestión de Licencias e Inventario</div>
                <div id="camposAcademia" class="mb-3" style="display:none;">
                    <div class="row g-3">
                        <div class="col-md-8"><label class="form-label fw-bold">Nombre de Institución / Academia:</label><input type="text" id="entidadInput" class="form-control"></div>
                        <div class="col-md-4"><label class="form-label fw-bold">Cupos Iniciales:</label><input type="number" id="cuposInput" class="form-control" min="1"></div>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="form-label fw-bold text-uppercase small">Ramas Académicas Habilitadas</label>
                    <div class="program-grid mb-3" id="gridProgramas">
                        <div class="text-center w-100 py-2"><div class="spinner-border spinner-border-sm text-warning"></div></div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Duración de la Licencia (Meses):</label>
                    <input type="number" id="mesesInput" class="form-control" required min="1" value="6">
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR POSTULACIÓN Y CREAR PERFIL</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function cargarOfertas() {
        const grid = document.getElementById('gridProgramas');
        try {
            const q = query(collection(db, "ofertas"), where("ofertado", "==", true), orderBy("modulo", "asc"));
            const snap = await getDocs(q);
            grid.innerHTML = ""; 
            snap.forEach(doc => {
                const mod = doc.data().modulo;
                grid.innerHTML += `<div class="form-check"><input class="form-check-input prog-check" type="checkbox" value="${mod}" id="chk_${doc.id}"><label class="form-check-label small text-white" for="chk_${doc.id}">${mod}</label></div>`;
            });
        } catch (e) { grid.innerHTML = "<small class='text-danger'>Error de conexión</small>"; }
    }
    cargarOfertas();

    window.verificarEdad = () => {
        const fechaNac = new Date(document.getElementById('fechaNacimientoInput').value);
        const hoy = new Date();
        let edad = hoy.getFullYear() - fechaNac.getFullYear();
        const m = hoy.getMonth() - fechaNac.getMonth();
        if (m < 0 || (m === 0 && hoy.getDate() < fechaNac.getDate())) edad--;
        
        const bloqueRep = document.getElementById('bloqueRepresentante');
        if (edad < 18) {
            bloqueRep.style.display = 'block';
            document.getElementById('repNombre').required = true;
            document.getElementById('repCedula').required = true;
            document.getElementById('repEmail').required = true;
        } else {
            bloqueRep.style.display = 'none';
            document.getElementById('repNombre').required = false;
        }
    };

    window.gestionarFlujo = () => {
        const principal = document.getElementById('perfilPrincipal').value;
        document.getElementById('cuerpoFormulario').style.display = 'block';
        document.getElementById('subSeccionProfesor').style.display = (principal === 'Independiente') ? 'block' : 'none';
        
        const camposAcademia = document.getElementById('camposAcademia');
        if (principal === 'Academia' || principal === 'Independiente') {
            camposAcademia.style.display = 'block';
            document.getElementById('entidadInput').required = true;
        } else {
            camposAcademia.style.display = 'none';
            document.getElementById('entidadInput').required = false;
        }
    };

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const checks = document.querySelectorAll('.prog-check:checked');

        if (!form.checkValidity() || checks.length === 0) {
            form.classList.add('was-validated');
            return Swal.fire("Atención", "Complete todos los campos y seleccione al menos un programa.", "warning");
        }

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "Registrando Sujeto...";

        const principal = document.getElementById('perfilPrincipal').value;
        const subValor = document.getElementById('subTipoProfesor').value;
        const tipoFinal = (principal === 'Independiente') ? subValor : principal;

        const datos = {
            uid_email: document.getElementById('emailInput').value,
            password_setup: "Hasheado en Servidor", // Simulación para el PDF
            nombreResponsable: document.getElementById('nombreInput').value,
            identificacion: document.getElementById('dniInput').value,
            fechaNacimiento: document.getElementById('fechaNacimientoInput').value,
            genero: document.getElementById('generoInput').value,
            whatsapp: document.getElementById('whatsappInput').value,
            ubicacion: document.getElementById('ubicacionInput').value,
            perfil_usuario: tipoFinal,
            tenant_id: (principal === 'Estudiante UCMI') ? "UCMI-DIRECT-ID" : "OWNER-ID",
            representante: {
                nombre: document.getElementById('repNombre').value || "N/A",
                cedula: document.getElementById('repCedula').value || "N/A"
            },
            inventario_ramas: Array.from(checks).map(c => c.value).join(", "),
            duracion_meses: document.getElementById('mesesInput').value,
            cupos_iniciales: document.getElementById('cuposInput').value || "1",
            fecha_registro: new Date().toLocaleString()
        };

        try {
            await addDoc(collection(db, "postulaciones"), datos);
            generarPDF(datos);
            Swal.fire("Éxito", "Postulante registrado en el ecosistema AGEM.", "success");
            setTimeout(() => location.reload(), 3000);
        } catch (err) { 
            Swal.fire("Error", "Fallo de red.", "error"); 
            btn.disabled = false;
        }
    });

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(26, 42, 58); doc.rect(0, 0, 210, 40, 'F');
        doc.addImage("https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png", 'PNG', 15, 5, 30, 30);
        doc.setTextColor(197, 160, 89); doc.setFontSize(18); doc.text("PROTOCOLO DE POSTULACIÓN UCMI", 115, 20, {align: "center"});
        
        doc.setTextColor(40, 40, 40); doc.setFontSize(10);
        doc.text(`UID Control: ${d.uid_email}`, 20, 50);
        doc.text(`Fecha: ${d.fecha_registro}`, 140, 50);
        doc.line(20, 55, 190, 55);

        let y = 65;
        const row = (t, v) => {
            doc.setFont("helvetica", "bold"); doc.text(t, 25, y);
            doc.setFont("helvetica", "normal"); doc.text(String(v), 80, y);
            y += 10;
        };

        row("SUJETO:", d.nombreResponsable);
        row("IDENTIFICACIÓN:", d.identificacion);
        row("NACIMIENTO:", d.fechaNacimiento);
        row("GÉNERO:", d.genero);
        row("WHATSAPP:", d.whatsapp);
        row("UBICACIÓN:", d.ubicacion);
        row("PERFIL:", d.perfil_usuario);
        row("REPRESENTANTE:", d.representante.nombre);
        row("CUPOS:", d.cupos_iniciales);
        row("PROGRAMAS:", d.inventario_ramas);

        doc.setFontSize(8); doc.text("Documento con validez tecnológica para la plataforma AGEM - UCMI", 105, 280, {align: "center"});
        window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
