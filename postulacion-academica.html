<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --azul-ucmi: #1a2a3a; --dorado-ucmi: #c5a059; }
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; padding: 40px 0; color: white;
            font-family: 'Poppins', sans-serif;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
        .card-form { max-width: 850px; margin: auto; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden; }
        .header-institucional { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .inst-logo { height: 100px; margin-bottom: 15px; }
        .inst-titulo { color: var(--dorado-ucmi); font-family: 'Cinzel', serif; font-weight: 800; font-size: 2rem; }
        .seccion-titulo { font-family: 'Cinzel', serif; color: var(--dorado-ucmi); border-bottom: 1px solid rgba(197,160,89,0.3); padding-bottom: 8px; margin: 25px 0 15px 0; font-size: 1.1rem; }
        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; font-weight: 600; }

        /* --- FIX PARA CAMPOS BLANCOS (AUTOCOMPLETE) --- */
        .form-control, .form-select { 
            border-radius: 10px; 
            background: rgba(255, 255, 255, 0.05) !important; 
            color: #ffffff !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
        }

        /* Esta es la magia para Google Chrome y Edge */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus,
        textarea:-webkit-autofill,
        textarea:-webkit-autofill:hover,
        textarea:-webkit-autofill:focus,
        select:-webkit-autofill,
        select:-webkit-autofill:hover,
        select:-webkit-autofill:focus {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0px 1000px rgba(30, 30, 30, 0.9) inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .costo-display { background: rgba(197, 160, 100, 0.15); border: 1px dashed var(--dorado-ucmi); border-radius: 15px; padding: 20px; text-align: center; margin-top: 20px; }
        .costo-monto { color: var(--dorado-ucmi); font-size: 1.8rem; font-weight: 800; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 12px; border: none; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn-enviar:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" alt="Logo UCMI" class="inst-logo">
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
        </div>
        <form id="formUCMI" class="p-4 p-md-5 pt-2" novalidate>
            <div class="seccion-titulo">1. Datos de Identidad</div>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Nombre Responsable:</label><input type="text" id="nombreInput" class="form-control" required autocomplete="off"></div>
                <div class="col-md-6"><label class="form-label">ID (Cédula/RIF):</label><input type="text" id="dniInput" class="form-control" required autocomplete="off"></div>
                <div class="col-md-6"><label class="form-label">Fecha de Nacimiento:</label><input type="date" id="fechaNacimientoInput" class="form-control" required onchange="fn_VerificarEdad()"></div>
                <div class="col-md-6"><label class="form-label">Género:</label><select id="generoInput" class="form-select" required><option value="">Selecciona...</option><option value="Masculino">Masculino</option><option value="Femenino">Femenino</option></select></div>
            </div>

            <div class="seccion-titulo">2. Contacto</div>
            <div class="row g-3">
                <div class="col-md-4"><label class="form-label">Correo:</label><input type="email" id="emailInput" class="form-control" required autocomplete="off"></div>
                <div class="col-md-4"><label class="form-label">WhatsApp:</label><input type="tel" id="whatsappInput" class="form-control" required autocomplete="off"></div>
                <div class="col-md-4"><label class="form-label">Ubicación:</label><input type="text" id="ubicacionInput" class="form-control" required autocomplete="off"></div>
            </div>

            <div id="bloqueRepresentante" class="mt-4" style="display:none">
                <div class="seccion-titulo text-danger">3. Representante Legal</div>
                <div class="row g-3">
                    <div class="col-md-6"><input type="text" id="repNombre" class="form-control" placeholder="Nombre Rep."></div>
                    <div class="col-md-6"><input type="text" id="repCedula" class="form-control" placeholder="ID Rep."></div>
                </div>
            </div>

            <div class="seccion-titulo">4. Módulos y Licencia</div>
            <div id="contenedorModulos" class="row g-2 mb-3"></div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Perfil:</label>
                    <select id="perfilUsuario" class="form-select" required onchange="fn_AjustarPerfil()">
                        <option value="">Selecciona...</option>
                        <option value="Academia">Academia</option>
                        <option value="Profesor independiente">Profesor independiente</option>
                        <option value="Estudiante UCMI">Estudiante UCMI</option>
                    </select>
                </div>
                <div class="col-md-6"><label class="form-label">Meses:</label><input type="number" id="planLicencia" class="form-control" min="1" required oninput="fn_CalcularInversion()"></div>
                <div class="col-md-6"><label class="form-label">Cupos:</label><input type="number" id="cuposInput" class="form-control" value="1" min="1" oninput="fn_CalcularInversion()"></div>
                <div class="col-md-6"><label class="form-label">Entidad:</label><input type="text" id="nombreInstitucion" class="form-control"></div>
            </div>

            <div class="costo-display">
                <div class="costo-monto">$ <span id="displayInversion">0.00</span> USD</div>
            </div>
            <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR POSTULACIÓN</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Asegúrate de agregar orderBy en la línea de importaciones de firestore
import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// Y cambia la consulta así:
onSnapshot(query(collection(db, "ofertas"), where("ofertado", "==", true), orderBy("modulo", "asc")), (snap) => {
        const contenedor = document.getElementById('contenedorModulos');
        contenedor.innerHTML = "";
        snap.forEach(docSnap => {
            const d = docSnap.data();
            contenedor.innerHTML += `<div class="col-4 small"><input type="checkbox" class="check-modulo" value="${d.modulo}" onchange="fn_CalcularInversion()"> ${d.modulo}</div>`;
        });
    });

    window.fn_CalcularInversion = () => {
        const p = document.getElementById('perfilUsuario').value;
        const x = parseInt(document.getElementById('cuposInput').value) || 0;
        const t = parseInt(document.getElementById('planLicencia').value) || 0;
        const n = document.querySelectorAll('.check-modulo:checked').length;
        let total = 0;

        if(t > 0) {
            const ft = 0.7 + (0.3 / (1 + 0.15 * (t - 1)));
            if(p === 'Estudiante UCMI') {
                let pb = n==1?10 : n==2?18 : n==3?24 : n>=4?28 : 0;
                total = pb * t * ft;
            } else if(x > 0) {
                let ix = x<=10? 10*x*(1-(x-1)/90) : x<=50? 10*x*(1-(10+0.5*(x-10))/100) : (5*x)+100;
                total = ix * t * ft;
            }
        }
        document.getElementById('displayInversion').innerText = total.toFixed(2);
    };

    window.fn_AjustarPerfil = () => {
        const p = document.getElementById('perfilUsuario').value;
        const c = document.getElementById('cuposInput');
        const e = document.getElementById('nombreInstitucion');
        e.required = (p === 'Academia');
        if(p === 'Estudiante UCMI') { c.value = 1; c.readOnly = true; e.required = false; }
        else { c.readOnly = false; }
        fn_CalcularInversion();
    };

    window.fn_VerificarEdad = () => {
        const f = document.getElementById('fechaNacimientoInput').value;
        if(!f) return;
        const edad = new Date().getFullYear() - new Date(f).getFullYear();
        document.getElementById('bloqueRepresentante').style.display = edad < 18 ? 'block' : 'none';
    };

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const modulos = Array.from(document.querySelectorAll('.check-modulo:checked')).map(m => m.value);
        if(!e.target.checkValidity() || modulos.length === 0) {
            Swal.fire("Error", "Completa todos los datos y selecciona al menos un módulo", "error");
            return;
        }

        const payload = {
            nombre: document.getElementById('nombreInput').value,
            dni: document.getElementById('dniInput').value,
            fechaNacimiento: document.getElementById('fechaNacimientoInput').value,
            genero: document.getElementById('generoInput').value,
            email: document.getElementById('emailInput').value,
            whatsapp: document.getElementById('whatsappInput').value,
            ubicacion: document.getElementById('ubicacionInput').value,
            perfil: document.getElementById('perfilUsuario').value,
            meses: document.getElementById('planLicencia').value,
            cupos: document.getElementById('cuposInput').value,
            entidad: document.getElementById('nombreInstitucion').value || "Particular",
            total: document.getElementById('displayInversion').innerText,
            modulos,
            timestamp: new Date()
        };

        try {
            await addDoc(collection(db, "postulaciones"), payload);
            fn_GenerarPDF(payload);
            Swal.fire("¡Listo!", "Tu postulación ha sido enviada con éxito.", "success");
            e.target.reset();
        } catch(err) { Swal.fire("Error", "Hubo un problema al conectar con el servidor.", "error"); }
    });

    function fn_GenerarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(26, 42, 58); doc.rect(0,0,210,40,'F');
        doc.setTextColor(197, 160, 89); doc.setFontSize(18); doc.text("UCMI - COMPROBANTE DE REGISTRO", 20, 25);
        
        doc.setTextColor(0); doc.setFontSize(10);
        let y = 50;
        const row = (t, v) => { doc.setFont("helvetica","bold"); doc.text(t, 20, y); doc.setFont("helvetica","normal"); doc.text(v, 75, y); y+=8; };
        
        row("Postulante:", d.nombre.toUpperCase());
        row("Documento:", d.dni);
        row("Nacimiento:", d.fechaNacimiento);
        row("Género:", d.genero);
        row("Correo:", d.email);
        row("WhatsApp:", d.whatsapp);
        row("Ubicación:", d.ubicacion);
        row("Perfil Académico:", d.perfil);
        row("Duración Solicitada:", d.meses + " meses");
        row("Institución/Entidad:", d.entidad);
        row("Módulos Seleccionados:", d.modulos.join(", "));
        
        y+=10;
        doc.setFillColor(245, 245, 245); doc.rect(20, y-5, 170, 15, 'F');
        doc.setFontSize(12); doc.setFont("helvetica","bold");
        doc.text(`INVERSIÓN TOTAL ESTIMADA: $${d.total} USD`, 25, y+5);
        
        window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
