<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    
    <!-- LIBRERÍAS EXTERNAS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* ============================================================
           SECCIÓN I: VARIABLES Y ATMÓSFERA (COLORES Y FONDO)
           ============================================================ */
        :root { 
            --azul-ucmi: #1a2a3a;   /* Color base institucional */
            --dorado-ucmi: #c5a059; /* Color de realce y autoridad */
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            padding: 40px 0; 
            color: white;
        }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); 
            z-index: -1; 
        }

        /* ============================================================
           SECCIÓN II: ESTRUCTURA DEL CONTENEDOR (TAMAÑOS Y BORDES)
           ============================================================ */
        .card-form { 
            max-width: 850px; /* Tamaño máximo del formulario */
            margin: auto; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; /* Redondeado de esquinas */
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); /* Efecto cristal esmerilado */
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden; 
        }

        .header-institucional { 
            text-align: center; padding: 40px 20px; 
            background: rgba(0, 0, 0, 0.3); 
            border-bottom: 1px solid rgba(197, 160, 89, 0.2); 
        }

        .inst-logo { height: 100px; margin-bottom: 15px; }

        .inst-titulo { 
            color: var(--dorado-ucmi); 
            font-family: 'Cinzel', serif; /* Estilo de letra */
            font-weight: 800; font-size: 2rem; 
        }

        /* ============================================================
           SECCIÓN III: ELEMENTOS DE ENTRADA (DISEÑO DE INPUTS)
           ============================================================ */
        .seccion-titulo { 
            font-family: 'Cinzel', serif; color: var(--dorado-ucmi); 
            border-bottom: 1px solid rgba(197,160,89,0.3); 
            padding-bottom: 8px; margin: 25px 0 15px 0; font-size: 1.1rem; 
        }

        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; }

        .form-control, .form-select { 
            border-radius: 10px; 
            background: rgba(255, 255, 255, 0.08); 
            color: #ffffff !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
        }

        .form-control:focus { 
            background: rgba(255, 255, 255, 0.15); 
            border-color: var(--dorado-ucmi); 
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.3); 
        }

        .btn-enviar { 
            background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); 
            color: #000; font-weight: 800; padding: 15px; 
            border-radius: 12px; border: none; width: 100%; 
            margin-top: 30px; transition: 0.3s; 
        }

        #bloqueRepresentante { 
            display: none; background: rgba(255, 77, 77, 0.05); 
            border: 1px solid rgba(255, 77, 77, 0.2); 
            padding: 20px; border-radius: 15px; 
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="card-form">
        <!-- CABECERA -->
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo UCMI" class="inst-logo">
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-2" novalidate>
            
            <!-- SUBSECCIÓN: IDENTIDAD -->
            <div class="seccion-titulo">1. Datos de Identidad y Validación</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre Responsable:</label>
                    <input type="text" id="nombreInput" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">ID (Cédula/RIF):</label>
                    <input type="text" id="dniInput" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimientoInput" class="form-control" required onchange="fn_VerificarEdad()">
                </div>
            </div>

            <!-- SUBSECCIÓN: ACCESO -->
            <div class="seccion-titulo">2. Datos de Acceso Técnico</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Correo Electrónico:</label>
                    <input type="email" id="emailInput" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Contraseña:</label>
                    <input type="password" id="passInput" class="form-control" required>
                </div>
            </div>

            <!-- SUBSECCIÓN: MENORES (DINÁMICA) -->
            <div id="bloqueRepresentante" class="mt-4">
                <div class="seccion-titulo text-danger">3. Representante Legal</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-white">Nombre Representante:</label>
                        <input type="text" id="repNombre" class="form-control border-danger">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-white">Cédula Representante:</label>
                        <input type="text" id="repCedula" class="form-control border-danger">
                    </div>
                </div>
            </div>

            <!-- SUBSECCIÓN: LICENCIAS -->
            <div class="seccion-titulo">4. Gestión de Licencias</div>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Perfil de Usuario:</label>
                    <select id="perfilUsuario" class="form-select" required onchange="fn_AjustarPerfil()">
                        <option value="" selected disabled>Seleccionar...</option>
                        <option value="Academia">Academia</option>
                        <option value="Independent Professor">Independent Professor</option>
                        <option value="Estudiante UCMI">Estudiante UCMI</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Entidad (Academia):</label>
                    <input type="text" id="nombreInstitucion" class="form-control" placeholder="Nombre de la institución">
                </div>
            </div>

            <!-- SUBSECCIÓN: INVENTARIO -->
            <div class="mb-4">
                <label class="form-label fw-bold text-uppercase small">Inventario de Ramas Habilitadas</label>
                <div class="row g-2" id="gridModulos">
                    <!-- Cargado dinámicamente por JS -->
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR Y GENERAR DOCUMENTO</button>
        </form>
    </div>
</div>

<script type="module">
    /* ============================================================
       SECCIÓN IV: LÓGICA Y FUNCIONES (FIREBASE & UI)
       ============================================================ */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- SUBSECCIÓN: FUNCIONES DE INTERFAZ (UI) ---

    // Función para validar edad y mostrar bloque de representante
    window.fn_VerificarEdad = () => {
        const fNac = new Date(document.getElementById('fechaNacimientoInput').value);
        const hoy = new Date();
        let edad = hoy.getFullYear() - fNac.getFullYear();
        if (hoy.getMonth() < fNac.getMonth() || (hoy.getMonth() === fNac.getMonth() && hoy.getDate() < fNac.getDate())) edad--;
        
        const bloque = document.getElementById('bloqueRepresentante');
        bloque.style.display = (edad < 18) ? 'block' : 'none';
        bloque.querySelectorAll('input').forEach(i => i.required = (edad < 18));
    };

    // Función para ajustar campos según el perfil seleccionado
    window.fn_AjustarPerfil = () => {
        const p = document.getElementById('perfilUsuario').value;
        const campoInst = document.getElementById('nombreInstitucion');
        campoInst.disabled = (p !== 'Academia');
        if(p !== 'Academia') campoInst.value = "N/A";
    };

    // --- SUBSECCIÓN: LÓGICA DE DATOS (FIREBASE) ---

    // Cargar módulos desde la base de datos
    async function fn_CargarInventario() {
        const grid = document.getElementById('gridModulos');
        const q = query(collection(db, "ofertas"), where("ofertado", "==", true));
        const snap = await getDocs(q);
        grid.innerHTML = "";
        snap.forEach(doc => {
            const data = doc.data();
            grid.innerHTML += `
                <div class="col-md-6">
                    <div class="modulo-item" style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid rgba(197, 160, 89, 0.2);">
                        <div class="form-check">
                            <input class="form-check-input mod-check" type="checkbox" value="${data.modulo}" id="${doc.id}">
                            <label class="form-check-label small" for="${doc.id}"><strong>${data.modulo}</strong></label>
                        </div>
                    </div>
                </div>`;
        });
    }

    // --- SUBSECCIÓN: SALIDA DE DATOS (PDF & SUBMIT) ---

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;

        // Mapeo de variables según tus instrucciones
        const payload = {
            nombreResponsable: document.getElementById('nombreInput').value,
            cedulaResponsable: document.getElementById('dniInput').value,
            nombreRepresentante: document.getElementById('repNombre').value || "N/A",
            emailRepresentante: document.getElementById('repEmail')?.value || "N/A",
            cedulaRepresentante: document.getElementById('repCedula').value || "N/A",
            entidad: document.getElementById('nombreInstitucion').value || "Particular",
            perfil: document.getElementById('perfilUsuario').value,
            modulos: Array.from(document.querySelectorAll('.mod-check:checked')).map(c => c.value),
            timestamp: new Date()
        };

        try {
            await addDoc(collection(db, "postulaciones"), payload);
            fn_GenerarPDF(payload);
            Swal.fire("Éxito", "Postulación enviada correctamente", "success");
        } catch (error) {
            Swal.fire("Error", "No se pudo conectar con Firebase", "error");
        } finally {
            btn.disabled = false;
        }
    });

    function fn_GenerarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.text("COMPROBANTE DE POSTULACIÓN UCMI", 105, 20, {align: "center"});
        doc.setFont("helvetica", "normal");
        doc.text(`Responsable: ${d.nombreResponsable}`, 20, 40);
        doc.text(`Perfil: ${d.perfil}`, 20, 50);
        doc.text(`Entidad: ${d.entidad}`, 20, 60);
        doc.text(`Módulos habilitados: ${d.modulos.join(", ")}`, 20, 70);
        window.open(doc.output('bloburl'), '_blank');
    }

    fn_CargarInventario();
</script>
</body>
</html>
