<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --azul-ucmi: #1a2a3a; --dorado-ucmi: #c5a059; }
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; padding: 40px 0; color: white;
            font-family: 'Poppins', sans-serif;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
        .card-form { max-width: 850px; margin: auto; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden; }
        .header-institucional { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .inst-logo { height: 100px; margin-bottom: 15px; }
        .inst-titulo { color: var(--dorado-ucmi); font-family: 'Cinzel', serif; font-weight: 800; font-size: 2rem; }
        .seccion-titulo { font-family: 'Cinzel', serif; color: var(--dorado-ucmi); border-bottom: 1px solid rgba(197,160,89,0.3); padding-bottom: 8px; margin: 25px 0 15px 0; font-size: 1.1rem; }
        
        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; font-weight: 600; }
        .form-control, .form-select { 
            border-radius: 10px; background: rgba(255, 255, 255, 0.08) !important; backdrop-filter: blur(12px); color: white !important; border: 1px solid rgba(255, 255, 255, 0.2); 
        }
        .form-control:focus { border-color: var(--dorado-ucmi); box-shadow: 0 0 10px rgba(197,160,89,0.2); }
        .form-select option { background: #1a2a3a; color: white; }

        .costo-display { background: rgba(197, 160, 100, 0.15); border: 1px dashed var(--dorado-ucmi); border-radius: 15px; padding: 20px; text-align: center; margin-top: 20px; }
        .costo-monto { color: var(--dorado-ucmi); font-size: 1.8rem; font-weight: 800; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 12px; border: none; width: 100%; margin-top: 20px; }
        
        .btn-neon-red { background: transparent; border: 2px solid #ff003c; color: #ff003c; padding: 10px 20px; border-radius: 8px; font-weight: 700; transition: 0.3s; }
        .btn-neon-red:hover { background: #ff003c; color: white; }
        .btn-neon-green { background: transparent; border: 2px solid #00ff94; color: #00ff94; padding: 10px 20px; border-radius: 8px; font-weight: 700; transition: 0.3s; }
        .btn-neon-green:hover { background: #00ff94; color: #1a2a3a; }
        
        .modal-body p { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" alt="Logo UCMI" class="inst-logo">
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA 6</h1>
        </div>
        <form id="formUCMI" class="p-4 p-md-5 pt-2">
            <div class="seccion-titulo">1. Datos de Identidad</div>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Nombre del Aspirante:</label><input type="text" id="nombreInput" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">ID (Cédula/DNI):</label><input type="text" id="dniInput" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Fecha de Nacimiento:</label><input type="date" id="fechaNacimientoInput" class="form-control" required onchange="fn_VerificarEdad()"></div>
                <div class="col-md-6">
                    <label class="form-label">Género:</label>
                    <select id="generoInput" class="form-select" required>
                        <option value="">Selecciona...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div id="seccionMenor" class="col-12 d-none">
                    <hr class="border-secondary">
                    <p class="text-warning mb-0"><i class="bi bi-exclamation-triangle"></i> Aspirante menor de edad.</p>
                </div>
            </div>

            <div class="seccion-titulo">2. Contacto</div>
            <div class="row g-3">
                <div class="col-md-4"><label class="form-label">Correo:</label><input type="email" id="emailInput" class="form-control" required></div>
                <div class="col-md-4"><label class="form-label">WhatsApp:</label><input type="tel" id="whatsappInput" class="form-control" required></div>
                <div class="col-md-4"><label class="form-label">Ubicación:</label><input type="text" id="ubicacionInput" class="form-control" required></div>
            </div>

            <div id="bloqueRepresentante" class="mt-3" style="display:none">
                <div class="seccion-titulo text-danger">3. Representante Legal</div>
                <div class="row g-3">
                    <div class="col-md-6"><input type="text" id="repNombre" class="form-control" placeholder="Nombre Rep."></div>
                    <div class="col-md-6"><input type="text" id="repCedula" class="form-control" placeholder="ID Rep."></div>
                </div>
            </div>

            <div class="seccion-titulo">4. Configuración de Licencia</div>
            <div id="contenedorModulos" class="row g-2 mb-3"></div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Perfil:</label>
                    <select id="perfilUsuario" class="form-select" required onchange="fn_AjustarPerfil()">
                        <option value="">Selecciona...</option>
                        <option value="Academia">Academia</option>
                        <option value="Profesor independiente">Profesor independiente</option>
                        <option value="Estudiante UCMI">Estudiante UCMI</option>
                    </select>
                </div>
                <div class="col-md-6"><label class="form-label">Meses:</label><input type="number" id="planLicencia" class="form-control" min="1" required oninput="fn_CalcularInversion()"></div>
                <div class="col-md-6"><label class="form-label">Cupos:</label><input type="number" id="cuposInput" class="form-control" value="1" min="1" oninput="fn_CalcularInversion()"></div>
                <div class="col-md-6"><label class="form-label">Institución:</label><input type="text" id="nombreInstitucion" class="form-control" placeholder="Nombre de entidad"></div>
            </div>

            <div class="costo-display">
                <div class="costo-monto">$ <span id="displayInversion">0.00</span> USD</div>
            </div>
            <button type="submit" class="btn btn-enviar">ENVIAR POSTULACIÓN</button>
        </form>
    </div>
</div>

<!-- MODAL DE RESUMEN COMPLETO -->
<div class="modal fade" id="modalPreview" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" style="background: #0d141d; border: 1px solid var(--dorado-ucmi); border-radius: 20px;">
            <div class="modal-header border-0"><h5 class="inst-titulo" style="font-size: 1.4rem;">VERIFIQUE SUS DATOS</h5></div>
            <div class="modal-body" id="previewContent"></div>
            <div class="modal-footer border-0">
                <button type="button" class="btn-neon-red" data-bs-dismiss="modal">EDITAR</button>
                <button type="button" id="confirmarEnvio" class="btn-neon-green">CONFIRMAR REGISTRO</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let datosTemporales = null;

    // Carga de Módulos
    onSnapshot(query(collection(db, "ofertas"), where("ofertado", "==", true), orderBy("modulo", "asc")), (snap) => {
        const cont = document.getElementById('contenedorModulos');
        cont.innerHTML = "";
        snap.forEach(doc => {
            const m = doc.data().modulo;
            cont.innerHTML += `<div class="col-6 col-md-4"><div class="p-2 border rounded" style="background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.1)!important;"><input type="checkbox" class="form-check-input check-modulo me-2" value="${m}" onchange="fn_CalcularInversion()"><span class="small">${m}</span></div></div>`;
        });
    });

    window.fn_VerificarEdad = () => {
        const f = document.getElementById('fechaNacimientoInput').value;
        const edad = new Date().getFullYear() - new Date(f).getFullYear();
        document.getElementById('bloqueRepresentante').style.display = edad < 18 ? 'block' : 'none';
        document.getElementById('seccionMenor').classList.toggle('d-none', edad >= 18);
    };

    window.fn_AjustarPerfil = () => {
        const p = document.getElementById('perfilUsuario').value;
        const c = document.getElementById('cuposInput');
        if(p === 'Estudiante UCMI') { c.value = 1; c.readOnly = true; } else { c.readOnly = false; }
        fn_CalcularInversion();
    };

    window.fn_CalcularInversion = () => {
        const p = document.getElementById('perfilUsuario').value;
        const t = parseInt(document.getElementById('planLicencia').value) || 0;
        const n = document.querySelectorAll('.check-modulo:checked').length;
        const x = parseInt(document.getElementById('cuposInput').value) || 0;
        let total = 0;
        if (t > 0 && n > 0) {
            const ft = 0.7 + (0.3 / (1 + (0.15 * (t - 1))));
            if (p === 'Estudiante UCMI') {
                let pb = n === 1 ? 10 : n === 2 ? 18 : n === 3 ? 24 : n >= 4 ? 28 : 0;
                total = pb * t * ft;
            } else {
                let ix = x <= 10 ? 10 * x * (1 - (x - 1) / 90) : x <= 50 ? 10 * x * (1 - (10 + 0.5 * (x - 10)) / 100) : (5 * x) + 100;
                total = ix * t * ft;
            }
        }
        document.getElementById('displayInversion').innerText = total.toFixed(2);
    };

    document.getElementById('formUCMI').addEventListener('submit', (e) => {
        e.preventDefault();
        const mods = Array.from(document.querySelectorAll('.check-modulo:checked')).map(m => m.value);
        if(!e.target.checkValidity() || mods.length === 0) {
            Swal.fire("Atención", "Complete todos los campos y seleccione módulos.", "warning"); return;
        }

        datosTemporales = {
            aspirante: document.getElementById('nombreInput').value,
            cedula: document.getElementById('dniInput').value,
            fechaNac: document.getElementById('fechaNacimientoInput').value,
            genero: document.getElementById('generoInput').value,
            email: document.getElementById('emailInput').value,
            whatsapp: document.getElementById('whatsappInput').value,
            ubicacion: document.getElementById('ubicacionInput').value,
            perfil: document.getElementById('perfilUsuario').value,
            meses: document.getElementById('planLicencia').value,
            cupos: document.getElementById('cuposInput').value,
            entidad: document.getElementById('nombreInstitucion').value || "Particular",
            modulos: mods,
            total: document.getElementById('displayInversion').innerText,
            repNombre: document.getElementById('repNombre').value || "N/A",
            repCedula: document.getElementById('repCedula').value || "N/A"
        };

        // LLENADO DEL MODAL CON TODO LO QUE VA AL PDF
        document.getElementById('previewContent').innerHTML = `
            <div class="row">
                <div class="col-md-6">
                    <p><strong>Aspirante:</strong> ${datosTemporales.aspirante}</p>
                    <p><strong>ID:</strong> ${datosTemporales.cedula}</p>
                    <p><strong>Género:</strong> ${datosTemporales.genero}</p>
                    <p><strong>Ubicación:</strong> ${datosTemporales.ubicacion}</p>
                </div>
                <div class="col-md-6">
                    <p><strong>Correo:</strong> ${datosTemporales.email}</p>
                    <p><strong>WhatsApp:</strong> ${datosTemporales.whatsapp}</p>
                    <p><strong>Perfil:</strong> ${datosTemporales.perfil}</p>
                    <p><strong>Entidad:</strong> ${datosTemporales.entidad}</p>
                </div>
                <div class="col-12 mt-2">
                    <p><strong>Módulos:</strong> ${datosTemporales.modulos.join(', ')}</p>
                    <p><strong>Licencia:</strong> ${datosTemporales.meses} meses / ${datosTemporales.cupos} cupos</p>
                    ${datosTemporales.repNombre !== "N/A" ? `<p class="text-danger"><strong>Representante:</strong> ${datosTemporales.repNombre} (${datosTemporales.repCedula})</p>` : ''}
                    <h4 class="text-center mt-3" style="color:var(--dorado-ucmi)">TOTAL A PAGAR: $${datosTemporales.total} USD</h4>
                </div>
            </div>`;
        new bootstrap.Modal(document.getElementById('modalPreview')).show();
    });

    document.getElementById('confirmarEnvio').addEventListener('click', async () => {
        const btn = document.getElementById('confirmarEnvio');
        btn.disabled = true; btn.innerText = "REGISTRANDO...";
        try {
            await addDoc(collection(db, "postulaciones"), { ...datosTemporales, fechaRegistro: new Date() });
            fn_GenerarPDF(datosTemporales);
            bootstrap.Modal.getInstance(document.getElementById('modalPreview')).hide();
            Swal.fire("Éxito", "Postulación enviada correctamente.", "success");
            document.getElementById('formUCMI').reset();
        } catch(e) { Swal.fire("Error", "No se pudo conectar con el servidor.", "error"); }
        finally { btn.disabled = false; btn.innerText = "CONFIRMAR REGISTRO"; }
    });

    function fn_GenerarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(26, 42, 58); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(197, 160, 89); doc.setFontSize(22); doc.text("POSTULACIÓN UCMI", 105, 25, { align: "center" });
        
        doc.setTextColor(40); doc.setFontSize(12);
        let y = 60;
        const addL = (label, val) => { doc.setFont(undefined, 'bold'); doc.text(label, 20, y); doc.setFont(undefined, 'normal'); doc.text(String(val), 70, y); y += 10; };
        
        addL("ASPIRANTE:", d.aspirante);
        addL("ID:", d.cedula);
        addL("CORREO:", d.email);
        addL("WHATSAPP:", d.whatsapp);
        addL("UBICACIÓN:", d.ubicacion);
        addL("PERFIL:", d.perfil);
        addL("ENTIDAD:", d.entidad);
        addL("MODULOS:", d.modulos.join(", "));
        addL("DURACIÓN:", d.meses + " Meses");
        addL("CUPOS:", d.cupos);
        if(d.repNombre !== "N/A") addL("REP. LEGAL:", d.repNombre + " (" + d.repCedula + ")");
        
        doc.setDrawColor(197, 160, 89); doc.line(20, y+5, 190, y+5);
        y += 15;
        doc.setFontSize(16); doc.text("TOTAL INVERSIÓN: $" + d.total + " USD", 105, y, { align: "center" });
        
        window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
