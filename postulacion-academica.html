<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    
    <!-- Fuentes y Estilos Externos -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Scripts Base -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --azul-ucmi: #1a2a3a; --dorado-ucmi: #c5a059; }
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; padding: 40px 0; color: white;
            font-family: 'Poppins', sans-serif;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
        .card-form { max-width: 850px; margin: auto; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden; }
        .header-institucional { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .inst-logo { height: 100px; margin-bottom: 15px; }
        .inst-titulo { color: var(--dorado-ucmi); font-family: 'Cinzel', serif; font-weight: 800; font-size: 2rem; }
        .seccion-titulo { font-family: 'Cinzel', serif; color: var(--dorado-ucmi); border-bottom: 1px solid rgba(197,160,89,0.3); padding-bottom: 8px; margin: 25px 0 15px 0; font-size: 1.1rem; }
        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; font-weight: 600; }

        .form-control, .form-select { 
            border-radius: 10px; 
            background: rgba(255, 255, 255, 0.05) !important; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #ffffff !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            transition: all 0.3s ease;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.5); }
        .form-select option { background-color: #1a2a3a; color: white; }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: var(--dorado-ucmi) !important;
            box-shadow: 0 0 0 0.25rem rgba(197, 160, 89, 0.2);
        }

        /* Corregir el color blanco del autocompletado */
        .form-control:-webkit-autofill,
        .form-control:-webkit-autofill:hover, 
        .form-control:-webkit-autofill:focus {
        -webkit-text-fill-color: #ffffff !important; /* Mantiene el texto blanco */
        -webkit-box-shadow: 0 0 0px 1000px rgba(255, 255, 255, 0.05) inset !important; /* Simula el fondo oscuro */
        transition: background-color 5000s ease-in-out 0s; /* Evita que el color cambie */
        backdrop-filter: blur(10px);
        }
                
        .costo-display { background: rgba(197, 160, 100, 0.15); border: 1px dashed var(--dorado-ucmi); border-radius: 15px; padding: 20px; text-align: center; margin-top: 20px; }
        .costo-monto { color: var(--dorado-ucmi); font-size: 1.8rem; font-weight: 800; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 12px; border: none; width: 100%; margin-top: 20px; transition: 0.3s; cursor: pointer; }
        .btn-enviar:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" alt="Logo UCMI" class="inst-logo">
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
        </div>
        <form id="formUCMI" class="p-4 p-md-5 pt-2" novalidate>
            <div class="seccion-titulo">1. Datos de Identidad</div>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Nombre Responsable:</label><input type="text" id="nombreInput" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">ID (Cédula/RIF):</label><input type="text" id="dniInput" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Fecha de Nacimiento:</label><input type="date" id="fechaNacimientoInput" class="form-control" required onchange="fn_VerificarEdad()"></div>
                <div class="col-md-6"><label class="form-label">Género:</label><select id="generoInput" class="form-select" required><option value="">Selecciona...</option><option value="Masculino">Masculino</option><option value="Femenino">Femenino</option></select></div>
            </div>

            <div class="seccion-titulo">2. Contacto</div>
            <div class="row g-3">
                <div class="col-md-4"><label class="form-label">Correo:</label><input type="email" id="emailInput" class="form-control" required></div>
                <div class="col-md-4"><label class="form-label">WhatsApp:</label><input type="tel" id="whatsappInput" class="form-control" required></div>
                <div class="col-md-4"><label class="form-label">Ubicación:</label><input type="text" id="ubicacionInput" class="form-control" required></div>
            </div>

<div id="bloqueRepresentante" class="mt-4" style="display:none">
                <div class="seccion-titulo text-danger">3. Información del Representante Legal</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-danger">Nombre del Representante:</label>
                        <input type="text" id="repNombre" class="form-control" placeholder="Nombre y Apellido">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-danger">ID del Representante:</label>
                        <input type="text" id="repCedula" class="form-control" placeholder="Cédula/RIF">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-danger">Correo del Representante:</label>
                        <input type="email" id="repEmail" class="form-control" placeholder="ejemplo@correo.com">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-danger">WhatsApp del Representante:</label>
                        <input type="tel" id="repWhatsapp" class="form-control" placeholder="Número de contacto">
                    </div>
                </div>
            </div>

            <div class="seccion-titulo">4. Módulos y Licencia</div>
            <div id="contenedorModulos" class="row g-2 mb-3"></div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Perfil:</label>
                    <select id="perfilUsuario" class="form-select" required onchange="fn_AjustarPerfil()">
                        <option value="">Selecciona...</option>
                        <option value="Academia">Academia</option>
                        <option value="Profesor independiente">Profesor independiente</option>
                        <option value="Estudiante UCMI">Estudiante UCMI</option>
                    </select>
                </div>
                <div class="col-md-6"><label class="form-label">Duración licencia (meses):</label><input type="number" id="planLicencia" class="form-control" min="1" required oninput="fn_CalcularInversion()"></div>
                <div class="col-md-6"><label class="form-label">Cupos:</label><input type="number" id="cuposInput" class="form-control" value="1" min="1" oninput="fn_CalcularInversion()"></div>
                <div class="col-md-6"><label class="form-label">Entidad:</label><input type="text" id="nombreInstitucion" class="form-control"></div>
            </div>

            <div class="costo-display">
                <div class="costo-monto">
                    $ <span id="displayInversion">0.00</span> USD
                </div>
                <div id="badgeAhorro" class="mt-2"></div> 
            </div>
            
            <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR POSTULACIÓN</button>
        </form>
    </div>
</div>

<!-- MODAL DE CONFIRMACIÓN -->
<div class="modal fade" id="modalConfirmacion" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background: rgba(26, 42, 58, 0.98); border: 1px solid var(--dorado-ucmi); border-radius: 20px; color: white;">
            <div class="modal-header border-0"><h5 class="inst-titulo" style="font-size: 1.2rem;">REVISIÓN FINAL</h5></div>
            <div class="modal-body" id="resumenModal"></div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">CORREGIR</button>
                <button type="button" id="btnConfirmarFinal" class="btn btn-enviar" style="width: auto; margin-top: 0;">CONFIRMAR Y ENVIAR</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

// --- PASO 3: PROTECCIÓN Y LÓGICA DE GESTIÓN ---
   onAuthStateChanged(auth, (user) => {
       if (user) {
           console.log("Admin autenticado. Iniciando carga de sistema...");

           // 1. Carga de Módulos (Antigua línea 172)
           onSnapshot(query(collection(db, "ofertas"), where("ofertado", "==", true), orderBy("modulo", "asc")), (snap) => {
               const contenedor = document.getElementById('contenedorModulos');
               if(contenedor) {
                   contenedor.innerHTML = "";
                   snap.forEach(doc => {
                       const d = doc.data();
                       contenedor.innerHTML += `
                           <div class="col-6 col-md-4"><div class="p-2 border rounded" style="background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.1) !important;">
                           <input type="checkbox" class="form-check-input check-modulo me-2" value="${d.modulo}" onchange="fn_CalcularInversion()">
                           <span class="small">${d.modulo}</span></div></div>`;
                   });
               }
           });

           // 2. Lógica de envío del formulario
           document.getElementById('formUCMI').addEventListener('submit', (e) => {
               e.preventDefault();
               const modulos = Array.from(document.querySelectorAll('.check-modulo:checked')).map(m => m.value);
               if(!e.target.checkValidity() || modulos.length === 0) {
                   Swal.fire({ title: "Error", text: "Completa los datos y elige al menos un módulo.", icon: "error" });
                   return;
               }

               // Guardar datos en una variable temporal global
               window.datosPayload = {
                   nombreResponsable: document.getElementById('nombreInput').value,
                   cedulaResponsable: document.getElementById('dniInput').value,
                   fechaNacimiento: document.getElementById('fechaNacimientoInput').value,
                   genero: document.getElementById('generoInput').value,
                   email: document.getElementById('emailInput').value,
                   whatsapp: document.getElementById('whatsappInput').value,
                   ubicacion: document.getElementById('ubicacionInput').value,
                   repNombre: document.getElementById('repNombre').value.trim() || "N/A",
                   repCedula: document.getElementById('repCedula').value.trim() || "N/A",
                   repEmail: document.getElementById('repEmail').value.trim() || "N/A",
                   repWhatsapp: document.getElementById('repWhatsapp').value.trim() || "N/A",
                   perfil: document.getElementById('perfilUsuario').value,
                   entidad: document.getElementById('nombreInstitucion').value || "N/A",
                   mesesLicencia: parseInt(document.getElementById('planLicencia').value) || 0,
                   cupos: parseInt(document.getElementById('cuposInput').value) || 0,
                   total: document.getElementById('displayInversion').innerText,
                   modulos: modulos,
                   timestamp: new Date()
               };

               const nombresModulos = window.datosPayload.modulos.join(", ");
               const entidad = window.datosPayload.entidad;

               document.getElementById('resumenModal').innerHTML = `
                   <div style="border-bottom: 1px solid rgba(197,160,89,0.2); padding-bottom: 10px; margin-bottom: 10px;">
                       <p><strong><i class="bi bi-person-fill"></i> Postulante:</strong> ${window.datosPayload.nombreResponsable.toUpperCase()}</p>
                       <p><strong><i class="bi bi-card-text"></i> ID/Cédula:</strong> ${window.datosPayload.cedulaResponsable}</p>
                   </div>
                   <div style="background: rgba(197,160,89,0.1); padding: 10px; border-radius: 10px;">
                       <p><strong><i class="bi bi-building"></i> Entidad:</strong> ${entidad}</p>
                       <p><strong><i class="bi bi-layers"></i> Módulos:</strong> ${nombresModulos}</p>
                       <p style="font-size: 1.2rem; color: var(--dorado-ucmi); text-align: center; margin: 0;">
                           <strong>Total: $${window.datosPayload.total} USD</strong>
                       </p>
                   </div>`;
               
               new bootstrap.Modal(document.getElementById('modalConfirmacion')).show();
           });

           // 3. Confirmación final (sin recarga)
           document.getElementById('btnConfirmarFinal').addEventListener('click', async () => {
               try {
                   await addDoc(collection(db, "postulaciones"), window.datosPayload);
                   fn_GenerarPDF(window.datosPayload);
                   
                   // Limpiar interfaz
                   document.getElementById('formUCMI').reset();
                   document.getElementById('bloqueRepresentante').style.display = 'none';
                   document.getElementById('displayInversion').innerText = "0.00";
                   document.getElementById('badgeAhorro').innerHTML = "";
                   
                   bootstrap.Modal.getInstance(document.getElementById('modalConfirmacion')).hide();
                   
                   await Swal.fire({ title: "¡Éxito!", text: "Postulación registrada correctamente.", icon: "success", confirmButtonColor: "#c5a059" });
               } catch(err) { 
                   Swal.fire({ title: "Error", text: "Falló la conexión a la base de datos.", icon: "error" }); 
               }
           });

       } else {
           // Si no está autenticado, redirige
           window.location.href = "login.html";
       }
   });

    function fn_GenerarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const imgLogo = new Image();
        imgLogo.crossOrigin = "Anonymous";
        imgLogo.src = 'https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png';

        imgLogo.onload = function() {
            // 1. Cabecera Institucional
            doc.setFillColor(26, 42, 58); doc.rect(0, 0, 210, 45, 'F');
            doc.addImage(imgLogo, 'PNG', 10, 5, 30, 30);
            doc.setTextColor(197, 160, 89);
            doc.setFontSize(14); doc.setFont("helvetica", "bold");
            doc.text("UNIVERSITARIO DE CIENCIAS MATEMÁTICAS E IDIOMAS", 120, 20, { align: "center" });
            doc.setFontSize(22); doc.text("UCMI", 120, 35, { align: "center" });

            // 2. Título del Documento
            doc.setTextColor(26, 42, 58); doc.setFontSize(16);
            doc.text("COMPROBANTE OFICIAL DE REGISTRO", 105, 60, { align: "center" });

            doc.setTextColor(0); doc.setFontSize(9);
            let y = 75;

            // Función auxiliar para filas
            const row = (label, value, col2 = 75) => {
                doc.setFont("helvetica", "bold"); doc.text(label, 20, y);
                doc.setFont("helvetica", "normal"); doc.text(String(value || 'N/A'), col2, y);
                y += 7;
            };

            // SECCIÓN 1: DATOS DE IDENTIDAD
            doc.setFontSize(11); doc.setFont("helvetica", "bold");
            doc.text("1. DATOS DE IDENTIDAD", 20, y); y += 5;
            doc.line(20, y, 190, y); y += 7;

            row("Nombre Responsable:", d.nombreResponsable.toUpperCase());
            row("ID (Cédula/RIF):", d.cedulaResponsable);
            row("Fecha de Nacimiento:", d.fechaNacimiento);
            row("Género:", d.genero);

            // SECCIÓN 2: CONTACTO
            y += 5;
            doc.setFontSize(11); doc.setFont("helvetica", "bold");
            doc.text("2. CONTACTO", 20, y); y += 5;
            doc.line(20, y, 190, y); y += 7;

            row("Correo:", d.email);
            row("WhatsApp:", d.whatsapp);
            row("Ubicación:", d.ubicacion);

            // SECCIÓN 3: REPRESENTANTE LEGAL (Solo si no es N/A)
            if(d.repNombre && d.repNombre !== "N/A") {
                y += 5;
                doc.setTextColor(150, 0, 0);
                doc.setFontSize(11);
                doc.text("3. INFORMACIÓN DEL REPRESENTANTE LEGAL", 20, y); y += 5;
                doc.line(20, y, 190, y); y += 7;
                doc.setTextColor(0); doc.setFontSize(9);

                row("Nombre Rep.:", (d.repNombre || "N/A").toUpperCase());
                row("ID Rep.:", (d.repCedula || "N/A"));
                row("Correo Rep.:", (d.repEmail || "N/A").toLowerCase());
                row("WhatsApp Rep.:", (d.repWhatsapp || "N/A"));
            }

            // SECCIÓN 4: MÓDULOS Y LICENCIA
            y += 5;
            doc.setFontSize(11); doc.setFont("helvetica", "bold");
            doc.text("4. MÓDULOS Y LICENCIA", 20, y); y += 5;
            doc.line(20, y, 190, y); y += 7;

            row("Perfil:", d.perfil);
            row("Entidad:", d.entidad);
            row("Licencia:", d.mesesLicencia + " meses");
            row("Cupos:", d.cupos);
            
            doc.setFont("helvetica", "bold"); doc.text("Módulos:", 20, y);
            const modSplit = doc.splitTextToSize(d.modulos.join(", "), 115);
            doc.setFont("helvetica", "normal"); doc.text(modSplit, 75, y);
            y += (modSplit.length * 7) + 5;

            // CUADRO FINAL DE INVERSIÓN
            y += 5;
            doc.setFillColor(245, 245, 245); doc.rect(20, y, 170, 15, 'F');
            doc.setFontSize(12); doc.setFont("helvetica", "bold");
            doc.setTextColor(26, 42, 58);
            doc.text(`INVERSIÓN TOTAL ESTIMADA: $${d.total} USD`, 105, y + 10, { align: "center" });

            // Salida
            window.open(doc.output('bloburl'), '_blank');
        };

        imgLogo.onerror = () => {
            doc.text("Error al cargar logo. Comprobante UCMI generado.", 20, 20);
            doc.save(`UCMI_${d.cedulaResponsable}.pdf`);
        };
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
