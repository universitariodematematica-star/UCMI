<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --azul-ucmi: #1a2a3a; --dorado-ucmi: #c5a059; }
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; padding: 40px 0; color: white;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
        
        /* DISEÑO CRISTAL ESMERILADO */
        .card-form { 
            max-width: 850px; margin: auto; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 30px; 
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px) saturate(180%); 
            -webkit-backdrop-filter: blur(25px) saturate(180%); box-shadow: 0 20px 60px rgba(0,0,0,0.6); 
        }

        .header-institucional { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid rgba(197, 160, 89, 0.3); border-top-left-radius: 30px; border-top-right-radius: 30px; }
        .inst-logo { height: 100px; margin-bottom: 15px; }
        .inst-titulo { color: var(--dorado-ucmi); font-family: 'Cinzel', serif; font-weight: 800; font-size: 2rem; }
        .seccion-titulo { font-family: 'Cinzel', serif; color: var(--dorado-ucmi); border-bottom: 1px solid rgba(197,160,89,0.3); padding-bottom: 8px; margin: 25px 0 15px 0; font-size: 1.1rem; }
        
        .form-control, .form-select { 
            border-radius: 12px; background: rgba(255, 255, 255, 0.1) !important; backdrop-filter: blur(10px);
            color: #ffffff !important; border: 1px solid rgba(255, 255, 255, 0.25); transition: all 0.3s ease; 
        }
        .form-control:focus, .form-select:focus { background: rgba(255, 255, 255, 0.15) !important; border-color: var(--dorado-ucmi) !important; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }
        ::placeholder { color: rgba(200, 200, 200, 0.5) !important; font-size: 0.85rem; font-style: italic; }
        
        .costo-display { background: rgba(197, 160, 89, 0.15); border: 1px dashed var(--dorado-ucmi); border-radius: 20px; padding: 25px; text-align: center; margin: 30px 0; }
        .costo-monto { color: var(--dorado-ucmi); font-size: 2.4rem; font-weight: 800; }

        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 16px; border-radius: 15px; border: none; width: 100%; cursor: pointer; }
        #bloqueRepresentante { display: none; background: rgba(255, 77, 77, 0.08); border: 1px solid rgba(255, 77, 77, 0.3); padding: 25px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="overlay"></div>
<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo UCMI" class="inst-logo">
            <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-3" novalidate>
            <div class="seccion-titulo">1. Datos de Identidad y Validación</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-white-50 small">Nombre Responsable:</label>
                    <input type="text" id="nombreInput" class="form-control" required placeholder="Nombres y Apellidos completos">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white-50 small">ID (Cédula/RIF):</label>
                    <input type="text" id="dniInput" class="form-control" required placeholder="Documento de identidad oficial">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white-50 small">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimientoInput" class="form-control" required onchange="fn_VerificarEdad()">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white-50 small">Género:</label>
                    <select id="generoInput" class="form-select"> 
                        <option value="No especificado" selected>Seleccione género...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>
            </div>

            <div class="seccion-titulo">2. Datos de Acceso y Seguridad</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-white-50 small">Correo Electrónico:</label>
                    <input type="email" id="emailInput" class="form-control" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white-50 small">WhatsApp:</label>
                    <input type="tel" id="whatsappInput" class="form-control" placeholder="+58 4XX 0000000" required>
                </div>
                <div class="col-md-12">
                    <label class="form-label text-white-50 small">Ubicación:</label>
                    <input type="text" id="ubicacionInput" class="form-control" placeholder="Ciudad, Estado y País" required>
                </div>
            </div>

            <div id="bloqueRepresentante" class="mt-4">
                <div class="seccion-titulo text-danger">3. Supervisión Legal (Requerido)</div>
                <div class="row g-3">
                    <div class="col-md-6"><input type="text" id="repNombre" class="form-control" placeholder="Nombre Representante"></div>
                    <div class="col-md-6"><input type="text" id="repCedula" class="form-control" placeholder="Cédula Representante"></div>
                </div>
            </div>

            <div class="seccion-titulo">4. Configuración de Licencia</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-white-50 small">Perfil:</label>
                    <select id="perfilUsuario" class="form-select" required onchange="fn_AjustarPerfil(); fn_CalcularInversion();">
                        <option value="">Seleccione rol...</option>
                        <option value="Academia">Academia</option>
                        <option value="Independent Professor">Profesor Independiente</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white-50 small">Duración (Meses):</label>
                    <input type="number" id="planLicencia" class="form-control" placeholder="Meses (Ej: 12)" min="1" required oninput="fn_CalcularInversion()">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white-50 small">Cupos (x):</label>
                    <input type="number" id="cuposInput" class="form-control" value="1" min="1" required oninput="fn_CalcularInversion()">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white-50 small">Entidad:</label>
                    <input type="text" id="nombreInstitucion" class="form-control" placeholder="Nombre de la Institución">
                </div>
            </div>

            <div class="costo-display">
                <div class="costo-monto">$ <span id="displayInversion">0.00</span> <small style="font-size: 1rem;">USD</small></div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-enviar">ENVIAR Y GENERAR COMPROBANTE</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.fn_CalcularInversion = () => {
        const x = parseInt(document.getElementById('cuposInput').value) || 0; 
        const t = parseInt(document.getElementById('planLicencia').value) || 0;
        const perfil = document.getElementById('perfilUsuario').value;
        if (x <= 0 || t <= 0) return "0.00";

        let ix = x <= 10 ? 10 * x * (1 - (x - 1) / 90) : x <= 50 ? 10 * x * (1 - (10 + 0.5 * (x - 10)) / 100) : (5 * x) + 100;
        let mS = (perfil === "Independent Professor") ? 1.15 : 1.0;
        const factorT = 0.7 + (0.3 / (1 + 0.15 * (t - 1)));
        const total = (ix * t * factorT * mS).toFixed(2);
        
        document.getElementById('displayInversion').innerText = total;
        return total;
    };

    window.fn_VerificarEdad = () => {
        const fNac = new Date(document.getElementById('fechaNacimientoInput').value);
        const edad = new Date().getFullYear() - fNac.getFullYear();
        document.getElementById('bloqueRepresentante').style.display = edad < 18 ? 'block' : 'none';
    };

    window.fn_AjustarPerfil = () => {
        const p = document.getElementById('perfilUsuario').value;
        document.getElementById('nombreInstitucion').placeholder = p === 'Academia' ? "Nombre de su Academia" : "Nombre Particular";
    };

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!e.target.checkValidity()) return Swal.fire("Atención", "Complete los campos obligatorios", "warning");

        const payload = {
            nombre: document.getElementById('nombreInput').value,
            cedula: document.getElementById('dniInput').value,
            fechaNac: document.getElementById('fechaNacimientoInput').value,
            genero: document.getElementById('generoInput').value,
            email: document.getElementById('emailInput').value,
            whatsapp: document.getElementById('whatsappInput').value,
            ubicacion: document.getElementById('ubicacionInput').value,
            perfil: document.getElementById('perfilUsuario').value,
            meses: document.getElementById('planLicencia').value,
            cupos: document.getElementById('cuposInput').value,
            entidad: document.getElementById('nombreInstitucion').value || "Particular",
            total: fn_CalcularInversion(),
            repNombre: document.getElementById('repNombre').value || "N/A",
            repCedula: document.getElementById('repCedula').value || "N/A",
            fechaEmision: new Date().toLocaleString()
        };

        try {
            await addDoc(collection(db, "postulaciones"), payload);
            fn_GenerarPDF(payload);
            Swal.fire("Éxito", "Postulación Registrada", "success");
        } catch (e) { Swal.fire("Error", "Error de servidor", "error"); }
    });

    function fn_GenerarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // CABECERA
        doc.setFillColor(26, 42, 58); doc.rect(0, 0, 210, 50, 'F'); 
        doc.setTextColor(197, 160, 89);
        doc.setFont("helvetica", "bold"); doc.setFontSize(30); doc.text("UCMI", 105, 25, { align: "center" });
        doc.setFontSize(12); doc.text("UNIVERSITARIO DE CIENCIAS MATEMÁTICAS E IDIOMAS", 105, 35, { align: "center" });

        // TÍTULO
        doc.setTextColor(26, 42, 58); doc.setFontSize(18);
        doc.text("COMPROBANTE DE SOLICITUD DE POSTULACIÓN", 105, 70, { align: "center" });
        
        doc.setFontSize(10); doc.setTextColor(0);
        let y = 85;

        // FUNCIÓN PARA IMPRIMIR FILAS
        const fila = (label, valor) => {
            doc.setFont("helvetica", "bold"); doc.text(`${label}:`, 25, y);
            doc.setFont("helvetica", "normal"); doc.text(`${valor}`, 80, y);
            y += 9;
        };

        fila("FECHA DE EMISIÓN", d.fechaEmision);
        fila("NOMBRE COMPLETO", d.nombre.toUpperCase());
        fila("ID / CÉDULA", d.cedula);
        fila("FECHA NACIMIENTO", d.fechaNac);
        fila("GÉNERO", d.genero);
        fila("CORREO ELECTRÓNICO", d.email);
        fila("NÚMERO WHATSAPP", d.whatsapp);
        fila("UBICACIÓN", d.ubicacion);
        
        y += 5; doc.setDrawColor(200); doc.line(25, y, 185, y); y += 10;
        
        fila("PERFIL ACADÉMICO", d.perfil);
        fila("ENTIDAD", d.entidad);
        fila("TIEMPO LICENCIA", `${d.meses} Meses`);
        fila("CANTIDAD CUPOS", `${d.cupos} Estudiantes`);
        
        if(d.repNombre !== "N/A") {
            y += 5; doc.setFont("helvetica", "bold"); doc.text("DATOS DEL REPRESENTANTE LEGAL:", 25, y); y += 9;
            fila("REPRESENTANTE", d.repNombre);
            fila("ID REPRESENTANTE", d.repCedula);
        }

        y += 10;
        doc.setFillColor(197, 160, 89); doc.rect(25, y, 160, 15, 'F');
        doc.setTextColor(255); doc.setFontSize(14);
        doc.text(`INVERSIÓN TOTAL ESTIMADA: $${d.total} USD`, 105, y + 10, { align: "center" });

        doc.setTextColor(150); doc.setFontSize(8);
        doc.text("Este ticket es una pre-aprobación sujeta a validación de pagos y documentos.", 105, 285, { align: "center" });
        
        window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
