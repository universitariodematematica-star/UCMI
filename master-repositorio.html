<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Repositorio Académico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --dorado-ucmi: #c5a059;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.85) 100%);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .program-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .program-card:hover {
            background: rgba(197, 160, 89, 0.2);
            border-color: var(--dorado-ucmi);
            transform: scale(1.02);
            color: white;
        }

        .text-glow-gold {
            color: var(--dorado-ucmi);
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.6);
        }

        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--dorado-ucmi), transparent);
            margin: 40px 0;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="overlay">
    <nav class="navbar navbar-dark bg-dark bg-opacity-50 border-bottom border-secondary border-opacity-25">
        <div class="container">
            <a class="navbar-brand" href="super-admin.html">
                <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo" height="50">
            </a>
            <span class="text-glow-gold fw-bold">REPOSITORIO ACADÉMICO</span>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-3">
            <div class="col-md-4"><a href="#" class="program-card"><h5 class="mb-0 fw-bold">Matemática AGEM</h5></a></div>
            <div class="col-md-4"><a href="#" class="program-card"><h5 class="mb-0 fw-bold">Física</h5></a></div>
            <div class="col-md-4"><a href="#" class="program-card"><h5 class="mb-0 fw-bold">Química</h5></a></div>
            <div class="col-md-4"><a href="#" class="program-card"><h5 class="mb-0 fw-bold">Biología</h5></a></div>
            <div class="col-md-4"><a href="#" class="program-card"><h5 class="mb-0 fw-bold">Lógica</h5></a></div>
            <div class="col-md-4"><a href="#" class="program-card"><h5 class="mb-0 fw-bold">Estadística</h5></a></div>
            <div class="col-md-4"><a href="#" class="program-card"><h5 class="mb-0 fw-bold">Razonamiento numérico</h5></a></div>
            <div class="col-md-4"><a href="#" class="program-card"><h5 class="mb-0 fw-bold">Razonamiento abstracto</h5></a></div>
            <div class="col-md-4"><a href="#" class="program-card"><h5 class="mb-0 fw-bold">Lengua</h5></a></div>
        </div>

        <div class="section-divider"></div>

        <div class="row g-3">
            <div class="col-md-3 col-6"><a href="#" class="program-card"><h6 class="mb-0 fw-bold">Inglés A1</h6></a></div>
            <div class="col-md-3 col-6"><a href="#" class="program-card"><h6 class="mb-0 fw-bold">Inglés A2</h6></a></div>
            <div class="col-md-3 col-6"><a href="#" class="program-card"><h6 class="mb-0 fw-bold">Inglés B1</h6></a></div>
            <div class="col-md-3 col-6"><a href="#" class="program-card"><h6 class="mb-0 fw-bold">Inglés B1+</h6></a></div>
            <div class="col-md-3 col-6"><a href="#" class="program-card"><h6 class="mb-0 fw-bold">Inglés B2</h6></a></div>
            <div class="col-md-3 col-6"><a href="#" class="program-card"><h6 class="mb-0 fw-bold">Inglés B2+</h6></a></div>
            <div class="col-md-3 col-6"><a href="#" class="program-card"><h6 class="mb-0 fw-bold">Inglés C1</h6></a></div>
        </div>

        <footer class="mt-5 text-center">
            <a href="super-admin.html" class="btn btn-sm btn-outline-light rounded-pill px-4 opacity-50">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
        </footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
