    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --sidebar-width: 260px;
            --purpura-neon: #bc13fe;
            --cian-tech: #00f2ff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: 0; right: 0; bottom: 0; left: var(--sidebar-width);
            background: radial-gradient(circle, rgba(6, 9, 15, 0.7) 0%, rgba(6, 9, 15, 0.95) 100%);

        }

        .wrapper { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR INTEGRADO */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(197, 160, 89, 0.2);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
        }

        .sidebar-logo { width: 100px; margin: 0 auto 30px; display: block; }
        .sidebar-nav { flex-grow: 1; }
        .nav-item-ucmi {
            display: flex; align-items: center; color: rgba(255,255,255,0.6);
            text-decoration: none; padding: 10px 15px; margin-bottom: 5px;
            border-radius: 10px; transition: 0.3s; font-size: 0.85rem;
        }
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }

        .btn-maestro {
            background: transparent; border: 1px solid rgba(255,255,255,0.3);
            color: white; font-weight: 600; text-transform: uppercase;
            font-size: 0.65rem; border-radius: 50px; padding: 10px;
            text-align: center; display: block; margin-bottom: 10px; text-decoration: none;
        }
        .btn-cerrar {
            background: transparent; border: 1px solid rgba(231, 76, 60, 0.4);
            color: rgba(231, 76, 60, 0.9); font-weight: 600; text-transform: uppercase;
            font-size: 0.65rem; border-radius: 50px; padding: 8px;
            text-align: center; display: block; text-decoration: none;
        }

        /* CONTENIDO PRINCIPAL */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .program-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); border-radius: 15px; padding: 25px;
            color: white; display: flex; flex-direction: column; align-items: center;
            text-align: center; transition: all 0.3s ease; text-decoration: none;

        .program-card i { font-size: 1.6rem; margin-bottom: 12px; color: var(--dorado-ucmi); }

        .text-glow-gold { color: var(--dorado-ucmi); text-shadow: 0 0 15px rgba(197, 160, 89, 0.6); }

<body>

<div class="overlay"></div>

<div class="wrapper">
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="sidebar-logo">
        <nav class="sidebar-nav">
            <a href="master-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="master-vigencia.html" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
            <a href="master-usuarios.html" class="nav-item-ucmi"><i class="bi bi-people"></i> USUARIOS</a>
            <a href="historial-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-clock-history"></i> HISTORIAL</a>
            <a href="directorio.html" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="ofertas-academicas.html" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="master-repositorio.html" class="nav-item-ucmi active"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="papelera.html" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-auto pt-3">
            <a href="super-admin.html" class="btn-maestro"><i class="bi bi-cpu"></i> PANEL MAESTRO</a>
            <a href="#" id="btnLogout" class="btn-cerrar"><i class="bi bi-power"></i> CERRAR SESIÓN</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="container-fluid">
            <div class="text-center mb-5">
                <h1 class="fw-bold text-uppercase display-6"><i class="bi bi-journal-bookmark-fill me-3 text-glow-gold"></i>Repositorio Maestro</h1>
                <p class="text-white-50">Protocolos de Enseñanza Supralógica</p>
            </div>
<div class="row g-4 mb-5" id="contenedorModulos">
</div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
    getFirestore,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    const app = initializeApp({ apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634" });
    const auth = getAuth(app);
    const db = getFirestore(app);

function obtenerIcono(nombre) {
    nombre = (nombre || "").toLowerCase();

    if (nombre.includes("mat")) return "bi-calculator";
    if (nombre.includes("fís") || nombre.includes("fis")) return "bi-speedometer2";
    if (nombre.includes("quím") || nombre.includes("quim")) return "bi-beaker";
    if (nombre.includes("bio")) return "bi-tree";
    if (nombre.includes("lóg") || nombre.includes("log")) return "bi-diagram-3";
    if (nombre.includes("estad")) return "bi-bar-chart";
    if (nombre.includes("num")) return "bi-hash";
    if (nombre.includes("abstract")) return "bi-puzzle";
    if (nombre.includes("leng") || nombre.includes("idioma")) return "bi-chat-left-text";
    if (nombre.includes("inform") || nombre.includes("program")) return "bi-code-slash";
    if (nombre.includes("ingen")) return "bi-gear";
    if (nombre.includes("med")) return "bi-heart-pulse";
    if (nombre.includes("dere")) return "bi-bank";
    if (nombre.includes("filo")) return "bi-lightbulb";
    if (nombre.includes("histo")) return "bi-book";
    if (nombre.includes("psico")) return "bi-person-heart";
    if (nombre.includes("astro")) return "bi-stars";
    if (nombre.includes("geo")) return "bi-globe-americas";
    if (nombre.includes("arte")) return "bi-palette";
    if (nombre.includes("music")) return "bi-music-note-beamed";
    if (nombre.includes("educ")) return "bi-mortarboard";
    if (nombre.includes("eco")) return "bi-graph-up-arrow";

    return "bi-journal-bookmark-fill";
}
    document.getElementById("btnLogout").onclick = () => signOut(auth).then(() => window.location.href = "index.html");
    async function cargarModulos() {
    const contenedor = document.getElementById("contenedorModulos");

    try {
        const snap = await getDocs(collection(db, "ofertas"));

        contenedor.innerHTML = "";

        snap.forEach(docu => {
            const d = docu.data();
            console.log(d.modulo, d.icono);

            const icono = d.icono || obtenerIcono(d.modulo);
            contenedor.innerHTML += `
                <div class="col-md-3">
                    <a href="ver-tema.html?moduloId=${docu.id}"
                       class="program-card">

                        <i class="bi ${icono}"></i>

                        <h6 class="fw-bold">
                            ${d.modulo}
                        </h6>

                    </a>
                </div>
            `;
        });

    } catch (error) {
        console.error(error);
    }
}

cargarModulos();
</script>
</body>
</html>
