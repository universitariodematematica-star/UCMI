<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --dorado: #ffcc66;
            --azul-neon: #00f2ff;
            --bg-dark: #0a0e14;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Estilo para las filas de la tabla según tu imagen */
        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .text-dorado { color: var(--dorado); font-weight: bold; }
        .text-azul { color: var(--azul-neon); }
        
        .badge-academia {
            border: 1px solid var(--dorado);
            color: var(--dorado);
            padding: 5px 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            background: rgba(255, 204, 102, 0.05);
        }

        .btn-trash-custom {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            border-radius: 10px;
            padding: 8px 15px;
        }
    </style>
</head>
<body class="p-4">

    <div class="container">
        <div class="user-row">
            <span class="text-dorado">Learning Bridge</span>
            <span>Alexander Mantilla</span>
            <span class="text-azul">alex@edu.ec</span>
            <span class="badge-academia">ACADEMIA</span>
            <button class="btn-trash-custom">
                <i class="bi bi-trash3-fill"></i>
            </button>
        </div>
    </div>

    </script>
</body>
</html>
