<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --sidebar-width: 260px;
            --cristal-claro: rgba(255, 255, 255, 0.05);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; color: white; 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; 
            background-size: cover; overflow: hidden; 
        }

        .overlay { position: fixed; top:0; right:0; bottom:0; left: var(--sidebar-width); background: radial-gradient(circle, rgba(6,9,15,0.7) 0%, rgba(6,9,15,0.95) 100%); z-index: -1; }
        .wrapper { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar-width); min-width: var(--sidebar-width); background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(25px); border-right: 1px solid rgba(197, 160, 89, 0.2); display: flex; flex-direction: column; padding: 25px 15px; }
        .sidebar-logo { width: 100px; margin: 0 auto 30px; display: block; }
        .sidebar-nav { flex-grow: 1; }
        .nav-item-ucmi { display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s; font-size: 0.85rem; }
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }

        .btn-maestro { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; font-weight: 600; text-transform: uppercase; font-size: 0.65rem; border-radius: 50px; padding: 10px; text-align: center; text-decoration: none; display: block; margin-bottom: 10px; }
        .btn-cerrar { background: transparent; border: 1px solid rgba(231, 76, 60, 0.4); color: rgba(231, 76, 60, 0.9); font-weight: 600; text-transform: uppercase; font-size: 0.65rem; border-radius: 50px; padding: 8px; text-align: center; display: block; text-decoration: none; }

        /* CONTENIDO - GLASS PANEL */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .glass-panel { background: rgba(255, 255, 255, 0.03) !important; backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        
        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        #user-table-body tr { background: rgba(255, 255, 255, 0.05); transition: 0.3s; }
        #user-table-body tr:hover { background: rgba(255, 255, 255, 0.15); }
        
        .btn-trash { background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3); color: #ff4d4d; border-radius: 12px; padding: 8px 15px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-trash:hover { background: #ff4d4d; color: white; transform: scale(1.15) rotate(5deg); }
        
        .select-input-ucmi { background: rgba(26, 42, 58, 0.6) !important; border: 1px solid rgba(255, 255, 255, 0.15) !important; color: #fff !important; border-radius: 20px; padding: 8px 35px 8px 40px; }

<body>

<div class="overlay"></div>
<div class="wrapper">
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="sidebar-logo">
        <nav class="sidebar-nav">
            <a href="master-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="master-vigencia.html" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
            <a href="master-usuarios.html" class="nav-item-ucmi active"><i class="bi bi-people"></i> USUARIOS</a>
            <a href="historial-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-clock-history"></i> HISTORIAL</a>
            <a href="directorio.html" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="ofertas-academicas.html" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="master-repositorio.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="papelera.html" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-auto pt-3">
            <a href="super-admin.html" class="btn-maestro"><i class="bi bi-cpu"></i> PANEL MAESTRO</a>
            <a href="#" id="btnLogoutSidebar" class="btn-cerrar"><i class="bi bi-power"></i> CERRAR SESIÓN</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="glass-panel">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div><h3 class="fw-bold text-uppercase">Gestión de Usuarios</h3></div>
                <div class="d-flex gap-2">
                    <button onclick="exportarPDF()" class="btn btn-outline-light btn-sm rounded-pill px-3">PDF</button>
                    <button onclick="exportarExcel()" class="btn btn-outline-success btn-sm rounded-pill px-3">EXCEL</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table-custom" id="tablaUsuariosUcmi">
                    <thead><tr class="text-white-50 small text-uppercase"><th>Entidad</th><th>Responsable</th><th>Email</th><th>Perfil</th><th>Operaciones</th></tr></thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const app = initializeApp({
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634"
    });
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        const tbody = document.getElementById("user-table-body");
        tbody.innerHTML = "";
        snapshot.forEach((d) => {
            const u = d.data();
            if (u.status === "eliminado") return;
            tbody.innerHTML += `<tr>
                <td class="py-3 ps-4">${u.entidad || '-'}</td>
                <td>${u.nombreResponsable || '-'}</td>
                <td>${u.email || '-'}</td>
                <td>${(u.perfil || 'Usuario').toUpperCase()}</td>
                <td class="text-end pe-4"><button onclick="enviarAPapelera('${d.id}', '${u.nombreResponsable}')" class="btn-trash"><i class="bi bi-trash3-fill"></i></button></td>
            </tr>`;
        });
    });

    window.enviarAPapelera = async (id, nombre) => {
        const res = await Swal.fire({ title: '¿Enviar a papelera?', text: nombre, icon: 'warning', background: '#0a0e14', color: '#fff', showCancelButton: true });
        if (res.isConfirmed) {
            await updateDoc(doc(db, "usuarios", id), { status: "eliminado", fechaEliminacion: serverTimestamp() });
            Swal.fire({ icon: 'success', title: 'Movido', background: '#0a0e14', color: '#fff' });
        }
    };

    document.getElementById("btnLogoutSidebar").onclick = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>
