<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Usuarios</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --sidebar-width: 260px;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: white; 
               background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; 
               background-size: cover; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; width: 100vw; }
        
        /* SIDEBAR */
        .sidebar { width: var(--sidebar-width); min-width: var(--sidebar-width); background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(25px); border-right: 1px solid rgba(197, 160, 89, 0.2); display: flex; flex-direction: column; padding: 25px 15px; }
        .sidebar-logo { width: 100px; margin: 0 auto 30px; display: block; }
        .sidebar-nav { flex-grow: 1; }
        .nav-item-ucmi { display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s; font-size: 0.85rem; }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }
        .nav-item-ucmi i { margin-right: 12px; }

        /* CONTENIDO */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(25px); border-radius: 30px; padding: 40px; }
        .btn-trash { background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3); color: #ff4d4d; border-radius: 10px; padding: 5px 10px; }
        .btn-trash:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

<div class="wrapper">
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="sidebar-logo">
        <nav class="sidebar-nav">
            <a href="master-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="master-vigencia.html" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
            <a href="master-usuarios.html" class="nav-item-ucmi active"><i class="bi bi-people"></i> USUARIOS</a>
            <a href="historial-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-clock-history"></i> HISTORIAL</a>
            <a href="directorio.html" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="ofertas-academicas.html" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="master-repositorio.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="papelera.html" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-auto pt-3">
            <a href="super-admin.html" class="btn-maestro text-white text-decoration-none d-block text-center border rounded-pill py-2 mb-2"><i class="bi bi-cpu"></i> PANEL MAESTRO</a>
            <a href="#" id="btnLogout" class="btn-cerrar text-danger text-decoration-none d-block text-center border rounded-pill py-2"><i class="bi bi-power"></i> CERRAR SESIÓN</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="glass-panel">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-uppercase">Gestión de Usuarios</h3>
                <div class="d-flex gap-2">
                    <button onclick="exportarPDF()" class="btn btn-outline-light btn-sm rounded-pill px-3">PDF</button>
                    <button onclick="exportarExcel()" class="btn btn-outline-success btn-sm rounded-pill px-3">EXCEL</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table text-white">
                    <thead>
                        <tr><th>Entidad</th><th>Responsable</th><th>Email</th><th>Rol</th><th>Operaciones</th></tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const app = initializeApp({
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634"
    });
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });
    document.getElementById("btnLogout").onclick = () => signOut(auth).then(() => window.location.href = "index.html");

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        const tbody = document.getElementById("user-table-body");
        tbody.innerHTML = "";
        snapshot.forEach((d) => {
            const u = d.data();
            if (u.status === "eliminado") return;
            tbody.innerHTML += `<tr>
                <td>${u.entidad}</td><td>${u.nombreResponsable}</td><td>${u.email}</td>
                <td>${u.perfil || 'Usuario'}</td>
                <td><button onclick="enviarAPapelera('${d.id}')" class="btn-trash"><i class="bi bi-trash3-fill"></i></button></td>
            </tr>`;
        });
    });

    window.enviarAPapelera = async (id) => {
        await updateDoc(doc(db, "usuarios", id), { status: "eliminado", fechaEliminacion: serverTimestamp() });
        Swal.fire('Éxito', 'Usuario enviado a papelera', 'success');
    };
</script>
</body>
</html>
