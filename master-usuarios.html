<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Usuarios Oficiales</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --dorado-neon: #ffcc66;
            --azul-neon: #00f2ff;
            --glow-hover: rgba(197, 160, 89, 0.25);
            --dorado-ucmi: #c5a059;
            --sidebar-width: 260px;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background: rgba(26, 42, 58, 0.6);
            backdrop-filter: blur(15px);
            padding: 25px 15px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo { height: 50px; margin-bottom: 10px; }
        .neon-gold { color: var(--dorado-neon); text-shadow: 0 0 10px rgba(255, 204, 102, 0.4); font-weight: bold; }
        .sidebar-nav { flex-grow: 1; margin-top: 20px; }
        
        .nav-item-ucmi {
            display: flex; align-items: center; color: rgba(255,255,255,0.6);
            text-decoration: none; padding: 10px 15px; margin-bottom: 5px;
            border-radius: 10px; transition: 0.3s all ease; font-size: 0.85rem;
        }
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }

        /* --- CONTENIDO --- */
        .main-content { flex-grow: 1; padding: 40px; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        #user-table-body tr { background: rgba(255, 255, 255, 0.05); transition: 0.3s; }
        #user-table-body tr:hover { background-color: rgba(255, 255, 255, 0.15) !important; box-shadow: 0 0 15px var(--glow-hover); }
        
        .neon-blue { color: var(--azul-neon); text-shadow: 0 0 10px rgba(0, 242, 255, 0.4); font-family: monospace; }
        .btn-trash { background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3); color: #ff4d4d; border-radius: 10px; padding: 8px 12px; }
        .btn-trash:hover { background: #ff4d4d; color: white; transform: scale(1.1); }
        
        .select-input-ucmi {
            background: rgba(26, 42, 58, 0.8) !important; border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #fff !important; border-radius: 20px; padding: 8px 35px; cursor: pointer;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="text-center mb-4">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="sidebar-logo">
            <p class="small mt-2 neon-gold">UCMI ADMIN</p>
        </div>
        <nav class="sidebar-nav">
            <a href="master-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="master-usuarios.html" class="nav-item-ucmi active"><i class="bi bi-people"></i> USUARIOS</a>
            <a href="papelera.html" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <button id="btnLogoutSidebar" class="btn btn-outline-danger btn-sm w-100 rounded-pill">CERRAR SESIÓN</button>
    </aside>

    <main class="main-content">
        <div class="glass-panel">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="neon-gold text-uppercase">Gestión de Usuarios</h2>
                <select id="selectorAcademiaFiltro" class="form-select select-input-ucmi w-25"></select>
            </div>
            <div class="table-responsive">
                <table class="table-custom">
                    <thead><tr class="text-white-50 small text-uppercase"><th>Entidad</th><th>Responsable</th><th>Email</th><th>Perfil</th><th>Operaciones</th></tr></thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
            authDomain: "ucmi-13796634.firebaseapp.com",
            projectId: "ucmi-13796634"
        });
        const db = getFirestore(app);
        const auth = getAuth(app);

        const tableBody = document.getElementById('user-table-body');
        const selectorFiltro = document.getElementById('selectorAcademiaFiltro');
        let registrosUsuarios = [];

        onSnapshot(collection(db, "usuarios"), (snapshot) => {
            registrosUsuarios = [];
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (data.status !== "eliminado") registrosUsuarios.push({ id: docSnap.id, ...data });
            });
            renderizar();
            actualizarSelector();
        });

        function actualizarSelector() {
            const academias = [...new Set(registrosUsuarios.map(u => u.entidad).filter(Boolean))];
            selectorFiltro.innerHTML = `<option value="TODOS">TODAS LAS ACADEMIAS</option>` + academias.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        function renderizar() {
            const valor = selectorFiltro.value;
            tableBody.innerHTML = registrosUsuarios
                .filter(u => valor === "TODOS" || u.entidad === valor)
                .map(u => `
                    <tr>
                        <td class="py-3 ps-4"><span class="neon-gold">${u.entidad || '-'}</span></td>
                        <td>${u.nombreResponsable || '-'}</td>
                        <td><span class="neon-blue">${u.email || '-'}</span></td>
                        <td><span class="badge" style="border: 1px solid #c5a059; color: #c5a059;">${(u.perfil || 'USUARIO').toUpperCase()}</span></td>
                        <td class="text-end pe-4"><button onclick="enviarAPapelera('${u.id}', '${u.nombreResponsable}')" class="btn-trash"><i class="bi bi-trash3-fill"></i></button></td>
                    </tr>`).join('');
        }

        selectorFiltro.addEventListener('change', renderizar);

        window.enviarAPapelera = async (id, nombre) => {
            if ((await Swal.fire({ title: '¿Enviar a papelera?', text: nombre, icon: 'warning', background: '#0a0e14', color: '#fff', showCancelButton: true })).isConfirmed) {
                await updateDoc(doc(db, "usuarios", id), { status: "eliminado", fechaEliminacion: serverTimestamp() });
            }
        };

        document.getElementById('btnLogoutSidebar').onclick = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>
