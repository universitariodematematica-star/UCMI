<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --blanco-suave: rgba(255, 255, 255, 0.85);
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            min-height: 100vh;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .navbar-master {
            background: rgba(6, 9, 15, 0.85);
            border-bottom: 1px solid rgba(197, 160, 89, 0.5);
            backdrop-filter: blur(15px);
            padding: 0.8rem 2rem;
        }

        .logo-nav { height: 50px; }

        /* Contenedor de Tabla */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .table {
            color: var(--blanco-suave);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .table thead th {
            color: var(--dorado-ucmi);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--dorado-ucmi);
        }

        .user-row {
            transition: 0.3s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-row:hover {
            background: rgba(197, 160, 89, 0.05);
        }

        .role-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            background: rgba(197, 160, 89, 0.2);
            color: var(--dorado-ucmi);
            border: 1px solid var(--dorado-ucmi);
        }

        .btn-action {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            padding: 5px 10px;
            transition: 0.3s;
        }

        .btn-action:hover {
            background: var(--dorado-ucmi);
            color: black;
        }

        /* Reproductor Flotante */
        #audio-panel {
            position: fixed;
            bottom: 25px;
            left: 25px;
            z-index: 2000;
            background: rgba(6, 9, 15, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 20px 8px 8px;
            border-radius: 50px;
            border: 1px solid var(--dorado-ucmi);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #play-btn {
            background: var(--dorado-ucmi);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="overlay">
    <nav class="navbar navbar-master sticky-top">
        <div class="container-fluid d-flex justify-content-between">
            <a href="super-admin.html" class="text-white text-decoration-none">
                <i class="bi bi-arrow-left me-2"></i> Volver al Panel
            </a>
            <img src="logo_ucmi.png" alt="UCMI Logo" class="logo-nav">
            <span class="text-glow-gold fw-bold">Gestión de Usuarios</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-people-fill me-3 text-glow-gold"></i>Usuarios del Sistema</h2>
            <button class="btn btn-outline-warning rounded-pill px-4">
                <i class="bi bi-person-plus-fill me-2"></i>Nuevo Usuario
            </button>
        </div>

        <div class="glass-panel">
            <div class="table-responsive">
                <table class="table table-borderless align-middle">
                    <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>Correo</th>
                            <th>Rol / Jerarquía</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <tr class="user-row">
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="icon-circle shadow-sm me-3" style="width: 40px; height: 40px; background: rgba(197, 160, 89, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                                        <i class="bi bi-person text-warning"></i>
                                    </div>
                                    <span class="fw-bold">Juan Carlos Riera</span>
                                </div>
                            </td>
                            <td>jcriera@ucmi.edu</td>
                            <td><span class="role-badge">SUPER ADMIN</span></td>
                            <td><span class="text-success"><i class="bi bi-circle-fill me-2" style="font-size: 8px;"></i> Activo</span></td>
                            <td class="text-end">
                                <button class="btn-action"><i class="bi bi-pencil"></i></button>
                                <button class="btn-action text-danger"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="audio-panel">
    <button onclick="toggleAudio()" id="play-btn"><i class="bi bi-play-fill" id="audio-icon" style="color: black; font-size: 1.5rem;"></i></button>
    <div style="line-height: 1;">
        <small class="d-block text-white-50" style="font-size: 0.6rem;">AUTO-START ACTIVE</small>
        <span style="color: var(--dorado-ucmi); font-size: 0.75rem; font-weight: bold;">The God That Failed</span>
    </div>
    <audio id="master-bgm" loop><source src="The God That Failed (Remastered).mp3" type="audio/mpeg"></audio>
</div>

<script>
    const audio = document.getElementById('master-bgm');
    const icon = document.getElementById('audio-icon');
    audio.volume = 0.4;

    function toggleAudio() {
        if (audio.paused) {
            audio.play();
            icon.classList.replace('bi-play-fill', 'bi-pause-fill');
        } else {
            audio.pause();
            icon.classList.replace('bi-pause-fill', 'bi-play-fill');
        }
    }

    // DISPARADOR AUTOMÁTICO (Igual que en Super-Admin)
    const triggerAutoplay = () => {
        if (audio.paused) toggleAudio();
        ['click', 'scroll', 'keydown'].forEach(e => document.removeEventListener(e, triggerAutoplay));
    };

    ['click', 'scroll', 'keydown'].forEach(e => document.addEventListener(e, triggerAutoplay));
</script>

</body>
</html>
