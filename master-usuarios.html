<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Gestión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --sidebar-width: 260px;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; color: white; 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; 
            background-size: cover; overflow: hidden; 
        }

        .wrapper { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(25px); border-right: 1px solid rgba(197, 160, 89, 0.2); display: flex; flex-direction: column; padding: 25px 15px; }
        .sidebar-logo { width: 100px; margin: 0 auto 30px; }
        .nav-item-ucmi { display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s; font-size: 0.85rem; }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }
        
        /* Glassmorphism Panel */
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Tabla y Botones */
        .table { color: white !important; border-collapse: separate; border-spacing: 0 10px; }
        .table tbody tr { background: rgba(255, 255, 255, 0.05); transition: background 0.3s ease; }
        .table tbody tr:hover { background: rgba(255, 255, 255, 0.1); }
        
        .btn-trash {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            border-radius: 12px;
            padding: 8px 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-trash:hover {
            background: #e74c3c;
            color: white;
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.5);
        }
    </style>
</head>
<body>

<div class="wrapper">
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="sidebar-logo">
        <nav class="sidebar-nav">
            <a href="#" class="nav-item-ucmi active"><i class="bi bi-people"></i> USUARIOS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-auto">
            <a href="#" id="btnLogout" class="btn btn-outline-danger w-100 rounded-pill"><i class="bi bi-power"></i> SALIR</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="glass-panel">
            <h3 class="fw-bold mb-4">Gestión de Usuarios</h3>
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>Entidad</th><th>Responsable</th><th>Email</th><th>Operaciones</th></tr></thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const app = initializeApp({
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634"
    });
    const db = getFirestore(app);
    const auth = getAuth(app);

    document.getElementById("btnLogout").onclick = () => signOut(auth).then(() => window.location.href = "index.html");

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        const tbody = document.getElementById("user-table-body");
        tbody.innerHTML = "";
        snapshot.forEach((d) => {
            const u = d.data();
            if (u.status === "eliminado") return;
            tbody.innerHTML += `<tr>
                <td class="align-middle">${u.entidad}</td>
                <td class="align-middle">${u.nombreResponsable}</td>
                <td class="align-middle">${u.email}</td>
                <td class="align-middle">
                    <button onclick="enviarAPapelera('${d.id}')" class="btn-trash">
                        <i class="bi bi-trash3-fill"></i>
                    </button>
                </td>
            </tr>`;
        });
    });

    window.enviarAPapelera = async (id) => {
        await updateDoc(doc(db, "usuarios", id), { status: "eliminado", fechaEliminacion: serverTimestamp() });
        Swal.fire({ title: 'Enviado', text: 'Usuario en papelera', icon: 'success', background: '#0a0e14', color: '#fff' });
    };
</script>
</body>
</html>
