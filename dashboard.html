<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Mi Progreso Académico</title>
    
    <style>
        :root {
            --primary-blue: #000080;
            --aqua: #7FFFD4;
            --bg-gray: #f4f6f9;
            --success-green: #27ae60;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-gray);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            color: var(--text);
        }

        /* --- DASHBOARD LAYOUT --- */
        .dashboard-container {
            width: 100%;
            max-width: 950px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dashboard-card {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .header { 
            border-left: 5px solid var(--aqua); 
            padding-left: 15px; 
            margin-bottom: 25px; 
        }
        .user-name-title { color: var(--primary-blue); font-size: 1.8rem; font-weight: 800; }

        /* --- SKILLS PROGRESS --- */
        .skills-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .skill-stat {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #eee;
        }
        .skill-stat label { font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; }
        .skill-stat .percent { display: block; font-size: 1.5rem; font-weight: 900; color: var(--primary-blue); }
        .progress-bar { height: 6px; background: #e0e0e0; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--aqua); width: 0%; transition: width 1s ease-in-out; }

        /* --- FILTROS --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            align-items: flex-end;
            background: #fdfdfd;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #f0f0f0;
        }

        .input-box { display: flex; flex-direction: column; gap: 8px; }
        .input-box label { font-size: 0.85rem; font-weight: 600; color: #555; }
        select { padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        select:focus { border-color: var(--primary-blue); outline: none; }

        .btn-consultar {
            background-color: var(--primary-blue);
            color: white; border: none; padding: 14px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-consultar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,128,0.2); }

        /* --- RESULTADOS --- */
        .result-section { 
            margin-top: 30px; 
            text-align: center;
        }
        
        #score-display {
            display: none;
            background: linear-gradient(135deg, var(--primary-blue), #0000cd);
            color: white; width: 220px; padding: 25px; margin: 0 auto 20px;
            border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .btn-gen-cert {
            display: none;
            background-color: var(--success-green);
            color: white; border: none; padding: 15px 40px; margin: 0 auto;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- CERTIFICADO --- */
        #certificate-wrapper {
            display: none;
            width: 100%;
            max-width: 850px;
            margin-top: 30px;
        }

        #certificate-area {
            background: white;
            padding: 50px;
            border: 15px double var(--primary-blue);
            position: relative;
            color: #333;
        }

        #certificate-area::before {
            content: '';
            position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 2px solid var(--aqua);
            pointer-events: none;
        }

        .cert-text { font-size: 1.5rem; line-height: 1.8; margin-bottom: 30px; }
        .highlight { font-weight: bold; color: var(--primary-blue); border-bottom: 2px solid var(--aqua); }

        @media print {
            .dashboard-card, .btn-gen-cert, .btn-consultar, header { display: none !important; }
            body { background: white; padding: 0; }
            #certificate-area { border: 5px solid black; }
        }
    </style>
    
    <script type="module" src="protect.js"></script>
</head>
<body>

<div class="dashboard-container">
    <div class="dashboard-card">
        <div class="header">
            <span style="color:#777; font-size: 0.9rem;">Bienvenido de nuevo,</span>
            <div id="student-name-header" class="user-name-title">Cargando...</div>
        </div>

        <div class="skills-summary">
            <div class="skill-stat">
                <label>Grammar</label>
                <span class="percent" id="stat-erg">0%</span>
                <div class="progress-bar"><div id="bar-erg" class="progress-fill"></div></div>
            </div>
            <div class="skill-stat">
                <label>Listening</label>
                <span class="percent" id="stat-erl">0%</span>
                <div class="progress-bar"><div id="bar-erl" class="progress-fill"></div></div>
            </div>
            <div class="skill-stat">
                <label>Reading</label>
                <span class="percent" id="stat-err">0%</span>
                <div class="progress-bar"><div id="bar-err" class="progress-fill"></div></div>
            </div>
            <div class="skill-stat">
                <label>Writing</label>
                <span class="percent" id="stat-erw">0%</span>
                <div class="progress-bar"><div id="bar-erw" class="progress-fill"></div></div>
            </div>
        </div>

        <div class="grid-layout">
            <div class="input-box">
                <label>Unidad</label>
                <select id="unidad">
                    <option value="">--</option>
                    <script>for(let i=1; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                </select>
            </div>
            <div class="input-box">
                <label>Tema</label>
                <select id="tema">
                    <option value="">--</option>
                    <option value="1">Tema 1</option>
                    <option value="2">Tema 2</option>
                    <option value="3">Tema 3</option>
                </select>
            </div>
            <div class="input-box">
                <label>Habilidad</label>
                <select id="skill">
                    <option value="">--</option>
                    <option value="erg">Grammar (ERG)</option>
                    <option value="erl">Listening (ERL)</option>
                    <option value="err">Reading (ERR)</option>
                    <option value="erw">Writing (ERW)</option>
                </select>
            </div>
            <button class="btn-consultar" id="btnConsultar">Consultar Nota</button>
        </div>

        <div class="result-section">
            <div id="alert-msg"></div>
            <div id="score-display">
                <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;">Resultado</div>
                <div id="final-score-val" style="font-size: 4rem; font-weight: 900;">0.0</div>
            </div>
            <button id="btn-gen-cert" class="btn-gen-cert">⭐ Generar Certificado de Logro</button>
        </div>
    </div>

    <div id="certificate-wrapper">
        <div id="certificate-area">
            <div style="text-align: center; margin-bottom: 30px;">
                <img alt="Logo UCMI" width="180" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEivYd4lw8N1dKU2AjM2w6EBfYGXsoF8MVfRRzw3gDXyZFSFMasW4PXwEHnDKwMwe3-_nCCrNKtJjYZFojEa5mPB6HlBYkcPwXMtvrbtVZux9CtCT-BDV7CmjPLk-t6EDVx3b2gtEq8Qd98Acg__HnOBIdiVsflSAwGFPqj6KIv_USy3U6CjsGPkUZyR1nJW/s320/Imagen%20UCMI%20-%20copia.png"/>
            </div>
            
            <div class="cert-text" style="text-align: center;">
                CERTIFICADO DE EXCELENCIA <br>
                <span style="font-size: 1rem; color: #777;">Otorgado a:</span> <br>
                <span class="highlight" id="pdf-student-name" style="font-size: 2.2rem;">...</span> <br>
                <br>
                Por haber demostrado dominio en la habilidad de <br>
                <span class="highlight" id="pdf-skill">...</span> <br>
                correspondiente a la <span class="highlight">Unidad <span id="pdf-u"></span>, Tema <span id="pdf-t"></span></span>. <br>
                Calificación obtenida: <span class="highlight" id="pdf-score">0.0</span> / 10.
                <br><br>
                <small>Emitido el <span id="pdf-fecha"></span> a las <span id="pdf-hora"></span></small>
            </div>

            <div style="text-align: center; margin-top: 40px; border-top: 1px dashed #ccc; padding-top: 20px;">
                <div style="font-size: 0.7rem; letter-spacing: 3px; color: #999;">VALIDACIÓN INTERNA</div>
                <div id="pdf-codigo" style="font-family: monospace; font-size: 1.4rem; font-weight: bold;">---------</div>
            </div>
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn-consultar" style="background: #333;" onclick="window.print()">📥 Descargar como PDF / Imprimir</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
        authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
        projectId: "portal-autenticacion-a1ngles"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentGradeData = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userSnap = await getDoc(doc(db, "users", user.email));
            if (userSnap.exists()) {
                const name = userSnap.data().name || user.email;
                document.getElementById("student-name-header").innerText = name;
                document.getElementById("pdf-student-name").innerText = name;
            }
            calculateOverallProgress(user.email);
        } else {
            window.location.href = "index.html";
        }
    });

    // --- NUEVO: Calcula promedios por Habilidad ---
    async function calculateOverallProgress(email) {
        const q = query(collection(db, "grades"), where("studentEmail", "==", email));
        const snap = await getDocs(q);
        
        const totals = { erg: {s:0, n:0}, erl: {s:0, n:0}, err: {s:0, n:0}, erw: {s:0, n:0} };
        
        snap.forEach(doc => {
            const d = doc.data();
            const id = (d.exercise_id || "").toLowerCase();
            const score = parseFloat(d.score || 0);
            
            for (let k in totals) {
                if (id.includes(k)) {
                    totals[k].s += score;
                    totals[k].n += 1;
                }
            }
        });

        for (let k in totals) {
            const avg = totals[k].n > 0 ? (totals[k].s / totals[k].n) * 10 : 0;
            document.getElementById(`stat-${k}`).innerText = `${Math.round(avg)}%`;
            document.getElementById(`bar-${k}`).style.width = `${Math.round(avg)}%`;
        }
    }

    window.consultar = async function() {
        const u = document.getElementById('unidad').value;
        const t = document.getElementById('tema').value;
        const s = document.getElementById('skill').value;
        const alertMsg = document.getElementById('alert-msg');
        const scoreBox = document.getElementById('score-display');
        const btnGen = document.getElementById('btn-gen-cert');

        if (!u || !t || !s) {
            alertMsg.innerHTML = "<span style='color:red'>Selecciona Unidad, Tema y Habilidad.</span>";
            return;
        }

        alertMsg.innerHTML = "Verificando progreso...";
        
        // Buscamos cualquier ejercicio que contenga el patrón (Ej: erg 1.1)
        const pattern = `${s.toLowerCase()} ${u}.${t}`;

        try {
            const q = query(
                collection(db, "grades"),
                where("studentEmail", "==", auth.currentUser.email),
                orderBy("timestamp", "desc")
            );

            const snap = await getDocs(q);
            let found = null;

            // Filtramos manualmente para mayor flexibilidad con los espacios y puntos
            snap.forEach(doc => {
                const data = doc.data();
                if (data.exercise_id.toLowerCase().includes(pattern)) {
                    if (!found) found = data; 
                }
            });

            if (found) {
                currentGradeData = found;
                document.getElementById('final-score-val').innerText = found.score.toFixed(1);
                scoreBox.style.display = "block";
                btnGen.style.display = "block";
                alertMsg.innerHTML = "<span style='color:green'>¡Excelente trabajo! Nota recuperada.</span>";
            } else {
                scoreBox.style.display = "none";
                btnGen.style.display = "none";
                alertMsg.innerHTML = "<span style='color:orange'>Aún no has completado este ejercicio.</span>";
            }
        } catch (error) {
            console.error(error);
            alertMsg.innerHTML = "Error de conexión.";
        }
    };

    window.mostrarCertificado = function() {
        if (!currentGradeData) return;
        const date = currentGradeData.timestamp.toDate();
        
        document.getElementById('pdf-u').innerText = document.getElementById('unidad').value;
        document.getElementById('pdf-t').innerText = document.getElementById('tema').value;
        document.getElementById('pdf-skill').innerText = document.getElementById('skill').options[document.getElementById('skill').selectedIndex].text;
        document.getElementById('pdf-score').innerText = currentGradeData.score.toFixed(1);
        document.getElementById('pdf-fecha').innerText = date.toLocaleDateString();
        document.getElementById('pdf-hora').innerText = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        document.getElementById('pdf-codigo').innerText = currentGradeData.certificate_code || "UCMI-VERIFIED";

        document.getElementById('certificate-wrapper').style.display = "block";
        window.scrollTo({ top: document.getElementById('certificate-wrapper').offsetTop, behavior: 'smooth' });
    };

    document.getElementById("btnConsultar").onclick = consultar;
    document.getElementById("btn-gen-cert").onclick = mostrarCertificado;
</script>

</body>
</html>
