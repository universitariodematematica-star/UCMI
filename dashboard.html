<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Profesores</title>
<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

h2 {
    margin-bottom: 20px;
}

.card {
    border: 1px solid #ccc;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    background: #f9f9f9;
}
</style>
</head>

<body>

<h2>📊 Dashboard de Calificaciones</h2>

<div id="dashboard">Cargando...</div>

<script type="module">
import { db } from "./firebase.js";
import {
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function cargarDashboard() {

    const container = document.getElementById("dashboard");
    container.innerHTML = "Cargando datos...";

    try {

        const usersSnap = await getDocs(collection(db, "users"));

        let html = "";

        for (const userDoc of usersSnap.docs) {

            const uid = userDoc.id;

            const progressSnap = await getDocs(
                collection(db, "users", uid, "progress")
            );

            progressSnap.forEach(doc => {

                const data = doc.data();

                html += `
                <div class="card">
                    <b>Usuario:</b> ${uid}<br>
                    <b>Ejercicio:</b> ${doc.id}<br>
                    <b>Nota:</b> ${data.score} / ${data.maxScore}<br>
                    <b>Perfecto:</b> ${data.isPerfect}
                </div>
                `;
            });
        }

        container.innerHTML = html || "No hay datos aún.";

    } catch (error) {
        console.error(error);
        container.innerHTML = "Error cargando datos.";
    }
}

cargarDashboard();
</script>

</body>
</html>
