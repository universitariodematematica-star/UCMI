<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Profesor</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

h2 {
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: left;
}

th {
    background-color: #f2f2f2;
}

.row-ok {
    background-color: #e8ffe8;
}
</style>
</head>

<body>

<h2>📊 Dashboard de Calificaciones</h2>

<table>
    <thead>
        <tr>
            <th>Estudiante</th>
            <th>Ejercicio</th>
            <th>Tipo</th>
            <th>Score</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 TU CONFIG
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
  projectId: "portal-autenticacion-a1ngles",
  storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
  messagingSenderId: "1039504020190",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadDashboard() {

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    // 🔥 1. obtener usuarios
    const usersSnap = await getDocs(collection(db, "users"));

    for (const userDoc of usersSnap.docs) {

        const userId = userDoc.id;
        const userData = userDoc.data();

        const name = userData.name || userData.email || userId;

        // 🔥 2. obtener progress del usuario
        const progressSnap = await getDocs(collection(db, "users", userId, "progress"));

        progressSnap.forEach(doc => {

            const data = doc.data();

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${name}</td>
                <td>${doc.id}</td>
                <td>${data.type || "-"}</td>
                <td>${data.score ?? "-"}</td>
            `;

            if (data.score === 10) {
                row.classList.add("row-ok");
            }

            tbody.appendChild(row);
        });
    }
}

loadDashboard();

</script>

</body>
</html>
