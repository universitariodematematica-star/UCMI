<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tópicos - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #06090f; color: white; padding: 40px; font-family: 'Segoe UI', sans-serif; }
        .panel-ucmi { background: rgba(10, 25, 47, 0.82); padding: 30px; border-radius: 25px; box-shadow: 0 8px 30px rgba(0,0,0,.4); }
        .btn-ucmi { background: #c5a059; color: black; font-weight: bold; border-radius: 10px; }
        .table-dark { background: transparent; }
    </style>
</head>
<body>

<div class="container panel-ucmi">
    <a href="master-repositorio.html" class="text-white mb-3 d-inline-block"><i class="bi bi-arrow-left"></i> Volver a Módulos</a>
    
    <div class="mb-4">
        <h2 id="tituloModulo" class="text-white">Módulo: Cargando...</h2>
        <h4 id="tituloRama" class="text-info">Rama: Cargando...</h4>
    </div>

    <button class="btn btn-ucmi mb-4" data-bs-toggle="modal" data-bs-target="#modalTopico">
        <i class="bi bi-plus-circle"></i> Registrar Tópico
    </button>

    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Nombre del Tópico</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaTopicos"></tbody>
    </table>
</div>

<div class="modal fade" id="modalTopico" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary">
                <h5>Registrar Nuevo Tópico</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input id="inputNombreTopico" class="form-control" placeholder="Nombre del tópico">
                <button id="btnGuardarTopico" class="btn btn-warning w-100 mt-3">Guardar Tópico</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, query, where, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Configuración (Asegúrate de copiar tu configuración de Firebase aquí)
const firebaseConfig = {
  apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
  authDomain: "ucmi-13796634.firebaseapp.com",
  projectId: "ucmi-13796634",
  storageBucket: "ucmi-13796634.firebasestorage.app",
  messagingSenderId: "1090719609536",
  appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325",
  measurementId: "G-3M3DH25722"
};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const ramaId = params.get("ramaId");

    // 1. Cargar datos del Módulo y la Rama
    async function cargarEncabezado() {
        const ramaSnap = await getDoc(doc(db, "ramas", ramaId));
        if (ramaSnap.exists()) {
            const dataRama = ramaSnap.data();
            document.getElementById("tituloRama").innerText = "Rama: " + dataRama.nombre;
            
            const modSnap = await getDoc(doc(db, "ofertas", dataRama.moduloId));
            document.getElementById("tituloModulo").innerText = "Módulo: " + modSnap.data().modulo;
        }
    }

    // 2. Cargar lista de Tópicos en tiempo real
    const q = query(collection(db, "topicos"), where("ramaId", "==", ramaId));
    onSnapshot(q, (snap) => {
        const tabla = document.getElementById("tablaTopicos");
        tabla.innerHTML = "";
        snap.docs.sort((a,b) => a.data().nombre.localeCompare(b.data().nombre)).forEach(t => {
            const d = t.data();
            tabla.innerHTML += `
                <tr>
                    <td>${d.nombre}</td>
                    <td class="text-end">
                        <input type="checkbox" class="form-check-input me-2" ${d.visible !== false ? "checked" : ""} 
                            onchange="updateVisible('${t.id}', this.checked)">
                        <button class="btn btn-sm btn-outline-light me-1" onclick="editar('${t.id}', '${d.nombre}')">Editar</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="borrar('${t.id}')">Borrar</button>
                    </td>
                </tr>
            `;
        });
    });

    // 3. Lógica Guardar, Editar, Borrar y Visibilidad
document.getElementById("btnGuardarTopico").addEventListener("click", async () => {
    const input = document.getElementById("inputNombreTopico");
    const nombre = input.value.trim();
    
    // 1. Verificamos quién está intentando guardar
    const user = auth.currentUser;
    console.log("Usuario logueado:", user ? user.email : "Nadie");

    if (!nombre) return;
    console.log("Usuario actual:", auth.currentUser);
console.log("UID actual:", auth.currentUser?.uid);

try {
    await addDoc(collection(db, "topicos"), { 
        nombre: nombre, 
        ramaId: ramaId, 
        visible: true,
        fechaCreacion: new Date()
    });

    alert("¡Éxito! Tópico guardado.");
    input.value = "";
    bootstrap.Modal.getInstance(document.getElementById('modalTopico')).hide();

} catch (error) {
    console.error("ERROR:", error);
    console.error("CODE:", error.code);
    console.error("MESSAGE:", error.message);

    alert(
        "CODE: " + error.code +
        "\nMESSAGE: " + error.message
    );
}
});

    window.updateVisible = async (id, visible) => await updateDoc(doc(db, "topicos", id), { visible });
    
    window.editar = async (id, nombreActual) => {
        const nuevo = prompt("Nuevo nombre:", nombreActual);
        if (nuevo) await updateDoc(doc(db, "topicos", id), { nombre: nuevo });
    };

    window.borrar = async (id) => { if(confirm("¿Eliminar tópico?")) await deleteDoc(doc(db, "topicos", id)); };

    cargarEncabezado();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
