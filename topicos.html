<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tópicos - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
    background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png')
    no-repeat center center fixed;

    background-size: cover;
    color: white;
    padding: 40px;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
}

/* CONTENEDOR PRINCIPAL */
.panel-ucmi {
    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.15);

    border-radius: 25px;
    padding: 30px;

    box-shadow:
        0 8px 32px rgba(0,0,0,.25),
        inset 0 1px 0 rgba(255,255,255,.15);
}

/* SUBCONTENEDOR DE TÍTULOS */
.info-rama {
    background: rgba(255,255,255,0.05);

    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border: 1px solid rgba(255,255,255,0.10);

    border-radius: 20px;
    padding: 20px;
    margin-bottom: 25px;
}

/* TABLA DE CRISTAL */
.tabla-cristal {
    color: white;
    background: transparent !important;
}

.tabla-cristal th,
.tabla-cristal td {
    background: rgba(255,255,255,0.03) !important;
    color: white !important;
    border-color: rgba(255,255,255,0.1) !important;
}

.tabla-cristal thead th {
    background: rgba(255,255,255,0.08) !important;
    color: #c5a059;
}

.tabla-cristal tbody tr:hover {
    background: rgba(255,255,255,0.08) !important;
}

/* BOTÓN */
.btn-ucmi {
    background: rgba(197,160,89,.85);
    color: #000;
    font-weight: bold;
    border-radius: 12px;
    border: none;
}
    </style>
</head>
<body>

<div class="container panel-ucmi">
    <a href="gestion-modulos.html" class="text-white mb-3 d-inline-block"><i class="bi bi-arrow-left"></i> Volver a Módulos</a>
    
    <div class="mb-4">
        <h2 id="tituloModulo" class="text-white">Módulo: Cargando...</h2>
        <h4 id="tituloRama" class="text-info">Rama: Cargando...</h4>
    </div>

    <button class="btn btn-ucmi mb-4" data-bs-toggle="modal" data-bs-target="#modalTopico">
        <i class="bi bi-plus-circle"></i> Registrar Tópico
    </button>

    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Nombre del Tópico</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaTopicos"></tbody>
    </table>
</div>

<div class="modal fade" id="modalTopico" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary">
                <h5>Registrar Nuevo Tópico</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input id="inputNombreTopico" class="form-control" placeholder="Nombre del tópico">
                <button id="btnGuardarTopico" class="btn btn-warning w-100 mt-3">Guardar Tópico</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, query, where, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    // Configuración (Asegúrate de copiar tu configuración de Firebase aquí)
const firebaseConfig = {
  apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
  authDomain: "ucmi-13796634.firebaseapp.com",
  projectId: "ucmi-13796634",
  storageBucket: "ucmi-13796634.firebasestorage.app",
  messagingSenderId: "1090719609536",
  appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325",
  measurementId: "G-3M3DH25722"
};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const ramaId = params.get("ramaId");

    // 1. Cargar datos del Módulo y la Rama
    async function cargarEncabezado() {
        const ramaSnap = await getDoc(doc(db, "ramas", ramaId));
        if (ramaSnap.exists()) {
            const dataRama = ramaSnap.data();
            document.getElementById("tituloRama").innerText = "Rama: " + dataRama.nombre;
            
            const modSnap = await getDoc(doc(db, "ofertas", dataRama.moduloId));
            document.getElementById("tituloModulo").innerText = "Módulo: " + modSnap.data().modulo;
        }
    }

    // 2. Cargar lista de Tópicos en tiempo real
    const q = query(collection(db, "topicos"), where("ramaId", "==", ramaId));
    onSnapshot(q, (snap) => {
        const tabla = document.getElementById("tablaTopicos");
        tabla.innerHTML = "";
snap.docs
    .sort((a, b) => {
        return (a.data().fechaCreacion?.seconds || 0) -
               (b.data().fechaCreacion?.seconds || 0);
    })
    .forEach(t => {
            const d = t.data();
            tabla.innerHTML += `
                <tr>
                    <td>${d.tema}</td>
                        <td class="text-end">
                            <input 
                                type="checkbox" 
                                class="form-check-input me-2 toggle-visible"
                                data-id="${t.id}"
                                ${d.visible !== false ? "checked" : ""}
                            >
                            <button class="btn btn-sm btn-outline-light me-1" onclick="editar('${t.id}', '${d.tema}')">Editar</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="borrar('${t.id}')">Borrar</button>
                        </td>
                </tr>
            `;
        });
    });

    // 3. Lógica Guardar, Editar, Borrar y Visibilidad
document.getElementById("btnGuardarTopico").addEventListener("click", async () => {
    const input = document.getElementById("inputNombreTopico");
    const nombre = input.value.trim();
    
    // 1. Verificamos quién está intentando guardar
    const user = auth.currentUser;
    console.log("Usuario logueado:", user ? user.email : "Nadie");

    if (!nombre) return;
console.log("VERSION NUEVA CARGADA");
console.log("Usuario actual:", auth.currentUser);

try {
    await addDoc(collection(db, "topicos"), { 
    tema: nombre, 
    ramaId: ramaId, 
    visible: true,
    fechaCreacion: new Date()
});

    alert("¡Éxito! Tópico guardado.");
    input.value = "";
    bootstrap.Modal.getInstance(document.getElementById('modalTopico')).hide();

} catch (error) {
    console.error("ERROR:", error);
    console.error("CODE:", error.code);
    console.error("MESSAGE:", error.message);

    alert(
        "CODE: " + error.code +
        "\nMESSAGE: " + error.message
    );
}
});
    
window.editar = async (id, temaActual) => {
    const nuevo = prompt("Nuevo nombre:", temaActual);
    if (nuevo) await updateDoc(doc(db, "topicos", id), { tema: nuevo });
};

    window.borrar = async (id) => { if(confirm("¿Eliminar tópico?")) await deleteDoc(doc(db, "topicos", id)); };

    cargarEncabezado();

document.addEventListener("change", async (e) => {
    if (e.target.classList.contains("toggle-visible")) {

        const id = e.target.dataset.id;
        const visible = e.target.checked;

        console.log("CAMBIO CHECKBOX:", id, visible);

        try {
            await updateDoc(doc(db, "topicos", id), {
                visible: visible
            });
        } catch (error) {
            console.error("ERROR UPDATE VISIBILITY:", error);
        }
    }
});
    
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
