<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asignaturas del Curso</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>

:root{

    --azul-ucmi:#06090f;
    --azul-sidebar:#1a2a3a;
    --dorado:#c5a059;

}

body{

    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;

    background:url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png')
    no-repeat center center fixed;

    background-size:cover;

}

.app-wrapper{

    display:flex;
    min-height:100vh;

}

.sidebar{

    width:260px;

    background:rgba(26,42,58,.40);

    backdrop-filter:blur(20px);

    border-right:1px solid rgba(255,255,255,.15);

    display:flex;

    flex-direction:column;

    padding:25px 15px;

}

.logo-sidebar{

    width:auto;
    height:95px;

    margin:auto;
    margin-bottom:30px;

    opacity:0;

    transition:.4s;

}

.sidebar-nav{

    flex-grow:1;

}

.nav-item-ucmi{

    display:flex;

    align-items:center;

    color:rgba(255,255,255,.65);

    text-decoration:none;

    padding:10px 15px;

    border-radius:10px;

    margin-bottom:6px;

    transition:.25s;

}

.nav-item-ucmi i{

    margin-right:12px;

}

.nav-item-ucmi:hover{

    background:rgba(255,255,255,.10);

    color:white;

}

.nav-item-ucmi.active{

    color:var(--dorado);

    background:rgba(197,160,89,.15);

}

.super-overlay{

    flex-grow:1;

    padding:40px;

    background:radial-gradient(circle,
    rgba(6,9,15,.45),
    rgba(6,9,15,.82));

}

.titulo{

    text-align:center;

    margin-bottom:35px;

}

.titulo h1{

    font-size:2.2rem;

    font-weight:700;

}

.titulo p{

    opacity:.75;

    font-size:1.05rem;

}

.asignatura-card{

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(12px);

    border-radius:16px;

    padding:18px 22px;

    margin-bottom:18px;

    transition:.25s;

}

.asignatura-card:hover{

    background:rgba(255,255,255,.12);

}

.asignatura-info h4{

    margin:0;

    font-size:1.15rem;

}

.asignatura-info small{

    color:rgba(255,255,255,.65);

}

.btn-agregar{

    border:none;

    width:42px;

    height:42px;

    border-radius:50%;

    background:#198754;

    color:white;

    transition:.25s;

}

.btn-agregar:hover{

    transform:scale(1.08);

}

.btn-quitar{

    border:none;

    width:42px;

    height:42px;

    border-radius:50%;

    background:#dc3545;

    color:white;

    transition:.25s;

}

.btn-quitar:hover{

    transform:scale(1.08);

}

.seccion{

    margin-top:40px;

}

.seccion h3{

    margin-bottom:20px;

    color:var(--dorado);

}

</style>

</head>

<body>

<div class="app-wrapper">

<aside class="sidebar">

<div class="text-center">

<img
id="logoAcademia"
class="logo-sidebar"
src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png">

</div>

<nav class="sidebar-nav">

<a href="cursos.html" class="nav-item-ucmi active">
<i class="bi bi-journal-bookmark"></i>
Cursos
</a>

<a href="contenidos-academia.html" class="nav-item-ucmi">
<i class="bi bi-collection"></i>
Contenido
</a>

</nav>

</aside>

<main class="super-overlay">

<div class="titulo">

<h1>Asignaturas del Curso</h1>

<p>
Seleccione las asignaturas que pertenecerán al curso.
</p>

</div>

<div class="seccion">

<h3>Asignaturas disponibles</h3>

<div id="listaDisponibles">

</div>

</div>

<div class="seccion">

<h3>Asignaturas del curso</h3>

<div id="listaCurso">

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {

getFirestore,
collection,
doc,
getDoc,
addDoc,
deleteDoc,
query,
where,
onSnapshot,
serverTimestamp

} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {

getAuth,
onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({

apiKey:"AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
authDomain:"ucmi-13796634.firebaseapp.com",
projectId:"ucmi-13796634",
storageBucket:"ucmi-13796634.firebasestorage.app",
messagingSenderId:"1090719609536",
appId:"1:1090719609536:web:8d7f269d991d8dc3c6b325"

});

const db=getFirestore(app);

const auth=getAuth();

const params=new URLSearchParams(window.location.search);

const cursoId=params.get("curso");

let usuarioActual=null;

onAuthStateChanged(auth,async(user)=>{

if(!user){

location.href="index.html";

return;

}

usuarioActual=user;

const usuarioSnap=await getDoc(

doc(db,"usuarios",user.uid)

);

if(usuarioSnap.exists()){

const datos=usuarioSnap.data();

const logo=document.getElementById("logoAcademia");

logo.src=

datos.logoCustom ||

"https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";

logo.style.opacity="1";

}

cargarAsignaturasDisponibles();

cargarAsignaturasDelCurso();

});

function cargarAsignaturasDisponibles(){

const contenedor=document.getElementById("listaDisponibles");

const q=query(

collection(db,"asignaturas"),

where("entidad","==",

"GEMA")

);

onSnapshot(q,(snapshot)=>{

contenedor.innerHTML="";

snapshot.forEach(docSnap=>{

const a=docSnap.data();

const id=docSnap.id;

contenedor.innerHTML+=`

<div class="asignatura-card">

<div class="asignatura-info">

<h4>${a.asignatura}</h4>

<small>${a.modulo}</small>

</div>

<button

class="btn-agregar"

onclick="agregarAsignatura('${id}')">

<i class="bi bi-plus-lg"></i>

</button>

</div>

`;

});

});

}

function cargarAsignaturasDelCurso(){

const contenedor=document.getElementById("listaCurso");

const q=query(

collection(db,"curso_asignaturas"),

where("cursoId","==",cursoId)

);

onSnapshot(q,(snapshot)=>{

contenedor.innerHTML="";

if(snapshot.empty){

contenedor.innerHTML=`

<div class="text-white-50">

Este curso aún no tiene asignaturas.

</div>

`;

return;

}

snapshot.forEach(docSnap=>{

const datos=docSnap.data();

contenedor.innerHTML+=`

<div class="asignatura-card">

<div class="asignatura-info">

<h4>${datos.asignatura}</h4>

<small>${datos.modulo}</small>

</div>

<button

class="btn-quitar"

onclick="quitarAsignatura('${docSnap.id}')">

<i class="bi bi-dash-lg"></i>

</button>

</div>

`;

});

});

}

window.agregarAsignatura=async function(idAsignatura){

const asignaturaSnap=await getDoc(

doc(db,"asignaturas",idAsignatura)

);

if(!asignaturaSnap.exists()) return;

const a=asignaturaSnap.data();

await addDoc(

collection(db,"curso_asignaturas"),

{

cursoId:cursoId,

asignaturaId:idAsignatura,

asignatura:a.asignatura,

modulo:a.modulo,

moduloId:a.moduloId,

entidad:a.entidad,

academiaId:usuarioActual.uid,

fechaCreacion:serverTimestamp()

}

);

}

window.quitarAsignatura = async function(idRelacion){

    if(!confirm("¿Desea quitar esta asignatura del curso?")){
        return;
    }

    await deleteDoc(
        doc(db,"curso_asignaturas",idRelacion)
    );

};

</script>

</body>
</html>
