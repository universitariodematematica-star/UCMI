<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Comprensión</title>

    <style>
        button {
            background-color: blue;
            color: black;
            border: 2px solid black;
            border-radius: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }

        button:hover {
            background-color: violet;
        }

        button:disabled {
            background-color: gray;
            cursor: not-allowed;
        }

        .boton-interactivo {
            background-color: blue;
            border: 2px solid black;
            color: aqua;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .boton-interactivo:hover {
            background-color: indigo;
        }
    </style>
    <script type="module" src="protect.js"></script>
</head>

<body>

<h3><b style="color:black">Ejercicios ERG.1.1.1.</b></h3>
<h2><b style="color:black">Selecciona la traducción correcta:</b></h2>

<form id="quizForm">
    <div id="questionContainer"></div>
    <br>

    <button id="evaluateBtn" type="button" onclick="evaluar()">Evaluar</button>
    <button id="markAsDoneBtn" type="button" onclick="markAsDone()" style="display:none;">
        Pasa a la siguiente parte
    </button>
</form>

<p id="resultado"></p>

</p>

<script>
    var questions = [
        {question: "<b>1. Howdy</b>", options: ["a) Hola","b) Adiós","c) Buenos días","d) Mucho gusto"], correctAnswer: "a) Hola"},
        {question: "<b>2. I am John Carter.</b>", options: ["a) Soy Juan Pérez.","b) Me llamo John Carter.","c) Soy John Carter.","d) Mi nombre es Juan."], correctAnswer: "c) Soy John Carter."},
        {question: "<b>3. What is your name</b>", options: ["a) Cuál es tu edad","b) Cómo estás","c) De dónde eres","d) Cómo te llamas"], correctAnswer: "d) Cómo te llamas"},
        {question: "<b>4. I live in Quito.</b>", options: ["a) Yo vivo en Quito.","b) Yo trabajo en Quito.","c) Yo estudio en Quito.","d) Yo soy de Quito."], correctAnswer: "a) Yo vivo en Quito."},
        {question: "<b>5. I study in Quito.</b>", options: ["a) Yo vivo en Quito.","b) Yo trabajo en Quito.","c) Yo estudio en Quito.","d) Yo soy de Quito."], correctAnswer: "c) Yo estudio en Quito."},
        {question: "<b>6. Good evening</b>", options: ["a) Buenos días","b) Buenas noches","c) Buenas tardes","d) Hola"], correctAnswer: "b) Buenas noches"},
        {question: "<b>7. How are you</b>", options: ["a) Qué tal","b) De dónde eres","c) ¿Cuál es tu nombre?","d) ¿Qué edad tienes?"], correctAnswer: "a) Qué tal"},
        {question: "<b>8. See you later</b>", options: ["a) Hasta mañana","b) Hasta luego","c) Buenas tardes","d) Buenos días"], correctAnswer: "b) Hasta luego"},
        {question: "<b>9. My phone number is 0992346856.</b>", options: ["a) Mi número telefónico es 0992346856.","b) Mi dirección de correo electrónico es 0992346856.","c) Mi edad es 0992346856.","d) Soy de 0992346856."], correctAnswer: "a) Mi número telefónico es 0992346856."},
        {question: "<b>10. Nice to meet you</b>", options: ["a) Hasta luego","b) Mucho gusto","c) Adiós","d) Cómo estás"], correctAnswer: "b) Mucho gusto"}
    ];

    var currentQuestionIndex = 0;
    var correctAnswers = 0;

    function showQuestion() {
        var currentQuestion = questions[currentQuestionIndex];
        var html = `
            <p>${currentQuestion.question}</p>
            <select id="answerSelect">
                <option value="">Selecciona una opción</option>
        `;

        currentQuestion.options.forEach(option => {
            html += `<option value="${option}">${option}</option>`;
        });

        html += `</select>`;

        document.getElementById("questionContainer").innerHTML = html;
    }

    function evaluar() {
        var selectedAnswer = document.getElementById("answerSelect").value;

        if (selectedAnswer === questions[currentQuestionIndex].correctAnswer) {
            correctAnswers++;
        }

        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById("resultado").textContent =
            "Número de respuestas correctas: " + correctAnswers;

        var btn = document.getElementById("markAsDoneBtn");

        if (correctAnswers === questions.length) {
            btn.style.display = "block";
        } else {
            btn.disabled = true;
        }
    }

    function markAsDone() {
        window.location.href = "erg_1_1_1_2";
    }

    showQuestion();
</script>

</body>
</html>
