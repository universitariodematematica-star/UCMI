<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Papelera de Reciclaje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-neon: #ffcc66;
            --azul-neon: #00f2ff;
            --dorado-ucmi: #c5a059;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.9) 100%);
            min-height: 100vh;
        }

        /* Reutilizamos tus estilos de cristal */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 30px;
        }

        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        #trash-table-body tr { background: rgba(255, 255, 255, 0.05); transition: 0.3s; }
        #trash-table-body tr td:first-child { border-top-left-radius: 15px; border-bottom-left-radius: 15px; padding-left: 20px; }
        #trash-table-body tr td:last-child { border-top-right-radius: 15px; border-bottom-right-radius: 15px; padding-right: 20px; }

        .neon-gold { color: var(--dorado-neon); text-shadow: 0 0 10px rgba(255, 204, 102, 0.4); }
        .text-expiry { color: #ff4d4d; font-size: 0.8rem; font-weight: bold; }
        
        .btn-restore { border: 1px solid #28a745; color: #28a745; background: transparent; border-radius: 8px; padding: 5px 10px; }
        .btn-restore:hover { background: #28a745; color: white; }
        
        .btn-delete-full { border: 1px solid #ff4d4d; color: #ff4d4d; background: transparent; border-radius: 8px; padding: 5px 10px; }
        .btn-delete-full:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

<div class="super-overlay p-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="neon-gold"><i class="bi bi-trash3 me-3"></i>PAPELERA DE RECICLAJE</h2>
                <p class="text-white-50">Los usuarios aquí listados serán eliminados permanentemente tras 30 días.</p>
            </div>
            <a href="master-usuarios.html" class="btn btn-outline-light rounded-pill px-4">
                <i class="bi bi-arrow-left me-2"></i> VOLVER A USUARIOS
            </a>
        </div>

        <div class="glass-panel">
            <div class="table-responsive">
                <table class="table-custom">
                    <thead>
                        <tr class="text-white-50 small text-uppercase">
                            <th class="pb-3 ps-4">Usuario / Entidad</th>
                            <th class="pb-3">Eliminado el</th>
                            <th class="pb-3">Días restantes</th>
                            <th class="pb-3 text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="trash-table-body">
                        <!-- Datos dinámicos -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tableBody = document.getElementById('trash-table-body');

    // Escuchar solo usuarios con status 'eliminado'
    const q = query(collection(db, "usuarios"), where("status", "==", "eliminado"));

    onSnapshot(q, (snapshot) => {
        tableBody.innerHTML = '';
        if (snapshot.empty) {
            tableBody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-white-50">La papelera está vacía</td></tr>';
            return;
        }

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;
            
            // Lógica de tiempo
            const fechaElim = data.fechaEliminacion?.toDate() || new Date();
            const hoy = new Date();
            const diferenciaMs = hoy - fechaElim;
            const diasTranscurridos = Math.floor(diferenciaMs / (1000 * 60 * 60 * 24));
            const diasRestantes = 30 - diasTranscurridos;

            tableBody.innerHTML += `
                <tr>
                    <td class="py-4 ps-4">
                        <span class="neon-gold d-block">${data.nombreResponsable || data.entidad}</span>
                        <small class="text-white-50">${data.email || 'Sin email'}</small>
                    </td>
                    <td>${fechaElim.toLocaleDateString()}</td>
                    <td>
                        <span class="text-expiry">${diasRestantes > 0 ? diasRestantes + ' días' : 'Expirado'}</span>
                    </td>
                    <td class="text-end pe-4">
                        <button onclick="restaurarUsuario('${id}')" class="btn btn-restore me-2" title="Restaurar">
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </button>
                        <button onclick="borrarDefinitivo('${id}')" class="btn btn-delete-full" title="Borrar para siempre">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </td>
                </tr>`;
        });
    });

    // Función para RESTAURAR
    window.restaurarUsuario = async (id) => {
        const userRef = doc(db, "usuarios", id);
        await updateDoc(userRef, {
            status: "activo", // Cambiamos a activo
            fechaEliminacion: null // Limpiamos la fecha
        });
        Swal.fire({ title: 'Restaurado', icon: 'success', background: '#0a0e14', color: '#fff' });
    };

    // Función para BORRAR DEFINITIVAMENTE
    window.borrarDefinitivo = async (id) => {
        const confirm = await Swal.fire({
            title: '¿BORRADO DEFINITIVO?',
            text: "Esta acción no se puede deshacer. El usuario desaparecerá de la base de datos.",
            icon: 'error',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'Sí, borrar para siempre',
            background: '#0a0e14',
            color: '#fff'
        });

        if (confirm.isConfirmed) {
            await deleteDoc(doc(db, "usuarios", id));
            Swal.fire({ title: 'Eliminado', icon: 'success', background: '#0a0e14', color: '#fff' });
        }
    };
</script>
</body>
</html>
