<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { background: rgba(255, 255, 255, 0.03) !important; backdrop-filter: blur(15px) saturate(150%); -webkit-backdrop-filter: blur(15px) saturate(150%); border-radius: 28px; padding: 30px; color: white; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255, 255, 255, 0.1) !important; }
        /* PANEL UCMI */
.panel-ucmi {
    background: rgba(10, 25, 47, 0.82);
    backdrop-filter: blur(12px);
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
}

/* MÓDULO: Blanco con brillo neón al pasar el mouse */
.titulo-modulo {
    font-size: 1.4rem;
    font-weight: 700;
    color: #ffffff; /* Letra blanca */
    text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
    transition: all 0.3s ease;
}

.titulo-modulo:hover {
    text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff, 0 0 30px #ffffff;
    cursor: default;
}

.nombre-rama {
    color: #00d4ff; 
    text-shadow: 0 0 5px rgba(0, 212, 255, 0.5);
    transition: all 0.3s ease;
    text-decoration: none; /* Esto quita la rayita de debajo */
}

.nombre-rama:hover {
    color: #00d4ff; /* Mantiene el color al pasar el mouse */
    text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff, 0 0 30px #00d4ff;
    cursor: pointer;
}

/* Ajuste adicional para que los elementos se vean bien en la tabla */
.list-unstyled li {
    padding: 5px 0;
    transition: transform 0.2s;
}

.list-unstyled li:hover {
    transform: translateX(5px);
}

/* BOTONES */
.btn-ucmi {
    background: rgba(0,77,192,.75);
    color: white;
    border-radius: 12px;
    border: none;
}

.btn-editar {
    background: rgba(255,255,255,.08);
    color: #d9ecff;
    border-radius: 12px;
}

.btn-borrar {
    background: rgba(255,255,255,.05);
    color: #ffc7c7;
    border-radius: 12px;
}
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="master-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="master-vigencia.html" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
            <a href="master-usuarios.html" class="nav-item-ucmi"><i class="bi bi-people"></i> USUARIOS</a>
            <a href="historial-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-clock-history"></i> HISTORIAL</a>
            <a href="directorio.html" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="ofertas-academicas.html" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="master-repositorio.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="papelera.html" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">

    <div class="container panel-ucmi">

        <h2 class="mb-4 text-warning fw-bold">
            Gestión de Módulos y Ramas
        </h2>

        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Módulo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaModulos"></tbody>
        </table>

    </div>

</main>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    orderBy,
    onSnapshot,
    where,
    updateDoc,
    deleteDoc,
    addDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325",
        measurementId: "G-3M3DH25722"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const modal = new bootstrap.Modal(document.getElementById("modalRamas"));
    let idModuloSeleccionado = "";

/* =========================
   CARGAR MÓDULOS
========================= */

const q = query(collection(db, "ofertas"), orderBy("modulo", "asc"));

onSnapshot(q, (snapshot) => {

    const tabla = document.getElementById("tablaModulos");
    tabla.innerHTML = "";

    snapshot.forEach((docSnap) => {

        const datos = docSnap.data();
        const idCont = "ramas-" + docSnap.id;

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>
                <div class="titulo-modulo">${datos.modulo}</div>
                <ul id="${idCont}" class="list-unstyled mt-2"></ul>
            </td>
            <td>
                <button class="btn btn-ucmi btn-gestionar"
                    data-id="${docSnap.id}"
                    data-nombre="${datos.modulo}">
                    Gestionar
                </button>
            </td>
        `;

        tabla.appendChild(tr);

        const qR = query(
            collection(db, "ramas"),
            where("moduloId", "==", docSnap.id)
        );

        onSnapshot(qR, (snapRamas) => {

            const lista = document.getElementById(idCont);
            lista.innerHTML = "";

            snapRamas.docs
                .sort((a, b) =>
                    a.data().nombre.localeCompare(b.data().nombre)
                )
              .forEach(r => {

                    const d = r.data();
                    const urlDestino = `topicos.html?ramaId=${r.id}`;

                    lista.innerHTML += `
                        <li class="d-flex justify-content-between align-items-center mb-2">

                            <a href="${urlDestino}" class="nombre-rama text-decoration-none">
                                • ${d.nombre}
                            </a>

                            <div class="d-flex gap-2 align-items-center">

                                <input type="checkbox"
                                    class="form-check-input btn-visibility"
                                    data-id="${r.id}"
                                    ${d.visible !== false ? "checked" : ""}>

                                <button class="btn btn-editar btn-editar-rama"
                                    data-id="${r.id}"
                                    data-nombre="${d.nombre}">
                                    Editar
                                </button>

                                <button class="btn btn-borrar btn-borrar-rama"
                                    data-id="${r.id}">
                                    Borrar
                                </button>

                            </div>

                        </li>
                    `;
                });
        });
    });
});

    document.addEventListener("click", async (e) => {

if (e.target.classList.contains("btn-gestionar")) {
    idModuloSeleccionado = e.target.dataset.id;
    modal.show();
}

    if (e.target.classList.contains("btn-editar-rama")) {
        const id = e.target.dataset.id;
        const nuevo = prompt("Editar:", e.target.dataset.nombre);
        if (nuevo) {
            await updateDoc(doc(db, "ramas", id), { nombre: nuevo.trim() });
        }
    }

    if (e.target.classList.contains("btn-borrar-rama")) {
        const id = e.target.dataset.id;
        if (confirm("Eliminar?")) {
            await deleteDoc(doc(db, "ramas", id));
        }
    }
});


document.addEventListener("change", async (e) => {

    if (e.target.classList.contains("btn-visibility")) {
        await updateDoc(doc(db, "ramas", e.target.dataset.id), {
            visible: e.target.checked
        });
    }
});

document.getElementById("btnGuardar").addEventListener("click", async () => {

    const nombre = document.getElementById("inputNombreRama").value.trim();

    if (!nombre) return;

    await addDoc(collection(db, "ramas"), {
        nombre,
        moduloId: idModuloSeleccionado,
        visible: true,
        fechaCreacion: new Date()
    });

    // 👇 AQUÍ VA LO QUE PREGUNTAS
    document.getElementById("inputNombreRama").value = "";
    modal.hide();

});

    // Carga de Logo según el usuario
    onAuthStateChanged(auth, async (user) => {
        const logoElement = document.getElementById('logoAcademia');
        if (user) {
            try {
                const docRef = doc(db, "usuarios", user.email);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().logoCustom) {
                    logoElement.src = docSnap.data().logoCustom;
                }
            } catch (error) { console.error("Error al cargar logo:", error); }
        }
        logoElement.style.opacity = "1";
        logoElement.style.visibility = "visible";
    });

    // Acción Cierre de Sesión
    document.getElementById('btnLogout').addEventListener('click', async (e) => {
        e.preventDefault();
        try {
            await signOut(auth);
            window.location.href = "index.html"; // Redirige al login
        } catch (error) {
            console.error("Error al cerrar sesión:", error);
            alert("Ocurrió un error al cerrar la sesión.");
        }
    });
</script>
    <div class="modal fade" id="modalRamas" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">

      <div class="modal-header">
        <h5>Gestionar ramas</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="inputNombreRama" class="form-control" placeholder="Nombre de la rama">
        <button id="btnGuardar" class="btn btn-warning w-100 mt-3">Crear</button>
      </div>

    </div>
  </div>
</div>
</body>
</html>
