<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Directorio Maestro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --azul-bg: #06090f;
            --glass: rgba(255, 255, 255, 0.03);
            --rojo-error: #ff4d4d;
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white;
            margin: 0;
        }

        .super-overlay { background: rgba(6, 9, 15, 0.94); min-height: 100vh; padding-bottom: 50px; }

        .nav-ucmi {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.4);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-btn {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 8px 15px;
            border-radius: 6px;
            transition: 0.3s;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
        }

        .nav-btn:hover { color: var(--dorado-ucmi); background: rgba(197, 160, 89, 0.1); }
        .nav-btn.active { color: white; background: var(--dorado-ucmi); box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }

        .btn-logout { color: var(--rojo-error) !important; border: 1px solid rgba(255, 77, 77, 0.2); cursor: pointer; }

        .list-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 25px;
            margin-top: 20px;
        }

        .table { --bs-table-bg: transparent; --bs-table-color: white; }
        .table thead th {
            color: var(--dorado-ucmi);
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1.2px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 8px;
            padding: 10px 20px;
        }

        .search-box:focus { background: rgba(255, 255, 255, 0.1); color: white; border-color: var(--dorado-ucmi); box-shadow: none; }

        .badge-status { font-size: 0.6rem; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .status-ACEPTADO { color: #2ecc71; border: 1px solid #27ae60; }
        .status-RECHAZADO { color: #e74c3c; border: 1px solid #e74c3c; }

        .contact-link { color: white; text-decoration: none; transition: 0.2s; }
        .contact-link:hover { color: var(--dorado-ucmi); text-decoration: underline; }
        .text-personal { font-style: italic; color: rgba(255,255,255,0.3); font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="super-overlay">
    <nav class="nav-ucmi">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">
            <div class="d-flex align-items-center">
                <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" alt="UCMI" style="height: 35px;" class="me-4">
                <div class="d-flex gap-1">
                    <a href="super-admin.html" class="nav-btn"><i class="bi bi-cpu me-1"></i> PANEL MAESTRO</a>
                    <a href="master-postulaciones.html" class="nav-btn">SOLICITUDES</a>
                    <a href="master-vigencia.html" class="nav-btn">VIGENCIA</a>
                    <a href="master-usuarios.html" class="nav-btn">USUARIOS</a>
                    <a href="historial-postulaciones.html" class="nav-btn">HISTORIAL</a>
                    <a href="directorio.html" class="nav-btn active">DIRECTORIO</a>
                    <a href="ofertas-academicas.html" class="nav-btn">OFERTAS</a>
                    <a href="master-repositorio.html" class="nav-btn">MÓDULOS</a>
                    <a href="papelera.html" class="nav-btn">PAPELERA</a>
                </div>
            </div>
            <button onclick="cerrarSesionUCMI()" class="nav-btn btn-logout bg-transparent">
                <i class="bi bi-box-arrow-right me-1"></i> CERRAR SESIÓN
            </button>
        </div>
    </nav>

    <div class="container-fluid px-5">
        <div class="d-flex justify-content-between align-items-center mt-5 mb-4">
            <div>
                <h2 class="fw-bold mb-0">Directorio Maestro 1</h2>
                <p class="text-muted small">Registros históricos ordenados alfabéticamente</p>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <button onclick="exportarExcel()" class="btn btn-outline-success btn-sm rounded-pill px-3">
                    <i class="bi bi-file-earmark-excel me-1"></i> Excel
                </button>
                <button onclick="exportarPDF()" class="btn btn-outline-light btn-sm rounded-pill px-3">
                    <i class="bi bi-file-pdf me-1"></i> PDF
                </button>
                <div style="min-width: 300px;">
                    <input type="text" id="inputBusqueda" class="form-control search-box" placeholder="Buscar registros...">
                </div>
            </div>
        </div>

        <div class="list-container">
            <div class="table-responsive">
                <table class="table align-middle" id="tablaDirectorio">
                    <thead>
                        <tr>
                            <th style="width: 25%;">Entidad / Institución</th>
                            <th style="width: 20%;">Responsable</th>
                            <th style="width: 15%;">Perfil</th>
                            <th style="width: 15%;">WhatsApp</th>
                            <th style="width: 15%;">Email</th>
                            <th style="width: 10%;" class="text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo">
                        <tr>
                            <td colspan="6" class="text-center p-5 opacity-50">Sincronizando con Firebase...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let registrosMaster = [];

    window.cerrarSesionUCMI = function() {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    };

    function limpiarNumero(num) {
        return num ? num.replace(/\D/g, '') : ""; 
    }

    onSnapshot(collection(db, "historial_postulaciones"), (snapshot) => {
        registrosMaster = snapshot.docs.map(doc => doc.data());
        registrosMaster.sort((a, b) => {
            const nA = (a.entidad && a.entidad !== "N/A" ? a.entidad : a.nombreResponsable || "").toLowerCase();
            const nB = (b.entidad && b.entidad !== "N/A" ? b.entidad : b.nombreResponsable || "").toLowerCase();
            return nA.localeCompare(nB);
        });
        renderizar(registrosMaster);
    });

    function renderizar(lista) {
        const tbody = document.getElementById('tablaCuerpo');
        tbody.innerHTML = lista.length === 0 ? '<tr><td colspan="6" class="text-center p-4">Sin registros.</td></tr>' : '';

        lista.forEach(reg => {
            const entidad = reg.entidad && reg.entidad !== "N/A" ? reg.entidad : '<span class="text-personal">Individual</span>';
            const numLimpio = limpiarNumero(reg.whatsapp);
            const status = reg.decisionFinal || "PROCESADO";

            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold">${entidad}</td>
                    <td>${reg.nombreResponsable || "---"}</td>
                    <td><span class="small text-warning">${reg.perfil || reg.tipoSolicitante || 'Estudiante'}</span></td>
                    <td><a href="https://wa.me/${numLimpio}" target="_blank" class="contact-link"><i class="bi bi-whatsapp text-success me-1"></i> ${reg.whatsapp || '---'}</a></td>
                    <td><a href="mailto:${reg.email}" class="contact-link small">${reg.email}</a></td>
                    <td class="text-center"><span class="badge-status status-${status}">${status}</span></td>
                </tr>`;
        });
    }

    document.getElementById('inputBusqueda').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = registrosMaster.filter(r => 
            (r.entidad && r.entidad.toLowerCase().includes(term)) ||
            (r.nombreResponsable && r.nombreResponsable.toLowerCase().includes(term)) ||
            r.email.toLowerCase().includes(term)
        );
        renderizar(filtrados);
    });

    // --- FUNCIONES DE EXPORTACIÓN ---
    window.exportarPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'pt', 'a4');
        doc.autoTable({
            html: '#tablaDirectorio',
            startY: 60,
            theme: 'grid',
            headStyles: { fillColor: [197, 160, 89], textColor: [255, 255, 255] },
            didDrawPage: (data) => {
                doc.setFontSize(18);
                doc.setTextColor(197, 160, 89);
                doc.text("UCMI - DIRECTORIO MAESTRO", data.settings.margin.left, 40);
            }
        });
        doc.save(`Directorio_UCMI_${new Date().toLocaleDateString()}.pdf`);
    };

    window.exportarExcel = () => {
        const rows = document.querySelectorAll('#tablaCuerpo tr');
        const datos = Array.from(rows).map(row => {
            const cols = row.querySelectorAll('td');
            if (cols.length < 6) return null;
            return {
                "ENTIDAD": cols[0].innerText.trim(),
                "RESPONSABLE": cols[1].innerText.trim(),
                "PERFIL": cols[2].innerText.trim(),
                "WHATSAPP": cols[3].innerText.trim(),
                "EMAIL": cols[4].innerText.trim(),
                "ESTADO": cols[5].innerText.trim()
            };
        }).filter(d => d !== null);
        const ws = XLSX.utils.json_to_sheet(datos);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Directorio");
        XLSX.writeFile(wb, "Directorio_Maestro_UCMI.xlsx");
    };
</script>
</body>
</html>
