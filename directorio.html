<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Directorio de Contactos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --azul-sidebar: #1a2a3a;
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white;
        }

        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); min-height: 100vh; }

        .directory-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            margin-top: 30px;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50px;
            padding: 12px 25px;
        }

        .search-box:focus { background: rgba(255, 255, 255, 0.15); color: white; border-color: var(--dorado-ucmi); box-shadow: none; }

        .contact-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .contact-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: var(--dorado-ucmi);
        }

        .icon-circle {
            width: 45px; height: 45px;
            background: rgba(197, 160, 89, 0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--dorado-ucmi); font-size: 1.2rem;
        }

        .btn-whatsapp { color: #25D366; text-decoration: none; font-weight: bold; }
        .btn-email { color: #c5a059; text-decoration: none; }
        
        .badge-type { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="display-6 fw-bold mb-0">Directorio de Contactos</h1>
                <p class="text-muted">Base de datos de miembros activos UCMI</p>
            </div>
            <a href="super-admin.html" class="btn btn-outline-light rounded-pill px-4">Volver al Panel</a>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <input type="text" id="inputBusqueda" class="form-control search-box" placeholder="Buscar por nombre, institución o correo...">
            </div>
        </div>

        <div class="directory-container">
            <div id="listaContactos" class="row">
                <div class="text-center p-5">
                    <div class="spinner-border text-warning" role="status"></div>
                    <p class="mt-2">Sincronizando miembros...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let miembrosCache = [];

    // Escucha en tiempo real de la colección de usuarios (los ya aprobados)
    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        miembrosCache = snapshot.docs.map(doc => doc.data());
        renderizarDirectorio(miembrosCache);
    });

    function renderizarDirectorio(lista) {
        const contenedor = document.getElementById('listaContactos');
        contenedor.innerHTML = '';

        if (lista.length === 0) {
            contenedor.innerHTML = '<div class="text-center p-5 text-muted">No se encontraron contactos.</div>';
            return;
        }

        lista.forEach(user => {
            // Lógica de nombre: Prioridad Institución -> Responsable
            const nombreMostrar = user.entidad && user.entidad !== "N/A" ? user.entidad : user.nombreResponsable;
            const subTexto = user.entidad && user.entidad !== "N/A" ? user.nombreResponsable : (user.perfil || "Miembro");

            contenedor.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="contact-card">
                        <div class="d-flex align-items-center mb-3">
                            <div class="icon-circle me-3">
                                <i class="bi bi-person-badge"></i>
                            </div>
                            <div>
                                <h6 class="mb-0 fw-bold">${nombreMostrar}</h6>
                                <small class="text-muted badge-type">${subTexto}</small>
                            </div>
                        </div>
                        <div class="small mt-3">
                            <div class="mb-2">
                                <i class="bi bi-whatsapp me-2 text-success"></i>
                                <a href="https://wa.me/${user.whatsapp}" target="_blank" class="btn-whatsapp">${user.whatsapp || 'Sin teléfono'}</a>
                            </div>
                            <div>
                                <i class="bi bi-envelope me-2 text-warning"></i>
                                <a href="mailto:${user.email}" class="btn-email">${user.email}</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // Buscador en tiempo real
    document.getElementById('inputBusqueda').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = miembrosCache.filter(u => 
            (u.entidad && u.entidad.toLowerCase().includes(term)) ||
            (u.nombreResponsable && u.nombreResponsable.toLowerCase().includes(term)) ||
            u.email.toLowerCase().includes(term)
        );
        renderizarDirectorio(filtrados);
    });
</script>

</body>
</html>
