<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Directorio Histórico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --verde-ucmi: #27ae60;
            --rojo-ucmi: #e74c3c;
        }
        
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white;
        }

        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.7) 0%, rgba(6, 9, 15, 0.95) 100%); min-height: 100vh; }

        .directory-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            margin-top: 20px;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--dorado-ucmi);
            transform: translateY(-5px);
        }

        .status-badge {
            font-size: 0.65rem;
            padding: 4px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .bg-aceptado { background: rgba(39, 174, 96, 0.2); color: #2ecc71; border: 1px solid #27ae60; }
        .bg-rechazado { background: rgba(231, 76, 60, 0.2); color: #ff7675; border: 1px solid #e74c3c; }

        .search-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50px;
            padding: 12px 25px;
        }

        .btn-action {
            color: white;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-action:hover { color: var(--dorado-ucmi); }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="display-6 fw-bold mb-0">Directorio de Historial</h1>
                <p class="text-muted">Registros procesados desde historial_postulaciones</p>
            </div>
            <a href="super-admin.html" class="btn btn-outline-light rounded-pill px-4 btn-sm">Panel Maestro</a>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 text-white"><i class="bi bi-search"></i></span>
                    <input type="text" id="inputBusqueda" class="form-control search-box" placeholder="Filtrar por nombre, institución o email...">
                </div>
            </div>
        </div>

        <div class="directory-container">
            <div id="listaHistorial" class="row">
                <div class="text-center p-5">
                    <div class="spinner-grow text-warning" role="status"></div>
                    <p class="mt-3 text-muted">Consultando historial en Firebase...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let registrosCache = [];

    // Consultar la colección historial_postulaciones (ordenados por fecha de proceso si existe)
    const q = query(collection(db, "historial_postulaciones"));

    onSnapshot(q, (snapshot) => {
        registrosCache = snapshot.docs.map(doc => doc.data());
        renderizar(registrosCache);
    });

    function renderizar(lista) {
        const contenedor = document.getElementById('listaHistorial');
        contenedor.innerHTML = '';

        if (lista.length === 0) {
            contenedor.innerHTML = '<div class="text-center p-5 text-muted">No hay registros en el historial.</div>';
            return;
        }

        lista.forEach(reg => {
            const nombrePrincipal = reg.entidad && reg.entidad !== "N/A" ? reg.entidad : reg.nombreResponsable;
            const perfil = reg.perfil || reg.tipoSolicitante || "Interesado";
            const statusClass = reg.decisionFinal === "ACEPTADO" ? "bg-aceptado" : "bg-rechazado";
            const statusLabel = reg.decisionFinal || "PROCESADO";

            contenedor.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="contact-card">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <span class="status-badge ${statusClass}">${statusLabel}</span>
                            <small class="text-muted small" style="font-size: 0.6rem;">${reg.fechaProceso || ''}</small>
                        </div>
                        
                        <h6 class="fw-bold mb-1 text-truncate">${nombrePrincipal}</h6>
                        <p class="small text-warning mb-3" style="font-size: 0.75rem;">${perfil}</p>

                        <div class="border-top border-secondary pt-3 mt-2">
                            <div class="mb-2 small d-flex align-items-center">
                                <i class="bi bi-envelope-at me-2 opacity-50"></i>
                                <a href="mailto:${reg.email}" class="btn-action text-truncate d-block">${reg.email}</a>
                            </div>
                            <div class="small d-flex align-items-center">
                                <i class="bi bi-whatsapp me-2 opacity-50"></i>
                                <a href="https://wa.me/${reg.whatsapp}" target="_blank" class="btn-action">${reg.whatsapp || 'N/A'}</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // Buscador
    document.getElementById('inputBusqueda').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = registrosCache.filter(r => 
            (r.entidad && r.entidad.toLowerCase().includes(term)) ||
            (r.nombreResponsable && r.nombreResponsable.toLowerCase().includes(term)) ||
            r.email.toLowerCase().includes(term) ||
            (r.whatsapp && r.whatsapp.includes(term))
        );
        renderizar(filtrados);
    });
</script>

</body>
</html>
