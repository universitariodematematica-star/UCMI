<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sala Educativa</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        .panel {
            margin-top: 60px;
            background: #000080;
            color: white;
            padding: 25px;
            border-radius: 12px;
            display: none;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 12px;
            width: 200px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        .error {
            margin-top: 40px;
            color: white;
            background: #f44336;
            padding: 15px;
            border-radius: 10px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
    </style>

    <!-- 🔥 FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
            authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
            projectId: "portal-autenticacion-a1ngles",
            storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
            messagingSenderId: "1039504020190",
            appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const panel = document.getElementById("panel");
        const errorBox = document.getElementById("error");

        // 🔐 PROTECCIÓN PRINCIPAL
        onAuthStateChanged(auth, async (user) => {

            try {

                // ❌ no logueado
                if (!user) {
                    window.location.href = "index.html";
                    return;
                }

                const email = user.email;

                const ref = doc(db, "licenses", email);
                const snap = await getDoc(ref);

                // ❌ no existe licencia
                if (!snap.exists()) {
                    showError("❌ No tienes licencia activa");
                    return;
                }

                const data = snap.data();
                const expiration = new Date(data.expiration);
                const today = new Date();

                // ⛔ vencido
                if (today > expiration) {
                    showError("⛔ Licencia vencida");
                    return;
                }

                // ✔ acceso permitido
                panel.style.display = "block";

            } catch (error) {
                console.error(error);
                showError("⚠️ Error de validación");
            }

        });

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = "block";
        }

        window.logout = async function () {
            await signOut(auth);
            window.location.href = "index.html";
        };

    </script>

</head>

<body>

    <div id="error" class="error"></div>

    <div id="panel" class="panel">
        <h2>🎓 SALA EDUCATIVA</h2>

        <button onclick="location.href='temario.html'">📚 Temario</button>
        <button onclick="location.href='calificaciones.html'">📊 Calificaciones</button>
        <button onclick="logout()">🚪 Cerrar sesión</button>
    </div>

</body>
</html>
