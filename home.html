<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Plataforma Educativa</title>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    margin: 0;
    text-align: center;
}

/* 🔄 LOADER */
#loading {
    margin-top: 120px;
    font-size: 18px;
    color: #333;
}

/* PANEL */
.panel {
    margin: 60px auto;
    width: 340px;
    padding: 25px;
    border-radius: 15px;
    background: linear-gradient(135deg, #000080, #1e3a8a);
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: none;
}

button {
    width: 220px;
    margin: 10px auto;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

/* STATUS */
.status {
    background: rgba(255,255,255,0.15);
    padding: 12px;
    border-radius: 10px;
    margin-top: 15px;
    font-size: 14px;
    text-align: left;
}

.badge {
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
}

.active { background: #4CAF50; }
.warning { background: #ff9800; }

/* ERROR */
.error {
    margin: 60px auto;
    width: 340px;
    background: #f44336;
    color: white;
    padding: 20px;
    border-radius: 10px;
    display: none;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
    authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
    projectId: "portal-autenticacion-a1ngles",
    storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
    messagingSenderId: "1039504020190",
    appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

    const loading = document.getElementById("loading");
    const panel = document.getElementById("panel");
    const errorBox = document.getElementById("error");
    const statusBox = document.getElementById("status");

    try {

        if (!user) {
            window.location.href = "index.html";
            return;
        }

        const email = user.email;

        const ref = doc(db, "licenses", email);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
            showError("No tienes licencia activa");
            return;
        }

        const data = snap.data();

        const expiration = new Date(data.expiration + "T23:59:59");
        const today = new Date();

        const diff = expiration.getTime() - today.getTime();
        const daysLeft = Math.floor(diff / (1000 * 60 * 60 * 24));

        if (daysLeft < 0) {
            showError("Tu licencia ha expirado");
            return;
        }

        // 🎯 estado visual
        let statusClass = "active";
        let statusText = "ACTIVO";

        if (daysLeft <= 3) {
            statusClass = "warning";
            statusText = "POR VENCER";
        }

        const userName = data.user || email;

        // ✅ MOSTRAR TODO CORRECTAMENTE
        loading.style.display = "none";
        panel.style.display = "block";

        statusBox.innerHTML = `
            👤 ${userName}<br>
            📅 Expira: ${data.expiration}<br>
            ⏳ Días restantes: ${daysLeft}<br><br>
            <span class="badge ${statusClass}">
                ${statusText}
            </span>
        `;

    } catch (e) {
        console.error(e);
        showError("Error de carga del sistema");
    }

});

// ❌ ERROR CONTROLADO
function showError(msg) {

    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("error");

    loading.style.display = "none";

    errorBox.innerHTML = `
        <h3>⚠️ Acceso restringido</h3>
        <p>${msg}</p>
        <br>
        <button onclick="window.location.href='index.html'">Volver</button>
    `;

    errorBox.style.display = "block";
}

// 🔐 LOGOUT
window.logout = async function () {
    await signOut(auth);
    window.location.href = "index.html";
};

</script>

</head>

<body>

<!-- 🔄 LOADER -->
<div id="loading">🔄 Verificando acceso...</div>

<!-- ❌ ERROR -->
<div id="error" class="error"></div>

<!-- ✅ PANEL -->
<div id="panel" class="panel">

    <h2>🎓 Plataforma Educativa</h2>

    <div id="status" class="status"></div>

    <button onclick="location.href='temario.html'">📚 Temario</button>
    <button onclick="location.href='calificaciones.html'">📊 Calificaciones</button>
    <button onclick="logout()">🚪 Cerrar sesión</button>

</div>

</body>
</html>
