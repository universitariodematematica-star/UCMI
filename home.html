<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Home Seguro</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 40px;
        }

        .box {
            background: #000080;
            color: white;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }
    </style>

    <!-- 🔥 FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
            authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
            projectId: "portal-autenticacion-a1ngles",
            storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
            messagingSenderId: "1039504020190",
            appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 🔐 VERIFICAR SESIÓN REAL
        onAuthStateChanged(auth, (user) => {

            if (user) {
                document.getElementById("user").innerText = user.email;
            } else {
                window.location.href = "index.html";
            }

        });

        // 🔓 LOGOUT
        window.logout = async function () {
            await signOut(auth);
            window.location.href = "index.html";
        }
    </script>

</head>

<body>

    <div class="box">
        <h1>Bienvenido</h1>
        <p id="user">Cargando...</p>

        <button onclick="logout()">Cerrar sesión</button>
    </div>

</body>
</html>
