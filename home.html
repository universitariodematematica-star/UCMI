<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sala Segura</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .panel {
            margin-top: 50px;
            background: #000080;
            color: white;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            width: 200px;
        }

        .error {
            background: #f44336;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>

    <!-- 🔥 FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        import { 
            getFirestore, 
            doc, 
            getDoc 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
            authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
            projectId: "portal-autenticacion-a1ngles",
            storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
            messagingSenderId: "1039504020190",
            appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const panel = document.getElementById("panel");
        const errorBox = document.getElementById("error");

        // 🔐 PROTECCIÓN TOTAL
        onAuthStateChanged(auth, async (user) => {

            if (!user) {
                window.location.href = "index.html";
                return;
            }

            try {
                const email = user.email;

                const ref = doc(db, "licenses", email);
                const snap = await getDoc(ref);

                if (!snap.exists()) {
                    showError("❌ No tienes licencia activa");
                    return;
                }

                const data = snap.data();
                const expiration = new Date(data.expiration);
                const today = new Date();

                if (today > expiration) {
                    showError("⛔ Licencia vencida");
                    return;
                }

                // ✔ acceso permitido
                panel.style.display = "inline-block";

            } catch (e) {
                showError("⚠️ Error al validar acceso");
                console.error(e);
            }
        });

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = "block";
        }

        window.logout = async function () {
            await signOut(auth);
            window.location.href = "index.html";
        };
    </script>

</head>

<body>

    <div id="error" class="error" style="display:none;"></div>

    <div id="panel" class="panel" style="display:none;">
        <h2>🎓 SALA EDUCATIVA</h2>

        <button onclick="location.href='temario.html'">📚 Temario</button>
        <button onclick="location.href='calificaciones.html'">📊 Calificaciones</button>
        <button onclick="logout()">🚪 Cerrar sesión</button>
    </div>

</body>
</html>
