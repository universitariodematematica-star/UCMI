<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Portal Principal</title>
</head>

<body>

<!-- 🔐 PROTECCIÓN TOTAL (LO PRIMERO QUE SE EJECUTA) -->
<script>
(function protectHome() {
    const code = localStorage.getItem("code");
    const expirationRaw = localStorage.getItem("expiration");

    // ❌ no hay sesión
    if (!code || !expirationRaw) {
        localStorage.clear();
        window.location.replace("index.html");
        return;
    }

    const expiration = new Date(expirationRaw);

    // ❌ fecha inválida
    if (isNaN(expiration.getTime())) {
        localStorage.clear();
        window.location.replace("index.html");
        return;
    }

    // ❌ vencido
    if (new Date() > expiration) {
        localStorage.clear();
        window.location.replace("index.html");
        return;
    }
})();
</script>

<!-- 🔒 BLOQUEA BOTÓN ATRÁS -->
<script>
history.pushState(null, null, location.href);
window.onpopstate = function () {
    history.pushState(null, null, location.href);
};
</script>

<h1>Bienvenido al sistema</h1>

<p id="userInfo"></p>

<!-- 👤 INFO DEL USUARIO -->
<script>
const user = localStorage.getItem("user");
const expirationRaw = localStorage.getItem("expiration");

if (!user || !expirationRaw) {
    document.getElementById("userInfo").innerText = "Sin sesión activa";
} else {
    const expiration = new Date(expirationRaw);
    const today = new Date();

    const days = Math.ceil((expiration - today) / (1000 * 60 * 60 * 24));

    document.getElementById("userInfo").innerText =
        "Usuario: " + user + " | Días restantes: " + days;
}
</script>

</body>
</html>
