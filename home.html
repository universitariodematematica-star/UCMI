<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Educativa - Panel de Control</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
            text-align: center;
        }

        /* 🔄 LOADER INICIAL */
        #loading {
            margin-top: 100px;
            font-size: 18px;
            color: #333;
        }

        .panel {
            margin: 60px auto;
            width: 340px;
            padding: 25px;
            border-radius: 15px;
            background: linear-gradient(135deg, #000080, #1e3a8a);
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        button {
            width: 220px;
            margin: 10px auto;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }

        .status {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 14px;
            text-align: left;
            line-height: 1.6;
        }

        .logout-btn {
            background-color: #f44336;
            color: white;
            margin-top: 20px;
        }

        .logout-btn:hover {
            background-color: #d32f2f;
        }
    </style>

    <script type="module" src="protect.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
            authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
            projectId: "portal-autenticacion-a1ngles"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Lógica para mostrar datos del usuario en el panel
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const statusBox = document.getElementById("status-info");
                const loading = document.getElementById("loading");
                
                try {
                    const ref = doc(db, "licenses", user.email);
                    const snap = await getDoc(ref);

                    if (snap.exists()) {
    const data = snap.data();
    
    // 👤 CAMBIO AQUÍ: Priorizamos el campo 'user' (nombre) sobre el correo
    const nombreAMostrar = data.user || user.email;

    // 🔥 Calcular días restantes
    let diasRestantes = "No disponible";

    if (data.expiration) {
        const fechaExp = new Date(data.expiration + "T23:59:59");
        const hoy = new Date();

        const diferencia = fechaExp - hoy;
        diasRestantes = Math.ceil(diferencia / (1000 * 60 * 60 * 24));

        if (diasRestantes < 0) diasRestantes = 0;
    }

    statusBox.innerHTML = `
        👤 <b>Usuario:</b> ${nombreAMostrar}<br>
        📅 <b>Expira:</b> ${data.expiration || 'No definida'}<br>
        ⏳ <b>Días restantes:</b> ${diasRestantes}<br>
        ✅ <b>Estado:</b> ${diasRestantes > 0 ? "Activa" : "Vencida"}
    `;
}
                } catch (e) {
                    console.error("Error cargando datos adicionales:", e);
                }

document.body.style.opacity = "1";
document.body.style.pointerEvents = "auto";
document.body.style.filter = "none";
document.body.style.display = "block";
                
                loading.style.display = "none";
            }
        });

        // Función global de Logout
        window.logout = async function () {
            if (confirm("¿Seguro que deseas cerrar sesión?")) {
                sessionStorage.clear(); 
                await signOut(auth);
                window.location.href = "index.html";
            }
        };
    </script>
</head>

<body>

    <div id="loading">🔄 Cargando plataforma...</div>

    <div id="panel" class="panel">
        <h2>🎓 Panel de Estudiante</h2>

        <div id="status-info" class="status">
            Verificando credenciales...
        </div>

        <div style="margin-top: 20px;">
            <button onclick="location.href='temario.html'" style="background-color: #ffffff; color: #000080;">
                📚 Ver Temario
            </button>
            
            <button onclick="location.href='calificaciones.html'" style="background-color: #ffffff; color: #000080;">
                📊 Calificaciones
            </button>

            <button onclick="logout()" class="logout-btn">
                🚪 Cerrar sesión
            </button>
        </div>
    </div>

</body>
</html>
