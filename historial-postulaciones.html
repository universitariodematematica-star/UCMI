<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Historial Permanente de Solicitudes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --dorado-neon: #ffcc66;
            --cian-tech: #00f2ff;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(10px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
        }

        .nav-section-title {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px 10px;
        }

        .btn-sidebar-custom {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: rgba(255, 255, 255, 0.7) !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            border-radius: 50px;
            padding: 10px 15px;
            margin-bottom: 8px;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .btn-sidebar-custom:hover, .btn-sidebar-custom.active {
            border-color: var(--cian-tech) !important;
            color: var(--cian-tech) !important;
            background: rgba(0, 242, 255, 0.05);
        }

        .btn-cerrar-sesion {
            border: 1px solid rgba(255, 77, 77, 0.4) !important;
            color: #ff4d4d !important;
        }

        /* --- PANEL DE DATOS --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 25px;
            padding: 30px;
        }

        .table-historial tr {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 8px solid transparent; /* Espaciado entre filas */
        }

        .status-tag {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .status-nuevo { background: rgba(0, 242, 255, 0.2); color: var(--cian-tech); }
        .status-procesado { background: rgba(197, 160, 89, 0.2); color: var(--dorado-ucmi); }

        .date-badge {
            color: var(--dorado-neon);
            font-family: monospace;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 45px;" alt="Logo">
                    <p class="small mt-2 fw-bold text-uppercase" style="color: var(--dorado-ucmi);">Maestro</p>
                </div>
                
                <nav class="nav flex-column mb-auto">
                    <p class="nav-section-title">Registros</p>
                    <a class="btn-sidebar-custom" href="master-postulaciones.html"><i class="bi bi-send me-2"></i> Postulaciones</a>
                    <a class="btn-sidebar-custom active" href="historial-postulaciones.html"><i class="bi bi-archive me-2"></i> Historial Inmortal</a>
                    <a class="btn-sidebar-custom" href="master-usuarios.html"><i class="bi bi-people me-2"></i> Usuarios</a>
                    
                    <p class="nav-section-title">Control</p>
                    <a class="btn-sidebar-custom" href="master-vigencia.html"><i class="bi bi-shield-check me-2"></i> Vigencia</a>
                    <a class="btn-sidebar-custom" href="papelera.html"><i class="bi bi-trash3 me-2"></i> Papelera</a>
                    <button id="btnSignOut" class="btn-sidebar-custom btn-cerrar-sesion mt-3">
                        <i class="bi bi-box-arrow-right me-2"></i> Salir
                    </button>
                </nav>
            </div>

            <div class="col-md-10 p-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 style="color: var(--dorado-neon); letter-spacing: 2px;">HISTORIAL DE ENTRADA</h2>
                        <p class="text-white-50">Registro permanente de toda solicitud enviada a la plataforma.</p>
                    </div>
                    <div class="text-end">
                        <input type="text" id="filterInput" class="form-control bg-dark text-white border-secondary" placeholder="Filtrar por entidad...">
                    </div>
                </div>

                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table table-borderless text-white table-historial">
                            <thead>
                                <tr class="text-white-50 small">
                                    <th>FECHA DE ENVÍO</th>
                                    <th>ENTIDAD / SOLICITANTE</th>
                                    <th>CORREO ELECTRÓNICO</th>
                                    <th>ESTADO</th>
                                    <th class="text-end">ID UNICO</th>
                                </tr>
                            </thead>
                            <tbody id="historialBody">
                                <!-- Datos inyectados -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const historialBody = document.getElementById('historialBody');

    // Escucha en tiempo real: registra apenas alguien envía una solicitud
    const q = query(collection(db, "postulaciones"), orderBy("fechaSolicitud", "desc"));

    onSnapshot(q, (snapshot) => {
        historialBody.innerHTML = '';
        snapshot.forEach((doc) => {
            const data = doc.data();
            const fecha = data.fechaSolicitud?.toDate ? data.fechaSolicitud.toDate().toLocaleString() : 'Fecha pendiente';
            
            historialBody.innerHTML += `
                <tr>
                    <td class="date-badge">${fecha}</td>
                    <td>
                        <div class="fw-bold text-white">${data.entidad || 'N/A'}</div>
                        <div class="small text-white-50">${data.nombreResponsable || ''}</div>
                    </td>
                    <td class="text-info">${data.email || '---'}</td>
                    <td>
                        <span class="status-tag ${data.procesado ? 'status-procesado' : 'status-nuevo'}">
                            ${data.procesado ? 'PROCESADO' : 'SOLICITUD NUEVA'}
                        </span>
                    </td>
                    <td class="text-end"><small class="text-white-25">${doc.id.substring(0,8)}</small></td>
                </tr>
            `;
        });
    });

    // Cerrar Sesión
    document.getElementById('btnSignOut').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>
</body>
</html>
