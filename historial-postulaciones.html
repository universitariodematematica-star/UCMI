<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>html { display: none; }</style>
    <script type="module" src="auth-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Historial de Solicitudes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --dorado-neon: #ffcc66; --azul-sidebar: #1a2a3a; --cian-tech: #00f2ff; --rojo-neon: #ff3131; --blanco-neon: #ffffff; }
        body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%); min-height: 100vh; }
        .sidebar { background: rgba(26, 42, 58, 0.95); backdrop-filter: blur(10px); min-height: 100vh; padding: 25px 15px; border-right: 1px solid rgba(197, 160, 89, 0.3); display: flex; flex-direction: column; }
        .nav-section-title { color: rgba(255, 255, 255, 0.3); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; padding-left: 10px; }
        .nav-link-custom { display: flex; align-items: center; width: 100%; background: transparent; border: none; padding: 12px 15px; color: rgba(255, 255, 255, 0.6); text-align: left; border-radius: 12px; font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease; }
        .nav-link-custom:hover { background: rgba(255, 255, 255, 0.05); color: var(--cian-tech); }
        .nav-link-custom.active { background: rgba(188, 19, 254, 0.1); color: #d880ff; border: 1px solid rgba(188, 19, 254, 0.2); }
        .glass-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); border-radius: 30px; padding: 30px; }
        .table-historial { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .table-historial tr { background: rgba(255, 255, 255, 0.03); border-radius: 15px; }
        .table-historial td { padding: 15px 20px; vertical-align: middle; }
        .badge-status { padding: 6px 14px; border-radius: 100px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        .status-aprobado { color: #00ff88; border: 1px solid #00ff8844; }
        .status-rechazado { color: #ff4d4d; border: 1px solid #ff4d4d44; }
        .status-pendiente { color: #ffcc00; border: 1px solid #ffcc0044; }
        .date-chip { font-family: 'Courier New', monospace; color: var(--cian-tech); background: rgba(0, 242, 255, 0.05); padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(0, 242, 255, 0.2); }
    </style>
</head>
<body>
<div class="super-overlay">
    <div class="container-fluid"><div class="row">
        <div class="col-md-2 sidebar d-none d-md-flex">
            <h4 class="text-center neon-gold">SISTEMA UCMI</h4>
            <nav class="nav flex-column mt-4">
                <button class="nav-link-custom active" onclick="location.href='historial-postulaciones.html'"><i class="bi bi-archive me-2"></i> Historial</button>
            </nav>
            <button id="btnCerrarSesion" class="btn btn-outline-danger mt-auto">Cerrar Sesión</button>
        </div>
        <div class="col-md-10 p-5">
            <h2 class="text-uppercase mb-4">Historial de Solicitudes</h2>
            <div class="glass-panel">
                <table class="table-historial text-white">
                    <thead><tr class="text-white-50"><th>Solicitante</th><th>Fecha</th><th>Perfil</th><th>Estado</th><th>WhatsApp</th></tr></thead>
                    <tbody id="tablaCuerpo"></tbody>
                </table>
            </div>
        </div>
    </div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325" };
    const db = getFirestore(initializeApp(firebaseConfig));
    const tablaCuerpo = document.getElementById('tablaCuerpo');

    onSnapshot(collection(db, "historial_postulaciones"), (snapshot) => {
        tablaCuerpo.innerHTML = '';
        snapshot.forEach(doc => {
            const p = doc.data();
            
            // Lógica para detectar Docente Academia
            const esDocente = String(p.perfil || '').toLowerCase().includes("docente");
            
            const esAprobado = ['ACTIVO', 'ACEPTADO', 'APROBADO', 'TRUE'].includes(String(p.estado || '').toUpperCase());
            const esRechazado = ['RECHAZADO', 'INACTIVO', 'FALSE'].includes(String(p.estado || '').toUpperCase());
            
            const statusClass = esAprobado ? 'status-aprobado' : (esRechazado ? 'status-rechazado' : 'status-pendiente');
            const estadoTexto = esAprobado ? 'ACEPTADO' : (esRechazado ? 'RECHAZADO' : 'PENDIENTE');

            tablaCuerpo.innerHTML += `
                <tr>
                    <td><div class="fw-bold">${p.entidad || 'N/A'}</div><div class="small text-white-50">${p.nombreResponsable || p.nombreEstudiante || '---'}</div></td>
                    <td><span class="date-chip">${p.fechaProcesado || '---'}</span></td>
                    <td><div class="fw-bold ${esDocente ? 'text-info' : 'text-warning'}">${(p.perfil || 'ACADEMIA').toUpperCase()}</div></td>
                    <td><span class="badge-status ${statusClass}">${estadoTexto}</span></td>
                    <td><a href="https://wa.me/${p.whatsapp}" target="_blank" class="text-decoration-none text-info"><i class="bi bi-whatsapp"></i> ${p.whatsapp || '---'}</a></td>
                </tr>
            `;
        });
    });

    document.getElementById('btnCerrarSesion').addEventListener('click', () => { signOut(getAuth()).then(() => location.href = 'index.html'); });
</script>
</body>
</html>
