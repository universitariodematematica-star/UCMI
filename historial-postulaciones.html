<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --sidebar-width: 260px;
            --rojo-peligro: #e74c3c;
            --purpura-neon: #bc13fe;
            --cian-tech: #00f2ff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            height: 100vh;
        }

        .overlay {
            position: fixed;
            top: 0; right: 0; bottom: 0; left: var(--sidebar-width);
            background: radial-gradient(circle, rgba(6, 9, 15, 0.7) 0%, rgba(6, 9, 15, 0.95) 100%);
            z-index: -1;
        }

        .wrapper { display: flex; height: 100vh; width: 100vw; }

        /* --- SIDEBAR UCMI --- */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(197, 160, 89, 0.2);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
        }

        .sidebar-logo { width: 100px; margin: 0 auto 30px; display: block; }
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi {
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 10px;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }

        .btn-maestro {
            background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white;
            font-weight: 600; text-transform: uppercase; font-size: 0.65rem; border-radius: 50px;
            padding: 10px; text-align: center; text-decoration: none; display: block; margin-bottom: 10px;
        }

        .btn-cerrar {
            background: transparent; border: 1px solid rgba(231, 76, 60, 0.4); color: rgba(231, 76, 60, 0.9);
            font-weight: 600; text-transform: uppercase; font-size: 0.65rem; border-radius: 50px;
            padding: 8px; text-align: center; display: block; text-decoration: none;
        }

        /* --- CONTENIDO PRINCIPAL CORREGIDO --- */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
        }

        .table-historial { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .table-historial tr { background: rgba(255, 255, 255, 0.03); border-radius: 15px; }
        .table-historial td { padding: 15px 20px; vertical-align: middle; border: none; }
        
        .badge-status { padding: 6px 14px; border-radius: 100px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        .status-aprobado { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff8844; }
        .status-rechazado { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d44; }
        .status-pendiente { background: rgba(255, 204, 0, 0.1); color: #ffcc00; border: 1px solid #ffcc0044; }
        .neon-gold { color: var(--dorado-ucmi); font-weight: bold; }
        .date-chip { font-family: 'Courier New', monospace; background: rgba(0, 242, 255, 0.05); color: var(--cian-tech); padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(0, 242, 255, 0.2); }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="wrapper">
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="sidebar-logo">
        <nav class="sidebar-nav">
            <a href="master-postulaciones.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="master-vigencia.html" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
            <a href="master-usuarios.html" class="nav-item-ucmi"><i class="bi bi-people"></i> USUARIOS</a>
            <a href="historial-postulaciones.html" class="nav-item-ucmi active"><i class="bi bi-clock-history"></i> HISTORIAL</a>
            <a href="directorio.html" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="ofertas-academicas.html" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="master-repositorio.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="papelera.html" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-auto pt-3">
            <a href="super-admin.html" class="btn-maestro"><i class="bi bi-cpu"></i> PANEL MAESTRO</a>
            <a href="#" id="btnCerrarSesion" class="btn-cerrar"><i class="bi bi-power"></i> CERRAR SESIÓN</a>
        </div>
    </aside>

    <main class="main-content">
        <h2 class="neon-gold text-uppercase mb-4">Historial de Solicitudes</h2>
        <div class="glass-panel">
            <div class="table-responsive">
                <table class="table-historial text-white">
                    <thead>
                        <tr class="text-white-50 small text-uppercase">
                            <th class="ps-4">Solicitante</th>
                            <th>Fecha</th>
                            <th>Perfil</th>
                            <th>Estado</th>
                            <th>WhatsApp</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

onAuthStateChanged(getAuth(), (user) => {
    console.log("Usuario actual:", user?.uid);
});

    const firebaseConfig = { apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325" };
    const db = getFirestore(initializeApp(firebaseConfig));
    const tablaCuerpo = document.getElementById('tablaCuerpo');

    onSnapshot(
    collection(db, "historial_postulaciones"),
    (snapshot) => {
        console.log("LECTURA EXITOSA");
    },
    (error) => {
        console.error("ERROR FIRESTORE:", error);
    }
);
        // DIAGNÓSTICO: Ver si llega algo de Firestore
        console.log("DEBUG: Documentos detectados en 'historial_postulaciones':", snapshot.size);
        
        tablaCuerpo.innerHTML = '';
        
        if (snapshot.empty) {
            console.warn("DEBUG: La colección está vacía.");
            tablaCuerpo.innerHTML = '<tr><td colspan="5" class="text-center">No hay registros en el historial.</td></tr>';
            return;
        }

        snapshot.forEach(doc => {
            const p = doc.data();
            console.log("DEBUG: Procesando doc:", doc.id, p);

            // Mapeo robusto: intentamos con perfil, si no, con tipoSolicitante
            const perfil = p.perfil || p.tipoSolicitante || 'ACADEMIA';
            const esDocente = String(perfil).toLowerCase().includes("docente");
            const decision = String(p.decisionFinal || "").toUpperCase().trim();
            const whatsapp = p.whatsapp || '';

            let statusClass = 'status-pendiente';
            let estadoTexto = 'PENDIENTE';

            if (decision === 'ACEPTADO') {
                statusClass = 'status-aprobado';
                estadoTexto = 'ACEPTADO';
            } else if (decision === 'RECHAZADO') {
                statusClass = 'status-rechazado';
                estadoTexto = 'RECHAZADO';
            }

            tablaCuerpo.innerHTML += `
                <tr>
                    <td>
                        <div class="fw-bold">${p.entidad || 'N/A'}</div>
                        <div class="small text-white-50">${p.nombreResponsable || p.nombreEstudiante || '---'}</div>
                    </td>
                    <td><span class="date-chip">${p.fechaProceso || '---'}</span></td>
                    <td><div class="fw-bold ${esDocente ? 'text-info' : 'text-warning'}">${String(perfil).toUpperCase()}</div></td>
                    <td><span class="badge-status ${statusClass}">${estadoTexto}</span></td>
                    <td>
                        ${whatsapp ? `<a href="https://wa.me/${whatsapp}" target="_blank" class="text-decoration-none text-info"><i class="bi bi-whatsapp"></i> ${whatsapp}</a>` : '---'}
                    </td>
                </tr>
            `;
        });
    });

    document.getElementById('btnCerrarSesion').addEventListener('click', () => { signOut(getAuth()).then(() => location.href = 'index.html'); });
</script>
</body>
</html>
