<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Control de Vigencia Temporal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --azul-sidebar: #1a2a3a;
            --purpura-neon: #bc13fe;
            --cian-tech: #00f2ff;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
        }

        /* SIDEBAR TRASLÚCIDO */
        .sidebar { 
            background: rgba(26, 42, 58, 0.8); 
            backdrop-filter: blur(15px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(197, 160, 89, 0.2);
            position: sticky;
            top: 0;
        }

        /* CONTENEDOR DE CRISTAL PARA LA TABLA */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(20px) !important;
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* RESET DE TABLA BOOTSTRAP PARA TRANSPARENCIA */
        .table {
            --bs-table-bg: transparent !important;
            --bs-table-color: white !important;
            margin-bottom: 0;
        }

        .table thead th {
            background: transparent !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2) !important;
            letter-spacing: 1px;
            font-size: 0.75rem;
        }

        .table tbody td {
            background: transparent !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
            padding: 20px 10px;
        }

        /* COMPONENTES VISUALES */
        .progress { background-color: rgba(255, 255, 255, 0.1); height: 6px; border-radius: 10px; overflow: visible; }
        .progress-bar-active { background: linear-gradient(90deg, var(--purpura-neon), var(--cian-tech)); box-shadow: 0 0 10px rgba(188, 19, 254, 0.5); }
        
        .status-tag { font-size: 0.65rem; padding: 5px 12px; border-radius: 6px; font-weight: bold; text-transform: uppercase; border: 1px solid transparent; }
        .tag-active { background: rgba(0, 255, 136, 0.1); color: #00ff88; border-color: rgba(0, 255, 136, 0.3); }
        .tag-expiring { background: rgba(255, 0, 85, 0.1); color: #ff0055; border-color: rgba(255, 0, 85, 0.3); }

        .btn-revocar {
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.05);
            transition: all 0.3s ease;
        }

        .btn-revocar:hover {
            background: rgba(255, 77, 77, 0.2);
            color: white;
            border-color: #ff4d4d;
        }

        .text-glow-purple { color: #d880ff; text-shadow: 0 0 10px rgba(188, 19, 254, 0.6); }
        .id-badge { font-family: monospace; color: var(--cian-tech); background: rgba(0, 242, 255, 0.1); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex flex-column">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 50px;" alt="Logo">
                    <h6 class="fw-bold text-white mt-2 small">UCMI SISTEMA</h6>
                </div>
                <hr class="border-secondary opacity-25">
                
                <nav class="nav flex-column mb-auto">
                    <a class="nav-link text-white-50 mb-2" href="master-postulaciones.html"><i class="bi bi-person-badge me-2"></i> Postulaciones</a>
                    <a class="nav-link text-white mb-2" href="#"><i class="bi bi-clock-history me-2 text-glow-purple"></i> Vigencia Temporal</a>
                    <a class="nav-link text-white-50 mb-2" href="master-usuarios.html"><i class="bi bi-people me-2"></i> Usuarios</a>
                </nav>

                <div class="mt-auto">
                    <a href="super-admin.html" class="btn btn-outline-light btn-sm w-100 rounded-pill mb-2 opacity-75" style="font-size: 0.7rem;">PANEL MAESTRO</a>
                    <button id="btnLogout" class="btn btn-outline-danger btn-sm w-100 rounded-pill" style="font-size: 0.7rem;">CERRAR SESIÓN</button>
                </div>
            </div>

            <div class="col-md-10 p-5">
                <div class="mb-5">
                    <h2 class="fw-bold text-uppercase"><i class="bi bi-shield-lock me-3 text-glow-purple"></i>Vigencia de Protocolos</h2>
                    <p class="text-white-50">Control cronométrico de licencias activas en la red UCMI.</p>
                </div>

                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr class="text-white-50 text-uppercase">
                                    <th>Responsable / Identificador</th>
                                    <th>Activación</th>
                                    <th style="width: 20%;">Cronología</th>
                                    <th>Expiración</th>
                                    <th>Remanente</th>
                                    <th class="text-end">Operaciones</th>
                                </tr>
                            </thead>
                            <tbody id="listaVigencia">
                                </tbody>
                        </table>
                    </div>
                </div>

                <footer class="mt-5 text-center text-white-25 small">
                    UCMI — Unidad de Control de Mando Integral © 2026
                </footer>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const MI_UID_MAESTRO = "m56REyF19sOsC6BE5sJdJG6eR863";

    // Bloqueo de seguridad
    onAuthStateChanged(auth, (user) => {
        if (!user || user.uid !== MI_UID_MAESTRO) { window.location.href = "index.html"; }
    });

    const contenedor = document.getElementById('listaVigencia');

    // Escucha en tiempo real de la colección "usuarios"
    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        contenedor.innerHTML = '';
        
        snapshot.forEach((docSnapshot) => {
            const data = docSnapshot.data();
            const email = docSnapshot.id;

            // Cálculos de tiempo
            const ahora = new Date().getTime();
            const inicio = new Date(data.fechaActivacion).getTime();
            const fin = data.expiracionTimestamp; 
            const total = fin - inicio;
            const transcurrido = ahora - inicio;
            
            let porcentaje = Math.floor((transcurrido / total) * 100);
            porcentaje = Math.min(Math.max(porcentaje, 0), 100);

            const msecDia = 1000 * 60 * 60 * 24;
            const diasRestantes = Math.ceil((fin - ahora) / msecDia);
            
            const esCritico = porcentaje > 85;

            contenedor.innerHTML += `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="rounded-circle p-2 me-3" style="background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2);">
                                <i class="bi bi-person-check-fill text-glow-purple"></i>
                            </div>
                            <div>
                                <span class="fw-bold d-block text-white">${data.entidad || 'Usuario'}</span>
                                <span class="id-badge">${email}</span>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="text-white-50 small d-block">Fecha Inicio:</span>
                        <span class="small fw-bold">${new Date(data.fechaActivacion).toLocaleDateString()}</span>
                    </td>
                    <td>
                        <div class="progress mb-1">
                            <div class="progress-bar ${esCritico ? 'bg-danger' : 'progress-bar-active'}" style="width: ${porcentaje}%;"></div>
                        </div>
                        <small class="text-white-50" style="font-size: 0.6rem;">CONSUMO: ${porcentaje}%</small>
                    </td>
                    <td>
                        <span class="text-white-50 small d-block">Vence en:</span>
                        <span class="small fw-bold text-info">${new Date(fin).toLocaleDateString()}</span>
                    </td>
                    <td>
                        <span class="status-tag ${esCritico ? 'tag-expiring' : 'tag-active'}">
                            ${diasRestantes > 0 ? diasRestantes + ' DÍAS' : 'EXPIRADO'}
                        </span>
                    </td>
                    <td class="text-end">
                        <button onclick="confirmarRevocacion('${email}')" class="btn btn-sm btn-revocar rounded-pill px-3">
                            <i class="bi bi-trash3 me-1"></i> Revocar
                        </button>
                    </td>
                </tr>
            `;
        });
    });

    // Función global para revocar
    window.confirmarRevocacion = async (email) => {
        const result = await Swal.fire({
            title: '¿Revocar acceso?',
            text: `Se eliminarán permanentemente los permisos de ${email}`,
            icon: 'warning',
            background: '#1a2a3a',
            color: '#fff',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Sí, revocar'
        });

        if (result.isConfirmed) {
            await deleteDoc(doc(db, "usuarios", email));
            Swal.fire({ title: 'Acceso Revocado', icon: 'success', background: '#1a2a3a', color: '#fff' });
        }
    };

    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });
</script>
</body>
</html>
