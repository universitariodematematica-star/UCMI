<!DOCTYPE html>
<html lang="es">
<head>
      <meta charset="UTF-8">
      <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Inscripción de Idiomas - UCMI</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
      
      <style>
           :root { --dorado-ucmi: #c5a059; }
           body {
               background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
               background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0;
           }
           .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
           .card-form {
               border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
               background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); max-width: 700px; margin: auto; overflow: hidden;
           }
           .header-institucional { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.3); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
           .inst-logo { height: 100px; margin-bottom: 15px; opacity: 0; transition: 0.5s; }
           .inst-nombre { font-family: 'Cinzel', serif; color: #f3f0df; font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; }
           .inst-titulo { color: var(--dorado-ucmi); font-weight: 800; font-size: 2rem; }
           
           .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; font-weight: bold; margin-top: 10px; }
           .form-control, .form-select { border-radius: 12px; padding: 10px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.08); color: white; }
           .form-control:focus, .form-select:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--dorado-ucmi); color: white; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }
           .form-select option { background: #06090f; color: white; }
           
           .seccion-representante { display: none; background: rgba(197, 160, 89, 0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
           .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; transition: 0.3s; }
           
           /* Estilos del Modal */
           .modal-content { background: #06090f; border: 1px solid var(--dorado-ucmi); color: white; border-radius: 20px; }
           .modal-header { border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
           .modal-footer { border-top: 1px solid rgba(197, 160, 89, 0.2); }
           .resumen-item { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
           .resumen-label { color: var(--dorado-ucmi); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
      </style>
</head>
<body>

<div class="overlay"></div>

<!-- MODAL DE REVISIÓN -->
<div class="modal fade" id="modalRevision" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-eye me-2"></i>REVISIÓN DE DATOS</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="cuerpoRevision">
        <!-- Se llena dinámicamente -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary text-white" data-bs-dismiss="modal">CORREGIR</button>
        <button type="button" id="confirmarEnvio" class="btn btn-warning" style="background: var(--dorado-ucmi); font-weight: bold;">ENVIAR AHORA</button>
      </div>
    </div>
  </div>
</div>

<div class="container">
      <div class="card-form">
           <div class="header-institucional">
               <img src="" id="logoDinamico" class="inst-logo">
               <div id="nombreSede" class="inst-nombre">Cargando...</div>
               <h1 class="inst-titulo">POSTULACIÓN ACADÉMICA</h1>
           </div>

           <form id="formIdiomas" class="p-4 p-md-5 pt-3" novalidate>
               <div class="row g-3">
                   <div class="col-12">
                       <label class="form-label">NOMBRE COMPLETO DEL ESTUDIANTE:</label>
                       <input type="text" id="nombreResponsable" class="form-control" required>
                   </div>
                   <div class="col-md-6">
                       <label class="form-label">DNI DEL ESTUDIANTE:</label>
                       <input type="text" id="dniEstudiante" class="form-control" required>
                   </div>
                   <div class="col-md-6">
                       <label class="form-label">GÉNERO:</label>
                       <select id="genero" class="form-select" required>
                           <option value="">Seleccione...</option>
                           <option value="Masculino">Masculino</option>
                           <option value="Femenino">Femenino</option>
                           <option value="Otro">Otro</option>
                       </select>
                   </div>
                   <div class="col-md-8">
                       <label class="form-label">FECHA DE NACIMIENTO:</label>
                       <input type="date" id="fechaNacimiento" class="form-control" required>
                   </div>
                   <div class="col-md-4">
                       <label class="form-label">EDAD:</label>
                       <input type="text" id="edadEstudiante" class="form-control" readonly style="background: rgba(197, 160, 89, 0.1); color: var(--dorado-ucmi); font-weight: bold;">
                   </div>
                   <div class="col-12">
                       <label class="form-label">UBICACIÓN:</label>
                       <input type="text" id="ubicacion" class="form-control" required>
                   </div>
                   <div class="col-md-6">
                       <label class="form-label">CORREO:</label>
                       <input type="email" id="email" class="form-control" required>
                   </div>
                   <div class="col-md-6">
                       <label class="form-label">WHATSAPP:</label>
                       <input type="text" id="whatsapp" class="form-control" required>
                   </div>
               </div>

               <div id="panelRepresentante" class="seccion-representante">
                   <h6 class="text-warning fw-bold mb-3">DATOS DEL REPRESENTANTE (MENOR DE EDAD)</h6>
                   <div class="row g-3">
                       <div class="col-12">
                           <label class="form-label">NOMBRE REPRESENTANTE:</label>
                           <input type="text" id="nombreRepresentante" class="form-control">
                       </div>
                       <div class="col-md-6">
                           <label class="form-label">DNI REPRESENTANTE:</label>
                           <input type="text" id="dniRepresentante" class="form-control">
                       </div>
                       <div class="col-md-6">
                           <label class="form-label">WHATSAPP REPRESENTANTE:</label>
                           <input type="text" id="whatsappRepresentante" class="form-control">
                       </div>
                   </div>
               </div>

               <div class="mt-4">
                   <label class="form-label d-block mb-3">MÓDULOS A POSTULAR:</label>
                   <div id="contenedorModulos" class="row g-2"></div>
               </div>

               <button type="submit" id="btnPrevia" class="btn btn-enviar">COMPLETAR POSTULACIÓN</button>
           </form>
      </div>
</div>

<script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
           apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
           authDomain: "ucmi-13796634.firebaseapp.com",
           projectId: "ucmi-13796634",
           storageBucket: "ucmi-13796634.firebasestorage.app",
           messagingSenderId: "1090719609536",
           appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const urlParams = new URLSearchParams(window.location.search);
      const sedeRef = urlParams.get('ref') || "UCMI";
      let datosGlobales = {}; // Para persistir datos entre modal y envío
      const modalBootstrap = new bootstrap.Modal(document.getElementById('modalRevision'));

      // Carga de configuración inicial
      async function cargarConfiguracion() {
           const q = query(collection(db, "usuarios"), where("entidad", "==", sedeRef));
           const snap = await getDocs(q);
           if (!snap.empty) {
               const data = snap.docs[0].data();
               document.getElementById('logoDinamico').src = data.logoCustom || "";
               document.getElementById('logoDinamico').style.opacity = "1";
               document.getElementById('nombreSede').innerText = data.entidad.toUpperCase();
               
               const contenedor = document.getElementById('contenedorModulos');
               (data.modulos || []).forEach(mod => {
                   const col = document.createElement('div');
                   col.className = 'col-md-6';
                   col.innerHTML = `<div class="form-check"><input class="form-check-input check-modulo" type="checkbox" value="${mod}" id="${mod}"><label class="form-check-label ms-2" for="${mod}">${mod}</label></div>`;
                   contenedor.appendChild(col);
               });
           }
      }
      cargarConfiguracion();

      // Cálculo de Edad
      document.getElementById('fechaNacimiento').addEventListener('change', (e) => {
           const hoy = new Date();
           const naci = new Date(e.target.value);
           let edad = hoy.getFullYear() - naci.getFullYear();
           if (hoy.getMonth() < naci.getMonth() || (hoy.getMonth() === naci.getMonth() && hoy.getDate() < naci.getDate())) edad--;
           
           document.getElementById('edadEstudiante').value = edad;
           const esMenor = edad < 18;
           document.getElementById('panelRepresentante').style.display = esMenor ? 'block' : 'none';
           ['nombreRepresentante', 'dniRepresentante', 'whatsappRepresentante'].forEach(id => document.getElementById(id).required = esMenor);
      });

      // Atajos de teclado (Q: Adulto, M: Menor)
      window.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key.toLowerCase() === 'q') {
              e.preventDefault();
              document.getElementById('nombreResponsable').value = "Juan Carlos Riera";
              document.getElementById('dniEstudiante').value = "V-12345678";
              document.getElementById('genero').value = "Masculino";
              document.getElementById('fechaNacimiento').value = "1980-05-20";
              document.getElementById('fechaNacimiento').dispatchEvent(new Event('change'));
              document.getElementById('ubicacion').value = "Distrito Capital";
              document.getElementById('email').value = "j.riera@ucmi.edu.ve";
              document.getElementById('whatsapp').value = "04120000000";
          }
          if (e.ctrlKey && e.key.toLowerCase() === 'm') {
              e.preventDefault();
              document.getElementById('nombreResponsable').value = "Abril Riera";
              document.getElementById('dniEstudiante').value = "V-30555666";
              document.getElementById('fechaNacimiento').value = "2015-08-15";
              document.getElementById('fechaNacimiento').dispatchEvent(new Event('change'));
              setTimeout(() => {
                  document.getElementById('nombreRepresentante').value = "Nory Romero";
                  document.getElementById('dniRepresentante').value = "V-15888999";
                  document.getElementById('whatsappRepresentante').value = "04141112233";
              }, 50);
          }
      });

      // LÓGICA DEL MODAL Y ENVÍO
      document.getElementById('formIdiomas').onsubmit = (e) => {
          e.preventDefault();
          const seleccionados = Array.from(document.querySelectorAll('.check-modulo:checked')).map(cb => cb.value);
          if (seleccionados.length === 0) return Swal.fire("Aviso", "Selecciona al menos un módulo.", "warning");
          if (!e.target.checkValidity()) return e.target.classList.add('was-validated');

          // Captura de datos
          datosGlobales = {
              nombreResponsable: document.getElementById('nombreResponsable').value,
              dniEstudiante: document.getElementById('dniEstudiante').value,
              genero: document.getElementById('genero').value,
              edadEstudiante: document.getElementById('edadEstudiante').value,
              ubicacion: document.getElementById('ubicacion').value,
              email: document.getElementById('email').value,
              whatsapp: document.getElementById('whatsapp').value,
              modulos: seleccionados,
              entidad: sedeRef,
              fechaInscripcion: new Date().toLocaleString()
          };

          // Construcción del resumen en el modal
          let html = `
            <div class="row">
                <div class="col-md-6 resumo-item"><div class="resumen-label">Estudiante</div><div>${datosGlobales.nombreResponsable}</div></div>
                <div class="col-md-6 resumo-item"><div class="resumen-label">DNI</div><div>${datosGlobales.dniEstudiante}</div></div>
                <div class="col-md-6 resumo-item"><div class="resumen-label">Edad</div><div>${datosGlobales.edadEstudiante} años</div></div>
                <div class="col-md-6 resumo-item"><div class="resumen-label">WhatsApp</div><div>${datosGlobales.whatsapp}</div></div>
                <div class="col-12 resumo-item"><div class="resumen-label">Módulos</div><div class="text-warning">${datosGlobales.modulos.join(', ')}</div></div>
            </div>`;

          if (datosGlobales.edadEstudiante < 18) {
              datosGlobales.nombreRepresentante = document.getElementById('nombreRepresentante').value;
              datosGlobales.dniRepresentante = document.getElementById('dniRepresentante').value;
              datosGlobales.whatsappRepresentante = document.getElementById('whatsappRepresentante').value;
              html += `
                <div class="mt-3 p-3 border border-warning rounded">
                    <h6 class="text-warning small fw-bold">REPRESENTANTE</h6>
                    <div class="row">
                        <div class="col-md-6"><div class="resumen-label">Nombre</div><div>${datosGlobales.nombreRepresentante}</div></div>
                        <div class="col-md-6"><div class="resumen-label">DNI</div><div>${datosGlobales.dniRepresentante}</div></div>
                    </div>
                </div>`;
          }

          document.getElementById('cuerpoRevision').innerHTML = html;
          modalBootstrap.show();
      };

      // Confirmación final y subida a Firebase
      document.getElementById('confirmarEnvio').onclick = async () => {
          const btn = document.getElementById('confirmarEnvio');
          btn.disabled = true;
          btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> ENVIANDO...`;

          try {
              await addDoc(collection(db, "postulaciones"), datosGlobales);
              modalBootstrap.hide();
              await Swal.fire({ icon: 'success', title: '¡Postulación Exitosa!', text: 'Los datos se han guardado en la nube.', confirmButtonColor: '#c5a059' });
              location.reload();
           } catch (err) {
              Swal.fire("Error", "Error de conexión con Firebase.", "error");
              btn.disabled = false;
              btn.innerText = "ENVIAR AHORA";
           }
      };
</script>
</body>
</html>
