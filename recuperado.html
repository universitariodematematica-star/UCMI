<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos y Ramas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: white;
        }

        .modal-content {
            border: 2px solid #ffc107;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <h2 class="mb-4">Mis Módulos Creados</h2>

        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Módulo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaModulos"></tbody>
        </table>

    </div>

    <!-- Modal -->
    <div class="modal fade" id="modalRamas" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">

                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">
                        Gestionar ramas
                    </h5>
                    <button type="button"
                            class="btn-close btn-close-white"
                            data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">

                    <input type="text"
                           id="inputNombreRama"
                           class="form-control"
                           placeholder="Nombre de la rama">

                    <button id="btnGuardar"
                            class="btn btn-warning w-100 mt-3">
                        CREAR RAMA
                    </button>

                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap primero -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase -->
    <script type="module">

        import { initializeApp }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

        import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import {
            getAuth,
            onAuthStateChanged
        }
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
            authDomain: "ucmi-13796634.firebaseapp.com",
            projectId: "ucmi-13796634",
            storageBucket: "ucmi-13796634.firebasestorage.app",
            messagingSenderId: "1090719609536",
            appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let idModuloSeleccionado = "";

        const modal = new bootstrap.Modal(
            document.getElementById("modalRamas")
        );

        // =====================================
        // AUTENTICACIÓN
        // =====================================

        onAuthStateChanged(auth, (user) => {

            if (user) {

                console.log("Usuario autenticado");
                console.log("UID:", user.uid);

            } else {

                console.warn("No hay usuario autenticado");

            }

        });

        // =====================================
        // CARGAR MÓDULOS
        // =====================================

        const q = query(
            collection(db, "ofertas"),
            orderBy("modulo", "asc")
        );

onSnapshot(q, (snapshot) => {
            const tabla = document.getElementById("tablaModulos");
            tabla.innerHTML = "";

            snapshot.forEach((docSnap) => {
                const datos = docSnap.data();
                const idContenedor = `ramas-${docSnap.id}`; // Identificador único

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>
                        <div class="fw-bold fs-5">${datos.modulo || ""}</div>
                        <ul id="${idContenedor}" class="list-unstyled text-secondary mt-2 ps-3" style="font-size: 0.85em;">
                            </ul>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-warning btn-gestionar" 
                                data-id="${docSnap.id}" data-nombre="${datos.modulo}">
                            Gestionar
                        </button>
                    </td>
                `;
                tabla.appendChild(tr);

                // Escucha en tiempo real para las ramas de ESTE módulo
                const qRamas = query(
    collection(db, "ramas"), 
    where("moduloId", "==", docSnap.id),
    orderBy("nombre", "asc") // <--- Aquí está el orden alfabético
);
                onSnapshot(qRamas, (snapRamas) => {
                    const lista = document.getElementById(idContenedor);
                    if (lista) {
                        lista.innerHTML = ""; // Limpiar lista antes de renderizar
                        snapRamas.forEach(r => {
                            lista.innerHTML += `<li>• ${r.data().nombre}</li>`;
                        });
                    }
                });
            });
        });

        // =====================================
        // ABRIR MODAL
        // =====================================

        document
        .getElementById("tablaModulos")
        .addEventListener("click", (e) => {

            if (
                e.target.classList.contains(
                    "btn-gestionar"
                )
            ) {

                idModuloSeleccionado =
                    e.target.dataset.id;

                document
                    .getElementById("tituloModal")
                    .innerText =
                    "Ramas de: " +
                    e.target.dataset.nombre;

                modal.show();

            }

        });

        // =====================================
        // CREAR RAMA
        // =====================================

        document
        .getElementById("btnGuardar")
        .addEventListener("click", async () => {

            const nombre =
                document
                .getElementById("inputNombreRama")
                .value
                .trim();

            if (!nombre) {

                alert(
                    "Escribe un nombre para la rama"
                );

                return;
            }

            if (!idModuloSeleccionado) {

                alert(
                    "No se seleccionó ningún módulo"
                );

                return;
            }

            try {

                console.log(
                    "Creando rama..."
                );

                const resultado =
                    await addDoc(
                        collection(db, "ramas"),
                        {
                            nombre: nombre,
                            moduloId:
                                idModuloSeleccionado,
                            fechaCreacion:
                                new Date()
                        }
                    );

                console.log(
                    "Documento creado:"
                );

                console.log(
                    resultado.id
                );

                alert(
                    "¡Rama creada con éxito!"
                );

                document
                    .getElementById(
                        "inputNombreRama"
                    )
                    .value = "";

                modal.hide();

            } catch (error) {

                console.error(
                    "Error Firestore:",
                    error
                );

                alert(
                    "Error:\n\n" +
                    error.message
                );

            }

        });

    </script>

</body>

</html>
