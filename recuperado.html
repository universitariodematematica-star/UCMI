<!DOCTYPE html>

    <style>

         .sidebar-nav { flex-grow: 1; }

    /* --- BOTONES LATERALES --- */
    .btn-sidebar-action {

    .btn-logout {

    /* --- CONTENEDOR TRASLÚCIDO (TABLA) --- */
    .table-container { 
        background: rgba(255, 255, 255, 0.03) !important;

    .table thead th {

    .table td .fw-bold { color: #ffffff !important; font-size: 1rem; }
    .table td .text-muted, .table td .small, .table td span {

    .table-hover tbody tr:hover td {

    .btn-dark.btn-sm {
        background-color: rgba(255, 255, 255, 0.05) !important;

        color: white !important;

        padding: 6px 15px;

    }

    .btn-dark.btn-sm:hover {
        background-color: white !important;

    }

    /* --- MODAL EXPEDIENTE --- */
    .modal-content { 
        background: rgba(255, 255, 255, 0.03) !important;
        backdrop-filter: blur(15px) saturate(150%) !important;
        -webkit-backdrop-filter: blur(15px) saturate(150%) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 32px; 
        color: white !important;
        box-shadow: 0 30px 60px rgba(0,0,0,0.7);
    }

    .modal-header, .modal-footer { border: none !important; background: transparent !important; }
    .modal-header .btn-close { filter: invert(1) grayscale(1) brightness(2); }

    /* --- BOTONES DEL MODAL --- */
    .btn-activar-acceso {
        background: rgba(39, 174, 96, 0.2) !important;
        backdrop-filter: blur(10px) !important;
        -webkit-backdrop-filter: blur(10px) !important;
        border: 1px solid rgba(39, 174, 96, 0.5) !important;
        color: #ffffff !important;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        transition: all 0.3s ease;
    }

    .btn-activar-acceso:hover {
        background: rgba(39, 174, 96, 0.4) !important;
        border-color: rgba(39, 174, 96, 0.9) !important;
        box-shadow: 0 0 20px rgba(39, 174, 96, 0.4);
        transform: translateY(-2px);
    }

    .btn-outline-danger {
        background: rgba(231, 76, 60, 0.1) !important;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(231, 76, 60, 0.4) !important;
        color: #e74c3c !important;
        border-radius: 50px;
        padding: 12px 25px;
        transition: 0.3s;
    }

    .btn-outline-danger:hover {
        background: rgba(231, 76, 60, 0.3) !important;
        color: white !important;
        border-color: rgba(231, 76, 60, 0.8) !important;
    }

    /* --- SWEETALERT2 (CRISTAL EFFECT) --- */
    .swal2-popup {
        background: rgba(255, 255, 255, 0.05) !important;
        backdrop-filter: blur(20px) saturate(160%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(160%) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 32px !important;
        color: white !important;
        box-shadow: 0 30px 60px rgba(0,0,0,0.8) !important;
    }

    .swal2-title, .swal2-html-container { color: white !important; }

    /* Botón de Confirmación en SweetAlert (Verde traslúcido) */
    .swal2-confirm {
        background: rgba(39, 174, 96, 0.3) !important;
        backdrop-filter: blur(10px) !important;
        border: 1px solid rgba(39, 174, 96, 0.6) !important;
        border-radius: 50px !important;
        padding: 12px 30px !important;
        font-weight: 700 !important;
        transition: 0.3s !important;
    }
    .swal2-confirm:hover {
        background: rgba(39, 174, 96, 0.5) !important;
        box-shadow: 0 0 15px rgba(39, 174, 96, 0.5) !important;
    }

    /* Botón de Cancelar/Rechazar en SweetAlert (Rojo traslúcido) */
    .swal2-cancel {
        background: rgba(231, 76, 60, 0.15) !important;
        backdrop-filter: blur(10px) !important;
        border: 1px solid rgba(231, 76, 60, 0.4) !important;
        border-radius: 50px !important;
        padding: 12px 30px !important;
        color: white !important;
        transition: 0.3s !important;
    }
    .swal2-cancel:hover {
        background: rgba(231, 76, 60, 0.4) !important;
        box-shadow: 0 0 15px rgba(231, 76, 60, 0.5) !important;
    }

    /* Estilos de tabla y detalles */
    .label-exp { color: var(--dorado-ucmi) !important; font-size: 0.7rem; text-transform: uppercase; font-weight: 800; margin-bottom: 2px; display: block; opacity: 0.9; }
    .val-exp { color: #ffffff !important; font-size: 1rem; font-weight: 500; margin-bottom: 15px; display: block; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 5px; }
    .badge-perfil { font-size: 0.7rem; padding: 5px 10px; border-radius: 50px; color: white; font-weight: 700; }
    #contenidoModal .bg-white { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: rgba(255, 255, 255, 0.8) !important; border-radius: 12px; }

    /* --- CATEGORÍAS MAESTRAS (FONDOS OSCUROS) --- */

/* Academia (Verde Oscuro) */
.bg-categoria-academia { 
    background-color: #0a3d1d !important; 
    color: #ffffff !important; 
}

/* Profesores (Azul Oscuro) */
.bg-categoria-profesor { 
    background-color: #0d2e5e !important; 
    color: #ffffff !important; 
}

/* Estudiantes (Índigo) */

    background-color: #311b92 !important; 
    color: #ffffff !important; 
}

/* Otros / Pendientes */
.bg-categoria-default { 
    background-color: #455a64 !important; 
    color: #ffffff !important; 
}

    /* --- EFECTO DE ENFOQUE AL ABRIR MODAL --- */
    body.modal-open .super-overlay { filter: blur(8px) brightness(0.7); }
    .modal-backdrop.show { opacity: 0.4; backdrop-filter: blur(4px); }
    .modal.fade .modal-dialog { transform: scale(0.95); transition: transform 0.3s ease-out; }
    .modal.show .modal-dialog { transform: scale(1); }
</style>
</head>

<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">

                </nav>

                <div class="mt-4 pt-4 border-top border-secondary">
                    <a href="super-admin.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="col-md-10 p-4">
                <h1 class="display-6 fw-bold">Control de Postulaciones</h1>
                
                <div class="row mt-4">
                    <div class="col-md-4">
                        <div class="p-3 border border-secondary rounded-4" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(5px);">
                            <label class="small text-muted fw-bold mb-2 d-block text-uppercase">Filtrar por Perfil</label>
                            <select id="filtroPerfil" class="form-select bg-dark text-white border-0 rounded-pill px-3 shadow-sm">

</div>

<!-- MODAL DE DETALLES -->
<div class="modal fade" id="modalDetalles" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="ps-4 pt-4">
                <img id="logoModalAspirante" src="" style="height: 50px; border-radius: 5px;">
            </div>
            <div class="modal-header border-0 pb-0">
                <h4 class="fw-bold"><i class="bi bi-file-earmark-person me-2"></i>Expediente del Aspirante</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-4">
                <div class="row" id="contenidoModal"></div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-outline-danger rounded-pill px-4" id="btnEliminar">Rechazar</button>
                <button class="btn btn-activar-acceso rounded-pill px-4 fw-bold" id="btnConfirmarAcceso">Activar Acceso</button>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let currentId = null;
    let currentData = null;
    let logoAcademiaGlobal = "";
    const selectorFiltro = document.getElementById('filtroPerfil');

// 1. IDENTIDAD Y CARGA AUTOMÁTICA
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const userDoc = await getDoc(doc(db, "usuarios", user.email));
        if (userDoc.exists()) {
            const data = userDoc.data();
            
            // Personalización visual del Sidebar
            logoAcademiaGlobal = data.logoCustom || data.logo || "https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png";
            document.getElementById('logoAcademiaPrincipal').src = logoAcademiaGlobal;
            document.getElementById('logoAcademiaPrincipal').style.opacity = "1";
            
            const nombreEntidad = data.entidad || "Panel";
            document.getElementById('nombreAcademiaSidebar').innerText = nombreEntidad.toUpperCase();

            // === LA CLAVE: Activamos la escucha usando el dato real de tu perfil en Firebase ===
            iniciarEscuchaFiltrada(nombreEntidad); 
        }
    } else {
        // Si no hay sesión, mandamos al login
        window.location.href = "index.html";
    }
});

// 2. FUNCIÓN DE ESCUCHA (Busca solo los datos de TU academia)
function iniciarEscuchaFiltrada(academiaNombre) {
    console.log("Conectando con las solicitudes de:", academiaNombre);

    // Filtramos la colección 'postulaciones' por tu entidad
    const q = query(
        collection(db, "postulaciones"), 
        where("perfil", "==", "Estudiante Academia"),
        where("entidad", "==", academiaNombre)
    );

    // Mantenemos la tabla actualizada en tiempo real
    onSnapshot(q, (snap) => {
        registrosLocales = snap.docs;
        renderizarTabla();
    }, (error) => {
        console.error("Error en la consulta de Firebase: ", error);
    });
}

    let registrosLocales = []; 

function renderizarTabla() {
    const lista = document.getElementById('listaMaestra');
    if (!lista) return; 
    
    const filtro = selectorFiltro.value;
    lista.innerHTML = "";

    registrosLocales.forEach(docSnap => {
        const d = docSnap.data();
        const id = docSnap.id;

        if (filtro !== "todos" && !d.perfil.toLowerCase().includes(filtro)) return;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>
                <div class="fw-bold">${d.nombreResponsable || d.nombre || 'Sin nombre'}</div>
                <div class="small text-muted">${d.email}</div>
            </td>
            <td><span class="badge bg-categoria-estudiante">${d.perfil}</span></td>
            <td><i class="bi bi-geo-alt me-1"></i>${d.ubicacion || 'No definida'}</td>
            <td class="text-center">
                <button class="btn btn-dark btn-sm" onclick="verExpediente('${id}')">
                    <i class="bi bi-eye"></i> Revisar
                </button>
            </td>
        `;
        lista.appendChild(tr);
    });
}

    // 3. EXPEDIENTE
    window.verExpediente = async (id) => {
        currentId = id;
        const snap = await getDoc(doc(db, "postulaciones", id));
        if (snap.exists()) {
            currentData = snap.data();
            const d = currentData;
            document.getElementById('logoModalAspirante').src = logoAcademiaGlobal;
            document.getElementById('contenidoModal').innerHTML = `
                <div class="col-md-6 mb-3">
                    <label class="text-muted small d-block">NOMBRE</label>
                    <span class="fw-bold">${d.nombreResponsable}</span>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="text-muted small d-block">PERFIL</label>
                    <span>${d.perfil}</span>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="text-muted small d-block">LOCALIZACIÓN</label>
                    <span>${d.ubicacion}</span>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="text-muted small d-block">WHATSAPP</label>
                    <span>${d.whatsapp || 'N/A'}</span>
                </div>`;
            new bootstrap.Modal(document.getElementById('modalDetalles')).show();
        }
    };


    selectorFiltro.addEventListener('change', renderizarTabla);

    document.getElementById('btnLogout').onclick = async () => {
        await signOut(auth);
        window.location.href = "index.html";
    };

    // Botones del modal
    document.getElementById('btnConfirmarAcceso').onclick = async () => {
        if(!currentId || !currentData) return;
        await setDoc(doc(db, "usuarios", currentData.email), { ...currentData, estado: "activo" });
        await deleteDoc(doc(db, "postulaciones", currentId));
        location.reload();
    };

    document.getElementById('btnEliminar').onclick = async () => {
        if (confirm("¿Rechazar?")) {
            await deleteDoc(doc(db, "postulaciones", currentId));
            location.reload();
        }
    };
</script>
</body>

</html>
