<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Plantilla -->
    <link rel="stylesheet" href="componentes/plantilla-academia.css">

    <style>

        .panel-cristal{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:18px;
            padding:30px;
            max-width:900px;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.2);
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,.12);
            color:white;
            border-color:#c5a059;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,.5);
        }

        .btn-registrar{
            background:#c5a059;
            border:none;
            color:#111;
            font-weight:600;
            padding:0 25px;
        }

        .btn-registrar:hover{
            background:#d8b26a;
        }

    </style>

</head>
<body>

<div id="plantilla"></div>

<script type="module">

    import { db, auth } from "./componentes/firebase-config.js";

import {
    collection,
    addDoc,
    serverTimestamp,
    doc,
    getDoc,
    getDocs,
    query,
    where,
    updateDoc,
    deleteDoc,
    onSnapshot,
    orderBy,
    writeBatch,
    Timestamp
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// =========================
// CARGA PLANTILLA
// =========================
const html = await fetch("componentes/plantilla-academia.html");
document.getElementById("plantilla").innerHTML = await html.text();

document.getElementById("contenido").innerHTML = `
<div class="panel-cristal mb-4">
    <h5 class="mb-4">
        Escriba el nombre del aula y pulse <strong>Registrar</strong>.
    </h5>

    <div class="d-flex gap-3">
        <input id="txtNombre" type="text" class="form-control" placeholder="Escriba aquí...">
        <button id="btnRegistrar" class="btn btn-registrar">Registrar</button>
    </div>
</div>

<div id="listaAulas"></div>
`;

await import("./componentes/plantilla-academia.js");

const txtNombre = document.getElementById("txtNombre");
const btnRegistrar = document.getElementById("btnRegistrar");
const listaAulas = document.getElementById("listaAulas");

// =========================
// POPUP DE INTEGRANTES
// =========================
const popupIntegrantes = document.createElement("div");

popupIntegrantes.id = "popupIntegrantes";

popupIntegrantes.style.position = "fixed";
popupIntegrantes.style.display = "none";
popupIntegrantes.style.background = "#111";
popupIntegrantes.style.color = "white";
popupIntegrantes.style.padding = "12px";
popupIntegrantes.style.borderRadius = "10px";
popupIntegrantes.style.border = "1px solid rgba(255,255,255,.2)";
popupIntegrantes.style.minWidth = "260px";
popupIntegrantes.style.maxWidth = "320px";
popupIntegrantes.style.maxHeight = "320px";
popupIntegrantes.style.overflowY = "auto";
popupIntegrantes.style.boxShadow = "0 10px 30px rgba(0,0,0,.5)";
popupIntegrantes.style.zIndex = "999999";
popupIntegrantes.style.pointerEvents = "none";

document.body.appendChild(popupIntegrantes);
    
// =========================
// AUTENTICACIÓN SEGURA
// =========================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        console.log("No autenticado");
        return;
    }

    const usuarioSnap = await getDoc(doc(db, "usuarios", user.uid));

    if (!usuarioSnap.exists()) {
        console.error("Usuario no existe");
        return;
    }

    const datosUsuario = usuarioSnap.data();

    // =========================
// CARGAR INTEGRANTES DE TODAS LAS AULAS (TIEMPO REAL)
// =========================
const integrantesPorAula = {};

const qIntegrantes = query(
    collection(db, "aula_integrantes"),
    where("entidad", "==", datosUsuario.entidad)
);

onSnapshot(qIntegrantes, (snapshot) => {

    // Vaciar el objeto
    Object.keys(integrantesPorAula).forEach(key => {
        delete integrantesPorAula[key];
    });

    snapshot.forEach(docSnap => {

        const integrante = docSnap.data();

        if (!integrantesPorAula[integrante.aulaId]) {
            integrantesPorAula[integrante.aulaId] = [];
        }

        integrantesPorAula[integrante.aulaId].push(integrante);

    });

    // Ordenar alfabéticamente
    Object.values(integrantesPorAula).forEach(lista => {

        lista.sort((a, b) =>
            a.nombreResponsable.localeCompare(
                b.nombreResponsable,
                "es",
                { sensitivity: "base" }
            )
        );

    });

});

    // =========================
    // LISTA AULAS (SNAPSHOT ÚNICO)
    // =========================
    const q = query(
    collection(db, "aulas"),
    where("entidad", "==", datosUsuario.entidad),
    orderBy("nombre_aula")
);

    onSnapshot(q, async (snapshot) => {

        let htmlAulas = "";

        for (const docSnap of snapshot.docs) {

            const aula = docSnap.data();

            let nombreCurso = "Sin curso asignado";
            let asignaturasHTML = "";

            if (aula.cursoId) {

                const cursoSnap = await getDoc(doc(db, "cursos", aula.cursoId));

                if (cursoSnap.exists()) {
                    nombreCurso = cursoSnap.data().nombre_curso;
                }

                const asignaturasSnap = await getDocs(
                    query(
                        collection(db, "curso_asignaturas"),
                        where("cursoId", "==", aula.cursoId),
                        where("entidad", "==", datosUsuario.entidad),
                        orderBy("asignatura")
                    )
                );

                asignaturasSnap.forEach(a => {
                    const data = a.data();

                    asignaturasHTML += `
                        <li style="color:white; font-size:0.9rem;">
                            📘 ${data.asignatura}
                        </li>
                    `;
                });
            }

            htmlAulas += `
    <div
        class="panel-cristal aula-card mb-3 d-flex justify-content-between align-items-start"
        data-id="${docSnap.id}">

        <div>
            <h5 class="mb-0">${aula.nombre_aula}</h5>

            <small style="opacity:0.7">
                🎓 Curso: ${nombreCurso}
            </small>

            <ul style="margin-top:8px; padding-left:18px;">
                ${asignaturasHTML}
            </ul>
        </div>

        <div class="d-flex gap-2">

            <button
                class="btn btn-sm btn-primary btnEditar"
                data-id="${docSnap.id}"
                data-nombre="${aula.nombre_aula}">
                ✏️ Editar
            </button>

            <button
                class="btn btn-sm btn-warning btnCursos"
                data-id="${docSnap.id}">
                🎓 Cursos
            </button>

            <button
                class="btn btn-sm btn-info btnAlumnos"
                data-id="${docSnap.id}">
                👥 Alumnos
            </button>

            <button
                class="btn btn-sm btn-danger btnBorrar"
                data-id="${docSnap.id}">
                🗑️ Borrar
            </button>

        </div>

    </div>
`;
        }

        listaAulas.innerHTML = htmlAulas;

        // =========================
// POPUP DE INTEGRANTES
// =========================
document.querySelectorAll(".aula-card").forEach(card => {

    card.addEventListener("mouseenter", () => {

        const aulaId = card.dataset.id;

        const integrantes = integrantesPorAula[aulaId] || [];

        let html = `
            <div style="font-weight:bold; margin-bottom:8px;">
                👥 Integrantes (${integrantes.length})
            </div>
        `;

        if (integrantes.length === 0) {

            html += `
                <div style="opacity:.7;">
                    No hay alumnos asignados.
                </div>
            `;

        } else {

            integrantes.forEach(alumno => {

    html += `
        <div style="
            padding:8px 0;
            border-bottom:1px solid rgba(255,255,255,.08);
        ">

            <div style="
                font-weight:600;
                color:white;
            ">
                👤 ${alumno.nombreResponsable}
            </div>

            <div style="
                font-size:.82rem;
                opacity:.65;
                margin-left:22px;
            ">
                ${alumno.email}
            </div>

        </div>
    `;

});

        }

        popupIntegrantes.innerHTML = html;
        popupIntegrantes.style.display = "block";

    });

    card.addEventListener("mousemove", (e) => {

        popupIntegrantes.style.left = (e.clientX + 15) + "px";
        popupIntegrantes.style.top = (e.clientY + 15) + "px";

    });

    card.addEventListener("mouseleave", () => {

        popupIntegrantes.style.display = "none";

    });

});
    });

    // =========================
    // CREAR AULA
    // =========================
    btnRegistrar.onclick = async () => {

        const nombre = txtNombre.value.trim();
        if (!nombre) return;

        await addDoc(collection(db, "aulas"), {
            nombre_aula: nombre,
            entidad: datosUsuario.entidad,
            academiaId: user.uid,
            fechaCreacion: serverTimestamp()
        });

        txtNombre.value = "";
    };

    // =========================
    // EVENTOS GLOBALES
    // =========================
    document.addEventListener("click", async (e) => {

        if (e.target.classList.contains("btnEditar")) {

            const id = e.target.dataset.id;
            const actual = e.target.dataset.nombre;

            const nuevo = prompt("Nuevo nombre:", actual);
            if (!nuevo) return;

            await updateDoc(doc(db, "aulas", id), {
                nombre_aula: nuevo.trim()
            });
        }

        if (e.target.classList.contains("btnBorrar")) {

            const id = e.target.dataset.id;

            if (!confirm("¿Eliminar aula?")) return;

            await deleteDoc(doc(db, "aulas", id));
        }

        if (e.target.classList.contains("btnCursos")) {
            abrirSelectorCursos(e.target.dataset.id, user.uid);
        }

        if (e.target.classList.contains("btnAlumnos")) {
        abrirSelectorAlumnos(
        e.target.dataset.id,
        datosUsuario.entidad
    );
}
    });

});

// =========================
// MODAL CURSOS
// =========================
async function abrirSelectorCursos(aulaId, userId) {

    const overlay = document.createElement("div");

    overlay.style.position = "fixed";
    overlay.style.top = 0;
    overlay.style.left = 0;
    overlay.style.width = "100%";
    overlay.style.height = "100%";
    overlay.style.background = "rgba(0,0,0,0.7)";
    overlay.style.display = "flex";
    overlay.style.alignItems = "center";
    overlay.style.justifyContent = "center";
    overlay.style.zIndex = 9999;

    const cursosSnap = await getDocs(
        query(
            collection(db, "cursos"),
            where("academiaId", "==", userId)
        )
    );

    let html = `
        <div style="background:#111; padding:20px; border-radius:10px; color:white;">
            <h4>Asignar curso</h4>

            <select
                    id="selectCurso"
                    class="form-control mb-3"
                    style="
                        background:#0b2a52;
                        color:white;
                        border:1px solid #3d6fb6;
                    ">
    `;

                    cursosSnap.forEach(c => {
                    html += `
                        <option
                            value="${c.id}"
                            style="
                                background:#0b2a52;
                                color:white;
                            ">
                            ${c.data().nombre_curso}
                        </option>
                    `;
                });

    html += `
            </select>

            <button id="asignar" class="btn btn-success w-100">Asignar</button>
            <button id="cerrar" class="btn btn-danger w-100 mt-2">Cerrar</button>
        </div>
    `;

    overlay.innerHTML = html;
    document.body.appendChild(overlay);

    document.getElementById("cerrar").onclick = () => overlay.remove();

    document.getElementById("asignar").onclick = async () => {

        const cursoId = document.getElementById("selectCurso").value;

        await updateDoc(doc(db, "aulas", aulaId), {
            cursoId
        });

        overlay.remove();
    };
} 

    // =========================
// MODAL ALUMNOS
// =========================
async function abrirSelectorAlumnos(aulaId, entidad) {

    const overlay = document.createElement("div");

    overlay.style.position = "fixed";
    overlay.style.left = "0";
    overlay.style.top = "0";
    overlay.style.width = "100%";
    overlay.style.height = "100%";
    overlay.style.background = "rgba(0,0,0,.75)";
    overlay.style.display = "flex";
    overlay.style.justifyContent = "center";
    overlay.style.alignItems = "center";
    overlay.style.zIndex = "99999";

    overlay.innerHTML = `
        <div style="
            width:900px;
            max-width:95%;
            max-height:90%;
            overflow:auto;
            background:#111;
            border-radius:16px;
            padding:25px;
            color:white;
        ">

            <h4 class="mb-4">
                Asignar alumnos al aula
            </h4>

            <div class="mb-3">

                <label class="mb-2">
                    Mostrar alumnos registrados desde:
                </label>

                <input
                    type="date"
                    id="fechaFiltro"
                    class="form-control">

            </div>

            <div id="listaAlumnos"></div>

            <div class="mt-4 d-flex justify-content-between">

    <button
        id="guardarAlumnos"
        class="btn btn-success">

        Guardar alumnos

    </button>

    <button
        id="cerrarAlumnos"
        class="btn btn-danger">

        Cerrar

    </button>

</div>

        </div>
    `;

    document.body.appendChild(overlay);

document.getElementById("fechaFiltro").value = "";

document.getElementById("cerrarAlumnos").onclick = () => {
    overlay.remove();
};

document
    .getElementById("guardarAlumnos")
    .onclick = guardarAlumnos;
    
    async function cargarAlumnos() {

    const lista = document.getElementById("listaAlumnos");

    const fechaSeleccionada =
        document.getElementById("fechaFiltro").value;

    if (!fechaSeleccionada) {

        lista.innerHTML = `
            <div
                class="text-center py-4"
                style="color:rgba(255,255,255,.6);">

                Seleccione una fecha para mostrar los alumnos.

            </div>
        `;

        return;
    }

    lista.innerHTML = "Cargando...";

    const fechaMinima = Timestamp.fromDate(
        new Date(fechaSeleccionada + "T00:00:00")
    );

    const q = query(
        collection(db, "usuarios"),
        where("entidad", "==", entidad),
        where("perfil", "==", "Estudiante Academia")
    );

    const snap = await getDocs(q);

    lista.innerHTML = "";

    snap.forEach(docSnap => {

        const d = docSnap.data();

        if (fechaSeleccionada && d.fechaRegistro) {

    const fechaAlumno = new Date(d.fechaRegistro);
    const fechaFiltro = new Date(fechaSeleccionada + "T00:00:00");

    if (fechaAlumno < fechaFiltro) {
        return;
    }

}

        lista.innerHTML += `
            <div class="d-flex justify-content-between align-items-center border-bottom py-2">

                <div>

                    <strong style="color:white;">
                        ${d.nombreResponsable}
                    </strong>

                    <br>

                    <small style="opacity:.7;">
                        ${d.email}
                    </small>

                </div>

                <input
                    type="checkbox"
                    value="${docSnap.id}">

            </div>
        `;

    });

}

    cargarAlumnos();
    
document
    .getElementById("fechaFiltro")
    .addEventListener("change", cargarAlumnos);

    async function guardarAlumnos() {

    const checks = document.querySelectorAll(
        '#listaAlumnos input[type="checkbox"]:checked'
    );

    if (checks.length === 0) {

        alert("Seleccione al menos un alumno.");

        return;

    }

    const batch = writeBatch(db);

    for (const check of checks) {

        const usuarioId = check.value;

        const usuarioSnap = await getDoc(
            doc(db, "usuarios", usuarioId)
        );

        if (!usuarioSnap.exists()) continue;

        const alumno = usuarioSnap.data();

        const ref = doc(
            db,
            "aula_integrantes",
            aulaId + "_" + usuarioId
        );

        batch.set(ref, {

            aulaId,

            usuarioId,

            perfil: alumno.perfil,

            entidad: alumno.entidad,

            nombreResponsable: alumno.nombreResponsable,

            email: alumno.email,

            fechaAsignacion: serverTimestamp()

        });

    }

    await batch.commit();

    alert("Alumnos asignados correctamente.");

    overlay.remove();

}
    
}
    
</script>

</body>
</html>
