<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Docente - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --azul-profundo: #06090f; --verde-seleccion: #28a745; }
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; 
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0; 
        }
        .card-form { 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(20px); max-width: 950px; margin: auto; padding: 40px; 
        }
        .form-label { color: var(--dorado-ucmi); font-weight: bold; margin-top: 15px; display: block; }
        .form-control { background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; border-radius: 12px; padding: 12px; }
        
        /* Grilla Horaria Ocupando el 100% */
        .grid-container { width: 100%; margin-top: 15px; }
        .grid-horaria { 
            display: grid; 
            grid-template-columns: 60px repeat(7, 1fr); /* 60px para horas, el resto reparte el espacio equitativo */
            gap: 3px; 
        }
        .cell { 
            background: rgba(255,255,255,0.1); height: 25px; cursor: pointer; border-radius: 4px; transition: 0.2s;
        }
        .cell:hover { background: rgba(255,255,255,0.25); }
        .cell.active { background: var(--verde-seleccion) !important; }
        .header-cell { 
            font-weight: bold; padding: 5px; text-align: center; font-size: 0.7rem; color: var(--dorado-ucmi); 
            display: flex; align-items: center; justify-content: center;
        }
        
        .btn-enviar { 
            background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; 
            font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card-form">
        <h2 class="text-center" style="color: var(--dorado-ucmi); font-family: 'Cinzel'; margin-bottom: 30px;">POSTULACIÓN DOCENTE</h2>
        <form id="formDocente">
            <div class="row">
                <div class="col-md-6"><label class="form-label">Nombre Completo</label><input type="text" id="nombreResponsable" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">DNI</label><input type="text" id="dniDocente" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">WhatsApp</label><input type="text" id="whatsapp" class="form-control" required></div>
                <div class="col-12"><label class="form-label">Ubicación</label><input type="text" id="ubicacion" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Título Universitario</label><input type="text" id="titulo_universitario" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Institución de Egreso</label><input type="text" id="institucion_titulo" class="form-control" required></div>
            </div>

            <label class="form-label">Enlace a Síntesis Curricular (Drive/PDF)</label>
            <input type="url" id="enlace_sintesis" class="form-control" required>
            <div class="row">
                <div class="col-md-6"><label class="form-label">Años de experiencia</label><input type="number" id="anos_experiencia_docente" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Niveles que puede atender</label><input type="text" id="niveles_atencion" class="form-control" placeholder="Ej: Primaria, Bachillerato" required></div>
            </div>

            <label class="form-label">Disponibilidad Horaria (Selecciona los bloques):</label>
            <div class="grid-container">
                <div class="grid-horaria" id="gridHoraria">
                    <div></div><div class="header-cell">Lun</div><div class="header-cell">Mar</div><div class="header-cell">Mie</div>
                    <div class="header-cell">Jue</div><div class="header-cell">Vie</div><div class="header-cell">Sab</div><div class="header-cell">Dom</div>
                </div>
            </div>

            <label class="form-label">¿Por qué quiere formar parte de nuestra institución?</label>
            <textarea id="razon_deseo_pertenencia" class="form-control" rows="3" required></textarea>

            <button type="submit" class="btn btn-enviar">ENVIAR POSTULACIÓN</button>
        </form>
    </div>
</div>

<script>
    const grid = document.getElementById('gridHoraria');
    for (let h = 0; h < 24; h++) {
        const horaLabel = `${h}:00`;
        grid.innerHTML += `<div class="header-cell">${horaLabel}</div>`;
        for (let d = 0; d < 7; d++) {
            grid.innerHTML += `<div class="cell" onclick="this.classList.toggle('active')" data-hora="${horaLabel}" data-dia="${d}"></div>`;
        }
    }

    document.getElementById('formDocente').onsubmit = (e) => {
        e.preventDefault();
        const seleccionados = Array.from(document.querySelectorAll('.cell.active')).map(el => ({hora: el.dataset.hora, dia: el.dataset.dia}));
        
        if(seleccionados.length === 0) {
            Swal.fire("Atención", "Por favor, selecciona al menos un bloque horario.", "warning");
            return;
        }
        
        Swal.fire("¡Éxito!", "Postulación enviada correctamente.", "success");
    };
</script>
</body>
</html>
