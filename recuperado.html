<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Papelera de Reciclaje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --dorado-neon: #ffcc66;
            --azul-neon: #00f2ff;
            --dorado-ucmi: #c5a059;
            --cian-tech: #00f2ff;
            --rojo-neon: #ff3131;
            --blanco-neon: #ffffff;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.95) 100%);
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            background: rgba(26, 42, 58, 0.95); 
            backdrop-filter: blur(10px);
            min-height: 100vh; 
            padding: 25px 15px; 
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
        }

        .nav-section-title {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            padding-left: 10px;
        }

        .nav-link-custom {
            display: flex; align-items: center; width: 100%;
            background: transparent; border: none; padding: 12px 15px;
            color: rgba(255, 255, 255, 0.6); text-align: left;
            border-radius: 12px; font-size: 0.85rem;
            transition: all 0.3s ease; margin-bottom: 5px; cursor: pointer;
            text-decoration: none;
        }

        .nav-link-custom i { font-size: 1.1rem; margin-right: 12px; width: 20px; text-align: center; }
        .nav-link-custom:hover { background: rgba(255, 255, 255, 0.05); color: var(--cian-tech); transform: translateX(5px); }
        .nav-link-custom.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); border: 1px solid rgba(197, 160, 89, 0.2); }

        /* --- BOTONES SISTEMA --- */
        .btn-super-admin {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--blanco-neon);
            color: var(--blanco-neon); padding: 12px; border-radius: 12px; width: 100%;
            text-align: center; font-weight: bold; text-transform: uppercase;
            font-size: 0.75rem; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2); margin-bottom: 10px;
        }

        .btn-super-admin:hover { background: var(--blanco-neon); color: black; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }

        .btn-logout {
            background: rgba(255, 49, 49, 0.05); border: 1px solid var(--rojo-neon);
            color: var(--rojo-neon); padding: 10px; border-radius: 12px; width: 100%;
            text-align: center; font-weight: bold; text-transform: uppercase;
            font-size: 0.75rem; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 49, 49, 0.2);
        }

        .btn-logout:hover { background: var(--rojo-neon); color: white; box-shadow: 0 0 20px rgba(255, 49, 49, 0.8); }

        /* --- CONTENIDO --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 30px;
        }

        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        #trash-table-body tr { background: rgba(255, 255, 255, 0.03); border-radius: 15px; }
        .neon-gold { color: var(--dorado-neon); font-weight: bold; }

        .btn-restore {
            background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.3);
            color: var(--azul-neon); border-radius: 10px; padding: 8px 15px; transition: 0.3s;
        }

        .btn-restore:hover { background: var(--azul-neon); color: #000; transform: scale(1.05); }

    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR INTEGRADO -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" style="height: 50px;" alt="Logo">
                    <p class="small mt-2 neon-gold">SISTEMA UCMI</p>
                </div>
                
                <nav class="nav flex-column mb-auto">
                    <p class="nav-section-title">Protocolos</p>
                    <a href="master-postulaciones.html" class="nav-link-custom">
                        <i class="bi bi-person-badge"></i> Solicitudes
                    </a>
                    <a href="master-vigencia.html" class="nav-link-custom">
                        <i class="bi bi-clock-history"></i> Vigencia
                    </a>
                    <a href="master-usuarios.html" class="nav-link-custom">
                        <i class="bi bi-people"></i> Usuarios
                    </a>
                    <a href="historial-postulaciones.html" class="nav-link-custom">
                        <i class="bi bi-archive"></i> Historial
                    </a>
                    <a href="directorio.html" class="nav-link-custom">
                        <i class="bi bi-journal-text"></i> Directorio
                    </a>
                    <a href="ofertas-academicas.html" class="nav-link-custom">
                        <i class="bi bi-mortarboard"></i> Ofertas
                    </a>
                    <a href="master-repositorio.html" class="nav-link-custom">
                        <i class="bi bi-grid-1x2"></i> Módulos
                    </a>
                    <a href="papelera.html" class="nav-link-custom active">
                        <i class="bi bi-trash3"></i> Papelera
                    </a>
                </nav>

                <div class="mt-4">
                    <p class="nav-section-title">Sistema</p>
                    <button onclick="location.href='super-admin.html'" class="btn-super-admin">
                        <i class="bi bi-shield-lock me-2"></i> Panel Maestro
                    </button>
                    <button id="btnCerrarSesion" class="btn-logout">
                        <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                    </button>
                </div>
            </div>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="col-md-10 p-5">
                <div class="mb-5">
                    <h2 class="neon-gold text-uppercase mb-1"><i class="bi bi-trash3 me-2"></i>Papelera de Reciclaje</h2>
                    <p class="text-white-50 small">Los usuarios aquí listados serán eliminados permanentemente tras 30 días.</p>
                </div>

                <div class="glass-panel">
                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr class="text-white-50 small text-uppercase">
                                    <th class="pb-3 ps-4">Usuario / Entidad</th>
                                    <th class="pb-3">Fecha de Eliminación</th>
                                    <th class="pb-3">Días Restantes</th>
                                    <th class="pb-3 text-end pe-4">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="trash-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, deleteField } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const trashBody = document.getElementById('trash-table-body');

    // --- Cierre de Sesión ---
    document.getElementById('btnCerrarSesion').addEventListener('click', () => {
        Swal.fire({
            title: '¿Cerrar sesión?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff3131',
            confirmButtonText: 'Sí, Salir',
            background: '#1a2a3a',
            color: '#fff'
        }).then((result) => {
            if (result.isConfirmed) {
                signOut(auth).then(() => { window.location.href = 'index.html'; });
            }
        });
    });

    // --- Carga de Papelera ---
    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        trashBody.innerHTML = '';
        const ahora = new Date().getTime();

        snapshot.forEach(async (docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;

            if (data.status === "eliminado") {
                const fechaElim = data.fechaEliminacion ? data.fechaEliminacion.toDate() : new Date();
                const diffTiempo = ahora - fechaElim.getTime();
                const diffDias = Math.floor(diffTiempo / (1000 * 60 * 60 * 24));
                const diasRestantes = 30 - diffDias;

                if (diasRestantes <= 0) {
                    await deleteDoc(doc(db, "usuarios", id));
                    return; 
                }

                trashBody.innerHTML += `
                    <tr>
                        <td class="py-4 ps-4">
                            <span class="neon-gold d-block">${data.nombreResponsable || data.entidad}</span>
                            <span class="text-white-50 small">${data.email || 'Sin email'}</span>
                        </td>
                        <td>${fechaElim.toLocaleDateString()}</td>
                        <td>
                            <span class="badge ${diasRestantes < 5 ? 'bg-danger' : 'bg-secondary'}">
                                ${diasRestantes} días
                            </span>
                        </td>
                        <td class="text-end pe-4">
                            <button onclick="restituirUsuario('${id}', '${data.nombreResponsable || data.entidad}')" class="btn btn-restore">
                                <i class="bi bi-arrow-counterclockwise me-1"></i> RESTITUIR
                            </button>
                        </td>
                    </tr>`;
            }
        });
    });

    window.restituirUsuario = async (id, nombre) => {
        const result = await Swal.fire({
            title: '¿RESTITUIR USUARIO?',
            text: `El usuario "${nombre}" volverá a estar activo.`,
            icon: 'question',
            showCancelButton: true,
            background: '#0a0e14',
            color: '#fff',
            confirmButtonColor: '#00f2ff',
            confirmButtonText: 'Sí, restituir'
        });

        if (result.isConfirmed) {
            await updateDoc(doc(db, "usuarios", id), {
                status: deleteField(),
                fechaEliminacion: deleteField()
            });
            Swal.fire({ title: 'Usuario restituido', icon: 'success', background: '#0a0e14', color: '#fff' });
        }
    };
</script>
</body>
</html>
