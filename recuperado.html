<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editor de Contenido</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#06090f;
    color:white;
    padding:40px;
}

/* CRISTAL */
.panel{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 20px;
}

/* editor */
textarea{
    width:100%;
    height:300px;
    background:#0f172a;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
}
button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#c5a059;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="panel">

    <h2>Editor de Contenido</h2>

    <h4 id="titulo">Cargando tópico...</h4>

    <textarea id="editor" placeholder="Escribe HTML aquí..."></textarea>

    <button id="btnGuardar">Guardar contenido</button>

    <h3 style="margin-top:20px;">Vista previa</h3>

<div id="preview" class="panel"></div>

</div>

<script type="module">

import { db } from "./firebase-config.js";
import {
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs,
    addDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const topicoId = params.get("topicoId");
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");

// actualizar en vivo
editor.addEventListener("input", () => {
    preview.innerHTML = editor.value;
});    

let contenidoId = null;

// 1. cargar tópico
async function cargarTopico(){

    const snap = await getDoc(doc(db, "topicos", topicoId));

    if(snap.exists()){
        document.getElementById("titulo").innerText = snap.data().tema;
    }
}

// 2. cargar contenido si existe
async function cargarContenido(){

    const q = query(
        collection(db, "contenidos"),
        where("topicoId", "==", topicoId)
    );

    const snap = await getDocs(q);

    if(!snap.empty){
        const data = snap.docs[0];

        contenidoId = data.id;

        document.getElementById("editor").value = data.data().html || "";
        preview.innerHTML = data.data().html || "";
    }
}

// 3. guardar contenido
async function guardar(){

    const html = document.getElementById("editor").value;

    if(contenidoId){
        // actualizar
        await updateDoc(doc(db, "contenidos", contenidoId), {
            html
        });
    } else {
        // crear nuevo
        await addDoc(collection(db, "contenidos"), {
            topicoId,
            html,
            creado: new Date()
        });
    }

    alert("Contenido guardado");
}

// eventos
document.getElementById("btnGuardar").addEventListener("click", guardar);

cargarTopico();
cargarContenido();

</script>

</body>
</html>
