<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Academia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --purpura-neon: #bc13fe;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            min-height: 100vh;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.9) 100%);
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar-master {
            background: rgba(6, 9, 15, 0.85);
            border-bottom: 1px solid var(--dorado-ucmi);
            backdrop-filter: blur(10px);
            padding: 0.8rem 2rem;
        }

        .logo-nav { height: 50px; object-fit: contain; border-radius: 5px; }

        /* SIDEBAR */
        .offcanvas {
            background: rgba(6, 9, 15, 0.98) !important;
            border-right: 1px solid var(--dorado-ucmi);
            color: white;
        }

        .profile-img-container {
            width: 110px; height: 110px;
            margin: 20px auto;
            border-radius: 50%;
            border: 2px solid var(--dorado-ucmi);
            overflow: hidden;
            background: #000;
        }
        #logoPreview { width: 100%; height: 100%; object-fit: cover; }

        /* CARDS */
        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            transition: 0.3s;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
            height: 100%;
            display: block;
        }
        .admin-card:hover {
            background: rgba(197, 160, 89, 0.1);
            border-color: var(--dorado-ucmi);
            transform: translateY(-5px);
        }

        .icon-box {
            font-size: 2.5rem;
            color: var(--dorado-ucmi);
            margin-bottom: 15px;
        }

        .text-gold { color: var(--dorado-ucmi); text-shadow: 0 0 10px rgba(197, 160, 89, 0.3); }
    </style>
</head>
<body>

<div class="overlay">
    <!-- BARRA SUPERIOR -->
    <nav class="navbar navbar-master sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-warning me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                    <i class="bi bi-list"></i>
                </button>
                <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" id="navLogo" class="logo-nav">
            </div>
            <div class="text-end">
                <small class="d-block opacity-75">Panel de Gestión</small>
                <span id="navEntidad" class="fw-bold text-gold">Cargando...</span>
            </div>
        </div>
    </nav>

    <!-- MENÚ LATERAL -->
    <div class="offcanvas offcanvas-start" id="sidebarMenu">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title text-warning">CONFIGURACIÓN</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div class="text-center mb-4">
                <div class="profile-img-container">
                    <img id="logoPreview" src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png">
                </div>
                <h5 id="sideNombreEntidad" class="fw-bold">Cargando...</h5>
                <p class="small text-secondary">Sede Oficial</p>
            </div>

            <div class="bg-dark p-3 rounded-4 border border-secondary mb-4">
                <label class="form-label small fw-bold">CAMBIAR LOGO</label>
                <input type="file" id="inputLogo" class="form-control form-control-sm bg-dark text-white border-secondary mb-2" accept="image/*">
                <button id="btnSaveLogo" class="btn btn-warning btn-sm w-100 fw-bold">GUARDAR LOGO</button>
            </div>

            <button id="btnLogout" class="btn btn-outline-danger mt-auto rounded-pill">Cerrar Sesión</button>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="container py-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="admin-card" onclick="abrirFormulario()">
                    <div class="icon-box"><i class="bi bi-person-plus"></i></div>
                    <h4>Captación</h4>
                    <p class="small opacity-75">Link de registro para prospectos.</p>
                    <button class="btn btn-sm btn-outline-info w-100 mt-2" onclick="event.stopPropagation(); copiarLink();">Copiar Enlace</button>
                </div>
            </div>
            <div class="col-md-4">
                <a href="lista-alumnos.html" class="admin-card">
                    <div class="icon-box"><i class="bi bi-people"></i></div>
                    <h4>Alumnos</h4>
                    <p class="small opacity-75">Gestión de la base de datos local.</p>
                </a>
            </div>
            <div class="col-md-4">
                <div class="admin-card">
                    <div class="icon-box"><i class="bi bi-wallet2"></i></div>
                    <h4>Cobranza</h4>
                    <p class="small opacity-75">Control de mensualidades y pagos.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let entidadActual = "";

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "index.html"; return; }

        // BUSCAR DIRECTAMENTE EN LA COLECCIÓN "usuarios"
        const userRef = doc(db, "usuarios", user.email);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
            const data = userSnap.data();
            
            // Sincronizar nombre de la Entidad
            entidadActual = data.entidad || "Sede sin nombre";
            document.getElementById('navEntidad').innerText = entidadActual;
            document.getElementById('sideNombreEntidad').innerText = entidadActual;

            // Sincronizar Logo
            if (data.logoCustom) {
                document.getElementById('navLogo').src = data.logoCustom;
                document.getElementById('logoPreview').src = data.logoCustom;
            }
        } else {
            document.getElementById('navEntidad').innerText = "Perfil no encontrado";
        }
    });

    // Guardar nuevo logo
    document.getElementById('btnSaveLogo').addEventListener('click', async () => {
        const file = document.getElementById('inputLogo').files[0];
        if (!file) return alert("Selecciona una imagen");

        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64 = reader.result;
            const userRef = doc(db, "usuarios", auth.currentUser.email);
            
            try {
                await updateDoc(userRef, { logoCustom: base64 });
                document.getElementById('navLogo').src = base64;
                document.getElementById('logoPreview').src = base64;
                alert("Identidad visual actualizada.");
            } catch (e) { alert("Error al guardar."); }
        };
        reader.readAsDataURL(file);
    });

    window.copiarLink = () => {
        const url = `https://universitariodematematica-star.github.io/UCMI/formulario-postulacion.html?ref=${encodeURIComponent(entidadActual)}`;
        navigator.clipboard.writeText(url);
        alert("¡Link de captación copiado!");
    };

    window.abrirFormulario = () => {
        const url = `https://universitariodematematica-star.github.io/UCMI/formulario-postulacion.html?ref=${encodeURIComponent(entidadActual)}`;
        window.open(url, '_blank');
    };

    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>
</body>
</html>
