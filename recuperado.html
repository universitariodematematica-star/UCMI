<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Configuración de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --sidebar-width: 280px;
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            margin: 0;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%);
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0;
            left: calc(var(--sidebar-width) * -1);
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(6, 9, 15, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            transition: 0.4s ease;
            z-index: 2000;
            padding: 80px 20px;
        }

        .sidebar-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 100%;
            z-index: 1999;
        }

        .sidebar:hover, .sidebar-trigger:hover + .sidebar {
            left: 0;
        }

        .logo-preview-container {
            border: 2px dashed rgba(197, 160, 89, 0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
        }

        #imgPreview {
            max-width: 100%;
            max-height: 80px;
            display: none;
            margin-bottom: 10px;
        }

        .navbar-master {
            background: rgba(6, 9, 15, 0.8);
            border-bottom: 1px solid rgba(197, 160, 89, 0.5);
            backdrop-filter: blur(15px);
            padding: 0.8rem 2rem;
        }

        .logo-nav { height: 60px; }

        .btn-logout {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4d4d;
            border-radius: 50px;
            padding: 5px 15px;
        }
    </style>
</head>
<body>

<div class="sidebar-trigger"></div>

<div class="sidebar">
    <h5 style="color: var(--dorado-ucmi)" class="mb-4"><i class="bi bi-palette2 me-2"></i>Personalización</h5>
    
    <div class="mb-3">
        <label class="form-label small opacity-75">Subir Logo de Academia</label>
        <input type="file" id="logoInput" class="form-control form-control-sm bg-dark text-white border-secondary" accept="image/*">
    </div>

    <div class="logo-preview-container">
        <img id="imgPreview" src="#" alt="Vista previa">
        <div class="form-check form-switch d-flex justify-content-center align-items-center gap-2">
            <input class="form-check-input" type="checkbox" id="applyLogo">
            <label class="form-check-label small" for="applyLogo">Aplicar Identidad</label>
        </div>
    </div>
</div>

<div class="overlay">
    <nav class="navbar navbar-master">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <img id="mainLogo" src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo" class="logo-nav">
            <button id="btnLogout" class="btn btn-logout">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container py-5 text-center">
        <h1 class="display-4 fw-bold">Panel de Control</h1>
        <p style="color: var(--dorado-ucmi)">Configuración de Perfil de Usuario</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const logoInput = document.getElementById('logoInput');
    const imgPreview = document.getElementById('imgPreview');
    const applyLogo = document.getElementById('applyLogo');
    const mainLogo = document.getElementById('mainLogo');

    // 1. CARGA INICIAL DESDE LA COLECCIÓN 'USUARIOS'
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "index.html";
        } else {
            try {
                // Buscamos el documento que se llama igual que el email del usuario
                const userRef = doc(db, "usuarios", user.email);
                const userDoc = await getDoc(userRef);
                
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    if (data.logoCustom && data.aplicarLogo) {
                        mainLogo.src = data.logoCustom;
                        imgPreview.src = data.logoCustom;
                        imgPreview.style.display = "block";
                        applyLogo.checked = true;
                    }
                }
            } catch (error) { console.error("Error al cargar perfil:", error); }
        }
    });

    // 2. REDIMENSIÓN PROPORCIONAL Y GUARDADO EN 'USUARIOS'
    logoInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const MAX_DIM = 500;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_DIM) { height *= MAX_DIM / width; width = MAX_DIM; }
                    } else {
                        if (height > MAX_DIM) { width *= MAX_DIM / height; height = MAX_DIM; }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Formato WebP al 70% de calidad para ahorrar espacio en Firestore
                    const optimizedBase64 = canvas.toDataURL('image/webp', 0.7);

                    const user = auth.currentUser;
                    if (user) {
                        try {
                            // Usamos setDoc con merge:true para que cree el usuario si no existe
                            await setDoc(doc(db, "usuarios", user.email), {
                                logoCustom: optimizedBase64,
                                aplicarLogo: true,
                                email: user.email // Guardamos el email como referencia interna
                            }, { merge: true });

                            alert("Imagen de perfil actualizada correctamente.");
                            location.reload();
                        } catch (err) {
                            console.error("Error al guardar:", err);
                            alert("No se pudo guardar la imagen. Revisa los permisos de la colección 'usuarios'.");
                        }
                    }
                };
            };
            reader.readAsDataURL(file);
        }
    });

    // 3. ACTIVAR/DESACTIVAR IDENTIDAD
    applyLogo.addEventListener('change', async () => {
        const user = auth.currentUser;
        if (user) {
            try {
                await updateDoc(doc(db, "usuarios", user.email), { 
                    aplicarLogo: applyLogo.checked 
                });
                location.reload();
            } catch (err) { console.error(err); }
        }
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>
</body>
</html>
