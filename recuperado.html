    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px; 
        }

.asignatura-card{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:15px 18px;
    margin-bottom:12px;

    border-radius:14px;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(10px);
}

.asignatura-info h5{
    margin:0;
}

.btn-asig{
    width:40px;
    height:40px;

    border-radius:50%;

    border:none;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:.2s;
}

.btn-add{
    background:#198754;
    color:white;
}

.btn-remove{
    background:#dc3545;
    color:white;
}

.btn-asig:hover{
    transform:scale(1.08);
}
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="alumnos-academia.html" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>
            <a href="modificaciones.html" class="nav-item-ucmi"><i class="bi bi-pencil-square"></i></i> MODIFICACIONES</a>
            <a href="cursos.html" class="nav-item-ucmi"><i class="bi bi-journal-bookmark"></i> CURSOS</a>
            <a href="aulas.html" class="nav-item-ucmi"><i class="bi bi-easel"></i> AULAS</a>
            <a href="academia-modulos.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="contenidos-academia.html" class="nav-item-ucmi"><i class="bi bi-collection"></i> CONTENIDO</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">

<div class="container-fluid">

    <!-- TITULO -->
    <div class="text-center mb-4">
        <h1 class="fw-bold">ASIGNATURAS DEL CURSO</h1>
        <p class="text-light opacity-75">
            Gestiona las asignaturas asignadas a este curso
        </p>
    </div>

    <!-- ASIGNATURAS DISPONIBLES -->
    <div class="mb-5">

        <h4 class="text-warning mb-3">Disponibles</h4>

        <div id="listaDisponibles"></div>

    </div>

    <!-- ASIGNATURAS DEL CURSO -->
    <div>

        <h4 class="text-success mb-3">Asignadas al curso</h4>

        <div id="listaCurso"></div>

    </div>

</div>

</main>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    onSnapshot,
    addDoc,
    deleteDoc,
    serverTimestamp,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// ================= FIREBASE =================
const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
});

const db = getFirestore(app);
const auth = getAuth();

// ================= STATE =================
let usuarioActual = null;
let entidadGlobal = null;
let asignadasSet = new Set();

const params = new URLSearchParams(window.location.search);
const cursoId = params.get("curso");

// ================= AUTH =================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    usuarioActual = user;

    const userSnap = await getDoc(doc(db, "usuarios", user.uid));
    if (!userSnap.exists()) return;

    const d = userSnap.data();
    entidadGlobal = d.entidad;

    const logo = document.getElementById("logoAcademia");
    logo.src = d.logoCustom || "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";
    logo.style.opacity = "1";

    if (entidadGlobal && cursoId) {
        initListeners();
    }
});

// ================= LOGOUT =================
document.getElementById("btnLogout")
.addEventListener("click", () =>
    signOut(auth).then(() =>
        window.location.href = "index.html"
    )
);

// ================= LISTENERS SEGUROS =================
function initListeners() {

    listenAsignadas();
    listenDisponibles();
}

// ================= ASIGNADAS =================
function listenAsignadas() {

    const cont = document.getElementById("listaCurso");

    const q = query(
        collection(db, "curso_asignaturas"),
        where("cursoId", "==", cursoId)
    );

    onSnapshot(q,
        (snap) => {

            cont.innerHTML = "";
            asignadasSet.clear();

            snap.forEach(d => {

                const data = d.data();
                asignadasSet.add(data.asignaturaId);

                cont.innerHTML += `
                <div class="asignatura-card">

                    <div class="asignatura-info">
                        <h5>${data.asignatura}</h5>
                        <small>${data.modulo || ""}</small>
                    </div>

                    <button class="btn-asig btn-remove"
                        onclick="quitar('${d.id}')">
                        <i class="bi bi-dash"></i>
                    </button>

                </div>`;
            });
        },
        (err) => {
            console.error("❌ curso_asignaturas error:", err.message);
        }
    );
}

// ================= DISPONIBLES =================
function listenDisponibles() {

    const cont = document.getElementById("listaDisponibles");

    const q = query(
        collection(db, "asignaturas"),
        where("entidad", "==", entidadGlobal)
    );

    onSnapshot(q,
        (snap) => {

            cont.innerHTML = "";

            let lista = [];

            snap.forEach(d => {
                lista.push({ id: d.id, ...d.data() });
            });

            lista.sort((a, b) =>
                a.asignatura.localeCompare(b.asignatura, "es")
            );

            lista.forEach(a => {

                if (asignadasSet.has(a.id)) return;

                cont.innerHTML += `
                <div class="asignatura-card">

                    <div class="asignatura-info">
                        <h5>${a.asignatura}</h5>
                    </div>

                    <button class="btn-asig btn-add"
                        onclick="agregar('${a.id}')">
                        <i class="bi bi-plus"></i>
                    </button>

                </div>`;
            });

        },
        (err) => {
            console.error("❌ asignaturas error:", err.message);
        }
    );
}

// ================= AGREGAR =================
window.agregar = async function (id) {

    const q = query(
        collection(db, "curso_asignaturas"),
        where("cursoId", "==", cursoId),
        where("asignaturaId", "==", id)
    );

    const snap = await getDocs(q);

    if (!snap.empty) return;

    const ref = doc(db, "asignaturas", id);
    const dataSnap = await getDoc(ref);

    if (!dataSnap.exists()) return;

    const a = dataSnap.data();

    await addDoc(collection(db, "curso_asignaturas"), {
        cursoId,
        asignaturaId: id,
        asignatura: a.asignatura,
        modulo: a.modulo,
        entidad: a.entidad,
        academiaId: usuarioActual.uid,
        fechaCreacion: serverTimestamp()
    });
};

// ================= QUITAR =================
window.quitar = async function (id) {
    await deleteDoc(doc(db, "curso_asignaturas", id));
};
</script>

</body>
</html>
