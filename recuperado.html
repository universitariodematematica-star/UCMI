<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinta Transportadora de Imágenes Infinita</title>
    
    <style>
        /* --- ESTILOS GENERALES CON EL FONDO DEL INDEX --- */
        body {
            /* Fondo extraído del index */
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Mantiene el fondo estático al hacer scroll */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #c5a059;
            font-family: sans-serif;
            flex-direction: column;
        }

        /* Capa oscura sobre el fondo para que las imágenes resalten más */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 9, 15, 0.7); /* Oscurecimiento al 70% */
            z-index: -1;
        }

        h2 {
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* --- CINTA TRANSPORTADORA --- */
        .cinta-container {
            overflow: hidden;
            width: 100%;
            background: rgba(0, 0, 0, 0.2); 
            padding: 30px 0;
            white-space: nowrap;
            position: relative;
            border-top: 1px solid rgba(197, 160, 89, 0.3);
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
        }

        .cinta-track {
            display: flex;
            width: calc(360px * 12); 
            animation: moverCintaIzquierda 30s linear infinite;
        }

        .cinta-slide {
            width: 360px;
            height: 225px;
            padding: 0 15px;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .cinta-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid rgba(197, 160, 89, 0.5);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
        }

        .cinta-container:hover .cinta-track {
            animation-play-state: paused;
        }

        .cinta-slide img:hover {
            transform: scale(1.05);
            border-color: #00f2ff;
        }

        @keyframes moverCintaIzquierda {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-360px * 6)); }
        }
    </style>
</head>
<body>

    <h2>Cinta Transportadora UCMI</h2>

    <div class="cinta-container">
        <div class="cinta-track">
            <div class="cinta-slide"><img src="img1.png" alt="1"></div>
            <div class="cinta-slide"><img src="img2.png" alt="2"></div>
            <div class="cinta-slide"><img src="img3.png" alt="3"></div>
            <div class="cinta-slide"><img src="img4.png" alt="4"></div>
            <div class="cinta-slide"><img src="img5.png" alt="5"></div>
            <div class="cinta-slide"><img src="img6.png" alt="6"></div>
            
            <div class="cinta-slide"><img src="img1.png" alt="1"></div>
            <div class="cinta-slide"><img src="img2.png" alt="2"></div>
            <div class="cinta-slide"><img src="img3.png" alt="3"></div>
            <div class="cinta-slide"><img src="img4.png" alt="4"></div>
            <div class="cinta-slide"><img src="img5.png" alt="5"></div>
            <div class="cinta-slide"><img src="img6.png" alt="Imagen 6"></div>
        </div>
    </div>

</body>
</html>
