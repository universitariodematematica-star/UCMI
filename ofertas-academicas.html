<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ofertas Académicas - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --azul-ucmi: #1a2a3a; --dorado-ucmi: #c5a059; }
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .admin-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 20px; padding: 30px; margin-top: 50px; }
        .inst-titulo { color: var(--dorado-ucmi); font-weight: 800; border-bottom: 2px solid var(--dorado-ucmi); display: inline-block; margin-bottom: 20px; }
        .form-control { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white; border-radius: 10px; }
        .form-control:focus { background: rgba(255, 255, 255, 0.15); color: white; border-color: var(--dorado-ucmi); box-shadow: none; }
        .btn-crear { background: var(--dorado-ucmi); color: #000; font-weight: bold; border-radius: 10px; transition: 0.3s; }
        .btn-crear:hover { background: #e0b86d; transform: scale(1.02); }
        .table { color: white; margin-top: 30px; }
        .badge-ofertado { background-color: #10b981; color: white; }
        .badge-oculto { background-color: #ef4444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-card">
        <h2 class="inst-titulo">CREADOR DE OFERTAS ACADÉMICAS</h2>
        <p class="text-white-50">Gestiona los módulos que estarán disponibles para los estudiantes y academias.</p>

        <div class="row g-3 mt-2">
            <div class="col-md-8">
                <input type="text" id="nombreModulo" class="form-control p-3" placeholder="Nombre del nuevo módulo (Ej: Cálculo Diferencial)">
            </div>
            <div class="col-md-4">
                <button onclick="fn_CrearOferta()" class="btn btn-crear w-100 p-3">
                    <i class="bi bi-plus-circle me-2"></i>GUARDAR MÓDULO
                </button>
            </div>
        </div>

        <hr class="my-5" style="border-color: rgba(197, 160, 89, 0.3);">

        <h4 class="text-warning mb-3">Módulos en Sistema</h4>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr class="text-white-50">
                        <th>Nombre del Módulo</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaOfertas">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- FUNCIÓN PARA CREAR OFERTA ---
    window.fn_CrearOferta = async () => {
        const nombre = document.getElementById('nombreModulo').value.trim();
        if (!nombre) return Swal.fire("Campo vacío", "Escribe el nombre del módulo", "error");

        try {
            await addDoc(collection(db, "ofertas"), {
                modulo: nombre,
                ofertado: true,
                fechaCreacion: new Date()
            });
            document.getElementById('nombreModulo').value = "";
            Swal.fire("Éxito", "Módulo creado correctamente", "success");
        } catch (error) {
            Swal.fire("Error", "No se pudo guardar", "error");
        }
    };

    // --- CARGA DINÁMICA DE LA TABLA ---
    onSnapshot(query(collection(db, "ofertas"), orderBy("fechaCreacion", "desc")), (snap) => {
        const tbody = document.getElementById('tablaOfertas');
        tbody.innerHTML = "";

        snap.forEach(docSnap => {
            const data = docSnap.data();
            const id = docSnap.id;
            
            tbody.innerHTML += `
                <tr class="align-middle">
                    <td class="fw-bold">${data.modulo}</td>
                    <td>
                        <span class="badge ${data.ofertado ? 'badge-ofertado' : 'badge-oculto'}">
                            ${data.ofertado ? 'ACTIVO' : 'OCULTO'}
                        </span>
                    </td>
                    <td class="text-center">
                        <button onclick="fn_ToggleOferta('${id}', ${data.ofertado})" class="btn btn-sm btn-outline-info me-2">
                            <i class="bi bi-eye"></i> Alternar
                        </button>
                        <button onclick="fn_EliminarOferta('${id}')" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
    });

    // --- ACTUALIZAR ESTADO (VISIBILIDAD) ---
    window.fn_ToggleOferta = async (id, estadoActual) => {
        const docRef = doc(db, "ofertas", id);
        await updateDoc(docRef, { ofertado: !estadoActual });
    };

    // --- ELIMINAR MÓDULO ---
    window.fn_EliminarOferta = async (id) => {
        const confirm = await Swal.fire({
            title: "¿Eliminar módulo?",
            text: "Esta acción no se puede deshacer.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#ef4444",
            confirmButtonText: "Sí, borrar"
        });

        if (confirm.isConfirmed) {
            await deleteDoc(doc(db, "ofertas", id));
            Swal.fire("Borrado", "El módulo ha sido eliminado.", "success");
        }
    };
</script>

</body>
</html>
