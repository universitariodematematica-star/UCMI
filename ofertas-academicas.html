<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ofertas Académicas - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --fondo-oscuro: #06090f;
            --tarjeta-bg: rgba(255, 255, 255, 0.05);
            --dorado-ucmi: #c5a059;
            --neon-oferta: #00ff7f; /* Verde neón para este módulo */
        }

        body {
            background: radial-gradient(circle at top, #1a2a3a 0%, var(--fondo-oscuro) 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .admin-card {
            background: var(--tarjeta-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 127, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 127, 0.3);
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--neon-oferta);
            color: white;
            box-shadow: 0 0 15px rgba(0, 255, 127, 0.3);
        }

        .btn-add {
            background: var(--neon-oferta);
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            padding: 12px 25px;
            transition: 0.3s;
        }

        .btn-add:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--neon-oferta);
        }

        .oferta-item {
            background: rgba(0,0,0,0.3);
            border-left: 4px solid var(--neon-oferta);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .text-glow-green {
            color: var(--neon-oferta);
            text-shadow: 0 0 10px rgba(0, 255, 127, 0.5);
        }

        .btn-delete {
            color: #ff4d4d;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .btn-delete:hover {
            transform: scale(1.2);
            text-shadow: 0 0 10px #ff4d4d;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="text-center mb-5">
                <a href="master.html" class="btn btn-outline-light btn-sm mb-3"><i class="bi bi-arrow-left"></i> Volver al Panel</a>
                <h1 class="display-5 fw-bold text-glow-green">Ofertas Académicas</h1>
                <p class="text-white-50">Gestiona los programas disponibles en el formulario de postulación.</p>
            </div>

            <div class="admin-card mb-5">
                <h4 class="mb-4"><i class="bi bi-plus-circle me-2"></i>Añadir Nuevo Programa</h4>
                <div class="input-group">
                    <input type="text" id="nombrePrograma" class="form-control" placeholder="Ej: Especialización en Supralógica">
                    <button class="btn btn-add" id="btnAdd">AÑADIR AL SISTEMA</button>
                </div>
            </div>

            <div class="admin-card">
                <h4 class="mb-4"><i class="bi bi-list-stars me-2"></i>Programas Activos</h4>
                <div id="listaOfertas">
                    <div class="text-center py-4">
                        <div class="spinner-border text-success" role="status"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "ofertas");

    // --- ESCUCHAR CAMBIOS EN TIEMPO REAL ---
    const q = query(colRef, orderBy("nombre", "asc"));
    onSnapshot(q, (snapshot) => {
        const listaDiv = document.getElementById('listaOfertas');
        listaDiv.innerHTML = "";
        
        if(snapshot.empty) {
            listaDiv.innerHTML = "<p class='text-center text-white-50'>No hay programas registrados.</p>";
            return;
        }

        snapshot.forEach((docSnap) => {
            const programa = docSnap.data();
            listaDiv.innerHTML += `
                <div class="oferta-item">
                    <span class="fw-bold">${programa.nombre}</span>
                    <i class="bi bi-trash-fill btn-delete" onclick="eliminarOferta('${docSnap.id}')"></i>
                </div>
            `;
        });
    });

    // --- AÑADIR PROGRAMA ---
    document.getElementById('btnAdd').addEventListener('click', async () => {
        const input = document.getElementById('nombrePrograma');
        const nombre = input.value.trim();

        if (nombre === "") return;

        try {
            await addDoc(colRef, { nombre: nombre });
            input.value = "";
        } catch (error) {
            alert("Error al guardar: " + error.message);
        }
    });

    // --- ELIMINAR PROGRAMA (Función Global para el onclick) ---
    window.eliminarOferta = async (id) => {
        if(confirm("¿Estás seguro de eliminar este programa? Ya no aparecerá en las postulaciones.")) {
            await deleteDoc(doc(db, "ofertas", id));
        }
    };
</script>

</body>
</html>
