        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }

        .table-container {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.1);
}

        .table-modificaciones {
    color: white;
}

.table-modificaciones th {
    color: var(--dorado-ucmi);
    border-color: rgba(255,255,255,0.1);
}

.table-modificaciones td {
    color: white;
    border-color: rgba(255,255,255,0.08);
}

.modal-content {
    background: rgba(6,9,15,.97);
    backdrop-filter: blur(20px);
    color: white;
    border: 1px solid rgba(255,255,255,.15);
}

.form-control,
.form-select {
    background: rgba(255,255,255,.05);
    color: white;
    border: 1px solid rgba(255,255,255,.2);
}

.form-control:focus,
.form-select:focus {
    background: rgba(255,255,255,.08);
    color: white;
}

#filtroUsuarios {
    background: #1a2a3a !important;
    color: white !important;
}

#filtroUsuarios option {
    background: #1a2a3a !important;
    color: white !important;
}        

        .sidebar {
    height: 100vh;
}

.table-responsive {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(30px) saturate(150%);
    -webkit-backdrop-filter: blur(30px) saturate(150%);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    padding: 10px;
}    

        .table-modificaciones {
    color: white;
    background: rgba(255, 255, 255, 0.04) !important;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 18px;
    overflow: hidden;
}

        .table-modificaciones th,
.table-modificaciones td {
    background: rgba(255, 255, 255, 0.05) !important;
}

        .table-modificaciones tbody tr:hover td {
    background: rgba(255,255,255,0.10) !important;
}
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">

        </div>
        <nav class="sidebar-nav">

            <a href="alumnos-academia.html" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>

    <main class="flex-grow-1 p-4">

    <h2 class="mb-4">
        <i class="bi bi-pencil-square"></i>
        Modificaciones de Usuarios
    </h2>

    <div class="table-container">

        <div class="row mb-4">
            <div class="col-md-4">

                <label class="mb-2">
                    Filtrar por:
                </label>

                <select
                    id="filtroUsuarios"
                    class="form-select">

                    <option value="todos">
                        Todos
                    </option>

                    <option value="estudiante">
                        Alumnos
                    </option>

                    <option value="docente">
                        Docentes
                    </option>

                </select>

            </div>
        </div>

        <div class="table-responsive">

            <table
                class="table table-modificaciones">

                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Perfil</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody id="tablaUsuarios">
                </tbody>

            </table>

        </div>

    </div>

</main>

   
</div>

<div
    class="modal fade"
    id="modalEditar"
    tabindex="-1">

    <div class="modal-dialog modal-xl">

        <div class="modal-content">

            <div class="modal-header">
                <h5>
                    Modificar Usuario
                </h5>

                <button
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>
            </div>

            <div
                class="modal-body">

                <div
                    id="contenedorCampos"
                    class="row">
                </div>

            </div>

            <div class="modal-footer">

                <button
                    id="btnGuardarCambios"
                    class="btn btn-warning">

                    Guardar Cambios

                </button>

            </div>

        </div>

    </div>

</div>    

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    collection,
    doc,
    getDoc,
    updateDoc,
    getDocs,
    query,
    where,
    setDoc,
    deleteDoc,
    addDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut,
    createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* Secondary auth */
const secondaryApp = initializeApp(firebaseConfig, "Secondary");
const secondaryAuth = getAuth(secondaryApp);

/* ================= STATE ================= */

let usuarios = [];
let usuarioActual = null;
let emailAnterior = "";
let academiaActual = "";

/* ================= AUTH ================= */

onAuthStateChanged(auth, async (user) => {

    const logo = document.getElementById("logoAcademia");

    if (!user) return;

    const snapUser = await getDoc(doc(db, "usuarios", user.uid));

    if (!snapUser.exists()) return;

    const data = snapUser.data();

    academiaActual = data.entidad || "";

    /* LOGO SIEMPRE VISIBLE */
    logo.src = data.logoCustom ||
        "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";

    logo.style.display = "block";
    logo.style.opacity = "1";

    await cargarUsuarios();
});

/* ================= LOGOUT ================= */

document.getElementById("btnLogout").addEventListener("click", async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = "index.html";
});

/* ================= CARGAR USUARIOS ================= */

async function cargarUsuarios() {

    if (!academiaActual) return;

    const q = query(
        collection(db, "usuarios"),
        where("entidad", "==", academiaActual),
        where("rol", "in", ["estudiante", "docente"])
    );

    const snap = await getDocs(q);

    usuarios = snap.docs.map(d => ({
        id: d.id,
        ...d.data()
    }));

    renderizarUsuarios();
}

/* ================= RENDER ================= */

function renderizarUsuarios() {

    const filtro = document.getElementById("filtroUsuarios").value;
    const tbody = document.getElementById("tablaUsuarios");

    tbody.innerHTML = "";

    usuarios
        .filter(u => filtro === "todos" ? true : u.rol === filtro)
        .forEach(u => {

            tbody.innerHTML += `
                <tr>
                    <td>${u.nombreResponsable || ""}</td>
                    <td>${u.email || ""}</td>
                    <td>${u.perfil || ""}</td>
                    <td>
                        <button class="btn btn-warning btn-sm"
                        onclick="abrirModal('${u.id}')">
                        Modificar
                        </button>
                    </td>
                </tr>
            `;
        });
}

document.getElementById("filtroUsuarios")
    .addEventListener("change", renderizarUsuarios);

/* ================= MODAL ================= */

window.abrirModal = function (id) {

    usuarioActual = usuarios.find(u => u.id === id);
    emailAnterior = usuarioActual.email;

    construirFormulario();

    document.getElementById("btnGuardarCambios").onclick = async function () {

        const nuevosDatos = {};

        for (const campo in usuarioActual) {

            if (["id", "timestamp", "fechaRegistro"].includes(campo)) continue;

            const input = document.getElementById(`campo_${campo}`);
            if (!input) continue;

            const valorOriginal = usuarioActual[campo];

            /* EMAIL */
            if (campo === "email") {
                nuevosDatos[campo] = input.value.trim().toLowerCase();
                continue;
            }

            /* 🔥 ARRAY REAL (módulos incluidos SIEMPRE) */
            if (Array.isArray(valorOriginal) || campo === "módulos" || campo === "modulos") {

                nuevosDatos[campo] = input.value
                    .split(",")
                    .map(v => v.trim())
                    .filter(v => v !== "");

                continue;
            }

            /* NUMBER */
            if (typeof valorOriginal === "number") {
                nuevosDatos[campo] = Number(input.value);
                continue;
            }

            /* DEFAULT STRING */
            nuevosDatos[campo] = input.value;
        }

        const nuevoEmail = nuevosDatos.email;

        try {

            if (nuevoEmail !== emailAnterior) {

                const cred = await createUserWithEmailAndPassword(
                    secondaryAuth,
                    nuevoEmail,
                    nuevosDatos.claveInicial || "UCMI2026"
                );

                const nuevoUID = cred.user.uid;

                const { id, ...resto } = usuarioActual;

                await setDoc(doc(db, "usuarios", nuevoUID), {
                    ...resto,
                    ...nuevosDatos,
                    email: nuevoEmail
                });

                await deleteDoc(doc(db, "usuarios", usuarioActual.id));

                await addDoc(collection(db, "correosPendientesEliminar"), {
                    correoAnterior: emailAnterior,
                    correoNuevo: nuevoEmail,
                    uidAnterior: usuarioActual.id,
                    uidNuevo: nuevoUID,
                    fecha: new Date(),
                    estado: "pendiente"
                });

            } else {

                await updateDoc(
                    doc(db, "usuarios", usuarioActual.id),
                    nuevosDatos
                );
            }

            alert("Actualizado correctamente");
            await cargarUsuarios();

            bootstrap.Modal.getInstance(
                document.getElementById("modalEditar")
            ).hide();

        } catch (e) {
            console.error(e);
            alert(e.message);
        }
    };

    new bootstrap.Modal(
        document.getElementById("modalEditar")
    ).show();
};

/* ================= FORM ================= */

function construirFormulario() {

    const cont = document.getElementById("contenedorCampos");
    cont.innerHTML = "";

    for (const campo in usuarioActual) {

        if (["id", "timestamp", "fechaRegistro"].includes(campo)) continue;

        const valor = Array.isArray(usuarioActual[campo])
            ? usuarioActual[campo].join(", ")
            : usuarioActual[campo];

        cont.innerHTML += `
            <div class="col-md-6 mb-3">
                <label class="form-label">${campo}</label>
                <input type="text"
                    class="form-control"
                    id="campo_${campo}"
                    value="${valor ?? ""}">
            </div>
        `;
    }
}
</script>
<script type="module" src="js/alertas-globales.js"></script>    
</body>
</html>
