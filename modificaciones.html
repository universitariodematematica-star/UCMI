<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
            --verde-exito: #27ae60;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; width: auto; margin-bottom: 30px; display: block; margin-left: auto; margin-right: auto; object-fit: contain; border-radius: 15px; border: 2px solid rgba(255, 255, 255, 0.1); transition: opacity 0.5s ease; opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; color: rgba(255,255,255,0.6); text-decoration: none; padding: 10px 15px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s all ease; font-size: 0.85rem; 
        }
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; }

        .btn-sidebar-action { 
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.4) !important; color: white !important; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; border-radius: 50px; padding: 10px; text-decoration: none; text-align: center; transition: all 0.3s ease; display: block; margin-bottom: 10px; 
        }
        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }

        .table-container {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.1);
}

        .table-modificaciones {
    color: white;
}

.table-modificaciones th {
    color: var(--dorado-ucmi);
    border-color: rgba(255,255,255,0.1);
}

.table-modificaciones td {
    color: white;
    border-color: rgba(255,255,255,0.08);
}

.modal-content {
    background: rgba(6,9,15,.97);
    backdrop-filter: blur(20px);
    color: white;
    border: 1px solid rgba(255,255,255,.15);
}

.form-control,
.form-select {
    background: rgba(255,255,255,.05);
    color: white;
    border: 1px solid rgba(255,255,255,.2);
}

.form-control:focus,
.form-select:focus {
    background: rgba(255,255,255,.08);
    color: white;
}

        .sidebar {
    height: 100vh;
}

.table-responsive {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(30px) saturate(150%);
    -webkit-backdrop-filter: blur(30px) saturate(150%);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    padding: 10px;
}    

        .table-modificaciones {
    color: white;
    background: rgba(255, 255, 255, 0.04) !important;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 18px;
    overflow: hidden;
}

        .table-modificaciones th,
.table-modificaciones td {
    background: rgba(255, 255, 255, 0.05) !important;
}

        .table-modificaciones tbody tr:hover td {
    background: rgba(255,255,255,0.10) !important;
}
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" id="logoAcademia" class="logo-sidebar" alt="Logo">
        </div>
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi active"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="alumnos-academia.html" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>
            <a href="#" class="nav-item-ucmi active"><i class="bi bi-pencil-square"></i> MODIFICACIONES</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="flex-grow-1 p-4">

    <h2 class="mb-4">
        <i class="bi bi-pencil-square"></i>
        Modificaciones de Usuarios
    </h2>

    <div class="table-container">

        <div class="row mb-4">
            <div class="col-md-4">

                <label class="mb-2">
                    Filtrar por:
                </label>

                <select
                    id="filtroUsuarios"
                    class="form-select">

                    <option value="todos">
                        Todos
                    </option>

                    <option value="estudiante">
                        Alumnos
                    </option>

                    <option value="docente">
                        Docentes
                    </option>

                </select>

            </div>
        </div>

        <div class="table-responsive">

            <table
                class="table table-modificaciones">

                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Perfil</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody id="tablaUsuarios">
                </tbody>

            </table>

        </div>

    </div>

</main>

   
</div>

<div
    class="modal fade"
    id="modalEditar"
    tabindex="-1">

    <div class="modal-dialog modal-xl">

        <div class="modal-content">

            <div class="modal-header">
                <h5>
                    Modificar Usuario
                </h5>

                <button
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>
            </div>

            <div
                class="modal-body">

                <div
                    id="contenedorCampos"
                    class="row">
                </div>

            </div>

            <div class="modal-footer">

                <button
                    id="btnGuardarCambios"
                    class="btn btn-warning">

                    Guardar Cambios

                </button>

            </div>

        </div>

    </div>

</div>    

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
    getFirestore,
    collection,
    onSnapshot,
    doc,
    getDoc,
    updateDoc,
    getDocs,
    query,
    where,
    setDoc,
    deleteDoc,
    addDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let usuarios = [];
let usuarioActual = null;
let emailAnterior = null;
    let academiaActual = "";


    onAuthStateChanged(auth, async (user) => {

   console.log(
    document.getElementById(
        "btnGuardarCambios"
    )
);

const logoElement =
    document.getElementById(
        "logoAcademia"
    );
    if (user) {

        const userDoc =
            await getDoc(
                doc(
                    db,
                    "usuarios",
                    user.email
                )
            );

        if (userDoc.exists()) {

            const data =
                userDoc.data();

            logoElement.src =
                data.logoCustom ||
                "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";

            academiaActual =
                data.entidad;

            await cargarUsuarios();
        }
    }

    logoElement.style.opacity = "1";
});


 // --- Lógica para cerrar sesión ---
document.getElementById('btnLogout').addEventListener('click', async (e) => {
    e.preventDefault();
    try {
        await signOut(auth);
        // Redirige a tu página de inicio/login. Cambia "index.html" por la que corresponda.
        window.location.href = "index.html"; 
    } catch (error) {
        console.error("Error al cerrar sesión:", error);
    }
});

async function cargarUsuarios() {

    const q =
        query(
            collection(db, "usuarios"),
            where(
                "entidad",
                "==",
                academiaActual
            ),
            where(
                "rol",
                "in",
                [
                    "estudiante",
                    "docente"
                ]
            )
        );

    const snap =
        await getDocs(q);

    usuarios =
        snap.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

    renderizarUsuarios();
}

function renderizarUsuarios() {

    const filtro =
        document.getElementById(
            "filtroUsuarios"
        ).value;

    const tabla =
        document.getElementById(
            "tablaUsuarios"
        );

    tabla.innerHTML = "";

    usuarios
        .filter(u => {

            if (filtro === "todos")
                return true;

            return u.rol === filtro;
        })
        .forEach(u => {

            tabla.innerHTML += `
                <tr>
                    <td>${u.nombreResponsable || ""}</td>
                    <td>${u.email}</td>
                    <td>${u.perfil}</td>
                    <td>
                        <button
                            class="btn btn-warning btn-sm"
                            onclick="abrirModal('${u.id}')">
                            Modificar
                        </button>
                    </td>
                </tr>
            `;
        });
}   
    document
.getElementById("filtroUsuarios")
.addEventListener(
    "change",
    renderizarUsuarios
);

window.abrirModal =
    async function(id) {

        usuarioActual =
            usuarios.find(
                u => u.id === id
            );

        emailAnterior =
            usuarioActual.email;

        construirFormulario();

        document
.getElementById(
    "btnGuardarCambios"
)
.onclick =
async function () {

    console.log("CLICK");

    const nuevosDatos = {};

    for (const campo in usuarioActual) {

        if (
            campo === "timestamp"
            || campo === "fechaRegistro"
        ) continue;

        const input =
            document.getElementById(
                `campo_${campo}`
            );

        if (!input) continue;

        nuevosDatos[campo] =
            input.value;
    }

const nuevoEmail = nuevosDatos.email;

if (nuevoEmail !== emailAnterior) {

    try {

        console.log("1 - setDoc");

        await setDoc(
            doc(db, "usuarios", nuevoEmail),
            nuevosDatos
        );

        console.log("2 - addDoc");

        await addDoc(
            collection(
                db,
                "correosPendientesEliminar"
            ),
            {
                emailAnterior,
                emailNuevo: nuevoEmail,
                academia: academiaActual
            }
        );

        console.log("3 - deleteDoc");

        await deleteDoc(
            doc(
                db,
                "usuarios",
                emailAnterior
            )
        );

        console.log("Todo salió bien");

    }
    catch (error) {
        console.error(error);
        alert(error.message);
    }

} else {

    await updateDoc(
        doc(
            db,
            "usuarios",
            emailAnterior
        ),
        nuevosDatos
    );
}

await cargarUsuarios();

bootstrap.Modal
.getInstance(
    document.getElementById(
        "modalEditar"
    )
)
.hide();    

console.log("Guardado en Firestore");
await cargarUsuarios();

bootstrap.Modal
.getInstance(
    document.getElementById(
        "modalEditar"
    )
)
.hide();    
};

        new bootstrap.Modal(
            document.getElementById(
                "modalEditar"
            )
        ).show();
    };

    function construirFormulario() {

    const contenedor =
        document.getElementById(
            "contenedorCampos"
        );

    contenedor.innerHTML = "";

    for (const campo in usuarioActual) {

        if (
            campo === "timestamp"
            || campo === "fechaRegistro"
        ) continue;

        const valor =
            Array.isArray(usuarioActual[campo])
                ? usuarioActual[campo].join(", ")
                : usuarioActual[campo];

        contenedor.innerHTML += `
            <div class="col-md-6 mb-3">

                <label class="form-label">
                    ${campo}
                </label>

                <input
                    type="text"
                    class="form-control"
                    id="campo_${campo}"
                    value="${valor ?? ""}">

            </div>
        `;
    }
}
    
</script>
</body>
</html>
