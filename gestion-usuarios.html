<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-4">
    <table class="table table-dark">
        <thead><tr><th>Email</th><th>Acción</th></tr></thead>
        <tbody id="tabla-usuarios"></tbody>
    </table>

    <script type="module">
        // Para borrar usuarios de Auth, el SDK de cliente (web) NO tiene permiso.
        // La ÚNICA forma funcional es mediante una Cloud Function.
        // Aquí tienes la lógica de la llamada:
        
        async function listarYBorrar() {
            const miEmail = "universitariodematematica@gmail.com";
            
            // 1. Obtener lista (requiere Cloud Function de lectura)
            const respuesta = await fetch('/api/listarUsuarios'); 
            const usuarios = await respuesta.json();
            
            const tbody = document.getElementById('tabla-usuarios');
            
            usuarios.forEach(user => {
                if (user.email === miEmail) return; // BLINDAJE: Tu correo no aparece

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.email}</td>
                    <td>
                        <button class="btn btn-danger" onclick="confirmarBorrado('${user.uid}', '${user.email}')">
                            Borrar
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
        
        window.confirmarBorrado = async (uid, email) => {
            if(confirm(`¿Borrar a ${email}?`)) {
                // Llama a la Cloud Function que creamos antes
                await fetch('/api/borrarUsuario', { method: 'POST', body: JSON.stringify({uid}) });
                location.reload();
            }
        };
        
        listarYBorrar();
    </script>
</body>
</html>
