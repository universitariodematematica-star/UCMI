<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Usuarios</title>
</head>
<body>

  <h1>Usuarios registrados</h1>
  <button onclick="loadUsers()">Actualizar lista</button>

  <ul id="userList"></ul>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROJECT.firebaseapp.com",
      projectId: "TU_PROJECT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const API_URL = "https://TU_REGION-TU_PROJECT.cloudfunctions.net/api";

    // 🔐 LOGIN (puedes cambiarlo a tu sistema actual)
    async function login() {
      await signInWithEmailAndPassword(auth, "tuemail@dominio.com", "TU_PASSWORD");
    }

    async function getToken() {
      const user = auth.currentUser;
      return user ? await user.getIdToken() : null;
    }

    window.loadUsers = async function () {
      await login();

      const token = await getToken();

      const res = await fetch(`${API_URL}/users`, {
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      const users = await res.json();

      const list = document.getElementById("userList");
      list.innerHTML = "";

      users.forEach(user => {
        const li = document.createElement("li");

        li.innerHTML = `
          ${user.email}
          <button onclick="deleteUser('${user.uid}')">Eliminar</button>
        `;

        list.appendChild(li);
      });
    };

    window.deleteUser = async function (uid) {
      const token = await getToken();

      await fetch(`${API_URL}/user/${uid}`, {
        method: "DELETE",
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      alert("Usuario eliminado");
      loadUsers();
    };
  </script>

</body>
</html>
