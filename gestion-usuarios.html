<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Rápida de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-4">
    <div class="container">
        <h2>Panel de Borrado Directo</h2>
        <table class="table table-dark mt-4">
            <thead><tr><th>Email</th><th>UID</th><th>Acción</th></tr></thead>
            <tbody id="lista-usuarios"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURA TUS DATOS AQUÍ
        const firebaseConfig = { /* TU CONFIGURACIÓN */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LISTAR USUARIOS ---
        async function listar() {
            const snap = await getDocs(collection(db, "usuarios"));
            const tbody = document.getElementById('lista-usuarios');
            tbody.innerHTML = '';
            
            snap.forEach(doc => {
                const email = doc.id;
                if (email === "universitariodematematica@gmail.com") return; // Protegido

                tbody.innerHTML += `
                    <tr>
                        <td>${email}</td>
                        <td>${doc.id}</td>
                        <td>
                            <button class="btn btn-danger" onclick="borrar('${doc.id}')">Borrar</button>
                        </td>
                    </tr>
                `;
            });
        }

        // --- BORRAR ---
        window.borrar = async (uid) => {
            if (confirm("¿Seguro que quieres borrar este usuario?")) {
                // Aquí es donde el SDK de Admin haría el borrado
                // Si antes lo hacíamos sin Cloud Functions, era porque llamábamos 
                // directamente al objeto Auth o a una lógica simplificada
                alert("Para completar el borrado de " + uid + ", ejecútalo en la consola de Firebase.");
            }
        };

        listar();
    </script>
</body>
</html>
