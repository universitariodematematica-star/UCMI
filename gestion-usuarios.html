<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-4">
    <table class="table table-dark">
        <thead><tr><th>Email</th><th>Acción</th></tr></thead>
        <tbody id="tabla-usuarios"></tbody>
    </table>

  <script type="module">
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";
    
    const functions = getFunctions();
    const listarUsuarios = httpsCallable(functions, 'listarUsuariosAuth');
    const miCorreo = "universitariodematematica@gmail.com";

    async function cargarUsuarios() {
        const result = await listarUsuarios();
        const tbody = document.getElementById('tabla-usuarios');
        tbody.innerHTML = '';

        result.data.forEach(user => {
            // Mostramos todos, y si es el tuyo, le ponemos una etiqueta de protección
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${user.email} ${user.email === miCorreo ? '<b>(TU CUENTA)</b>' : ''}</td>
                <td>
                    ${user.email !== miCorreo ? 
                        `<button class="btn btn-danger" onclick="borrarUsuario('${user.uid}', '${user.email}')">Borrar</button>` : 
                        '<span class="text-muted">Protegido</span>'}
                </td>
            `;
            tbody.appendChild(row);
        });
    }
    
    cargarUsuarios();
</script>
</body>
</html>
