<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Autenticación</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .table-of-content {
            background-color: #000080;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin: 10px;
        }

        .circle {
            width: 110px;
            height: 110px;
            margin: 20px auto;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .circle img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .password-form {
            margin-top: 20px;
        }

        .password-form input[type="password"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
            width: 200px;
        }

        .password-form input[type="submit"] {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #333;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
        }

        .success {
            background-color: #4CAF50;
            color: white;
        }

        .error {
            background-color: #f44336;
            color: white;
        }
    </style>

    <script src="app.js"></script>
</head>

<body>

    <div class="table-of-content">
        <h2>UNIVERSITARIO DE CIENCIAS, MATEMÁTICA E IDIOMAS</h2>
    </div>

    <div class="circle">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjw9cxfrG4DxMXY4q8Z_jexzTMuwfWdJoB7iSmpjcA8ntkHLbdXX_vGKofXvl7fahEPTt6NW1JM9fN3xDdW1Ontxh5OYTM6lsjre9SuWyq0fTakTWEMc2guGHMVVNCsb3li6_aQ-Gm2iO0Ql5pVq_cd08jOF8CjMgi_2SztgwnAUMq_MC4acptQhHzxbGcC/s2560/Imagen%20UCMI.png"
             alt="Logo">
    </div>

    <h2>Ingresa el código único</h2>

    <form class="password-form" onsubmit="return login(event)">
        <input id="password" type="password" placeholder="Código de licencia" required>
        <br><br>
        <input type="submit" value="Acceder">
    </form>

    <div id="message" class="message"></div>

<script>
/* 🔐 AUTO LOGIN SEGURO */
function autoLoginCheck() {
    const code = localStorage.getItem("code");
    const expirationRaw = localStorage.getItem("expiration");

    if (!code || !expirationRaw) return;

    const expiration = new Date(expirationRaw);
    const today = new Date();

    // ❌ fecha inválida
    if (isNaN(expiration.getTime())) {
        localStorage.clear();
        return;
    }

    // ⛔ vencido
    if (today > expiration) {
        localStorage.clear();
        return;
    }

    // ✅ válido
    window.location.href = "home.html";
}

autoLoginCheck();


/* 🔐 LOGIN */
function login(event) {
    event.preventDefault();

    const code = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    const result = validateLicense(code);

    // ❌ inválido
    if (!result || result.status === "invalid") {
        msg.className = "message error";
        msg.innerText = "❌ Código inválido";
        return false;
    }

    // ⛔ vencido
    if (result.status === "expired") {
        msg.className = "message error";
        msg.innerText = "⛔ Licencia vencida";
        return false;
    }

    // 📦 guardar datos LIMPIOS
    localStorage.clear();

    localStorage.setItem("user", result.license.user);
    localStorage.setItem("code", result.license.code);
    localStorage.setItem("expiration", result.license.expiration);
    localStorage.setItem("days", result.days);

    msg.className = "message success";
    msg.innerText =
        "✅ Bienvenido " + result.license.user +
        " | Días restantes: " + result.days;

    setTimeout(() => {
        window.location.href = "home.html";
    }, 1500);

    return false;
}
</script>

</body>
</html>
