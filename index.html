<!DOCTYPE html>
<html lang="es">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>UCMI - Universitario de Ciencias Matemáticas e Idiomas</title>
     <link rel="icon" type="image/png" href="https://universitariodematematica-star.github.io/UCMI/logo-ucmi-barra.png">
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
     <style>
          :root {
              --azul-ucmi: #004dc0;
              --oscuro-fondo: #0a192f; 
              --gris-suave: #8892b0; 
              --texto-universitario: #333333; 
              --verde-neon: #00ff00;
          }
          body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; background-color: #ffffff; overflow: hidden; }
          .contenedor-principal { display: flex; height: 100vh; width: 100%; }
          .seccion-visual {
              flex: 1.2;
              background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png');
              background-size: cover;
              background-position: center;
          }
          .seccion-login { flex: 0.8; background-color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px; }
          .login-card { width: 100%; max-width: 400px; text-align: center; }
          .contenedor-logo-derecho img { width: 150px; height: auto; border-radius: 20px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); margin-bottom: 10px; }
          .texto-universitario { font-size: 1.1rem; color: var(--texto-universitario); text-transform: uppercase; margin-bottom: 40px; letter-spacing: 2px; }
          .input-group { margin-bottom: 20px; text-align: left; position: relative; }
          .input-group label { display: block; font-size: 0.85rem; color: var(--gris-suave); margin-bottom: 8px; }
          .input-group input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1.5px solid #eeeeee; font-size: 1rem; box-sizing: border-box; }
          
          #card-sesion-activa {
              display: none;
              background: #f4f7ff;
              padding: 25px;
              border-radius: 15px;
              border: 2px dashed var(--azul-ucmi);
              margin-top: 20px;
          }
 
          .caps-indicator {
              display: none;
              align-items: center;
              margin-top: 8px;
              font-size: 0.75rem;
              color: #2c3e50;
              font-weight: 600;
          }
          .dot {
              height: 10px;
              width: 10px;
              background-color: var(--verde-neon);
              border-radius: 50%;
              display: inline-block;
              margin-right: 8px;
              box-shadow: 0 0 8px var(--verde-neon);
              animation: pulse 1.5s infinite;
          }
          @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
 
          .btn-entrar { width: 100%; padding: 15px; background-color: var(--azul-ucmi); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
          .btn-entrar:disabled { background-color: #ccc; cursor: not-allowed; }
          @media (max-width: 1024px) { .seccion-visual { display: none; } .seccion-login { flex: 1; padding: 30px; } }
     </style>
</head>
<body>
 
     <div class="contenedor-principal">
          <div class="seccion-visual"></div>
          <div class="seccion-login">
               <div class="login-card">
                    <div class="contenedor-logo-derecho">
                         <img src="https://universitariodematematica-star.github.io/UCMI/Aros-ucmi.png" alt="Logo UCMI">
                    </div>
                    <div class="texto-universitario">Universitario de Ciencias Matemáticas e Idiomas</div>
                    
                    <div id="seccion-inputs">
                         <h2>Iniciar Sesión</h2>
                         <form id="form-login" autocomplete="off">
                              <div class="input-group">
                                   <label>Correo Electrónico</label>
                                   <input type="email" id="email" name="ucmi_email_clean" placeholder="usuario@ejemplo.com" autocomplete="new-password" required>
                              </div>
 
                              <div class="input-group">
                                   <label>Contraseña</label>
                                   <input type="password" id="password" name="ucmi_pass_clean" placeholder="••••••••" autocomplete="new-password" required>
                                   <div id="caps-warning" class="caps-indicator">
                                        <span class="dot"></span> MAYÚSCULAS ACTIVADAS
                                   </div>
                              </div>
 
                              <button type="submit" id="btn-submit" class="btn-entrar">Entrar a UCMI</button>
                         </form>
                    </div>
 
                    <div id="card-sesion-activa">
                         <p style="color: #555; font-size: 0.9rem;">Bienvenido de nuevo:</p>
                         <b id="user-logged-email" style="color: var(--azul-ucmi); font-size: 1.1rem; display: block; margin-bottom: 20px;"></b>
                         <button onclick="continuarAlPanel()" class="btn-entrar">Ir a mi Panel</button>
                         <button onclick="cerrarSesionLimpiar()" style="background:none; border:none; color:#ff4d4d; cursor:pointer; margin-top:15px; font-weight:600; font-size: 0.85rem; text-decoration: underline;">Usar otra cuenta</button>
                    </div>
 
               </div>
          </div>
     </div>
 
     <script type="module">
          import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
          import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
          import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
 
          const firebaseConfig = {
              apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
              authDomain: "ucmi-13796634.firebaseapp.com",
              projectId: "ucmi-13796634",
              storageBucket: "ucmi-13796634.firebasestorage.app",
              messagingSenderId: "1090719609536",
              appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
          };
 
          const app = initializeApp(firebaseConfig);
          const auth = getAuth(app);
          const db = getFirestore(app);
          
          const MI_UID_MAESTRO = "x0oBFbDP09d7I3VZvWuN6BOODf32";
          let navegando = false;
 
          // FUNCIÓN DE LIMPIEZA TOTAL
          function limpiarTodo() {
              const e = document.getElementById('email');
              const p = document.getElementById('password');
              if(e) e.value = "";
              if(p) p.value = "";
              const form = document.getElementById('form-login');
              if(form) form.reset();
          }
 
          // Ejecutar limpieza al cargar por si el navegador recordó algo
          window.onload = limpiarTodo;
 
          // Aviso de mayúsculas
          document.getElementById('password').addEventListener('keyup', (e) => {
              const warning = document.getElementById('caps-warning');
              if (e && typeof e.getModifierState === 'function') {
                  warning.style.display = e.getModifierState("CapsLock") ? 'flex' : 'none';
              }
          });
 
          // Lógica de redirección con filtro de baneo (Papelera)
          async function procesarRedireccion(user) {
              if (navegando) return;
              navegando = true;
              
              // Si es el Super-Admin Maestro, pasa directo sin consultar Firestore
if (user.uid === MI_UID_MAESTRO) {
    localStorage.setItem(
        'userId',
        user.email.toLowerCase().trim()
    );

    window.location.href = "super-admin.html";
    return;
}
 
              try {
                  const docRef = doc(db, "usuarios", user.email.toLowerCase().trim());
                  const docSnap = await getDoc(docRef);
 
                  if (docSnap.exists()) {
                      const datosUsuario = docSnap.data();
                      
                      // Validación si la lectura pasa pero tiene el campo status en "eliminado"
                      if (datosUsuario.status === "eliminado") {
                          alert("ACCESO SUSPENDIDO: Esta cuenta se encuentra en la papelera de reciclaje. Comunícate con el Administrador.");
                          navegando = false;
                          await cerrarSesionLimpiar();
                          return;
                      }
 
                      // Si todo está bien, guardamos los datos y procedemos al ruteo
                      localStorage.setItem('userId', user.email.toLowerCase().trim());
                      localStorage.setItem('userRole', datosUsuario.perfil || "");
                      
                      const perfil = (datosUsuario.perfil || "").toLowerCase().trim().replace(/\s+/g, '_');
                      const rutas = {
                          "academia": "admin-academia.html",
                          "docente_academia": "docente-academia.html",
                          "estudiante_academia": "aula-academia.html",
                          "profesor_embajador": "admin-profesor-embajador.html",
                          "estudiante_autodidacta": "aula-autodidacta.html",
                          "estudiante_de_profesor_asociado": "aula-asociado.html",
                          "estudiante_de_profesor_embajador": "aula-embajador.html"
                      };
 
                      if (rutas[perfil]) {
                          window.location.replace(rutas[perfil]);
                      } else {
                          alert("Perfil no encontrado.");
                          await cerrarSesionLimpiar();
                      }
                  } else {
                      alert("El usuario no existe en el sistema.");
                      await cerrarSesionLimpiar();
                  }
              } catch (error) {
                  // 🛑 CAPTURA EL RECHAZO DE LAS REGLAS DE FIREBASE (PERMISOS INSUFICIENTES)
                  console.warn("Acceso denegado por políticas de seguridad del sistema:", error);
                  
                  alert("ACCESO SUSPENDIDO: Esta cuenta se encuentra en la papelera de reciclaje. Comunícate con el Superadministrador.");
                  
                  // Desbloqueamos el botón y restablecemos su texto
                  navegando = false;
                  const btn = document.getElementById('btn-submit');
                  if (btn) {
                      btn.disabled = false;
                      btn.innerText = "Entrar a UCMI";
                  }
                  
                  // Rompemos la sesión para que no se mantenga logueado de fondo
                  limpiarTodo();
                  await signOut(auth);
                  localStorage.clear();
              }
          }
 
window.continuarAlPanel = () => {
    const u = auth.currentUser;
    if (u) {
        procesarRedireccion(u);
    } else {
        alert("La sesión no está cargada todavía. Por favor, espera un segundo y vuelve a intentar.");
    }
};
 
          window.cerrarSesionLimpiar = async () => {
              limpiarTodo();
              await signOut(auth);
              localStorage.clear();
              window.location.reload();           
          };
 
          // Observador de Sesión
          onAuthStateChanged(auth, (user) => {
              limpiarTodo(); 
              if (user) {
                  document.getElementById('seccion-inputs').style.display = 'none';
                  document.getElementById('card-sesion-activa').style.display = 'block';
                  document.getElementById('user-logged-email').innerText = user.email;
              } else {
                  document.getElementById('seccion-inputs').style.display = 'block';
                  document.getElementById('card-sesion-activa').style.display = 'none';
              }
          });
 
          // Submit del Formulario
          document.getElementById('form-login').addEventListener('submit', async (e) => {
              e.preventDefault();
              const email = document.getElementById('email').value.trim();
              const pass = document.getElementById('password').value;
              const btn = document.getElementById('btn-submit');
 
              btn.disabled = true;
              btn.innerText = "VERIFICANDO...";
 
              try {
                  const cred = await signInWithEmailAndPassword(auth, email, pass);
                  limpiarTodo(); 
                  procesarRedireccion(cred.user);
              } catch (error) {
                  alert("Correo o contraseña incorrectos.");
                  limpiarTodo(); 
                  btn.disabled = false;
                  btn.innerText = "Entrar a UCMI";
              }
          });
     </script>
</body>
</html>
