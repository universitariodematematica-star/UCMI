<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Universitario de Ciencias Matemáticas e Idiomas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
        }
        body {
            background: linear-gradient(135deg, #06090f 0%, #0a0f1a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .btn-gold {
            background: var(--dorado-ucmi);
            color: black;
            font-weight: 700;
            border: none;
            transition: 0.3s;
        }
        .btn-gold:hover {
            background: #b38f4d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.4);
        }
        .logo-main {
            max-width: 180px;
            filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.3));
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="UCMI Logo" class="logo-main mb-4">
    <h3 class="fw-bold">Acceso al Núcleo</h3>
    <p class="text-white-50 mb-4">Ingresa tus credenciales para continuar</p>

    <form id="loginForm">
        <div class="mb-3 text-start">
            <label class="form-label small opacity-75">Correo Electrónico</label>
            <input type="email" id="email" class="form-control bg-dark text-white border-secondary" required>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small opacity-75">Contraseña</label>
            <input type="password" id="password" class="form-control bg-dark text-white border-secondary" required>
        </div>
        <button type="submit" class="btn btn-gold w-100 py-3 mb-3">INICIAR SESIÓN</button>
    </form>
    
    <div id="loader" class="d-none mt-3">
        <div class="spinner-border text-warning" role="status"></div>
        <p class="small mt-2">Validando jerarquía de acceso...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Lógica de Redirección basada en el campo "perfil"
    async function redirigirSegunPerfil(user) {
        const MI_UID_MAESTRO = "m56REyF19sOsC6BE5sJdJG6eR863"; // Juan Carlos Riera
        
        // 1. Prioridad Máxima: Superadministrador
        if (user.uid === MI_UID_MAESTRO) {
            window.location.href = "super-admin.html";
            return;
        }

        // 2. Consulta de Perfil en Firestore
        try {
            const docRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const perfil = docSnap.data().perfil;
                
                switch(perfil) {
                    case "academia":
                        window.location.href = "admin-academia.html";
                        break;
                    case "profesor_asociado":
                        window.location.href = "admin-profesor-asociado.html";
                        break;
                    case "profesor_embajador":
                        window.location.href = "admin-profesor-embajador.html";
                        break;
                    case "profesor_academia":
                        window.location.href = "panel-profesor-academia.html";
                        break;
                    case "estudiante_academia":
                        window.location.href = "aula-academia.html";
                        break;
                    case "estudiante_asociado":
                        window.location.href = "aula-asociado.html";
                        break;
                    case "estudiante_embajador":
                        window.location.href = "aula-embajador.html";
                        break;
                    default:
                        // Estudiantes autodidactas o sin perfil asignado
                        window.location.href = "dashboard.html";
                }
            } else {
                alert("Error: El perfil de usuario no existe en el sistema.");
            }
        } catch (error) {
            console.error("Error en la aduana de perfiles:", error);
        }
    }

    // Manejo del Login
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        document.getElementById('loader').classList.remove('d-none');

        signInWithEmailAndPassword(auth, email, pass)
            .catch(error => {
                document.getElementById('loader').classList.add('d-none');
                alert("Error de acceso: " + error.message);
            });
    });

    // Observador de estado
    onAuthStateChanged(auth, (user) => {
        if (user) {
            redirigirSegunPerfil(user);
        }
    });
</script>

</body>
</html>
