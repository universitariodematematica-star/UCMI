<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Universitario de Ciencias Matemáticas e Idiomas</title>
    <link rel="icon" type="image/png" href="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-ucmi: #004dc0;
            --oscuro-fondo: #0a192f;
            --gris-suave: #8892b0;
            --texto-universitario: #333333;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        .contenedor-principal {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* LADO IZQUIERDO: IMAGEN SUPRALÓGICA */
        .seccion-visual {
            flex: 1.2;
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* LADO DERECHO: FORMULARIO */
        .seccion-login {
            flex: 0.8;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .contenedor-logo-derecho {
            display: inline-block;
            margin-bottom: 10px;
        }

        .contenedor-logo-derecho img {
            width: 150px;
            height: auto;
            display: block;
        }

        .texto-universitario {
            font-size: 1.50rem;
            color: var(--texto-universitario);
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .login-card h2 {
            color: var(--oscuro-fondo);
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 30px;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--gris-suave);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid #eeeeee;
            box-sizing: border-box;
            font-size: 1.2rem;
            background-color: #fcfcfc;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--azul-ucmi);
            outline: none;
            background-color: #ffffff;
            box-shadow: 0 4px 12px rgba(0, 77, 192, 0.08);
        }

        .btn-entrar {
            width: 100%;
            padding: 15px;
            background-color: var(--azul-ucmi);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 8px 15px rgba(0, 77, 192, 0.2);
        }

        .btn-entrar:hover {
            background-color: #003da0;
            transform: translateY(-2px);
        }

        .materias-footer {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 50px;
            color: blue;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 1024px) {
            .seccion-visual { display: none; }
            .seccion-login { flex: 1; padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="seccion-visual"></div>

        <div class="seccion-login">
            <div class="login-card">
                
                <div class="contenedor-logo-derecho">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo UCMI">
                </div>

                <div class="texto-universitario">
                    Universitario de Ciencias Matemáticas e Idiomas
                </div>

                <h2>Iniciar Sesión</h2>
                
                <form id="form-login">
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="email" placeholder="usuario@ucmi.edu" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" id="btn-submit" class="btn-entrar">Entrar a UCMI</button>
                </form>

                <div class="materias-footer">
                    <span>Math</span>
                    <span>Physics</span>
                    <span>Languages</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>

</body>
</html>
