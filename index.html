<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Iniciar Sesión</title>

    <style>
        :root {
            --primary-blue: #000080;
            --bg-color: #f7f7f7;
            --input-border: #d1d5db;
            --button-dark: #333333;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-bar {
            background-color: var(--primary-blue);
            color: white;
            padding: 15px 0;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-bar h2 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .logo-circle {
            width: 130px;
            height: 130px;
            margin: 40px auto 15px auto;
            border-radius: 50%;
            overflow: hidden;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-circle img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        h1.login-title {
            font-size: 1.5rem;
            color: #000;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* --- CONTENEDOR PARA ALINEAR ETIQUETAS Y CAMPOS --- */
        .login-form-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-row {
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Alinea contenido a la derecha para que los campos coincidan */
            width: 100%;
            margin-bottom: 12px;
        }

        .input-row label {
            font-weight: bold;
            font-size: 1.1rem;
            margin-right: 15px;
            color: #000;
            white-space: nowrap; /* Evita que la palabra se rompa en dos líneas */
        }

        .input-row input {
            width: 220px; /* Ancho fijo para que ambos campos midan lo mismo */
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--input-border);
            font-size: 1rem;
            outline: none;
            background-color: white;
        }

        .btn-submit {
            padding: 12px 40px;
            font-size: 1rem;
            background-color: var(--button-dark);
            color: white;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #000;
        }

        .message {
            margin: 20px auto;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            max-width: 320px;
            display: none;
            text-align: center;
        }

        .error { background-color: #f44336; color: white; }
        .success { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h2>UNIVERSITARIO DE CIENCIAS, MATEMÁTICA E IDIOMAS</h2>
    </div>

    <div class="logo-circle">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjw9cxfrG4DxMXY4q8Z_jexzTMuwfWdJoB7iSmpjcA8ntkHLbdXX_vGKofXvl7fahEPTt6NW1JM9fN3xDdW1Ontxh5OYTM6lsjre9SuWyq0fTakTWEMc2guGHMVVNCsb3li6_aQ-Gm2iO0Ql5pVq_cd08jOF8CjMgi_2SztgwnAUMq_MC4acptQhHzxbGcC/s2560/Imagen%20UCMI.png" alt="Logo">
    </div>

    <h1 class="login-title">Iniciar sesión</h1>

    <form class="login-form-container" onsubmit="return login(event)" autocomplete="off">
        
        <div class="input-row">
            <label>Correo:</label>
            <input id="email" type="email" value="" autocomplete="off" required>
        </div>
        
        <div class="input-row">
            <label>Contraseña:</label>
            <input id="password" type="password" value="" autocomplete="new-password" required>
        </div>

        <input type="submit" class="btn-submit" value="Acceder">
    </form>

    <div id="message" class="message"></div>

    <script type="module">
        // --- LOGICA FIREBASE (Mantenemos tu configuración actual) ---
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
            authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
            projectId: "portal-autenticacion-a1ngles",
            storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
            messagingSenderId: "1039504020190",
            appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
        };

        const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // PERSISTENCIA
        await setPersistence(auth, browserLocalPersistence);

        window.auth = auth;
        window.db = db;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.getDoc = getDoc;
        window.doc = doc;

        // 🔥 TRUCO FINAL: Limpiar campos al cargar/actualizar
        window.onload = () => {
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
        };
    </script>

    <script>
        async function login(event) {
            event.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const msg = document.getElementById("message");

            msg.style.display = "block";
            msg.className = "message";
            msg.innerText = "⏳ Verificando...";

            try {
                const userCredential = await window.signInWithEmailAndPassword(window.auth, email, password);
                const user = userCredential.user;

                const docRef = window.doc(window.db, "users", user.email);
                const docSnap = await window.getDoc(docRef);

                if (docSnap.exists()) {
    const data = docSnap.data();
    const fechaExp = new Date((data.expiration || "") + "T23:59:59");
    const hoy = new Date();

    if (isNaN(fechaExp.getTime()) || hoy > fechaExp) {
        msg.className = "message error";
        msg.innerHTML = `❌ Tu licencia ha expirado.<br>Contacta al administrador:<br><b>+593 99 175 23 85</b>`;
        return;
    }

    msg.className = "message success";
    msg.innerText = "✅ Bienvenido " + (data.name || user.email);
    
    // 🔥 LINEA VITAL: Crea la llave de acceso para protect.js
    sessionStorage.setItem("auth_ok", "1"); 

    setTimeout(() => { window.location.href = "home.html"; }, 1000);

} else {
    msg.className = "message error";
    msg.innerText = "❌ No tienes una licencia activa.";
}

            } catch (error) {
                msg.className = "message error";
                msg.innerText = "❌ Correo o contraseña incorrectos.";
            }
        }
    </script>
</body>
</html>
