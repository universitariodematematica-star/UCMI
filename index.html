<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Autenticación - UCMI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .table-of-content {
            background-color: #000080;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin: 10px;
        }

        .circle {
            width: 110px;
            height: 110px;
            margin: 20px auto;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .circle img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .password-form {
            margin-top: 20px;
        }

        .password-form input {
            padding: 10px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
            width: 220px;
            margin: 5px;
        }

        .password-form input[type="submit"] {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #333;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            width: auto;
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            min-height: 20px;
        }

        .success {
            background-color: #4CAF50;
            color: white;
        }

        .error {
            background-color: #f44336;
            color: white;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
            authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
            projectId: "portal-autenticacion-a1ngles",
            storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
            messagingSenderId: "1039504020190",
            appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 🔑 EXPORTACIÓN GLOBAL: Esto corrige el error "not defined"
        window.auth = auth;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;

        console.log("Firebase vinculado correctamente al objeto global.");
    </script>
</head>

<body>

    <div class="table-of-content">
        <h2>UNIVERSITARIO DE CIENCIAS, MATEMÁTICA E IDIOMAS</h2>
    </div>

    <div class="circle">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjw9cxfrG4DxMXY4q8Z_jexzTMuwfWdJoB7iSmpjcA8ntkHLbdXX_vGKofXvl7fahEPTt6NW1JM9fN3xDdW1Ontxh5OYTM6lsjre9SuWyq0fTakTWEMc2guGHMVVNCsb3li6_aQ-Gm2iO0Ql5pVq_cd08jOF8CjMgi_2SztgwnAUMq_MC4acptQhHzxbGcC/s2560/Imagen%20UCMI.png" alt="Logo">
    </div>

    <h2>Iniciar sesión</h2>

    <form class="password-form" onsubmit="return login(event)">
        <label style="display:block; margin-top:10px; font-weight:bold;">Correo electrónico</label>
        <input id="email" type="email" placeholder="ejemplo@correo.com" required>
        <br>

        <label style="display:block; margin-top:10px; font-weight:bold;">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" required>
        <br><br>

        <input type="submit" value="Acceder">
    </form>

    <div id="message" class="message"></div>

    <script>
        async function login(event) {
            event.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const msg = document.getElementById("message");

            try {
                // Usamos window. para acceder a las funciones de Firebase fuera del módulo
                const userCredential = await window.signInWithEmailAndPassword(window.auth, email, password);
                const user = userCredential.user;

                msg.className = "message success";
                msg.innerText = "✅ Bienvenido " + user.email;

                // GUARDAR SESIÓN PARA PROTECT.JS
                sessionStorage.setItem("uid", user.uid);
                sessionStorage.setItem("email", user.email);
                sessionStorage.setItem("auth_ok", "1"); // La llave que abre protect.js

                setTimeout(() => {
                    window.location.href = "home.html";
                }, 800);

            } catch (error) {
                msg.className = "message error";
                console.error("Error capturado:", error);

                if (error.code === "auth/invalid-credential" || error.code === "auth/user-not-found" || error.code === "auth/wrong-password") {
                    msg.innerText = "❌ Credenciales incorrectas";
                } else {
                    msg.innerText = "⚠️ Error: " + error.message;
                }
            }

            return false;
        }
    </script>
</body>
</html>
