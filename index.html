<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Autenticación</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .table-of-content {
            background-color: #000080;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin: 10px;
        }

        .circle {
            width: 110px;
            height: 110px;
            margin: 20px auto;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .circle img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .password-form {
            margin-top: 20px;
        }

        .password-form input[type="password"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
            width: 200px;
        }

        .password-form input[type="submit"] {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #333;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
        }

        .success {
            background-color: #4CAF50;
            color: white;
        }

        .error {
            background-color: #f44336;
            color: white;
        }
    </style>

    <!-- 🔥 FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
            authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
            projectId: "portal-autenticacion-a1ngles",
            storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
            messagingSenderId: "1039504020190",
            appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // hacerlo accesible fuera del módulo
        window.db = db;
        window.doc = doc;
        window.getDoc = getDoc;
    </script>

</head>

<body>

    <div class="table-of-content">
        <h2>UNIVERSITARIO DE CIENCIAS, MATEMÁTICA E IDIOMAS</h2>
    </div>

    <div class="circle">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjw9cxfrG4DxMXY4q8Z_jexzTMuwfWdJoB7iSmpjcA8ntkHLbdXX_vGKofXvl7fahEPTt6NW1JM9fN3xDdW1Ontxh5OYTM6lsjre9SuWyq0fTakTWEMc2guGHMVVNCsb3li6_aQ-Gm2iO0Ql5pVq_cd08jOF8CjMgi_2SztgwnAUMq_MC4acptQhHzxbGcC/s2560/Imagen%20UCMI.png">
    </div>

    <h2>Ingresa el código único</h2>

    <form class="password-form" onsubmit="return login(event)">
        <input id="password" type="password" placeholder="Código de licencia" required>
        <br><br>
        <input type="submit" value="Acceder">
    </form>

    <div id="message" class="message"></div>

    <!-- 🔐 LOGIN REAL -->
    <script>
        async function login(event) {
            event.preventDefault();

            const code = document.getElementById("password").value.trim();
            const msg = document.getElementById("message");

            try {
                const ref = doc(db, "licenses", code);
                const snap = await getDoc(ref);

                // ❌ código no existe
                if (!snap.exists()) {
                    msg.className = "message error";
                    msg.innerText = "❌ Código inválido";
                    return false;
                }

                const data = snap.data();
                const expiration = new Date(data.expiration);
                const today = new Date();

                // ⛔ vencido
                if (today > expiration) {
                    msg.className = "message error";
                    msg.innerText = "⛔ Licencia vencida";
                    return false;
                }

                // ✅ válido
                localStorage.clear();
                localStorage.setItem("code", code);
                localStorage.setItem("expiration", data.expiration);

                msg.className = "message success";
                msg.innerText = "✅ Bienvenido " + data.user;

                window.location.href = "home.html";

                return false;

            } catch (error) {
                msg.className = "message error";
                msg.innerText = "⚠️ Error de conexión";
                console.error(error);
                return false;
            }
        }
    </script>

</body>
</html>
