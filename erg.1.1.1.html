<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Gramatical ERG.1.1.1</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f0f2f5; color: #333; padding: 20px; }
        .quiz-card { background: white; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .exercise-section { display: none; margin-bottom: 30px; }
        .active { display: block; }
        
        /* Drag & Drop Styles */
        .sentenceBlank { 
            width: 90%; min-height: 80px; background-color: #f8f9fa; 
            border: 2px dashed #007BFF; margin: 20px auto; 
            border-radius: 10px; display: flex; flex-wrap: wrap; 
            justify-content: center; align-items: center; padding: 10px;
        }
        .wordButton { 
            padding: 10px 15px; background-color: #007BFF; color: white;
            margin: 5px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold;
            transition: 0.3s;
        }
        .wordButton:hover { background-color: #6a5acd; color: white; }

        /* Multi-choice Styles */
        select { padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #007BFF; width: 100%; max-width: 400px; margin: 20px 0; }

        /* Buttons */
        .btn-main { 
            background-color: #000080; color: white; border: none; 
            border-radius: 8px; padding: 15px 30px; cursor: pointer; font-weight: bold; font-size: 16px;
        }
        .btn-main:hover { background-color: #6a5acd; }

        /* Final Screen */
        #finalScreen { display: none; padding: 20px; }
        .score-big { font-size: 60px; color: #000080; font-weight: 900; margin: 20px 0; }
        .success-msg { color: #27ae60; font-weight: bold; font-size: 20px; }
        .progress-indicator { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
    </style>
    <script type="module" src="protect.js"></script>
</head>
<body>

<div class="quiz-card" id="quiz-container">
    <h3><b>Evaluación ERG.1.1.1.</b></h3>
    <div class="progress-indicator" id="progressText">Pregunta 1 de 20</div>
    <hr>

    <div id="section-select" class="exercise-section active">
        <h2>Selecciona la traducción correcta:</h2>
        <div id="selectQuestionContainer"></div>
        <br>
        <button class="btn-main" onclick="nextSelect()">Siguiente</button>
    </div>

    <div id="section-drag" class="exercise-section">
        <h2>Ordena las palabras correctamente:</h2>
        <div id="dragWordsContainer"></div>
        <div class="sentenceBlank" id="sentenceBlank" ondragover="event.preventDefault()" ondrop="drop(event)"></div>
        <br>
        <button class="btn-main" id="btnNextDrag" onclick="nextDrag()">Siguiente</button>
    </div>

    <div id="finalScreen">
        <h2>Evaluación Finalizada</h2>
        <p>Tu calificación es:</p>
        <div class="score-big" id="finalScoreDisplay">0.0</div>
        <p class="success-msg" id="statusMsg">Enviando calificación...</p>
        <p>Referencia del ejercicio: <b>ERG.1.1.1</b></p>
        <br>
        <button class="btn-main" onclick="window.location.href='tema11grammar.html'">Volver al Tema</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
        authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
        projectId: "portal-autenticacion-a1ngles",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ================= 10 PREGUNTAS SELECCIÓN MÚLTIPLE =================
    const questionsSelect = [
        {q: "Howdy!", opts: ["a) Hola","b) Adiós","c) Por favor","d) Lo siento"], a: "a) Hola"},
        {q: "I am John.", opts: ["a) Tú eres Juan.","b) Yo soy John.","c) Él es Juan.","d) Nosotros somos John."], a: "b) Yo soy John."},
        {q: "What is your name?", opts: ["a) ¿Dónde vives?","b) ¿Cómo estás?","c) ¿Cómo te llamas?","d) ¿Qué hora es?"], a: "c) ¿Cómo te llamas?"},
        {q: "Nice to meet you.", opts: ["a) Igualmente.","b) Mucho gusto en conocerte.","c) Hasta luego.","d) Buenos días."], a: "b) Mucho gusto en conocerte."},
        {q: "Welcome to class.", opts: ["a) Gracias por venir.","b) Bienvenidos a la clase.","c) Adiós clase.","d) Estudia mucho."], a: "b) Bienvenidos a la clase."},
        {q: "I am a student.", opts: ["a) Soy un profesor.","b) Soy un estudiante.","c) Soy un doctor.","d) Soy un padre."], a: "b) Soy un estudiante."},
        {q: "Good morning.", opts: ["a) Buenas noches.","b) Buenos días.","c) Buenas tardes.","d) Hola."], a: "b) Buenos días."},
        {q: "How are you?", opts: ["a) ¿Qué haces?","b) ¿Cómo estás?","c) ¿Quién eres?","d) ¿Por qué?"], a: "b) ¿Cómo estás?"},
        {q: "See you later.", opts: ["a) Hola de nuevo.","b) Nos vemos luego.","c) Quédate aquí.","d) Ven conmigo."], a: "b) Nos vemos luego."},
        {q: "Pleasure to meet you.", opts: ["a) Es un placer conocerte.","b) No te conozco.","c) Gracias por todo.","d) Hola, amigo."], a: "a) Es un placer conocerte."}
    ];

    // ================= 10 PREGUNTAS DRAG & DROP =================
    const questionsDrag = [
        ["My","name","is","Mark"],
        ["Nice","to","meet","you"],
        ["I","am","from","Canada"],
        ["What","is","your","name?"],
        ["How","are","you","today?"],
        ["It","is","a","pleasure"],
        ["I","am","a","teacher"],
        ["Where","are","you","from?"],
        ["Good","to","see","you"],
        ["I","am","very","well"]
    ];

    let currentSelectIdx = 0;
    let currentDragIdx = 0;
    let totalCorrect = 0;
    const totalQuestions = questionsSelect.length + questionsDrag.length;

    function updateProgress() {
        const currentNum = currentSelectIdx + (document.getElementById("section-drag").classList.contains("active") ? questionsSelect.length + currentDragIdx + 1 : currentSelectIdx + 1);
        document.getElementById("progressText").innerText = `Pregunta ${currentNum} de ${totalQuestions}`;
    }

    // --- SELECCIÓN MÚLTIPLE ---
    window.renderSelect = function() {
        const item = questionsSelect[currentSelectIdx];
        let html = `<p style='font-size:1.2rem;'>Traducción de: <b>"${item.q}"</b></p><select id="userSelect"><option value="">Selecciona una opción...</option>`;
        item.opts.forEach(o => html += `<option value="${o}">${o}</option>`);
        html += `</select>`;
        document.getElementById("selectQuestionContainer").innerHTML = html;
        updateProgress();
    }

    window.nextSelect = function() {
        const userAns = document.getElementById("userSelect").value;
        if (!userAns) return alert("Por favor, selecciona una respuesta.");
        if (userAns === questionsSelect[currentSelectIdx].a) totalCorrect++;
        
        currentSelectIdx++;
        if (currentSelectIdx < questionsSelect.length) {
            renderSelect();
        } else {
            document.getElementById("section-select").classList.remove("active");
            document.getElementById("section-drag").classList.add("active");
            renderDrag();
        }
    }

    // --- DRAG & DROP ---
    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    window.renderDrag = function() {
        const container = document.getElementById("dragWordsContainer");
        const blank = document.getElementById("sentenceBlank");
        container.innerHTML = "";
        blank.innerHTML = "";
        
        const shuffled = shuffle([...questionsDrag[currentDragIdx]]);
        shuffled.forEach(word => {
            const btn = document.createElement("button");
            btn.textContent = word;
            btn.className = "wordButton";
            btn.onclick = () => { blank.appendChild(btn); };
            container.appendChild(btn);
        });
        updateProgress();
        if (currentDragIdx === questionsDrag.length - 1) document.getElementById("btnNextDrag").textContent = "Finalizar Evaluación";
    }

    window.nextDrag = function() {
        const userOrder = [...document.getElementById("sentenceBlank").children].map(b => b.textContent);
        const correctOrder = questionsDrag[currentDragIdx];
        
        if (JSON.stringify(userOrder) === JSON.stringify(correctOrder)) totalCorrect++;

        currentDragIdx++;
        if (currentDragIdx < questionsDrag.length) {
            renderDrag();
        } else {
            finishQuiz();
        }
    }

    // --- FIREBASE ---
    async function finishQuiz() {
        document.getElementById("section-drag").classList.remove("active");
        document.getElementById("progressText").style.display = "none";
        const finalScreen = document.getElementById("finalScreen");
        finalScreen.style.display = "block";

        const codigoUnico = Math.random().toString(36).substr(2, 10).toUpperCase();
        const finalScore = ((totalCorrect / totalQuestions) * 10).toFixed(1);

        document.getElementById("finalScoreDisplay").textContent = finalScore;
        const statusMsg = document.getElementById("statusMsg");
        
        const user = auth.currentUser;
        if (user) {
            try {
                await addDoc(collection(db, "grades"), {
                    studentEmail: user.email.toLowerCase(),
                    exercise_id: "ERG.1.1.1",
                    certificate_code: codigoUnico, 
                    score: parseFloat(finalScore), 
                    timestamp: serverTimestamp()
                });
                statusMsg.innerHTML = `✅ ¡Calificación enviada! <br><span style="color:#333; font-size:14px;">Certificado: ${codigoUnico}</span>`;
            } catch (error) {
                statusMsg.textContent = "❌ Error al guardar.";
            }
        }
    }

    window.onload = () => { renderSelect(); };
</script>
</body>
</html>
