<!DOCTYPE html>
<html lang="es">
<head>
     <meta charset="UTF-8">
     <style>html { display: none; }</style>
     <script type="module" src="auth-guard.js"></script>
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>UCMI - Panel de Vigencia Operativa</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
     <style>
         :root { --dorado-ucmi: #c5a059; --purpura-neon: #bc13fe; --cian-tech: #00f2ff; }
         body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; overflow-x: hidden; }
         .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.95) 100%); min-height: 100vh; }
         .sidebar { background: rgba(255, 255, 255, 0.02) !important; backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.08); min-height: 100vh; padding: 30px 20px; position: sticky; top: 0; }
         .nav-link-custom { display: flex; align-items: center; padding: 12px 15px; color: rgba(255, 255, 255, 0.6); text-decoration: none; border-radius: 12px; font-size: 0.85rem; transition: all 0.3s; margin-bottom: 5px; }
         .nav-link-custom.active { background: rgba(188, 19, 254, 0.1); color: #d880ff; border: 1px solid rgba(188, 19, 254, 0.2); }
         .glass-panel { background: rgba(255, 255, 255, 0.03) !important; backdrop-filter: blur(25px) !important; border-radius: 35px; padding: 45px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); max-width: 1300px; margin: auto; }
         .table { --bs-table-bg: transparent !important; --bs-table-color: white !important; border-collapse: separate; border-spacing: 0 12px; }
         .table thead th { color: rgba(255,255,255,0.5); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2.5px; padding-bottom: 25px; border: none; }
         .table tbody tr { background: rgba(255, 255, 255, 0.03); border-radius: 15px; }
         .table tbody td { padding: 22px 15px; border: none; vertical-align: middle; }
         .progress { background-color: rgba(255, 255, 255, 0.1); height: 8px; border-radius: 10px; margin-bottom: 5px; }
         .progress-bar-neon { background: linear-gradient(90deg, var(--purpura-neon), var(--cian-tech)); box-shadow: 0 0 10px var(--cian-tech); }
         .status-badge { font-size: 0.65rem; padding: 6px 14px; border-radius: 8px; font-weight: 800; border: 1px solid #00ff8844; color: #00ff88; background: #00ff8811; }
         .email-badge { font-family: 'Courier New', monospace; color: var(--cian-tech); background: rgba(0, 242, 255, 0.1); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; border: 1px solid rgba(0, 242, 255, 0.2); }
         .btn-revocar { border: 1px solid rgba(255, 77, 77, 0.4); color: #ff4d4d; background: rgba(255, 77, 77, 0.05); padding: 8px 20px; border-radius: 12px; transition: 0.3s; }
         .btn-revocar:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex flex-column">
                <div class="brand-container text-center mb-4"><img src="logo-ucmi.png" alt="UCMI" style="width:100px;"></div>
                <nav class="nav flex-column mb-auto">
                    <a class="nav-link-custom" href="master-postulaciones.html"><i class="bi bi-person-badge me-2"></i> Solicitudes</a>
                    <a class="nav-link-custom active" href="master-vigencia.html"><i class="bi bi-clock-history me-2"></i> Vigencia</a>
                    <a class="nav-link-custom" href="master-usuarios.html"><i class="bi bi-people me-2"></i> Usuarios</a>
                    <a class="nav-link-custom" href="historial-postulaciones.html"><i class="bi bi-archive me-2"></i> Historial</a>
                    <a class="nav-link-custom" href="directorio.html"><i class="bi bi-journal-text me-2"></i> Directorio</a>
                    <a class="nav-link-custom" href="ofertas-academicas.html"><i class="bi bi-mortarboard me-2"></i> Ofertas</a>
                    <a class="nav-link-custom" href="master-repositorio.html"><i class="bi bi-grid-1x2 me-2"></i> Módulos</a>
                    <a class="nav-link-custom" href="papelera.html"><i class="bi bi-trash3 me-2"></i> Papelera</a>
                </nav>
                <button id="btnLogout" class="btn btn-outline-danger mt-3"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</button>
            </div>

            <div class="col-md-10 p-5">
                <div class="glass-panel">
                    <div class="d-flex justify-content-between mb-5">
                        <h3 class="fw-bold text-uppercase">Panel de Vigencia Operativa</h3>
                        <input type="text" id="inputBusqueda" class="form-control w-25 bg-transparent text-white border-secondary" placeholder="Buscar...">
                    </div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr><th>Responsable / Identificador</th><th>Nombre</th><th>Perfil</th><th>Activación</th><th>Cronología</th><th>Expiración</th><th>Remanente</th><th class="text-end">Operaciones</th></tr>
                            </thead>
                            <tbody id="listaVigencia"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325" }));
    
    let usuariosMaster = [];

    function renderizar(lista) {
        const contenedor = document.getElementById('listaVigencia');
        contenedor.innerHTML = '';
        const ahora = new Date();
        
        lista.forEach((data) => {
            const dateInicio = data.fechaActivacion?.toDate ? data.fechaActivacion.toDate() : new Date(data.fechaActivacion || ahora);
            const dateFin = data.expiracionTimestamp ? new Date(data.expiracionTimestamp) : ahora;
            const totalMs = Math.max(dateFin - dateInicio, 1);
            const transcurridoMs = ahora - dateInicio;
            let porcentaje = Math.min(Math.max(Math.floor((transcurridoMs / totalMs) * 100), 0), 100);
            const diasRestantes = Math.ceil((dateFin - ahora) / (1000 * 60 * 60 * 24));

            contenedor.innerHTML += `<tr>
                <td><div class="fw-bold">${data.entidad || 'Entidad'}</div><div class="email-badge">${data.email || 'N/A'}</div></td>
                <td class="small text-white">${data.nombreResponsable || '-'}</td>
                <td class="small text-info">${data.perfil || '-'}</td>
                <td class="small">${dateInicio.toLocaleDateString()}</td>
                <td style="width: 200px;">
                    <div class="progress"><div class="progress-bar progress-bar-neon" style="width: ${porcentaje}%"></div></div>
                    <div class="text-end" style="font-size: 0.65rem; color: var(--cian-tech);">${porcentaje}%</div>
                </td>
                <td class="small">${dateFin.toLocaleDateString()}</td>
                <td><span class="status-badge">${diasRestantes > 0 ? diasRestantes + ' DÍAS' : 'EXPIRADO'}</span></td>
                <td class="text-end"><button onclick="revocarAcceso('${data.id}')" class="btn btn-revocar">Revocar</button></td>
            </tr>`;
        });
    }

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        let rawDocs = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).filter(u => u.status !== "eliminado");
        const academiasMap = {};
        rawDocs.forEach(u => { if (u.expiracionTimestamp) academiasMap[u.entidad] = { exp: u.expiracionTimestamp, act: u.fechaActivacion }; });
        
        usuariosMaster = rawDocs.map(u => ({
            ...u,
            expiracionTimestamp: u.expiracionTimestamp || academiasMap[u.entidad]?.exp,
            fechaActivacion: u.fechaActivacion || academiasMap[u.entidad]?.act
        }));
        renderizar(usuariosMaster);
    });

    document.getElementById('inputBusqueda').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        renderizar(usuariosMaster.filter(u => (u.entidad+u.email+u.nombreResponsable).toLowerCase().includes(term)));
    });

    window.revocarAcceso = async (id) => {
        if((await Swal.fire({title: '¿Revocar acceso?', icon: 'warning', background: '#06090f', color: '#fff', showCancelButton: true})).isConfirmed) {
            await updateDoc(doc(db, "usuarios", id), { status: "eliminado" });
        }
    };

    document.getElementById('btnLogout').addEventListener('click', () => signOut(getAuth()).then(() => window.location.href = "index.html"));
</script>
</body>
</html>
