<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>html { display: none; }</style>
    <script type="module" src="auth-guard.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Vigencia Operativa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --cristal: rgba(255,255,255,0.05);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png')
            no-repeat center center fixed;
            background-size: cover;
        }

        /* WRAPPER */
        .wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* SIDEBAR (MÓDULOS UNIFICADO) */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(197,160,89,0.2);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
        }

        .sidebar-logo {
            width: 100px;
            margin: 0 auto 30px;
        }

        .sidebar-nav {
            flex-grow: 1;
        }

        .nav-item-ucmi {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 5px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .nav-item-ucmi i {
            margin-right: 12px;
        }

        .nav-item-ucmi:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            transform: translateX(5px);
        }

        .nav-item-ucmi.active {
            background: rgba(197,160,89,0.15);
            color: var(--dorado-ucmi);
        }

        .btn-maestro {
            display: block;
            text-align: center;
            padding: 10px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            text-decoration: none;
            font-size: 0.65rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .btn-cerrar {
            display: block;
            text-align: center;
            padding: 8px;
            border-radius: 50px;
            border: 1px solid rgba(231,76,60,0.4);
            color: rgba(231,76,60,0.9);
            text-decoration: none;
            font-size: 0.65rem;
        }

        /* MAIN */
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .glass-panel {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(25px);
            border-radius: 25px;
            padding: 40px;
        }

        .progress {
            height: 8px;
            background: rgba(255,255,255,0.1);
        }

        .progress-bar {
            background: linear-gradient(90deg, #bc13fe, #00f2ff);
        }

        .status-badge {
            font-size: 0.65rem;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(0,255,136,0.1);
            color: #00ff88;
        }

        .email-badge {
            font-size: 0.75rem;
            color: #00f2ff;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR UNIFICADO -->
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="sidebar-logo">

        <nav class="sidebar-nav">
            <a href="master-postulaciones.html" class="nav-item-ucmi">
                <i class="bi bi-person-badge"></i> SOLICITUDES
            </a>

            <a href="master-vigencia.html" class="nav-item-ucmi active">
                <i class="bi bi-shield-check"></i> VIGENCIA
            </a>

            <a href="master-usuarios.html" class="nav-item-ucmi">
                <i class="bi bi-people"></i> USUARIOS
            </a>

            <a href="historial-postulaciones.html" class="nav-item-ucmi">
                <i class="bi bi-clock-history"></i> HISTORIAL
            </a>

            <a href="directorio.html" class="nav-item-ucmi">
                <i class="bi bi-person-vcard"></i> DIRECTORIO
            </a>

            <a href="ofertas-academicas.html" class="nav-item-ucmi">
                <i class="bi bi-tags"></i> OFERTAS
            </a>

            <a href="master-repositorio.html" class="nav-item-ucmi">
                <i class="bi bi-grid-1x2"></i> MÓDULOS
            </a>

            <a href="papelera.html" class="nav-item-ucmi">
                <i class="bi bi-trash3"></i> PAPELERA
            </a>
        </nav>

        <div class="mt-auto">
            <a href="super-admin.html" class="btn-maestro">
                <i class="bi bi-cpu"></i> PANEL MAESTRO
            </a>

            <a href="#" id="btnLogout" class="btn-cerrar">
                <i class="bi bi-power"></i> CERRAR SESIÓN
            </a>
        </div>
    </aside>

    <!-- CONTENIDO VIGENCIA -->
    <main class="main-content">

        <div class="glass-panel">

            <div class="d-flex justify-content-between mb-4">
                <h3>Panel de Vigencia Operativa</h3>
                <input id="inputBusqueda" class="form-control w-25" placeholder="Buscar...">
            </div>

            <table class="table text-white">
                <thead>
                    <tr>
                        <th>Entidad</th>
                        <th>Nombre</th>
                        <th>Perfil</th>
                        <th>Inicio</th>
                        <th>Progreso</th>
                        <th>Expira</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="listaVigencia"></tbody>
            </table>

        </div>

    </main>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjHNs",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634"
});

const db = getFirestore(app);
const auth = getAuth(app);

let usuarios = [];

function render(data) {
    const tbody = document.getElementById("listaVigencia");
    tbody.innerHTML = "";

    const now = new Date();

    data.forEach(u => {

        const inicio = u.fechaActivacion?.toDate ? u.fechaActivacion.toDate() : new Date();
        const fin = new Date(u.expiracionTimestamp || now);

        const total = fin - inicio;
        const prog = Math.min(100, Math.max(0, ((now - inicio) / total) * 100));

        const dias = Math.ceil((fin - now) / (1000*60*60*24));

        tbody.innerHTML += `
        <tr>
            <td>${u.entidad}</td>
            <td>${u.nombreResponsable}</td>
            <td>${u.perfil}</td>
            <td>${inicio.toLocaleDateString()}</td>
            <td>
                <div class="progress">
                    <div class="progress-bar" style="width:${prog}%"></div>
                </div>
            </td>
            <td>${fin.toLocaleDateString()}</td>
            <td><span class="status-badge">${dias > 0 ? dias+" días" : "Expirado"}</span></td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="revocar('${u.id}')">Revocar</button>
            </td>
        </tr>`;
    });
}

onSnapshot(collection(db,"usuarios"), snap => {
    usuarios = snap.docs.map(d => ({id:d.id, ...d.data()}));
    render(usuarios);
});

window.revocar = async (id) => {
    await updateDoc(doc(db,"usuarios",id), {status:"eliminado"});
};

document.getElementById("btnLogout").onclick = async () => {
    await signOut(auth);
    location.href = "index.html";
};

document.getElementById("inputBusqueda").oninput = (e) => {
    const t = e.target.value.toLowerCase();
    render(usuarios.filter(u =>
        (u.entidad+u.nombreResponsable+u.email).toLowerCase().includes(t)
    ));
};
</script>

</body>
</html>
