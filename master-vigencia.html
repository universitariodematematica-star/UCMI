        --cian-tech: #00f2ff;

        overflow-x: hidden;

    .super-overlay {
        background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.95) 100%);
        min-height: 100vh;
    }

    /* --- SIDEBAR & NAVEGACIÓN --- */
    .sidebar {
        background: rgba(255, 255, 255, 0.02) !important;
        backdrop-filter: blur(20px) saturate(150%);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        min-height: 100vh;
        padding: 30px 20px; /* Ajustado para dar espacio al logo */
        position: sticky;
        top: 0;
    }

    /* Estilo para el contenedor del logo */
    .brand-container {
        text-align: center;
        margin-bottom: 35px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .brand-logo {
        width: 100px; /* Tamaño del logo en el sidebar */
        height: auto;
        filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.2));
        transition: 0.3s;
    }

    .brand-logo:hover {
        filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.5));
        transform: scale(1.05);
    }

    .nav-section-title {
        color: rgba(255, 255, 255, 0.3);
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 15px;
        padding-left: 10px;
    }

    .nav-link-custom {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        border-radius: 12px;
        font-size: 0.85rem;
        transition: all 0.3s ease;
        margin-bottom: 5px;
    }

    .nav-link-custom i { 
        font-size: 1.1rem; 
        margin-right: 12px; 
        width: 20px; 
        text-align: center; 
    }

    .nav-link-custom:hover {
        background: rgba(255, 255, 255, 0.05);
        color: var(--cian-tech);
        transform: translateX(5px);
    }

    .nav-link-custom.active {
        background: rgba(188, 19, 254, 0.1);
        color: #d880ff;
        border: 1px solid rgba(188, 19, 254, 0.2);
        box-shadow: 0 0 15px rgba(188, 19, 254, 0.1);
        text-shadow: 0 0 8px rgba(188, 19, 254, 0.6);
    }

    .btn-system-white {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #ffffff;
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-decoration: none;
        transition: all 0.3s ease;
        margin-top: 10px;
    }

    .btn-system-white:hover {
        background: rgba(255, 255, 255, 0.9);
        color: #000000;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
    }

    .btn-logout-custom {
        background: rgba(255, 77, 77, 0.05);
        border: 1px solid rgba(255, 77, 77, 0.2);
        color: #ff4d4d;
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: 0.3s;
        margin-top: 20px;
    }

    .btn-logout-custom:hover { 
        background: #ff4d4d; 
        color: white;
        box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
    }

    .glass-panel {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        backdrop-filter: blur(25px) !important;
        border-radius: 35px;
        padding: 45px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        max-width: 1300px;
        margin: auto;
    }

    .table {
        --bs-table-bg: transparent !important;
        --bs-table-color: white !important;
        border-collapse: separate;
        border-spacing: 0 12px;
    }

    .table thead th {
        border: none !important;
        color: rgba(255,255,255,0.5);
        text-transform: uppercase;
        font-size: 0.7rem;
        letter-spacing: 2.5px;
        padding-bottom: 25px;
    }

    .table tbody tr {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 15px;
    }

    .table tbody td {
        background: transparent !important;
        border: none !important;
        padding: 22px 15px;
        vertical-align: middle;
    }

    .progress { background-color: rgba(255, 255, 255, 0.1); height: 5px; border-radius: 10px; }
    .progress-bar-neon { background: linear-gradient(90deg, var(--purpura-neon), var(--cian-tech)); box-shadow: 0 0 12px rgba(0, 242, 255, 0.5); }
