<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Vigencia Operativa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        html { display: none; }
        :root { --dorado-ucmi: #c5a059; --purpura-neon: #bc13fe; --cian-tech: #00f2ff; }
        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; overflow-x: hidden;
        }
        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.95) 100%); min-height: 100vh; }
        .sidebar { background: rgba(255, 255, 255, 0.02) !important; backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.08); min-height: 100vh; padding: 30px 20px; position: sticky; top: 0; }
        .brand-logo { width: 100px; filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.2)); }
        .nav-link-custom { display: flex; align-items: center; padding: 12px 15px; color: rgba(255, 255, 255, 0.6); text-decoration: none; border-radius: 12px; font-size: 0.85rem; transition: 0.3s; margin-bottom: 5px; }
        .nav-link-custom:hover { background: rgba(255, 255, 255, 0.05); color: var(--cian-tech); }
        .nav-link-custom.active { background: rgba(188, 19, 254, 0.1); color: #d880ff; border: 1px solid rgba(188, 19, 254, 0.2); }
        .btn-logout-custom { background: rgba(255, 77, 77, 0.05); border: 1px solid rgba(255, 77, 77, 0.2); color: #ff4d4d; width: 100%; padding: 12px; border-radius: 12px; transition: 0.3s; margin-top: 20px; }
        .btn-logout-custom:hover { background: #ff4d4d; color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; backdrop-filter: blur(25px); border-radius: 35px; padding: 45px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); max-width: 1300px; margin: auto; }
        .table { --bs-table-bg: transparent !important; --bs-table-color: white !important; border-collapse: separate; border-spacing: 0 12px; }
        .progress { background-color: rgba(255, 255, 255, 0.1); height: 5px; border-radius: 10px; }
        .progress-bar-neon { background: linear-gradient(90deg, var(--purpura-neon), var(--cian-tech)); }
        .status-badge { font-size: 0.65rem; padding: 6px 14px; border-radius: 8px; font-weight: 800; border: 1px solid #00ff8844; color: #00ff88; background: #00ff8811; }
        .email-badge { font-family: 'Courier New', monospace; color: var(--cian-tech); background: rgba(0, 242, 255, 0.1); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; border: 1px solid rgba(0, 242, 255, 0.2); }
        .btn-revocar { border: 1px solid rgba(255, 77, 77, 0.4); color: #ff4d4d; background: rgba(255, 77, 77, 0.05); padding: 8px 20px; border-radius: 12px; }
        .btn-revocar:hover { background: #ff4d4d; color: white; }
    </style>
    <script type="module" src="auth-guard.js"></script>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex flex-column">
                <div class="brand-container text-center mb-4"><img src="logo-ucmi.png" alt="UCMI Logo" class="brand-logo"></div>
                <nav class="nav flex-column mb-auto">
                    <a class="nav-link-custom" href="master-postulaciones.html"><i class="bi bi-person-badge"></i> Solicitudes</a>
                    <a class="nav-link-custom active" href="master-vigencia.html"><i class="bi bi-clock-history"></i> Vigencia</a>
                    <button id="btnLogout" class="btn-logout-custom"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</button>
                </nav>
            </div>
            <div class="col-md-10 p-5">
                <div class="glass-panel">
                    <h3 class="fw-bold mb-5 text-uppercase" style="letter-spacing: 4px;">Panel de Vigencia Operativa</h3>
                    <div class="table-responsive">
                        <table class="table">
                            <thead><tr><th>Responsable</th><th>Inicio</th><th>Cronología</th><th>Expiración</th><th>Remanente</th><th class="text-end">Op.</th></tr></thead>
                            <tbody id="listaVigencia"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { /* TU CONFIG AQUÍ */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    function formatearFecha(valor) {
        if (!valor) return "N/A";
        const date = (valor?.toDate) ? valor.toDate() : new Date(valor);
        return date.toLocaleDateString('es-ES');
    }

    function renderizar(lista) {
        const contenedor = document.getElementById('listaVigencia');
        contenedor.innerHTML = lista.map(data => {
            const dateInicio = (data.fechaActivacion?.toDate) ? data.fechaActivacion.toDate() : new Date(data.fechaActivacion || Date.now());
            const dateFin = (data.expiracionTimestamp?.toDate) ? data.expiracionTimestamp.toDate() : new Date(data.expiracionTimestamp || Date.now());
            const ahora = new Date();
            const totalMs = dateFin - dateInicio;
            const transcurridoMs = ahora - dateInicio;
            let porcentaje = Math.min(Math.max(Math.floor((transcurridoMs / totalMs) * 100), 0), 100);
            const diasRestantes = Math.ceil((dateFin - ahora) / (1000 * 60 * 60 * 24));

            return `<tr>
                <td><div class="fw-bold">${data.entidad || 'Entidad'}</div><div class="email-badge">${data.email || ''}</div></td>
                <td>${formatearFecha(data.fechaActivacion)}</td>
                <td><div class="progress"><div class="progress-bar progress-bar-neon" style="width: ${porcentaje}%"></div></div></td>
                <td>${formatearFecha(data.expiracionTimestamp)}</td>
                <td><span class="status-badge">${diasRestantes > 0 ? diasRestantes + ' DÍAS' : 'EXPIRADO'}</span></td>
                <td class="text-end"><button onclick="revocarAcceso('${data.id}', '${data.entidad}')" class="btn btn-revocar">Revocar</button></td>
            </tr>`;
        }).join('');
    }

    async function cargarDatos() {
        const snap = await getDocs(collection(db, "academias"));
        const acadMap = {};
        snap.forEach(d => acadMap[d.id] = d.data());
        onSnapshot(collection(db, "usuarios"), (s) => {
            const lista = s.docs.map(d => ({id: d.id, ...d.data(), expiracionTimestamp: acadMap[d.data().entidadId]?.fechaVencimiento || d.data().expiracionTimestamp}))
                              .filter(u => u.status !== "eliminado");
            renderizar(lista);
        });
    }

    window.revocarAcceso = async (id, entidad) => {
        if ((await Swal.fire({title: '¿Revocar acceso?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Sí'})).isConfirmed) {
            await updateDoc(doc(db, "usuarios", id), {status: "eliminado", fechaEliminacion: serverTimestamp()});
        }
    };

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth).then(() => window.location.href = "index.html"));
    cargarDatos();
</script>
</body>
</html>
