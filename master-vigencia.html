<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>html { display: none; }</style>
    <script type="module" src="auth-guard.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Vigencia Operativa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { 
            --dorado-ucmi: #c5a059; 
            --cristal-claro: rgba(255, 255, 255, 0.05);
            --sidebar-width: 260px;
            --rojo-peligro: #e74c3c;
            --cian-tech: #00f2ff;
            --purpura-neon: #bc13fe;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, rgba(6, 9, 15, 0.7) 0%, rgba(6, 9, 15, 0.9) 100%);
            z-index: -1;
        }

        .wrapper {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR (COPIADO DEL DE MÓDULOS) */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(197,160,89,0.2);
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
        }

        .sidebar-logo {
            width: 100px;
            margin: 0 auto 30px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 10px;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .sidebar-nav a i {
            margin-right: 12px;
        }

        .sidebar-nav a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .sidebar-nav a.active {
            background: rgba(197,160,89,0.15);
            color: var(--dorado-ucmi);
        }

        .btn-maestro {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 50px;
            font-size: 0.65rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .btn-cerrar {
            background: transparent;
            border: 1px solid rgba(231,76,60,0.4);
            color: rgba(231,76,60,0.9);
            padding: 8px;
            text-align: center;
            border-radius: 50px;
            font-size: 0.65rem;
        }

        /* CONTENIDO */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .glass-panel {
            background: var(--cristal-claro);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
        }

        .progress {
            height: 8px;
            background: rgba(255,255,255,0.1);
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--purpura-neon), var(--cian-tech));
        }

        .status-badge {
            background: rgba(0,255,136,0.1);
            color: #00ff88;
            border: 1px solid rgba(0,255,136,0.3);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
        }

        .email-badge {
            font-family: monospace;
            color: var(--cian-tech);
        }
    </style>
</head>

<body>
<div class="overlay"></div>

<div class="wrapper">

    <!-- SIDEBAR UNIFICADO -->
    <aside class="sidebar">
        <img src="logo-ucmi.png" class="sidebar-logo">

        <nav class="sidebar-nav">
            <a href="master-postulaciones.html"><i class="bi bi-person-badge"></i> Solicitudes</a>
            <a href="master-vigencia.html" class="active"><i class="bi bi-shield-check"></i> Vigencia</a>
            <a href="master-usuarios.html"><i class="bi bi-people"></i> Usuarios</a>
            <a href="historial-postulaciones.html"><i class="bi bi-clock-history"></i> Historial</a>
            <a href="directorio.html"><i class="bi bi-person-vcard"></i> Directorio</a>
            <a href="ofertas-academicas.html"><i class="bi bi-tags"></i> Ofertas</a>
            <a href="master-repositorio.html"><i class="bi bi-grid-1x2"></i> Módulos</a>
            <a href="papelera.html"><i class="bi bi-trash3"></i> Papelera</a>
        </nav>

        <div class="mt-auto">
            <button id="btnLogout" class="btn-cerrar w-100">Cerrar sesión</button>
        </div>
    </aside>

    <!-- CONTENIDO -->
    <main class="main-content">

        <div class="glass-panel">
            <div class="d-flex justify-content-between mb-4">
                <h4>Vigencia Operativa</h4>
                <input id="inputBusqueda" class="form-control w-25 bg-transparent text-white" placeholder="Buscar...">
            </div>

            <div class="table-responsive">
                <table class="table text-white">
                    <thead>
                        <tr>
                            <th>Entidad</th>
                            <th>Nombre</th>
                            <th>Perfil</th>
                            <th>Inicio</th>
                            <th>Progreso</th>
                            <th>Fin</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="listaVigencia"></tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
});

const db = getFirestore(app);
const auth = getAuth(app);

let dataGlobal = [];

function render(data){
    const now = new Date();
    const tbody = document.getElementById("listaVigencia");
    tbody.innerHTML = "";

    data.forEach(u => {

        const ini = u.fechaActivacion?.toDate ? u.fechaActivacion.toDate() : new Date(u.fechaActivacion);
        const fin = new Date(u.expiracionTimestamp);

        const total = fin - ini;
        const prog = Math.min(100, Math.max(0, ((now - ini) / total) * 100));
        const dias = Math.ceil((fin - now) / (1000*60*60*24));

        tbody.innerHTML += `
        <tr>
            <td>${u.entidad}<div class="email-badge">${u.email}</div></td>
            <td>${u.nombreResponsable}</td>
            <td>${u.perfil}</td>
            <td>${ini.toLocaleDateString()}</td>
            <td style="width:200px">
                <div class="progress">
                    <div class="progress-bar" style="width:${prog}%"></div>
                </div>
            </td>
            <td>${fin.toLocaleDateString()}</td>
            <td><span class="status-badge">${dias>0?dias+" días":"EXPIRADO"}</span></td>
            <td><button onclick="revocar('${u.id}')" class="btn btn-danger btn-sm">Revocar</button></td>
        </tr>`;
    });
}

onSnapshot(collection(db,"usuarios"), snap=>{
    dataGlobal = snap.docs.map(d=>({id:d.id,...d.data()}));
    render(dataGlobal);
});

window.revocar = async (id)=>{
    const ok = await Swal.fire({title:"¿Revocar?", showCancelButton:true});
    if(ok.isConfirmed){
        await updateDoc(doc(db,"usuarios",id),{status:"eliminado"});
    }
};

document.getElementById("inputBusqueda").oninput = e=>{
    const t = e.target.value.toLowerCase();
    render(dataGlobal.filter(u =>
        (u.entidad+u.email+u.nombreResponsable).toLowerCase().includes(t)
    ));
};

document.getElementById("btnLogout").onclick = ()=> signOut(auth).then(()=>location.href="index.html");

</script>

</body>
</html>
