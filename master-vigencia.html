        /* ===== CONTENIDO ===== */

<body>

<div class="overlay"></div>

<div class="wrapper">

    <!-- ===== SIDEBAR INTEGRADO ===== -->
    <aside class="sidebar">
        <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="sidebar-logo">

        <nav class="sidebar-nav">

            </a>
            <a href="master-usuarios.html" class="nav-item-ucmi">
                <i class="bi bi-people"></i> USUARIOS
            </a>
            <a href="historial-postulaciones.html" class="nav-item-ucmi">
                <i class="bi bi-clock-history"></i> HISTORIAL
            </a>
            <a href="directorio.html" class="nav-item-ucmi">
                <i class="bi bi-person-vcard"></i> DIRECTORIO
            </a>
            <a href="ofertas-academicas.html" class="nav-item-ucmi">
                <i class="bi bi-tags"></i> OFERTAS

            <a href="master-repositorio.html" class="nav-item-ucmi">
                <i class="bi bi-grid-1x2"></i> MÓDULOS
            </a>
            <a href="papelera.html" class="nav-item-ucmi">
                <i class="bi bi-trash3"></i> PAPELERA
            </a>
        </nav>

        <div class="mt-auto pt-3">
            <a href="super-admin.html" class="btn-maestro">
                <i class="bi bi-cpu"></i> PANEL MAESTRO
            </a>
            <a href="#" id="btnLogout" class="btn-cerrar">
                <i class="bi bi-power"></i> CERRAR SESIÓN
            </a>
        </div>
    </aside>

    <!-- ===== CONTENIDO ===== -->
    <main class="main-content">

        <div class="glass-panel">

            <div class="d-flex justify-content-between mb-4">
                <h3 class="fw-bold text-uppercase">Panel de Vigencia Operativa</h3>

                <input type="text"
                       id="inputBusqueda"
                       class="form-control w-25 bg-transparent text-white border-secondary"
                       placeholder="Buscar...">
            </div>

            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Entidad</th>
                            <th>Nombre</th>
                            <th>Perfil</th>
                            <th>Activación</th>
                            <th>Progreso</th>
                            <th>Expiración</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="listaVigencia"></tbody>
                </table>
            </div>

        </div>

    </main>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634"
});

const db = getFirestore(app);
const auth = getAuth(app);

document.getElementById("btnLogout").onclick = () =>
    signOut(auth).then(() => window.location.href = "index.html");

let usuariosMaster = [];

function renderizar(lista) {
    const cont = document.getElementById("listaVigencia");
    cont.innerHTML = "";

    const ahora = new Date();

    lista.forEach(u => {

        const inicio = u.fechaActivacion?.toDate
            ? u.fechaActivacion.toDate()
            : new Date(u.fechaActivacion || ahora);

        const fin = u.expiracionTimestamp
    ? new Date(u.expiracionTimestamp)
    : ahora;

        const total = Math.max(fin - inicio, 1);
        const trans = ahora - inicio;

        const porcentaje = Math.min(Math.max((trans / total) * 100, 0), 100);

        const dias = Math.ceil((fin - ahora) / 86400000);

        cont.innerHTML += `
            <tr>
                <td>${u.entidad || "-"}</td>
                <td>${u.nombreResponsable || "-"}</td>
                <td>${u.perfil || "-"}</td>
                <td>${inicio.toLocaleDateString()}</td>
                <td style="width:200px">
                    <div class="progress">
                        <div class="progress-bar" style="width:${porcentaje}%"></div>
                    </div>
                    <small>${Math.floor(porcentaje)}%</small>
                </td>
                <td>${fin.toLocaleDateString()}</td>
                <td>
                    <span class="status-badge">
                        ${dias > 0 ? dias + " días" : "Expirado"}
                    </span>
                </td>
            </tr>
        `;
    });
}

onSnapshot(collection(db, "usuarios"), (snapshot) => {

    let rawDocs = snapshot.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(u => u.status !== "eliminado");

    const academiasMap = {};

    rawDocs.forEach(u => {

        if (u.expiracionTimestamp) {

            academiasMap[u.entidad] = {
                exp: u.expiracionTimestamp,
                act: u.fechaActivacion
            };

        }

    });

    usuariosMaster = rawDocs.map(u => ({
        ...u,

        expiracionTimestamp:
            u.expiracionTimestamp ||
            academiasMap[u.entidad]?.exp,

        fechaActivacion:
            u.fechaActivacion ||
            academiasMap[u.entidad]?.act
    }));

    renderizar(usuariosMaster);

});

document.getElementById("inputBusqueda").addEventListener("input", e => {
    const t = e.target.value.toLowerCase();
    renderizar(
        usuariosMaster.filter(u =>
            (u.entidad + u.nombreResponsable + u.perfil)
            .toLowerCase()
            .includes(t)
        )
    );
});
</script>

</body>
