<style>

    --rojo-peligro: #e74c3c;

<div class="overlay"></div>

<div class="wrapper">

<!-- SIDEBAR (MÓDULOS) -->

    <img src="logo-ucmi.png" class="sidebar-logo">

    <a class="nav-item-ucmi" href="master-postulaciones.html">

    <a class="nav-item-ucmi active" href="master-vigencia.html">
        <i class="bi bi-shield-check"></i> VIGENCIA
    </a>

    <a class="nav-item-ucmi" href="master-usuarios.html">
        <i class="bi bi-people"></i> USUARIOS
    </a>

    <a class="nav-item-ucmi" href="historial-postulaciones.html">

    </a>

    <a class="nav-item-ucmi" href="directorio.html">

    </a>

    <a class="nav-item-ucmi" href="ofertas-academicas.html">

    </a>

    </a>

    <a href="super-admin.html" class="btn-maestro">
        <i class="bi bi-cpu"></i> PANEL MAESTRO
    </a>

    <a href="#" id="btnLogout" class="btn-cerrar">
        <i class="bi bi-power"></i> CERRAR SESIÓN
    </a>

</aside>

<!-- MAIN -->
<main class="main">

<div class="glass">

    <div class="d-flex justify-content-between mb-4">
        <h3>Panel de Vigencia Operativa</h3>
        <input id="inputBusqueda" class="form-control w-25 bg-transparent text-white border-secondary" placeholder="Buscar...">
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Entidad</th>
                <th>Nombre</th>
                <th>Perfil</th>
                <th>Inicio</th>
                <th>Progreso</th>
                <th>Fin</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="listaVigencia"></tbody>
    </table>

</div>

</main>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634"
});

const db = getFirestore(app);
const auth = getAuth(app);

let usuarios = [];

function render(data){
    const now = new Date();
    const tbody = document.getElementById("listaVigencia");
    tbody.innerHTML = "";

    data.forEach(u => {

        const ini = u.fechaActivacion?.toDate ? u.fechaActivacion.toDate() : new Date(u.fechaActivacion || now);
        const fin = new Date(u.expiracionTimestamp || now);

        const total = Math.max(fin - ini,1);
        const prog = Math.min(Math.max((now-ini)/total*100,0),100);

        const dias = Math.ceil((fin-now)/86400000);

        tbody.innerHTML += `
        <tr>
            <td>${u.entidad || "-"}</td>
            <td>${u.nombreResponsable || "-"}</td>
            <td>${u.perfil || "-"}</td>
            <td>${ini.toLocaleDateString()}</td>
            <td style="width:200px">
                <div class="progress">
                    <div class="progress-bar" style="width:${prog}%"></div>
                </div>
                <small>${Math.floor(prog)}%</small>
            </td>
            <td>${fin.toLocaleDateString()}</td>
            <td><span class="badge">${dias>0?dias+" días":"Expirado"}</span></td>
            <td><button class="btn btn-danger btn-sm" onclick="revocar('${u.id}')">Revocar</button></td>
        </tr>`;
    });
}

onSnapshot(collection(db,"usuarios"), snap=>{
    usuarios = snap.docs.map(d=>({id:d.id,...d.data()}));
    render(usuarios);
});

document.getElementById("inputBusqueda").addEventListener("input",e=>{
    const t=e.target.value.toLowerCase();
    render(usuarios.filter(u =>
        (u.entidad+u.nombreResponsable+u.perfil).toLowerCase().includes(t)
    ));
});

window.revocar = async(id)=>{
    await updateDoc(doc(db,"usuarios",id),{status:"eliminado"});
};

document.getElementById("btnLogout").onclick = ()=>signOut(auth).then(()=>location.href="index.html");
</script>

</body>
</html>
