<head>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

     <style>
         :root {
             --dorado-ucmi: #c5a059;
             --purpura-neon: #bc13fe;
             --cian-tech: #00f2ff;
         }

         body {
             background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
             background-size: cover;
             font-family: 'Segoe UI', sans-serif;
             color: white;
             margin: 0;
             overflow-x: hidden;
         }

         .super-overlay {
             background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.95) 100%);
             min-height: 100vh;
         }

         .sidebar {
             background: rgba(255, 255, 255, 0.02) !important;
             backdrop-filter: blur(20px) saturate(150%);
             -webkit-backdrop-filter: blur(20px) saturate(150%);
             border-right: 1px solid rgba(255, 255, 255, 0.08);
             min-height: 100vh;
             padding: 30px 20px;
             position: sticky;
             top: 0;
         }

         .brand-logo { width: 100px; height: auto; transition: 0.3s; }
         .nav-link-custom { display: flex; align-items: center; padding: 12px 15px; color: rgba(255, 255, 255, 0.6); text-decoration: none; border-radius: 12px; font-size: 0.85rem; transition: all 0.3s ease; margin-bottom: 5px; }
         .nav-link-custom:hover { background: rgba(255, 255, 255, 0.05); color: var(--cian-tech); transform: translateX(5px); }
         .nav-link-custom.active { background: rgba(188, 19, 254, 0.1); color: #d880ff; border: 1px solid rgba(188, 19, 254, 0.2); }
         
         .glass-panel { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; backdrop-filter: blur(25px) !important; border-radius: 35px; padding: 45px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); max-width: 1300px; margin: auto; }
         
         .table { --bs-table-bg: transparent !important; --bs-table-color: white !important; border-collapse: separate; border-spacing: 0 12px; }
         .table thead th { border: none !important; color: rgba(255,255,255,0.5); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2.5px; padding-bottom: 25px; }
         .table tbody tr { background: rgba(255, 255, 255, 0.03); border-radius: 15px; }
         .table tbody td { background: transparent !important; border: none !important; padding: 22px 15px; vertical-align: middle; }
         
         .progress { background-color: rgba(255, 255, 255, 0.1); height: 5px; border-radius: 10px; }
         .progress-bar-neon { background: linear-gradient(90deg, var(--purpura-neon), var(--cian-tech)); box-shadow: 0 0 12px rgba(0, 242, 255, 0.5); }
         .status-badge { font-size: 0.65rem; padding: 6px 14px; border-radius: 8px; font-weight: 800; border: 1px solid #00ff8844; color: #00ff88; background: #00ff8811; }
         .email-badge { font-family: 'Courier New', monospace; color: var(--cian-tech); background: rgba(0, 242, 255, 0.1); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; border: 1px solid rgba(0, 242, 255, 0.2); }
         .btn-revocar { border: 1px solid rgba(255, 77, 77, 0.4); color: #ff4d4d; background: rgba(255, 77, 77, 0.05); border-radius: 12px; font-size: 0.8rem; padding: 8px 20px; transition: 0.3s; }
         .btn-revocar:hover { background: #ff4d4d; color: white; }
         .btn-logout-custom { background: rgba(255, 77, 77, 0.05); border: 1px solid rgba(255, 77, 77, 0.2); color: #ff4d4d; width: 100%; padding: 12px; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex flex-column">
                <div class="brand-container"><img src="logo-ucmi.png" alt="UCMI Logo" class="brand-logo"></div>
                <nav class="nav flex-column mb-auto">
                    <p class="nav-section-title">Protocolos</p>
                    <a class="nav-link-custom" href="master-postulaciones.html"><i class="bi bi-person-badge"></i> Solicitudes</a>
                    <a class="nav-link-custom active" href="master-vigencia.html"><i class="bi bi-clock-history"></i> Vigencia</a>
                    <a class="nav-link-custom" href="master-usuarios.html"><i class="bi bi-people"></i> Usuarios</a>
                    <a class="nav-link-custom" href="historial-postulaciones.html"><i class="bi bi-archive"></i> Historial</a>
                    <a class="nav-link-custom" href="directorio.html"><i class="bi bi-journal-text"></i> Directorio</a>
                    <a class="nav-link-custom" href="ofertas-academicas.html"><i class="bi bi-mortarboard"></i> Ofertas</a>
                    <a class="nav-link-custom" href="master-repositorio.html"><i class="bi bi-grid-1x2"></i> Módulos</a>
                    <a class="nav-link-custom" href="papelera.html"><i class="bi bi-trash3"></i> Papelera</a>
                    <p class="nav-section-title mt-4">Sistema</p>
                    <a href="super-admin.html" class="btn-system-white"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
                </nav>
                <button id="btnLogout" class="btn-logout-custom"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</button>
            </div>

            <div class="col-md-10 p-5">
                <div class="glass-panel">
                    <div class="d-flex justify-content-between align-items-center mb-5">
                        <h3 class="fw-bold m-0 text-uppercase" style="letter-spacing: 4px;">Panel de Vigencia Operativa</h3>
                        <input type="text" id="inputBusqueda" class="form-control w-25 bg-transparent text-white border-secondary" placeholder="Buscar...">
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Responsable / Identificador</th>
                                    <th>Nombre</th>
                                    <th>Perfil</th>
                                    <th>Activación</th>
                                    <th style="width: 20%;">Cronología</th>
                                    <th>Expiración</th>
                                    <th>Remanente</th>
                                    <th class="text-end">Operaciones</th>
                                </tr>
                            </thead>
                            <tbody id="listaVigencia"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let usuariosMaster = [];

    function formatearFechaInicio(valor) {
        if (!valor) return "Sin fecha";
        try {
            let fechaObj = (valor && typeof valor.toDate === 'function') ? valor.toDate() : (valor instanceof Date ? valor : null);
            if (fechaObj) {
                return `${String(fechaObj.getDate()).padStart(2, '0')}/${String(fechaObj.getMonth() + 1).padStart(2, '0')}/${fechaObj.getFullYear()}`;
            }
            return valor;
        } catch (e) { return "Error"; }
    }

    function obtenerDateValido(valor) {
        if (!valor) return new Date();
        if (valor && typeof valor.toDate === 'function') return valor.toDate();
        return valor instanceof Date ? valor : new Date();
    }

    function renderizar(lista) {
        const contenedor = document.getElementById('listaVigencia');
        contenedor.innerHTML = '';
        lista.forEach((data) => {
            const id = data.id;
            const fechaInicioTexto = formatearFechaInicio(data.fechaActivacion);
            const dateInicio = obtenerDateValido(data.fechaActivacion);
            const dateFin = data.expiracionTimestamp ? new Date(data.expiracionTimestamp) : new Date();
            const ahora = new Date();
            const totalMs = dateFin - dateInicio;
            const transcurridoMs = ahora - dateInicio;
            let porcentaje = Math.min(Math.max(Math.floor((transcurridoMs / totalMs) * 100) || 0, 0), 100);
            const diasRestantes = Math.ceil((dateFin - ahora) / (1000 * 60 * 60 * 24));

            contenedor.innerHTML += `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="p-2 rounded-circle bg-opacity-10 bg-info me-3" style="border: 1px solid #00f2ff55"><i class="bi bi-person-badge-fill text-info fs-5"></i></div>
                            <div>
                                <div class="fw-bold text-white mb-1">${data.entidad || 'Entidad'}</div>
                                <div class="email-badge">${data.email || id}</div>
                            </div>
                        </div>
                    </td>
                    <td class="text-white small">${data.nombreResponsable || 'Sin nombre'}</td>
                    <td class="text-info small">${data.perfil || 'N/A'}</td>
                    <td><div class="text-white-50 small">FECHA INICIO:</div><div class="fw-bold small text-white">${fechaInicioTexto}</div></td>
                    <td>
                        <div class="progress mb-2"><div class="progress-bar progress-bar-neon" style="width: ${porcentaje}%"></div></div>
                        <div class="d-flex justify-content-between" style="font-size: 0.6rem;"><span class="text-white-50">CONSUMO</span><span class="text-info fw-bold">${porcentaje}%</span></div>
                    </td>
                    <td><div class="text-white-50 small">VENCE EN:</div><div class="fw-bold text-info small">${dateFin.toLocaleDateString()}</div></td>
                    <td><span class="status-badge">${diasRestantes > 0 ? diasRestantes + ' DÍAS' : 'EXPIRADO'}</span></td>
                    <td class="text-end">
                        <button onclick="revocarAcceso('${id}', '${data.entidad || 'Usuario'}')" class="btn btn-revocar"><i class="bi bi-trash3-fill me-2"></i>Revocar</button>
                    </td>
                </tr>`;
        });
    }

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        let datos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(u => u.status !== "eliminado");
        usuariosMaster = datos;
        renderizar(usuariosMaster);
    });

    window.revocarAcceso = async (id, entidad) => {
        const confirm = await Swal.fire({ title: '¿REVOCAR ACCESO?', icon: 'warning', background: '#06090f', color: '#fff', showCancelButton: true, confirmButtonColor: '#ff4d4d', confirmButtonText: 'Sí, revocar' });
        if (confirm.isConfirmed) {
            await updateDoc(doc(db, "usuarios", id), { status: "eliminado", fechaEliminacion: serverTimestamp() });
        }
    };

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth).then(() => window.location.href = "index.html"));
</script>
</body>
</html>
