<!DOCTYPE html>
<html lang="es">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>UCMI - Panel de Vigencia Operativa</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

     <style>
         :root {
             --purpura-neon: #bc13fe;
             --cian-tech: #00f2ff;
         }

         body {
             background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
             background-size: cover;
             font-family: 'Segoe UI', sans-serif;
             color: white;
             margin: 0;
         }

         .overlay {
             background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.95) 100%);
             min-height: 100vh;
             padding: 40px;
         }

         .glass-panel {
             background: rgba(255, 255, 255, 0.03);
             backdrop-filter: blur(25px);
             border-radius: 30px;
             padding: 40px;
             box-shadow: 0 30px 60px rgba(0,0,0,0.7);
             max-width: 1200px;
             margin: auto;
         }

         .table {
             --bs-table-bg: transparent;
             --bs-table-color: white;
             border-collapse: separate;
             border-spacing: 0 12px;
         }

         .table tbody tr {
             background: rgba(255,255,255,0.03);
             border-radius: 12px;
         }

         .progress {
             background: rgba(255,255,255,0.1);
             height: 8px;
         }

         .progress-bar {
             background: linear-gradient(90deg, var(--purpura-neon), var(--cian-tech));
         }

         .status-badge {
             font-size: 0.7rem;
             padding: 6px 12px;
             border-radius: 8px;
             background: rgba(0,255,136,0.1);
             border: 1px solid rgba(0,255,136,0.3);
             color: #00ff88;
         }
     </style>
</head>

<body>
<div class="overlay">

    <div class="glass-panel">

        <div class="d-flex justify-content-between mb-4">
            <h3 class="fw-bold text-uppercase">Panel de Vigencia Operativa</h3>

            <input type="text"
                   id="inputBusqueda"
                   class="form-control w-25 bg-transparent text-white border-secondary"
                   placeholder="Buscar...">
        </div>

        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Entidad</th>
                        <th>Nombre</th>
                        <th>Perfil</th>
                        <th>Activación</th>
                        <th>Progreso</th>
                        <th>Expiración</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="listaVigencia"></tbody>
            </table>
        </div>

    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634"
});

const db = getFirestore(app);

let usuariosMaster = [];

function renderizar(lista) {
    const contenedor = document.getElementById("listaVigencia");
    contenedor.innerHTML = "";

    const ahora = new Date();

    lista.forEach(u => {

        const inicio = u.fechaActivacion?.toDate
            ? u.fechaActivacion.toDate()
            : new Date(u.fechaActivacion || ahora);

        const fin = u.expiracionTimestamp
            ? new Date(u.expiracionTimestamp)
            : ahora;

        const total = Math.max(fin - inicio, 1);
        const trans = ahora - inicio;

        const porcentaje = Math.min(Math.max((trans / total) * 100, 0), 100);

        const dias = Math.ceil((fin - ahora) / 86400000);

        contenedor.innerHTML += `
            <tr>
                <td>${u.entidad || "-"}</td>
                <td>${u.nombreResponsable || "-"}</td>
                <td>${u.perfil || "-"}</td>
                <td>${inicio.toLocaleDateString()}</td>

                <td style="width:200px">
                    <div class="progress">
                        <div class="progress-bar" style="width:${porcentaje}%"></div>
                    </div>
                    <small>${Math.floor(porcentaje)}%</small>
                </td>

                <td>${fin.toLocaleDateString()}</td>

                <td>
                    <span class="status-badge">
                        ${dias > 0 ? dias + " días" : "Expirado"}
                    </span>
                </td>
            </tr>
        `;
    });
}

onSnapshot(collection(db, "usuarios"), (snap) => {
    usuariosMaster = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderizar(usuariosMaster);
});

document.getElementById("inputBusqueda").addEventListener("input", e => {
    const t = e.target.value.toLowerCase();
    renderizar(
        usuariosMaster.filter(u =>
            (u.entidad + u.nombreResponsable + u.perfil)
            .toLowerCase()
            .includes(t)
        )
    );
});
</script>

</body>
</html>
