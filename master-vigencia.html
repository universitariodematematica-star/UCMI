<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>html { display: none; }</style>
    <script type="module" src="auth-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Vigencia Operativa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --dorado-ucmi: #c5a059; --purpura-neon: #bc13fe; --cian-tech: #00f2ff; }
        body { background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.95) 100%); min-height: 100vh; }
        .sidebar { background: rgba(255, 255, 255, 0.02) !important; backdrop-filter: blur(20px) saturate(150%); border-right: 1px solid rgba(255, 255, 255, 0.08); min-height: 100vh; padding: 30px 20px; }
        .nav-link-custom { display: flex; align-items: center; padding: 12px 15px; color: rgba(255, 255, 255, 0.6); text-decoration: none; border-radius: 12px; font-size: 0.85rem; transition: all 0.3s; margin-bottom: 5px; }
        .nav-link-custom:hover, .nav-link-custom.active { background: rgba(255, 255, 255, 0.05); color: var(--cian-tech); }
        .glass-panel { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; backdrop-filter: blur(25px) !important; border-radius: 35px; padding: 45px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
        .table { --bs-table-bg: transparent !important; --bs-table-color: white !important; }
        .email-badge { font-family: 'Courier New', monospace; color: var(--cian-tech); background: rgba(0, 242, 255, 0.1); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; }
        .btn-revocar { border: 1px solid rgba(255, 77, 77, 0.4); color: #ff4d4d; background: rgba(255, 77, 77, 0.05); border-radius: 12px; padding: 8px 20px; }
        .btn-revocar:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex flex-column">
                <div class="brand-container text-center mb-4"><img src="logo-ucmi.png" alt="UCMI" style="width: 100px;"></div>
                <nav class="nav flex-column mb-auto">
                    <a class="nav-link-custom active" href="master-vigencia.html"><i class="bi bi-clock-history me-2"></i> Vigencia</a>
                    <a class="nav-link-custom" href="master-usuarios.html"><i class="bi bi-people me-2"></i> Usuarios</a>
                    </nav>
                <button id="btnLogout" class="btn-logout-custom btn btn-outline-danger mt-3">Cerrar Sesión</button>
            </div>
            <div class="col-md-10 p-5">
                <div class="glass-panel">
                    <input type="text" id="inputBusqueda" class="form-control bg-transparent text-white mb-4" placeholder="Buscar...">
                    <table class="table">
                        <thead><tr><th>Responsable</th><th>Activación</th><th>Expiración</th><th>Operaciones</th></tr></thead>
                        <tbody id="listaVigencia"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let usuariosMaster = [];

    function renderizar(lista) {
        const contenedor = document.getElementById('listaVigencia');
        contenedor.innerHTML = '';
        lista.forEach(u => {
            contenedor.innerHTML += `<tr>
                <td>${u.entidad || 'Sin nombre'} <br><span class="email-badge">${u.email || ''}</span></td>
                <td>${u.fechaActivacion ? new Date(u.fechaActivacion.seconds * 1000).toLocaleDateString() : 'N/A'}</td>
                <td>${u.expiracionTimestamp ? new Date(u.expiracionTimestamp).toLocaleDateString() : 'N/A'}</td>
                <td><button onclick="revocarAcceso('${u.id}', '${u.entidad}')" class="btn btn-revocar">Revocar</button></td>
            </tr>`;
        });
    }

    onSnapshot(collection(db, "usuarios"), (snapshot) => {
        usuariosMaster = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(u => u.status !== "eliminado");
        console.log("Usuarios cargados:", usuariosMaster.length);
        renderizar(usuariosMaster);
    });

    window.revocarAcceso = async (id, entidad) => {
        const userRef = doc(db, "usuarios", id);
        await updateDoc(userRef, { status: "eliminado", fechaEliminacion: serverTimestamp() });
        Swal.fire('Revocado', 'Usuario movido a papelera', 'success');
    };

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth).then(() => window.location.href = "index.html"));
</script>
</body>
</html>
