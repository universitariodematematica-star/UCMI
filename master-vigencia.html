<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
});

const db = getFirestore(app);

/* ===== lógica igual a la tuya ===== */
let usuariosMaster = [];

function renderizar(lista){
    const cont = document.getElementById("listaVigencia");
    cont.innerHTML = "";

    const ahora = new Date();

    lista.forEach(data => {

        const ini = data.fechaActivacion?.toDate ? data.fechaActivacion.toDate() : new Date(data.fechaActivacion || ahora);
        const fin = data.expiracionTimestamp ? new Date(data.expiracionTimestamp) : ahora;

        const total = Math.max(fin - ini, 1);
        const prog = Math.min(Math.max(((ahora - ini) / total) * 100, 0), 100);

        const dias = Math.ceil((fin - ahora)/(1000*60*60*24));

        cont.innerHTML += `
        <tr>
            <td><b>${data.entidad}</b><br><small>${data.email}</small></td>
            <td>${data.nombreResponsable}</td>
            <td>${data.perfil}</td>
            <td>${ini.toLocaleDateString()}</td>
            <td style="width:200px;">
                <div class="progress">
                    <div class="progress-bar" style="width:${prog}%"></div>
                </div>
            </td>
            <td>${fin.toLocaleDateString()}</td>
            <td>${dias>0?dias+" días":"EXPIRADO"}</td>
            <td class="text-end">
                <button class="btn btn-danger btn-sm">Revocar</button>
            </td>
        </tr>`;
    });
}

onSnapshot(collection(db,"usuarios"), snap=>{
    usuariosMaster = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderizar(usuariosMaster);
});

document.getElementById("inputBusqueda").addEventListener("input", e=>{
    const t = e.target.value.toLowerCase();
    renderizar(usuariosMaster.filter(u =>
        (u.entidad+u.email+u.nombreResponsable).toLowerCase().includes(t)
    ));
});

document.getElementById("btnLogout").onclick = () =>
    signOut(getAuth()).then(()=>location.href="index.html");

</script>
