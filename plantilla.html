<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantilla UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
        }
        body { 
            background: #06090f; /* Color base sólido */
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; color: white;
        }
        .app-wrapper { display: flex; min-height: 100vh; }
        
        /* SIDEBAR */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; flex-shrink: 0; padding: 25px 15px; 
            display: flex; flex-direction: column; 
        }
        .logo-sidebar { height: 100px; width: auto; margin-bottom: 30px; display: block; margin: 0 auto 30px auto; }
        .sidebar-nav { flex-grow: 1; }
        .nav-item-ucmi { 
            display: flex; align-items: center; color: rgba(255,255,255,0.6); 
            text-decoration: none; padding: 10px 15px; margin-bottom: 5px; 
            border-radius: 10px; transition: 0.3s; font-size: 0.85rem; 
        }
        .nav-item-ucmi:hover, .nav-item-ucmi.active { color: white; background: rgba(255,255,255,0.1); }
        .nav-item-ucmi.active { color: var(--dorado-ucmi); }
        
        /* CONTENIDO */
        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; min-height: 100vh; overflow-y: auto; padding: 25px;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="logo-sidebar">
        </div>
        <nav class="sidebar-nav">
            <a href="postulaciones.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="master-vigencia.html" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
            <a href="master-usuarios.html" class="nav-item-ucmi"><i class="bi bi-people"></i> USUARIOS</a>
            </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="#" id="btnLogout" class="nav-item-ucmi text-danger"><i class="bi bi-box-arrow-right me-2"></i> CERRAR SESIÓN</a>
        </div>
    </aside>

    <main class="super-overlay">
        <div class="container-fluid">
            <h1 class="display-6 fw-bold">Título de la Página</h1>
            <hr>
            <div class="content-area">
                <p>Bienvenido al área de trabajo.</p>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
