<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px; 
        }

        .glass-header{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 25px;
}

.glass-lista{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 25px;
}

.topico-draggable{
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: move;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: .2s;
}

.topico-draggable:hover{
    background: rgba(255,255,255,0.12);
}

.topico-draggable.dragging{
    opacity: .5;
}

.handle{
    font-size: 1.2rem;
    color: #c5a059;
}

.numero-orden{
    min-width: 50px;
    text-align: center;
    font-weight: bold;
    color: #c5a059;
}
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>
            <a href="modificaciones.html" class="nav-item-ucmi"><i class="bi bi-pencil-square"></i> MODIFICACIONES</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="academia-modulos.html" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">

    <div class="container-fluid">

        <div class="glass-header mb-4 d-flex justify-content-between align-items-center">

            <div>
                <h1 class="mb-0">
                    <i class="bi bi-list-ol me-2"></i>
                    Gestión de tópicos
                </h1>

                <p class="mb-0 mt-2 text-light opacity-75">
                    Arrastra y suelta los tópicos para definir el orden de la asignatura.
                </p>
            </div>

            <a id="btnVolver"
               href="#"
               class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>
                Volver
            </a>

        </div>

        <div class="glass-lista">

            <div class="alert alert-info mb-4">
                <i class="bi bi-info-circle me-2"></i>
                El orden mostrado aquí será el orden que verán los estudiantes.
            </div>

            <div id="nombreAsignatura"
                 class="h4 mb-4 text-warning">
                Cargando asignatura...
            </div>

            <div id="contenedorTopicos">

            </div>

        </div>

    </div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const db = getFirestore(initializeApp({apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"}));
    const auth = getAuth();

let asignaturaIdGlobal = null;
let topicosActuales = [];

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    const userSnap = await getDoc(
        doc(db, "usuarios", user.uid)
    );

    if (userSnap.exists()) {

        const d = userSnap.data();

        const logo = document.getElementById('logoAcademia');

        logo.src =
            d.logoCustom ||
            "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";

        logo.style.opacity = "1";
    }

    // ==========================
    // ID DE ASIGNATURA
    // ==========================

    const params =
        new URLSearchParams(window.location.search);

    asignaturaIdGlobal =
        params.get("id");

    if (!asignaturaIdGlobal) {

        document.getElementById(
            "contenedorTopicos"
        ).innerHTML =
        "<div class='text-danger'>No se recibió una asignatura.</div>";

        return;
    }

    // ==========================
    // DATOS DE ASIGNATURA
    // ==========================

    const asignaturaSnap =
        await getDoc(
            doc(
                db,
                "asignaturas",
                asignaturaIdGlobal
            )
        );

    if (!asignaturaSnap.exists()) {
        return;
    }

    const asignatura =
        asignaturaSnap.data();

    document.getElementById(
        "nombreAsignatura"
    ).innerText =
        asignatura.asignatura;

    document.getElementById(
        "btnVolver"
    ).href =
        `asignatura-topicos.html?id=${asignaturaIdGlobal}`;

    await cargarTopicos();

});

async function cargarTopicos() {

    const asignacionesSnap =
        await getDocs(
            query(
                collection(db, "asignatura_topicos"),
                where(
                    "asignaturaId",
                    "==",
                    asignaturaIdGlobal
                )
            )
        );

    const asignaciones = [];

    asignacionesSnap.forEach(docu => {

        asignaciones.push({
            id: docu.id,
            ...docu.data()
        });

    });

    asignaciones.sort((a, b) =>
        Number(a.ordenAcademia || 999999)
        -
        Number(b.ordenAcademia || 999999)
    );

    const contenedor =
        document.getElementById(
            "contenedorTopicos"
        );

    contenedor.innerHTML = "";

    topicosActuales = [];

    for (const asignacion of asignaciones) {

        const topicoSnap =
            await getDoc(
                doc(
                    db,
                    "topicos",
                    asignacion.topicoId
                )
            );

        if (!topicoSnap.exists()) continue;

        const topico =
            topicoSnap.data();

        topicosActuales.push({
            asignacionId: asignacion.id,
            topicoId: asignacion.topicoId,
            tema: topico.tema,
            ordenAcademia:
                asignacion.ordenAcademia
        });

    }

    topicosActuales.forEach((topico, index) => {

        contenedor.insertAdjacentHTML(
            "beforeend",
            `
            <div class="topico-draggable"
                 draggable="true"
                 data-asignacion="${topico.asignacionId}">

                <div class="d-flex align-items-center gap-3">

                    <div class="numero-orden">
                        ${index + 1}
                    </div>

                    <div>
                        ${topico.tema}
                    </div>

                </div>

                <div class="handle">
                    <i class="bi bi-list"></i>
                </div>

            </div>
            `
        );

    });

}
    
    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth).then(() => window.location.href = "index.html"));
    
</script>



    
</body>
</html>
