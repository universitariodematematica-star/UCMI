<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción de Idiomas - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --dorado-ucmi: #c5a059; }
        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
        .card-form {
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); max-width: 750px; margin: auto; overflow: hidden;
        }
        .header-institucional { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.3); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .inst-logo { height: 100px; margin-bottom: 15px; opacity: 0; transition: 0.5s; }
        .inst-nombre { font-family: 'Cinzel', serif; color: #f3f0df; font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; }
        .inst-titulo { color: var(--dorado-ucmi); font-weight: 800; font-size: 2rem; }
        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; font-weight: bold; margin-top: 10px; }
        .form-control, .form-select { border-radius: 12px; padding: 10px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.08); color: white; }
        .form-control:focus, .form-select:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--dorado-ucmi); color: white; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }
        .seccion-representante { display: none; background: rgba(197, 160, 89, 0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; transition: 0.3s; }
        .modal-content { background: #0b0f1a; border: 1px solid var(--dorado-ucmi); color: white; border-radius: 25px; }
        .resumen-card { background: rgba(255, 255, 255, 0.03); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--dorado-ucmi); }
        .resumen-label { color: var(--dorado-ucmi); font-weight: bold; font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .resumen-valor { font-size: 1rem; color: #fff; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="modal fade" id="modalRevision" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header border-bottom border-secondary">
        <h5 class="modal-title fw-bold"><i class="bi bi-file-earmark-check me-2 text-warning"></i>REVISIÓN FINAL DE DATOS</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body px-4" id="cuerpoRevision"></div>
      <div class="modal-footer border-top border-secondary">
        <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">CORREGIR</button>
        <button type="button" id="confirmarEnvio" class="btn btn-warning px-5 fw-bold" style="background: var(--dorado-ucmi);">CONFIRMAR Y DESCARGAR PDF</button>
      </div>
    </div>
  </div>
</div>

<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="" id="logoDinamico" class="inst-logo">
            <div id="nombreSede" class="inst-nombre">Cargando...</div>
            <h1 class="inst-titulo">POSTULACIÓN UCMI</h1>
        </div>

        <form id="formIdiomas" class="p-4 p-md-5 pt-3" novalidate>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">NOMBRE COMPLETO DEL ESTUDIANTE:</label>
                    <input type="text" id="nombreEstudiante" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">DNI / IDENTIFICACIÓN:</label>
                    <input type="text" id="dniEstudiante" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">GÉNERO:</label>
                    <select id="genero" class="form-select" required>
                        <option value="">Seleccione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label">FECHA DE NACIMIENTO:</label>
                    <input type="date" id="fechaNacimiento" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">EDAD:</label>
                    <input type="text" id="edadEstudiante" class="form-control" readonly style="background: rgba(197, 160, 89, 0.1);">
                </div>
                <div class="col-12">
                    <label class="form-label">UBICACIÓN (CIUDAD/ESTADO):</label>
                    <input type="text" id="ubicacion" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">CORREO ELECTRÓNICO:</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">WHATSAPP:</label>
                    <input type="text" id="whatsapp" class="form-control" required>
                </div>
            </div>

            <div id="panelRepresentante" class="seccion-representante">
                <h6 class="text-warning fw-bold mb-3"><i class="bi bi-shield-shaded me-2"></i>DATOS DEL REPRESENTANTE</h6>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">NOMBRE DEL REPRESENTANTE:</label>
                        <input type="text" id="nombreRepresentante" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">DNI REPRESENTANTE:</label>
                        <input type="text" id="dniRepresentante" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">WHATSAPP REPRESENTANTE:</label>
                        <input type="text" id="whatsappRepresentante" class="form-control">
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <label class="form-label d-block mb-3">MÓDULOS DE INTERÉS:</label>
                <div id="contenedorModulos" class="row g-2"></div>
            </div>

            <button type="submit" class="btn btn-enviar">REVISAR POSTULACIÓN</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const urlParams = new URLSearchParams(window.location.search);
    const sedeRef = urlParams.get('ref') || "UCMI";
    let datosGlobales = {};
    const modalBootstrap = new bootstrap.Modal(document.getElementById('modalRevision'));

    async function cargarConfiguracion() {
        const q = query(collection(db, "usuarios"), where("entidad", "==", sedeRef));
        const snap = await getDocs(q);
        if (!snap.empty) {
            const data = snap.docs[0].data();
            document.getElementById('logoDinamico').src = data.logoCustom || "";
            document.getElementById('logoDinamico').style.opacity = "1";
            document.getElementById('nombreSede').innerText = data.entidad.toUpperCase();
            const contenedor = document.getElementById('contenedorModulos');
            const visibilidad = data['modulos-ofertados-academia'] || {};
            (data.modulos || []).forEach(mod => {
                if(visibilidad[mod] === true) {
                    const col = document.createElement('div');
                    col.className = 'col-md-6';
                    col.innerHTML = `<div class="form-check"><input class="form-check-input check-modulo" type="checkbox" value="${mod}" id="${mod}"><label class="form-check-label ms-2" for="${mod}">${mod}</label></div>`;
                    contenedor.appendChild(col);
                }
            });
        }
    }
    cargarConfiguracion();

    document.getElementById('fechaNacimiento').addEventListener('change', (e) => {
        const hoy = new Date();
        const naci = new Date(e.target.value);
        let edad = hoy.getFullYear() - naci.getFullYear();
        if (hoy.getMonth() < naci.getMonth() || (hoy.getMonth() === naci.getMonth() && hoy.getDate() < naci.getDate())) edad--;
        document.getElementById('edadEstudiante').value = edad;
        const esMenor = edad < 18;
        document.getElementById('panelRepresentante').style.display = esMenor ? 'block' : 'none';
        ['nombreRepresentante', 'dniRepresentante', 'whatsappRepresentante'].forEach(id => {
            document.getElementById(id).required = esMenor;
        });
    });

    document.getElementById('formIdiomas').onsubmit = (e) => {
        e.preventDefault();
        const modulos = Array.from(document.querySelectorAll('.check-modulo:checked')).map(cb => cb.value);
        if (!e.target.checkValidity()) { e.target.classList.add('was-validated'); return; }
        if (modulos.length === 0) return Swal.fire("Módulos", "Selecciona al menos uno.", "warning");

        const edad = parseInt(document.getElementById('edadEstudiante').value);
        const categoria = edad < 18 ? "Junior" : "Adulto";

        datosGlobales = {
            nombreEstudiante: document.getElementById('nombreEstudiante').value,
            dniEstudiante: document.getElementById('dniEstudiante').value,
            genero: document.getElementById('genero').value,
            fechaNacimiento: document.getElementById('fechaNacimiento').value,
            edadEstudiante: edad,
            ubicacion: document.getElementById('ubicacion').value,
            email: document.getElementById('email').value,
            whatsapp: document.getElementById('whatsapp').value,
            modulos: modulos,
            entidad: sedeRef,
            perfil: "Estudiante Academia",
            categoriaEdad: categoria,
            timestamp: serverTimestamp()
        };

        if (edad < 18) {
            datosGlobales.nombreRepresentante = document.getElementById('nombreRepresentante').value;
            datosGlobales.dniRepresentante = document.getElementById('dniRepresentante').value;
            datosGlobales.whatsappRepresentante = document.getElementById('whatsappRepresentante').value;
        }

        let html = `
            <div class="resumen-card">
                <h6 class="text-warning mb-3 fw-bold"><i class="bi bi-person-circle me-2"></i>IDENTIDAD DEL ESTUDIANTE</h6>
                <div class="row">
                    <div class="col-md-12"><span class="resumen-label">Nombre Completo</span><div class="resumen-valor">${datosGlobales.nombreEstudiante}</div></div>
                    <div class="col-md-6"><span class="resumen-label">DNI / ID</span><div class="resumen-valor">${datosGlobales.dniEstudiante}</div></div>
                    <div class="col-md-6"><span class="resumen-label">Género</span><div class="resumen-valor">${datosGlobales.genero}</div></div>
                    <div class="col-md-6"><span class="resumen-label">Nacimiento</span><div class="resumen-valor">${datosGlobales.fechaNacimiento}</div></div>
                    <div class="col-md-6"><span class="resumen-label">Edad</span><div class="resumen-valor">${datosGlobales.edadEstudiante} años (${categoria})</div></div>
                </div>
            </div>
            <div class="resumen-card">
                <h6 class="text-warning mb-3 fw-bold"><i class="bi bi-geo-alt-fill me-2"></i>UBICACIÓN Y CONTACTO</h6>
                <div class="row">
                    <div class="col-12"><span class="resumen-label">Ubicación</span><div class="resumen-valor">${datosGlobales.ubicacion}</div></div>
                    <div class="col-md-6"><span class="resumen-label">Email</span><div class="resumen-valor">${datosGlobales.email}</div></div>
                    <div class="col-md-6"><span class="resumen-label">WhatsApp</span><div class="resumen-valor">${datosGlobales.whatsapp}</div></div>
                </div>
            </div>`;

        if (edad < 18) {
            html += `
            <div class="resumen-card" style="border-left-color: #ffc107;">
                <h6 class="text-warning mb-3 fw-bold"><i class="bi bi-shield-check me-2"></i>REPRESENTANTE LEGAL</h6>
                <div class="row">
                    <div class="col-12"><span class="resumen-label">Nombre Tutor</span><div class="resumen-valor">${datosGlobales.nombreRepresentante}</div></div>
                    <div class="col-md-6"><span class="resumen-label">DNI Tutor</span><div class="resumen-valor">${datosGlobales.dniRepresentante}</div></div>
                    <div class="col-md-6"><span class="resumen-label">WhatsApp Tutor</span><div class="resumen-valor">${datosGlobales.whatsappRepresentante}</div></div>
                </div>
            </div>`;
        }

        html += `<div class="resumen-card"><span class="resumen-label">Módulos Seleccionados</span><div class="resumen-valor text-info"><i class="bi bi-book me-2"></i>${datosGlobales.modulos.join(' • ')}</div></div>`;
        
        document.getElementById('cuerpoRevision').innerHTML = html;
        modalBootstrap.show();
    };

    document.getElementById('confirmarEnvio').onclick = async () => {
        const btn = document.getElementById('confirmarEnvio');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>PROCESANDO...`;
        
        try {
            await addDoc(collection(db, "postulaciones"), datosGlobales);
            generarPDFCompleto(datosGlobales);
            modalBootstrap.hide();
            await Swal.fire({ icon: 'success', title: '¡Postulación Exitosa!', text: 'Se ha guardado tu información y descargado el comprobante PDF.', confirmButtonColor: '#c5a059' });
            location.reload();
        } catch (e) {
            Swal.fire("Error", "Error al conectar con la base de datos.", "error");
            btn.disabled = false;
            btn.innerText = "CONFIRMAR Y DESCARGAR PDF";
        }
    };

    function generarPDFCompleto(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 20;

        // Cabecera
        doc.setFillColor(11, 15, 26);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(197, 160, 89);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.text("COMPROBANTE DE POSTULACIÓN", 20, 25);
        doc.setFontSize(10);
        doc.text(`UCMI - SEDE: ${d.entidad.toUpperCase()}`, 20, 32);

        // Cuerpo
        doc.setTextColor(0, 0, 0);
        y = 50;
        doc.setFontSize(12);
        doc.text("DETALLES DEL ESTUDIANTE", 20, y);
        doc.setLineWidth(0.5);
        doc.line(20, y+2, 190, y+2);
        
        y += 12;
        doc.setFontSize(10);
        doc.setFont("helvetica", "bold"); doc.text("Nombre Completo:", 20, y); 
        doc.setFont("helvetica", "normal"); doc.text(`${d.nombreEstudiante}`, 60, y);
        
        y += 7;
        doc.setFont("helvetica", "bold"); doc.text("DNI / Identificación:", 20, y); 
        doc.setFont("helvetica", "normal"); doc.text(`${d.dniEstudiante}`, 60, y);
        
        y += 7;
        doc.setFont("helvetica", "bold"); doc.text("Fecha Nac. / Edad:", 20, y); 
        doc.setFont("helvetica", "normal"); doc.text(`${d.fechaNacimiento} (${d.edadEstudiante} años - ${d.categoriaEdad})`, 60, y);

        y += 7;
        doc.setFont("helvetica", "bold"); doc.text("Género:", 20, y); 
        doc.setFont("helvetica", "normal"); doc.text(`${d.genero}`, 60, y);

        y += 15;
        doc.setFont("helvetica", "bold");
        doc.text("UBICACIÓN Y CONTACTO", 20, y);
        doc.line(20, y+2, 190, y+2);

        y += 10;
        doc.setFont("helvetica", "bold"); doc.text("Ubicación:", 20, y); 
        doc.setFont("helvetica", "normal"); doc.text(`${d.ubicacion}`, 60, y);
        y += 7;
        doc.setFont("helvetica", "bold"); doc.text("Correo:", 20, y); 
        doc.setFont("helvetica", "normal"); doc.text(`${d.email}`, 60, y);
        y += 7;
        doc.setFont("helvetica", "bold"); doc.text("WhatsApp:", 20, y); 
        doc.setFont("helvetica", "normal"); doc.text(`${d.whatsapp}`, 60, y);

        if (d.nombreRepresentante) {
            y += 15;
            doc.setFont("helvetica", "bold");
            doc.text("INFORMACIÓN DEL REPRESENTANTE", 20, y);
            doc.line(20, y+2, 190, y+2);
            y += 10;
            doc.text(`Nombre Tutor: ${d.nombreRepresentante}`, 20, y);
            y += 7;
            doc.text(`DNI Tutor: ${d.dniRepresentante} | WhatsApp: ${d.whatsappRepresentante}`, 20, y);
        }

        y += 15;
        doc.setFont("helvetica", "bold");
        doc.text("MÓDULOS REGISTRADOS", 20, y);
        doc.line(20, y+2, 190, y+2);
        y += 10;
        doc.setFont("helvetica", "normal");
        doc.text(d.modulos.join(" — "), 20, y);

        // Footer
        doc.setFontSize(8);
        doc.text(`Generado el: ${new Date().toLocaleString()}`, 20, 285);
        doc.text("Este documento certifica la intención de postulación a los programas de UCMI.", 110, 285);

        doc.save(`UCMI_Postulacion_${d.dniEstudiante}.pdf`);
    }
</script>
</body>
</html>
