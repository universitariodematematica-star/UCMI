<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción de Idiomas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --dorado-ucmi: #c5a059; }
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
        .card-form { 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); max-width: 700px; margin: auto; overflow: hidden; 
        }
        .header-institucional { text-align: center; padding: 50px 20px; background: rgba(0, 0, 0, 0.3); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .inst-logo { height: 110px; margin-bottom: 15px; opacity: 0; transition: 0.5s; }
        .inst-nombre { font-family: 'Cinzel', serif; color: #f3f0df; font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; }
        .inst-titulo { color: var(--dorado-ucmi); font-weight: 800; font-size: 2.2rem; }
        .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; font-weight: bold; margin-top: 10px; }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.08); color: white; }
        .form-control:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--dorado-ucmi); color: white; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }
        .seccion-representante { display: none; background: rgba(197, 160, 89, 0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; transition: 0.3s; }
        .btn-enviar:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(197, 160, 89, 0.4); }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="card-form">
        <div class="header-institucional">
            <img src="" id="logoDinamico" class="inst-logo">
            <div id="nombreSede" class="inst-nombre">Cargando Academia...</div>
            <h1 class="inst-titulo">FORMULARIO DE ADMISIÓN</h1>
        </div>

        <form id="formIdiomas" class="p-4 p-md-5 pt-3" novalidate>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">NOMBRE COMPLETO DEL ESTUDIANTE:</label>
                    <input type="text" id="nombreResponsable" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">DNI DEL ESTUDIANTE:</label>
                    <input type="text" id="dniEstudiante" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">EDAD:</label>
                    <input type="number" id="edadEstudiante" class="form-control" required min="1">
                </div>
                <div class="col-md-6">
                    <label class="form-label">CORREO ELECTRÓNICO:</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">WHATSAPP:</label>
                    <input type="text" id="whatsapp" class="form-control" required>
                </div>
            </div>

            <!-- SECCIÓN CONDICIONAL PARA MENORES -->
            <div id="panelRepresentante" class="seccion-representante">
                <h6 class="text-warning fw-bold mb-3"><i class="bi bi-shield-check me-2"></i>DATOS DEL REPRESENTANTE (MENOR DE EDAD)</h6>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">NOMBRE DEL REPRESENTANTE:</label>
                        <input type="text" id="nombreRepresentante" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">DNI DEL REPRESENTANTE:</label>
                        <input type="text" id="dniRepresentante" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">WHATSAPP DEL REPRESENTANTE:</label>
                        <input type="text" id="whatsappRepresentante" class="form-control">
                    </div>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-enviar">COMPLETAR INSCRIPCIÓN</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. CARGAR IDENTIDAD DINÁMICA (LOGO Y NOMBRE)
    const urlParams = new URLSearchParams(window.location.search);
    const sedeRef = urlParams.get('ref') || "UCMI";

    async function cargarSede() {
        const q = query(collection(db, "usuarios"), where("entidad", "==", sedeRef));
        const snap = await getDocs(q);
        if (!snap.empty) {
            const data = snap.docs[0].data();
            document.getElementById('logoDinamico').src = data.logoCustom || "https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png";
            document.getElementById('logoDinamico').style.opacity = "1";
            document.getElementById('nombreSede').innerText = data.entidad.toUpperCase();
        }
    }
    cargarSede();

    // 2. LÓGICA DE MENOR DE EDAD
    document.getElementById('edadEstudiante').addEventListener('input', (e) => {
        const panel = document.getElementById('panelRepresentante');
        const inputs = panel.querySelectorAll('input');
        if (e.target.value > 0 && e.target.value < 18) {
            panel.style.display = 'block';
            inputs.forEach(i => i.required = true);
        } else {
            panel.style.display = 'none';
            inputs.forEach(i => i.required = false);
        }
    });

    // 3. ENVÍO A FIREBASE
    document.getElementById('formIdiomas').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        
        if (!e.target.checkValidity()) {
            e.target.classList.add('was-validated');
            return Swal.fire("Error", "Completa todos los campos obligatorios.", "error");
        }

        btn.disabled = true;
        btn.innerText = "REGISTRANDO...";

const datos = {
            nombreResponsable: document.getElementById('nombreResponsable').value,
            dniEstudiante: document.getElementById('dniEstudiante').value,
            email: document.getElementById('email').value,
            whatsapp: document.getElementById('whatsapp').value,
            edadEstudiante: document.getElementById('edadEstudiante').value,
            entidad: sedeRef, 
            perfil: "Estudiante Academia", // <--- Cambiado a 'perfil'
            fecha: new Date().toLocaleString()
        };

        // Agregar datos de representante si es menor
        if (datos.edadEstudiante < 18) {
            datos.nombreRepresentante = document.getElementById('nombreRepresentante').value;
            datos.dniRepresentante = document.getElementById('dniRepresentante').value;
            datos.whatsappRepresentante = document.getElementById('whatsappRepresentante').value;
        }

        try {
            await addDoc(collection(db, "postulaciones"), datos);
            await Swal.fire({
                icon: 'success',
                title: '¡Registro Exitoso!',
                text: 'Tus datos han sido enviados a la academia.',
                confirmButtonColor: '#c5a059'
            });
            location.reload();
        } catch (err) {
            console.error(err);
            Swal.fire("Error", "No se pudo procesar el registro.", "error");
            btn.disabled = false;
            btn.innerText = "COMPLETAR INSCRIPCIÓN";
        }
    };
</script>
</body>
</html>
