<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Control de Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
    :root {
        --azul-ucmi: #06090f;
        --azul-sidebar: #1a2a3a;
        --verde-exito: #27ae60;
        --dorado-ucmi: #c5a059;
        --rojo-logout: #e74c3c;
        --indigo-ucmi: #4b0082;
    }
    
    body { 
        background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
        background-size: cover; font-family: 'Segoe UI', sans-serif; margin: 0; color: white;
    }

    .super-overlay { background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); min-height: 100vh; transition: filter 0.3s ease; }
    
    .sidebar { 
        background: rgba(26, 42, 58, 0.95); backdrop-filter: blur(10px); min-height: 100vh; padding: 25px 15px; position: sticky; top: 0; border-right: 1px solid rgba(197, 160, 89, 0.3); display: flex; flex-direction: column;
    }

    .logo-sidebar { height: 55px; border-radius: 12px; margin-bottom: 10px; }
    
    .nav-link { color: rgba(255,255,255,0.7); transition: 0.3s; margin-bottom: 5px; text-decoration: none; padding: 10px; display: block; }
    .nav-link:hover { color: white; background: rgba(255,255,255,0.1); border-radius: 8px; }
    .nav-link.active { color: var(--dorado-ucmi); font-weight: bold; background: rgba(197, 160, 89, 0.1); border-radius: 8px; }

    .sidebar-nav { flex-grow: 1; }

    .nav-item-ucmi {
        display: flex; align-items: center;
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        padding: 10px 15px;
        margin-bottom: 5px;
        border-radius: 10px;
        transition: 0.3s all ease;
        font-size: 0.85rem;
    }

    .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
    
    .nav-item-ucmi:hover { 
        color: white; 
        background: rgba(255,255,255,0.1);
        transform: translateX(5px);
    }

    .nav-item-ucmi.active {
        background: rgba(197, 160, 89, 0.15);
        color: var(--dorado-ucmi);
        font-weight: 600;
        box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1);
    }   

    .btn-sidebar-action {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.4) !important;
        color: white !important;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.7rem;
        border-radius: 50px;
        padding: 10px;
        text-decoration: none;
        text-align: center;
        transition: all 0.3s ease-in-out;
        display: block;
        margin-bottom: 10px;
    }

    .btn-sidebar-action:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #ffffff !important;
        color: #ffffff !important;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        transform: translateY(-2px);
    }

    .btn-logout {
        border-color: rgba(231, 76, 60, 0.4) !important;
        color: rgba(231, 76, 60, 0.8) !important;
    }

    .btn-logout:hover {
        background: rgba(231, 76, 60, 0.1) !important;
        border-color: var(--rojo-logout) !important;
        color: white !important;
        box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
    }

    .table-container { 
        background: rgba(255, 255, 255, 0.03) !important;
        backdrop-filter: blur(15px) saturate(150%);
        border-radius: 28px; 
        padding: 30px; 
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }

    .table {
        --bs-table-bg: transparent !important; 
        --bs-table-color: white !important;
        margin-bottom: 0;
    }

    .table thead th {
        color: rgba(255, 255, 255, 0.6) !important;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 0.75rem;
        border: none;
    }

    .bg-categoria-estudiante { 
        background-color: #311b92 !important; 
        color: #ffffff !important; 
        padding: 5px 12px;
        border-radius: 50px;
        font-size: 0.75rem;
    }

    .modal-content { 
        background: rgba(15, 23, 42, 0.95) !important;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 32px; 
        color: white !important;
    }

    .btn-activar-acceso {
        background: var(--verde-exito) !important;
        color: white !important;
        border: none;
    }

    body.modal-open .super-overlay { filter: blur(8px) brightness(0.7); }
    </style>
</head>

<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img id="logoAcademiaPrincipal" src="" style="height: 60px; border-radius: 8px; opacity: 0; transition: 0.5s;">
                    <h5 id="nombreAcademiaSidebar" class="fw-bold mt-2 text-white">CARGANDO...</h5>
                </div>
                <hr class="text-white-50">
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item-ucmi active"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
                    <a href="#" class="nav-item-ucmi"><i class="bi bi-shield-check"></i> VIGENCIA</a>
                    <a href="#" class="nav-item-ucmi"><i class="bi bi-people"></i> USUARIOS</a>
                </nav>

                <div class="mt-4 pt-4 border-top border-secondary">
                    <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
                </div>
            </div>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="col-md-10 p-4">
                <h1 class="display-6 fw-bold">Control de Postulaciones</h1>
                
                <div class="table-container mt-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>ASPIRANTE</th>
                                    <th>TIPO</th>
                                    <th>LOCALIZACIÓN</th>
                                    <th class="text-center">ACCIÓN</th>
                                </tr>
                            </thead>
                            <tbody id="listaMaestra"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DE DETALLES -->
<div class="modal fade" id="modalDetalles" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h4 class="fw-bold"><i class="bi bi-file-earmark-person me-2"></i>Expediente</h4>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-4">
                <div class="row" id="contenidoModal"></div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-outline-danger rounded-pill px-4" id="btnEliminar">Rechazar</button>
                <button class="btn btn-activar-acceso rounded-pill px-4 fw-bold" id="btnConfirmarAcceso">Activar Acceso</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let currentId = null;
    let currentData = null;
    let academiaNombreGlobal = "";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.email));
            if (userDoc.exists()) {
                const data = userDoc.data();
                academiaNombreGlobal = data.entidad || "Panel";
                
                document.getElementById('logoAcademiaPrincipal').src = data.logoCustom || data.logo || "https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png";
                document.getElementById('logoAcademiaPrincipal').style.opacity = "1";
                document.getElementById('nombreAcademiaSidebar').innerText = academiaNombreGlobal.toUpperCase();

                iniciarEscucha(academiaNombreGlobal);
            }
        } else {
            window.location.href = "index.html";
        }
    });

    function iniciarEscucha(entidad) {
        // Escuchamos postulaciones donde el perfil sea "Estudiante Academia" y la entidad coincida
        const q = query(
            collection(db, "postulaciones"), 
            where("perfil", "==", "Estudiante Academia"),
            where("entidad", "==", entidad)
        );

        onSnapshot(q, (snap) => {
            const lista = document.getElementById('listaMaestra');
            lista.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                const id = docSnap.id;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="fw-bold">${d.nombreResponsable || d.nombre}</div>
                        <div class="small text-muted">${d.email}</div>
                    </td>
                    <td><span class="bg-categoria-estudiante">${d.categoriaEdad || 'Estudiante'}</span></td>
                    <td><i class="bi bi-geo-alt me-1"></i>${d.ubicacion}</td>
                    <td class="text-center">
                        <button class="btn btn-dark btn-sm" onclick="verExpediente('${id}')">Revisar</button>
                    </td>
                `;
                lista.appendChild(tr);
            });
        });
    }

    window.verExpediente = async (id) => {
        currentId = id;
        const snap = await getDoc(doc(db, "postulaciones", id));
        if (snap.exists()) {
            currentData = snap.data();
            const d = currentData;
            document.getElementById('contenidoModal').innerHTML = `
                <div class="col-md-6 mb-3"><label class="text-muted small d-block">NOMBRE</label><span class="fw-bold">${d.nombreResponsable}</span></div>
                <div class="col-md-6 mb-3"><label class="text-muted small d-block">CATEGORÍA</label><span>${d.categoriaEdad || 'N/A'}</span></div>
                <div class="col-md-6 mb-3"><label class="text-muted small d-block">DNI</label><span>${d.dniEstudiante || 'N/A'}</span></div>
                <div class="col-md-6 mb-3"><label class="text-muted small d-block">WHATSAPP</label><span>${d.whatsapp}</span></div>
            `;
            new bootstrap.Modal(document.getElementById('modalDetalles')).show();
        }
    };

    document.getElementById('btnConfirmarAcceso').onclick = async () => {
        if(!currentId || !currentData) return;
        // Mover a la colección definitiva de usuarios
        await setDoc(doc(db, "usuarios", currentData.email), { 
            ...currentData, 
            estado: "activo",
            rol: "estudiante"
        });
        await deleteDoc(doc(db, "postulaciones", currentId));
        Swal.fire("Acceso Activado", "El estudiante ya puede ingresar.", "success").then(() => location.reload());
    };

    document.getElementById('btnEliminar').onclick = async () => {
        if (confirm("¿Rechazar esta postulación?")) {
            await deleteDoc(doc(db, "postulaciones", currentId));
            location.reload();
        }
    };

    document.getElementById('btnLogout').onclick = () => signOut(auth);
</script>
</body>
</html>
