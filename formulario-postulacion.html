<!DOCTYPE html>
<html lang="es">
<head>
     <meta charset="UTF-8">
     <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Inscripción de Idiomas</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
     <!-- Librerías para PDF -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
     
     <style>
          :root { --dorado-ucmi: #c5a059; }
          body {
              background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
              background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0;
          }
          .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
          .card-form {
              border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
              background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); max-width: 700px; margin: auto; overflow: hidden;
          }
          .header-institucional { text-align: center; padding: 50px 20px; background: rgba(0, 0, 0, 0.3); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
          .inst-logo { height: 110px; margin-bottom: 15px; opacity: 0; transition: 0.5s; }
          .inst-nombre { font-family: 'Cinzel', serif; color: #f3f0df; font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; }
          .inst-titulo { color: var(--dorado-ucmi); font-weight: 800; font-size: 2.2rem; }
          
          .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; font-weight: bold; margin-top: 10px; }
          .form-control, .form-select { border-radius: 12px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.08); color: white; }
          .form-control:focus, .form-select:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--dorado-ucmi); color: white; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }
          .form-select option { background: #06090f; color: white; }
          
          .modulo-item { padding: 8px 10px; transition: all 0.3s ease; }
          .form-check-label { cursor: pointer; font-size: 0.95rem; color: rgba(255, 255, 255, 0.85); transition: 0.3s; }
          .form-check-input { cursor: pointer; background-color: transparent; border: 1px solid var(--dorado-ucmi); }
          .form-check-input:checked { background-color: var(--dorado-ucmi); border-color: var(--dorado-ucmi); }
          .form-check-input:checked + .form-check-label { color: var(--dorado-ucmi); font-weight: bold; }
          
          .seccion-representante { display: none; background: rgba(197, 160, 89, 0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; animation: fadeIn 0.5s; }
          @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
          
          .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; transition: 0.3s; }
          .btn-enviar:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(197, 160, 89, 0.4); }
     </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
     <div class="card-form">
          <div class="header-institucional">
              <img src="" id="logoDinamico" class="inst-logo">
              <div id="nombreSede" class="inst-nombre">Cargando Academia...</div>
              <h1 class="inst-titulo">FORMULARIO DE POSTULACIÓN 1</h1>
          </div>

          <form id="formIdiomas" class="p-4 p-md-5 pt-3" novalidate>
              <div class="row g-3">
                  <div class="col-12">
                      <label class="form-label">NOMBRE COMPLETO DEL ESTUDIANTE:</label>
                      <input type="text" id="nombreResponsable" class="form-control" required>
                  </div>
                  <div class="col-md-6">
                      <label class="form-label">DNI DEL ESTUDIANTE:</label>
                      <input type="text" id="dniEstudiante" class="form-control" required>
                  </div>
                  <div class="col-md-6">
                      <label class="form-label">GÉNERO:</label>
                      <select id="genero" class="form-select" required>
                          <option value="">Seleccione...</option>
                          <option value="Masculino">Masculino</option>
                          <option value="Femenino">Femenino</option>
                          <option value="Otro">Otro</option>
                      </select>
                  </div>
                  <div class="col-md-6">
                      <label class="form-label">FECHA DE NACIMIENTO:</label>
                      <input type="date" id="fechaNacimiento" class="form-control" required>
                  </div>
                  <div class="col-md-6">
                      <label class="form-label">EDAD:</label>
                      <input type="number" id="edadEstudiante" class="form-control" required min="1">
                  </div>
                  <div class="col-12">
                      <label class="form-label">UBICACIÓN (CIUDAD/PAÍS):</label>
                      <input type="text" id="ubicacion" class="form-control" placeholder="Ej: Caracas, Venezuela" required>
                  </div>
                  <div class="col-md-6">
                      <label class="form-label">CORREO ELECTRÓNICO:</label>
                      <input type="email" id="email" class="form-control" required>
                  </div>
                  <div class="col-md-6">
                      <label class="form-label">WHATSAPP:</label>
                      <input type="text" id="whatsapp" class="form-control" required>
                  </div>
              </div>

              <div id="panelRepresentante" class="seccion-representante">
                  <h6 class="text-warning fw-bold mb-3"><i class="bi bi-shield-check me-2"></i>DATOS DEL REPRESENTANTE</h6>
                  <div class="row g-3">
                      <div class="col-12">
                          <label class="form-label">NOMBRE DEL REPRESENTANTE:</label>
                          <input type="text" id="nombreRepresentante" class="form-control">
                      </div>
                      <div class="col-md-6">
                          <label class="form-label">DNI DEL REPRESENTANTE:</label>
                          <input type="text" id="dniRepresentante" class="form-control">
                      </div>
                      <div class="col-md-6">
                          <label class="form-label">WHATSAPP DEL REPRESENTANTE:</label>
                          <input type="text" id="whatsappRepresentante" class="form-control">
                      </div>
                      <div class="col-12">
                          <label class="form-label">CORREO DEL REPRESENTANTE:</label>
                          <input type="email" id="correoRepresentante" class="form-control">
                      </div>
                  </div>
              </div>

              <div class="mt-5">
                  <label class="form-label d-block mb-3">MÓDULOS DISPONIBLES PARA POSTULACIÓN:</label>
                  <div id="contenedorModulos" class="row g-2">
                      <div class="col-12 text-center opacity-50">
                          <small>Sincronizando oferta académica...</small>
                      </div>
                  </div>
              </div>

              <button type="submit" id="btnSubmit" class="btn btn-enviar">COMPLETAR POSTULACIÓN</button>
          </form>
     </div>
</div>

<script type="module">
     import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
     import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

     const firebaseConfig = {
          apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
          authDomain: "ucmi-13796634.firebaseapp.com",
          projectId: "ucmi-13796634",
          storageBucket: "ucmi-13796634.firebasestorage.app",
          messagingSenderId: "1090719609536",
          appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
     };

     const app = initializeApp(firebaseConfig);
     const db = getFirestore(app);

     const urlParams = new URLSearchParams(window.location.search);
     const sedeRef = urlParams.get('ref') || "UCMI";
     let logoBase64 = ""; // Para el PDF

     async function cargarConfiguracion() {
          const q = query(collection(db, "usuarios"), where("entidad", "==", sedeRef));
          const snap = await getDocs(q);
          
          if (!snap.empty) {
              const data = snap.docs[0].data();
              const imgUrl = data.logoCustom || "https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png";
              
              const img = document.getElementById('logoDinamico');
              img.src = imgUrl;
              img.style.opacity = "1";
              document.getElementById('nombreSede').innerText = data.entidad.toUpperCase();

              // Convertir logo a base64 para jsPDF (necesario para evitar errores de origen cruzado)
              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              const tempImg = new Image();
              tempImg.crossOrigin = "Anonymous";
              tempImg.onload = () => {
                  canvas.width = tempImg.width;
                  canvas.height = tempImg.height;
                  ctx.drawImage(tempImg, 0, 0);
                  logoBase64 = canvas.toDataURL('image/png');
              };
              tempImg.src = imgUrl;

              const contenedor = document.getElementById('contenedorModulos');
              const listaAdquirida = data.modulos || [];
              const estadosVisibilidad = data['modulos-ofertados-academia'] || {};
              contenedor.innerHTML = '';

              const modulosPublicos = listaAdquirida.filter(m => estadosVisibilidad[m] === true);

              if (modulosPublicos.length > 0) {
                  modulosPublicos.forEach(mod => {
                      const col = document.createElement('div');
                      col.className = 'col-md-6';
                      const idSeguro = mod.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '');
                      col.innerHTML = `
                          <div class="form-check modulo-item">
                              <input class="form-check-input check-modulo" type="checkbox" value="${mod}" id="check_${idSeguro}">
                              <label class="form-check-label ms-2" for="check_${idSeguro}">${mod}</label>
                          </div>
                      `;
                      contenedor.appendChild(col);
                  });
              } else {
                  contenedor.innerHTML = '<div class="col-12 text-warning small">No hay módulos habilitados actualmente.</div>';
              }
          }
     }
     cargarConfiguracion();

     // Lógica de menor de edad
     document.getElementById('edadEstudiante').addEventListener('input', (e) => {
          const panel = document.getElementById('panelRepresentante');
          const esMenor = e.target.value > 0 && e.target.value < 18;
          panel.style.display = esMenor ? 'block' : 'none';
          
          // Requerir campos de representante si es menor
          ['nombreRepresentante', 'dniRepresentante', 'whatsappRepresentante', 'correoRepresentante'].forEach(id => {
              document.getElementById(id).required = esMenor;
          });
     });

     // Función de impresión PDF
     function imprimirComprobante(datos) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const pageWidth = doc.internal.pageSize.getWidth();

    // 1. CABECERA INSTITUCIONAL (Fondo azul oscuro)
    doc.setFillColor(26, 37, 47); // Color azul muy oscuro similar a image_e6b4e4.png
    doc.rect(0, 0, pageWidth, 45, 'F');

    // Logo Dinámico (Si existe)
    if (logoBase64) {
        doc.addImage(logoBase64, 'PNG', 15, 7, 30, 30);
    }

    // Nombre de la Academia y Siglas
    doc.setTextColor(197, 160, 89); // Tono dorado/amarillo
    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.text(datos.entidad.toUpperCase(), 55, 22);
    
    doc.setFontSize(22);
    const siglas = datos.entidad.substring(0, 4).toUpperCase();
    doc.text(siglas, 55, 35);

    // 2. TÍTULO DEL DOCUMENTO
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(16);
    doc.text("COMPROBANTE OFICIAL DE REGISTRO", pageWidth / 2, 60, { align: 'center' });

    // Función auxiliar para dibujar líneas de sección
    const dibujarSeccion = (titulo, y, color = [0, 0, 0]) => {
        doc.setFontSize(11);
        doc.setTextColor(color[0], color[1], color[2]);
        doc.setFont("helvetica", "bold");
        doc.text(titulo, 20, y);
        doc.setDrawColor(200, 200, 200);
        doc.line(20, y + 2, 190, y + 2);
        return y + 12;
    };

    // 3. DATOS DE IDENTIDAD
    let currentY = dibujarSeccion("1. DATOS DE IDENTIDAD", 75);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    
    const fila = (label, valor, y) => {
        doc.setFont("helvetica", "bold");
        doc.text(label, 20, y);
        doc.setFont("helvetica", "normal");
        doc.text(String(valor).toUpperCase(), 65, y);
    };

    fila("Nombre Responsable:", datos.nombreResponsable, currentY);
    fila("ID (Cédula/RIF):", datos.dniEstudiante, currentY + 7);
    fila("Fecha de Nacimiento:", datos.fechaNacimiento, currentY + 14);
    fila("Género:", datos.genero, currentY + 21);

    // 4. CONTACTO
    currentY = dibujarSeccion("2. CONTACTO", currentY + 35);
    fila("Correo:", datos.email, currentY);
    fila("WhatsApp:", datos.whatsapp, currentY + 7);
    fila("Ubicación:", datos.ubicacion, currentY + 14);

    // 5. INFORMACIÓN DEL REPRESENTANTE (Solo si es menor)
    if (datos.edadEstudiante < 18) {
        currentY = dibujarSeccion("3. INFORMACIÓN DEL REPRESENTANTE LEGAL", currentY + 28, [128, 0, 0]); // Rojo vino
        fila("Nombre Rep.:", datos.nombreRepresentante, currentY);
        fila("ID Rep.:", datos.dniRepresentante, currentY + 7);
        fila("Correo Rep.:", datos.correoRepresentante, currentY + 14);
        fila("WhatsApp Rep.:", datos.whatsappRepresentante, currentY + 21);
    }

    // Pie de página con fecha
    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text("Generado automáticamente por el sistema UCMI - " + datos.fechaInscripcion, 20, 285);

    // Guardar
    doc.save(`Comprobante_${datos.dniEstudiante}.pdf`);
}

     document.getElementById('formIdiomas').onsubmit = async (e) => {
          e.preventDefault();
          const seleccionados = Array.from(document.querySelectorAll('.check-modulo:checked')).map(cb => cb.value);

          if (seleccionados.length === 0) {
              return Swal.fire("Módulos requeridos", "Selecciona al menos un curso.", "warning");
          }

          if (!e.target.checkValidity()) {
              e.target.classList.add('was-validated');
              return Swal.fire("Campos incompletos", "Verifica la información personal.", "error");
          }

          const btn = document.getElementById('btnSubmit');
          btn.disabled = true;
          btn.innerText = "REGISTRANDO...";

          const datos = {
              modulosInscritos: seleccionados,
              nombreResponsable: document.getElementById('nombreResponsable').value,
              dniEstudiante: document.getElementById('dniEstudiante').value,
              genero: document.getElementById('genero').value,
              fechaNacimiento: document.getElementById('fechaNacimiento').value,
              email: document.getElementById('email').value,
              whatsapp: document.getElementById('whatsapp').value,
              ubicacion: document.getElementById('ubicacion').value,
              edadEstudiante: document.getElementById('edadEstudiante').value,
              entidad: sedeRef,
              perfil: "Estudiante Academia",
              fechaInscripcion: new Date().toLocaleString()
          };

          if (datos.edadEstudiante < 18) {
              datos.nombreRepresentante = document.getElementById('nombreRepresentante').value;
              datos.dniRepresentante = document.getElementById('dniRepresentante').value;
              datos.whatsappRepresentante = document.getElementById('whatsappRepresentante').value;
              datos.correoRepresentante = document.getElementById('correoRepresentante').value;
          }

          try {
              await addDoc(collection(db, "postulaciones"), datos);
              
              // Imprimir PDF antes de recargar
              imprimirComprobante(datos);

              await Swal.fire({
                  icon: 'success',
                  title: '¡Recibido!',
                  text: 'Tu postulación ha sido enviada y tu comprobante PDF se ha generado.',
                  confirmButtonColor: '#c5a059'
              });
              location.reload();
          } catch (err) {
              Swal.fire("Error", "No se pudo completar el envío.", "error");
              btn.disabled = false;
              btn.innerText = "COMPLETAR POSTULACIÓN";
          }
          // --- FUNCIÓN DE AUTO-RELLENO (CTRL + T) ---
      window.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key.toLowerCase() === 't') {
              e.preventDefault();
              
              // Datos de prueba
              document.getElementById('nombreResponsable').value = "Juan Carlos Riera";
              document.getElementById('dniEstudiante').value = "V-12345678";
              document.getElementById('genero').value = "Masculino";
              document.getElementById('fechaNacimiento').value = "1990-01-01";
              document.getElementById('edadEstudiante').value = "36";
              document.getElementById('ubicacion').value = "Caracas, Venezuela";
              document.getElementById('email').value = "j.riera@ucmi.edu.ve";
              document.getElementById('whatsapp').value = "+584120000000";
              
              // Disparar el evento 'input' para que la lógica de menor de edad se actualice
              document.getElementById('edadEstudiante').dispatchEvent(new Event('input'));
              
              // Seleccionar el primer módulo disponible si existe
              const primerModulo = document.querySelector('.check-modulo');
              if (primerModulo) primerModulo.checked = true;

              console.log("Formulario rellenado automáticamente.");
          }
      });
     };
</script>
</body>
</html>
