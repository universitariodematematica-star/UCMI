<!DOCTYPE html>
<html lang="es">
<head>
      <meta charset="UTF-8">
      <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Inscripción de Idiomas - UCMI</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
      
      <style>
           :root { --dorado-ucmi: #c5a059; }
           body {
               background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
               background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; padding: 40px 0;
           }
           .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%); z-index: -1; }
           .card-form {
               border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
               background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); max-width: 700px; margin: auto; overflow: hidden;
           }
           .header-institucional { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.3); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
           .inst-logo { height: 100px; margin-bottom: 15px; opacity: 0; transition: 0.5s; }
           .inst-nombre { font-family: 'Cinzel', serif; color: #f3f0df; font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; }
           .inst-titulo { color: var(--dorado-ucmi); font-weight: 800; font-size: 2rem; }
           
           .form-label { color: var(--dorado-ucmi); font-size: 0.85rem; font-weight: bold; margin-top: 10px; }
           .form-control, .form-select { border-radius: 12px; padding: 10px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.08); color: white; }
           .form-control:focus, .form-select:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--dorado-ucmi); color: white; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }
           
           .seccion-representante { display: none; background: rgba(197, 160, 89, 0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
           .btn-enviar { background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); color: #000; font-weight: 800; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 30px; transition: 0.3s; }
           
           .modal-content { background: #06090f; border: 1px solid var(--dorado-ucmi); color: white; border-radius: 20px; }
           .resumen-label { color: var(--dorado-ucmi); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
      </style>
</head>
<body>

<div class="overlay"></div>

<!-- MODAL DE REVISIÓN -->
<div class="modal fade" id="modalRevision" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header border-bottom border-secondary">
        <h5 class="modal-title"><i class="bi bi-shield-check me-2 text-warning"></i>CONFIRMAR REGISTRO</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="cuerpoRevision"></div>
      <div class="modal-footer border-top border-secondary">
        <button type="button" class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">VOLVER A EDITAR</button>
        <button type="button" id="confirmarEnvio" class="btn btn-warning px-4 fw-bold">SÍ, ENVIAR DATOS</button>
      </div>
    </div>
  </div>
</div>

<div class="container">
      <div class="card-form">
           <div class="header-institucional">
               <img src="" id="logoDinamico" class="inst-logo">
               <div id="nombreSede" class="inst-nombre">Cargando Academia...</div>
               <h1 class="inst-titulo">FORMULARIO DE POSTULACIÓN</h1>
           </div>

           <form id="formIdiomas" class="p-4 p-md-5 pt-3" novalidate>
               <div class="row g-3">
                   <div class="col-12">
                       <label class="form-label">NOMBRE COMPLETO DEL ESTUDIANTE:</label>
                       <input type="text" id="nombreResponsable" class="form-control" required>
                   </div>
                   <div class="col-md-6">
                       <label class="form-label">DNI DEL ESTUDIANTE:</label>
                       <input type="text" id="dniEstudiante" class="form-control" required>
                   </div>
                   <div class="col-md-6">
                       <label class="form-label">GÉNERO:</label>
                       <select id="genero" class="form-select" required>
                           <option value="">Seleccione...</option>
                           <option value="Masculino">Masculino</option>
                           <option value="Femenino">Femenino</option>
                           <option value="Otro">Otro</option>
                       </select>
                   </div>
                   <div class="col-md-8">
                       <label class="form-label">FECHA DE NACIMIENTO:</label>
                       <input type="date" id="fechaNacimiento" class="form-control" required>
                   </div>
                   <div class="col-md-4">
                       <label class="form-label">EDAD:</label>
                       <input type="text" id="edadEstudiante" class="form-control" readonly style="background: rgba(197,160,89,0.15);">
                   </div>
                   <div class="col-12">
                       <label class="form-label">UBICACIÓN:</label>
                       <input type="text" id="ubicacion" class="form-control" required>
                   </div>
                   <div class="col-md-6">
                       <label class="form-label">CORREO:</label>
                       <input type="email" id="email" class="form-control" required>
                   </div>
                   <div class="col-md-6">
                       <label class="form-label">WHATSAPP:</label>
                       <input type="text" id="whatsapp" class="form-control" required>
                   </div>
               </div>

               <div id="panelRepresentante" class="seccion-representante">
                   <h6 class="text-warning fw-bold mb-3"><i class="bi bi-person-badge me-2"></i>DATOS DEL REPRESENTANTE</h6>
                   <div class="row g-3">
                       <div class="col-12">
                           <label class="form-label">NOMBRE REPRESENTANTE:</label>
                           <input type="text" id="nombreRepresentante" class="form-control">
                       </div>
                       <div class="col-md-6">
                           <label class="form-label">DNI REPRESENTANTE:</label>
                           <input type="text" id="dniRepresentante" class="form-control">
                       </div>
                       <div class="col-md-6">
                           <label class="form-label">WHATSAPP REPRESENTANTE:</label>
                           <input type="text" id="whatsappRepresentante" class="form-control">
                       </div>
                   </div>
               </div>

               <div class="mt-4">
                   <label class="form-label d-block mb-3">MÓDULOS ACTIVOS:</label>
                   <div id="contenedorModulos" class="row g-2">
                       <div class="col-12 text-center py-3"><div class="spinner-border text-warning spinner-border-sm"></div></div>
                   </div>
               </div>

               <button type="submit" class="btn btn-enviar">REVISAR Y ENVIAR</button>
           </form>
      </div>
</div>

<script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
           apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
           authDomain: "ucmi-13796634.firebaseapp.com",
           projectId: "ucmi-13796634",
           storageBucket: "ucmi-13796634.firebasestorage.app",
           messagingSenderId: "1090719609536",
           appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const urlParams = new URLSearchParams(window.location.search);
      const sedeRef = urlParams.get('ref') || "UCMI";
      let datosGlobales = {};
      const modalRevision = new bootstrap.Modal(document.getElementById('modalRevision'));

      // CARGA DINÁMICA FILTRADA
      async function cargarConfiguracion() {
           const q = query(collection(db, "usuarios"), where("entidad", "==", sedeRef));
           const snap = await getDocs(q);
           
           if (!snap.empty) {
               const data = snap.docs[0].data();
               document.getElementById('logoDinamico').src = data.logoCustom || "";
               document.getElementById('logoDinamico').style.opacity = "1";
               document.getElementById('nombreSede').innerText = data.entidad.toUpperCase();

               const contenedor = document.getElementById('contenedorModulos');
               contenedor.innerHTML = '';

               // FILTRO CRÍTICO: Cruzar lista de módulos con su estado de oferta
               const listaModulos = data.modulos || [];
               const visibilidad = data['modulos-ofertados-academia'] || {};

               const modulosActivos = listaModulos.filter(m => visibilidad[m] === true);

               if (modulosActivos.length === 0) {
                   contenedor.innerHTML = '<div class="col-12 text-warning small">No hay módulos habilitados por la academia actualmente.</div>';
                   return;
               }

               modulosActivos.forEach(mod => {
                   const col = document.createElement('div');
                   col.className = 'col-md-6';
                   col.innerHTML = `
                       <div class="form-check p-2 border border-secondary rounded-3 mb-2" style="background:rgba(255,255,255,0.03)">
                           <input class="form-check-input ms-0 me-2 check-modulo" type="checkbox" value="${mod}" id="${mod}">
                           <label class="form-check-label text-white small" for="${mod}">${mod}</label>
                       </div>`;
                   contenedor.appendChild(col);
               });
           }
      }
      cargarConfiguracion();

      // Cálculo de Edad
      document.getElementById('fechaNacimiento').addEventListener('change', (e) => {
           const naci = new Date(e.target.value);
           const hoy = new Date();
           let edad = hoy.getFullYear() - naci.getFullYear();
           if (hoy.getMonth() < naci.getMonth() || (hoy.getMonth() === naci.getMonth() && hoy.getDate() < naci.getDate())) edad--;
           
           document.getElementById('edadEstudiante').value = edad;
           const esMenor = edad < 18 && edad > 0;
           document.getElementById('panelRepresentante').style.display = esMenor ? 'block' : 'none';
      });

      // ATAJOS CTRL + Q (Adulto) y CTRL + M (Menor)
      window.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key.toLowerCase() === 'q') {
              e.preventDefault();
              document.getElementById('nombreResponsable').value = "Juan Carlos Riera";
              document.getElementById('dniEstudiante').value = "V-12345678";
              document.getElementById('genero').value = "Masculino";
              document.getElementById('fechaNacimiento').value = "1985-03-10";
              document.getElementById('fechaNacimiento').dispatchEvent(new Event('change'));
              document.getElementById('ubicacion').value = "Caracas, Venezuela";
              document.getElementById('email').value = "j.riera@ucmi.edu.ve";
              document.getElementById('whatsapp').value = "04121234567";
          }
          if (e.ctrlKey && e.key.toLowerCase() === 'm') {
              e.preventDefault();
              document.getElementById('nombreResponsable').value = "Abril Riera";
              document.getElementById('dniEstudiante').value = "V-30888999";
              document.getElementById('fechaNacimiento').value = "2015-05-12";
              document.getElementById('fechaNacimiento').dispatchEvent(new Event('change'));
              setTimeout(() => {
                  document.getElementById('nombreRepresentante').value = "Nory Romero";
                  document.getElementById('dniRepresentante').value = "V-15111222";
                  document.getElementById('whatsappRepresentante').value = "04149998877";
              }, 50);
          }
      });

      // Lógica de Modal
      document.getElementById('formIdiomas').onsubmit = (e) => {
          e.preventDefault();
          const seleccionados = Array.from(document.querySelectorAll('.check-modulo:checked')).map(cb => cb.value);
          if (seleccionados.length === 0) return Swal.fire("Módulos", "Selecciona al menos uno.", "warning");
          if (!e.target.checkValidity()) return e.target.classList.add('was-validated');

          datosGlobales = {
              nombreResponsable: document.getElementById('nombreResponsable').value,
              dniEstudiante: document.getElementById('dniEstudiante').value,
              edadEstudiante: document.getElementById('edadEstudiante').value,
              modulos: seleccionados,
              entidad: sedeRef,
              perfil: "UCMI Student",
              fechaInscripcion: new Date().toLocaleString()
          };

          let html = `
            <div class="p-2">
                <p class="mb-1"><span class="resumen-label">Estudiante:</span> ${datosGlobales.nombreResponsable}</p>
                <p class="mb-1"><span class="resumen-label">DNI:</span> ${datosGlobales.dniEstudiante}</p>
                <p class="mb-3"><span class="resumen-label">Módulos:</span> <span class="text-warning">${datosGlobales.modulos.join(' | ')}</span></p>
            </div>`;

          if (datosGlobales.edadEstudiante < 18) {
              datosGlobales.nombreRepresentante = document.getElementById('nombreRepresentante').value;
              html += `<div class="bg-dark p-2 rounded"><span class="resumen-label text-warning">Representante:</span> ${datosGlobales.nombreRepresentante}</div>`;
          }

          document.getElementById('cuerpoRevision').innerHTML = html;
          modalRevision.show();
      };

      // Envío Final a Firestore
      document.getElementById('confirmarEnvio').onclick = async () => {
          const btn = document.getElementById('confirmarEnvio');
          btn.disabled = true;
          btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span>`;

          try {
              await addDoc(collection(db, "postulaciones"), datosGlobales);
              modalRevision.hide();
              await Swal.fire({ icon: 'success', title: '¡Registrado!', confirmButtonColor: '#c5a059' });
              location.reload();
          } catch (e) {
              Swal.fire("Error", "No se pudo guardar.", "error");
              btn.disabled = false;
              btn.innerText = "SÍ, ENVIAR DATOS";
          }
      };
</script>
</body>
</html>
