<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --azul-ucmi: #1a2a3a; 
            --azul-intenso: #003366; 
            --dorado-ucmi: #c5a059; 
            --rojo-error: #ff4d4d;
            --blanco-suave: rgba(255, 255, 255, 0.9);
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px 0; 
            color: white;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(6, 9, 15, 0.6) 0%, rgba(6, 9, 15, 0.9) 100%);
            z-index: -1;
        }

        .card-form { 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px);
            max-width: 850px; 
            margin: auto; 
            overflow: hidden; 
        }

        .header-minimalista { 
            text-align: center; 
            padding: 50px 20px 20px 20px; 
            background: rgba(0, 0, 0, 0.2);
        }

        .header-minimalista h2 { 
            color: var(--blanco-suave); 
            font-weight: 800; 
            font-size: 1.5rem; 
            text-transform: uppercase; 
            margin-top: 20px; 
            letter-spacing: 1px;
        }

        .text-glow-gold {
            color: var(--dorado-ucmi);
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.5);
            font-weight: 700;
        }

        .linea-decorativa { 
            width: 70px; 
            height: 4px; 
            background: var(--dorado-ucmi); 
            margin: 25px auto; 
            border-radius: 2px; 
            box-shadow: 0 0 10px var(--dorado-ucmi);
        }
        
        .form-label { color: var(--dorado-ucmi); font-size: 0.9rem; letter-spacing: 0.5px; }

        .form-control, .form-select { 
            border-radius: 12px; 
            padding: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            background: rgba(255, 255, 255, 0.08);
            color: white;
            transition: 0.3s; 
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--dorado-ucmi);
            color: white;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.4); }

        /* Estilo para las opciones del select en modo oscuro */
        select option { background: #1a1a1a; color: white; }

        .seccion-dinamica { 
            display: none; 
            animation: slideIn 0.4s ease-out; 
            background: rgba(0, 0, 0, 0.2); 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            margin-top: 15px; 
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .program-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 12px; 
            background: rgba(255, 255, 255, 0.03); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .btn-enviar { 
            background: linear-gradient(135deg, var(--dorado-ucmi), #8a6d3b); 
            color: #000; 
            font-weight: 800; 
            padding: 18px; 
            border-radius: 15px; 
            border: none; 
            font-size: 1.1rem; 
            width: 100%; 
            margin-top: 25px; 
            transition: 0.3s; 
            letter-spacing: 1px;
        }

        .btn-enviar:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px rgba(197, 160, 89, 0.4);
            filter: brightness(1.1);
        }

        .check-all-container { 
            background: rgba(197, 160, 89, 0.1); 
            padding: 12px 20px; 
            border-radius: 10px 10px 0 0; 
            border: 1px solid rgba(197, 160, 89, 0.3); 
            border-bottom: none; 
        }

        .form-check-input:checked { background-color: var(--dorado-ucmi); border-color: var(--dorado-ucmi); }
        
        .is-invalid { border: 2px solid var(--rojo-error) !important; }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="card-form">
        <div class="header-minimalista">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo UCMI" style="height: 100px; width: auto;">
            <h2>Universitario de Ciencias Matemáticas e Idiomas</h2>
            <h1 class="text-glow-gold text-uppercase mt-2" style="font-size: 1.8rem;">Registro de Postulación</h1>
            <div class="linea-decorativa"></div>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-4" novalidate>
            <div class="mb-4">
                <label class="form-label fw-bold"><i class="bi bi-person-badge me-2"></i>Tipo de Postulante:</label>
                <select class="form-select form-select-lg" id="perfilPrincipal" required onchange="gestionarFlujo()">
                    <option value="" selected disabled>Seleccione su perfil...</option>
                    <option value="Academia">Academia / Institución</option>
                    <option value="Independiente">Profesor Independiente</option>
                    <option value="Estudiante autodidacta">Estudiante Autodidacta</option>
                </select>
            </div>

            <div id="subSeccionProfesor" class="seccion-dinamica mb-4">
                <label class="form-label fw-bold"><i class="bi bi-mortarboard me-2"></i>Modalidad de Profesor:</label>
                <select class="form-select" id="subTipoProfesor">
                    <option value="Profesor asociado" selected>Profesor Asociado (Gestión de Cupos)</option>
                    <option value="Profesor embajador">Profesor Embajador (Marca Blanca)</option>
                </select>
            </div>

            <div id="cuerpoFormulario" style="display: none;">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Nombre Completo:</label>
                        <input type="text" id="nombreInput" class="form-control" placeholder="Nombre del responsable" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Correo Institucional / Personal:</label>
                        <input type="email" id="emailInput" class="form-control" placeholder="ejemplo@ucmi.edu" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">WhatsApp:</label>
                        <input type="text" id="whatsappInput" class="form-control" placeholder="+58..." required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Ciudad y País:</label>
                        <input type="text" id="ubicacionInput" class="form-control" placeholder="Ubicación geográfica" required>
                    </div>
                </div>

                <div id="camposAcademia" class="seccion-dinamica">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold" id="labelEntidad" for="entidadInput">Nombre de la Institución:</label>
                            <input type="text" id="entidadInput" class="form-control" placeholder="Razón social" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Identificación Fiscal (RIF/DNI):</label>
                            <input type="text" id="rifInput" class="form-control" placeholder="Registro oficial" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Cupos Solicitados:</label>
                            <input type="number" id="cuposInput" class="form-control" placeholder="Cant. estudiantes" required min="1">
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="form-label fw-bold text-uppercase small text-white-50">Programas Académicos a Vincular</label>
                    <div class="check-all-container">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="selectAll">
                            <label class="form-check-label fw-bold" for="selectAll">Seleccionar Todo el Ecosistema</label>
                        </div>
                    </div>
                    <div class="program-grid mb-3" id="gridProgramas"></div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold small">Duración de la Licencia (Meses):</label>
                    <input type="number" id="mesesInput" class="form-control" placeholder="Mínimo sugerido: 12" required min="1">
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-enviar shadow">ENVIAR POSTULACIÓN OFICIAL</button>
            </div>
        </form>
    </div>
    
    <div class="text-center mt-4">
        <p class="text-white-50 small"><i class="bi bi-shield-check me-1"></i> Transmisión encriptada bajo el Protocolo Supralógico UCMI</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const programas = ["Matemática AGEM", "Física", "Química", "Biología", "Lógica", "Estadística", "Razonamiento numérico", "Razonamiento abstracto", "Lengua", "Inglés A1", "Inglés A2", "Inglés B1", "Inglés B1+", "Inglés B2", "Inglés B2+", "Inglés C1"];
    const grid = document.getElementById('gridProgramas');
    programas.forEach(p => {
        grid.innerHTML += `<div class="form-check"><input class="form-check-input prog-check" type="checkbox" value="${p}" id="chk_${p.replace(/\s/g,'')}"><label class="form-check-label small text-white" for="chk_${p.replace(/\s/g,'')}">${p}</label></div>`;
    });

    document.getElementById('selectAll').addEventListener('change', function() {
        document.querySelectorAll('.prog-check').forEach(cb => cb.checked = this.checked);
    });

    window.gestionarFlujo = () => {
        const principal = document.getElementById('perfilPrincipal').value;
        const subTipo = document.getElementById('subTipoProfesor').value;
        const camposAcademiaDoc = document.getElementById('camposAcademia');
        const labelEntidad = document.getElementById('labelEntidad');
        const inputEntidad = document.getElementById('entidadInput');
        const inputRif = document.getElementById('rifInput');
        const inputCupos = document.getElementById('cuposInput');
        
        document.getElementById('cuerpoFormulario').style.display = 'block';
        document.getElementById('subSeccionProfesor').style.display = (principal === 'Independiente') ? 'block' : 'none';
        
        if (principal === 'Academia' || principal === 'Independiente') {
            camposAcademiaDoc.style.display = 'block';
            inputRif.required = true;
            inputEntidad.required = true;

            if (principal === 'Academia') {
                labelEntidad.innerText = "Nombre de la Institución:";
                inputCupos.parentElement.style.display = "block";
                inputCupos.required = true;
            } else {
                labelEntidad.innerText = "Razón Social o Firma Personal:";
                const esAsociado = (subTipo === 'Profesor asociado');
                inputCupos.parentElement.style.display = esAsociado ? "block" : "none";
                inputCupos.required = esAsociado;
            }
        } else {
            camposAcademiaDoc.style.display = 'none';
            inputRif.required = false; inputEntidad.required = false; inputCupos.required = false;
            inputRif.value = ""; inputEntidad.value = ""; inputCupos.value = "";
        }
    };

    document.getElementById('subTipoProfesor').addEventListener('change', window.gestionarFlujo);

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const btn = document.getElementById('btnSubmit');
        const gridProgramas = document.getElementById('gridProgramas');
        const programasCheckboxes = document.querySelectorAll('.prog-check:checked');

        if (programasCheckboxes.length === 0) {
            alert("Debe seleccionar al menos un programa académico.");
            return;
        }

        if (!form.checkValidity()) {
            e.stopPropagation();
            form.classList.add('was-validated');
            return;
        }

        btn.disabled = true;
        btn.innerText = "Procesando Postulación...";

        const principal = document.getElementById('perfilPrincipal').value;
        const subValor = document.getElementById('subTipoProfesor').value;
        const tipoFinal = (principal === 'Independiente') ? subValor : principal;
        const programasSel = Array.from(document.querySelectorAll('.prog-check:checked')).map(c => c.value).join(", ");

        const datos = {
            tipoSolicitante: tipoFinal,
            perfil: tipoFinal,
            nombreResponsable: document.getElementById('nombreInput').value.trim(),
            email: document.getElementById('emailInput').value.trim(),
            whatsapp: document.getElementById('whatsappInput').value.trim(),
            ubicacion: document.getElementById('ubicacionInput').value.trim(),
            programas: programasSel,
            duracionLicencia: document.getElementById('mesesInput').value + " meses",
            cupos: (principal === "Academia" || (principal === "Independiente" && subValor === "Profesor asociado")) ? (document.getElementById('cuposInput').value || "1") : "1",
            rif: (principal === 'Estudiante autodidacta') ? "Persona Natural" : document.getElementById('rifInput').value.trim(),
            entidad: (principal === 'Estudiante autodidacta') ? document.getElementById('nombreInput').value.trim() : document.getElementById('entidadInput').value.trim(),
            fecha: new Date().toLocaleString()
        };

        try {
            await addDoc(collection(db, "postulaciones"), datos);
            generarPDF(datos);
            alert("¡Postulación registrada con éxito! Se abrirá el comprobante.");
            setTimeout(() => location.reload(), 2000);
        } catch (err) {
            alert("Error al enviar. Intente de nuevo.");
            btn.disabled = false;
        }
    });

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(26, 42, 58); doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(197, 160, 89); doc.setFontSize(18); doc.setFont(undefined, 'bold');
        doc.text("UCMI - REGISTRO OFICIAL", 55, 25);
        
        doc.setTextColor(0, 0, 0); doc.setFontSize(11);
        doc.text(`POSTULACIÓN: ${d.perfil.toUpperCase()}`, 20, 60);
        doc.setFontSize(9); doc.text(`FECHA: ${d.fecha}`, 140, 60);
        doc.line(20, 65, 190, 65);
        
        let y = 80;
        const filas = [
            ["RESPONSABLE:", d.nombreResponsable],
            ["ENTIDAD:", d.entidad],
            ["ID FISCAL:", d.rif],
            ["WHATSAPP:", d.whatsapp],
            ["UBICACIÓN:", d.ubicacion],
            ["CUPOS:", d.cupos], 
            ["LICENCIA:", d.duracionLicencia],
            ["PROGRAMAS:", d.programas]
        ];

        filas.forEach(f => {
            doc.setFont(undefined, 'bold'); doc.text(f[0], 20, y);
            doc.setFont(undefined, 'normal'); 
            const text = doc.splitTextToSize(String(f[1]), 120);
            doc.text(text, 70, y);
            y += (text.length * 7) + 3;
        });
        
        window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
