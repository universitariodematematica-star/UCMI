<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Academia - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); }
        .section-title { border-left: 5px solid #0d6efd; padding-left: 10px; margin-bottom: 20px; color: #0d6efd; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 form-container">
            <h2 class="text-center mb-4">Postulación de Academia UCMI</h2>
            <p class="text-muted text-center">Complete los datos para solicitar su licencia de administración.</p>
            <hr>

            <form id="formPostulacion">
                <h4 class="section-title">1. Identidad Institucional</h4>
                <div class="mb-3">
                    <label class="form-label">Nombre de la Academia</label>
                    <input type="text" class="form-control" id="nombreAcademia" required>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">ID Fiscal (RIF / NIT)</label>
                        <input type="text" class="form-control" id="idFiscal" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">País</label>
                        <input type="text" class="form-control" id="pais" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Dirección Física</label>
                    <textarea class="form-control" id="direccion" rows="2" required></textarea>
                </div>

                <h4 class="section-title mt-4">2. Responsable de la Licencia</h4>
                <div class="mb-3">
                    <label class="form-label">Nombre del Director/Representante</label>
                    <input type="text" class="form-control" id="nombreResponsable" required>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Correo Electrónico Oficial</label>
                        <input type="email" class="form-control" id="emailResponsable" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">WhatsApp / Teléfono</label>
                        <input type="tel" class="form-control" id="telefono" required>
                    </div>
                </div>

                <h4 class="section-title mt-4">3. Detalles de la Licencia</h4>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Cantidad de Cupos Estimados</label>
                        <input type="number" class="form-control" id="cupos" placeholder="Ej: 50" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Programas de Interés</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="Matemática AGEM" id="progMat">
                            <label class="form-check-label">Matemática AGEM</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="Física" id="progFis">
                            <label class="form-check-label">Física</label>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Subir Registro Fiscal (PDF o Imagen)</label>
                    <input class="form-control" type="file" id="archivoFiscal" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Enviar Solicitud de Postulación</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
