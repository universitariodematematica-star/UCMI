<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --azul-ucmi: #1a2a3a; 
            --azul-intenso: #003366;
            --dorado-ucmi: #c5a059; 
        }
        
        body { 
            background-color: #f8f9fa; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 50px 0;
        }

        .card-form { 
            border: none; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.08); 
            background: white;
            overflow: hidden;
        }

        .header-minimalista {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        .header-minimalista h2 {
            color: var(--azul-ucmi);
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .instruccion-azul {
            color: var(--azul-intenso);
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .linea-decorativa {
            width: 60px;
            height: 4px;
            background: var(--dorado-ucmi);
            margin: 20px auto;
            border-radius: 2px;
        }

        .form-label { font-weight: 600; color: #444; }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1.5px solid #dee2e6;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--azul-intenso);
            box-shadow: 0 0 0 0.25rem rgba(0, 51, 102, 0.1);
        }

        .seccion-dinamica { 
            display: none; 
            animation: fadeIn 0.4s ease-out; 
            background: #fbfbfb;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .btn-enviar {
            background: var(--azul-ucmi);
            color: white;
            font-weight: bold;
            padding: 16px;
            border-radius: 15px;
            border: none;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn-enviar:hover {
            background: var(--azul-intenso);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-9 col-lg-7 card-form">
            
            <div class="header-minimalista">
                <img src="logo_ucmi.png" alt="Logo UCMI" style="height: 110px; width: auto;">
                <h2 class="mt-4">Universitario de Ciencias Matemáticas e Idioma</h2>
                <p class="instruccion-azul">Seleccione su modalidad para iniciar el proceso</p>
                <div class="linea-decorativa"></div>
            </div>

            <form id="formUCMI" class="p-4 p-md-5 pt-0">
                
                <div class="mb-4">
                    <label class="form-label">¿En qué calidad se postula?</label>
                    <select class="form-select form-select-lg" id="selectorPerfil" required onchange="alternarCampos()">
                        <option value="" selected disabled>Elija una modalidad...</option>
                        <option value="ACADEMIA">Academia o Institución</option>
                        <option value="PROFESOR">Profesor Independiente</option>
                        <option value="ESTUDIANTE">Estudiante Autodidacta</option>
                    </select>
                </div>

                <div id="datosComunes" style="display: none;">
                    <h6 class="text-muted text-uppercase small fw-bold mb-3">Información de Contacto</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="text" id="nombrePostulante" class="form-control" placeholder="Nombre Completo" required>
                        </div>
                        <div class="col-md-6">
                            <input type="email" id="emailPostulante" class="form-control" placeholder="Correo Electrónico" required>
                        </div>
                        <div class="col-md-6">
                            <input type="text" id="whatsappPostulante" class="form-control" placeholder="WhatsApp (Ej: +58...)" required>
                        </div>
                        <div class="col-md-6">
                            <input type="text" id="ubicacionPostulante" class="form-control" placeholder="Ciudad y País" required>
                        </div>
                    </div>
                    <hr class="my-4">
                </div>

                <div id="camposAcademia" class="seccion-dinamica">
                    <h6 class="text-primary text-uppercase small fw-bold mb-3">Datos de la Institución</h6>
                    <div class="row g-3">
                        <div class="col-12">
                            <input type="text" id="nombreEntidad" class="form-control" placeholder="Nombre de la Academia">
                        </div>
                        <div class="col-md-6">
                            <input type="text" id="rifEntidad" class="form-control" placeholder="RIF / Identificación Fiscal">
                        </div>
                        <div class="col-md-6">
                            <input type="number" id="cuposEntidad" class="form-control" placeholder="Número de Cupos">
                        </div>
                    </div>
                </div>

                <div id="camposProfesor" class="seccion-dinamica">
                    <h6 class="text-primary text-uppercase small fw-bold mb-3">Modelo de Negocio</h6>
                    <div class="form-check p-3 border rounded mb-2 bg-white">
                        <input class="form-check-input" type="radio" name="tipoProfesor" id="profSocio" value="SOCIO" checked>
                        <label class="form-check-label ms-2" for="profSocio">
                            <strong>Profesor Socio:</strong> Yo gestiono y vendo mis propios cupos.
                        </label>
                    </div>
                    <div class="form-check p-3 border rounded bg-white">
                        <input class="form-check-input" type="radio" name="tipoProfesor" id="profEmbajador" value="EMBAJADOR">
                        <label class="form-check-label ms-2" for="profEmbajador">
                            <strong>Profesor Embajador:</strong> UCMI gestiona y vende los cupos por mí.
                        </label>
                    </div>
                </div>

                <div id="camposEstudiante" class="seccion-dinamica">
                    <h6 class="text-primary text-uppercase small fw-bold mb-3">Perfil del Estudiante</h6>
                    <textarea id="interesEstudiante" class="form-control" rows="3" placeholder="Indique sus áreas de interés (Cálculo, Supralógica, Idiomas, etc.)"></textarea>
                </div>

                <div id="footerForm" class="mt-4" style="display: none;">
                    <button type="submit" id="btnSubmit" class="btn btn-enviar w-100 shadow-sm">
                        ENVIAR POSTULACIÓN Y GENERAR PDF
                    </button>
                    <p class="text-center small text-muted mt-3">
                        Al enviar, usted acepta los términos de postulación del Universitario UCMI.
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>

<script type="module">
    // IMPORTACIONES DE FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // FUNCIÓN PARA CAMBIAR FORMULARIO SEGÚN SELECCIÓN
    window.alternarCampos = () => {
        const perfil = document.getElementById('selectorPerfil').value;
        const secciones = document.querySelectorAll('.seccion-dinamica');
        
        secciones.forEach(s => s.style.display = 'none');
        document.getElementById('datosComunes').style.display = 'block';
        document.getElementById('footerForm').style.display = 'block';

        if(perfil === 'ACADEMIA') document.getElementById('camposAcademia').style.display = 'block';
        if(perfil === 'PROFESOR') document.getElementById('camposProfesor').style.display = 'block';
        if(perfil === 'ESTUDIANTE') document.getElementById('camposEstudiante').style.display = 'block';
    };

    // ENVÍO DE DATOS
    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "Registrando postulación...";

        const seleccion = document.getElementById('selectorPerfil').value;
        let perfilAsignado = "";

        // LÓGICA DE ASIGNACIÓN PARA EVITAR 'UNDEFINED'
        if (seleccion === "ACADEMIA") {
            perfilAsignado = "Academia";
        } else if (seleccion === "PROFESOR") {
            const esSocio = document.getElementById('profSocio').checked;
            perfilAsignado = esSocio ? "Profesor Socio" : "Profesor Embajador";
        } else {
            perfilAsignado = "Estudiante Autodidacta";
        }

        const datos = {
            tipoSolicitante: perfilAsignado,
            director: document.getElementById('nombrePostulante').value,
            email: document.getElementById('emailPostulante').value,
            telefono: document.getElementById('whatsappPostulante').value,
            ubicacion: document.getElementById('ubicacionPostulante').value,
            academia: document.getElementById('nombreEntidad')?.value || "N/A",
            rif: document.getElementById('rifEntidad')?.value || "N/A",
            cupos: document.getElementById('cuposEntidad')?.value || "1",
            interes: document.getElementById('interesEstudiante')?.value || "N/A",
            fecha: new Date().toLocaleString()
        };

        try {
            // Guardar en la nube
            await addDoc(collection(db, "postulaciones"), datos);
            
            // Crear PDF
            generarPDFOficial(datos);

            alert("Registro completado. Su comprobante PDF se ha generado correctamente.");
            window.location.reload();
        } catch (error) {
            console.error(error);
            alert("Hubo un problema con la conexión. Intente de nuevo.");
            btn.disabled = false;
        }
    });

    // GENERADOR DE PDF
    function generarPDFOficial(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Estética del PDF
        doc.setFillColor(26, 42, 58);
        doc.rect(0, 0, 210, 35, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(18);
        doc.text("COMPROBANTE DE POSTULACIÓN UCMI", 105, 22, { align: 'center' });

        doc.setTextColor(0, 0, 0);
        doc.setFontSize(12);
        doc.setFont(undefined, 'bold');
        doc.text(`MODALIDAD: ${d.tipoSolicitante.toUpperCase()}`, 20, 50);
        
        doc.setFont(undefined, 'normal');
        doc.setFontSize(10);
        doc.text(`ID de Registro: ${Math.floor(Math.random() * 1000000)}`, 20, 58);
        doc.text(`Fecha: ${d.fecha}`, 20, 64);
        doc.line(20, 70, 190, 70);

        // Bloque de datos
        let y = 85;
        const info = [
            ["SOLICITANTE:", d.director],
            ["CONTACTO:", d.email],
            ["UBICACIÓN:", d.ubicacion]
        ];

        if(d.tipoSolicitante === "Academia") {
            info.push(["INSTITUCIÓN:", d.academia], ["RIF/ID:", d.rif], ["CUPOS:", d.cupos]);
        }

        info.forEach(item => {
            doc.setFont(undefined, 'bold');
            doc.text(item[0], 25, y);
            doc.setFont(undefined, 'normal');
            doc.text(item[1], 65, y);
            y += 10;
        });

        doc.setFontSize(9);
        doc.setTextColor(150);
        doc.text("Este documento certifica que su solicitud ha entrado en fase de revisión.", 105, 275, { align: 'center' });
        doc.text("Universitario de Ciencias Matemáticas e Idioma - 2026", 105, 282, { align: 'center' });

        doc.save(`UCMI_Postulacion_${d.director.replace(/\s+/g, '_')}.pdf`);
    }
</script>

</body>
</html>
