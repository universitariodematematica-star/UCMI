<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Academia - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0px 10px 30px rgba(0,0,0,0.1); margin-top: 30px; margin-bottom: 50px; }
        .section-title { border-left: 5px solid #0056b3; padding-left: 15px; margin-bottom: 25px; color: #0056b3; font-weight: bold; }
        .btn-primary { background-color: #0056b3; border: none; padding: 15px; font-weight: bold; }
        .logo-ucmi { max-height: 100px; width: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-9 form-container">
            <div class="text-center mb-4">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGorr06sfB3DGVDAPb7LfW18T5Iws9DunEX2U7D-nLT0Vk1hmI8Jj_PnuHAqEz4OoTeUNBtJkp-IDb0SlYV5aO1_rG5_v02TqLsm45COGzm5wRvP2Dp9jelaRSj42yfOCZKTYvKOA_5Lc38kG9hTEclhqhHIesaP2fuwd48wr-3Lp5joWtgRIQ6i4t0jUd/s166/logo_ucmi.png" alt="Logo UCMI" class="logo-ucmi mb-2">
                <h2 class="fw-bold mb-0">UCMI</h2>
                <p class="text-muted">Universitario de Ciencias Matemáticas e Idiomas</p>
            </div>
            
            <hr class="my-4">

            <form id="formPostulacion">
                <h4 class="section-title">1. Identificación de la Institución</h4>
                <div class="row g-3 mb-4">
                    <div class="col-md-12"><label class="form-label fw-semibold">Nombre de la Academia</label><input type="text" class="form-control" id="nombreAcademia" required></div>
                    <div class="col-md-6"><label class="form-label fw-semibold">ID Fiscal (RIF / NIT)</label><input type="text" class="form-control" id="idFiscal" required></div>
                    <div class="col-md-6"><label class="form-label fw-semibold">País / Ciudad</label><input type="text" class="form-control" id="ubicacion" required></div>
                    <div class="col-md-12"><label class="form-label fw-semibold">Nombre del Director</label><input type="text" class="form-control" id="director" required></div>
                    <div class="col-md-6"><label class="form-label fw-semibold">Correo Electrónico</label><input type="email" class="form-control" id="email" required></div>
                    <div class="col-md-6"><label class="form-label fw-semibold">WhatsApp</label><input type="tel" class="form-control" id="telefono" required></div>
                </div>

                <h4 class="section-title">2. Programas y Licencia</h4>
                <div class="row g-3 mb-4">
                    <div class="col-md-6"><label class="form-label fw-semibold">Cupos Solicitados</label><input type="number" class="form-control" id="cupos" required></div>
                    <div class="col-md-6"><label class="form-label fw-semibold">Tiempo Solicitado (Meses)</label><input type="number" class="form-control" id="meses" required></div>
                    
                    <div class="col-md-12">
                        <label class="form-label fw-semibold">Programas de Interés</label>
                        <div class="card p-3 border-light shadow-sm">
                            <div class="row" id="checkGroup">
                                <div class="col-6">
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Matemática AGEM"><label class="form-check-label">Matemática AGEM</label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Física"><label class="form-check-label">Física</label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Química"><label class="form-check-label">Química</label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Inglés"><label class="form-check-label">Inglés</label></div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Lógica"><label class="form-check-label">Lógica</label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Lengua"><label class="form-check-label">Lengua</label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Razonamiento Numérico"><label class="form-check-label">Razonamiento Numérico</label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Razonamiento Abstracto"><label class="form-check-label">Razonamiento Abstracto</label></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary shadow">Enviar y Generar Constancia PDF</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('formPostulacion');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const seleccionados = [];
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(c => seleccionados.push(c.value));

        const data = {
            academia: document.getElementById('nombreAcademia').value,
            rif: document.getElementById('idFiscal').value,
            ubicacion: document.getElementById('ubicacion').value,
            director: document.getElementById('director').value,
            email: document.getElementById('email').value,
            telefono: document.getElementById('telefono').value,
            cupos: document.getElementById('cupos').value,
            meses: document.getElementById('meses').value,
            programas: seleccionados.join(", "),
            fecha: new Date().toLocaleString()
        };

        try {
            await addDoc(collection(db, "postulaciones"), { ...data, fecha_db: serverTimestamp(), estado: "pendiente" });

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGorr06sfB3DGVDAPb7LfW18T5Iws9DunEX2U7D-nLT0Vk1hmI8Jj_PnuHAqEz4OoTeUNBtJkp-IDb0SlYV5aO1_rG5_v02TqLsm45COGzm5wRvP2Dp9jelaRSj42yfOCZKTYvKOA_5Lc38kG9hTEclhqhHIesaP2fuwd48wr-3Lp5joWtgRIQ6i4t0jUd/s166/logo_ucmi.png";

            img.onload = function() {
                // Logo y Texto Institucional
                doc.addImage(img, 'PNG', 85, 10, 40, 40);
                doc.setFontSize(14);
                doc.setFont("helvetica", "bold");
                doc.text("Universitario de Ciencias Matemáticas e Idiomas", 105, 55, { align: "center" });
                
                // Título de la Constancia
                doc.setFontSize(18);
                doc.setTextColor(0, 86, 179);
                doc.text("Constancia de solicitud de servicio", 105, 75, { align: "center" });
                
                doc.setDrawColor(0, 86, 179);
                doc.line(20, 80, 190, 80);
                
                // Datos del Formulario
                doc.setFontSize(11);
                doc.setTextColor(0, 0, 0);
                doc.setFont("helvetica", "normal");
                
                let y = 95;
                const items = [
                    ["Nombre de la Academia:", data.academia],
                    ["ID Fiscal:", data.rif],
                    ["Ubicación:", data.ubicacion],
                    ["Director Responsable:", data.director],
                    ["Correo:", data.email],
                    ["Teléfono:", data.telefono],
                    ["Cupos:", data.cupos],
                    ["Meses de Licencia:", data.meses],
                    ["Programas seleccionados:", data.programas],
                    ["Fecha de Solicitud:", data.fecha]
                ];

                items.forEach(([label, value]) => {
                    doc.setFont("helvetica", "bold"); doc.text(label, 20, y);
                    doc.setFont("helvetica", "normal"); 
                    // Manejo de texto largo para programas
                    const splitValue = doc.splitTextToSize(value.toString(), 110);
                    doc.text(splitValue, 80, y);
                    y += (splitValue.length * 7);
                });

                doc.save(`UCMI_Solicitud_${data.academia}.pdf`);
                alert('Solicitud enviada. Su PDF se ha descargado.');
                form.reset();
            };
            
            img.onerror = function() {
                alert("Error cargando el logo para el PDF, pero los datos se guardaron.");
            };

        } catch (e) {
            alert("Error al conectar con la base de datos.");
        }
    });
</script>
</body>
</html>
