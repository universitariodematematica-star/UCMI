<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --azul-ucmi: #1a2a3a; --dorado-ucmi: #c5a059; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding: 40px 0; }
        .card-form { border: none; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: white; }
        .header-form { background: var(--azul-ucmi); color: white; padding: 30px; border-radius: 25px 25px 0 0; text-align: center; }
        .btn-enviar { background: var(--azul-ucmi); color: white; font-weight: bold; border-radius: 10px; padding: 12px; transition: 0.3s; border: none; }
        .btn-enviar:hover { background: #2c3e50; transform: translateY(-2px); }
        .seccion-dinamica { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 card-form">
            <div class="header-form">
                <img src="logo_ucmi.png" alt="Logo UCMI" style="height: 70px; filter: brightness(0) invert(1);">
                <h2 class="mt-3 fw-bold">Registro al Ecosistema UCMI</h2>
                <p class="mb-0 opacity-75">Seleccione su modalidad para iniciar el proceso</p>
            </div>

            <form id="formUCMI" class="p-4 p-md-5">
                <div class="mb-4">
                    <label class="form-label fw-bold">¿En qué calidad se postula?</label>
                    <select class="form-select form-select-lg border-2" id="selectorPerfil" required onchange="alternarCampos()">
                        <option value="" selected disabled>Elija una opción...</option>
                        <option value="ACADEMIA">Academia o Institución</option>
                        <option value="PROFESOR">Profesor Independiente</option>
                        <option value="ESTUDIANTE">Estudiante Autodidacta</option>
                    </select>
                </div>

                <div id="datosComunes" style="display: none;">
                    <div class="row g-3">
                        <div class="col-md-6"><input type="text" id="nombrePostulante" class="form-control" placeholder="Nombre Completo" required></div>
                        <div class="col-md-6"><input type="email" id="emailPostulante" class="form-control" placeholder="Correo Electrónico" required></div>
                        <div class="col-md-6"><input type="text" id="whatsappPostulante" class="form-control" placeholder="WhatsApp (con código país)" required></div>
                        <div class="col-md-6"><input type="text" id="ubicacionPostulante" class="form-control" placeholder="Ciudad y País" required></div>
                    </div>
                    <hr class="my-4">
                </div>

                <div id="camposAcademia" class="seccion-dinamica">
                    <h5 class="fw-bold text-primary mb-3">Información Institucional</h5>
                    <div class="row g-3">
                        <div class="col-md-12"><input type="text" id="nombreEntidad" class="form-control" placeholder="Nombre de la Academia"></div>
                        <div class="col-md-6"><input type="text" id="rifEntidad" class="form-control" placeholder="RIF / Identificación Fiscal"></div>
                        <div class="col-md-6"><input type="number" id="cuposEntidad" class="form-control" placeholder="Cupos requeridos"></div>
                    </div>
                </div>

                <div id="camposProfesor" class="seccion-dinamica">
                    <h5 class="fw-bold text-primary mb-3">Modalidad de Colaboración</h5>
                    <p class="small text-muted">¿Cómo desea gestionar la venta de sus cupos?</p>
                    <div class="card p-3 border-dashed">
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="radio" name="tipoProfesor" id="profSocio" value="SOCIO" checked>
                            <label class="form-check-label" for="profSocio">
                                <strong>Profesor Socio:</strong> Yo gestiono y vendo mis propios cupos.
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="tipoProfesor" id="profEmbajador" value="EMBAJADOR">
                            <label class="form-check-label" for="profEmbajador">
                                <strong>Profesor Embajador:</strong> UCMI gestiona y vende los cupos por mí.
                            </label>
                        </div>
                    </div>
                </div>

                <div id="camposEstudiante" class="seccion-dinamica">
                    <h5 class="fw-bold text-primary mb-3">Interés Académico</h5>
                    <textarea id="interesEstudiante" class="form-control" rows="3" placeholder="Cuéntenos su área de interés en la matemática y la Supralógica..."></textarea>
                </div>

                <div id="footerForm" class="mt-5" style="display: none;">
                    <button type="submit" id="btnSubmit" class="btn btn-enviar w-100">
                        ENVIAR POSTULACIÓN Y DESCARGAR COMPROBANTE PDF
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // FUNCIÓN PARA MOSTRAR/OCULTAR SECCIONES
    window.alternarCampos = () => {
        const perfil = document.getElementById('selectorPerfil').value;
        document.querySelectorAll('.seccion-dinamica').forEach(s => s.style.display = 'none');
        document.getElementById('datosComunes').style.display = 'block';
        document.getElementById('footerForm').style.display = 'block';

        if(perfil === 'ACADEMIA') document.getElementById('camposAcademia').style.display = 'block';
        if(perfil === 'PROFESOR') document.getElementById('camposProfesor').style.display = 'block';
        if(perfil === 'ESTUDIANTE') document.getElementById('camposEstudiante').style.display = 'block';
    };

    // LÓGICA DE ENVÍO Y GENERACIÓN DE PERFIL
    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "Procesando...";

        const seleccionPrincipal = document.getElementById('selectorPerfil').value;
        let perfilFinal = "";

        // ASIGNACIÓN LÓGICA DE PERFIL (Para evitar el 'undefined')
        if (seleccionPrincipal === "ACADEMIA") {
            perfilFinal = "Academia";
        } else if (seleccionPrincipal === "PROFESOR") {
            const esSocio = document.getElementById('profSocio').checked;
            perfilFinal = esSocio ? "Profesor Socio" : "Profesor Embajador";
        } else {
            perfilFinal = "Estudiante Autodidacta";
        }

        const datos = {
            tipoSolicitante: perfilFinal,
            director: document.getElementById('nombrePostulante').value,
            email: document.getElementById('emailPostulante').value,
            telefono: document.getElementById('whatsappPostulante').value,
            ubicacion: document.getElementById('ubicacionPostulante').value,
            academia: document.getElementById('nombreEntidad')?.value || "N/A",
            rif: document.getElementById('rifEntidad')?.value || "N/A",
            cupos: document.getElementById('cuposEntidad')?.value || "1",
            interes: document.getElementById('interesEstudiante')?.value || "N/A",
            fecha: new Date().toLocaleString()
        };

        try {
            // 1. Guardar en Firebase
            await addDoc(collection(db, "postulaciones"), datos);
            
            // 2. Generar PDF
            generarPDF(datos);

            alert("Postulación enviada con éxito. Se descargará su comprobante.");
            window.location.reload();
        } catch (error) {
            console.error(error);
            alert("Error al enviar. Intente de nuevo.");
            btn.disabled = false;
        }
    });

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Encabezado Estético
        doc.setFillColor(26, 42, 58);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("UCMI - SOLICITUD OFICIAL", 105, 25, { align: 'center' });

        doc.setTextColor(0, 0, 0);
        doc.setFontSize(14);
        doc.text(`MODALIDAD: ${d.tipoSolicitante.toUpperCase()}`, 20, 60);
        
        doc.setFontSize(11);
        doc.text(`Fecha: ${d.fecha}`, 20, 70);
        doc.line(20, 75, 190, 75);

        // Cuerpo de datos
        let y = 90;
        const campos = [
            ["Postulante:", d.director],
            ["Email:", d.email],
            ["WhatsApp:", d.telefono],
            ["Ubicación:", d.ubicacion]
        ];

        if(d.tipoSolicitante === "Academia") {
            campos.push(["Academia:", d.academia], ["RIF/ID:", d.rif], ["Cupos:", d.cupos]);
        }

        campos.forEach(c => {
            doc.setFont(undefined, 'bold');
            doc.text(c[0], 20, y);
            doc.setFont(undefined, 'normal');
            doc.text(c[1], 60, y);
            y += 10;
        });

        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text("Este documento es un comprobante de postulación. Sujeto a aprobación administrativa.", 105, 280, { align: 'center' });

        doc.save(`Postulacion_UCMI_${d.director.replace(" ", "_")}.pdf`);
    }
</script>

</body>
</html>
