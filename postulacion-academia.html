<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --azul-ucmi: #1a2a3a; 
            --azul-intenso: #003366;
            --dorado-ucmi: #c5a059; 
        }
        
        body { 
            background-color: #f8f9fa; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px 0;
        }

        .card-form { 
            border: none; 
            border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
            background: white;
            max-width: 850px;
            margin: auto;
            overflow: hidden;
        }

        .header-minimalista {
            text-align: center;
            padding: 50px 20px 20px 20px;
        }

        .header-minimalista h2 {
            color: var(--azul-ucmi);
            font-weight: 800;
            font-size: 1.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 20px;
        }

        .instruccion-azul {
            color: var(--azul-intenso);
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .linea-decorativa {
            width: 70px;
            height: 4px;
            background: var(--dorado-ucmi);
            margin: 25px auto;
            border-radius: 2px;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 14px;
            border: 1.5px solid #dee2e6;
        }

        .seccion-dinamica { 
            display: none; 
            animation: slideIn 0.4s ease-out; 
            background: #fbfbfb;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid #eee;
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .program-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 12px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #ddd; 
        }

        .btn-enviar {
            background: var(--azul-ucmi);
            color: white;
            font-weight: bold;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-size: 1.2rem;
            transition: 0.3s;
            width: 100%;
        }

        .btn-enviar:hover {
            background: var(--azul-intenso);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card-form">
        <div class="header-minimalista">
            <img src="logo_ucmi.png" id="imgLogo" alt="Logo UCMI" style="height: 120px; width: auto;">
            <h2>Universitario de Ciencias Matemáticas e Idiomas</h2>
            <p class="instruccion-azul">Seleccione su modalidad para iniciar el proceso</p>
            <div class="linea-decorativa"></div>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-0">
            <div class="mb-4">
                <label class="form-label fw-bold">¿En qué calidad se postula?</label>
                <select class="form-select form-select-lg" id="selectorPerfil" required onchange="alternarCampos()">
                    <option value="" selected disabled>Elija una modalidad...</option>
                    <option value="ACADEMIA">Academia o Institución</option>
                    <option value="PROFESOR">Profesor Independiente</option>
                    <option value="ESTUDIANTE">Estudiante Autodidacta</option>
                </select>
            </div>

            <div id="datosComunes" style="display: none;">
                <div class="row g-3">
                    <div class="col-md-6"><input type="text" id="nombrePostulante" class="form-control" placeholder="Nombre Completo / Director" required></div>
                    <div class="col-md-6"><input type="email" id="emailPostulante" class="form-control" placeholder="Correo Electrónico (Sin tildes)" required></div>
                    <div class="col-md-6"><input type="text" id="whatsappPostulante" class="form-control" placeholder="WhatsApp (Ej: +58...)" required></div>
                    <div class="col-md-6"><input type="text" id="ubicacionPostulante" class="form-control" placeholder="Ciudad y País" required></div>
                </div>
                <hr class="my-4">
            </div>

            <div id="seccionProgramas" class="seccion-dinamica">
                <h6 class="text-primary fw-bold mb-3 text-uppercase">Programas de Interés</h6>
                <div class="program-grid mb-3" id="gridProgramas">
                    </div>
                <div class="col-12">
                    <label class="form-label fw-bold small">Duración estimada del programa:</label>
                    <input type="text" id="duracionPrograma" class="form-control" placeholder="Ej: 6 meses, 1 intensivo, 1 año">
                </div>
            </div>

            <div id="camposAcademia" class="seccion-dinamica">
                <h6 class="text-primary fw-bold mb-3 text-uppercase">Información de la Institución</h6>
                <div class="row g-3">
                    <div class="col-12"><input type="text" id="nombreEntidad" class="form-control" placeholder="Nombre de la Academia"></div>
                    <div class="col-md-6"><input type="text" id="rifEntidad" class="form-control" placeholder="RIF / Identificación Fiscal"></div>
                    <div class="col-md-6"><input type="number" id="cuposEntidad" class="form-control" placeholder="Cupos Solicitados"></div>
                </div>
            </div>

            <div id="camposProfesor" class="seccion-dinamica">
                <h6 class="text-primary fw-bold mb-3 text-uppercase">Modelo de Negocio</h6>
                <div class="form-check p-3 border rounded mb-2 bg-white">
                    <input class="form-check-input ms-0" type="radio" name="tipoProfesor" id="profSocio" value="SOCIO" checked>
                    <label class="ms-4" for="profSocio"><strong>Profesor Socio:</strong> Yo gestiono y vendo mis propios cupos.</label>
                </div>
                <div class="form-check p-3 border rounded bg-white">
                    <input class="form-check-input ms-0" type="radio" name="tipoProfesor" id="profEmbajador" value="EMBAJADOR">
                    <label class="ms-4" for="profEmbajador"><strong>Profesor Embajador:</strong> UCMI gestiona y vende los cupos.</label>
                </div>
            </div>

            <div id="footerForm" class="mt-4" style="display: none;">
                <button type="submit" id="btnSubmit" class="btn btn-enviar shadow">
                    ENVIAR POSTULACIÓN Y VER COMPROBANTE
                </button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Listado Oficial de Programas
    const listaProgramas = [
        "Matemática AGEM", "Física", "Química", "Biología", "Lógica", 
        "Estadística", "Razonamiento numérico", "Razonamiento abstracto", 
        "Lengua", "Inglés A1", "Inglés A2", "Inglés B1", "Inglés B1+", 
        "Inglés B2", "Inglés B2+", "Inglés C1"
    ];

    const grid = document.getElementById('gridProgramas');
    listaProgramas.forEach(p => {
        grid.innerHTML += `<div class="form-check">
            <input class="form-check-input" type="checkbox" value="${p}" id="chk_${p.replace(/\s+/g,'')}">
            <label class="form-check-label small" for="chk_${p.replace(/\s+/g,'')}">${p}</label>
        </div>`;
    });

    window.alternarCampos = () => {
        const perfil = document.getElementById('selectorPerfil').value;
        document.querySelectorAll('.seccion-dinamica').forEach(s => s.style.display = 'none');
        document.getElementById('datosComunes').style.display = 'block';
        document.getElementById('footerForm').style.display = 'block';

        if(perfil === 'ACADEMIA' || perfil === 'ESTUDIANTE') document.getElementById('seccionProgramas').style.display = 'block';
        if(perfil === 'ACADEMIA') document.getElementById('camposAcademia').style.display = 'block';
        if(perfil === 'PROFESOR') document.getElementById('camposProfesor').style.display = 'block';
    };

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "Abriendo Documento...";

        const seleccion = document.getElementById('selectorPerfil').value;
        let perfilAsignado = (seleccion === "ACADEMIA") ? "Academia" : 
                         (seleccion === "PROFESOR") ? (document.getElementById('profSocio').checked ? "Profesor Socio" : "Profesor Embajador") : 
                         "Estudiante Autodidacta";

        const seleccionados = [];
        document.querySelectorAll('#gridProgramas input:checked').forEach(c => seleccionados.push(c.value));

        const datos = {
            tipoSolicitante: perfilAsignado,
            director: document.getElementById('nombrePostulante').value,
            email: document.getElementById('emailPostulante').value,
            telefono: document.getElementById('whatsappPostulante').value,
            ubicacion: document.getElementById('ubicacionPostulante').value,
            programas: seleccionados.join(", ") || "General",
            duracion: document.getElementById('duracionPrograma').value || "Por definir",
            academia: document.getElementById('nombreEntidad')?.value || "N/A",
            rif: document.getElementById('rifEntidad')?.value || "N/A",
            cupos: document.getElementById('cuposEntidad')?.value || "1",
            fecha: new Date().toLocaleString()
        };

        try {
            await addDoc(collection(db, "postulaciones"), datos);
            generarYAbrirPDF(datos);
            setTimeout(() => { window.location.reload(); }, 2500);
        } catch (error) {
            alert("Error al guardar datos. Revise su conexión.");
            btn.disabled = false;
        }
    });

    function generarYAbrirPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const img = new Image();
        img.src = 'logo_ucmi.png';

        img.onload = function() {
            doc.setFillColor(26, 42, 58);
            doc.rect(0, 0, 210, 45, 'F');
            try { doc.addImage(img, 'PNG', 15, 7, 30, 30); } catch(e){}
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16); doc.setFont(undefined, 'bold');
            doc.text("UNIVERSITARIO DE CIENCIAS", 55, 20);
            doc.text("MATEMÁTICAS E IDIOMAS", 55, 28);
            doc.setFontSize(10); doc.setFont(undefined, 'normal');
            doc.text("COMPROBANTE OFICIAL DE REGISTRO", 55, 36);

            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12); doc.setFont(undefined, 'bold');
            doc.text(`PERFIL: ${d.tipoSolicitante.toUpperCase()}`, 20, 60);
            doc.text(`FECHA: ${d.fecha}`, 140, 60);
            doc.line(20, 65, 190, 65);

            let y = 75;
            const filas = [
                ["POSTULANTE:", d.director], ["EMAIL:", d.email], ["UBICACIÓN:", d.ubicacion],
                ["DURACIÓN:", d.duracion]
            ];
            
            if(d.tipoSolicitante === "Academia") {
                filas.push(["INSTITUCIÓN:", d.academia], ["RIF/ID:", d.rif], ["CUPOS:", d.cupos]);
            }
            
            // Programas con salto de línea automático
            filas.push(["PROGRAMAS:", d.programas]);

            filas.forEach(f => {
                doc.setFont(undefined, 'bold'); doc.text(f[0], 20, y);
                doc.setFont(undefined, 'normal'); 
                const textSplit = doc.splitTextToSize(f[1], 130);
                doc.text(textSplit, 60, y);
                y += (textSplit.length * 8);
            });

            doc.setFontSize(8); doc.setTextColor(150);
            doc.text("Universitario UCMI 2026 - Este es un documento oficial de registro.", 105, 285, { align: 'center' });
            
            window.open(doc.output('bloburl'), '_blank');
        };
        img.onerror = () => { window.open(doc.output('bloburl'), '_blank'); };
    }
</script>
</body>
</html>
