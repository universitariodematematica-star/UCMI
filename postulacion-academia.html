<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Oficial - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --azul-ucmi: #1a2a3a; --azul-intenso: #003366; --dorado-ucmi: #c5a059; --rojo-error: #dc3545; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; padding: 40px 0; }
        .card-form { border: none; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); background: white; max-width: 850px; margin: auto; overflow: hidden; }
        .header-minimalista { text-align: center; padding: 50px 20px 20px 20px; }
        .header-minimalista h2 { color: var(--azul-ucmi); font-weight: 800; font-size: 1.7rem; text-transform: uppercase; margin-top: 20px; }
        .linea-decorativa { width: 70px; height: 4px; background: var(--dorado-ucmi); margin: 25px auto; border-radius: 2px; }
        
        /* Validación visual */
        .form-control:invalid:focus { border-color: var(--rojo-error); box-shadow: 0 0 0 0.25 margin-rgba(220, 53, 69, 0.25); }
        .is-invalid { border: 2px solid var(--rojo-error) !important; }
        
        .form-control, .form-select { border-radius: 12px; padding: 14px; border: 1.5px solid #dee2e6; transition: 0.3s; }
        .seccion-dinamica { display: none; animation: slideIn 0.3s ease-out; background: #fbfbfb; padding: 20px; border-radius: 15px; border: 1px solid #eee; margin-top: 15px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .program-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; }
        .btn-enviar { background: var(--azul-ucmi); color: white; font-weight: bold; padding: 18px; border-radius: 15px; border: none; font-size: 1.2rem; width: 100%; margin-top: 25px; transition: 0.3s; }
        .btn-enviar:hover { background: var(--azul-intenso); transform: translateY(-3px); }
        .check-all-container { background: #e9ecef; padding: 10px 20px; border-radius: 10px 10px 0 0; border: 1px solid #ddd; border-bottom: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-form">
        <div class="header-minimalista">
            <img src="logo_ucmi.png" alt="Logo UCMI" style="height: 120px; width: auto;">
            <h2>Universitario de Ciencias Matemáticas e Idiomas</h2>
            <h1 style="color: indigo; font-weight: 500; font-size: 2.0rem; margin-bottom: 5px;">REGISTRO DE POSTULACIÓN</h1>
            <div class="linea-decorativa"></div>
        </div>

        <form id="formUCMI" class="p-4 p-md-5 pt-0" novalidate>
            <div class="mb-4">
                <label class="form-label fw-bold">Tipo de Postulante:</label>
                <select class="form-select form-select-lg" id="perfilPrincipal" required onchange="gestionarFlujo()">
                    <option value="" selected disabled>Seleccione una opción...</option>
                    <option value="Academia">Academia</option>
                    <option value="Independiente">Profesor Independiente</option>
                    <option value="Estudiante autodidacta">Estudiante autodidacta</option>
                </select>
            </div>

            <div id="subSeccionProfesor" class="seccion-dinamica mb-4">
                <label class="form-label fw-bold text-primary">Modalidad de Profesor:</label>
                <select class="form-select" id="subTipoProfesor">
                    <option value="Profesor asociado" selected>Profesor asociado</option>
                    <option value="Profesor embajador">Profesor embajador</option>
                </select>
            </div>

            <div id="cuerpoFormulario" style="display: none;">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="small fw-bold">Nombre Completo:</label>
                        <input type="text" id="nombreInput" class="form-control" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="col-md-6">
                        <label class="small fw-bold">Correo Electrónico:</label>
                        <input type="email" id="emailInput" class="form-control" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="small fw-bold">WhatsApp (con código de país):</label>
                        <input type="text" id="whatsappInput" class="form-control" placeholder="+58 412..." required>
                    </div>
                    <div class="col-md-6">
                        <label class="small fw-bold">Ciudad y País:</label>
                        <input type="text" id="ubicacionInput" class="form-control" placeholder="Caracas, Venezuela" required>
                    </div>
                </div>

                <div id="camposAcademia" class="seccion-dinamica">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="small fw-bold" id="labelEntidad" for="entidadInput">Nombre de la Institución:</label>
                            <input type="text" id="entidadInput" class="form-control" placeholder="Academia Superior de..." required>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold">RIF / Registro Fiscal:</label>
                            <input type="text" id="rifInput" class="form-control" placeholder="J-12345678" required>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold">Cupos Solicitados:</label>
                            <input type="number" id="cuposInput" class="form-control" placeholder="Ej: 150" required min="1">
                        </div>
                    </div>
                </div>

                <h6 class="mt-4 fw-bold text-uppercase small text-secondary">Programas Académicos</h6>
                <div class="check-all-container">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="selectAll">
                        <label class="form-check-label fw-bold" for="selectAll">Seleccionar todos los programas</label>
                    </div>
                </div>
                <div class="program-grid mb-3" id="gridProgramas"></div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold small">Duración del contrato (meses):</label>
                    <input type="number" id="mesesInput" class="form-control" placeholder="Ej: 30" required min="1">
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-enviar shadow">ENVIAR POSTULACIÓN</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const programas = ["Matemática AGEM", "Física", "Química", "Biología", "Lógica", "Estadística", "Razonamiento numérico", "Razonamiento abstracto", "Lengua", "Inglés A1", "Inglés A2", "Inglés B1", "Inglés B1+", "Inglés B2", "Inglés B2+", "Inglés C1"];
    const grid = document.getElementById('gridProgramas');
    programas.forEach(p => {
        grid.innerHTML += `<div class="form-check"><input class="form-check-input prog-check" type="checkbox" value="${p}" id="chk_${p.replace(/\s/g,'')}"><label class="form-check-label small" for="chk_${p.replace(/\s/g,'')}">${p}</label></div>`;
    });

    document.getElementById('selectAll').addEventListener('change', function() {
        document.querySelectorAll('.prog-check').forEach(cb => cb.checked = this.checked);
    });

    window.gestionarFlujo = () => {
        const principal = document.getElementById('perfilPrincipal').value;
        const subTipo = document.getElementById('subTipoProfesor').value;
        const camposAcademiaDoc = document.getElementById('camposAcademia');
        const labelEntidad = document.getElementById('labelEntidad');
        const inputEntidad = document.getElementById('entidadInput');
        const inputRif = document.getElementById('rifInput');
        const inputCupos = document.getElementById('cuposInput');
        
        document.getElementById('cuerpoFormulario').style.display = 'block';
        document.getElementById('subSeccionProfesor').style.display = (principal === 'Independiente') ? 'block' : 'none';
        
        // Activamos los campos fiscales para Academia e Independientes
        if (principal === 'Academia' || principal === 'Independiente') {
            camposAcademiaDoc.style.display = 'block';
            inputRif.required = true;
            inputEntidad.required = true;

            if (principal === 'Academia') {
                labelEntidad.innerText = "Nombre de la Institución:";
                inputEntidad.placeholder = "Ej: Academia Siglo XXI";
                inputCupos.parentElement.style.display = "block";
                inputCupos.required = true;
            } else {
                labelEntidad.innerText = "Razón Social o Firma Personal:";
                inputEntidad.placeholder = "Ej: Juan Pérez (Independiente)";
                const esAsociado = (subTipo === 'Profesor asociado');
                inputCupos.parentElement.style.display = esAsociado ? "block" : "none";
                inputCupos.required = esAsociado;
            }
        } else {
            // ESTO ES LO QUE FALTABA: Para Estudiante Autodidacta
            camposAcademiaDoc.style.display = 'none';
            
            // DESACTIVAMOS la obligatoriedad para que el navegador deje enviar el formulario
            inputRif.required = false;
            inputEntidad.required = false;
            inputCupos.required = false;
            
            // Limpiamos valores por seguridad
            inputRif.value = "";
            inputEntidad.value = "";
            inputCupos.value = "";
        }
    };

    // Esto hace que el formulario reaccione al cambiar entre Embajador y Asociado
    document.getElementById('subTipoProfesor').addEventListener('change', window.gestionarFlujo);

    document.getElementById('formUCMI').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const btn = document.getElementById('btnSubmit');

        // VALIDACIÓN DE CAMPOS VACÍOS
        if (!form.checkValidity()) {
            e.stopPropagation();
            form.classList.add('was-validated');
            // Marcar visualmente los inválidos
            form.querySelectorAll(':invalid').forEach(el => el.classList.add('is-invalid'));
            alert("Por favor, rellene todos los campos marcados en rojo.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Registrando...";

        const principal = document.getElementById('perfilPrincipal').value;
        const subValor = document.getElementById('subTipoProfesor').value;
        const tipoFinal = (principal === 'Independiente') ? subValor : principal;
        const programasSel = Array.from(document.querySelectorAll('.prog-check:checked')).map(c => c.value).join(", ");

        const datos = {
            tipoSolicitante: tipoFinal,
            perfil: tipoFinal,
            nombreResponsable: document.getElementById('nombreInput').value.trim(),
            email: document.getElementById('emailInput').value.trim(),
            whatsapp: document.getElementById('whatsappInput').value.trim(),
            ubicacion: document.getElementById('ubicacionInput').value.trim(),
            programas: programasSel || "Sin programas específicos",
            duracionLicencia: document.getElementById('mesesInput').value + " meses",
            cupos: (principal === "Academia" || (principal === "Independiente" && subValor === "Profesor asociado")) ? (document.getElementById('cuposInput').value || "0") : "N/A",
            rif: (principal === 'Estudiante autodidacta') ? "N/A" : document.getElementById('rifInput').value.trim(),
            entidad: (principal === 'Estudiante autodidacta') ? "N/A" : document.getElementById('entidadInput').value.trim(),
            fecha: new Date().toLocaleString()
        };
        try {
            await addDoc(collection(db, "postulaciones"), datos);
            generarPDF(datos);
            setTimeout(() => location.reload(), 2500);
        } catch (err) {
            alert("Error al enviar. Verifique su conexión.");
            btn.disabled = false;
        }
    });

    function generarPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const img = new Image();
        img.src = 'logo_ucmi.png';
        img.onload = () => {
            doc.setFillColor(26, 42, 58); doc.rect(0, 0, 210, 45, 'F');
            try { doc.addImage(img, 'PNG', 15, 7, 30, 30); } catch(e){}
            doc.setTextColor(255, 255, 255); doc.setFontSize(16); doc.setFont(undefined, 'bold');
            doc.text("UNIVERSITARIO DE CIENCIAS", 55, 20);
            doc.text("MATEMÁTICAS E IDIOMAS", 55, 28);
            
            doc.setTextColor(0, 0, 0); doc.setFontSize(11);
            doc.text(`REGISTRO DE POSTULACIÓN: ${d.perfil.toUpperCase()}`, 20, 58);
            doc.setFontSize(9); doc.setFont(undefined, 'normal');
            doc.text(`FECHA: ${d.fecha}`, 140, 58);
            doc.line(20, 62, 190, 62);
            
            let y = 75;
            const filas = [
                ["RESPONSABLE:", String(d.nombreResponsable)],
                ["WHATSAPP:", String(d.whatsapp)],
                ["EMAIL:", String(d.email)],
                ["IDENTIFICACIÓN / RIF:", String(d.rif)],
                ["ENTIDAD / FIRMA:", String(d.entidad)],
                ["CANTIDAD DE CUPOS:", String(d.cupos)], 
                ["TIEMPO DE LICENCIA:", String(d.duracionLicencia)],
                ["PROGRAMAS SOLICITADOS:", String(d.programas)]
            ];

            filas.forEach(f => {
                doc.setFont(undefined, 'bold'); doc.text(f[0], 20, y);
                doc.setFont(undefined, 'normal'); 
                const st = doc.splitTextToSize(String(f[1]), 120);
                doc.text(st, 75, y);
                y += (st.length * 8) + 2;
            });
            
            doc.setFontSize(8); doc.setTextColor(100);
            doc.text("Comprobante oficial de postulación UCMI. Este documento no garantiza la activación inmediata.", 20, 285);
            
            window.open(doc.output('bloburl'), '_blank');
        };
        img.onerror = () => window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
