<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Admin Maestro</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f4f6fb; }
        body { font-family: 'Segoe UI', Arial; background: var(--bg); margin: 0; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-red { background: #fee2e2; color: #ef4444; width: auto; padding: 5px 10px; }
        .user-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .active { background: #dcfce7; color: #166534; }
        .expired { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div id="loginSection" class="card" style="max-width:350px; margin:100px auto; text-align:center;">
    <h3>🔐 Acceso Admin</h3>
    <input id="adminEmail" type="email" placeholder="Correo Admin">
    <input id="adminPass" type="password" placeholder="Contraseña">
    <button class="btn-blue" onclick="adminLogin()">Entrar</button>
</div>

<div id="adminPanel" style="display:none;">
    <div class="header">UCMI - GESTIÓN DE LICENCIAS <button onclick="logout()" style="width:auto; float:right; background:#334155; font-size:12px;">Cerrar</button></div>
    
    <div class="grid">
        <div class="card">
            <h3>➕ Registrar Nuevo Alumno</h3>
            <input id="stuName" placeholder="Nombre del Alumno">
            <input id="stuEmail" type="email" placeholder="Correo electrónico">
            <input id="stuPass" type="text" value="UCMI2026" placeholder="Contraseña Genérica">
            <label style="font-size:12px; font-weight:bold;">Vencimiento:</label>
            <input id="stuExp" type="date">
            <div id="msg" style="font-size:12px; margin-top:5px; font-weight:bold;"></div>
            <button class="btn-blue" onclick="registerStudent()">Guardar y Crear Acceso</button>
        </div>

        <div class="card">
            <h3>👥 Alumnos Activos</h3>
            <div id="userList"></div>
        </div>

        <div class="card">
            <h3>📊 Calificaciones</h3>
            <div id="gradesFeed"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
        authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
        projectId: "portal-autenticacion-a1ngles",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- SESIÓN ADMIN ---
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "universitariodematematica@gmail.com") {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            syncData();
        } else {
            document.getElementById("loginSection").style.display = "block";
            document.getElementById("adminPanel").style.display = "none";
        }
    });

    window.adminLogin = async () => {
        const e = document.getElementById("adminEmail").value;
        const p = document.getElementById("adminPass").value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { alert("Error"); }
    };

    window.logout = () => { signOut(auth); window.location.reload(); };

    // --- REGISTRO DUAL (FIREBASE AUTH + FIRESTORE) ---
    window.registerStudent = async () => {
        const name = document.getElementById("stuName").value.trim();
        const email = document.getElementById("stuEmail").value.trim().toLowerCase();
        const pass = document.getElementById("stuPass").value.trim();
        const exp = document.getElementById("stuExp").value;
        const msg = document.getElementById("msg");

        if(!name || !email || !pass || !exp) return msg.innerText = "⚠️ Faltan datos";

        try {
            msg.innerText = "⏳ Creando acceso...";

            // 1. Guardar en Firestore (Colección 'users')
            await setDoc(doc(db, "users", email), {
                name: name,
                email: email,
                expiration: exp,
                role: "student"
            });

            // 2. CREAR EN AUTHENTICATION
            // Para no cerrar tu sesión de admin, usamos una técnica de "app secundaria" temporal
            const secondaryApp = initializeApp(firebaseConfig, "Secondary");
            const secondaryAuth = getAuth(secondaryApp);
            
            await createUserWithEmailAndPassword(secondaryAuth, email, pass);
            await signOut(secondaryAuth); // Limpiar app secundaria

            msg.style.color = "green";
            msg.innerText = "✅ Alumno creado en Auth y Database";
            
            // Limpiar inputs
            document.getElementById("stuName").value = "";
            document.getElementById("stuEmail").value = "";
            document.getElementById("stuExp").value = "";
        } catch (e) {
            msg.style.color = "red";
            msg.innerText = "Error: " + e.message;
        }
    };

    function syncData() {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById("userList");
            list.innerHTML = "";
            const hoy = new Date().toISOString().split('T')[0];
            snap.forEach(d => {
                const u = d.data(); if(u.role === 'admin') return;
                const isExp = hoy > u.expiration;
                list.innerHTML += `<div class="user-item">
                    <div><b>${u.name}</b><br><small>${u.email}</small> <span class="badge ${isExp?'expired':'active'}">${isExp?'EXPIRADO':u.expiration}</span></div>
                    <button class="btn-red" onclick="deleteUser('${d.id}')">✖</button>
                </div>`;
            });
        });
    }

    window.deleteUser = async (id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, "users", id)); };
</script>
</body>
</html>
