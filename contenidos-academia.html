<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px; 
        }

        .asignatura-card {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    padding: 18px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: 0.3s ease;
    height: 100%;
}

.asignatura-card:hover {
    transform: translateY(-6px);
    border-color: rgba(197, 160, 89, 0.5);
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    background: rgba(255, 255, 255, 0.12);
}

.asignatura-titulo {
    font-size: 1.1rem;
    font-weight: 600;
    color: #ffffff;
}

.asignatura-meta {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.65);
    margin-top: 8px;
}

.asignatura-modulo {
    margin-top: 12px;
    display: inline-block;
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 0.75rem;
    background: rgba(197, 160, 89, 0.15);
    color: #c5a059;
}
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item-ucmi active"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="alumnos-academia.html" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>
            <a href="modificaciones.html" class="nav-item-ucmi"><i class="bi bi-pencil-square"></i></i> MODIFICACIONES</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="academia-modulos.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="contenidos-academia.html" class="nav-item-ucmi"><i class="bi bi-collection"></i> CONTENIDO</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">

    <div class="container-fluid">

        <!-- Header sección -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0">Asignaturas de la Academia</h2>
                <small class="text-white-50">Listado en tiempo real desde Firestore</small>
            </div>

            <div>
                <span class="badge bg-light text-dark px-3 py-2">
                    <i class="bi bi-lightning-charge"></i> Live Sync
                </span>
            </div>
        </div>

        <!-- Grid de asignaturas -->
        <div id="asignaturasContainer" class="row g-3">

            <!-- Loader inicial -->
            <div class="col-12 text-center text-white-50" id="loadingAsignaturas">
                <div class="spinner-border text-light"></div>
                <div class="mt-2">Cargando asignaturas...</div>
            </div>

        </div>

    </div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const container = document.getElementById("asignaturasContainer");
const loading = document.getElementById("loadingAsignaturas");

function crearCard(doc) {
    const d = doc.data();

    return `
        <div class="col-12 col-md-6 col-lg-4">
            <div class="asignatura-card">

                <div class="asignatura-titulo">
                    <i class="bi bi-journal-bookmark me-2"></i>
                    ${d.asignatura ?? "Sin nombre"}
                </div>

                <div class="asignatura-meta">
                    <div><strong>Módulo:</strong> ${d.modulo ?? "N/A"}</div>
                    <div><strong>Creada:</strong> ${
                        d.fechaCreacion?.toDate
                            ? d.fechaCreacion.toDate().toLocaleString()
                            : "Sin fecha"
                    }</div>
                </div>

                <div class="asignatura-modulo">
                    ${d.moduloId ?? "sin-modulo"}
                </div>

            </div>
        </div>
    `;
}

onAuthStateChanged(auth, (user) => {

    if (!user) return;

    const q = query(
        collection(db, "asignaturas"),
        orderBy("fechaCreacion", "desc")
    );

    onSnapshot(q, (snapshot) => {

        container.innerHTML = "";

        loading.style.display = "none";

        if (snapshot.empty) {
            container.innerHTML = `
                <div class="col-12 text-center text-white-50">
                    No existen asignaturas aún.
                </div>
            `;
            return;
        }

        snapshot.forEach((doc) => {
            container.innerHTML += crearCard(doc);
        });

    });

});

    const db = getFirestore(initializeApp({apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI", authDomain: "ucmi-13796634.firebaseapp.com", projectId: "ucmi-13796634", storageBucket: "ucmi-13796634.firebasestorage.app", messagingSenderId: "1090719609536", appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"}));
    const auth = getAuth();

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    const userSnap = await getDoc(
        doc(db, "usuarios", user.uid)
    );

    if (userSnap.exists()) {

        const d = userSnap.data();

        const logo = document.getElementById('logoAcademia');

        logo.src =
            d.logoCustom ||
            "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";

        logo.style.opacity = "1";
    }

});

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth).then(() => window.location.href = "index.html"));
    
</script>

    
</body>
</html>
