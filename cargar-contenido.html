<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contenido</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png')
    no-repeat center center fixed;
    background-size:cover;
    color:white;
    padding:40px;
}

/* CONTENEDOR CRISTAL */
.panel{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 25px;
    padding: 30px;
}
</style>
</head>

<body>

<div class="panel">
    <h2 id="titulo">Cargando...</h2>

    <div id="contenido"></div>
</div>

<script type="module">

import { db } from "./firebase-config.js";
import {
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const topicoId = params.get("topicoId");

// 1. Cargar contenido
async function cargarContenido(){

    const q = query(
        collection(db, "contenidos"),
        where("topicoId", "==", topicoId)
    );

    const snap = await getDocs(q);

    if(!snap.empty){

        const data = snap.docs[0].data();

        document.getElementById("contenido").innerHTML = data.html;

    } else {
        document.getElementById("contenido").innerHTML =
        "<p>No hay contenido aún.</p>";
    }
}

cargarContenido();

</script>

</body>
</html>
