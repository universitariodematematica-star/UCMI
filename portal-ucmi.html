<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinta Transportadora de Imágenes Infinita con CSS</title>
    
    <style>
        /* --- ESTILOS GENERALES DE LA PÁGINA (OPCIONALES) --- */
        body {
            background-color: #06090f; /* Fondo oscuro estilo UCMI */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #c5a059; /* Dorado UCMI para el texto */
            font-family: sans-serif;
            flex-direction: column;
        }

        h2 {
            margin-bottom: 30px;
            text-align: center;
        }

        /* ==========================================================
           CINTA TRANSPORTADORA INFINITA (CARRUSEL CSS PURO)
           ========================================================== */

        /* 1. Contenedor principal: Oculta el desborde y aplica fondo */
        .cinta-container {
            overflow: hidden;
            width: 100%;
            background: rgba(197, 160, 89, 0.03); /* Sutil fondo dorado */
            padding: 30px 0;
            white-space: nowrap;
            position: relative;
            box-sizing: border-box;
        }

        /* 2. El riel flexible que contiene TODAS las imágenes (originales + duplicadas) */
        .cinta-track {
            display: flex;
            /* CÁLCULO MATEMÁTICO: Ancho de cada slide (360px) * Total de bloques (12) */
            width: calc(360px * 12); 
            animation: moverCintaIzquierda 30s linear infinite; /* Tiempo ajustable */
            will-change: transform; /* Ayuda al rendimiento de la animación */
        }

        /* 3. Contenedor individual de cada imagen */
        .cinta-slide {
            width: 360px; /* Ancho deseado para cada foto */
            height: 225px; /* Alto deseado para uniformidad */
            padding: 0 15px; /* Espaciado entre las fotos */
            flex-shrink: 0;
            box-sizing: border-box;
        }

        /* 4. La imagen adaptada al contenedor */
        .cinta-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Recorta y adapta la imagen elegantemente */
            border-radius: 20px; /* Bordes suaves modernos */
            border: 1px solid rgba(197, 160, 89, 0.3); /* Sutil borde dorado UCMI */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5); /* Sombra elegante */
            transition: transform 0.3s ease; /* Transición para el efecto de hover */
        }

        /* 5. Efecto de hover: La animación se detiene */
        .cinta-container:hover .cinta-track {
            animation-play-state: paused;
        }

        /* 6. Efecto de hover individual: La imagen se agranda un poco */
        .cinta-slide img:hover {
            transform: scale(1.05);
            border-color: #00f2ff; /* Acento cian neon al pasar el mouse */
        }

        /* ==========================================================
           ANIMACIÓN CSS: El Secreto del Bucle Perfecto
           ========================================================== */
        
        /* Desplaza el riel exactamente la mitad de su longitud total.
           Como tenemos 6 imágenes originales, cuando la animación llega al 100%,
           ha movido 6 imágenes. En ese momento, la 1ª imagen duplicada está
           en la misma posición que la 1ª imagen original al principio (0%),
           creando un bucle infinito invisible.
        */
        @keyframes moverCintaIzquierda {
            0% {
                transform: translateX(0);
            }
            100% {
                /* CÁLCULO MATEMÁTICO: -(Ancho de slide * Cantidad de originales) */
                transform: translateX(calc(-360px * 6)); 
            }
        }
    </style>
</head>
<body>

    <h2>Nuestra Cinta Transportadora Infinita (6 Imágenes)</h2>

    <div class="cinta-container">
        <div class="cinta-track">
            
            <div class="cinta-slide">
                <img src="img1.png" alt="Imagen 1">
            </div>
            <div class="cinta-slide">
                <img src="img2.png" alt="Imagen 2">
            </div>
            <div class="cinta-slide">
                <img src="img3.png" alt="Imagen 3">
            </div>
            <div class="cinta-slide">
                <img src="img4.png" alt="Imagen 4">
            </div>
            <div class="cinta-slide">
                <img src="img5.png" alt="Imagen 5">
            </div>
            <div class="cinta-slide">
                <img src="img6.png" alt="Imagen 6">
            </div>
            
            <div class="cinta-slide">
                <img src="img1.png" alt="Imagen 1 - Duplicada">
            </div>
            <div class="cinta-slide">
                <img src="img2.png" alt="Imagen 2 - Duplicada">
            </div>
            <div class="cinta-slide">
                <img src="img3.png" alt="Imagen 3 - Duplicada">
            </div>
            <div class="cinta-slide">
                <img src="img4.png" alt="Imagen 4 - Duplicada">
            </div>
            <div class="cinta-slide">
                <img src="img5.png" alt="Imagen 5 - Duplicada">
            </div>
            <div class="cinta-slide">
                <img src="img6.png" alt="Imagen 6 - Duplicada">
            </div>

        </div>
    </div>

</body>
</html>
