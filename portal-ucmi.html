<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Portal de Navegación</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- ESTILOS DE FONDO Y ESTRUCTURA --- */
        body {
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #c5a059;
            font-family: 'Poppins', sans-serif;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 9, 15, 0.75);
            z-index: -1;
        }

        /* --- BOTONES DE NAVEGACIÓN --- */
        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-ucmi {
            padding: 12px 25px;
            background: transparent;
            border: 2px solid #c5a059;
            color: #c5a059;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-ucmi:hover {
            background: #c5a059;
            color: #06090f;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.6);
        }

        /* --- CINTA TRANSPORTADORA --- */
        .cinta-container {
            overflow: hidden;
            width: 100%;
            background: rgba(0, 0, 0, 0.2); 
            padding: 30px 0;
            white-space: nowrap;
            position: relative;
            border-top: 1px solid rgba(197, 160, 89, 0.2);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .cinta-track {
            display: flex;
            width: calc(360px * 12); 
            animation: moverCintaIzquierda 30s linear infinite;
        }

        .cinta-slide {
            width: 360px;
            height: 225px;
            padding: 0 15px;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .cinta-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }

        @keyframes moverCintaIzquierda {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-360px * 6)); }
        }
    </style>
</head>
<body>

    <h2 style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Portal de Servicios UCMI</h2>

    <div class="cinta-container">
        <div class="cinta-track">
            <div class="cinta-slide"><img src="img1.png" alt="1"></div>
            <div class="cinta-slide"><img src="img2.png" alt="2"></div>
            <div class="cinta-slide"><img src="img3.png" alt="3"></div>
            <div class="cinta-slide"><img src="img4.png" alt="4"></div>
            <div class="cinta-slide"><img src="img5.png" alt="5"></div>
            <div class="cinta-slide"><img src="img6.png" alt="6"></div>
            <div class="cinta-slide"><img src="img1.png" alt="1"></div>
            <div class="cinta-slide"><img src="img2.png" alt="2"></div>
            <div class="cinta-slide"><img src="img3.png" alt="3"></div>
            <div class="cinta-slide"><img src="img4.png" alt="4"></div>
            <div class="cinta-slide"><img src="img5.png" alt="5"></div>
            <div class="cinta-slide"><img src="img6.png" alt="6"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="index.html" class="btn-ucmi">
            <i class="fas fa-sign-in-alt"></i> Entrar
        </a>
        <a href="simulador-costos.html" class="btn-ucmi">
            <i class="fas fa-calculator"></i> Simulador de costos
        </a>
        <a href="https://wa.me/593991752385" target="_blank" class="btn-ucmi">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
    </div>

</body>
</html>
