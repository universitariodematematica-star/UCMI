<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCMI - Panel de Control</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
body {
  background: #0b0f14;
  color: white;
  font-family: Arial;
}

.sidebar {
  width: 260px;
  background: rgba(0,0,0,0.4);
  min-height: 100vh;
  padding: 20px;
}

.app {
  display: flex;
}

.modulo-card {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  padding: 20px;
}

.modulo-nombre {
  font-weight: bold;
  color: gold;
  margin-bottom: 10px;
}

.asignatura-click {
  cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <img id="logoAcademia" style="width:100%;opacity:0;">
</div>

<!-- MAIN -->
<div class="container-fluid p-4">
  <h2>Asignaturas</h2>
  <div id="contenedorModulos" class="row g-3"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalTopicos" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark text-white">

      <div class="modal-header">
        <h5 class="modal-title">Tópicos</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div id="contenedorTopicos"></div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
  authDomain: "ucmi-13796634.firebaseapp.com",
  projectId: "ucmi-13796634"
});

const db = getFirestore(app);
const auth = getAuth();

let entidad = "";
let modulosData = [];

onAuthStateChanged(auth, async (user) => {

if (!user) return (location.href="index.html");

const snap = await getDoc(doc(db,"usuarios",user.uid));
if(!snap.exists()) return;

const d = snap.data();
entidad = d.entidad;

// LOGO
const logo = document.getElementById("logoAcademia");
logo.src = d.logoCustom || "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";
logo.style.opacity = 1;

// MODULOS
const cont = document.getElementById("contenedorModulos");
cont.innerHTML = "";

modulosData = d.modulos || [];

modulosData.forEach((m,i)=>{

const nombre = typeof m === "object" ? m.nombre : m;
const id = typeof m === "object" ? m.id : i;

cont.innerHTML += `
<div class="col-md-4">
  <div class="modulo-card">

    <div class="modulo-nombre">${nombre}</div>

    <div class="asignaturas-container" data-id="${id}"></div>

    <button class="btn btn-success btn-crear"
            data-id="${id}"
            data-modulo="${nombre}">
      Crear
    </button>

  </div>
</div>`;
});

await cargarAsignaturas();
activarCrear();
activarModal();

});

// ASIGNATURAS
async function cargarAsignaturas(){

const bloques = document.querySelectorAll(".asignaturas-container");

for(const b of bloques){

const id = b.dataset.id;

const q = query(collection(db,"asignaturas"),
where("entidad","==",entidad),
where("moduloId","==",id));

const snap = await getDocs(q);

b.innerHTML="";

snap.forEach(d=>{

b.innerHTML += `
<div class="badge bg-secondary me-1 mb-1 asignatura-click"
     data-id="${id}">
${d.data().asignatura}
</div>`;
});
}
}

// CREAR
function activarCrear(){

document.querySelectorAll(".btn-crear").forEach(btn=>{

btn.onclick = async ()=>{

const id = btn.dataset.id;
const modulo = btn.dataset.modulo;

const name = prompt("Asignatura");
if(!name) return;

await addDoc(collection(db,"asignaturas"),{
entidad,
moduloId:id,
asignatura:name.trim()
});

await cargarAsignaturas();
};
});
}

// MODAL
function activarModal(){

document.addEventListener("click",async(e)=>{

const el = e.target.closest(".asignatura-click");
if(!el) return;

const id = el.dataset.id;

const modal = new bootstrap.Modal(document.getElementById("modalTopicos"));
modal.show();

const cont = document.getElementById("contenedorTopicos");
cont.innerHTML="Cargando...";

const q = query(collection(db,"topicos"),
where("entidad","==",entidad),
where("moduloId","==",id));

const snap = await getDocs(q);

cont.innerHTML="";

snap.forEach(t=>{

cont.innerHTML += `
<div class="p-2 border mb-2">
${t.data().nombre}
</div>`;
});
});
}

</script>

</body>
</html>
