    <style>

            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px;

        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px; 
        }

        .glass-header{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 25px;
}

.modulo-card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 25px;
    height: 100%;
    transition: .3s;
}

.modulo-card:hover{
    transform: translateY(-4px);
}

.modulo-nombre{
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--dorado-ucmi);
    margin-bottom: 20px;
}

.btn-modulo{
    border-radius: 50px;
    font-size: .8rem;
    font-weight: 600;
}

.topico-item {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    color: white;
    transition: 0.2s ease;
}

.topico-item:hover {
    transform: translateX(3px);
    background: rgba(255, 255, 255, 0.12);
}

.topico-item.active {
    background: rgba(197, 160, 89, 0.25);
    border-color: var(--dorado-ucmi);
    box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
}        
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>
            <a href="modificaciones.html" class="nav-item-ucmi"><i class="bi bi-pencil-square"></i> MODIFICACIONES</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="academia-modulos.html" class="nav-item-ucmi"><i class="bi bi-tags"></i> OFERTAS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

<main class="super-overlay">

    <div class="container-fluid">

        <div class="glass-header mb-4">
            <h1 class="mb-0">
                <i class="bi bi-journal-bookmark-fill me-2"></i>
                Asignaturas
            </h1>
            <p class="mb-0 mt-2 text-light opacity-75">
                Gestión de asignaturas por módulo.
            </p>
        </div>

        <div id="contenedorModulos" class="row g-4">

        </div>

    </div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
  authDomain: "ucmi-13796634.firebaseapp.com",
  projectId: "ucmi-13796634"
});

const db = getFirestore(app);
const auth = getAuth();

let entidadAcademia = "";
let asignaturasCache = [];

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const userSnap = await getDoc(doc(db, "usuarios", user.uid));

  if (!userSnap.exists()) return;

  const d = userSnap.data();
  entidadAcademia = d.entidad;

  const contenedor = document.getElementById("contenedorModulos");
  const modulos = d.modulos || [];

  contenedor.innerHTML = "";

  modulos.forEach((modulo, index) => {

    const moduloId = typeof modulo === "object" ? modulo.id : index;
    const moduloNombre = typeof modulo === "object" ? modulo.nombre : modulo;

    contenedor.innerHTML += `
      <div class="col-lg-4 col-md-6">
        <div class="modulo-card">

          <div class="modulo-nombre">
            ${moduloNombre}
          </div>

          <div class="asignaturas-container mb-2"
               data-modulo-id="${moduloId}">
          </div>

          <div class="d-flex gap-2 flex-wrap">

            <button class="btn btn-success btn-modulo btn-crear-asignatura"
                    data-modulo-id="${moduloId}"
                    data-modulo="${moduloNombre}">
              <i class="bi bi-plus-circle"></i> Crear
            </button>

          </div>

        </div>
      </div>
    `;
  });

  await cargarAsignaturasPorModulo();

  activarEventosCrear();
  activarClickAsignaturas();
});


// =========================
// CARGAR ASIGNATURAS
// =========================
async function cargarAsignaturasPorModulo() {

  const bloques = document.querySelectorAll(".asignaturas-container");

  for (const bloque of bloques) {

    const moduloId = bloque.dataset.moduloId;

    const q = query(
      collection(db, "asignaturas"),
      where("entidad", "==", entidadAcademia),
      where("moduloId", "==", moduloId)
    );

    const snap = await getDocs(q);

    bloque.innerHTML = "";

    snap.forEach(docu => {
      const data = docu.data();

      bloque.innerHTML += `
        <div class="badge bg-secondary me-1 mb-1 asignatura-click"
             style="cursor:pointer"
             data-modulo-id="${moduloId}"
             data-asignatura="${data.asignatura}">
          ${data.asignatura}
        </div>
      `;
    });
  }
}


// =========================
// CREAR ASIGNATURA
// =========================
function activarEventosCrear() {

  document.querySelectorAll(".btn-crear-asignatura").forEach(btn => {

    btn.addEventListener("click", async () => {

      const moduloId = btn.dataset.moduloId;
      const modulo = btn.dataset.modulo;

      const nombre = prompt(`Nueva asignatura para ${modulo}`);
      if (!nombre) return;

      const limpio = nombre.trim();
      if (!limpio) return;

      await addDoc(collection(db, "asignaturas"), {
        entidad: entidadAcademia,
        moduloId,
        asignatura: limpio,
        fechaCreacion: new Date()
      });

      await cargarAsignaturasPorModulo();
    });

  });
}


// =========================
// CLICK ASIGNATURA -> MODAL
// =========================
function activarClickAsignaturas() {

  document.addEventListener("click", async (e) => {

    const el = e.target.closest(".asignatura-click");
    if (!el) return;

    const moduloId = el.dataset.moduloId;

    const modalEl = document.getElementById("modalTopicos");
    const modal = new bootstrap.Modal(modalEl);

    modal.show();

    const cont = document.getElementById("contenedorTopicos");
    cont.innerHTML = "Cargando...";

    const q = query(
      collection(db, "topicos"),
      where("entidad", "==", entidadAcademia),
      where("moduloId", "==", moduloId)
    );

    const snap = await getDocs(q);

    cont.innerHTML = "";

    snap.forEach(docu => {
      const t = docu.data();

      cont.innerHTML += `
        <div class="p-2 border rounded mb-2 topico-item"
             data-topico-id="${docu.id}">
          ${t.nombre}
        </div>
      `;
    });

    if (!snap.size) {
      cont.innerHTML = "<p>No hay tópicos</p>";
    }

  });

}


// =========================
// TOGGLE TÓPICOS
// =========================
document.addEventListener("click", (e) => {
  const el = e.target.closest(".topico-item");
  if (!el) return;

  el.classList.toggle("active");
});


// =========================
// LOGOUT
// =========================
document.getElementById("btnLogout").addEventListener("click", () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
});
</script>

<div class="modal fade" id="modalTopicos" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark text-white">

      <div class="modal-header">
        <h5 class="modal-title">Tópicos</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div id="contenedorTopicos"></div>
      </div>

    </div>
  </div>
</div>
    
</body>
</html>
