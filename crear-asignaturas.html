<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCMI - Panel de Control</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
:root{
  --dorado-ucmi:#c5a059;
}

body{
  background:#0b0f14;
  color:white;
  font-family:Segoe UI;
}

.app-wrapper{display:flex;min-height:100vh;}

.sidebar{
  width:260px;
  background:#1a2a3a;
}

.super-overlay{
  flex:1;
  padding:30px;
}

.modulo-card{
  background:rgba(255,255,255,0.08);
  border-radius:15px;
  padding:20px;
}

.modulo-nombre{
  color:var(--dorado-ucmi);
  font-size:1.2rem;
  font-weight:600;
}

.asignatura-click{
  cursor:pointer;
}

.asignatura-click:hover{
  background:#444;
}
</style>
</head>

<body>

<div class="app-wrapper">

<!-- SIDEBAR -->
<aside class="sidebar">
  <img id="logoAcademia" style="width:100%;padding:20px;">
</aside>

<!-- MAIN -->
<main class="super-overlay">

<h3>Asignaturas</h3>
<div id="contenedorModulos" class="row g-3"></div>

</main>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalTopicos" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark text-white">

      <div class="modal-header">
        <h5 class="modal-title">Tópicos</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div id="contenedorTopicos"></div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore, doc, getDoc,
  collection, addDoc, query,
  where, getDocs
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
  authDomain: "ucmi-13796634.firebaseapp.com",
  projectId: "ucmi-13796634"
});

const db = getFirestore(app);
const auth = getAuth();

let entidadAcademia = "";

/* =======================
AUTH
======================= */
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "index.html";

  const snap = await getDoc(doc(db,"usuarios",user.uid));
  if (!snap.exists()) return;

  const d = snap.data();
  entidadAcademia = d.entidad;

  document.getElementById("logoAcademia").src =
    d.logoCustom || "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";

  renderModulos(d.modulos || []);
  await cargarAsignaturas();
});

/* =======================
RENDER MODULOS
======================= */
function renderModulos(modulos){

  const cont = document.getElementById("contenedorModulos");
  cont.innerHTML = "";

  modulos.forEach((m, i)=>{

    const moduloId = m.id || i;
    const nombre = m.nombre || m;

    cont.innerHTML += `
      <div class="col-md-6">
        <div class="modulo-card">

          <div class="modulo-nombre">${nombre}</div>

          <div class="asignaturas-container" data-modulo-id="${moduloId}"></div>

          <button class="btn btn-success btn-sm btn-crear"
                  data-modulo-id="${moduloId}"
                  data-modulo="${nombre}">
            Crear asignatura
          </button>

        </div>
      </div>
    `;
  });

  activarCrear();
  activarClicks();
}

/* =======================
CARGAR ASIGNATURAS
======================= */
async function cargarAsignaturas(){

  const bloques = document.querySelectorAll(".asignaturas-container");

  for(const b of bloques){

    const moduloId = b.dataset.moduloId;

    const q = query(
      collection(db,"asignaturas"),
      where("entidad","==",entidadAcademia),
      where("moduloId","==",moduloId)
    );

    const snap = await getDocs(q);

    b.innerHTML = "";

    snap.forEach(d=>{
      const data = d.data();

      b.innerHTML += `
        <span class="badge bg-secondary me-1 asignatura-click"
              data-modulo-id="${moduloId}">
          ${data.asignatura}
        </span>
      `;
    });
  }
}

/* =======================
CREAR ASIGNATURA
======================= */
function activarCrear(){

  document.querySelectorAll(".btn-crear").forEach(btn=>{

    btn.onclick = async ()=>{

      const moduloId = btn.dataset.moduloId;

      const nombre = prompt("Nombre asignatura");
      if(!nombre) return;

      await addDoc(collection(db,"asignaturas"),{
        entidad: entidadAcademia,
        moduloId,
        asignatura: nombre.trim()
      });

      await cargarAsignaturas();
    };
  });
}

/* =======================
CLICK ASIGNATURA -> MODAL
======================= */
function activarClicks(){

  document.addEventListener("click", async (e)=>{

    const el = e.target.closest(".asignatura-click");
    if(!el) return;

    const moduloId = el.dataset.moduloId;

    const modal = new bootstrap.Modal(
      document.getElementById("modalTopicos")
    );

    modal.show();

    const cont = document.getElementById("contenedorTopicos");
    cont.innerHTML = "Cargando...";

    const q = query(
      collection(db,"topicos"),
      where("entidad","==",entidadAcademia),
      where("moduloId","==",moduloId)
    );

    const snap = await getDocs(q);

    cont.innerHTML = "";

    snap.forEach(d=>{
      cont.innerHTML += `
        <div class="p-2 border mb-2 topico-item">
          ${d.data().nombre}
        </div>
      `;
    });

    if(!snap.size){
      cont.innerHTML = "Sin tópicos";
    }
  });
}

/* =======================
TOGGLE TOPICOS
======================= */
document.addEventListener("click",(e)=>{
  const el = e.target.closest(".topico-item");
  if(el) el.classList.toggle("active");
});

/* =======================
LOGOUT
======================= */
window.btnLogout.onclick = ()=> signOut(auth).then(()=>location.href="index.html");

</script>

</body>
</html>
