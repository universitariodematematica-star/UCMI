        .super-overlay {

        .glass-header{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 25px;
        }

        .glass-lista{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 25px;
}

    .modulo-item{
        padding: 12px 15px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        font-size: 1rem;
    }

    .modulo-item:last-child{
        border-bottom: none;
    }

    .modulo-item:hover{
        background: rgba(255,255,255,0.05);
    }

    .asignatura-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 6px 10px;
    margin-top: 6px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
}

.col-nombre {
    color: #00c2ff;
    font-weight: 500;
    padding-left: 10px;
}

.col-botones {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
}    

    .asignatura-fila{
    cursor: pointer;
    transition: 0.2s ease;
}

.asignatura-fila:hover{
    background: rgba(255,255,255,0.06);
    transform: translateX(4px);
}    
        
    </style>

<body>

        </div>
    </aside>

    <main class="super-overlay">
    
        <div class="container-fluid">
    
            <div class="glass-header mb-4 d-flex justify-content-between align-items-center">

    <div>
        <h1 class="mb-0">
            <i class="bi bi-journal-bookmark-fill me-2"></i>
            Asignaturas
        </h1>

        <p class="mb-0 mt-2 text-light opacity-75">

       class="btn btn-outline-light btn-sm px-3">

    </a>

</div>

            <div class="mb-3 text-light opacity-75">

                Haz clic sobre una asignatura para asignarle tópicos

        </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    addDoc,
    query,
    where,
    getDocs,
    serverTimestamp,
    onSnapshot,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
});

const db = getFirestore(app);
const auth = getAuth();

let moduloSeleccionado = null;
let entidadGlobal = null;

// ===================== AUTH =====================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    const userSnap = await getDoc(doc(db, "usuarios", user.uid));
    if (!userSnap.exists()) return;

    const d = userSnap.data();
    entidadGlobal = d.entidad;

    const contenedorModulos = document.getElementById("contenedorModulos");
    contenedorModulos.innerHTML = "";

    (d.modulos || []).forEach(modulo => {

        contenedorModulos.innerHTML += `
            <div class="modulo-item">

                <div class="d-flex justify-content-between align-items-center">
                    <strong>${modulo}</strong>

                    <button class="btn btn-sm btn-success btnCrearAsignatura"
                        data-modulo="${modulo}">
                        Crear asignatura
                    </button>
                </div>

                <div class="listaAsignaturas"
                     id="asignaturas-${modulo}">
                </div>

            </div>
        `;
    });

    document.querySelectorAll(".btnCrearAsignatura")
    .forEach(btn => {

        btn.addEventListener("click", () => {

            moduloSeleccionado = btn.dataset.modulo;

            new bootstrap.Modal(
                document.getElementById("modalAsignatura")
            ).show();
        });

    });

    const logo = document.getElementById("logoAcademia");
    logo.src = d.logoCustom ||
        "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";
    logo.style.opacity = "1";

    // ===================== REALTIME =====================
    if (!entidadGlobal) return;

    const q = query(
        collection(db, "asignaturas"),
        where("entidad", "==", entidadGlobal)
    );

    onSnapshot(q, (snapshot) => {

        document.querySelectorAll(".listaAsignaturas")
            .forEach(el => el.innerHTML = "");

        const lista = [];

        snapshot.forEach(docu => {
            lista.push({ id: docu.id, ...docu.data() });
        });

        lista.sort((a, b) =>
            a.asignatura.localeCompare(b.asignatura, "es")
        );

        lista.forEach(data => {

            const contenedor = document.getElementById(
                `asignaturas-${data.modulo}`
            );

            if (!contenedor) return;

            contenedor.insertAdjacentHTML("beforeend", `
                <div class="asignatura-row"
                     data-id="${data.id}">

                    <div class="col-nombre">
                        <span class="text-info"
                              style="cursor:pointer;font-weight:500;">
                            ${data.asignatura}
                        </span>
                    </div>

                    <div class="col-botones">

                        <button class="btn btn-sm btn-warning btnEditarAsignatura"
                            data-id="${data.id}"
                            data-nombre="${data.asignatura}">
                            Editar
                        </button>

                        <button class="btn btn-sm btn-danger btnEliminarAsignatura"
                            data-id="${data.id}">
                            Borrar
                        </button>

                    </div>

                </div>
            `);
        });

    });

});

// ===================== CLICK EN FILA =====================
document.addEventListener("click", (e) => {

    const fila = e.target.closest(".asignatura-row");
    if (!fila) return;

    if (e.target.closest("button")) return;

    const id = fila.dataset.id;

    window.location.href =
        `asignatura-topicos.html?id=${id}`;
});

// ===================== CREAR =====================
document.getElementById("btnGuardarAsignatura")
.addEventListener("click", async () => {

    const nombre = document.getElementById("nombreAsignatura").value.trim();
    if (!nombre || !moduloSeleccionado) return;

    const user = auth.currentUser;
    const userSnap = await getDoc(doc(db, "usuarios", user.uid));
    const d = userSnap.data();

    const q = query(
        collection(db, "ofertas"),
        where("modulo", "==", moduloSeleccionado)
    );

    const snap = await getDocs(q);
    if (snap.empty) return;

    const docOferta = snap.docs[0];

    await addDoc(collection(db, "asignaturas"), {
        asignatura: nombre,
        modulo: moduloSeleccionado,
        moduloId: docOferta.id,
        entidad: d.entidad,
        fechaCreacion: serverTimestamp()
    });

    document.getElementById("nombreAsignatura").value = "";

    bootstrap.Modal.getInstance(
        document.getElementById("modalAsignatura")
    ).hide();
});

// ===================== EDITAR =====================
document.addEventListener("click", async (e) => {

    if (!e.target.classList.contains("btnEditarAsignatura")) return;

    const id = e.target.dataset.id;
    const actual = e.target.dataset.nombre;

    const nuevo = prompt("Editar asignatura:", actual);

    if (!nuevo || nuevo === actual) return;

    await updateDoc(doc(db, "asignaturas", id), {
        asignatura: nuevo
    });
});

// ===================== ELIMINAR =====================
document.addEventListener("click", async (e) => {

    if (!e.target.classList.contains("btnEliminarAsignatura")) return;

    const id = e.target.dataset.id;

    if (!confirm("¿Eliminar asignatura?")) return;

    await deleteDoc(doc(db, "asignaturas", id));
});

// ===================== LOGOUT =====================
document.getElementById("btnLogout")
.addEventListener("click", () =>
    signOut(auth).then(() =>
        window.location.href = "index.html"
    )
);

</script>
<div class="modal fade" id="modalAsignatura" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header">
                <h5 class="modal-title">
                    Crear asignatura
                </h5>

                <button
                    type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body">

                <label class="form-label">
                    Nombre de la asignatura
                </label>

                <input
                    type="text"
                    id="nombreAsignatura"
                    class="form-control"
                    placeholder="Ejemplo: Inglés A2 Kids">

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">
                    Cancelar
                </button>

                <button
                    type="button"
                    class="btn btn-success"
                    id="btnGuardarAsignatura">
                    Guardar
                </button>

            </div>

        </div>
    </div>
</div>    
    
</body>
