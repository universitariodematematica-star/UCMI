<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px; 
        }

        .topico-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 14px;

    padding: 10px 18px; /* 👈 antes 18px 22px */
    margin-bottom: 6px;  /* 👈 antes 12px */

    cursor: pointer;

    transition: all 0.28s ease;

    color: white;

    display: flex;
    align-items: center;
    min-height: 38px; /* 👈 fuerza altura baja consistente */
}

.topico-card:hover {
    transform: translateX(6px); /* 👈 antes 14px */
    background: rgba(255, 255, 255, 0.14);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.topico-title {
    font-size: 1rem;
    font-weight: 600;
}

        .tema-numero{
    color:#f4d35e;          /* Amarillo elegante */
    font-weight:700;
    margin-right:6px;
}

.tema-titulo{
    color:#ffffff;
    font-weight:600;
}

        .btn-volver {
    display: inline-block;
    margin-bottom: 15px;
    padding: 8px 14px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;

    color: white;
    text-decoration: none;

    transition: all 0.2s ease;
}

.btn-volver:hover {
    transform: translateX(-4px);
    background: rgba(255,255,255,0.15);
}
        
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="alumnos-academia.html" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>
            <a href="modificaciones.html" class="nav-item-ucmi"><i class="bi bi-pencil-square"></i></i> MODIFICACIONES</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="academia-modulos.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="contenidos-academia.html" class="nav-item-ucmi"><i class="bi bi-collection"></i> CONTENIDO</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <main class="super-overlay">

    <div class="container-fluid">

        <a href="contenidos-academia.html" class="btn-volver">
        ← Volver
    </a>

        <!-- HEADER ASIGNATURA -->
        <div class="mb-4">
            <h2 class="fw-bold text-white" id="tituloAsignatura">Cargando asignatura...</h2>
            <small class="text-white-50">Selecciona un tópico para ver su contenido</small>
        </div>

        <!-- LISTA DE TÓPICOS -->
        <div id="topicosContainer" class="d-flex flex-column gap-1">

            <div class="text-white-50" id="loadingTopicos">
                <div class="spinner-border text-light"></div>
                <div class="mt-2">Cargando tópicos...</div>
            </div>

        </div>

    </div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    onSnapshot,
    query,
    where,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// ================= FIREBASE =================
const app = initializeApp({
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
});

const db = getFirestore(app);
const auth = getAuth(app);

// ================= DOM =================
const container = document.getElementById("topicosContainer");
const loading = document.getElementById("loadingTopicos");
const titulo = document.getElementById("tituloAsignatura");

// ================= PARAMS =================
const params = new URLSearchParams(window.location.search);
const asignaturaId = params.get("id");

// ================= ASIGNATURA =================
async function cargarAsignatura() {

    if (!asignaturaId) {
        titulo.textContent = "Asignatura no encontrada";
        return;
    }

    const ref = doc(db, "asignaturas", asignaturaId);
    const snap = await getDoc(ref);

    if (snap.exists()) {
        titulo.textContent = snap.data().asignatura || "Sin nombre";
    } else {
        titulo.textContent = "Asignatura no encontrada";
    }
}

// ================= TÓPICOS =================
function cargarTopicos() {

    if (!asignaturaId) {
        container.innerHTML = `
            <div class="text-danger">
                No se recibió el ID de la asignatura.
            </div>
        `;
        return;
    }

    const q = query(
        collection(db, "asignatura_topicos"),
        where("asignaturaId", "==", asignaturaId),
        orderBy("ordenAcademia", "asc")
    );

    onSnapshot(q, async (snapshot) => {

        loading.style.display = "none";

        if (snapshot.empty) {
            container.innerHTML = `
                <div class="text-white-50">
                    Esta asignatura no tiene tópicos aún.
                </div>
            `;
            return;
        }

        let html = "";

        for (const docSnap of snapshot.docs) {

            const data = docSnap.data();

            const topicoId =
                data.topicoId ||
                data.topicoID ||
                data.topico;

            if (!topicoId) continue;

            const topicoSnap = await getDoc(doc(db, "topicos", topicoId));
            if (!topicoSnap.exists()) continue;

            const topico = topicoSnap.data();

            html += `
    <div class="topico-card"
         onclick="irAContenido('${topicoId}')">

        <div class="topico-title">
            <span class="tema-numero">
                Tema ${data.ordenAcademia}:
            </span>

            <span class="tema-titulo">
                ${topico.tema || "Sin nombre"}
            </span>
        </div>

    </div>
`;
        }

        container.innerHTML = html;

    }, (error) => {

        console.error(error);

        container.innerHTML = `
            <div class="text-danger">
                Error al cargar los tópicos
            </div>
        `;
    });
}

// ================= AUTH =================
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    const userSnap = await getDoc(doc(db, "usuarios", user.uid));

    if (userSnap.exists()) {
        const d = userSnap.data();
        const logo = document.getElementById("logoAcademia");

        logo.src = d.logoCustom || "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";
        logo.style.opacity = "1";
    }

    cargarAsignatura();
    cargarTopicos();
});

// ================= LOGOUT =================
document.getElementById("btnLogout")
    .addEventListener("click", () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });

    window.irAContenido = function(topicoId) {
    window.location.href = "contenido.html?topicoId=" + encodeURIComponent(topicoId);
};
    
</script>
    
</body>
</html>
