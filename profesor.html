<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel del Profesor Pro</title>
    <script type="module" src="protect.js"></script>
    <style>
        :root { --navy: #000080; --aqua: #7FFFD4; --bg: #f0f2f5; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        h2 { color: var(--navy); border-bottom: 2px solid var(--aqua); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .prof-info { font-size: 0.9rem; background: var(--navy); color: white; padding: 5px 15px; border-radius: 20px; }
        .controls { 
            background: white; padding: 20px; border-radius: 15px; 
            margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 15px;
        }
        select { 
            padding: 10px; border-radius: 8px; border: 1px solid #ccc; 
            font-size: 1rem; color: var(--navy); width: 350px;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #666; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; color: var(--navy); }
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: var(--navy); color: white; text-align: left; padding: 15px; font-size: 0.9rem; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; color: #333; }
        .grade-badge { padding: 5px 10px; border-radius: 8px; font-weight: bold; }
        .pass { background: #dcfce7; color: #166534; }
        .fail { background: #fee2e2; color: #991b1b; }
        #loading { text-align: center; padding: 40px; color: var(--navy); font-weight: bold; }
    </style>
</head>
<body>

    <h2>
        <span>👨‍🏫 Panel de Control Docente</span>
        <span id="profTag" class="prof-info">Cargando perfil...</span>
    </h2>
    
    <div class="controls">
        <label for="studentFilter"><strong>Mis Alumnos:</strong></label>
        <select id="studentFilter">
            <option value="all">Ver todos mis alumnos</option>
        </select>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Registros</h3><p id="totalGrades">0</p></div>
        <div class="stat-card"><h3>Promedio Grupal</h3><p id="avgGrade">0.0</p></div>
    </div>

    <div class="table-container">
        <div id="loading">Filtrando datos de tu grupo...</div>
        <table id="gradesTable" style="display: none;">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Alumno</th>
                    <th>Actividad</th>
                    <th>Calificación</th>
                </tr>
            </thead>
            <tbody id="gradesBody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
            authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
            projectId: "portal-autenticacion-a1ngles"
        };

        const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentTeacherEmail = "";
        let studentNames = {}; 
        let myStudentsEmails = [];
        let allGrades = [];

        // 1. Verificar quién es el profesor
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentTeacherEmail = user.email.toLowerCase();
                document.getElementById("profTag").innerText = `Profesor: ${currentTeacherEmail}`;
                loadMyStudents();
            } else {
                window.location.href = "index.html";
            }
        });

        // 2. Cargar SOLO los alumnos vinculados a este profesor
        async function loadMyStudents() {
            // Filtramos la colección "users" donde teacherID == correo del profesor actual
            const q = query(collection(db, "users"), where("teacherID", "==", currentTeacherEmail));
            
            const userSnap = await getDocs(q);
            myStudentsEmails = [];
            
            userSnap.forEach(doc => {
                const userData = doc.data();
                studentNames[doc.id] = userData.name || doc.id;
                myStudentsEmails.push(doc.id); // Guardamos los emails de sus alumnos
            });

            if (myStudentsEmails.length === 0) {
                document.getElementById("loading").innerText = "Aún no tienes alumnos vinculados.";
                return;
            }

            startGradesListener();
        }

        // 3. Escuchar las notas (solo de sus alumnos)
        function startGradesListener() {
            // Escuchamos la colección completa pero filtraremos en el renderizado
            // Nota: Firestore tiene límites para el operador "in" (máx 30), 
            // así que filtraremos por lógica para que sea más escalable.
            const q = query(collection(db, "grades"), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snapshot) => {
                // Solo guardamos notas que pertenezcan a los alumnos del profesor
                allGrades = snapshot.docs
                    .map(doc => doc.data())
                    .filter(grade => myStudentsEmails.includes(grade.studentEmail));

                updateFilterOptions();
                renderTable(document.getElementById("studentFilter").value);
            });
        }

        function updateFilterOptions() {
            const select = document.getElementById("studentFilter");
            const currentVal = select.value;
            
            select.innerHTML = '<option value="all">Ver todos mis alumnos</option>';
            
            myStudentsEmails.forEach(email => {
                const option = document.createElement("option");
                option.value = email;
                option.textContent = studentNames[email] || email;
                select.appendChild(option);
            });
            select.value = currentVal;
        }

        function renderTable(filter) {
            const body = document.getElementById("gradesBody");
            const filtered = filter === "all" ? allGrades : allGrades.filter(g => g.studentEmail === filter);
            
            let total = 0, sum = 0;
            body.innerHTML = "";

            if (filtered.length === 0) {
                body.innerHTML = '<tr><td colspan="4" style="text-align:center;">No hay registros para mostrar.</td></tr>';
            }

            filtered.forEach(data => {
                total++;
                const score = parseFloat(data.score || 0);
                sum += score;
                const nombre = studentNames[data.studentEmail] || data.studentEmail;
                const fecha = data.timestamp ? data.timestamp.toString().split(' a las')[0] : "---";

                body.innerHTML += `
                    <tr>
                        <td>${fecha}</td>
                        <td><strong>${nombre}</strong></td>
                        <td>${data.exercise_id}</td>
                        <td><span class="grade-badge ${score >= 7 ? 'pass' : 'fail'}">${score} / 10</span></td>
                    </tr>
                `;
            });

            document.getElementById("totalGrades").innerText = total;
            document.getElementById("avgGrade").innerText = total > 0 ? (sum / total).toFixed(1) : "0.0";
            document.getElementById("loading").style.display = "none";
            document.getElementById("gradesTable").style.display = "table";
        }

        document.getElementById("studentFilter").onchange = (e) => renderTable(e.target.value);
    </script>
</body>
</html>
