<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel del Profesor</title>
    <script type="module" src="protect.js"></script>
    <style>
        :root { --navy: #000080; --aqua: #7FFFD4; --bg: #f0f2f5; }
        
        h2 { color: var(--navy); border-bottom: 2px solid var(--aqua); padding-bottom: 10px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #666; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; color: var(--navy); }

        .table-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; background: white; }
        
        th {
            background-color: var(--navy);
            color: white;
            text-align: left;
            padding: 15px;
            font-size: 0.9rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
            color: #333;
        }

        tr:hover { background-color: #f9f9f9; }

        .grade-badge {
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
        }

        .pass { background: #dcfce7; color: #166534; }
        .fail { background: #fee2e2; color: #991b1b; }

        #loading { text-align: center; padding: 40px; color: var(--navy); font-weight: bold; }
    </style>
</head>
<body>

    <h2>👨‍🏫 Panel de Control Docente</h2>
    
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Calificaciones</h3>
            <p id="totalGrades">0</p>
        </div>
        <div class="stat-card">
            <h3>Promedio General</h3>
            <p id="avgGrade">0.0</p>
        </div>
    </div>

    <div class="table-container">
        <div id="loading">Cargando registros de alumnos...</div>
        <table id="gradesTable" style="display: none;">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Alumno</th>
                    <th>Actividad / Skill</th>
                    <th>Calificación</th>
                </tr>
            </thead>
            <tbody id="gradesBody">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
            authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
            projectId: "portal-autenticacion-a1ngles"
        };

        const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Referencia a la colección donde guardas todas las notas
        // Nota: Asegúrate de que los alumnos guarden sus notas en una colección global llamada "calificaciones"
        // o ajusta el nombre según tu estructura.
        const colRef = collection(db, "calificaciones");
        const q = query(colRef, orderBy("fecha", "desc"));

        onSnapshot(q, (snapshot) => {
            const body = document.getElementById("gradesBody");
            const loading = document.getElementById("loading");
            const table = document.getElementById("gradesTable");
            
            let total = 0;
            let sum = 0;
            body.innerHTML = "";

            if (snapshot.empty) {
                loading.innerText = "No hay calificaciones registradas aún.";
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                total++;
                sum += parseFloat(data.nota || 0);

                const row = `
                    <tr>
                        <td>${data.fecha || '---'}</td>
                        <td><strong>${data.alumnoNombre || data.email}</strong></td>
                        <td>${data.skillName || 'Ejercicio'}</td>
                        <td>
                            <span class="grade-badge ${data.nota >= 70 ? 'pass' : 'fail'}">
                                ${data.nota}%
                            </span>
                        </td>
                    </tr>
                `;
                body.innerHTML += row;
            });

            // Actualizar estadísticas
            document.getElementById("totalGrades").innerText = total;
            const avg = total > 0 ? (sum / total).toFixed(1) : 0;
            document.getElementById("avgGrade").innerText = avg + "%";

            // Mostrar tabla
            loading.style.display = "none";
            table.style.display = "table";
        });
    </script>
</body>
</html>
