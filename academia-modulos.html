<!DOCTYPE html>
<html lang="es">
<head>
     <meta charset="UTF-8">

     <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
     <style>
         :root {
             --dorado-ucmi: #c5a059;
             --azul-sidebar: #1a2a3a;
             --cian-tech: #00f2ff;
             --purpura-neon: #bc13fe;
         }

         body {
             background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
             background-size: cover;
             font-family: 'Segoe UI', Roboto, sans-serif;
             color: white;
             margin: 0;
         }

         .super-overlay {
             background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.9) 100%);
             min-height: 100vh;
         }

         .sidebar {
             background: rgba(26, 42, 58, 0.95);
             backdrop-filter: blur(10px);
             min-height: 100vh;
             padding: 25px 15px;
             border-right: 1px solid rgba(197, 160, 89, 0.3);
             display: flex;
             flex-direction: column;
             position: sticky;
             top: 0;
         }

         .logo-sidebar { 
             height: 50px; 
             margin-bottom: 15px; 
         }

         .nav-link-custom {
             display: flex; 
             align-items: center; 
             width: 100%;
             background: transparent; 
             border: none; 
             padding: 12px 15px;
             color: rgba(255, 255, 255, 0.7); 
             text-align: left;
             border-radius: 12px; 
             font-size: 0.85rem; 
             font-weight: 500;
             transition: all 0.3s ease; 
             margin-bottom: 5px; 
             cursor: pointer;
             text-decoration: none; 
             text-transform: uppercase; 
             letter-spacing: 1px;
         }

         .nav-link-custom i { 
             font-size: 1.1rem; 
             margin-right: 12px; 
         }

         .nav-link-custom:hover { 
             background: rgba(255, 255, 255, 0.05); 
             color: var(--cian-tech); 
         }
         
         .nav-link-custom.active {
             background: rgba(188, 19, 254, 0.1);
             color: #d880ff;
             border: 1px solid rgba(188, 19, 254, 0.3);
         }

         .sidebar-divider {
             border-top: 1px solid rgba(255, 255, 255, 0.1);
             margin: 20px 0;
         }

         .btn-action-sidebar {
             background: transparent;
             border: 1px solid rgba(255, 255, 255, 0.4);
             color: white;
             padding: 10px;
             border-radius: 50px;
             width: 100%;
             text-align: center;
             font-weight: 600;
             text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
            display: block;
            text-decoration: none;
        }

        .btn-action-sidebar:hover {
            background: white;
            color: #1a2a3a;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .btn-logout-sidebar {
            border: 1px solid rgba(255, 49, 49, 0.4);
            color: #ff3131;
        }

        .btn-logout-sidebar:hover {
            background: rgba(255, 49, 49, 0.1);
            color: #ff3131;
            border-color: #ff3131;
            box-shadow: 0 0 15px rgba(255, 49, 49, 0.2);
        }

        .program-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .program-card i { 
            font-size: 1.6rem; 
            margin-bottom: 12px; 
            color: var(--dorado-ucmi); 
        }

        .program-card:hover {
            background: rgba(197, 160, 89, 0.15);
            border-color: var(--dorado-ucmi);
            transform: translateY(-5px);
        }

        .text-glow-gold {
            color: var(--dorado-ucmi);
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.6);
        }

        .status-badge {
             position: absolute; 
             top: 10px; 
             right: 10px;
             font-size: 0.65rem; 
             padding: 3px 10px; 
             border-radius: 20px;
             font-weight: bold; 
             letter-spacing: 1px;
        }

        .badge-visible { 
             background: rgba(0, 242, 255, 0.1); 
             color: var(--cian-tech); 
             border: 1px solid var(--cian-tech); 
        }

        .badge-hidden { 
             background: rgba(255, 49, 49, 0.1); 
             color: #ff3131; 
             border: 1px solid #ff3131; 
        }

        .form-switch .form-check-input { 
             cursor: pointer; 
        }

        .form-switch .form-check-input:checked { 
             background-color: var(--dorado-ucmi); 
             border-color: var(--dorado-ucmi); 
        }
     </style>
</head>
<body>
<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-flex">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="logo-sidebar" alt="Logo">
                    <h5 id="subtituloSidebar" class="fw-bold text-white small opacity-50">SISTEMA MAESTRO</h5>
                </div>
                <nav class="nav flex-column mb-auto">
                    <a class="nav-link-custom" href="master-postulaciones.html"><i class="bi bi-person-video2"></i> Solicitudes</a>
                    <a class="nav-link-custom" href="master-vigencia.html"><i class="bi bi-shield-check"></i> Vigencia</a>
                    <a class="nav-link-custom" href="master-usuarios.html"><i class="bi bi-people"></i> Usuarios</a>
                    <a class="nav-link-custom" href="historial-postulaciones.html"><i class="bi bi-clock-history"></i> Historial</a>
                    <a class="nav-link-custom" href="directorio.html"><i class="bi bi-person-lines-fill"></i> Directorio</a>
                    <a class="nav-link-custom" href="ofertas-academicas.html"><i class="bi bi-tags"></i> Ofertas</a>
                    <a class="nav-link-custom active" href="master-repositorio.html"><i class="bi bi-grid-3x3-gap"></i> Módulos</a>
                    <a class="nav-link-custom" href="papelera.html"><i class="bi bi-trash3"></i> Papelera</a>
                </nav>
                <div class="sidebar-divider"></div>
                <div class="px-2">
                    <a href="super-admin.html" class="btn-action-sidebar"><i class="bi bi-shield-lock me-2"></i> Panel Maestro</a>
                    <button id="btnLogoutSidebar" class="btn-action-sidebar btn-logout-sidebar"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</button>
                </div>
            </div>
            <div class="col-md-10 p-4">
                <div class="text-center mb-5">
                    <h1 id="repoTitulo" class="fw-bold text-uppercase display-6"><i class="bi bi-journal-bookmark-fill me-3 text-glow-gold"></i>Repositorio Maestro</h1>
                    <p class="text-white-50">Protocolos de Enseñanza Supralógica</p>
                </div>
                <div id="contenedorModulos" class="row g-4 mb-5">
                    <div class="text-center py-5">
                        <div class="spinner-border text-warning" role="status"></div>
                        <p class="mt-2 text-white-50 small">Sincronizando con el Repositorio Maestro...</p>
                    </div>
                </div>
                <footer class="mt-5 text-center text-white-25 small">UCMI — Desarrollo Humano y Excelencia Académica © 2026</footer>
            </div>
        </div>
    </div>
</div>
<script type="module">
     import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
     import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
     import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
     const firebaseConfig = {
         apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
         authDomain: "ucmi-13796634.firebaseapp.com",
         projectId: "ucmi-13796634",
         storageBucket: "ucmi-13796634.firebasestorage.app",
         messagingSenderId: "1090719609536",
         appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
     };
     const app = initializeApp(firebaseConfig);
     const auth = getAuth(app);
     const db = getFirestore(app);
     onAuthStateChanged(auth, async (user) => {
         if (user) {
             cargarModulosRepositorio(user.uid);
         } else {
             window.location.href = "index.html";
         }
     });
     async function cargarModulosRepositorio(uid) {
         const docRef = doc(db, "academias", uid);
         try {
             const docSnap = await getDoc(docRef);
             if (docSnap.exists()) {
                 const data = docSnap.data();
                 document.getElementById('repoTitulo').innerText = data.nombreInstitucion || "Repositorio Maestro";
                 document.getElementById('subtituloSidebar').innerText = data.nombreInstitucion ? `PANEL ${data.nombreInstitucion.toUpperCase()}` : "SISTEMA MAESTRO";
                 if (data.modulosAdquiridos) {
                     renderizarGrid(data.modulosAdquiridos, uid);
                 }
             }
         } catch (error) {
             console.error("Error cargando repositorio:", error);
         }
     }
     function renderizarGrid(modulos, uid) {
         const container = document.getElementById('contenedorModulos');
         container.innerHTML = '';
         Object.entries(modulos).forEach(([id, info]) => {
             const card = document.createElement('div');
             card.className = 'col-md-3';
             card.innerHTML = `
                 <div class="program-card position-relative">
                     <span class="status-badge ${info.visible ? 'badge-visible' : 'badge-hidden'}">${info.visible ? 'ACTIVO' : 'OCULTO'}</span>
                     <i class="bi ${info.icono || 'bi-bookmark-star'}"></i>
                     <h6 class="fw-bold">${info.nombre}</h6>
                     <div class="form-check form-switch mt-3">
                         <input class="form-check-input" type="checkbox" id="sw_${id}" ${info.visible ? 'checked' : ''}>
                         <label class="small text-white-50" for="sw_${id}">Visibilidad</label>
                     </div>
                 </div>`;
             card.querySelector('input').addEventListener('change', (e) => {
                 actualizarVisibilidad(uid, id, e.target.checked);
             });
             container.appendChild(card);
         });
     }
     async function actualizarVisibilidad(uid, modId, estado) {
         const ref = doc(db, "academias", uid);
         const switchInput = document.getElementById(`sw_${modId}`);
         const card = switchInput.closest('.program-card');
         const badge = card.querySelector('.status-badge');
         try {
             badge.className = `status-badge ${estado ? 'badge-visible' : 'badge-hidden'}`;
             badge.innerText = estado ? 'ACTIVO' : 'OCULTO';
             await updateDoc(ref, { [`modulosAdquiridos.${modId}.visible`]: estado });
         } catch (error) {
             switchInput.checked = !estado;
             badge.className = `status-badge ${!estado ? 'badge-visible' : 'badge-hidden'}`;
             badge.innerText = !estado ? 'ACTIVO' : 'OCULTO';
             alert("Error de conexión al guardar cambios.");
         }
     }
     document.getElementById('btnLogoutSidebar').addEventListener('click', () => {
         signOut(auth).then(() => { window.location.href = "index.html"; });
     });

</script>
</body>
</html>
