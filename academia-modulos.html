<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Repositorio Académico Maestro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --azul-sidebar: #1a2a3a;
            --cian-tech: #00f2ff;
            --purpura-neon: #bc13fe;
            --overlay-oscuro: rgba(6, 9, 15, 0.85);
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, var(--overlay-oscuro) 100%);
            min-height: 100vh;
            width: 100%;
        }

        /* --- Panel de Contenido --- */
        .main-content { padding: 60px; }
        .header-main { margin-bottom: 70px; text-align: center; }
        .title-repo { font-weight: 900; font-size: 3.5rem; text-transform: uppercase; }
        .title-icon { color: var(--dorado-ucmi); filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.5)); }
        .subtitle-repo { color: rgba(255, 255, 255, 0.4); font-size: 1.1rem; letter-spacing: 4px; }

        /* --- Estilos de Lista y Switch UCMI --- */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 950px;
            margin: 0 auto;
        }
        .module-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .module-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--cian-tech);
            transform: translateX(8px);
        }
        .status-label {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-right: 15px;
            letter-spacing: 1px;
        }
        .form-check-input {
            width: 3.2em !important;
            height: 1.6em !important;
            cursor: pointer;
        }
        .form-check-input:checked {
            background-color: var(--cian-tech) !important;
            border-color: var(--cian-tech) !important;
        }
        .text-publico { color: var(--cian-tech); }
        .text-oculto { color: rgba(255, 255, 255, 0.25); }
        .footer-system { margin-top: 100px; padding-bottom: 40px; text-align: center; opacity: 0.3; }

        @media (max-width: 768px) {
            .main-content { padding: 30px; }
            .title-repo { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <aside class="col-md-3 col-lg-2 sidebar d-none d-md-flex">
                <div class="logo-container">
                    <div id="nombreEntidad" class="sistema-label">Cargando...</div>
                </div>

                <div class="divider"></div>

                <div class="action-group">
                    <a href="#" class="btn-master"><i class="bi bi-shield-lock me-2"></i> Panel Super</a>
                    <a href="#" class="btn-master btn-exit"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
                </div>
            </aside>

            <main class="col-md-9 col-lg-10 main-content">
                <header class="header-main">
                    <h1 class="title-repo">
                        <i class="bi bi-journal-bookmark-fill title-icon"></i>
                        <span id="section-title">Cargando...</span>
                    </h1>
                </header>

                <div id="dynamic-content">
                    <div class="list-container" id="modules-container">
                        <!-- Aquí se cargan los módulos -->
                    </div>
                </div>

                <footer class="footer-system">
                    <p class="mb-1">UCMI — Desarrollo Humano & Excelencia Académica</p>
                    <p class="small text-uppercase">Plataforma Maestra © 2026</p>
                </footer>
            </main>
        </div>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { getAuth, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc, updateDoc } 
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


const auth = getAuth();
let userId = null;
    const userRole = localStorage.getItem('userRole'); 
    const contenedor = document.getElementById('modules-container');
    const sectionTitle = document.getElementById('section-title');
    const sectionSubtitle = document.getElementById('section-subtitle');

    // --- 1. Función de Carga ---
    const cargarDatos = async () => {
        if (!userId) {
            contenedor.innerHTML = '<p class="text-center opacity-50">Sesión expirada.</p>';
            return;
        }

        try {
            const docRef = doc(db, "usuarios", userId);
            const docSnap = await getDoc(docRef);
            console.log("Documento buscado:", userId);
            console.log("Existe:", docSnap.exists());
            console.log("Datos:", docSnap.data());

            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // Actualizar nombre de la entidad
                const labelEntidad = document.getElementById('nombreEntidad');
                labelEntidad.innerText = data.entidad || "Sistema Maestro";

                // Gestión de Módulos
                const misModulos = data.modulos || [];
                const estados = data['modulos-ofertados-academia'] || {};

                // Gestión de Logo e Interfaz
                const logoElement = document.getElementById('logoAcademia');
                if (data.logoCustom) {
                    logoElement.src = data.logoCustom;
                } else if (userRole === 'Profesor independiente') {
                    logoElement.src = 'https://universitariodematematica-star.github.io/UCMI/logo-star.png';
                }

                logoElement.classList.add('ready'); // Activa visibilidad suave
                sectionTitle.innerText = "Módulos Académicos";

                if (misModulos.length === 0) {
                    contenedor.innerHTML = '<p class="text-center opacity-50 mt-5">No tienes módulos asignados.</p>';
                    return;
                }

                 contenedor.innerHTML = misModulos.map((nombre, index) => {
                    const estaActivo = estados[nombre] === true;
                    return `
                        <div class="module-item">
                            <div class="d-flex align-items-center">
                                <div class="me-3 opacity-50"><i class="bi bi-stack"></i></div>
                                <div><h3 class="m-0" style="font-size: 1rem;">${nombre}</h3></div>
                            </div>
                            <div class="d-flex align-items-center">
                                <span id="label-${index}" class="status-label ${estaActivo ? 'text-publico' : 'text-oculto'}">
                                    ${estaActivo ? 'Público' : 'Oculto'}
                                </span>
                                <div class="form-check form-switch m-0">
                                    <input class="form-check-input" type="checkbox" role="switch"
                                           id="switch-${index}" ${estaActivo ? 'checked' : ''}
                                           onchange="window.actualizarVisibilidad(${index}, '${nombre}')">
                                </div>
                            </div>
                        </div>`;
                }).join('');

            } else {
                contenedor.innerHTML = `<p class="text-center opacity-50">Usuario [${userId}] no encontrado.</p>`;
            }
        } catch (error) {
            console.error("Error Firebase:", error);
            contenedor.innerHTML = '<p class="text-center text-danger">Error de conexión con Supralógica.</p>';
        }
    };

    // --- 2. Lógica de Navegación ---
    document.querySelectorAll('.nav-link-custom').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const texto = link.innerText.trim();
            
            document.querySelectorAll('.nav-link-custom').forEach(l => l.classList.remove('active'));
            link.classList.add('active');
            sectionSubtitle.innerText = "Gestión de " + texto;

            if (texto === 'Módulos') {
                cargarDatos();
            } else {
                sectionTitle.innerText = texto;
                contenedor.innerHTML = `
                    <div class="text-center opacity-50 mt-5">
                        <i class="bi bi-gear-wide-connected display-1"></i>
                        <p class="mt-3">Sección "${texto}" en fase de implementación...</p>
                    </div>`;
            }
        });
    });

    // --- 3. Función de Sincronización Global ---
    window.actualizarVisibilidad = async (index, nombreModulo) => {
        const sw = document.getElementById(`switch-${index}`);
        const label = document.getElementById(`label-${index}`);
        
        label.innerText = sw.checked ? "Público" : "Oculto";
        label.className = sw.checked ? "status-label text-publico" : "status-label text-oculto";

        try {
            const userRef = doc(db, "usuarios", userId);
            await updateDoc(userRef, {
                [`modulos-ofertados-academia.${nombreModulo}`]: sw.checked
            });
        } catch (error) {
            console.error("Error sincronización:", error);
            sw.checked = !sw.checked; // Reversión visual si falla
            label.innerText = sw.checked ? "Público" : "Oculto";
            label.className = sw.checked ? "status-label text-publico" : "status-label text-oculto";
            alert("Error: No se pudo actualizar el estado en la base de datos.");
        }
    };

    // --- 4. Ejecución Inicial ---
    onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "index.html";
        return;
    }

    userId = user.uid;
    console.log("UID actual:", userId);
    cargarDatos();
});
</script>
</body>
</html>
