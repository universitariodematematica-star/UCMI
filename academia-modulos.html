<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;
        }

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: white;
            min-height: 100vh;
        }

        .app-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar con efecto Glassmorphism */
        .sidebar { 
            background: rgba(26, 42, 58, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            width: 260px; 
            flex-shrink: 0; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
        }

        .logo-sidebar { 
            height: 100px; 
            width: auto; 
            margin-bottom: 30px; 
            display: block; 
            margin-left: auto; 
            margin-right: auto; 
            object-fit: contain; 
            border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        .sidebar-nav { flex-grow: 1; }

        .nav-item-ucmi { 
            display: flex; align-items: center; 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            padding: 10px 15px; 
            margin-bottom: 5px; 
            border-radius: 10px; 
            transition: 0.3s all ease; 
            font-size: 0.85rem; 
        }
        
        .nav-item-ucmi i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-item-ucmi.active { background: rgba(197, 160, 89, 0.15); color: var(--dorado-ucmi); font-weight: 600; box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1); }

        .btn-sidebar-action { 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: white !important; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            border-radius: 50px; 
            padding: 10px; 
            text-decoration: none; 
            text-align: center; 
            transition: all 0.3s ease-in-out; 
            display: block; 
            margin-bottom: 10px; 
        }

        .btn-sidebar-action:hover { background: rgba(255, 255, 255, 0.1); border-color: #ffffff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        .btn-logout { border-color: rgba(231, 76, 60, 0.4) !important; color: rgba(231, 76, 60, 0.8) !important; }
        .btn-logout:hover { background: rgba(231, 76, 60, 0.1) !important; border-color: var(--rojo-logout) !important; color: white !important; }

        .super-overlay { 
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%); 
            flex-grow: 1; 
            min-height: 100vh; 
            overflow-y: auto; 
        }

.main-content {
    flex-grow: 1;
    padding: 60px;
}

.header-main {
    margin-bottom: 70px;
    text-align: center;
}

.title-repo {
    font-weight: 900;
    font-size: 3.5rem;
    text-transform: uppercase;
}

.title-icon {
    color: var(--dorado-ucmi);
    filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.5));
}

.list-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 950px;
    margin: 0 auto;
}

.module-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all .3s ease;
}

.module-item:hover {
    background: rgba(255,255,255,0.07);
    border-color: #00f2ff;
    transform: translateX(8px);
}

.status-label {
    font-size: .65rem;
    font-weight: 800;
    text-transform: uppercase;
    margin-right: 15px;
    letter-spacing: 1px;
}

.form-check-input {
    width: 3.2em !important;
    height: 1.6em !important;
    cursor: pointer;
}

.form-check-input:checked {
    background-color: #00f2ff !important;
    border-color: #00f2ff !important;
}

.text-publico {
    color: #00f2ff;
}

.text-oculto {
    color: rgba(255,255,255,.25);
}

.footer-system {
    margin-top: 100px;
    padding-bottom: 40px;
    text-align: center;
    opacity: .3;
}

@media (max-width:768px) {
    .main-content {
        padding: 30px;
    }

    .title-repo {
        font-size: 2.2rem;
    }
}
        
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="app-wrapper">
        <aside class="sidebar d-none d-md-flex">
        <div class="text-center mb-2">
            <img src="" 
                 id="logoAcademia" 
                 class="logo-sidebar" 
                 alt="Logo Academia">
        </div>
        <nav class="sidebar-nav">
            <a href="solicitudes-academia.html" class="nav-item-ucmi"><i class="bi bi-person-badge"></i> SOLICITUDES</a>
            <a href="alumnos-academia.html" class="nav-item-ucmi"><i class="bi bi-mortarboard"></i> ALUMNOS</a>
            <a href="docentes-academia.html" class="nav-item-ucmi"><i class="bi bi-people"></i> DOCENTES</a>
            <a href="modificaciones.html" class="nav-item-ucmi"><i class="bi bi-pencil-square"></i></i> MODIFICACIONES</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-person-vcard"></i> DIRECTORIO</a>
            <a href="academia-modulos.html" class="nav-item-ucmi"><i class="bi bi-grid-1x2"></i> MÓDULOS</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-collection"></i> CONTENIDO</a>
            <a href="#" class="nav-item-ucmi"><i class="bi bi-trash3"></i> PAPELERA</a>
        </nav>
        <div class="mt-4 pt-4 border-top border-secondary">
            <a href="admin-academia.html" class="btn-sidebar-action w-100"><i class="bi bi-shield-lock"></i> Panel Maestro</a>
            <a href="#" id="btnLogout" class="btn-sidebar-action btn-logout w-100"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
        </div>
    </aside>

<main class="flex-grow-1 main-content">
    <header class="header-main d-flex justify-content-between align-items-center flex-wrap gap-3">

    <h1 class="title-repo m-0">
        <i class="bi bi-journal-bookmark-fill title-icon"></i>
        <span id="section-title">Cargando...</span>
    </h1>

    <a href="crear-asignaturas.html" class="btn btn-outline-light btn-sm">
        Ir a crear asignaturas →
    </a>

</header>

    <div id="dynamic-content">
        <div class="list-container" id="modules-container">
            <!-- Aquí se cargan los módulos -->
        </div>
    </div>

    <footer class="footer-system">
        <p class="mb-1">UCMI — Desarrollo Humano & Excelencia Académica</p>
        <p class="small text-uppercase">Plataforma Maestra © 2026</p>
    </footer>
</main>
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
    authDomain: "ucmi-13796634.firebaseapp.com",
    projectId: "ucmi-13796634",
    storageBucket: "ucmi-13796634.firebasestorage.app",
    messagingSenderId: "1090719609536",
    appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userId = null;
const contenedor = document.getElementById('modules-container');
const sectionTitle = document.getElementById('section-title');

const cargarDatos = async () => {
    if (!userId) {
        contenedor.innerHTML =
            '<p class="text-center opacity-50">Sesión expirada.</p>';
        return;
    }

    try {
        const docRef = doc(db, "usuarios", userId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();

            const misModulos = data.modulos || [];
            const estados = data['modulos-ofertados-academia'] || {};

            sectionTitle.innerText = "Módulos Académicos";

            if (misModulos.length === 0) {
                contenedor.innerHTML =
                    '<p class="text-center opacity-50 mt-5">No tienes módulos asignados.</p>';
                return;
            }

            contenedor.innerHTML = misModulos.map((nombre, index) => {
                const estaActivo = estados[nombre] === true;

                return `
                    <div class="module-item">
                        <div class="d-flex align-items-center">
                            <div class="me-3 opacity-50">
                                <i class="bi bi-stack"></i>
                            </div>
                            <div>
                                <h3 class="m-0" style="font-size:1rem;">
                                    ${nombre}
                                </h3>
                            </div>
                        </div>

                        <div class="d-flex align-items-center">
                            <span
                                id="label-${index}"
                                class="status-label ${estaActivo ? 'text-publico' : 'text-oculto'}">
                                ${estaActivo ? 'Público' : 'Oculto'}
                            </span>

                            <div class="form-check form-switch m-0">
                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="switch-${index}"
                                    ${estaActivo ? 'checked' : ''}
                                    onchange="window.actualizarVisibilidad(${index}, '${nombre}')">
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

        } else {
            contenedor.innerHTML =
                `<p class="text-center opacity-50">Usuario [${userId}] no encontrado.</p>`;
        }
    }
    catch (error) {
        console.error(error);
        contenedor.innerHTML =
            '<p class="text-center text-danger">Error de conexión.</p>';
    }
};

window.actualizarVisibilidad = async (index, nombreModulo) => {
    const sw = document.getElementById(`switch-${index}`);
    const label = document.getElementById(`label-${index}`);

    label.innerText = sw.checked ? "Público" : "Oculto";
    label.className =
        sw.checked
            ? "status-label text-publico"
            : "status-label text-oculto";

    try {
        const userRef = doc(db, "usuarios", userId);

        await updateDoc(userRef, {
            [`modulos-ofertados-academia.${nombreModulo}`]: sw.checked
        });
    }
    catch (error) {
        console.error(error);

        sw.checked = !sw.checked;

        label.innerText = sw.checked ? "Público" : "Oculto";
        label.className =
            sw.checked
                ? "status-label text-publico"
                : "status-label text-oculto";
    }
};    

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "index.html";
        return;
    }

    console.log("USER:", user.uid);

    const userSnap = await getDoc(doc(db, "usuarios", user.uid));

if (userSnap.exists()) {
    const d = userSnap.data();

    console.log("DOC DATA:", d);

    const logo = document.getElementById('logoAcademia');

    logo.onload = () => {
        logo.style.opacity = "1";
    };

    logo.src =
        d.logoCustom ||
        "https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png";

    userId = user.uid;
    cargarDatos();
}
});

document.getElementById('btnLogout')
.addEventListener('click', () =>
    signOut(auth).then(() =>
        window.location.href = "index.html"
    )
);    

</script>    
    
</body>
</html>
