<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Repositorio Académico Maestro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --azul-sidebar: #1a2a3a;
            --cian-tech: #00f2ff;
            --overlay-oscuro: rgba(6, 9, 15, 0.85);
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, var(--overlay-oscuro) 100%);
            min-height: 100vh;
            width: 100%;
        }

        .sidebar {
            background: rgba(26, 42, 58, 0.95);
            backdrop-filter: blur(12px);
            min-height: 100vh;
            padding: 30px 20px;
            border-right: 1px solid rgba(197, 160, 89, 0.25);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-container { text-align: center; margin-bottom: 40px; }
        .logo-sidebar { height: 65px; width: auto; filter: drop-shadow(0 0 12px rgba(197, 160, 89, 0.3)); }
        .sistema-label { font-size: 0.7rem; font-weight: 800; letter-spacing: 3px; color: rgba(255, 255, 255, 0.4); margin-top: 15px; text-transform: uppercase; }

        .nav-custom { display: flex; flex-direction: column; gap: 8px; }
        .nav-link-custom {
            display: flex; align-items: center; padding: 14px 18px; color: rgba(255, 255, 255, 0.65);
            text-decoration: none; border-radius: 14px; font-size: 0.85rem; font-weight: 600;
            transition: all 0.3s ease; border: 1px solid transparent;
        }
        .nav-link-custom i { font-size: 1.2rem; margin-right: 15px; }
        .nav-link-custom:hover { background: rgba(255, 255, 255, 0.05); color: var(--cian-tech); }
        .nav-link-custom.active {
            background: rgba(188, 19, 254, 0.08); color: #e0a3ff; border: 1px solid rgba(188, 19, 254, 0.2);
        }

        .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent); margin: 25px 0; }

        .btn-master {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff; padding: 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; text-align: center; text-decoration: none; transition: all 0.4s ease;
        }
        .btn-master:hover { background: #ffffff; color: var(--azul-sidebar); }

        .main-content { padding: 60px; }
        .header-main { margin-bottom: 70px; text-align: center; }
        .title-repo { font-weight: 900; text-transform: uppercase; font-size: 3.5rem; }
        .title-icon { color: var(--dorado-ucmi); }

        .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card-module {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px); border-radius: 24px; padding: 40px; text-align: center;
            position: relative; transition: transform 0.3s ease;
        }
        .card-module:hover { transform: translateY(-10px); border-color: var(--dorado-ucmi); }
        .module-icon { font-size: 3.5rem; color: var(--dorado-ucmi); margin-bottom: 25px; }
        .module-name { font-size: 1.4rem; font-weight: 700; }
        .module-desc { font-size: 0.9rem; color: rgba(255, 255, 255, 0.5); }
        .badge-status {
            position: absolute; top: 20px; right: 20px; font-size: 0.65rem; font-weight: 900;
            padding: 6px 14px; border-radius: 30px; background: rgba(0, 242, 255, 0.1);
            color: var(--cian-tech); border: 1px solid var(--cian-tech);
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <aside class="col-md-3 col-lg-2 sidebar d-none d-md-flex">
                <div class="logo-container">
                    <img id="logoAcademia" src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="logo-sidebar">
                    <div class="sistema-label">Sistema Maestro</div>
                </div>
                <nav class="nav-custom">
                    <a href="#" class="nav-link-custom"><i class="bi bi-person-video2"></i> Solicitudes</a>
                    <a href="#" class="nav-link-custom active"><i class="bi bi-grid-3x3-gap"></i> Módulos</a>
                </nav>
                <div class="divider"></div>
                <div class="action-group d-flex flex-column gap-2">
                    <a href="#" class="btn-master">Panel Super</a>
                    <a href="#" class="btn-master text-danger border-danger">Salir</a>
                </div>
            </aside>

            <main class="col-md-9 col-lg-10 main-content">
                <header class="header-main">
                    <h1 class="title-repo">
                        <i class="bi bi-journal-bookmark-fill title-icon"></i>
                        <span id="section-title">Módulos</span>
                    </h1>
                    <p class="subtitle-repo">Mis Cursos Adquiridos</p>
                </header>

                <div id="dynamic-content">
                    <div class="module-grid" id="modules-container">
                        </div>
                </div>
            </main>
        </div>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.addEventListener('DOMContentLoaded', async () => {
        
        const cargarModulosAdquiridos = async () => {
            const contenedor = document.getElementById('modules-container');
            const userId = localStorage.getItem('userId');
            const academiaId = localStorage.getItem('academiaId') || 'ucmi';

            if (!userId) {
                contenedor.innerHTML = '<p class="text-center">Por favor, inicie sesión para ver sus módulos.</p>';
                return;
            }

            try {
                // 1. Obtener los IDs de módulos que tiene el usuario
                const userDoc = await getDoc(doc(db, "usuarios", userId));
                if (!userDoc.exists()) return;
                
                const modulosAdquiridosIds = userDoc.data().modulosAdquiridos || [];

                // 2. Obtener la información de todos los módulos de la academia
                const academiaDoc = await getDoc(doc(db, "academias", academiaId));
                if (!academiaDoc.exists()) return;

                const catalogoModulos = academiaDoc.data().modulos || [];

                // 3. Filtrar el catálogo para mostrar solo los adquiridos
                const misModulos = catalogoModulos.filter(m => 
                    modulosAdquiridosIds.includes(m.id || m.nombre)
                );

                if (misModulos.length === 0) {
                    contenedor.innerHTML = '<p class="text-center opacity-50">No tienes módulos adquiridos todavía.</p>';
                    return;
                }

                contenedor.innerHTML = misModulos.map(modulo => `
                    <article class="card-module">
                        <div class="badge-status">Adquirido</div>
                        <i class="bi ${modulo.icono || 'bi-journal-check'} module-icon"></i>
                        <h3 class="module-name">${modulo.nombre}</h3>
                        <p class="module-desc">${modulo.descripcion || 'Contenido oficial habilitado.'}</p>
                    </article>
                `).join('');

            } catch (error) {
                console.error("Error:", error);
                contenedor.innerHTML = '<p class="text-center text-danger">Error al conectar con el Repositorio.</p>';
            }
        };

        // Ejecución inicial
        await cargarModulosAdquiridos();

        // Lógica de cambio de logo
        const userRole = localStorage.getItem('userRole');
        if (userRole === 'Profesor independiente') {
            document.getElementById('logoAcademia').src = 'https://universitariodematematica-star.github.io/UCMI/logo-star.png';
        }
    });
</script>
</body>
</html>
