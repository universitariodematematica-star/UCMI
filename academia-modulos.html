<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Módulos Académicos - UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- UCMI CORE -->
    <link rel="stylesheet" href="ucmi-core.css">

</head>

<body>

<script type="module">

// ======================================================
// IMPORTS (PRIMERO TODO)
// ======================================================

import { crearLayout, obtenerContenedor } from "./ucmi-layout.js";
import { db, obtenerSesion } from "./firebase-config.js";

import {
    doc,
    getDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ======================================================
// SESIÓN
// ======================================================

const { userId, userRole } = obtenerSesion();

if (!userId) {
    document.body.innerHTML =
        "<p class='text-center mt-5'>Sesión expirada</p>";
    throw new Error("Sin sesión");
}

// ======================================================
// INICIALIZAR LAYOUT (IMPORTANTE: DESPUÉS DE IMPORTS)
// ======================================================

await crearLayout({
    paginaActiva: "modulos",
    titulo: "Módulos Académicos",
    icono: "bi-journal-bookmark-fill"
});

// ======================================================
// AHORA SÍ EXISTE EL DOM DEL LAYOUT
// ======================================================

const contenedor = obtenerContenedor();

// ======================================================
// CARGAR DATOS
// ======================================================

async function cargarDatos() {

    try {

        const ref = doc(db, "usuarios", userId);
        const snap = await getDoc(ref);

        if (!snap.exists()) {

            contenedor.innerHTML =
                `<p class="text-center opacity-50">
                    Usuario no encontrado
                </p>`;

            return;
        }

        const data = snap.data();

        const modulos = data.modulos || [];
        const estados = data['modulos-ofertados-academia'] || {};

        if (!modulos.length) {

            contenedor.innerHTML =
                `<p class="text-center opacity-50 mt-5">
                    No tienes módulos asignados
                </p>`;

            return;
        }

        contenedor.innerHTML = modulos.map((nombre, index) => {

            const activo = estados[nombre] === true;

            return `
            <div class="module-item">

                <div class="d-flex align-items-center">

                    <i class="bi bi-stack me-2 opacity-50"></i>

                    <h3 class="m-0" style="font-size:1rem">
                        ${nombre}
                    </h3>

                </div>

                <div class="d-flex align-items-center">

                    <span id="label-${index}"
                          class="status-label ${activo ? 'text-publico' : 'text-oculto'}">

                        ${activo ? 'Público' : 'Oculto'}

                    </span>

                    <input class="form-check-input"
                           type="checkbox"
                           id="switch-${index}"
                           ${activo ? 'checked' : ''}

                           onchange="toggleModulo('${nombre}', ${index})">

                </div>

            </div>`;
        }).join('');

    } catch (err) {

        console.error(err);

        contenedor.innerHTML =
            `<p class="text-danger text-center">
                Error al cargar datos
            </p>`;
    }
}

// ======================================================
// TOGGLE GLOBAL (FUNCION NECESARIA EN WINDOW)
// ======================================================

window.toggleModulo = async function(nombre, index) {

    const sw = document.getElementById(`switch-${index}`);
    const label = document.getElementById(`label-${index}`);

    const estado = sw.checked;

    label.innerText = estado ? "Público" : "Oculto";
    label.className = estado
        ? "status-label text-publico"
        : "status-label text-oculto";

    try {

        const ref = doc(db, "usuarios", userId);

        await updateDoc(ref, {
            [`modulos-ofertados-academia.${nombre}`]:
                estado
        });

    } catch (error) {

        console.error(error);

        // revertir si falla
        sw.checked = !estado;

        label.innerText = !estado ? "Público" : "Oculto";
        label.className = !estado
            ? "status-label text-publico"
            : "status-label text-oculto";

        alert("No se pudo actualizar");
    }
};

// ======================================================
// INIT
// ======================================================

cargarDatos();

</script>

</body>
</html>
