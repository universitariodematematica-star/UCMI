<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Módulos Académicos - UCMI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- UCMI CORE -->
    <link rel="stylesheet" href="ucmi-core.css">

</head>

<body>

<script type="module">

import { crearLayout, obtenerContenedor } from "./ucmi-layout.js";

// ======================================================
// INICIALIZAR LAYOUT GLOBAL
// ======================================================

await crearLayout({
    paginaActiva: "modulos",
    titulo: "Módulos Académicos",
    icono: "bi-journal-bookmark-fill"
});

// Contenedor donde se renderiza la página
const contenedor = obtenerContenedor();

// ======================================================
// FIREBASE + SESIÓN
// ======================================================

import {
    db,
    obtenerSesion
} from "./firebase-config.js";

import {
    doc,
    getDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const { userId, userRole } = obtenerSesion();

// ======================================================
// CARGA DE DATOS
// ======================================================

async function cargarDatos() {

    if (!userId) {
        contenedor.innerHTML =
            `<p class="text-center opacity-50">Sesión expirada.</p>`;
        return;
    }

    try {

        const ref = doc(db, "usuarios", userId);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
            contenedor.innerHTML =
                `<p class="text-center opacity-50">Usuario no encontrado.</p>`;
            return;
        }

        const data = snap.data();

        const misModulos = data.modulos || [];
        const estados = data['modulos-ofertados-academia'] || {};

        if (misModulos.length === 0) {
            contenedor.innerHTML =
                `<p class="text-center opacity-50 mt-5">
                    No tienes módulos asignados.
                </p>`;
            return;
        }

        contenedor.innerHTML = misModulos.map((nombre, index) => {

            const activo = estados[nombre] === true;

            return `
                <div class="module-item">

                    <div class="d-flex align-items-center">

                        <div class="me-3 opacity-50">
                            <i class="bi bi-stack"></i>
                        </div>

                        <div>
                            <h3 class="m-0" style="font-size: 1rem;">
                                ${nombre}
                            </h3>
                        </div>

                    </div>

                    <div class="d-flex align-items-center">

                        <span id="label-${index}"
                              class="status-label ${activo ? 'text-publico' : 'text-oculto'}">

                            ${activo ? 'Público' : 'Oculto'}

                        </span>

                        <div class="form-check form-switch m-0">

                            <input class="form-check-input"
                                   type="checkbox"
                                   id="switch-${index}"
                                   ${activo ? 'checked' : ''}

                                   onchange="window.toggleModulo('${nombre}', ${index})">

                        </div>

                    </div>

                </div>
            `;
        }).join('');

    } catch (error) {

        console.error(error);

        contenedor.innerHTML =
            `<p class="text-danger text-center">
                Error al cargar datos
            </p>`;
    }
}

// ======================================================
// TOGGLE DE MÓDULOS
// ======================================================

window.toggleModulo = async function(nombreModulo, index) {

    const sw = document.getElementById(`switch-${index}`);
    const label = document.getElementById(`label-${index}`);

    const nuevoEstado = sw.checked;

    label.innerText = nuevoEstado ? "Público" : "Oculto";
    label.className = nuevoEstado
        ? "status-label text-publico"
        : "status-label text-oculto";

    try {

        const ref = doc(db, "usuarios", userId);

        await updateDoc(ref, {
            [`modulos-ofertados-academia.${nombreModulo}`]:
                nuevoEstado
        });

    } catch (error) {

        console.error(error);

        sw.checked = !nuevoEstado;

        label.innerText = !nuevoEstado ? "Público" : "Oculto";

        label.className = !nuevoEstado
            ? "status-label text-publico"
            : "status-label text-oculto";

        alert("Error al actualizar módulo");
    }
};

// ======================================================
// INICIALIZAR
// ======================================================

cargarDatos();

</script>

</body>
</html>
