<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Repositorio Académico Maestro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --dorado-ucmi: #c5a059;
            --azul-sidebar: #1a2a3a;
            --cian-tech: #00f2ff;
            --purpura-neon: #bc13fe;
            --overlay-oscuro: rgba(6, 9, 15, 0.85);
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, var(--overlay-oscuro) 100%);
            min-height: 100vh;
            width: 100%;
        }

        /* --- Estructura Lateral --- */
        .sidebar {
            background: rgba(26, 42, 58, 0.95);
            backdrop-filter: blur(12px);
            min-height: 100vh;
            padding: 30px 20px;
            border-right: 1px solid rgba(197, 160, 89, 0.25);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-sidebar {
            height: 65px;
            width: auto;
            filter: drop-shadow(0 0 12px rgba(197, 160, 89, 0.3));
            transition: transform 0.3s ease;
        }

        .logo-sidebar:hover { transform: scale(1.05); }

        .sistema-label {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* --- Navegación --- */
        .nav-custom { display: flex; flex-direction: column; gap: 8px; }

        .nav-link-custom {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-link-custom i { font-size: 1.2rem; margin-right: 15px; }

        .nav-link-custom:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--cian-tech);
            padding-left: 22px;
        }

        .nav-link-custom.active {
            background: rgba(188, 19, 254, 0.08);
            color: #e0a3ff;
            border: 1px solid rgba(188, 19, 254, 0.2);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            margin: 25px 0;
        }

        .action-group { margin-top: auto; display: flex; flex-direction: column; gap: 12px; }

        .btn-master {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            transition: all 0.4s ease;
        }

        .btn-master:hover {
            background: #ffffff;
            color: var(--azul-sidebar);
            transform: translateY(-2px);
        }

        .btn-exit { border-color: rgba(255, 49, 49, 0.3); color: #ff5c5c; }
        .btn-exit:hover { background: rgba(255, 49, 49, 0.1); border-color: #ff3131; }

        /* --- Panel de Contenido --- */
        .main-content { padding: 60px; }
        .header-main { margin-bottom: 70px; text-align: center; }
        .title-repo { font-weight: 900; font-size: 3.5rem; text-transform: uppercase; }
        .title-icon { color: var(--dorado-ucmi); filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.5)); }
        .subtitle-repo { color: rgba(255, 255, 255, 0.4); font-size: 1.1rem; letter-spacing: 4px; }

        /* --- Tarjetas --- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card-module {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            transition: all 0.5s ease;
            position: relative;
        }

        .card-module:hover {
            transform: translateY(-10px);
            border-color: var(--dorado-ucmi);
            background: rgba(255, 255, 255, 0.07);
        }

        .module-icon { font-size: 3.5rem; color: var(--dorado-ucmi); margin-bottom: 25px; }
        .module-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
        .module-desc { font-size: 0.9rem; color: rgba(255, 255, 255, 0.5); }
        
        .badge-status {
            position: absolute; top: 20px; right: 20px;
            font-size: 0.65rem; font-weight: 900;
            padding: 6px 14px; border-radius: 30px;
            background: rgba(0, 242, 255, 0.1); color: var(--cian-tech);
            border: 1px solid var(--cian-tech);
        }

        .footer-system { margin-top: 100px; padding-bottom: 40px; text-align: center; opacity: 0.3; }

        @media (max-width: 768px) {
            .main-content { padding: 30px; }
            .title-repo { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <aside class="col-md-3 col-lg-2 sidebar d-none d-md-flex">
                <div class="logo-container">
                    <img id="logoAcademia" src="https://universitariodematematica-star.github.io/UCMI/logo-ucmi.png" class="logo-sidebar">
                    <div class="sistema-label">Sistema Maestro</div>
                </div>

                <nav class="nav-custom">
                    <a href="#" class="nav-link-custom"><i class="bi bi-person-video2"></i> Solicitudes</a>
                    <a href="#" class="nav-link-custom"><i class="bi bi-shield-check"></i> Vigencia</a>
                    <a href="#" class="nav-link-custom"><i class="bi bi-people"></i> Usuarios</a>
                    <a href="#" class="nav-link-custom active"><i class="bi bi-grid-3x3-gap"></i> Módulos</a>
                    <a href="#" class="nav-link-custom"><i class="bi bi-trash3"></i> Papelera</a>
                </nav>

                <div class="divider"></div>

                <div class="action-group">
                    <a href="#" class="btn-master"><i class="bi bi-shield-lock me-2"></i> Panel Super</a>
                    <a href="#" class="btn-master btn-exit"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
                </div>
            </aside>

            <main class="col-md-9 col-lg-10 main-content">
                <header class="header-main">
                    <h1 class="title-repo">
                        <i class="bi bi-journal-bookmark-fill title-icon"></i>
                        <span id="section-title">Cargando...4</span>
                    </h1>
                    <p class="subtitle-repo" id="section-subtitle">Sincronizando con Supralógica...</p>
                </header>

                <div id="dynamic-content">
                    <div class="module-grid" id="modules-container">
                        </div>
                </div>

                <footer class="footer-system">
                    <p class="mb-1">UCMI — Desarrollo Humano & Excelencia Académica</p>
                    <p class="small text-uppercase">Plataforma Maestra © 2026</p>
                </footer>
            </main>
        </div>
    </div>
</div>

<script type="module">
    // Asegúrate de que este archivo existe en la misma carpeta
    import { db } from './firebase-config.js'; 
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.addEventListener('DOMContentLoaded', async () => {
        const contenedor = document.getElementById('modules-container');
        const sectionTitle = document.getElementById('section-title');
        const sectionSubtitle = document.getElementById('section-subtitle');

        const cargarDatos = async () => {
            const userId = localStorage.getItem('userId');
            
            if (!userId) {
                contenedor.innerHTML = '<p class="text-center opacity-50">Sesión expirada. Por favor, inicia sesión.</p>';
                return;
            }

            try {
                const docRef = doc(db, "usuarios", userId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Usando 'modulos' en plural como en tu imagen de la base de datos
                    const misModulos = data.modulos || []; 
                    
                    // Mapeo de encabezados según tu Firebase
                    sectionTitle.innerText = data.entidad || "REPOSITORIO 1";
                    sectionSubtitle.innerText = `Responsable: ${data.nombre || 'N/A'}`;

                    if (misModulos.length === 0) {
                        contenedor.innerHTML = '<p class="text-center opacity-50">No hay módulos registrados en esta cuenta.</p>';
                    } else {
                        contenedor.innerHTML = misModulos.map(nombre => `
                            <article class="card-module">
                                <div class="badge-status">ADQUIRIDO</div>
                                <i class="bi bi-translate module-icon"></i>
                                <h3 class="module-name">${nombre}</h3>
                                <p class="module-desc">Programa oficial de nivelación lingüística UCMI.</p>
                            </article>
                        `).join('');
                    }
                } else {
                    contenedor.innerHTML = `<p class="text-center opacity-50">Error: No se encontró el usuario ${userId}</p>`;
                }
            } catch (error) {
                console.error("Error de Firebase:", error);
                contenedor.innerHTML = '<p class="text-center text-danger">Error de conexión con el servidor.</p>';
            }
        };

        // Personalización del logo por rol
        if (localStorage.getItem('userRole') === 'Profesor independiente') {
            const logo = document.getElementById('logoAcademia');
            if (logo) logo.src = 'https://universitariodematematica-star.github.io/UCMI/logo-star.png';
        }

        // Eventos de navegación
        document.querySelectorAll('.nav-link-custom').forEach(link => {
            link.addEventListener('click', (e) => {
                const texto = link.innerText.trim();
                if (texto !== 'Módulos') {
                    e.preventDefault();
                    document.querySelectorAll('.nav-link-custom').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    sectionTitle.innerText = texto;
                    contenedor.innerHTML = '<div class="text-center opacity-50 mt-5">Sección en fase de implementación...</div>';
                } else {
                    cargarDatos();
                }
            });
// 4. Ejecución inicial (AHORA DENTRO DEL BLOQUE CORRECTO)
        await cargarDatos();
    }); // Este cierra el DOMContentLoaded de la línea 239
</script>
</body>
</html>
