    <style>

            --azul-ucmi: #06090f;
            --azul-sidebar: #1a2a3a;
            --dorado-ucmi: #c5a059;
            --rojo-logout: #e74c3c;

        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;

        .nav-item-ucmi:hover { color: white; background: rgba(255,255,255,0.1); transform: translateX(5px); }

        .correo-item {
    background: rgba(255,255,255,0.05);

}

.correo-texto {
    font-size: 0.95rem;

<body>

    <main class="super-overlay">
        <div class="container-fluid">
            <h1 class="display-6 fw-bold mb-4">Correos pendientes de eliminación</h1>

<div class="card bg-dark bg-opacity-50 text-white border-0 shadow-lg">
    <div class="card-body">
        <div id="listaCorreos" class="list-group">
            <p class="text-muted">Cargando correos...</p>
        </div>
    </div>
</div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325",
        measurementId: "G-3M3DH25722"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);


    async function cargarCorreosPendientes() {
    const lista = document.getElementById("listaCorreos");
    lista.innerHTML = "<p class='text-muted'>Cargando correos...</p>";

    try {
        const querySnapshot = await getDocs(collection(db, "correosPendientesEliminar"));

        if (querySnapshot.empty) {
            lista.innerHTML = "<p class='text-muted'>No hay correos pendientes.</p>";
            return;
        }

        lista.innerHTML = "";

        querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();

            const item = document.createElement("div");
            item.className = "correo-item";

item.innerHTML = `
    <div class="correo-texto">
        <i class="bi bi-envelope me-2"></i>
        ${data.correoAnterior || data.correoNuevo || "Sin correo"}
    </div>
    <button class="btn btn-sm btn-outline-danger">
        Eliminar
    </button>
`;

            item.querySelector("button").addEventListener("click", async () => {
                await deleteDoc(doc(db, "correosPendientesEliminar", docSnap.id));
                cargarCorreosPendientes();
            });

            lista.appendChild(item);
        });

    } catch (error) {
        console.error("Error cargando correos:", error);
        lista.innerHTML = "<p class='text-danger'>Error al cargar datos</p>";
    }
}

    // Carga de Logo según el usuario
    onAuthStateChanged(auth, async (user) => {
    const logoElement = document.getElementById('logoAcademia');

    if (user) {
        try {
            const docRef = doc(db, "usuarios", user.email);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists() && docSnap.data().logoCustom) {
                logoElement.src = docSnap.data().logoCustom;
            }
        } catch (error) {
            console.error("Error al cargar logo:", error);
        }
    }

    logoElement.style.opacity = "1";
    logoElement.style.visibility = "visible";

    // 👇 AQUÍ EXACTAMENTE
    cargarCorreosPendientes();
});
</script>
<script type="module" src="js/alertas-globales.js"></script>
