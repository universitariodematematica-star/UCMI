<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Universitario de Ciencias Matemáticas e Idiomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-ucmi: #004dc0;
            --oscuro-fondo: #0a192f;
            --texto-claro: #e6f1ff;
            --gris-suave: #8892b0;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--oscuro-fondo);
            overflow: hidden;
        }

        .contenedor-principal {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* LADO IZQUIERDO: PANEL DE SUPRALÓGICA */
        .seccion-visual {
            flex: 1.2;
            /* IMAGEN DE FONDO INTEGRADA */
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEizUzpn2GtLF-rA4RUAtjxJPqYQ0_6Q1gBfzwQ2WlN5fR3Y_TC4gjYjBXwYrCOoQpnS6CP32qib39Ie4tfW6R-iwwcdKMTXzXDgD5MMp9AwUqDziW_koSHfwB7PQKuhmUUtDahtgKX6SFUHfdViDHXj7vWkbJ3zNQfacuy9FM5bODKDkYkZUaGU36Gp_Vf0/s320/imagen_index_ucmi.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--texto-claro);
            padding: 40px;
            position: relative;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        /* Overlay sutil para asegurar contraste */
        .seccion-visual::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 25, 47, 0.3); 
            z-index: 1;
        }

        .seccion-visual * {
            z-index: 2;
        }

        /* CUADRO CON ESQUINAS REDONDEADAS PARA EL LOGO */
        .cuadro-logo {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 35px; /* Esquinas redondeadas solicitadas */
            border: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cuadro-logo img {
            width: 150px; /* Tamaño optimizado para tu logo */
            height: auto;
        }

        .supralogica-texto {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #64ffda;
            margin-top: 15px;
        }

        /* LADO DERECHO: FORMULARIO DE ACCESO */
        .seccion-login {
            flex: 0.8;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        /* LOGO UCMI EN EL LADO DEL LOGIN */
        .logo-login-container {
            margin-bottom: 25px;
        }

        .logo-login-container img {
            width: 80px;
            height: auto;
        }

        .login-card h2 {
            color: var(--oscuro-fondo);
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--gris-suave);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid #eee;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }

        .input-group input:focus {
            border-color: var(--azul-ucmi);
            outline: none;
            background-color: #fff;
            box-shadow: 0 4px 12px rgba(0, 77, 192, 0.1);
        }

        .btn-entrar {
            width: 100%;
            padding: 15px;
            background-color: var(--azul-ucmi);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 15px rgba(0, 77, 192, 0.2);
        }

        .btn-entrar:hover {
            background-color: #003da0;
            transform: translateY(-2px);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: #fff;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: background-color 0.3s;
        }

        .btn-google:hover {
            background-color: #f5f5f5;
        }

        .registro-link {
            margin-top: 35px;
            font-size: 0.9rem;
            color: var(--gris-suave);
        }

        .registro-link a {
            color: var(--azul-ucmi);
            text-decoration: none;
            font-weight: 600;
        }

        /* RESPONSIVE: MÓVIL */
        @media (max-width: 1024px) {
            .seccion-visual { display: none; }
            .seccion-login { flex: 1; padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="seccion-visual">
            <div class="cuadro-logo">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGorr06sfB3DGVDAPb7LfW18T5Iws9DunEX2U7D-nLT0Vk1hmI8Jj_PnuHAqEz4OoTeUNBtJkp-IDb0SlYV5aO1_rG5_v02TqLsm45COGzm5wRvP2Dp9jelaRSj42yfOCZKTYvKOA_5Lc38kG9hTEclhqhHIesaP2fuwd48wr-3Lp5joWtgRIQ6i4t0jUd/s166/logo_ucmi.png" alt="UCMI Logo">
            </div>
            <h1 style="margin: 0; font-size: 3.5rem; letter-spacing: 2px;">UCMI</h1>
            <p style="text-align: center; max-width: 450px; font-weight: 300; letter-spacing: 1px;">
                UNIVERSITARIO DE CIENCIAS MATEMÁTICAS E IDIOMAS
            </p>
            <div class="supralogica-texto">Supralógica</div>
        </div>

        <div class="seccion-login">
            <div class="login-card">
                <div class="logo-login-container">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGorr06sfB3DGVDAPb7LfW18T5Iws9DunEX2U7D-nLT0Vk1hmI8Jj_PnuHAqEz4OoTeUNBtJkp-IDb0SlYV5aO1_rG5_v02TqLsm45COGzm5wRvP2Dp9jelaRSj42yfOCZKTYvKOA_5Lc38kG9hTEclhqhHIesaP2fuwd48wr-3Lp5joWtgRIQ6i4t0jUd/s166/logo_ucmi.png" alt="UCMI Mini Logo">
                </div>
                <h2>Iniciar Sesión</h2>
                
                <form id="formAcceso">
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" placeholder="usuario@ucmi.edu" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-entrar">Entrar a UCMI</button>
                </form>

                <button class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" alt="Google">
                    Continuar con Google
                </button>

                <div class="registro-link">
                    ¿No tienes cuenta? <a href="#">Regístrate aquí</a><br>
                    <span style="font-size: 0.8rem; margin-top: 10px; display: inline-block;">Enrollment Autodidacta</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lógica de transición para el formulario
        document.getElementById('formAcceso').addEventListener('submit', function(e) {
            e.preventDefault();
            // Próximo paso: Integrar Firebase Auth aquí
            console.log("Iniciando validación en Firebase...");
        });
    </script>
</body>
</html>
