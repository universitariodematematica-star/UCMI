<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Universitario de Ciencias Matemáticas e Idiomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-ucmi: #004dc0;
            --oscuro-fondo: #0a192f;
            --texto-claro: #e6f1ff;
            --gris-suave: #8892b0;
            --color-texto-principal: #333333;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff; /* Fondo blanco para el login */
            overflow: hidden;
        }

        .contenedor-principal {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* LADO IZQUIERDO: SUPRALÓGICA PURA (TOTALMENTE LIMPIA) */
        .seccion-visual {
            flex: 1.2;
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEizUzpn2GtLF-rA4RUAtjxJPqYQ0_6Q1gBfzwQ2WlN5fR3Y_TC4gjYjBXwYrCOoQpnS6CP32qib39Ie4tfW6R-iwwcdKMTXzXDgD5MMp9AwUqDziW_koSHfwB7PQKuhmUUtDahtgKX6SFUHfdViDHXj7vWkbJ3zNQfacuy9FM5bODKDkYkZUaGU36Gp_Vf0/s320/imagen_index_ucmi.png');
            background-size: cover;
            background-position: center;
            position: relative;
            border-right: 1px solid rgba(0,0,0,0.05); /* Separación sutil */
        }

        /* Capa oscura sutil (opcional, ajusta opacidad si es necesario) */
        .seccion-visual::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 25, 47, 0.1); 
        }

        /* LADO DERECHO: FORMULARIO DE ACCESO */
        .seccion-login {
            flex: 0.8;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* CONTENEDOR DEL LOGO (LIMPIO, SIN RECUADRO) */
        .contenedor-logo-derecho {
            display: inline-block;
            margin-bottom: 15px; /* Espacio para el texto de abajo */
        }

        .contenedor-logo-derecho img {
            width: 150px; /* Tamaño del logo */
            height: auto;
            display: block;
        }

        /* NUEVO TEXTO DEBAJO DEL LOGO */
        .texto-universitario {
            font-size: 0.8rem;
            color: var(--color-texto-principal);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px; /* Espacio antes de 'Iniciar Sesión' */
            opacity: 0.9;
        }

        .login-card h2 {
            color: var(--oscuro-fondo);
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 30px;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--gris-suave);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid #eee;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #fcfcfc;
        }

        .input-group input:focus {
            border-color: var(--azul-ucmi);
            outline: none;
            background-color: #fff;
            box-shadow: 0 4px 12px rgba(0, 77, 192, 0.1);
        }

        .btn-entrar {
            width: 100%;
            padding: 15px;
            background-color: var(--azul-ucmi);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 8px 15px rgba(0, 77, 192, 0.2);
        }

        .btn-entrar:hover {
            background-color: #003da0;
            transform: translateY(-2px);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: #fff;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .registro-link {
            margin-top: 35px;
            font-size: 0.9rem;
            color: var(--gris-suave);
        }

        .registro-link a {
            color: var(--azul-ucmi);
            text-decoration: none;
            font-weight: 600;
        }

        /* Footer de materias sutil */
        .materias-footer {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 45px;
            color: #cbd5e0;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .seccion-visual { display: none; }
            .seccion-login { flex: 1; padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="seccion-visual">
            </div>

        <div class="seccion-login">
            <div class="login-card">
                
                <div class="contenedor-logo-derecho">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGorr06sfB3DGVDAPb7LfW18T5Iws9DunEX2U7D-nLT0Vk1hmI8Jj_PnuHAqEz4OoTeUNBtJkp-IDb0SlYV5aO1_rG5_v02TqLsm45COGzm5wRvP2Dp9jelaRSj42yfOCZKTYvKOA_5Lc38kG9hTEclhqhHIesaP2fuwd48wr-3Lp5joWtgRIQ6i4t0jUd/s166/logo_ucmi.png" alt="UCMI Logo">
                </div>

                <div class="texto-universitario">
                    UNIVERSITARIO DE CIENCIAS MATEMÁTICAS E IDIOMAS
                </div>

                <h2>Iniciar Sesión</h2>
                
                <form id="formAcceso">
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" placeholder="usuario@ucmi.edu" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-entrar">Entrar a UCMI</button>
                </form>

                <button class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" alt="Google">
                    Continuar con Google
                </button>

                <div class="registro-link">
                    ¿No tienes cuenta? <a href="#">Regístrate aquí</a><br>
                    <span style="font-size: 0.8rem; margin-top: 10px; display: inline-block;">Enrollment Autodidacta</span>
                </div>

                <div class="materias-footer">
                    <span>Math</span>
                    <span>Physics</span>
                    <span>English</span>
                    <span>Español</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formAcceso').addEventListener('submit', function(e) {
            e.preventDefault();
            console.log("Conectando con Firebase...");
        });
    </script>
</body>
</html>
