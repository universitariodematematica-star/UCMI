<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Universitario de Ciencias Matemáticas e Idiomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-ucmi: #004dc0;
            --oscuro-fondo: #0a192f;
            --texto-claro: #e6f1ff;
            --gris-suave: #8892b0;
            --oscuro-tarjeta: #1a2a40; /* Color de fondo de tu imagen de logo */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff; /* Fondo blanco para el lado del login */
            overflow: hidden;
        }

        .contenedor-principal {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* LADO IZQUIERDO: SUPRALÓGICA (LIMPIO) */
        .seccion-visual {
            flex: 1.2;
            /* 👇👇👇 REEMPLAZA CON LA URL DE TU IMAGEN DE FONDO 👇👇👇 */
            background-image: url('tu-imagen-supralogica.jpg'); 
            
            background-size: cover;
            background-position: center;
            position: relative;
            border-right: 1px solid rgba(0,0,0,0.05); /* Separación sutil */
        }

        /* LADO DERECHO: LOGIN (CON TU IMAGEN DE LOGO EXACTA) */
        .seccion-login {
            flex: 0.8;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* CONTENEDOR PARA TU IMAGEN DE LOGO (con esquinas redondeadas) */
        .contenedor-logo-derecho {
            display: inline-block;
            background-color: var(--oscuro-tarjeta);
            padding: 15px; /* Espaciado interno */
            border-radius: 25px; /* Esquinas redondeadas solicitadas */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        /* 👇👇👇 REEMPLAZA CON LA URL DE TU IMAGEN DE LOGO (con fondo oscuro) 👇👇👇 */
        .contenedor-logo-derecho img {
            width: 180px; /* Ajusta el tamaño */
            height: auto;
            display: block; /* Elimina espacio inferior */
        }

        .login-card h2 {
            color: var(--oscuro-fondo);
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 30px;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--gris-suave);
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--azul-ucmi);
            outline: none;
            box-shadow: 0 0 8px rgba(0, 77, 192, 0.2);
        }

        .btn-entrar {
            width: 100%;
            padding: 14px;
            background-color: var(--azul-ucmi);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-entrar:hover {
            background-color: #003da0;
            transform: translateY(-2px);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: #fff;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .registro-link {
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--gris-suave);
        }

        .registro-link a {
            color: var(--azul-ucmi);
            text-decoration: none;
            font-weight: 600;
        }

        /* Iconos de materias al pie */
        .materias-footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            color: var(--gris-suave);
            font-size: 0.8rem;
        }

        .materias-footer span {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .contenedor-principal { flex-direction: column; }
            .seccion-visual { display: none; } /* Ocultamos visual en móviles */
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="seccion-visual">
            </div>

        <div class="seccion-login">
            <div class="login-card">
                
                <div class="contenedor-logo-derecho">
                    <img src="tu-imagen-logo-ucmi.png" alt="UCMI Logo">
                </div>

                <h2>TOMA DE CÓDIGO</h2>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" placeholder="ejemplo@ucmi.edu" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-entrar">Entrar a UCMI</button>
                </form>

                <button class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" alt="Google">
                    Entrar con Google
                </button>

                <div class="registro-link">
                    ¿Nuevo en UCMI? <a href="#">Regístrate aquí</a><br>
                    <small style="display:block; margin-top:10px;">Enrollment Autodidacta</small>
                </div>

                <div class="materias-footer">
                    <span>🧮 Math</span>
                    <span>⚛️ Physics</span>
                    <span>🇬🇧 English</span>
                    <span>🇪🇸 Español</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('¡Conectando con el cerebro de UCMI...!');
        });
    </script>
</body>
</html>
