<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMI - Panel de Administración Académica</title>
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGorr06sfB3DGVDAPb7LfW18T5Iws9DunEX2U7D-nLT0Vk1hmI8Jj_PnuHAqEz4OoTeUNBtJkp-IDb0SlYV5aO1_rG5_v02TqLsm45COGzm5wRvP2Dp9jelaRSj42yfOCZKTYvKOA_5Lc38kG9hTEclhqhHIesaP2fuwd48wr-3Lp5joWtgRIQ6i4t0jUd/s166/logo_ucmi.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-ucmi: #004dc0;
            --fondo-gris: #f4f7f6;
            --texto-principal: #2d3436;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--fondo-gris);
            margin: 0;
            display: flex;
        }

        /* BARRA LATERAL */
        .sidebar {
            width: 250px;
            background-color: #0a192f;
            height: 100vh;
            color: white;
            padding: 20px;
            position: fixed;
        }

        .sidebar h2 { font-size: 1.2rem; border-bottom: 1px solid #1e2d44; padding-bottom: 10px; }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
        }

        /* TARJETAS DE MÉTRICAS */
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            flex: 1;
        }

        .card h3 { margin: 0; font-size: 0.9rem; color: #636e72; }
        .card p { font-size: 2rem; font-weight: 600; color: var(--azul-ucmi); margin: 10px 0 0 0; }

        /* FORMULARIO */
        .form-registro {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr) auto;
            gap: 15px;
            align-items: end;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-add {
            background-color: var(--azul-ucmi);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        /* TABLA */
        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        th { background-color: #f8f9fa; color: #636e72; }

        .status-badge {
            background: #e1f5fe;
            color: #01579b;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGorr06sfB3DGVDAPb7LfW18T5Iws9DunEX2U7D-nLT0Vk1hmI8Jj_PnuHAqEz4OoTeUNBtJkp-IDb0SlYV5aO1_rG5_v02TqLsm45COGzm5wRvP2Dp9jelaRSj42yfOCZKTYvKOA_5Lc38kG9hTEclhqhHIesaP2fuwd48wr-3Lp5joWtgRIQ6i4t0jUd/s166/logo_ucmi.png" width="100">
        <h2>UCMI Admin</h2>
        <p style="font-size: 0.8rem; color: #8892b0;">Panel de Academia</p>
    </div>

    <div class="main-content">
        <h1>Gestión de Cupos Académicos</h1>

        <div class="stats-container">
            <div class="card">
                <h3>Cupos Totales Comprados</h3>
                <p id="total-cupos">50</p>
            </div>
            <div class="card">
                <h3>Alumnos Activos</h3>
                <p id="activos-cupos">38</p>
            </div>
            <div class="card" style="border-left: 5px solid #00b894;">
                <h3>Disponibles</h3>
                <p id="disponibles-cupos" style="color: #00b894;">12</p>
            </div>
        </div>

        <div class="form-registro">
            <h3 style="margin-top:0">Inscribir Nuevo Alumno</h3>
            <div class="form-grid">
                <div>
                    <label>Nombre Completo</label>
                    <input type="text" placeholder="Ej. Avril Riera">
                </div>
                <div>
                    <label>Correo Institucional</label>
                    <input type="email" placeholder="alumno@academia.com">
                </div>
                <div>
                    <label>Programa</label>
                    <select>
                        <option>Supralógica Nivel 1</option>
                        <option>Matemática AGEM</option>
                        <option>Idiomas</option>
                    </select>
                </div>
                <button class="btn-add">Registrar y Usar Cupo</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Programa</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Avril Riera</td>
                    <td>avril@ucmi.edu</td>
                    <td>Supralógica</td>
                    <td><span class="status-badge">Activo</span></td>
                    <td><button style="color: red; border:none; background:none; cursor:pointer;">Dar de baja</button></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
