<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-profundo: #06090f;
            --dorado-ucmi: #c5a059;
            --cian-neon: #00f2ff;
            --purpura-neon: #bc13fe;
            --magenta-neon: #ff00ff;
            --blanco-suave: rgba(255, 255, 255, 0.85);
        }

        body {
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
        }

        .overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.5) 0%, rgba(6, 9, 15, 0.85) 100%);
            min-height: 100vh;
            width: 100%;
        }

        /* Sidebar con estilo Master Control */
        .sidebar { 
            background: rgba(6, 9, 15, 0.7); 
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            color: white; 
            min-height: 100vh; 
            padding: 25px 15px; 
            position: sticky;
            top: 0;
        }
        
        .nav-link { color: rgba(255,255,255,0.7); transition: 0.3s; border-radius: 8px; margin-bottom: 5px; }
        .nav-link:hover { color: var(--dorado-ucmi); background: rgba(197, 160, 89, 0.1); }
        .nav-link.active { color: white; background: rgba(197, 160, 89, 0.2); border: 1px solid var(--dorado-ucmi); font-weight: bold; }

        .badge-perfil { 
            font-size: 0.65rem; 
            padding: 5px 10px; 
            border-radius: 50px; 
            text-transform: uppercase; 
            font-weight: 800; 
            letter-spacing: 1px;
        }
        
        /* Neón dinámico para los estados */
        .bg-academia { background: #ff4757; box-shadow: 0 0 10px rgba(255, 71, 87, 0.5); }
        .bg-embajador { background: var(--cian-neon); color: #000; box-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .bg-socio { background: var(--purpura-neon); box-shadow: 0 0 10px rgba(188, 19, 254, 0.5); }
        .bg-alumno { background: #2ed573; box-shadow: 0 0 10px rgba(46, 213, 115, 0.5); }

        .table-container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }

        .table { color: rgba(255,255,255,0.9); }
        .table-light { background: rgba(197, 160, 89, 0.1) !important; color: var(--dorado-ucmi) !important; border-bottom: 2px solid var(--dorado-ucmi); }
        
        .modal-content { 
            background: rgba(6, 9, 15, 0.95); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--dorado-ucmi); 
            border-radius: 24px; 
            color: white;
        }

        .text-glow-gold {
            color: var(--dorado-ucmi);
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.5);
        }

        .form-select-dark {
            background-color: rgba(0,0,0,0.5);
            color: white;
            border: 1px solid rgba(197, 160, 89, 0.5);
            border-radius: 10px;
        }

        .form-select-dark:focus {
            background-color: rgba(0,0,0,0.7);
            color: white;
            border-color: var(--dorado-ucmi);
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-block">
                <div class="text-center mb-4">
                    <img src="https://universitariodematematica-star.github.io/UCMI/logo_ucmi.png" alt="Logo" style="height: 50px;" class="mb-3">
                    <h5 class="fw-bold text-glow-gold">UCMI ADMIN</h5>
                </div>
                <hr class="border-secondary opacity-25">
                
                <p class="small text-uppercase fw-bold text-white-50 mb-3" style="font-size: 0.7rem; letter-spacing: 1px;">Red de Conocimiento</p>
                <div class="mb-2 d-flex justify-content-between small"><span>Academias:</span> <span id="countAcademia" class="badge bg-academia">0</span></div>
                <div class="mb-2 d-flex justify-content-between small"><span>Embajadores:</span> <span id="countEmbajador" class="badge bg-embajador">0</span></div>
                <div class="mb-2 d-flex justify-content-between small"><span>Asociados:</span> <span id="countAsociado" class="badge bg-socio">0</span></div>
                <div class="mb-2 d-flex justify-content-between small"><span>Alumnos:</span> <span id="countAlumno" class="badge bg-alumno">0</span></div>
                
                <hr class="border-secondary opacity-25 mt-4">
                <nav class="nav flex-column">
                    <a class="nav-link active" href="#"><i class="bi bi-download me-2"></i> Solicitudes</a>
                    <a class="nav-link" href="#"><i class="bi bi-people me-2"></i> Usuarios</a>
                    <a class="nav-link" href="super-admin.html"><i class="bi bi-cpu me-2"></i> Consola Maestra</a>
                </nav>
            </div>

            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-0 text-glow-gold">Control de Postulaciones</h2>
                        <p class="text-white-50">Validación y activación del Protocolo de Existencia</p>
                    </div>
                    <div class="text-end">
                        <select class="form-select form-select-sm form-select-dark shadow-sm" id="selectorFiltro" style="width: 250px;">
                            <option value="Todos">Ver todos los postulantes</option>
                            <option value="Academia">Solo Academias</option>
                            <option value="Profesor embajador">Solo Embajadores</option>
                            <option value="Profesor asociado">Solo Asociados</option>
                            <option value="Estudiante autodidacta">Solo Autodidactas</option>
                        </select>
                    </div>
                </div>

                <div class="table-container">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Solicitante / Entidad</th>
                                <th>Perfil</th>
                                <th>Ubicación</th>
                                <th>Plan</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaMaestra" style="border-top: none;"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalDetalles" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h4 class="fw-bold text-glow-gold"><i class="bi bi-file-earmark-text me-2"></i>Detalles de la Solicitud</h4>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body py-4" id="contenidoModal"></div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-outline-light rounded-pill px-4 fw-bold" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" id="btnConfirmarAcceso" class="btn btn-warning rounded-pill px-4 fw-bold text-dark" style="background: var(--dorado-ucmi);">
                    Confirmar Pago y Activar
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
