<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin PRO++</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6fb;
}

.header {
    background: #0f172a;
    color: white;
    padding: 15px;
    text-align: center;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    margin: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #2563eb;
    color: white;
    cursor: pointer;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc,
    getDocs,
    collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
    authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
    projectId: "portal-autenticacion-a1ngles"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "universitariodematematica@gmail.com";

// ---------------- LOGIN ----------------
window.login = async function () {

    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;

    try {
        const res = await signInWithEmailAndPassword(auth, email, pass);

        if (res.user.email !== ADMIN_EMAIL) {
            alert("No autorizado");
            await signOut(auth);
            return;
        }

        document.getElementById("login").style.display = "none";
        document.getElementById("panel").style.display = "block";

        loadData();

    } catch (e) {
        alert("Error login");
    }
};

// ---------------- GUARDAR USUARIO ----------------
window.saveLicense = async function () {

    const nameInput = document.getElementById("name").value.trim();
    const email = document.getElementById("userEmail").value.trim();
    const exp = document.getElementById("exp").value;

    const msg = document.getElementById("msg");

    if (!nameInput || nameInput.length < 3) {
        msg.innerText = "Nombre inválido";
        return;
    }

    if (!email.includes("@")) {
        msg.innerText = "Email inválido";
        return;
    }

    if (!exp) {
        msg.innerText = "Falta fecha";
        return;
    }

    // LICENSE
    await setDoc(doc(db, "licenses", email), {
        user: nameInput,
        expiration: exp
    });

    // USER PROFILE
    await setDoc(doc(db, "users", email), {
        name: nameInput,
        email: email
    }, { merge: true });

    msg.innerText = "Usuario guardado correctamente";

    loadData();
};

// ---------------- CARGAR DATOS ----------------
async function loadData() {

    const snap = await getDocs(collection(db, "licenses"));

    const list = document.getElementById("list");
    list.innerHTML = "";

    snap.forEach(docu => {

        const data = docu.data();

        list.innerHTML += `
        <div class="card">
            👤 ${data.user}<br>
            📧 ${docu.id}<br>
            ⏳ ${data.expiration}<br>
        </div>
        `;
    });
}

window.loadData = loadData;

</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="card">
    <h3>Admin Login</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">

    <div class="header">ADMIN PANEL</div>

    <div class="card">
        <h3>Crear usuario</h3>
        <input id="name" placeholder="Nombre completo">
        <input id="userEmail" placeholder="Email">
        <input id="exp" type="date">
        <button onclick="saveLicense()">Guardar</button>
        <div id="msg"></div>
    </div>

    <div class="card">
        <h3>Usuarios</h3>
        <div id="list"></div>
    </div>

</div>

</body>
</html>
