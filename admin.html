<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Admin PRO</title>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    text-align: center;
}

.container {
    margin: 30px auto;
    width: 420px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

input {
    display: block;
    margin: 8px auto;
    padding: 10px;
    width: 90%;
    border-radius: 8px;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
}

.card {
    background: #f4f6f8;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
    text-align: left;
}

.ok { color: green; }
.bad { color: red; }
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
    authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
    projectId: "portal-autenticacion-a1ngles",
    storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
    messagingSenderId: "1039504020190",
    appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 ADMIN EMAIL
const ADMIN_EMAIL = "universitariodematematica@gmail.com";

// -------------------- LOGIN --------------------
window.login = async function () {

    const email = document.getElementById("emailLogin").value;
    const pass = document.getElementById("passLogin").value;

    const user = await signInWithEmailAndPassword(auth, email, pass);

    if (user.user.email !== ADMIN_EMAIL) {
        alert("No autorizado");
        await auth.signOut();
        return;
    }

    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";

    loadUsers();
};

// -------------------- CREAR LICENCIA --------------------
window.createLicense = async function () {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const exp = document.getElementById("exp").value;

    await setDoc(doc(db, "licenses", email), {
        user: name,
        expiration: exp
    });

    loadUsers();
};

// -------------------- CARGAR USUARIOS --------------------
async function loadUsers() {

    const list = document.getElementById("list");
    list.innerHTML = "";

    const snap = await getDocs(collection(db, "licenses"));

    snap.forEach(docu => {

        const data = docu.data();

        const exp = new Date(data.expiration + "T23:59:59");
        const today = new Date();

        const days = Math.ceil((exp - today) / (1000*60*60*24));

        const status = days >= 0 ? "ok" : "bad";

        list.innerHTML += `
            <div class="card">
                👤 ${data.user}<br>
                📧 ${docu.id}<br>
                📅 ${data.expiration}<br>
                ⏳ ${days} días<br>
                <b class="${status}">
                    ${days >= 0 ? "ACTIVO" : "VENCIDO"}
                </b>
            </div>
        `;
    });
}

</script>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="container">
    <h2>🔐 Admin Login</h2>
    <input id="emailLogin" placeholder="Email">
    <input id="passLogin" type="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel" class="container" style="display:none">

    <h2>📊 PANEL ADMIN PRO</h2>

    <input id="name" placeholder="Nombre">
    <input id="email" placeholder="Email">
    <input id="exp" type="date">

    <button onclick="createLicense()">Crear / Renovar licencia</button>

    <h3>Usuarios</h3>
    <div id="list"></div>

</div>

</body>
</html>
