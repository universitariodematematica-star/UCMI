<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Admin PRO++</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6fb;
}

/* HEADER */
.header {
    background: #0f172a;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 18px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 15px;
    padding: 20px;
}

/* CARDS */
.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* INPUTS */
input, select {
    width: 95%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 5px;
    width: 100%;
    background: #2563eb;
    color: white;
}

button:hover {
    background: #1d4ed8;
}

/* USER LIST */
.user {
    padding: 10px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}

.badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
    color: white;
}

.active { background: green; }
.expired { background: red; }

.actions button {
    width: 48%;
    font-size: 12px;
    margin-top: 5px;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc,
    deleteDoc,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
    authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
    projectId: "portal-autenticacion-a1ngles",
    storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
    messagingSenderId: "1039504020190",
    appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "universitariodematematica@gmail.com";

let cache = [];

// ---------------- LOGIN ----------------
window.login = async function () {

    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;

    const user = await signInWithEmailAndPassword(auth, email, pass);

    if (user.user.email !== ADMIN_EMAIL) {
        alert("No autorizado");
        await auth.signOut();
        return;
    }

    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";

    loadData();
};

// ---------------- CREAR / RENOVAR ----------------
window.saveLicense = async function () {

    const name = document.getElementById("name").value;
    const email = document.getElementById("userEmail").value;
    const exp = document.getElementById("exp").value;

    await setDoc(doc(db, "licenses", email), {
        user: name,
        expiration: exp
    });

    loadData();
};

// ---------------- ELIMINAR ----------------
window.deleteUser = async function (email) {
    await deleteDoc(doc(db, "licenses", email));
    loadData();
};

// ---------------- RENOVAR 30 DÍAS ----------------
window.renew30 = async function (email, name) {

    const today = new Date();
    today.setDate(today.getDate() + 30);

    const exp = today.toISOString().split("T")[0];

    await setDoc(doc(db, "licenses", email), {
        user: name,
        expiration: exp
    });

    loadData();
};

// ---------------- LOAD ----------------
async function loadData() {

    const snap = await getDocs(collection(db, "licenses"));

    const search = document.getElementById("search")?.value?.toLowerCase() || "";
    const filter = document.getElementById("filter")?.value || "all";

    let list = document.getElementById("list");
    list.innerHTML = "";

    let total = 0, active = 0, expired = 0;

    cache = [];

    snap.forEach(d => {

        const data = d.data();

        const exp = new Date(data.expiration + "T23:59:59");
        const now = new Date();

        const days = Math.ceil((exp - now) / (1000*60*60*24));

        let status = days >= 0 ? "active" : "expired";

        cache.push({id: d.id, data, days, status});

        if (filter !== "all" && filter !== status) return;
        if (!d.id.toLowerCase().includes(search) && !data.user.toLowerCase().includes(search)) return;

        total++;
        if (days >= 0) active++; else expired++;

        list.innerHTML += `
            <div class="user">
                👤 ${data.user}<br>
                📧 ${d.id}<br>
                ⏳ ${days} días<br>
                <span class="badge ${status}">
                    ${status.toUpperCase()}
                </span>

                <div class="actions">
                    <button onclick="renew30('${d.id}','${data.user}')">+30 días</button>
                    <button onclick="deleteUser('${d.id}')">Eliminar</button>
                </div>
            </div>
        `;
    });

    document.getElementById("stats").innerHTML = `
        Total: ${total} | Activos: ${active} | Vencidos: ${expired}
    `;
}

window.loadData = loadData;

</script>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="card" style="max-width:300px;margin:80px auto;text-align:center;">
    <h3>🔐 Admin PRO++</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">

    <div class="header">⚡ ADMIN DASHBOARD PRO++</div>

    <div class="grid">

        <!-- CREATE -->
        <div class="card">
            <h3>➕ Crear / Editar</h3>
            <input id="name" placeholder="Nombre">
            <input id="userEmail" placeholder="Email usuario">
            <input id="exp" type="date">
            <button onclick="saveLicense()">Guardar</button>
        </div>

        <!-- STATS -->
        <div class="card">
            <h3>📊 Estadísticas</h3>
            <div id="stats"></div>
        </div>

        <!-- CONTROLS -->
        <div class="card">
            <h3>🔍 Buscar / Filtrar</h3>
            <input id="search" placeholder="Buscar..." oninput="loadData()">

            <select id="filter" onchange="loadData()">
                <option value="all">Todos</option>
                <option value="active">Activos</option>
                <option value="expired">Vencidos</option>
            </select>
        </div>

    </div>

    <div class="card" style="margin:20px">
        <h3>👥 Usuarios</h3>
        <div id="list"></div>
    </div>

</div>

</body>
</html>
