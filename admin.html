<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: #1a2a3a; color: white; min-height: 100vh; padding: 20px; }
        .badge-perfil { font-size: 0.75rem; padding: 5px 10px; border-radius: 50px; }
        .bg-academia { background: #e74c3c; color: white; }
        .bg-embajador { background: #3498db; color: white; }
        .bg-socio { background: #9b59b6; color: white; }
        .bg-alumno { background: #2ecc71; color: white; }
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <h3 class="fw-bold text-center mt-3">UCMI</h3>
            <p class="text-center small text-muted">Consola Maestra</p>
            <hr>
            <nav class="nav flex-column">
                <a class="nav-link text-white fw-bold" href="#">📊 Dashboard</a>
                <p class="small text-uppercase text-white-50 mt-4 mb-2">Filtros</p>
                <div class="ps-2">
                    <div class="text-white-50 small mb-1">Academia: <span id="countAcademia">0</span></div>
                    <div class="text-white-50 small mb-1">Embajadores: <span id="countEmbajador">0</span></div>
                    <div class="text-white-50 small mb-1">Socios: <span id="countSocio">0</span></div>
                    <div class="text-white-50 small mb-1">Alumnos: <span id="countAlumno">0</span></div>
                </div>
            </nav>
        </div>

        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Solicitudes de Ingreso</h2>
                <img src="logo_ucmi.png" alt="Logo" style="height: 50px;">
            </div>

            <div class="table-container p-3">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Solicitante / Email</th>
                            <th>Perfil</th>
                            <th>Programas</th>
                            <th>Cupos/Meses</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="listaMaestra">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // 1. ESCUCHAR SOLICITUDES EN TIEMPO REAL
    onSnapshot(collection(db, "postulaciones"), (snapshot) => {
        const tbody = document.getElementById('listaMaestra');
        tbody.innerHTML = '';
        let counts = { Academia: 0, "Profesor Embajador": 0, "Profesor Socio": 0, "Alumno Autodidacta": 0 };

        snapshot.forEach((d) => {
            const data = d.data();
            const id = d.id;
            const perfil = data.tipoSolicitante || "Sin definir";
            
            if(counts[perfil] !== undefined) counts[perfil]++;

            const colorClase = perfil.includes("Academia") ? "bg-academia" : 
                               perfil.includes("Embajador") ? "bg-embajador" :
                               perfil.includes("Socio") ? "bg-socio" : "bg-alumno";

            tbody.innerHTML += `
                <tr>
                    <td><strong>${data.academia || data.director}</strong><br><small class="text-muted">${data.email}</small></td>
                    <td><span class="badge-perfil ${colorClase}">${perfil}</span></td>
                    <td><small>${data.programas}</small></td>
                    <td>${data.cupos} cupos / ${data.meses}m</td>
                    <td>
                        <button onclick="aprobarYCrear('${id}')" class="btn btn-sm btn-success shadow-sm">Aceptar y Registrar</button>
                        <button onclick="rechazar('${id}')" class="btn btn-sm btn-link text-danger">Eliminar</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById('countAcademia').innerText = counts["Academia"];
        document.getElementById('countEmbajador').innerText = counts["Profesor Embajador"];
        document.getElementById('countSocio').innerText = counts["Profesor Socio"];
        document.getElementById('countAlumno').innerText = counts["Alumno Autodidacta"];
    });

    // 2. FUNCIÓN DE APROBACIÓN AUTOMÁTICA
    window.aprobarYCrear = async (id) => {
        try {
            const docRef = doc(db, "postulaciones", id);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const datos = docSnap.data();
                const passTemporal = "UCMI2026"; // Contraseña establecida por ti

                // A. Crear en Auth
                const userCredential = await createUserWithEmailAndPassword(auth, datos.email, passTemporal);
                const newUid = userCredential.user.uid;

                // B. Guardar en Colección Usuarios (Sincronizado)
                await setDoc(doc(db, "usuarios", newUid), {
                    nombre: datos.academia || datos.director,
                    email: datos.email,
                    rol: datos.tipoSolicitante,
                    rif: datos.rif || "N/A",
                    ubicacion: datos.ubicacion || "N/A",
                    estado: "activo",
                    fechaRegistro: new Date().toLocaleString()
                });

                // C. Borrar la postulación ya procesada
                await deleteDoc(docRef);

                alert(`¡Proceso Exitoso!\n\nUsuario: ${datos.email}\nClave: ${passTemporal}\n\nLa solicitud ha sido movida a la base de datos oficial.`);
                
                // Recargar para evitar conflictos de sesión de Firebase
                location.reload();
            }
        } catch (error) {
            console.error("Error en el despliegue:", error);
            if(error.code === 'auth/email-already-in-use') {
                alert("Este correo ya está registrado en el sistema UCMI.");
            } else {
                alert("Error al procesar el registro automático. Revisa la consola.");
            }
        }
    };

    window.rechazar = async (id) => {
        if(confirm("¿Estás seguro de eliminar esta solicitud sin registrarla?")) {
            await deleteDoc(doc(db, "postulaciones", id));
        }
    };
</script>
</body>
</html>
