<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6fb;
}

/* HEADER */
.header {
    background: #0f172a;
    color: white;
    padding: 15px;
    text-align: center;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 15px;
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* INPUTS */
input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #2563eb;
    color: white;
    width: 100%;
}

button:hover {
    background: #1d4ed8;
}

/* USERS */
.user {
    padding: 10px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}

.badge {
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 12px;
    color: white;
}

.active { background: green; }
.expired { background: red; }

.stats {
    font-size: 18px;
    font-weight: bold;
}

</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
    authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
    projectId: "portal-autenticacion-a1ngles",
    storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
    messagingSenderId: "1039504020190",
    appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "universitariodematematica@gmail.com";

// ---------------- LOGIN ----------------
window.login = async function () {

    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;

    const user = await signInWithEmailAndPassword(auth, email, pass);

    if (user.user.email !== ADMIN_EMAIL) {
        alert("No autorizado");
        await auth.signOut();
        return;
    }

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadData();
};

// ---------------- CREAR LICENCIA ----------------
window.createLicense = async function () {

    const name = document.getElementById("name").value;
    const email = document.getElementById("userEmail").value;
    const exp = document.getElementById("exp").value;

    await setDoc(doc(db, "licenses", email), {
        user: name,
        expiration: exp
    });

    loadData();
};

// ---------------- LOAD DATA ----------------
async function loadData() {

    const snap = await getDocs(collection(db, "licenses"));

    let total = 0;
    let active = 0;
    let expired = 0;

    const list = document.getElementById("list");
    list.innerHTML = "";

    snap.forEach(d => {

        const data = d.data();

        const exp = new Date(data.expiration + "T23:59:59");
        const now = new Date();

        const days = Math.ceil((exp - now) / (1000*60*60*24));

        total++;

        if (days >= 0) active++;
        else expired++;

        list.innerHTML += `
            <div class="user">
                👤 ${data.user} <br>
                📧 ${d.id} <br>
                ⏳ ${days} días <br>
                <span class="badge ${days>=0?'active':'expired'}">
                    ${days>=0?'ACTIVO':'VENCIDO'}
                </span>
            </div>
        `;
    });

    document.getElementById("stats").innerHTML = `
        Total: ${total} | Activos: ${active} | Vencidos: ${expired}
    `;
}

</script>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:300px;margin:80px auto;text-align:center;">
    <h3>🔐 Admin Login</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

    <div class="header">
        📊 ADMIN DASHBOARD PRO
    </div>

    <div class="grid">

        <!-- CREATE -->
        <div class="card">
            <h3>➕ Crear Licencia</h3>
            <input id="name" placeholder="Nombre">
            <input id="userEmail" placeholder="Email usuario">
            <input id="exp" type="date">
            <button onclick="createLicense()">Guardar</button>
        </div>

        <!-- STATS -->
        <div class="card">
            <h3>📈 Estadísticas</h3>
            <div id="stats" class="stats"></div>
        </div>

        <!-- USERS -->
        <div class="card">
            <h3>👥 Usuarios</h3>
            <div id="list"></div>
        </div>

    </div>

</div>

</body>
</html>
