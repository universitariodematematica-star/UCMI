<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - UCMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --azul-ucmi: #1a2a3a;
            --verde-exito: #27ae60;
        }
        
        /* APLICACIÓN DEL FONDO CÓSMICO */
        body { 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEha-pig9aN462AKJSlSnHrqcseuCYM6l9W6-N57xQaB53nmVFnuXEWdVN4KSaYZSR7S9Fm0BIL2MjAZeZFngTHSIgeGDJNdrApWfqwOF1ZcJgrQbWF6sdjaMDcpnVgen1_5o-kKXdRo46Q_Ly3xjyS-oJbOYRjmoA9-t82SgBcvHEmXsC0_tQhExYyoBvRV/s1408/Gemini_Generated_Image_x1m01x1m01x1m01x.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 0;
        }

        /* Capa overlay para dar legibilidad (filtro oscuro suave) */
        .super-overlay {
            background: radial-gradient(circle, rgba(6, 9, 15, 0.4) 0%, rgba(6, 9, 15, 0.8) 100%);
            min-height: 100vh;
            width: 100%;
        }
        
        /* Tu Sidebar Original */
        .sidebar { 
            background: var(--azul-ucmi); 
            color: white; 
            min-height: 100vh; 
            padding: 25px 15px; 
            position: sticky;
            top: 0;
        }
        
        .nav-link { color: rgba(255,255,255,0.7); transition: 0.3s; }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .nav-link.active { color: white; font-weight: bold; }

        .badge-perfil { font-size: 0.7rem; padding: 6px 12px; border-radius: 50px; text-transform: uppercase; font-weight: 600; }
        
        .bg-academia { background: #dc3545 !important; color: white; }
        .bg-embajador { background: #0d6efd !important; color: white; }
        .bg-socio { background: #6f42c1 !important; color: white; }
        .bg-alumno { background: #198754 !important; color: white; }

        .table-container { 
            background: white; 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        .modal-content { border: none; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="super-overlay">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-block">
                <h4 class="fw-bold text-center mb-4">UCMI ADMIN</h4>
                <hr class="border-secondary">
                
                <p class="small text-uppercase fw-bold text-muted mb-3">Resumen de Red</p>
                <div class="mb-2 d-flex justify-content-between small"><span>Academias:</span> <span id="countAcademia" class="badge bg-academia">0</span></div>
                <div class="mb-2 d-flex justify-content-between small"><span>Embajadores:</span> <span id="countEmbajador" class="badge bg-embajador">0</span></div>
                <div class="mb-2 d-flex justify-content-between small"><span>Asociados:</span> <span id="countAsociado" class="badge bg-socio">0</span></div>
                <div class="mb-2 d-flex justify-content-between small"><span>Alumnos:</span> <span id="countAlumno" class="badge bg-alumno">0</span></div>
                
                <hr class="border-secondary mt-4">
                <nav class="nav flex-column">
                    <a class="nav-link active" href="#">📥 Solicitudes</a>
                    <a class="nav-link" href="#">✅ Usuarios</a>
                </nav>
            </div>

            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-0">Control de Postulaciones</h2>
                        <p class="text-muted">Gestión de acceso al ecosistema UCMI</p>
                    </div>
                    <div class="text-end">
                        <img src="logo_ucmi.png" alt="Logo" style="height: 60px;" class="mb-2 d-block ms-auto">
                        <select class="form-select form-select-sm shadow-sm" id="selectorFiltro" style="width: 250px;">
                            <option value="Todos">Ver todos los postulantes</option>
                            <option value="Academia">Solo Academias</option>
                            <option value="Profesor embajador">Solo Embajadores</option>
                            <option value="Profesor asociado">Solo Asociados</option>
                            <option value="Estudiante autodidacta">Solo Autodidactas</option>
                        </select>
                    </div>
                </div>

                <div class="table-container">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Solicitante / Entidad</th>
                                <th>Perfil</th>
                                <th>Ubicación</th>
                                <th>Plan</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaMaestra"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalDetalles" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h4 class="fw-bold">Detalles de la Solicitud</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body py-4" id="contenidoModal"></div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" id="btnConfirmarAcceso" class="btn btn-success px-4 fw-bold">Confirmar Pago y Activar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2eMtX0I2u1iKdtHjNisMrqVSlpJbzHNI",
        authDomain: "ucmi-13796634.firebaseapp.com",
        projectId: "ucmi-13796634",
        storageBucket: "ucmi-13796634.firebasestorage.app",
        messagingSenderId: "1090719609536",
        appId: "1:1090719609536:web:8d7f269d991d8dc3c6b325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentSolicitud = null;
    let filtroActual = "Todos";

    document.getElementById('selectorFiltro').addEventListener('change', (e) => {
        filtroActual = e.target.value;
        renderTable();
    });

    function renderTable() {
        onSnapshot(collection(db, "postulaciones"), (snapshot) => {
            const tbody = document.getElementById('listaMaestra');
            tbody.innerHTML = '';
            let counts = { "Academia": 0, "Profesor embajador": 0, "Profesor asociado": 0, "Estudiante autodidacta": 0 };

            snapshot.forEach((d) => {
                const data = d.data();
                const id = d.id;
                const perfil = data.tipoSolicitante || "Pendiente";
                
                if(counts[perfil] !== undefined) counts[perfil]++;

                if (filtroActual === "Todos" || perfil === filtroActual) {
                    const colorClass = perfil.includes("Academia") ? "bg-academia" : 
                                       perfil.includes("embajador") ? "bg-embajador" :
                                       perfil.includes("asociado") ? "bg-socio" : "bg-alumno";

                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <div class="fw-bold">${data.entidad !== "N/A" ? data.entidad : data.nombreResponsable}</div>
                                <div class="small text-muted">${data.email}</div>
                            </td>
                            <td><span class="badge-perfil ${colorClass}">${perfil}</span></td>
                            <td><small>${data.ubicacion}</small></td>
                            <td><span class="fw-bold text-primary">${data.cupos}</span> / ${data.duracionLicencia}</td>
                            <td>
                                <button onclick="verDetalles('${id}')" class="btn btn-sm btn-outline-dark">👁️ Revisar</button>
                                <button onclick="borrarPostulacion('${id}')" class="btn btn-sm btn-link text-danger fw-bold" style="text-decoration: none;">×</button>
                            </td>
                        </tr>
                    `;
                }
            });

            document.getElementById('countAcademia').innerText = counts["Academia"];
            document.getElementById('countEmbajador').innerText = counts["Profesor embajador"];
            document.getElementById('countAsociado').innerText = counts["Profesor asociado"];
            document.getElementById('countAlumno').innerText = counts["Estudiante autodidacta"];
        });
    }

    renderTable();

    window.verDetalles = async (id) => {
        const docRef = doc(db, "postulaciones", id);
        const docSnap = await getDoc(docRef);
        
        if (docSnap.exists()) {
            currentSolicitud = { id, ...docSnap.data() };
            const d = currentSolicitud;

            document.getElementById('contenidoModal').innerHTML = `
                <div class="row g-4">
                    <div class="col-md-6 border-end">
                        <h6 class="text-uppercase text-muted small fw-bold">Datos Legales</h6>
                        <p class="mb-1"><strong>Entidad/Firma:</strong> ${d.entidad}</p>
                        <p class="mb-1"><strong>Responsable:</strong> ${d.nombreResponsable}</p>
                        <p class="mb-1"><strong>RIF/ID Fiscal:</strong> ${d.rif}</p>
                        <p class="mb-1"><strong>WhatsApp:</strong> ${d.whatsapp}</p>
                        <p class="mb-1"><strong>Email:</strong> ${d.email}</p>
                    </div>
                    <div class="col-md-6">
                        <h6 class="text-uppercase text-muted small fw-bold">Pedido UCMI</h6>
                        <p class="mb-1"><strong>Perfil:</strong> ${d.tipoSolicitante}</p>
                        <p class="mb-1"><strong>Cupos:</strong> ${d.cupos}</p>
                        <p class="mb-1"><strong>Duración:</strong> ${d.duracionLicencia}</p>
                        <p class="mb-1"><strong>Programas:</strong> <small>${d.programas}</small></p>
                    </div>
                    <div class="col-12 mt-4">
                        <div class="p-3 bg-light rounded border border-warning">
                            <strong>Instrucción para Juan Carlos:</strong> 
                            Verifica el depósito de los cupos (${d.cupos}) antes de activar la cuenta.
                        </div>
                    </div>
                </div>
            `;
            const myModal = new bootstrap.Modal(document.getElementById('modalDetalles'));
            myModal.show();
        }
    };

    document.getElementById('btnConfirmarAcceso').addEventListener('click', async () => {
        if(!currentSolicitud) return;
        const btn = document.getElementById('btnConfirmarAcceso');
        btn.innerText = "Activando...";
        btn.disabled = true;

        try {
            const passTemporal = "UCMI2026";
            const userCredential = await createUserWithEmailAndPassword(auth, currentSolicitud.email, passTemporal);
            const uid = userCredential.user.uid;

            await setDoc(doc(db, "usuarios", uid), {
                nombre: currentSolicitud.entidad !== "N/A" ? currentSolicitud.entidad : currentSolicitud.nombreResponsable,
                email: currentSolicitud.email,
                rol: currentSolicitud.tipoSolicitante,
                rif: currentSolicitud.rif,
                cupos_contratados: currentSolicitud.cupos,
                estado: "activo",
                fechaActivacion: new Date().toLocaleString()
            });

            await deleteDoc(doc(db, "postulaciones", currentSolicitud.id));
            alert("¡USUARIO ACTIVADO!\nEmail: " + currentSolicitud.email);
            location.reload();
        } catch (error) {
            alert("Error: " + error.message);
            btn.innerText = "Confirmar Pago y Activar";
            btn.disabled = false;
        }
    });

    window.borrarPostulacion = async (id) => {
        if (confirm("¿Estás seguro de que deseas eliminar esta postulación permanentemente?")) {
            try {
                await deleteDoc(doc(db, "postulaciones", id));
                console.log("Documento eliminado con éxito:", id);
            } catch (error) {
                console.error("Error al eliminar el documento:", error);
                alert("Hubo un error al intentar eliminar la postulación.");
            }
        }
    };
</script>
</body>
</html>
