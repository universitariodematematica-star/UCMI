<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Panel Admin</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

.container {
    margin-top: 50px;
    background: white;
    display: inline-block;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 250px;
    border-radius: 8px;
}

button {
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
}

.ok { color: green; }
.err { color: red; }
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
    authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
    projectId: "portal-autenticacion-a1ngles",
    storageBucket: "portal-autenticacion-a1ngles.firebasestorage.app",
    messagingSenderId: "1039504020190",
    appId: "1:1039504020190:web:212cf030c3e6feb175a84f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.crearUsuario = async function () {

    const nombre = document.getElementById("nombre").value;
    const email = document.getElementById("email").value;
    const pass = "123456";
    const exp = document.getElementById("exp").value;
    const msg = document.getElementById("msg");

    try {

        // 1. crear usuario
        await createUserWithEmailAndPassword(auth, email, pass);

        // 2. crear licencia
        await setDoc(doc(db, "licenses", email), {
            user: nombre,
            expiration: exp
        });

        msg.className = "ok";
        msg.innerText = "Usuario creado correctamente";

    } catch (e) {
        console.error(e);
        msg.className = "err";
        msg.innerText = "Error: " + e.message;
    }
}

</script>

</head>

<body>

<div class="container">

    <h2>🔐 Panel Admin</h2>

    <input id="nombre" placeholder="Nombre del estudiante">
    <input id="email" placeholder="Email">
    <input id="exp" type="date">

    <button onclick="crearUsuario()">Crear usuario</button>

    <p id="msg"></p>

</div>

</body>
</html>
