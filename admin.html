<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin PRO++</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6fb;
}

.header {
    background: #0f172a;
    color: white;
    padding: 15px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 15px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input, select {
    width: 95%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 8px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-top: 5px;
    width: 100%;
    background: #2563eb;
    color: white;
}

.user {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
    color: white;
}

.active { background: green; }
.expired { background: red; }

.msg {
    margin-top: 10px;
    font-weight: bold;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc,
    deleteDoc,
    collection,
    getDocs,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyCbZU7aTOgpkxFIH_s2dOiMiBANEWKPXA4",
    authDomain: "portal-autenticacion-a1ngles.firebaseapp.com",
    projectId: "portal-autenticacion-a1ngles",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "universitariodematematica@gmail.com";

// ---------------- AUTH ----------------
onAuthStateChanged(auth, (user) => {

    const login = document.getElementById("login");
    const panel = document.getElementById("panel");

    if (user && user.email === ADMIN_EMAIL) {
        login.style.display = "none";
        panel.style.display = "block";

        loadData();
        startGradesListener();

    } else {
        panel.style.display = "none";
        login.style.display = "block";
    }
});

// ---------------- LOGIN ----------------
window.login = async function () {

    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;

    try {
        const user = await signInWithEmailAndPassword(auth, email, pass);

        if (user.user.email !== ADMIN_EMAIL) {
            await signOut(auth);
            alert("No autorizado");
        }

    } catch {
        alert("Error de login");
    }
};

// ---------------- GUARDAR ----------------
window.saveLicense = async function () {

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("userEmail").value.trim();
    const exp = document.getElementById("exp").value;
    const msg = document.getElementById("msg");

    if (!name || name.length < 3) return msg.innerText = "Nombre inválido";
    if (!email.includes("@")) return msg.innerText = "Email inválido";
    if (!exp) return msg.innerText = "Fecha inválida";

    try {

        await setDoc(doc(db, "licenses", email), {
            user: name,
            expiration: exp
        });

        await setDoc(doc(db, "users", email), {
            name: name,
            email: email
        }, { merge: true });

        // limpiar inputs
        document.getElementById("name").value = "";
        document.getElementById("userEmail").value = "";
        document.getElementById("exp").value = "";

        msg.innerText = "Guardado ✔";

        // 🔥 ACTUALIZACIÓN INMEDIATA
        loadData();

    } catch (e) {
        console.error(e);
        msg.innerText = "Error al guardar";
    }
};

// ---------------- ELIMINAR ----------------
window.deleteUser = async function (email) {
    if (!confirm("¿Eliminar usuario?")) return;

    await deleteDoc(doc(db, "licenses", email));
    loadData();
};

// ---------------- LOAD USERS ----------------
async function loadData() {

    const snap = await getDocs(collection(db, "licenses"));
    const list = document.getElementById("list");

    list.innerHTML = "";

    snap.forEach(d => {

        const data = d.data();

        list.innerHTML += `
            <div class="user">
                👤 ${data.user}<br>
                📧 ${d.id}<br>
                ⏳ ${data.expiration}<br>
                <button onclick="deleteUser('${d.id}')">Eliminar</button>
            </div>
        `;
    });
}

// ---------------- GRADES (TIEMPO REAL) ----------------
function startGradesListener() {

    const container = document.getElementById("gradesList");

    onSnapshot(collection(db, "grades"), (snap) => {

        const users = {};

        snap.forEach(doc => {
            const g = doc.data();

            if (!users[g.email]) {
                users[g.email] = {
                    total: 0,
                    max: 0,
                    exercises: {}
                };
            }

            users[g.email].total += g.score;
            users[g.email].max += g.total;
            users[g.email].exercises[g.exercise] = g;
        });

        container.innerHTML = "";

        for (let email in users) {

            const u = users[email];
            const avg = u.max ? ((u.total / u.max) * 10).toFixed(2) : 0;

            let html = `
                <div class="user">
                    👤 ${email.split("@")[0]}<br>
                    📧 ${email}<br>
                    ⭐ Promedio: ${avg}<br><br>
            `;

            for (let ex in u.exercises) {
                const e = u.exercises[ex];
                html += `📘 ${ex}: ${e.score}/${e.total}<br>`;
            }

            html += "</div>";

            container.innerHTML += html;
        }
    });
}

</script>
</head>

<body>

<div id="login" class="card" style="max-width:300px;margin:80px auto;text-align:center;">
    <h3>🔐 Admin</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
</div>

<div id="panel" style="display:none">

    <div class="header">⚡ ADMIN DASHBOARD</div>

    <div class="grid">

        <div class="card">
            <h3>➕ Crear Usuario</h3>
            <input id="name" placeholder="Nombre">
            <input id="userEmail" placeholder="Email">
            <input id="exp" type="date">
            <button onclick="saveLicense()">Guardar</button>
            <div id="msg" class="msg"></div>
        </div>

        <div class="card">
            <h3>👥 Usuarios</h3>
            <div id="list"></div>
        </div>

        <div class="card">
            <h3>📊 Calificaciones</h3>
            <div id="gradesList"></div>
        </div>

    </div>

</div>

</body>
</html>
